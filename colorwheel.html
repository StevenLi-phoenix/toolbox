<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Color Wheel - Free Online HSL Color Picker</title>
<meta name="description" content="Free interactive HSL color wheel picker. Click to select colors, copy HEX, RGB, HSL values. Visual color selection with history. No data sent to any server.">
<meta name="keywords" content="color wheel, hsl picker, color picker, hue selector, interactive color, hex rgb hsl">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/colorwheel.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .canvas-container { position: relative; width: 300px; height: 300px; cursor: crosshair; }
  .canvas-container canvas { border-radius: 50%; }
  .picker-dot { position: absolute; width: 16px; height: 16px; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,.4); transform: translate(-50%,-50%); pointer-events: none; }
  .sliders { width: 100%; max-width: 400px; }
  .slider-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
  .slider-row label { width: 80px; font-size: .85rem; font-weight: 600; flex-shrink: 0; }
  .slider-row input[type=range] { flex: 1; }
  .slider-row .val { width: 40px; text-align: right; font-family: var(--mono); font-size: .85rem; color: var(--muted); }
  .preview-box { width: 100%; height: 80px; border-radius: var(--radius); border: 1px solid var(--border); transition: background .15s; }
  .values-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
  .val-row { display: flex; align-items: center; gap: .5rem; padding: .5rem .75rem; background: var(--surface2); border-radius: var(--radius); }
  .val-row label { font-size: .78rem; font-weight: 600; width: 40px; flex-shrink: 0; }
  .val-row code { font-family: var(--mono); font-size: .82rem; flex: 1; word-break: break-all; }
  .val-row button { padding: .2rem .4rem; font-size: .7rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; color: var(--muted); }
  .val-row button:hover { background: var(--border); }
  .history-label { font-size: .85rem; font-weight: 600; margin-bottom: .4rem; }
  .history { display: flex; flex-wrap: wrap; gap: .35rem; }
  .history-swatch { width: 28px; height: 28px; border-radius: var(--radius); border: 2px solid var(--border); cursor: pointer; transition: transform .1s; }
  .history-swatch:hover { transform: scale(1.2); }
  .main-layout { display: grid; grid-template-columns: auto 1fr; gap: 2rem; align-items: start; }
  @media (max-width: 768px) {
    .main-layout { grid-template-columns: 1fr; }
    .canvas-container { width: 260px; height: 260px; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>Interactive Color Wheel</h1>
<p class="subtitle">Click the wheel to pick a hue, then adjust saturation and lightness. Copy color values in any format.</p>

<div class="card">
<div class="main-layout">
  <div class="wheel-wrap">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="wheel" width="300" height="300"></canvas>
      <div class="picker-dot" id="pickerDot"></div>
    </div>
    <div class="sliders">
      <div class="slider-row">
        <label>Hue</label>
        <input type="range" id="hueSlider" min="0" max="360" value="0" oninput="onSlider()">
        <span class="val" id="hueVal">0°</span>
      </div>
      <div class="slider-row">
        <label>Saturation</label>
        <input type="range" id="satSlider" min="0" max="100" value="100" oninput="onSlider()">
        <span class="val" id="satVal">100%</span>
      </div>
      <div class="slider-row">
        <label>Lightness</label>
        <input type="range" id="litSlider" min="0" max="100" value="50" oninput="onSlider()">
        <span class="val" id="litVal">50%</span>
      </div>
    </div>
  </div>
  <div>
    <div class="preview-box" id="preview"></div>
    <div class="values-grid" style="margin-top:1rem">
      <div class="val-row"><label>HEX</label><code id="hexVal">#ff0000</code><button onclick="copyVal('hexVal')">Copy</button></div>
      <div class="val-row"><label>RGB</label><code id="rgbVal">rgb(255, 0, 0)</code><button onclick="copyVal('rgbVal')">Copy</button></div>
      <div class="val-row"><label>HSL</label><code id="hslVal">hsl(0, 100%, 50%)</code><button onclick="copyVal('hslVal')">Copy</button></div>
      <div class="val-row"><label>HWB</label><code id="hwbVal">hwb(0 0% 0%)</code><button onclick="copyVal('hwbVal')">Copy</button></div>
    </div>
    <div style="margin-top:1.25rem">
      <div class="history-label">Recent Colors</div>
      <div class="history" id="history"></div>
    </div>
  </div>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
const canvas = $('wheel'), ctx = canvas.getContext('2d');
const container = $('canvasContainer');
let hue = 0, sat = 100, lit = 50;
const colorHistory = [];

function drawWheel() {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let angle = 0; angle < 360; angle += 0.5) {
    const startAngle = (angle - 0.5) * Math.PI / 180;
    const endAngle = (angle + 1) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    // Vary saturation from center to edge
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, `hsl(${angle}, 0%, ${lit}%)`);
    grad.addColorStop(1, `hsl(${angle}, 100%, ${lit}%)`);
    ctx.fillStyle = grad;
    ctx.fill();
  }
  // Inner circle for contrast
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'var(--border)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function updatePickerDot() {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
  const dist = (sat / 100) * r;
  const rad = (hue - 90) * Math.PI / 180;
  const x = cx + dist * Math.cos(rad);
  const y = cy + dist * Math.sin(rad);
  const dot = $('pickerDot');
  dot.style.left = x + 'px';
  dot.style.top = y + 'px';
  dot.style.borderColor = lit > 60 ? '#333' : '#fff';
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function rgbToHwb(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const w = Math.min(r, g, b);
  const bl = 1 - Math.max(r, g, b);
  return [Math.round(w * 100), Math.round(bl * 100)];
}

function updateDisplay() {
  const [r, g, b] = hslToRgb(hue, sat, lit);
  const hex = rgbToHex(r, g, b);
  const [w, bl] = rgbToHwb(r, g, b);

  $('preview').style.background = hex;
  $('hexVal').textContent = hex;
  $('rgbVal').textContent = `rgb(${r}, ${g}, ${b})`;
  $('hslVal').textContent = `hsl(${hue}, ${sat}%, ${lit}%)`;
  $('hwbVal').textContent = `hwb(${hue} ${w}% ${bl}%)`;

  $('hueSlider').value = hue;
  $('satSlider').value = sat;
  $('litSlider').value = lit;
  $('hueVal').textContent = hue + '°';
  $('satVal').textContent = sat + '%';
  $('litVal').textContent = lit + '%';

  updatePickerDot();
}

function addToHistory() {
  const [r, g, b] = hslToRgb(hue, sat, lit);
  const hex = rgbToHex(r, g, b);
  if (colorHistory[0] === hex) return;
  colorHistory.unshift(hex);
  if (colorHistory.length > 20) colorHistory.pop();
  renderHistory();
}

function renderHistory() {
  $('history').innerHTML = colorHistory.map(c =>
    `<div class="history-swatch" style="background:${c}" title="${c}" onclick="loadColor('${c}')"></div>`
  ).join('');
}

function loadColor(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  // RGB to HSL
  const rn = r / 255, gn = g / 255, bn = b / 255;
  const max = Math.max(rn, gn, bn), min = Math.min(rn, gn, bn);
  let h = 0, s = 0;
  const l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === rn) h = ((gn - bn) / d + (gn < bn ? 6 : 0)) * 60;
    else if (max === gn) h = ((bn - rn) / d + 2) * 60;
    else h = ((rn - gn) / d + 4) * 60;
  }
  hue = Math.round(h);
  sat = Math.round(s * 100);
  lit = Math.round(l * 100);
  drawWheel();
  updateDisplay();
}

function onSlider() {
  hue = parseInt($('hueSlider').value);
  sat = parseInt($('satSlider').value);
  lit = parseInt($('litSlider').value);
  drawWheel();
  updateDisplay();
}

// Canvas mouse/touch interaction
function handlePointer(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
  const x = (e.clientX - rect.left) * scaleX - cx;
  const y = (e.clientY - rect.top) * scaleY - cy;
  const dist = Math.sqrt(x * x + y * y);
  if (dist > r + 10) return;

  let angle = Math.atan2(y, x) * 180 / Math.PI + 90;
  if (angle < 0) angle += 360;
  hue = Math.round(angle) % 360;
  sat = Math.round(Math.min(dist / r, 1) * 100);
  updateDisplay();
}

let dragging = false;
canvas.addEventListener('mousedown', e => { dragging = true; handlePointer(e); });
canvas.addEventListener('mousemove', e => { if (dragging) handlePointer(e); });
document.addEventListener('mouseup', () => { if (dragging) { dragging = false; addToHistory(); } });
canvas.addEventListener('touchstart', e => { e.preventDefault(); dragging = true; handlePointer(e.touches[0]); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (dragging) handlePointer(e.touches[0]); }, { passive: false });
document.addEventListener('touchend', () => { if (dragging) { dragging = false; addToHistory(); } });

$('hueSlider').addEventListener('change', addToHistory);
$('satSlider').addEventListener('change', addToHistory);
$('litSlider').addEventListener('change', addToHistory);

function copyVal(id) {
  navigator.clipboard.writeText($(id).textContent).then(() => {
    const t = $('toast');
    t.textContent = '✓ Copied!';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  });
}

// Init
drawWheel();
updateDisplay();
</script>
</body>
</html>
