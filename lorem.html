<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator - Free Online Placeholder Text Tool</title>
<meta name="description" content="Free lorem ipsum generator. Generate placeholder text by paragraphs, sentences, or words. Copy with one click. No data sent to any server.">
<meta name="keywords" content="lorem ipsum generator, placeholder text, dummy text, filler text, lipsum, free text generator">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/lorem.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:900px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.row{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
label{font-size:.85rem;color:var(--muted)}
select,input[type="number"]{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.9rem;font-family:var(--font);width:auto}
select:focus,input:focus{outline:none;border-color:var(--accent)}
input[type="number"]{width:80px}
.type-tabs{display:flex;gap:.5rem}
.type-tab{padding:.5rem 1rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:.9rem;font-weight:600;transition:all .15s}
.type-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.type-tab:hover:not(.active){border-color:var(--muted);color:var(--text)}
.toggle-row{display:flex;gap:1.5rem;align-items:center}
.toggle{display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.9rem;color:var(--muted)}
.toggle input{accent-color:var(--accent);width:16px;height:16px}
.output{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;font-size:.95rem;line-height:1.8;min-height:150px;max-height:500px;overflow-y:auto;white-space:pre-wrap}
.output p{margin-bottom:1rem}
.output p:last-child{margin-bottom:0}
.stats{font-size:.85rem;color:var(--muted);margin-top:.75rem}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Lorem Ipsum Generator</h1>
<p class="subtitle">Generate placeholder text for your designs and mockups</p>

<div class="card">
<h2>⚙️ Options</h2>
<div class="row">
<label>Generate:</label>
<input type="number" id="count" min="1" max="100" value="5">
<div class="type-tabs">
<button class="type-tab active" data-unit="paragraphs" onclick="setUnit('paragraphs')">Paragraphs</button>
<button class="type-tab" data-unit="sentences" onclick="setUnit('sentences')">Sentences</button>
<button class="type-tab" data-unit="words" onclick="setUnit('words')">Words</button>
</div>
</div>
<div class="toggle-row">
<label class="toggle"><input type="checkbox" id="startClassic" checked onchange="generate()"><span>Start with "Lorem ipsum…"</span></label>
<label class="toggle"><input type="checkbox" id="htmlWrap" onchange="generate()"><span>Wrap in &lt;p&gt; tags</span></label>
</div>
<div class="btn-row">
<button class="btn-primary" onclick="generate()">Generate</button>
<button class="btn-secondary" onclick="copyText()">📋 Copy</button>
<button class="btn-secondary" onclick="copyHTML()">📋 Copy as HTML</button>
</div>
</div>

<div class="card">
<h2>📄 Output</h2>
<div class="output" id="output"></div>
<div class="stats" id="stats"></div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const WORDS='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum suspendisse potenti praesent commodo cursus magna vel scelerisque nisl consectetur pretium nec ullamcorper mauris nunc congue sem faucibus augue interdum posuere cubilia curae donec velit neque auctor tempus quam pellentesque nec nam sem tortor consequat vivamus at augue eget arcu dictum varius duis at lacinia bibendum integer feugiat vitae sapien turpis gravida felis vulputate eu massa porta ante blandit lectus egestas fringilla phasellus erat imperdiet proin fermentum leo vel orci sagittis tincidunt lobortis elementum nibh tellus molestie malesuada fames ac'.split(' ');

const CLASSIC='Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.';

let unit='paragraphs';
const $=id=>document.getElementById(id);

function setUnit(u){
  unit=u;
  document.querySelectorAll('.type-tab').forEach(el=>el.classList.toggle('active',el.dataset.unit===u));
  generate();
}

function rw(){return WORDS[Math.floor(Math.random()*WORDS.length)];}

function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function genSentence(minW,maxW){
  const n=minW+Math.floor(Math.random()*(maxW-minW+1));
  const words=[];
  for(let i=0;i<n;i++) words.push(rw());
  words[0]=capitalize(words[0]);
  // add a comma sometimes
  if(n>6&&Math.random()>.5){
    const ci=2+Math.floor(Math.random()*(n-4));
    words[ci]+=',';
  }
  return words.join(' ')+'.';
}

function genParagraph(minS,maxS){
  const n=minS+Math.floor(Math.random()*(maxS-minS+1));
  const sents=[];
  for(let i=0;i<n;i++) sents.push(genSentence(6,16));
  return sents.join(' ');
}

function generate(){
  const count=Math.max(1,Math.min(100,+$('count').value||5));
  const startClassic=$('startClassic').checked;
  const htmlWrap=$('htmlWrap').checked;
  let result=[];

  if(unit==='paragraphs'){
    for(let i=0;i<count;i++) result.push(genParagraph(3,7));
  } else if(unit==='sentences'){
    for(let i=0;i<count;i++) result.push(genSentence(6,16));
  } else {
    const words=[];
    for(let i=0;i<count;i++) words.push(rw());
    words[0]=capitalize(words[0]);
    result=[words.join(' ')+'.'];
  }

  if(startClassic&&result.length>0){
    if(unit==='paragraphs'){
      result[0]=CLASSIC+' '+result[0].split('. ').slice(1).join('. ');
    } else if(unit==='sentences'){
      result[0]=CLASSIC;
    } else {
      const words=result[0].split(' ');
      const classicWords=CLASSIC.replace('.','').split(' ');
      for(let i=0;i<Math.min(words.length,classicWords.length);i++) words[i]=classicWords[i];
      result=[words.join(' ')];
      if(!result[0].endsWith('.')) result[0]+='.';
    }
  }

  const outEl=$('output');
  if(unit==='paragraphs'){
    if(htmlWrap){
      outEl.innerHTML=result.map(p=>`<p>&lt;p&gt;${esc(p)}&lt;/p&gt;</p>`).join('');
    } else {
      outEl.innerHTML=result.map(p=>`<p>${esc(p)}</p>`).join('');
    }
  } else {
    const text=result.join(' ');
    outEl.innerHTML=htmlWrap?`<p>&lt;p&gt;${esc(text)}&lt;/p&gt;</p>`:`<p>${esc(text)}</p>`;
  }

  const allText=result.join(' ');
  const wc=allText.split(/\s+/).filter(Boolean).length;
  const cc=allText.length;
  $('stats').textContent=`${wc} words · ${cc} characters`;
}

function getPlainText(){
  const el=$('output');
  if($('htmlWrap').checked){
    return el.textContent;
  }
  return Array.from(el.querySelectorAll('p')).map(p=>p.textContent).join('\n\n');
}

function copyText(){
  navigator.clipboard.writeText(getPlainText()).then(toast);
}

function copyHTML(){
  const ps=Array.from($('output').querySelectorAll('p')).map(p=>p.textContent);
  let html;
  if($('htmlWrap').checked){
    html=ps.join('\n');
  } else {
    html=ps.map(p=>`<p>${p}</p>`).join('\n');
  }
  navigator.clipboard.writeText(html).then(toast);
}

function toast(){
  const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

generate();
</script>
</body>
</html>
