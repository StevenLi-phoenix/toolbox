<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Builder & Encoder - Free Online Tool</title>
<meta name="description" content="Free online JWT builder. Create and sign JSON Web Tokens with custom headers and payloads. Supports HMAC-SHA256, SHA384, SHA512. No data leaves your browser.">
<meta name="keywords" content="jwt builder, jwt encoder, jwt creator, json web token, jwt generator, jwt sign, hmac jwt">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/jwtbuilder.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .jwt-parts { display: grid; gap: 12px; }
  .jwt-part { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .jwt-part-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: .82rem; font-weight: 600; }
  .jwt-part-header.header-color { background: #fef3c7; color: #92400e; }
  .jwt-part-header.payload-color { background: #dbeafe; color: #1e40af; }
  .jwt-part-header.signature-color { background: #d1fae5; color: #065f46; }
  .jwt-part textarea { width: 100%; border: none; padding: 10px 12px; font-family: var(--mono); font-size: .85rem; background: var(--bg); color: var(--text); resize: vertical; box-sizing: border-box; }
  .secret-row { display: flex; gap: 8px; align-items: center; margin: 12px 0; }
  .secret-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); font-size: .85rem; background: var(--bg); color: var(--text); }
  .secret-row select { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: .85rem; background: var(--bg); color: var(--text); }
  .jwt-output { font-family: var(--mono); font-size: .82rem; word-break: break-all; padding: 12px; background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); min-height: 60px; line-height: 1.5; }
  .jwt-output .h { color: #d97706; }
  .jwt-output .p { color: #2563eb; }
  .jwt-output .s { color: #059669; }
  .claim-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .claim-presets button { padding: 4px 10px; font-size: .75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--muted); cursor: pointer; }
  .claim-presets button:hover { background: var(--surface2); color: var(--text); }
  .exp-row { display: flex; gap: 8px; align-items: center; margin: 8px 0; font-size: .82rem; }
  .exp-row input { width: 80px; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); font-size: .85rem; background: var(--bg); color: var(--text); }
  .exp-row select { padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: .85rem; background: var(--bg); color: var(--text); }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>JWT Builder & Encoder</h1>
<p class="subtitle">Create and sign JSON Web Tokens with custom headers and payloads</p>

<div class="card">
<h2>🔧 Configure</h2>
<div class="secret-row">
  <select id="alg" onchange="updateAlg()">
    <option value="HS256">HS256</option>
    <option value="HS384">HS384</option>
    <option value="HS512">HS512</option>
    <option value="none">none (unsigned)</option>
  </select>
  <input type="text" id="secret" value="your-secret-key" placeholder="Enter secret key..." oninput="sign()" spellcheck="false">
</div>
<div class="exp-row">
  <label>Expires in:</label>
  <input type="number" id="expNum" value="1" min="1">
  <select id="expUnit">
    <option value="3600">hours</option>
    <option value="86400" selected>days</option>
    <option value="604800">weeks</option>
    <option value="2592000">months (30d)</option>
  </select>
  <button class="btn-secondary" onclick="setExp()">Set exp</button>
</div>
</div>

<div class="card">
<h2>📝 Token Parts</h2>
<div class="jwt-parts">
  <div class="jwt-part">
    <div class="jwt-part-header header-color">Header</div>
    <textarea id="headerInput" rows="3" oninput="sign()" spellcheck="false">{
  "alg": "HS256",
  "typ": "JWT"
}</textarea>
  </div>
  <div class="jwt-part">
    <div class="jwt-part-header payload-color">
      Payload
    </div>
    <div class="claim-presets" style="padding:6px 12px 0">
      <button onclick="addClaim('iss','your-app')">+ iss</button>
      <button onclick="addClaim('sub','user-123')">+ sub</button>
      <button onclick="addClaim('aud','api')">+ aud</button>
      <button onclick="addClaim('iat',Math.floor(Date.now()/1000))">+ iat</button>
      <button onclick="addClaim('jti',crypto.randomUUID())">+ jti</button>
    </div>
    <textarea id="payloadInput" rows="8" oninput="sign()" spellcheck="false">{
  "sub": "1234567890",
  "name": "John Doe",
  "iat": 1516239022
}</textarea>
  </div>
</div>
</div>

<div class="card">
<h2>🎫 Encoded Token</h2>
<div class="jwt-output" id="jwtOutput"></div>
<div id="tokenError" style="display:none;color:var(--error);font-size:.82rem;margin-top:8px"></div>
<div class="btn-row" style="margin-top:12px">
  <button class="btn-primary" onclick="copyToken()">📋 Copy Token</button>
  <button class="btn-secondary" onclick="decodeCurrent()">🔍 Decode in JWT Decoder</button>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let currentToken='';

function base64url(buf){
  const bytes=buf instanceof ArrayBuffer?new Uint8Array(buf):buf;
  let str='';
  if(typeof bytes==='string') str=bytes;
  else bytes.forEach(b=>str+=String.fromCharCode(b));
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function base64urlEncode(str){
  return base64url(new TextEncoder().encode(str));
}

function updateAlg(){
  const alg=$('alg').value;
  $('secret').disabled=alg==='none';
  try{
    const header=JSON.parse($('headerInput').value);
    header.alg=alg;
    $('headerInput').value=JSON.stringify(header,null,2);
  }catch(e){}
  sign();
}

function setExp(){
  const num=parseInt($('expNum').value)||1;
  const unit=parseInt($('expUnit').value);
  const exp=Math.floor(Date.now()/1000)+num*unit;
  try{
    const payload=JSON.parse($('payloadInput').value);
    payload.exp=exp;
    $('payloadInput').value=JSON.stringify(payload,null,2);
    sign();
  }catch(e){}
}

function addClaim(key,val){
  try{
    const payload=JSON.parse($('payloadInput').value);
    payload[key]=val;
    $('payloadInput').value=JSON.stringify(payload,null,2);
    sign();
  }catch(e){}
}

async function sign(){
  const errEl=$('tokenError');
  errEl.style.display='none';
  try{
    const headerStr=$('headerInput').value.trim();
    const payloadStr=$('payloadInput').value.trim();
    // validate JSON
    JSON.parse(headerStr);
    JSON.parse(payloadStr);

    const headerB64=base64urlEncode(headerStr);
    const payloadB64=base64urlEncode(payloadStr);
    const unsigned=headerB64+'.'+payloadB64;

    const alg=$('alg').value;
    let sig='';
    if(alg==='none'){
      sig='';
    } else {
      const secret=$('secret').value;
      const algMap={'HS256':'SHA-256','HS384':'SHA-384','HS512':'SHA-512'};
      const key=await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(secret),
        {name:'HMAC',hash:algMap[alg]},
        false,
        ['sign']
      );
      const signature=await crypto.subtle.sign('HMAC',key,new TextEncoder().encode(unsigned));
      sig=base64url(signature);
    }

    currentToken=unsigned+'.'+sig;
    const out=$('jwtOutput');
    out.innerHTML=`<span class="h">${headerB64}</span>.<span class="p">${payloadB64}</span>.<span class="s">${sig||'(unsigned)'}</span>`;
  }catch(e){
    errEl.textContent='Invalid JSON: '+e.message;
    errEl.style.display='block';
    $('jwtOutput').textContent='';
    currentToken='';
  }
}

function copyToken(){
  if(!currentToken)return;
  navigator.clipboard.writeText(currentToken).then(()=>{
    const el=$('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500);
  });
}

function decodeCurrent(){
  if(currentToken) window.open('jwt.html?token='+encodeURIComponent(currentToken),'_blank');
}

sign();
</script>
</body>
</html>
