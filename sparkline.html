<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Sparkline Generator — Free Online Tool</title>
<meta name="description" content="Generate inline SVG sparklines from numeric data. Line, area, and bar variants with customizable color, stroke, fill, and dimensions.">
<meta name="keywords" content="sparkline, SVG sparkline, inline chart, mini chart, data visualization, micro chart">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/sparkline.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 16px; }
  textarea { width: 100%; min-height: 160px; padding: 12px; font-family: var(--mono); font-size: .85rem; border: 1px solid var(--border); border-radius: var(--radius); resize: vertical; background: var(--bg); color: var(--text); }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .field label { font-size: .8rem; color: var(--muted); }
  .field input, .field select { padding: 7px 10px; font-size: .85rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--sans); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .preview-box { border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; background: var(--surface2); display: flex; align-items: center; justify-content: center; min-height: 140px; }
  .preview-box svg { max-width: 100%; }
  .stats { display: flex; gap: 14px; flex-wrap: wrap; font-size: .8rem; color: var(--muted); margin-top: 10px; padding: 10px 14px; background: var(--surface2); border-radius: var(--radius); }
  .stats strong { color: var(--text); font-family: var(--mono); }
  .out-section { margin-top: 16px; }
  .out-section h3 { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .out-section pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-family: var(--mono); font-size: .8rem; overflow-x: auto; max-height: 180px; }
  .copy-btn { font-size: .75rem; padding: 3px 10px; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-family: var(--sans); }
  .copy-btn:hover { background: var(--surface2); }
  .examples { margin-top: 14px; }
  .examples h3 { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .ex-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .ex-btn { font-size: .75rem; padding: 4px 10px; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--sans); }
  .ex-btn:hover { background: var(--surface2); }
  @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } .field-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>📈 SVG Sparkline Generator</h1>
<p class="subtitle">Generate inline SVG sparklines from a list of numbers. Line, area, or bar variants with full styling control.</p>

<div class="layout">
  <div>
    <div class="field">
      <label>Data (comma, space, or newline separated)</label>
      <textarea id="data">5, 12, 8, 15, 22, 18, 25, 19, 28, 32, 27, 35, 30, 40, 38, 45</textarea>
    </div>

    <div class="field">
      <label>Type</label>
      <select id="type">
        <option value="line">Line</option>
        <option value="area">Area</option>
        <option value="bar">Bar</option>
      </select>
    </div>

    <div class="field-row">
      <div class="field"><label>Width (px)</label><input type="number" id="width" value="200" min="20"></div>
      <div class="field"><label>Height (px)</label><input type="number" id="height" value="50" min="10"></div>
    </div>

    <div class="field-row">
      <div class="field"><label>Stroke color</label><input type="color" id="stroke" value="#111111"></div>
      <div class="field"><label>Fill color</label><input type="color" id="fill" value="#cccccc"></div>
    </div>

    <div class="field-row">
      <div class="field"><label>Stroke width</label><input type="number" id="strokeW" value="2" min="0" step="0.5"></div>
      <div class="field"><label>Padding (px)</label><input type="number" id="pad" value="2" min="0"></div>
    </div>

    <div class="field-row">
      <div class="field"><label><input type="checkbox" id="showDots"> Show endpoint dots</label></div>
      <div class="field"><label><input type="checkbox" id="showMinMax"> Highlight min/max</label></div>
    </div>

    <div class="examples">
      <h3>Examples</h3>
      <div class="ex-row">
        <button class="ex-btn" data-ex="random">Random walk</button>
        <button class="ex-btn" data-ex="sine">Sine wave</button>
        <button class="ex-btn" data-ex="growth">Growth</button>
        <button class="ex-btn" data-ex="volatile">Volatile</button>
        <button class="ex-btn" data-ex="flat">Flat with spike</button>
      </div>
    </div>
  </div>

  <div>
    <div class="preview-box" id="preview"></div>
    <div class="stats" id="stats"></div>
    <div class="out-section">
      <h3>SVG Markup <button class="copy-btn" onclick="copy('svg-out')">Copy</button></h3>
      <pre id="svg-out"></pre>
    </div>
    <div class="out-section">
      <h3>Data URL <button class="copy-btn" onclick="copy('url-out')">Copy</button></h3>
      <pre id="url-out"></pre>
    </div>
  </div>
</div>
</div>

<footer>
  Built with ☕ by Steven Li · No data leaves your browser
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
function parseData(text) {
  return text.split(/[\s,;]+/).map(Number).filter(n => !isNaN(n));
}

function buildSVG(opts) {
  const { data, type, width, height, stroke, fill, strokeW, pad, showDots, showMinMax } = opts;
  if (data.length < 2) return { svg: '', stats: null };
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const w = width - pad * 2;
  const h = height - pad * 2;
  const xstep = data.length > 1 ? w / (data.length - 1) : 0;
  const yval = v => pad + h - ((v - min) / range) * h;
  const xval = i => pad + i * xstep;

  let body = '';
  if (type === 'bar') {
    const bw = w / data.length * 0.8;
    const gap = w / data.length * 0.2;
    body = data.map((v, i) => {
      const x = pad + i * (bw + gap) + gap / 2;
      const y = yval(v);
      const bh = h - (y - pad);
      let color = fill;
      if (showMinMax && v === max) color = '#1a8c3f';
      else if (showMinMax && v === min) color = '#c41e1e';
      return `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${bw.toFixed(2)}" height="${bh.toFixed(2)}" fill="${color}"/>`;
    }).join('');
  } else {
    const points = data.map((v, i) => `${xval(i).toFixed(2)},${yval(v).toFixed(2)}`).join(' ');
    if (type === 'area') {
      const areaPts = `${pad.toFixed(2)},${(pad+h).toFixed(2)} ${points} ${(pad+w).toFixed(2)},${(pad+h).toFixed(2)}`;
      body += `<polygon points="${areaPts}" fill="${fill}" opacity="0.4"/>`;
    }
    body += `<polyline points="${points}" fill="none" stroke="${stroke}" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round"/>`;
    if (showDots) {
      body += `<circle cx="${xval(0).toFixed(2)}" cy="${yval(data[0]).toFixed(2)}" r="${(strokeW+1)}" fill="${stroke}"/>`;
      body += `<circle cx="${xval(data.length-1).toFixed(2)}" cy="${yval(data[data.length-1]).toFixed(2)}" r="${(strokeW+1)}" fill="${stroke}"/>`;
    }
    if (showMinMax) {
      const maxIdx = data.indexOf(max);
      const minIdx = data.indexOf(min);
      body += `<circle cx="${xval(maxIdx).toFixed(2)}" cy="${yval(max).toFixed(2)}" r="${(strokeW+1.5)}" fill="#1a8c3f"/>`;
      body += `<circle cx="${xval(minIdx).toFixed(2)}" cy="${yval(min).toFixed(2)}" r="${(strokeW+1.5)}" fill="#c41e1e"/>`;
    }
  }

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">${body}</svg>`;
  const sum = data.reduce((a,b) => a+b, 0);
  return {
    svg,
    stats: { count: data.length, min, max, mean: sum/data.length, sum, last: data[data.length-1], first: data[0] }
  };
}

function render() {
  const data = parseData(document.getElementById('data').value);
  const opts = {
    data,
    type: document.getElementById('type').value,
    width: +document.getElementById('width').value,
    height: +document.getElementById('height').value,
    stroke: document.getElementById('stroke').value,
    fill: document.getElementById('fill').value,
    strokeW: +document.getElementById('strokeW').value,
    pad: +document.getElementById('pad').value,
    showDots: document.getElementById('showDots').checked,
    showMinMax: document.getElementById('showMinMax').checked,
  };
  const { svg, stats } = buildSVG(opts);
  document.getElementById('preview').innerHTML = svg || '<div style="color:var(--muted);font-size:.85rem">Need at least 2 data points</div>';
  document.getElementById('svg-out').textContent = svg;
  document.getElementById('url-out').textContent = svg ? 'data:image/svg+xml;utf8,' + encodeURIComponent(svg) : '';
  if (stats) {
    document.getElementById('stats').innerHTML = `
      <span>Count: <strong>${stats.count}</strong></span>
      <span>Min: <strong>${fmt(stats.min)}</strong></span>
      <span>Max: <strong>${fmt(stats.max)}</strong></span>
      <span>Mean: <strong>${fmt(stats.mean)}</strong></span>
      <span>Sum: <strong>${fmt(stats.sum)}</strong></span>
      <span>First → Last: <strong>${fmt(stats.first)} → ${fmt(stats.last)}</strong></span>`;
  } else {
    document.getElementById('stats').innerHTML = '';
  }
}

function fmt(n) {
  if (Number.isInteger(n)) return n.toLocaleString();
  return Number(n.toFixed(3)).toLocaleString();
}

function copy(id) {
  const t = document.getElementById(id).textContent;
  if (!t) return;
  navigator.clipboard.writeText(t);
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

const examples = {
  random: () => Array.from({length: 30}, (_,i) => 50 + Math.round(Math.sin(i/3)*15 + (Math.random()-0.5)*10)),
  sine: () => Array.from({length: 40}, (_,i) => Math.round(50 + Math.sin(i/3)*25)),
  growth: () => Array.from({length: 24}, (_,i) => Math.round(10 + i*1.5 + Math.sin(i)*3)),
  volatile: () => Array.from({length: 30}, () => Math.round(20 + Math.random()*60)),
  flat: () => { const a = new Array(20).fill(50); a[10] = 95; a[15] = 5; return a; },
};

document.querySelectorAll('input, select, textarea').forEach(el => {
  el.addEventListener('input', render);
  el.addEventListener('change', render);
});
document.querySelectorAll('.ex-btn').forEach(b => {
  b.onclick = () => {
    document.getElementById('data').value = examples[b.dataset.ex]().join(', ');
    render();
  };
});

render();
</script>
</body>
</html>
