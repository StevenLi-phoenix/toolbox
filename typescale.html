<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Type Scale Generator - Free Online Typography Tool</title>
<meta name="description" content="Generate harmonious typography scales for web design. Choose from classic ratios like golden ratio, perfect fourth, and more. Export CSS custom properties. 100% client-side — your data never leaves your browser.">
<meta name="keywords" content="type scale, typography, modular scale, font size, golden ratio, perfect fourth, css variables, web design, responsive typography">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/typescale.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .controls { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
  .controls label { font-size: .85rem; color: var(--muted); display: flex; flex-direction: column; gap: .35rem; }
  .controls select, .controls input {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font: inherit; font-size: .85rem;
  }
  .scale-list { list-style: none; padding: 0; margin: 0; }
  .scale-item {
    display: flex; align-items: baseline; gap: 1rem;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .scale-item:last-child { border-bottom: none; }
  .scale-item:hover { background: var(--bg2); margin: 0 -14px; padding: 14px; border-radius: var(--radius); }
  .scale-meta {
    flex-shrink: 0; width: 140px; text-align: right;
    font-family: var(--mono); font-size: .8rem; color: var(--muted);
    line-height: 1.5;
  }
  .scale-label { font-weight: 600; color: var(--text); display: block; font-size: .85rem; }
  .scale-preview { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scale-preview span { transition: font-size .2s; }
  .ratio-info { font-size: .82rem; color: var(--muted); margin-bottom: .5rem; }
  .output-area {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; font-family: var(--mono); font-size: .82rem;
    white-space: pre-wrap; word-break: break-all; color: var(--text);
    max-height: 400px; overflow-y: auto;
  }
  .export-tabs { display: flex; gap: .5rem; margin-bottom: .75rem; flex-wrap: wrap; }
  .preview-text {
    padding: 14px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg2); line-height: 1.4;
  }
  .font-select { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .font-select label { font-size: .85rem; color: var(--muted); }
  .font-select select {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font: inherit; font-size: .85rem;
  }
  @media (max-width: 768px) {
    .scale-meta { width: 100px; font-size: .75rem; }
    .controls { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>Type Scale Generator</h1>
<p class="subtitle">Generate harmonious modular type scales for web typography</p>

<div class="card">
<h2>⚙️ Settings</h2>
<div class="controls">
  <label>Base Size (px)
    <input type="number" id="baseSize" value="16" min="8" max="48" step="1" oninput="update()">
  </label>
  <label>Scale Ratio
    <select id="ratio" onchange="update()">
      <option value="1.067">Minor Second (1.067)</option>
      <option value="1.125">Major Second (1.125)</option>
      <option value="1.2">Minor Third (1.2)</option>
      <option value="1.25" selected>Major Third (1.25)</option>
      <option value="1.333">Perfect Fourth (1.333)</option>
      <option value="1.414">Augmented Fourth (1.414)</option>
      <option value="1.5">Perfect Fifth (1.5)</option>
      <option value="1.618">Golden Ratio (1.618)</option>
      <option value="custom">Custom…</option>
    </select>
  </label>
  <label>Custom Ratio
    <input type="number" id="customRatio" value="1.25" min="1.01" max="3" step="0.001" oninput="update()" disabled>
  </label>
  <label>Steps Above Base
    <input type="number" id="stepsUp" value="6" min="1" max="12" oninput="update()">
  </label>
  <label>Steps Below Base
    <input type="number" id="stepsDown" value="2" min="0" max="6" oninput="update()">
  </label>
  <label>Unit
    <select id="unit" onchange="update()">
      <option value="rem" selected>rem</option>
      <option value="px">px</option>
      <option value="em">em</option>
    </select>
  </label>
</div>
</div>

<div class="card">
<h2>📐 Scale</h2>
<div class="font-select">
  <label>Preview Font:
    <select id="previewFont" onchange="update()">
      <option value="system-ui, -apple-system, sans-serif">System UI</option>
      <option value="Georgia, 'Times New Roman', serif">Georgia (Serif)</option>
      <option value="'Courier New', monospace">Courier New (Mono)</option>
      <option value="'Segoe UI', Tahoma, sans-serif">Segoe UI</option>
      <option value="Verdana, Geneva, sans-serif">Verdana</option>
    </select>
  </label>
</div>
<div class="ratio-info" id="ratioInfo"></div>
<ul class="scale-list" id="scaleList"></ul>
</div>

<div class="card">
<h2>📋 Export</h2>
<div class="export-tabs">
  <button class="btn btn-secondary" onclick="setExport('css')" id="tabCss">CSS Variables</button>
  <button class="btn btn-secondary" onclick="setExport('tailwind')" id="tabTailwind">Tailwind Config</button>
  <button class="btn btn-secondary" onclick="setExport('scss')" id="tabScss">SCSS Variables</button>
  <button class="btn btn-secondary" onclick="setExport('table')" id="tabTable">Table</button>
</div>
<div class="output-area" id="exportOutput"></div>
<button class="btn" style="margin-top:.75rem" onclick="copyExport()">Copy to Clipboard</button>
</div>

<div class="card">
<h2>👁️ Preview</h2>
<div class="preview-text" id="previewArea"></div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let currentExport = 'css';
let scaleData = [];

const STEP_NAMES = [
  { step: -3, name: 'xs',  heading: '' },
  { step: -2, name: 'sm',  heading: '' },
  { step: -1, name: 'xs',  heading: '' },
  { step: 0,  name: 'base', heading: 'body' },
  { step: 1,  name: 'lg',  heading: 'h6' },
  { step: 2,  name: 'xl',  heading: 'h5' },
  { step: 3,  name: '2xl', heading: 'h4' },
  { step: 4,  name: '3xl', heading: 'h3' },
  { step: 5,  name: '4xl', heading: 'h2' },
  { step: 6,  name: '5xl', heading: 'h1' },
  { step: 7,  name: '6xl', heading: '' },
  { step: 8,  name: '7xl', heading: '' },
  { step: 9,  name: '8xl', heading: '' },
  { step: 10, name: '9xl', heading: '' },
  { step: 11, name: '10xl', heading: '' },
  { step: 12, name: '11xl', heading: '' },
];

function getStepLabel(step) {
  const entry = STEP_NAMES.find(s => s.step === step);
  return entry ? entry.name : (step > 0 ? `+${step}` : `${step}`);
}

function getHeadingLabel(step) {
  const entry = STEP_NAMES.find(s => s.step === step);
  return entry ? entry.heading : '';
}

$('ratio').addEventListener('change', () => {
  $('customRatio').disabled = $('ratio').value !== 'custom';
});

function getRatio() {
  if ($('ratio').value === 'custom') return parseFloat($('customRatio').value) || 1.25;
  return parseFloat($('ratio').value);
}

function round(n, d) { const f = Math.pow(10, d); return Math.round(n * f) / f; }

function update() {
  const base = parseInt($('baseSize').value) || 16;
  const ratio = getRatio();
  const up = parseInt($('stepsUp').value) || 6;
  const down = parseInt($('stepsDown').value) || 2;
  const unit = $('unit').value;
  const font = $('previewFont').value;

  scaleData = [];
  for (let i = -down; i <= up; i++) {
    const sizePx = base * Math.pow(ratio, i);
    const sizeRem = sizePx / 16;
    let value;
    if (unit === 'px') value = round(sizePx, 1);
    else if (unit === 'rem') value = round(sizeRem, 4);
    else value = round(Math.pow(ratio, i), 4);

    scaleData.push({
      step: i,
      label: getStepLabel(i),
      heading: getHeadingLabel(i),
      sizePx: round(sizePx, 1),
      value: value,
      unit: unit,
      ratio: round(Math.pow(ratio, i), 4),
    });
  }

  const ratioLabel = $('ratio').value === 'custom' ? 'Custom' : $('ratio').options[$('ratio').selectedIndex].text;
  $('ratioInfo').textContent = `${ratioLabel} · Base ${base}px · ${scaleData.length} steps`;

  renderScale(font);
  renderExport();
  renderPreview(font);
}

function renderScale(font) {
  const list = $('scaleList');
  list.innerHTML = scaleData.slice().reverse().map(s => {
    const headingTag = s.heading ? ` <span style="color:var(--muted);font-weight:400">(${s.heading})</span>` : '';
    return `<li class="scale-item">
      <div class="scale-meta">
        <span class="scale-label">${s.label}${headingTag}</span>
        ${s.value}${s.unit} · ${s.sizePx}px
      </div>
      <div class="scale-preview">
        <span style="font-size:${s.sizePx}px;font-family:${font}">The quick brown fox</span>
      </div>
    </li>`;
  }).join('');
}

function setExport(mode) {
  currentExport = mode;
  document.querySelectorAll('.export-tabs .btn').forEach(b => b.classList.remove('active'));
  const tabId = 'tab' + mode.charAt(0).toUpperCase() + mode.slice(1);
  const tab = $(tabId);
  if (tab) tab.classList.add('active');
  renderExport();
}

function renderExport() {
  const unit = $('unit').value;
  let output = '';

  if (currentExport === 'css') {
    output = ':root {\n';
    scaleData.forEach(s => {
      const comment = s.heading ? ` /* ${s.heading} — ${s.sizePx}px */` : ` /* ${s.sizePx}px */`;
      output += `  --font-${s.label}: ${s.value}${s.unit};${comment}\n`;
    });
    output += '}';
  } else if (currentExport === 'scss') {
    scaleData.forEach(s => {
      const comment = s.heading ? ` // ${s.heading} — ${s.sizePx}px` : ` // ${s.sizePx}px`;
      output += `$font-${s.label}: ${s.value}${s.unit};${comment}\n`;
    });
  } else if (currentExport === 'tailwind') {
    output = 'fontSize: {\n';
    scaleData.forEach(s => {
      output += `  '${s.label}': '${s.value}${s.unit}', // ${s.sizePx}px\n`;
    });
    output += '}';
  } else if (currentExport === 'table') {
    output = 'Step\tName\tSize\tPixels\tRatio\tHeading\n';
    output += '─'.repeat(60) + '\n';
    scaleData.forEach(s => {
      output += `${s.step}\t${s.label}\t${s.value}${s.unit}\t${s.sizePx}px\t×${s.ratio}\t${s.heading || '—'}\n`;
    });
  }

  $('exportOutput').textContent = output;
}

function renderPreview(font) {
  const area = $('previewArea');
  const headings = scaleData.filter(s => s.heading).reverse();
  const basePx = scaleData.find(s => s.step === 0)?.sizePx || 16;

  let html = '';
  headings.forEach(s => {
    if (s.heading === 'body') {
      html += `<p style="font-size:${s.sizePx}px;font-family:${font};margin:.75rem 0;line-height:1.5">
        Body text at ${s.sizePx}px. The quick brown fox jumps over the lazy dog. This is how your paragraph text will look at the base size of your type scale.
      </p>`;
    } else {
      html += `<div style="font-size:${s.sizePx}px;font-family:${font};font-weight:700;margin:.75rem 0;line-height:1.2">
        ${s.heading.toUpperCase()} — Heading at ${s.sizePx}px
      </div>`;
    }
  });

  area.innerHTML = html;
}

function copyExport() {
  navigator.clipboard.writeText($('exportOutput').textContent).then(() => {
    const t = $('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

setExport('css');
update();
</script>
</body>
</html>
