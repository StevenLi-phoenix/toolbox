<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>robots.txt Generator - Free Online Tool | DevToolbox</title>
<meta name="description" content="Generate robots.txt files for your website instantly. Add user-agent rules, allow/disallow paths, sitemaps, and crawl delays with a visual builder.">
<meta name="keywords" content="robots.txt generator, robots.txt builder, SEO tool, crawler rules, web crawlers, search engine optimization">
<meta name="author" content="Steven Li">
<meta property="og:title" content="robots.txt Generator - Free Online Tool">
<meta property="og:description" content="Generate robots.txt files for your website instantly. Visual builder for crawler rules, sitemaps, and crawl delays.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/robots.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="robots.txt Generator - Free Online Tool">
<meta name="twitter:description" content="Generate robots.txt files for your website. Visual builder for user-agent rules, paths, sitemaps, and crawl delays.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/robots.html">
<link rel="stylesheet" href="toolbox.css">
</head>
<body>
<div class="container">
  <h1>🤖 robots.txt Generator</h1>
  <p class="subtitle">Build crawler rules for your website visually</p>

  <div class="panel">
    <h2>Presets</h2>
    <div class="presets">
      <button class="btn btn-secondary" onclick="applyPreset('allow-all')">Allow All</button>
      <button class="btn btn-secondary" onclick="applyPreset('block-all')">Block All</button>
      <button class="btn btn-secondary" onclick="applyPreset('block-ai')">Block AI Crawlers</button>
      <button class="btn btn-secondary" onclick="applyPreset('standard')">Standard Blog</button>
      <button class="btn btn-secondary" onclick="applyPreset('ecommerce')">E-Commerce</button>
    </div>
  </div>

  <div class="panel">
    <h2>User-Agent Rules</h2>
    <div id="rules"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addRule()">+ Add Rule</button>
    </div>
  </div>

  <div class="panel">
    <h2>Sitemaps</h2>
    <div id="sitemaps"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addSitemap()">+ Add Sitemap</button>
    </div>
  </div>

  <div class="panel">
    <h2>Generated robots.txt</h2>
    <div class="output-area" id="output"></div>
    <div class="output-actions">
      <button class="btn btn-primary" onclick="copyOutput()">📋 Copy</button>
      <button class="btn btn-secondary" onclick="downloadOutput()">⬇ Download</button>
    </div>
  </div>

  <div class="coffee">
    <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee — Support Free Tools</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const commonBots = ['Googlebot','Bingbot','GPTBot','ChatGPT-User','Google-Extended','CCBot','Applebot','Slurp','DuckDuckBot','Baiduspider','anthropic-ai','Claude-Web','Bytespider','FacebookExternalHit'];

let rules = [];
let sitemaps = [];

function uid(){return '_'+Math.random().toString(36).slice(2,9)}

function addRule(ua='*', paths=[], crawlDelay=''){
  const id=uid();
  if(!paths.length) paths=[{type:'Disallow',path:''}];
  rules.push({id,ua,paths,crawlDelay});
  render();
}

function removeRule(id){
  rules=rules.filter(r=>r.id!==id);
  render();
}

function addPathToRule(ruleId){
  const r=rules.find(r=>r.id===ruleId);
  if(r){r.paths.push({type:'Disallow',path:''});render();}
}

function removePathFromRule(ruleId,idx){
  const r=rules.find(r=>r.id===ruleId);
  if(r&&r.paths.length>1){r.paths.splice(idx,1);render();}
}

function addSitemap(url=''){
  sitemaps.push({id:uid(),url});
  render();
}

function removeSitemap(id){
  sitemaps=sitemaps.filter(s=>s.id!==id);
  render();
}

function setUA(ruleId,val){
  const r=rules.find(r=>r.id===ruleId);
  if(r){
    const el=document.querySelector(`[data-rule="${ruleId}"] .ua-input`);
    if(el)el.value=val;
    r.ua=val;
    generate();
  }
}

function syncFromDOM(){
  rules.forEach(r=>{
    const el=document.querySelector(`[data-rule="${r.id}"]`);
    if(!el)return;
    r.ua=el.querySelector('.ua-input').value;
    r.crawlDelay=el.querySelector('.crawl-delay-input').value;
    el.querySelectorAll('.path-row').forEach((row,i)=>{
      if(r.paths[i]){
        r.paths[i].type=row.querySelector('select').value;
        r.paths[i].path=row.querySelector('input[type="text"]').value;
      }
    });
  });
  sitemaps.forEach(s=>{
    const el=document.querySelector(`[data-sitemap="${s.id}"] input`);
    if(el)s.url=el.value;
  });
}

function render(){
  const rulesEl=document.getElementById('rules');
  rulesEl.innerHTML=rules.map(r=>`
    <div class="rule-group" data-rule="${r.id}">
      <button class="remove-rule" onclick="removeRule('${r.id}')" title="Remove rule">×</button>
      <label>User-Agent</label>
      <input class="ua-input" value="${esc(r.ua)}" placeholder="* (all crawlers)" oninput="syncAndGen()">
      <div class="common-bots">${commonBots.map(b=>`<span class="chip" onclick="setUA('${r.id}','${b}')">${b}</span>`).join('')}</div>
      <label>Paths</label>
      ${r.paths.map((p,i)=>`
        <div class="path-row">
          <select onchange="syncAndGen()">
            <option value="Allow"${p.type==='Allow'?' selected':''}>Allow</option>
            <option value="Disallow"${p.type==='Disallow'?' selected':''}>Disallow</option>
          </select>
          <input type="text" value="${esc(p.path)}" placeholder="/path/" oninput="syncAndGen()">
          <button class="remove-path" onclick="removePathFromRule('${r.id}',${i})" title="Remove">×</button>
        </div>
      `).join('')}
      <button class="btn btn-secondary" style="margin-top:8px" onclick="addPathToRule('${r.id}')">+ Path</button>
      <label>Crawl-delay (seconds, optional)</label>
      <div class="crawl-delay-row">
        <input class="crawl-delay-input" type="number" min="0" value="${esc(r.crawlDelay)}" placeholder="—" oninput="syncAndGen()">
        <span>seconds between requests</span>
      </div>
    </div>
  `).join('');

  const smEl=document.getElementById('sitemaps');
  smEl.innerHTML=sitemaps.map(s=>`
    <div class="sitemap-row" data-sitemap="${s.id}">
      <input type="url" value="${esc(s.url)}" placeholder="https://example.com/sitemap.xml" oninput="syncAndGen()">
      <button class="remove-path" onclick="removeSitemap('${s.id}')">×</button>
    </div>
  `).join('');

  generate();
}

function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function generate(){
  let out='';
  rules.forEach((r,i)=>{
    if(i>0)out+='\n';
    out+=`User-agent: ${r.ua||'*'}\n`;
    r.paths.forEach(p=>{
      out+=`${p.type}: ${p.path}\n`;
    });
    if(r.crawlDelay&&parseInt(r.crawlDelay)>0){
      out+=`Crawl-delay: ${r.crawlDelay}\n`;
    }
  });
  if(sitemaps.length){
    out+='\n';
    sitemaps.forEach(s=>{
      if(s.url)out+=`Sitemap: ${s.url}\n`;
    });
  }
  document.getElementById('output').textContent=out||'# Add rules above to generate robots.txt';
}

function syncAndGen(){syncFromDOM();generate();}

function copyOutput(){
  const text=document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard!'));
}

function downloadOutput(){
  const text=document.getElementById('output').textContent;
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='robots.txt';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Downloaded robots.txt');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function applyPreset(name){
  rules=[];sitemaps=[];
  switch(name){
    case 'allow-all':
      addRule('*',[{type:'Allow',path:'/'}]);
      break;
    case 'block-all':
      addRule('*',[{type:'Disallow',path:'/'}]);
      break;
    case 'block-ai':
      addRule('GPTBot',[{type:'Disallow',path:'/'}]);
      addRule('ChatGPT-User',[{type:'Disallow',path:'/'}]);
      addRule('Google-Extended',[{type:'Disallow',path:'/'}]);
      addRule('CCBot',[{type:'Disallow',path:'/'}]);
      addRule('anthropic-ai',[{type:'Disallow',path:'/'}]);
      addRule('Claude-Web',[{type:'Disallow',path:'/'}]);
      addRule('Bytespider',[{type:'Disallow',path:'/'}]);
      addRule('*',[{type:'Allow',path:'/'}]);
      break;
    case 'standard':
      addRule('*',[{type:'Allow',path:'/'},{type:'Disallow',path:'/admin/'},{type:'Disallow',path:'/private/'},{type:'Disallow',path:'/wp-admin/'}]);
      addSitemap('https://example.com/sitemap.xml');
      break;
    case 'ecommerce':
      addRule('*',[{type:'Allow',path:'/'},{type:'Disallow',path:'/cart/'},{type:'Disallow',path:'/checkout/'},{type:'Disallow',path:'/account/'},{type:'Disallow',path:'/search?'},{type:'Disallow',path:'/*?sort='},{type:'Disallow',path:'/*?filter='}]);
      addSitemap('https://example.com/sitemap.xml');
      break;
  }
}

// Init with a default rule
addRule();
</script>
</body>
</html>
