<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Calculator - Free Online Tool</title>
<meta name="description" content="Free online matrix calculator. Perform addition, subtraction, multiplication, transpose, determinant, inverse, and more. All computation in your browser.">
<meta name="keywords" content="matrix calculator, linear algebra, determinant, inverse matrix, matrix multiplication, transpose, eigenvalues">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/matrix.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .matrix-wrap { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .matrix-editor { display: inline-block; }
  .matrix-grid { display: inline-grid; gap: 4px; }
  .matrix-grid input {
    width: 64px; height: 36px; text-align: center; border: 1px solid var(--border);
    border-radius: 3px; font-family: var(--mono); font-size: .85rem;
    background: var(--bg); color: var(--text); outline: none;
  }
  .matrix-grid input:focus { border-color: var(--accent); }
  .matrix-bracket { font-size: 3rem; color: var(--muted); font-weight: 200; line-height: 1; }
  .size-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: .85rem; }
  .size-controls select { padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius); font: inherit; background: var(--bg); color: var(--text); }
  .op-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); cursor: pointer; font-size: .9rem; font-family: var(--mono); }
  .op-btn:hover { background: var(--surface2); }
  .op-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .ops-grid { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
  .result-matrix { margin-top: 12px; }
  .result-matrix table { border-collapse: collapse; }
  .result-matrix td { padding: 6px 12px; border: 1px solid var(--border); font-family: var(--mono); font-size: .85rem; text-align: right; }
  .result-scalar { font-family: var(--mono); font-size: 1.2rem; padding: 12px; background: var(--surface2); border-radius: var(--radius); }
  .error-msg { color: var(--error); font-size: .85rem; padding: 8px 12px; background: #fef2f2; border-radius: var(--radius); }
  .section-label { font-size: .82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .quick-fill { display: flex; gap: 6px; margin-top: 8px; }
  .quick-fill button { padding: 3px 8px; font-size: .75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); cursor: pointer; }
  .quick-fill button:hover { background: var(--surface2); }
  @media (max-width: 768px) {
    .matrix-grid input { width: 48px; height: 30px; font-size: .78rem; }
    .matrix-wrap { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>Matrix Calculator</h1>
<p class="subtitle">Add, multiply, transpose, and invert matrices with live results</p>

<div class="card">
  <h2>🅰 Matrix A</h2>
  <div class="size-controls">
    <label>Rows</label>
    <select id="rowsA" onchange="resizeMatrix('A')">
      <option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option>
    </select>
    <label>Cols</label>
    <select id="colsA" onchange="resizeMatrix('A')">
      <option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option>
    </select>
  </div>
  <div class="matrix-wrap">
    <span class="matrix-bracket">[</span>
    <div class="matrix-grid" id="gridA"></div>
    <span class="matrix-bracket">]</span>
  </div>
  <div class="quick-fill">
    <button onclick="fillMatrix('A','zero')">Zero</button>
    <button onclick="fillMatrix('A','identity')">Identity</button>
    <button onclick="fillMatrix('A','random')">Random</button>
    <button onclick="fillMatrix('A','ones')">Ones</button>
  </div>
</div>

<div class="card">
  <h2>🅱 Matrix B</h2>
  <div class="size-controls">
    <label>Rows</label>
    <select id="rowsB" onchange="resizeMatrix('B')">
      <option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option>
    </select>
    <label>Cols</label>
    <select id="colsB" onchange="resizeMatrix('B')">
      <option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option>
    </select>
  </div>
  <div class="matrix-wrap">
    <span class="matrix-bracket">[</span>
    <div class="matrix-grid" id="gridB"></div>
    <span class="matrix-bracket">]</span>
  </div>
  <div class="quick-fill">
    <button onclick="fillMatrix('B','zero')">Zero</button>
    <button onclick="fillMatrix('B','identity')">Identity</button>
    <button onclick="fillMatrix('B','random')">Random</button>
    <button onclick="fillMatrix('B','ones')">Ones</button>
  </div>
</div>

<div class="card">
  <h2>⚙️ Operations</h2>
  <div class="ops-grid">
    <button class="op-btn" onclick="compute('add')">A + B</button>
    <button class="op-btn" onclick="compute('sub')">A − B</button>
    <button class="op-btn" onclick="compute('mul')">A × B</button>
    <button class="op-btn" onclick="compute('scale')">k × A</button>
    <button class="op-btn" onclick="compute('transA')">Aᵀ</button>
    <button class="op-btn" onclick="compute('transB')">Bᵀ</button>
    <button class="op-btn" onclick="compute('detA')">det(A)</button>
    <button class="op-btn" onclick="compute('detB')">det(B)</button>
    <button class="op-btn" onclick="compute('invA')">A⁻¹</button>
    <button class="op-btn" onclick="compute('invB')">B⁻¹</button>
    <button class="op-btn" onclick="compute('traceA')">tr(A)</button>
    <button class="op-btn" onclick="compute('traceB')">tr(B)</button>
    <button class="op-btn" onclick="compute('powerA')">A²</button>
    <button class="op-btn" onclick="compute('rankA')">rank(A)</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
    <label style="font-size:.85rem">Scalar k =</label>
    <input type="number" id="scalarK" value="2" style="width:80px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);font:inherit;background:var(--bg);color:var(--text)">
  </div>
</div>

<div class="card">
  <h2>📊 Result</h2>
  <div id="result"><p class="muted">Select an operation above</p></div>
</div>

<div class="toast" id="toast">✓ Copied!</div>
<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>
</div>
<script>
const $ = id => document.getElementById(id);

function getSize(name) {
  return {
    rows: parseInt($('rows' + name).value),
    cols: parseInt($('cols' + name).value)
  };
}

function resizeMatrix(name) {
  const { rows, cols } = getSize(name);
  const grid = $('grid' + name);
  const old = readMatrix(name);
  grid.style.gridTemplateColumns = `repeat(${cols}, 64px)`;
  grid.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.step = 'any';
      inp.value = old[r] && old[r][c] !== undefined ? old[r][c] : 0;
      inp.id = `m${name}_${r}_${c}`;
      grid.appendChild(inp);
    }
  }
}

function readMatrix(name) {
  const { rows, cols } = getSize(name);
  const m = [];
  for (let r = 0; r < rows; r++) {
    m[r] = [];
    for (let c = 0; c < cols; c++) {
      const el = $(`m${name}_${r}_${c}`);
      m[r][c] = el ? parseFloat(el.value) || 0 : 0;
    }
  }
  return m;
}

function fillMatrix(name, type) {
  const { rows, cols } = getSize(name);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const el = $(`m${name}_${r}_${c}`);
      if (!el) continue;
      if (type === 'zero') el.value = 0;
      else if (type === 'ones') el.value = 1;
      else if (type === 'identity') el.value = r === c ? 1 : 0;
      else if (type === 'random') el.value = Math.floor(Math.random() * 19) - 9;
    }
  }
}

function matAdd(a, b) {
  if (a.length !== b.length || a[0].length !== b[0].length) throw 'Matrices must have same dimensions';
  return a.map((row, r) => row.map((v, c) => v + b[r][c]));
}

function matSub(a, b) {
  if (a.length !== b.length || a[0].length !== b[0].length) throw 'Matrices must have same dimensions';
  return a.map((row, r) => row.map((v, c) => v - b[r][c]));
}

function matMul(a, b) {
  if (a[0].length !== b.length) throw `Cannot multiply: A cols (${a[0].length}) ≠ B rows (${b.length})`;
  const rows = a.length, cols = b[0].length, n = b.length;
  const result = Array.from({ length: rows }, () => Array(cols).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      for (let k = 0; k < n; k++)
        result[r][c] += a[r][k] * b[k][c];
  return result;
}

function matScale(m, k) {
  return m.map(row => row.map(v => v * k));
}

function transpose(m) {
  return m[0].map((_, c) => m.map(row => row[c]));
}

function trace(m) {
  if (m.length !== m[0].length) throw 'Matrix must be square';
  let s = 0;
  for (let i = 0; i < m.length; i++) s += m[i][i];
  return s;
}

function det(m) {
  const n = m.length;
  if (n !== m[0].length) throw 'Matrix must be square';
  if (n === 1) return m[0][0];
  if (n === 2) return m[0][0] * m[1][1] - m[0][1] * m[1][0];
  let d = 0;
  for (let c = 0; c < n; c++) {
    const sub = m.slice(1).map(row => [...row.slice(0, c), ...row.slice(c + 1)]);
    d += (c % 2 === 0 ? 1 : -1) * m[0][c] * det(sub);
  }
  return d;
}

function inverse(m) {
  const n = m.length;
  if (n !== m[0].length) throw 'Matrix must be square';
  const d = det(m);
  if (Math.abs(d) < 1e-12) throw 'Matrix is singular (determinant ≈ 0)';

  // Augmented matrix [m | I]
  const aug = m.map((row, r) => [...row, ...Array.from({ length: n }, (_, c) => r === c ? 1 : 0)]);

  for (let col = 0; col < n; col++) {
    let maxRow = col;
    for (let r = col + 1; r < n; r++)
      if (Math.abs(aug[r][col]) > Math.abs(aug[maxRow][col])) maxRow = r;
    [aug[col], aug[maxRow]] = [aug[maxRow], aug[col]];

    const pivot = aug[col][col];
    if (Math.abs(pivot) < 1e-12) throw 'Matrix is singular';
    for (let c = 0; c < 2 * n; c++) aug[col][c] /= pivot;

    for (let r = 0; r < n; r++) {
      if (r === col) continue;
      const factor = aug[r][col];
      for (let c = 0; c < 2 * n; c++) aug[r][c] -= factor * aug[col][c];
    }
  }

  return aug.map(row => row.slice(n));
}

function rank(m) {
  const rows = m.length, cols = m[0].length;
  const a = m.map(r => [...r]);
  let r = 0;
  for (let col = 0; col < cols && r < rows; col++) {
    let maxRow = r;
    for (let i = r + 1; i < rows; i++)
      if (Math.abs(a[i][col]) > Math.abs(a[maxRow][col])) maxRow = i;
    if (Math.abs(a[maxRow][col]) < 1e-12) continue;
    [a[r], a[maxRow]] = [a[maxRow], a[r]];
    const pivot = a[r][col];
    for (let c = col; c < cols; c++) a[r][c] /= pivot;
    for (let i = 0; i < rows; i++) {
      if (i === r) continue;
      const factor = a[i][col];
      for (let c = col; c < cols; c++) a[i][c] -= factor * a[r][c];
    }
    r++;
  }
  return r;
}

function renderMatrix(m) {
  let html = '<table>';
  for (const row of m) {
    html += '<tr>';
    for (const v of row) {
      const display = Math.abs(v) < 1e-10 ? 0 : parseFloat(v.toPrecision(8));
      html += `<td>${display}</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

function compute(op) {
  const a = readMatrix('A');
  const b = readMatrix('B');
  const k = parseFloat($('scalarK').value) || 0;
  const el = $('result');

  try {
    let result;
    switch (op) {
      case 'add': result = matAdd(a, b); break;
      case 'sub': result = matSub(a, b); break;
      case 'mul': result = matMul(a, b); break;
      case 'scale': result = matScale(a, k); break;
      case 'transA': result = transpose(a); break;
      case 'transB': result = transpose(b); break;
      case 'detA': {
        const d = det(a);
        el.innerHTML = `<div class="section-label">det(A)</div><div class="result-scalar">${parseFloat(d.toPrecision(10))}</div>`;
        return;
      }
      case 'detB': {
        const d = det(b);
        el.innerHTML = `<div class="section-label">det(B)</div><div class="result-scalar">${parseFloat(d.toPrecision(10))}</div>`;
        return;
      }
      case 'invA': result = inverse(a); break;
      case 'invB': result = inverse(b); break;
      case 'traceA': {
        const t = trace(a);
        el.innerHTML = `<div class="section-label">tr(A)</div><div class="result-scalar">${parseFloat(t.toPrecision(10))}</div>`;
        return;
      }
      case 'traceB': {
        const t = trace(b);
        el.innerHTML = `<div class="section-label">tr(B)</div><div class="result-scalar">${parseFloat(t.toPrecision(10))}</div>`;
        return;
      }
      case 'powerA': result = matMul(a, a); break;
      case 'rankA': {
        const r = rank(a);
        el.innerHTML = `<div class="section-label">rank(A)</div><div class="result-scalar">${r}</div>`;
        return;
      }
    }
    const label = { add: 'A + B', sub: 'A − B', mul: 'A × B', scale: `${k} × A`, transA: 'Aᵀ', transB: 'Bᵀ', invA: 'A⁻¹', invB: 'B⁻¹', powerA: 'A²' }[op] || op;
    el.innerHTML = `<div class="section-label">${label} (${result.length}×${result[0].length})</div><div class="result-matrix">${renderMatrix(result)}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="error-msg">⚠ ${e}</div>`;
  }
}

resizeMatrix('A');
resizeMatrix('B');
</script>
</body>
</html>
