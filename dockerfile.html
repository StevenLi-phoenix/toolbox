<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dockerfile Generator — Build Dockerfiles for Any Stack</title>
    <meta name="description" content="Generate production-ready Dockerfiles for Node.js, Python, Go, Rust, Java, Ruby, PHP, and more. Multi-stage builds, best practices, and copy-paste ready.">
    <meta name="keywords" content="Dockerfile generator, Docker, container, Node.js, Python, Go, Rust, Java, DevOps, multi-stage build">
    <meta property="og:title" content="Dockerfile Generator — Build Dockerfiles for Any Stack">
    <meta property="og:description" content="Generate production-ready Dockerfiles with best practices. Supports Node.js, Python, Go, Rust, Java, Ruby, PHP, .NET and more.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/dockerfile.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Dockerfile Generator">
    <meta name="twitter:description" content="Generate production-ready Dockerfiles for any tech stack with best practices baked in.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/dockerfile.html">
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
    <div class="container">
        <h1>🐳 Dockerfile Generator</h1>
        <p class="subtitle">Generate production-ready Dockerfiles with best practices</p>

        <div class="layout">
            <div class="panel">
                <div class="panel-title">Configuration</div>

                <label>Tech Stack</label>
                <select id="stack" onchange="onStackChange()">
                    <option value="node">Node.js</option>
                    <option value="python">Python</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                    <option value="java">Java (Maven)</option>
                    <option value="java-gradle">Java (Gradle)</option>
                    <option value="dotnet">.NET</option>
                    <option value="ruby">Ruby</option>
                    <option value="php">PHP</option>
                    <option value="static">Static Site (Nginx)</option>
                    <option value="custom">Custom / Blank</option>
                </select>

                <div class="row">
                    <div>
                        <label>Base Image Version</label>
                        <input type="text" id="version" placeholder="e.g. 22-alpine">
                    </div>
                    <div>
                        <label>Exposed Port</label>
                        <input type="number" id="port" value="3000">
                    </div>
                </div>

                <label>App Directory</label>
                <input type="text" id="workdir" value="/app">

                <label>Entry Command</label>
                <input type="text" id="cmd" placeholder="auto-detected from stack">

                <label>Options</label>
                <div class="check-group">
                    <label><input type="checkbox" id="multistage" checked onchange="generate()"> Multi-stage build</label>
                    <label><input type="checkbox" id="nonroot" checked onchange="generate()"> Non-root user</label>
                    <label><input type="checkbox" id="healthcheck" onchange="generate()"> Healthcheck</label>
                    <label><input type="checkbox" id="dockerignore" onchange="generate()"> Show .dockerignore</label>
                </div>

                <div class="extras">
                    <label>Extra packages (space-separated)</label>
                    <input type="text" id="packages" placeholder="e.g. curl git ffmpeg" oninput="generate()">

                    <label>Environment variables (KEY=VALUE, one per line)</label>
                    <textarea id="envvars" rows="3" placeholder="NODE_ENV=production&#10;PORT=3000" oninput="generate()"></textarea>

                    <label>Labels (key=value, one per line)</label>
                    <textarea id="labels" rows="2" placeholder='maintainer="you@example.com"&#10;version="1.0"' oninput="generate()"></textarea>
                </div>
            </div>

            <div class="panel">
                <div class="output-header">
                    <div class="panel-title" style="margin:0">Output</div>
                    <div class="btn-group">
                        <button class="btn btn-outline" onclick="copyRaw()">Copy Raw</button>
                        <button class="btn btn-primary" onclick="copyOutput()">📋 Copy</button>
                    </div>
                </div>
                <pre><code id="output"></code></pre>
            </div>
        </div>

        <div class="coffee">
            <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
    const stacks={
        node:{
            base:'node',version:'22-alpine',port:3000,workdir:'/app',
            cmd:'node server.js',
            buildSteps:['COPY package*.json ./','RUN npm ci --only=production'],
            devSteps:['COPY package*.json ./','RUN npm ci'],
            buildCmd:'RUN npm run build',
            copyArtifact:'COPY --from=builder /app/dist ./dist\nCOPY --from=builder /app/node_modules ./node_modules\nCOPY --from=builder /app/package*.json ./',
            ignore:['node_modules','npm-debug.log','.git','.env','Dockerfile','*.md','dist','.dockerignore']
        },
        python:{
            base:'python',version:'3.12-slim',port:8000,workdir:'/app',
            cmd:'python -m uvicorn main:app --host 0.0.0.0 --port 8000',
            buildSteps:['COPY requirements.txt .','RUN pip install --no-cache-dir -r requirements.txt'],
            devSteps:['COPY requirements.txt .','RUN pip install --no-cache-dir -r requirements.txt'],
            buildCmd:'',
            copyArtifact:'COPY --from=builder /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages\nCOPY --from=builder /usr/local/bin /usr/local/bin',
            ignore:['__pycache__','*.pyc','.git','.env','venv','.venv','Dockerfile','*.md','.dockerignore']
        },
        go:{
            base:'golang',version:'1.23-alpine',port:8080,workdir:'/app',
            cmd:'./server',
            buildSteps:['COPY go.mod go.sum ./','RUN go mod download'],
            devSteps:[],
            buildCmd:'RUN CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o server .',
            prodBase:'gcr.io/distroless/static-debian12',
            copyArtifact:'COPY --from=builder /app/server .',
            ignore:['.git','.env','Dockerfile','*.md','.dockerignore','bin/','tmp/']
        },
        rust:{
            base:'rust',version:'1.78-slim',port:8080,workdir:'/app',
            cmd:'./app',
            buildSteps:['COPY Cargo.toml Cargo.lock ./','RUN mkdir src && echo "fn main(){}" > src/main.rs && cargo build --release && rm -rf src'],
            devSteps:[],
            buildCmd:'COPY src ./src\nRUN cargo build --release',
            prodBase:'debian:bookworm-slim',
            copyArtifact:'COPY --from=builder /app/target/release/app .',
            ignore:['target','.git','.env','Dockerfile','*.md','.dockerignore']
        },
        java:{
            base:'maven',version:'3.9-eclipse-temurin-21-alpine',port:8080,workdir:'/app',
            cmd:'java -jar app.jar',
            buildSteps:['COPY pom.xml .','RUN mvn dependency:go-offline -B'],
            devSteps:[],
            buildCmd:'COPY src ./src\nRUN mvn package -DskipTests -B',
            prodBase:'eclipse-temurin:21-jre-alpine',
            copyArtifact:'COPY --from=builder /app/target/*.jar app.jar',
            ignore:['.git','.env','target','Dockerfile','*.md','.dockerignore','*.iml','.idea']
        },
        'java-gradle':{
            base:'gradle',version:'8.7-jdk21-alpine',port:8080,workdir:'/app',
            cmd:'java -jar app.jar',
            buildSteps:['COPY build.gradle* settings.gradle* ./','COPY gradle ./gradle','RUN gradle dependencies --no-daemon || true'],
            devSteps:[],
            buildCmd:'COPY src ./src\nRUN gradle bootJar --no-daemon',
            prodBase:'eclipse-temurin:21-jre-alpine',
            copyArtifact:'COPY --from=builder /app/build/libs/*.jar app.jar',
            ignore:['.git','.env','build','Dockerfile','*.md','.dockerignore','.gradle','*.iml','.idea']
        },
        dotnet:{
            base:'mcr.microsoft.com/dotnet/sdk',version:'8.0-alpine',port:8080,workdir:'/app',
            cmd:'dotnet MyApp.dll',
            buildSteps:['COPY *.csproj ./','RUN dotnet restore'],
            devSteps:[],
            buildCmd:'RUN dotnet publish -c Release -o /publish',
            prodBase:'mcr.microsoft.com/dotnet/aspnet:8.0-alpine',
            copyArtifact:'COPY --from=builder /publish .',
            ignore:['.git','.env','bin','obj','Dockerfile','*.md','.dockerignore']
        },
        ruby:{
            base:'ruby',version:'3.3-slim',port:3000,workdir:'/app',
            cmd:'bundle exec rails server -b 0.0.0.0',
            buildSteps:['COPY Gemfile Gemfile.lock ./','RUN bundle install --without development test'],
            devSteps:['COPY Gemfile Gemfile.lock ./','RUN bundle install'],
            buildCmd:'RUN bundle exec rake assets:precompile 2>/dev/null || true',
            copyArtifact:'COPY --from=builder /usr/local/bundle /usr/local/bundle',
            ignore:['.git','.env','Dockerfile','*.md','.dockerignore','tmp','log','node_modules']
        },
        php:{
            base:'php',version:'8.3-fpm-alpine',port:9000,workdir:'/var/www/html',
            cmd:'php-fpm',
            buildSteps:['COPY composer.json composer.lock ./','RUN composer install --no-dev --optimize-autoloader --no-scripts'],
            devSteps:['COPY composer.json composer.lock ./','RUN composer install --no-scripts'],
            buildCmd:'',
            copyArtifact:'COPY --from=builder /var/www/html/vendor ./vendor',
            ignore:['.git','.env','Dockerfile','*.md','.dockerignore','vendor','node_modules']
        },
        static:{
            base:'node',version:'22-alpine',port:80,workdir:'/app',
            cmd:'nginx -g "daemon off;"',
            buildSteps:['COPY package*.json ./','RUN npm ci'],
            devSteps:[],
            buildCmd:'RUN npm run build',
            prodBase:'nginx:alpine',
            copyArtifact:'COPY --from=builder /app/dist /usr/share/nginx/html',
            ignore:['node_modules','.git','.env','Dockerfile','*.md','.dockerignore','dist']
        },
        custom:{
            base:'alpine',version:'3.19',port:8080,workdir:'/app',
            cmd:'/bin/sh',
            buildSteps:[],devSteps:[],buildCmd:'',copyArtifact:'',
            ignore:['.git','.env','Dockerfile','*.md','.dockerignore']
        }
    };

    function el(id){return document.getElementById(id)}

    function onStackChange(){
        const s=stacks[el('stack').value];
        el('version').value=s.version;
        el('port').value=s.port;
        el('workdir').value=s.workdir;
        el('cmd').value=s.cmd;
        const isMulti=el('stack').value!=='custom';
        el('multistage').checked=isMulti&&(!!s.buildCmd||!!s.prodBase);
        generate();
    }

    function generate(){
        const key=el('stack').value;
        const s=stacks[key];
        const multi=el('multistage').checked;
        const nonroot=el('nonroot').checked;
        const health=el('healthcheck').checked;
        const showIgnore=el('dockerignore').checked;
        const port=el('port').value||s.port;
        const workdir=el('workdir').value||s.workdir;
        const cmd=el('cmd').value||s.cmd;
        const version=el('version').value||s.version;
        const pkgs=el('packages').value.trim();
        const envRaw=el('envvars').value.trim();
        const labelsRaw=el('labels').value.trim();

        const base=s.base.includes('/')?`${s.base}:${version}`:`${s.base}:${version}`;
        let lines=[];

        // Labels
        const labelLines=labelsRaw?labelsRaw.split('\n').filter(l=>l.trim()):[];

        if(multi&&s.buildCmd){
            lines.push(`FROM ${base} AS builder`);
            lines.push(`WORKDIR ${workdir}`);
            lines.push('');
            if(s.buildSteps.length){
                lines.push('# Install dependencies first (cached layer)');
                s.buildSteps.forEach(l=>lines.push(l));
                lines.push('');
            }
            lines.push('# Copy source and build');
            lines.push('COPY . .');
            if(s.buildCmd)lines.push(s.buildCmd);
            lines.push('');

            // Production stage
            const prodImg=s.prodBase||base;
            lines.push(`FROM ${prodImg}`);
            if(labelLines.length){
                labelLines.forEach(l=>lines.push(`LABEL ${l}`));
            }
            lines.push(`WORKDIR ${workdir}`);
            lines.push('');

            if(pkgs){
                const pm=prodImg.includes('alpine')?'apk add --no-cache':'apt-get update && apt-get install -y --no-install-recommends';
                lines.push(`RUN ${pm} ${pkgs}`);
                lines.push('');
            }

            if(s.copyArtifact){
                lines.push('# Copy build artifacts');
                s.copyArtifact.split('\n').forEach(l=>lines.push(l));
            }
            if(key!=='static'&&key!=='go'&&key!=='rust'){
                lines.push('COPY . .');
            }
        }else{
            lines.push(`FROM ${base}`);
            if(labelLines.length){
                labelLines.forEach(l=>lines.push(`LABEL ${l}`));
            }
            lines.push(`WORKDIR ${workdir}`);
            lines.push('');

            if(pkgs){
                const pm=version.includes('alpine')?'apk add --no-cache':'apt-get update && apt-get install -y --no-install-recommends';
                lines.push(`RUN ${pm} ${pkgs}`);
                lines.push('');
            }

            const steps=s.devSteps.length?s.devSteps:s.buildSteps;
            if(steps.length){
                lines.push('# Install dependencies');
                steps.forEach(l=>lines.push(l));
                lines.push('');
            }
            lines.push('COPY . .');
            if(s.buildCmd&&!multi){
                lines.push('');
                lines.push(s.buildCmd);
            }
        }

        lines.push('');

        // Env vars
        if(envRaw){
            envRaw.split('\n').filter(l=>l.includes('=')).forEach(l=>{
                lines.push(`ENV ${l.trim()}`);
            });
            lines.push('');
        }

        // Non-root user
        if(nonroot&&key!=='static'){
            const isAlpine=version.includes('alpine')||(s.prodBase&&s.prodBase.includes('alpine'));
            const isDistroless=s.prodBase&&s.prodBase.includes('distroless');
            if(isDistroless){
                lines.push('USER nonroot:nonroot');
            }else if(isAlpine){
                lines.push('RUN addgroup -g 1001 appgroup && adduser -u 1001 -G appgroup -D appuser');
                lines.push('USER appuser');
            }else{
                lines.push('RUN groupadd -g 1001 appgroup && useradd -u 1001 -g appgroup -m appuser');
                lines.push('USER appuser');
            }
            lines.push('');
        }

        lines.push(`EXPOSE ${port}`);

        if(health){
            lines.push(`HEALTHCHECK --interval=30s --timeout=3s --retries=3 \\`);
            lines.push(`  CMD wget -qO- http://localhost:${port}/health || exit 1`);
        }

        lines.push('');
        // CMD
        const cmdParts=cmd.split(/\s+/);
        if(cmdParts.length>1){
            lines.push(`CMD [${cmdParts.map(p=>`"${p}"`).join(', ')}]`);
        }else{
            lines.push(`CMD ["${cmd}"]`);
        }

        let output=lines.join('\n');

        if(showIgnore){
            output+='\n\n# ─── .dockerignore ───\n';
            output+=(s.ignore||[]).join('\n');
        }

        el('output').innerHTML=highlight(output);
        window._raw=output;
    }

    function highlight(text){
        return text.split('\n').map(line=>{
            if(line.startsWith('#'))return `<span class="comment">${esc(line)}</span>`;
            return esc(line)
                .replace(/^(FROM|WORKDIR|COPY|RUN|ENV|EXPOSE|CMD|LABEL|USER|HEALTHCHECK|ARG|ENTRYPOINT|ADD|VOLUME|SHELL)\b/,`<span class="keyword">$1</span>`)
                .replace(/(--[\w-]+)/g,`<span class="flag">$1</span>`)
                .replace(/("(?:[^"\\]|\\.)*")/g,`<span class="string">$1</span>`)
                .replace(/( AS )(\w+)/,` <span class="keyword">AS</span> <span class="string">$2</span>`);
        }).join('\n');
    }

    function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

    function copyOutput(){
        navigator.clipboard.writeText(window._raw||'').then(()=>showToast('Copied to clipboard!'));
    }
    function copyRaw(){
        const raw=(window._raw||'').split('# ─── .dockerignore')[0].trimEnd();
        navigator.clipboard.writeText(raw).then(()=>showToast('Dockerfile copied!'));
    }
    function showToast(msg){
        const t=el('toast');t.textContent=msg;t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),1800);
    }

    // Init
    onStackChange();
    document.querySelectorAll('input,select,textarea').forEach(e=>{
        if(!e.onchange&&!e.oninput)e.addEventListener('input',generate);
    });
    </script>
</body>
</html>
