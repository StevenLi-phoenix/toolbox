<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text to Speech — Free Online TTS Tool | DevToolbox</title>
<meta name="description" content="Free online Text to Speech tool. Convert text to natural speech using your browser's built-in voices. Adjust rate, pitch, and volume. No signup required.">
<meta name="keywords" content="text to speech, TTS, speech synthesis, voice, read aloud, accessibility, free online tool">
<meta name="author" content="Steven Li">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/tts.html">
<meta property="og:title" content="Text to Speech — Free Online TTS Tool">
<meta property="og:description" content="Convert text to natural speech using browser voices. Adjust rate, pitch, volume. Free, private, no signup.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/tts.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Text to Speech — Free Online TTS Tool">
<meta name="twitter:description" content="Convert text to natural speech in your browser. Free, private, no signup.">
<link rel="stylesheet" href="toolbox.css">
<style>
  .status-bar{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.8rem;color:var(--muted)}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
  .status-dot.speaking{background:var(--success);animation:pulse 1s infinite}
  .status-dot.paused{background:var(--warning)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .char-count{margin-left:auto}
  .controls{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin:12px 0}
  .control-group label{font-size:.85rem;font-weight:600;display:block;margin-bottom:4px}
  .range-row{display:flex;align-items:center;gap:8px}
  .range-row input[type="range"]{flex:1}
  .range-val{font-size:.8rem;min-width:40px;text-align:right;color:var(--muted)}
  .btn-row{display:flex;gap:8px;margin:12px 0}
  .btn-play,.btn-pause,.btn-stop{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:.85rem}
  .btn-play{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-pause{background:var(--surface2)}
  .btn-stop{background:var(--surface2)}
  .btn-play:disabled,.btn-pause:disabled,.btn-stop:disabled{opacity:.4;cursor:default}
  .word-highlight{font-size:.9rem;padding:12px;min-height:40px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);line-height:1.6}
  .word-highlight mark{background:#fef08a;padding:1px 2px;border-radius:2px}
  .tip{font-size:.8rem;color:var(--muted);padding:10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2)}
</style>
</head>
<body>
<header>
  <h1>🔊 Text to Speech</h1>
  <p>Convert text to natural speech using your browser's built-in voices</p>
</header>
<main class="container">
  <div class="card">
    <label for="text-input">Text to Speak</label>
    <textarea id="text-input" placeholder="Type or paste text here..." spellcheck="false">Hello! This is a free text-to-speech tool. Try adjusting the voice, rate, and pitch controls below.</textarea>
    <div class="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Ready</span>
      <span class="char-count" id="char-count">0 chars</span>
    </div>
  </div>

  <div class="card">
    <label for="voice-select">Voice</label>
    <select id="voice-select"><option>Loading voices...</option></select>
    <div class="controls">
      <div class="control-group">
        <label for="rate-range">Rate</label>
        <div class="range-row">
          <input type="range" id="rate-range" min="0.25" max="3" step="0.05" value="1">
          <span class="range-val" id="rate-val">1.00×</span>
        </div>
      </div>
      <div class="control-group">
        <label for="pitch-range">Pitch</label>
        <div class="range-row">
          <input type="range" id="pitch-range" min="0" max="2" step="0.05" value="1">
          <span class="range-val" id="pitch-val">1.00</span>
        </div>
      </div>
      <div class="control-group">
        <label for="volume-range">Volume</label>
        <div class="range-row">
          <input type="range" id="volume-range" min="0" max="1" step="0.05" value="1">
          <span class="range-val" id="volume-val">100%</span>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-play" id="btn-play">▶ Speak</button>
      <button class="btn-pause" id="btn-pause" disabled>⏸ Pause</button>
      <button class="btn-stop" id="btn-stop" disabled>⏹ Stop</button>
    </div>
    <div class="word-highlight" id="word-highlight"></div>
  </div>

  <div class="tip">
    💡 Voices vary by browser and OS. Chrome tends to have the most options. Some voices support SSML for advanced control.
  </div>
</main>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
  <span>·</span>
  <a href="https://stevenli-phoenix.github.io/toolbox/">More Tools</a>
</footer>

<script>
const synth = window.speechSynthesis;
const textEl = document.getElementById('text-input');
const voiceSelect = document.getElementById('voice-select');
const rateRange = document.getElementById('rate-range');
const pitchRange = document.getElementById('pitch-range');
const volumeRange = document.getElementById('volume-range');
const rateVal = document.getElementById('rate-val');
const pitchVal = document.getElementById('pitch-val');
const volumeVal = document.getElementById('volume-val');
const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnStop = document.getElementById('btn-stop');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const charCount = document.getElementById('char-count');
const highlightEl = document.getElementById('word-highlight');

let voices = [];
let isPaused = false;

function loadVoices() {
  voices = synth.getVoices();
  if (!voices.length) return;
  voiceSelect.innerHTML = '';
  const groups = {};
  voices.forEach((v, i) => {
    const lang = v.lang.split('-')[0].toUpperCase();
    if (!groups[lang]) groups[lang] = [];
    groups[lang].push({ voice: v, index: i });
  });
  Object.keys(groups).sort().forEach(lang => {
    const og = document.createElement('optgroup');
    og.label = lang;
    groups[lang].forEach(({ voice: v, index: i }) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})${v.default ? ' ★' : ''}`;
      if (v.default) opt.selected = true;
      og.appendChild(opt);
    });
    voiceSelect.appendChild(og);
  });
}

loadVoices();
synth.onvoiceschanged = loadVoices;

rateRange.oninput = () => { rateVal.textContent = parseFloat(rateRange.value).toFixed(2) + '×'; };
pitchRange.oninput = () => { pitchVal.textContent = parseFloat(pitchRange.value).toFixed(2); };
volumeRange.oninput = () => { volumeVal.textContent = Math.round(volumeRange.value * 100) + '%'; };

textEl.oninput = updateCharCount;
function updateCharCount() {
  const len = textEl.value.length;
  charCount.textContent = len.toLocaleString() + ' char' + (len !== 1 ? 's' : '');
}
updateCharCount();

function setStatus(state, msg) {
  statusDot.className = 'status-dot' + (state ? ' ' + state : '');
  statusText.textContent = msg;
}

function speak() {
  const text = textEl.value.trim();
  if (!text) return;
  synth.cancel();
  isPaused = false;

  // Split into chunks for long text (some browsers cap at ~200-300 chars)
  const chunks = splitText(text, 200);
  let chunkIdx = 0;

  function speakChunk() {
    if (chunkIdx >= chunks.length) {
      setStatus('', 'Finished');
      btnPlay.disabled = false;
      btnPause.disabled = true;
      btnStop.disabled = true;
      btnPause.textContent = '⏸ Pause';
      highlightEl.innerHTML = '';
      return;
    }
    const utt = new SpeechSynthesisUtterance(chunks[chunkIdx]);
    if (voices.length) utt.voice = voices[voiceSelect.value];
    utt.rate = parseFloat(rateRange.value);
    utt.pitch = parseFloat(pitchRange.value);
    utt.volume = parseFloat(volumeRange.value);

    utt.onstart = () => {
      setStatus('speaking', 'Speaking...');
      btnPlay.disabled = true;
      btnPause.disabled = false;
      btnStop.disabled = false;
    };
    utt.onboundary = (e) => {
      if (e.name === 'word') {
        const fullText = chunks[chunkIdx];
        const word = fullText.substring(e.charIndex, e.charIndex + e.charLength);
        const before = escHtml(fullText.substring(0, e.charIndex));
        const after = escHtml(fullText.substring(e.charIndex + (e.charLength || word.length)));
        highlightEl.innerHTML = before + '<mark>' + escHtml(word || '') + '</mark>' + after;
      }
    };
    utt.onend = () => {
      chunkIdx++;
      speakChunk();
    };
    utt.onerror = (e) => {
      if (e.error !== 'canceled') {
        setStatus('', 'Error: ' + e.error);
      }
      btnPlay.disabled = false;
      btnPause.disabled = true;
      btnStop.disabled = true;
    };
    synth.speak(utt);
  }

  speakChunk();
}

function splitText(text, maxLen) {
  const sentences = text.match(/[^.!?\n]+[.!?\n]?\s*/g) || [text];
  const chunks = [];
  let current = '';
  for (const s of sentences) {
    if ((current + s).length > maxLen && current) {
      chunks.push(current.trim());
      current = s;
    } else {
      current += s;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

btnPlay.onclick = speak;

btnPause.onclick = () => {
  if (synth.speaking) {
    if (isPaused) {
      synth.resume();
      isPaused = false;
      setStatus('speaking', 'Speaking...');
      btnPause.textContent = '⏸ Pause';
    } else {
      synth.pause();
      isPaused = true;
      setStatus('paused', 'Paused');
      btnPause.textContent = '▶ Resume';
    }
  }
};

btnStop.onclick = () => {
  synth.cancel();
  isPaused = false;
  setStatus('', 'Stopped');
  btnPlay.disabled = false;
  btnPause.disabled = true;
  btnStop.disabled = true;
  btnPause.textContent = '⏸ Pause';
  highlightEl.innerHTML = '';
};

// Keep speech alive (Chrome pauses long utterances)
setInterval(() => {
  if (synth.speaking && !isPaused) synth.resume();
}, 10000);
</script>
</body>
</html>
