<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder/Decoder - Free Online Tool</title>
<meta name="description" content="Free online URL encoder and decoder. Encode or decode URLs and query strings instantly. Supports UTF-8. No data sent to any server.">
<meta name="keywords" content="url encoder, url decoder, percent encoding, urlencode, urldecode, query string encoder, free url tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/urlencode.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--error:#ef4444;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:900px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:'Courier New',monospace;font-size:.9rem;line-height:1.5;min-height:120px;resize:vertical;transition:border-color .2s}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.swap-btn{display:flex;align-items:center;justify-content:center;margin:-.5rem 0;position:relative;z-index:1}
.swap-btn button{width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--accent);font-size:1.2rem;display:flex;align-items:center;justify-content:center;padding:0}
.swap-btn button:hover{background:var(--border)}
.mode-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.mode-tab{padding:.45rem .9rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.mode-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.mode-tab:hover:not(.active){border-color:var(--muted);color:var(--text)}
.params-table{width:100%;border-collapse:collapse;margin-top:1rem}
.params-table th{text-align:left;font-size:.8rem;color:var(--muted);padding:.5rem .75rem;border-bottom:1px solid var(--border);font-weight:600}
.params-table td{font-family:'Courier New',monospace;font-size:.85rem;padding:.5rem .75rem;border-bottom:1px solid var(--border);word-break:break-all}
.params-table tr:last-child td{border-bottom:none}
.error-msg{font-size:.85rem;color:var(--error);margin-top:.5rem}
.stats{font-size:.85rem;color:var(--muted);margin-top:.5rem}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>URL Encoder / Decoder</h1>
<p class="subtitle">Encode and decode URLs and query strings instantly</p>

<div class="card">
<h2>📝 Input</h2>
<div class="mode-tabs">
<button class="mode-tab active" data-mode="component" onclick="setMode('component')">encodeURIComponent</button>
<button class="mode-tab" data-mode="uri" onclick="setMode('uri')">encodeURI</button>
<button class="mode-tab" data-mode="form" onclick="setMode('form')">Form Data</button>
</div>
<textarea id="input" placeholder="Paste text or URL to encode/decode..." oninput="autoConvert()"></textarea>
<div class="stats" id="inputStats"></div>
<div class="btn-row">
<button class="btn-primary" onclick="encode()">Encode ↓</button>
<button class="btn-primary" onclick="decode()">Decode ↑</button>
<button class="btn-secondary" onclick="copyInput()">📋 Copy</button>
<button class="btn-secondary" onclick="clearAll()">Clear</button>
</div>
</div>

<div class="swap-btn"><button onclick="swap()">⇅</button></div>

<div class="card">
<h2>📋 Output</h2>
<textarea id="output" placeholder="Result will appear here..." readonly></textarea>
<div class="error-msg" id="error"></div>
<div class="stats" id="outputStats"></div>
<div class="btn-row">
<button class="btn-secondary" onclick="copyOutput()">📋 Copy</button>
</div>
</div>

<div class="card" id="paramsCard" style="display:none">
<h2>🔗 Parsed Query Parameters</h2>
<table class="params-table" id="paramsTable">
<thead><tr><th>Key</th><th>Value</th></tr></thead>
<tbody id="paramsBody"></tbody>
</table>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let mode='component';

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach(el=>el.classList.toggle('active',el.dataset.mode===m));
  autoConvert();
}

function encode(){
  const input=$('input').value;
  $('error').textContent='';
  try{
    let result;
    if(mode==='component') result=encodeURIComponent(input);
    else if(mode==='uri') result=encodeURI(input);
    else result=input.split('&').map(p=>{const[k,...v]=p.split('=');return encodeURIComponent(k)+'='+encodeURIComponent(v.join('='));}).join('&');
    $('output').value=result;
    updateStats();
    parseParams(result);
  }catch(e){$('error').textContent='Error: '+e.message;}
}

function decode(){
  const input=$('input').value;
  $('error').textContent='';
  try{
    let result;
    if(mode==='component') result=decodeURIComponent(input);
    else if(mode==='uri') result=decodeURI(input);
    else result=input.split('&').map(p=>{const[k,...v]=p.split('=');return decodeURIComponent(k)+'='+decodeURIComponent(v.join('='));}).join('&');
    $('output').value=result;
    updateStats();
    parseParams(input);
  }catch(e){$('error').textContent='Error: '+e.message;}
}

function autoConvert(){
  const v=$('input').value;
  updateStats();
  if(!v){$('output').value='';$('paramsCard').style.display='none';$('error').textContent='';return;}
  // auto-detect: if it looks encoded, decode; otherwise encode
  if(/%[0-9A-Fa-f]{2}/.test(v)){decode();}
  else{encode();}
}

function swap(){
  const a=$('input').value,b=$('output').value;
  $('input').value=b;$('output').value=a;
  updateStats();
}

function updateStats(){
  const i=$('input').value,o=$('output').value;
  $('inputStats').textContent=i?`${i.length} characters`:'';
  $('outputStats').textContent=o?`${o.length} characters`:'';
}

function parseParams(str){
  try{
    let search=str;
    if(str.includes('?')) search=str.split('?').slice(1).join('?');
    if(!search.includes('=')){$('paramsCard').style.display='none';return;}
    const params=new URLSearchParams(search);
    const rows=[];
    params.forEach((v,k)=>{rows.push(`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`);});
    if(rows.length){
      $('paramsBody').innerHTML=rows.join('');
      $('paramsCard').style.display='block';
    } else {
      $('paramsCard').style.display='none';
    }
  }catch(e){$('paramsCard').style.display='none';}
}

function copyInput(){cp($('input').value);}
function copyOutput(){cp($('output').value);}
function cp(t){navigator.clipboard.writeText(t).then(()=>{const el=$('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500);});}
function clearAll(){$('input').value='';$('output').value='';$('error').textContent='';$('inputStats').textContent='';$('outputStats').textContent='';$('paramsCard').style.display='none';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
