<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Named Colors Reference - Free Online Tool</title>
<meta name="description" content="Browse, search, and copy all 148 CSS named colors. View HEX, RGB, HSL values and find the closest named color to any hex code.">
<meta name="keywords" content="css colors, named colors, css color names, html colors, color reference, web colors">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/colorname.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .search-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .search-row input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font: inherit; font-size: .9rem; background: var(--bg); color: var(--text); }
  .search-row select { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font: inherit; font-size: .85rem; background: var(--bg); color: var(--text); }
  .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .color-card { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: box-shadow .15s, transform .15s; }
  .color-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .swatch { height: 64px; width: 100%; }
  .color-info { padding: 8px 10px; }
  .color-name { font-weight: 600; font-size: .85rem; margin-bottom: 2px; }
  .color-hex { font-family: var(--mono); font-size: .78rem; color: var(--muted); }
  .finder { margin-bottom: 20px; }
  .finder-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .finder-row input[type="color"] { width: 48px; height: 36px; border: 1px solid var(--border); border-radius: var(--radius); padding: 2px; cursor: pointer; }
  .finder-result { margin-top: 10px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); display: none; }
  .finder-result .match-swatch { display: inline-block; width: 24px; height: 24px; border-radius: 4px; vertical-align: middle; border: 1px solid var(--border); margin-right: 8px; }
  .count-badge { font-size: .8rem; color: var(--muted); }
  @media (max-width: 768px) {
    .color-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>CSS Named Colors</h1>
<p class="subtitle">Browse all 148 CSS named colors — search, copy, and find the closest match</p>

<div class="card finder">
  <h2>🎯 Find Closest Named Color</h2>
  <div class="finder-row">
    <input type="color" id="colorPicker" value="#4a90d9" oninput="findClosest()">
    <input type="text" id="hexInput" placeholder="#4a90d9" value="#4a90d9" oninput="findClosestFromHex()" style="width:120px;font-family:var(--mono);font-size:.85rem;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)">
    <button class="btn" onclick="findClosest()">Find</button>
  </div>
  <div class="finder-result" id="finderResult"></div>
</div>

<div class="card">
  <div class="search-row">
    <input type="search" id="search" placeholder="Search by name or hex…" oninput="filterColors()" autocomplete="off">
    <select id="groupBy" onchange="renderColors()">
      <option value="all">All Colors</option>
      <option value="hue">Group by Hue</option>
    </select>
    <span class="count-badge" id="countBadge">148 colors</span>
  </div>
  <div class="color-grid" id="grid"></div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $ = id => document.getElementById(id);

const COLORS = [
  ["aliceblue","#f0f8ff"],["antiquewhite","#faebd7"],["aqua","#00ffff"],["aquamarine","#7fffd4"],
  ["azure","#f0ffff"],["beige","#f5f5dc"],["bisque","#ffe4c4"],["black","#000000"],
  ["blanchedalmond","#ffebcd"],["blue","#0000ff"],["blueviolet","#8a2be2"],["brown","#a52a2a"],
  ["burlywood","#deb887"],["cadetblue","#5f9ea0"],["chartreuse","#7fff00"],["chocolate","#d2691e"],
  ["coral","#ff7f50"],["cornflowerblue","#6495ed"],["cornsilk","#fff8dc"],["crimson","#dc143c"],
  ["cyan","#00ffff"],["darkblue","#00008b"],["darkcyan","#008b8b"],["darkgoldenrod","#b8860b"],
  ["darkgray","#a9a9a9"],["darkgreen","#006400"],["darkkhaki","#bdb76b"],["darkmagenta","#8b008b"],
  ["darkolivegreen","#556b2f"],["darkorange","#ff8c00"],["darkorchid","#9932cc"],["darkred","#8b0000"],
  ["darksalmon","#e9967a"],["darkseagreen","#8fbc8f"],["darkslateblue","#483d8b"],["darkslategray","#2f4f4f"],
  ["darkturquoise","#00ced1"],["darkviolet","#9400d3"],["deeppink","#ff1493"],["deepskyblue","#00bfff"],
  ["dimgray","#696969"],["dodgerblue","#1e90ff"],["firebrick","#b22222"],["floralwhite","#fffaf0"],
  ["forestgreen","#228b22"],["fuchsia","#ff00ff"],["gainsboro","#dcdcdc"],["ghostwhite","#f8f8ff"],
  ["gold","#ffd700"],["goldenrod","#daa520"],["gray","#808080"],["green","#008000"],
  ["greenyellow","#adff2f"],["honeydew","#f0fff0"],["hotpink","#ff69b4"],["indianred","#cd5c5c"],
  ["indigo","#4b0082"],["ivory","#fffff0"],["khaki","#f0e68c"],["lavender","#e6e6fa"],
  ["lavenderblush","#fff0f5"],["lawngreen","#7cfc00"],["lemonchiffon","#fffacd"],["lightblue","#add8e6"],
  ["lightcoral","#f08080"],["lightcyan","#e0ffff"],["lightgoldenrodyellow","#fafad2"],["lightgray","#d3d3d3"],
  ["lightgreen","#90ee90"],["lightpink","#ffb6c1"],["lightsalmon","#ffa07a"],["lightseagreen","#20b2aa"],
  ["lightskyblue","#87cefa"],["lightslategray","#778899"],["lightsteelblue","#b0c4de"],["lightyellow","#ffffe0"],
  ["lime","#00ff00"],["limegreen","#32cd32"],["linen","#faf0e6"],["magenta","#ff00ff"],
  ["maroon","#800000"],["mediumaquamarine","#66cdaa"],["mediumblue","#0000cd"],["mediumorchid","#ba55d3"],
  ["mediumpurple","#9370db"],["mediumseagreen","#3cb371"],["mediumslateblue","#7b68ee"],["mediumspringgreen","#00fa9a"],
  ["mediumturquoise","#48d1cc"],["mediumvioletred","#c71585"],["midnightblue","#191970"],["mintcream","#f5fffa"],
  ["mistyrose","#ffe4e1"],["moccasin","#ffe4b5"],["navajowhite","#ffdead"],["navy","#000080"],
  ["oldlace","#fdf5e6"],["olive","#808000"],["olivedrab","#6b8e23"],["orange","#ffa500"],
  ["orangered","#ff4500"],["orchid","#da70d6"],["palegoldenrod","#eee8aa"],["palegreen","#98fb98"],
  ["paleturquoise","#afeeee"],["palevioletred","#db7093"],["papayawhip","#ffefd5"],["peachpuff","#ffdab9"],
  ["peru","#cd853f"],["pink","#ffc0cb"],["plum","#dda0dd"],["powderblue","#b0e0e6"],
  ["purple","#800080"],["rebeccapurple","#663399"],["red","#ff0000"],["rosybrown","#bc8f8f"],
  ["royalblue","#4169e1"],["saddlebrown","#8b4513"],["salmon","#fa8072"],["sandybrown","#f4a460"],
  ["seagreen","#2e8b57"],["seashell","#fff5ee"],["sienna","#a0522d"],["silver","#c0c0c0"],
  ["skyblue","#87ceeb"],["slateblue","#6a5acd"],["slategray","#708090"],["snow","#fffafa"],
  ["springgreen","#00ff7f"],["steelblue","#4682b4"],["tan","#d2b48c"],["teal","#008080"],
  ["thistle","#d8bfd8"],["tomato","#ff6347"],["turquoise","#40e0d0"],["violet","#ee82ee"],
  ["wheat","#f5deb3"],["white","#ffffff"],["whitesmoke","#f5f5f5"],["yellow","#ffff00"],
  ["yellowgreen","#9acd32"]
];

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
}

function colorDist(hex1, hex2) {
  const [r1, g1, b1] = hexToRgb(hex1);
  const [r2, g2, b2] = hexToRgb(hex2);
  return Math.sqrt((r1 - r2) ** 2 + (g1 - g2) ** 2 + (b1 - b2) ** 2);
}

function getHueGroup(hex) {
  const [r, g, b] = hexToRgb(hex);
  const [h, s, l] = rgbToHsl(r, g, b);
  if (s < 10) return 'Gray / Neutral';
  if (l > 92) return 'White / Near-White';
  if (l < 10) return 'Black / Near-Black';
  if (h < 15 || h >= 345) return 'Red';
  if (h < 45) return 'Orange';
  if (h < 70) return 'Yellow';
  if (h < 160) return 'Green';
  if (h < 200) return 'Cyan';
  if (h < 260) return 'Blue';
  if (h < 300) return 'Purple';
  return 'Pink';
}

let filteredColors = [...COLORS];

function filterColors() {
  const q = $('search').value.toLowerCase().trim();
  filteredColors = COLORS.filter(([name, hex]) =>
    name.includes(q) || hex.includes(q)
  );
  renderColors();
}

function renderColors() {
  const grid = $('grid');
  const groupBy = $('groupBy').value;

  if (groupBy === 'hue') {
    const groups = {};
    filteredColors.forEach(([name, hex]) => {
      const group = getHueGroup(hex);
      (groups[group] = groups[group] || []).push([name, hex]);
    });
    const order = ['Red', 'Orange', 'Yellow', 'Green', 'Cyan', 'Blue', 'Purple', 'Pink', 'Gray / Neutral', 'White / Near-White', 'Black / Near-Black'];
    let html = '';
    order.forEach(g => {
      if (!groups[g]) return;
      html += `<div style="grid-column:1/-1;font-weight:600;margin-top:12px;padding-bottom:4px;border-bottom:1px solid var(--border)">${g} <span style="color:var(--muted);font-weight:400">(${groups[g].length})</span></div>`;
      html += groups[g].map(([name, hex]) => cardHtml(name, hex)).join('');
    });
    grid.innerHTML = html;
  } else {
    grid.innerHTML = filteredColors.map(([name, hex]) => cardHtml(name, hex)).join('');
  }

  $('countBadge').textContent = `${filteredColors.length} color${filteredColors.length !== 1 ? 's' : ''}`;
}

function cardHtml(name, hex) {
  const [r, g, b] = hexToRgb(hex);
  const [h, s, l] = rgbToHsl(r, g, b);
  return `<div class="color-card" onclick="copyColor('${name}','${hex}')" title="Click to copy">
    <div class="swatch" style="background:${hex}"></div>
    <div class="color-info">
      <div class="color-name">${name}</div>
      <div class="color-hex">${hex} · rgb(${r},${g},${b}) · hsl(${h},${s}%,${l}%)</div>
    </div>
  </div>`;
}

function copyColor(name, hex) {
  const text = `${name}: ${hex}`;
  navigator.clipboard.writeText(hex).then(() => {
    const t = $('toast');
    t.textContent = `✓ Copied ${hex} (${name})`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  });
}

function findClosest() {
  const hex = $('colorPicker').value;
  $('hexInput').value = hex;
  showClosest(hex);
}

function findClosestFromHex() {
  let hex = $('hexInput').value.trim();
  if (!hex.startsWith('#')) hex = '#' + hex;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  $('colorPicker').value = hex;
  showClosest(hex);
}

function showClosest(hex) {
  let best = null, bestDist = Infinity;
  COLORS.forEach(([name, chex]) => {
    const d = colorDist(hex, chex);
    if (d < bestDist) { bestDist = d; best = [name, chex]; }
  });

  const el = $('finderResult');
  el.style.display = 'block';
  const [r, g, b] = hexToRgb(best[1]);
  const dist = Math.round(bestDist);
  const pct = Math.round((1 - bestDist / 441.67) * 100);
  el.innerHTML = `<span class="match-swatch" style="background:${hex}"></span>
    <span class="match-swatch" style="background:${best[1]}"></span>
    <strong>${best[0]}</strong> (${best[1]}) — ${pct}% match${dist === 0 ? ' (exact!)' : ''}
    <span style="color:var(--muted);font-size:.82rem"> · rgb(${r},${g},${b}) · distance: ${dist}</span>`;
}

renderColors();
findClosest();
</script>
</body>
</html>
