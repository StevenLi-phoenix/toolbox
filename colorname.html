function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r, g, b};
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
}

function luminance(hex) {
  const {r,g,b} = hexToRgb(hex);
  return (0.299*r + 0.587*g + 0.114*b) / 255;
}

let activeHue = 'all';

function buildGrid() {
  const grid = $('colorGrid');
  grid.innerHTML = '';
  COLORS.forEach(([name, hex, family]) => {
    const textColor = luminance(hex) > 0.6 ? '#333' : '#fff';
    const card = document.createElement('div');
    card.className = 'color-card';
    card.dataset.name = name;
    card.dataset.family = family;
    card.innerHTML = `
      <div class="color-swatch" style="background:${hex};">
        <span style="position:absolute;bottom:4px;right:8px;font-size:.7rem;font-family:var(--mono);color:${textColor}">${hex}</span>
      </div>
      <div class="color-info">
        <div class="color-name">${name}</div>
        <div class="color-hex">${hex.toLowerCase()}</div>
      </div>`;
    card.onclick = () => showDetail(name, hex);
    grid.appendChild(card);
  });
}

function filterCards() {
  const q = $('search').value.toLowerCase().trim();
  let count = 0;
  document.querySelectorAll('.color-card').forEach(card => {
    const name = card.dataset.name;
    const family = card.dataset.family;
    const matchSearch = !q || name.includes(q);
    const matchHue = activeHue === 'all' || family === activeHue;
    const visible = matchSearch && matchHue;
    card.classList.toggle('hidden', !visible);
    if (visible) count++;
  });
  $('countBar').textContent = `Showing ${count} color${count !== 1 ? 's' : ''}`;
}

function filterHue(hue) {
  activeHue = hue;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (b.textContent.toLowerCase().replace('s','') === hue || (hue === 'all' && b.textContent === 'All'))
      b.classList.add('active');
  });
  filterCards();
}

function showDetail(name, hex) {
  const {r,g,b} = hexToRgb(hex);
  const hsl = rgbToHsl(r,g,b);
  const textColor = luminance(hex) > 0.6 ? '#333' : '#fff';
  const panel = $('detailPanel');
  panel.innerHTML = `
    <div class="detail-swatch" style="background:${hex};display:flex;align-items:center;justify-content:center;">
      <span style="font-size:1.5rem;font-weight:700;color:${textColor}">${name}</span>
    </div>
    <div class="detail-name">${name}</div>
    <div class="detail-row"><span class="label">HEX</span><span class="val" onclick="copyVal('${hex}')">${hex}</span></div>
    <div class="detail-row"><span class="label">RGB</span><span class="val" onclick="copyVal('rgb(${r}, ${g}, ${b})')">rgb(${r}, ${g}, ${b})</span></div>
    <div class="detail-row"><span class="label">HSL</span><span class="val" onclick="copyVal('hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)')">hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)</span></div>
    <div class="detail-row"><span class="label">CSS</span><span class="val" onclick="copyVal('${name}')">${name}</span></div>
    <button class="detail-close" onclick="$('detailOverlay').classList.remove('show')">Close</button>`;
  $('detailOverlay').classList.add('show');
}

function closeDetail(e) {
  if (e.target === $('detailOverlay')) $('detailOverlay').classList.remove('show');
}

function copyVal(val) {
  navigator.clipboard.writeText(val);
  const t = $('toast');
  t.textContent = `Copied: ${val}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

$('search').addEventListener('input', filterCards);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') $('detailOverlay').classList.remove('show');
});

buildGrid();
