<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Formatter & Prettifier - Free Online SQL Beautifier</title>
    <meta name="description" content="Free online SQL formatter and prettifier. Beautify, minify, and syntax-highlight your SQL queries instantly. Supports SELECT, INSERT, UPDATE, DELETE, CREATE, and more.">
    <meta name="keywords" content="SQL formatter, SQL prettifier, SQL beautifier, format SQL online, SQL syntax highlighter, free SQL tool, minify SQL">
    <meta name="author" content="Steven Li">
    <meta property="og:title" content="SQL Formatter & Prettifier - Free Online Tool">
    <meta property="og:description" content="Format, beautify, and syntax-highlight SQL queries instantly in your browser. No data leaves your device.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/sql.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="SQL Formatter & Prettifier">
    <meta name="twitter:description" content="Beautify and format SQL queries online for free.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/sql.html">
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
    <header>
        <h1>SQL Formatter & Prettifier</h1>
        <p>Beautify, minify, and syntax-highlight your SQL — entirely in-browser</p>
    </header>
    <div class="container">
        <div class="toolbar">
            <button class="btn-primary" onclick="formatSQL()">Format</button>
            <button onclick="minifySQL()">Minify</button>
            <button onclick="loadSample()">Sample</button>
            <button class="btn-danger" onclick="clearAll()">Clear</button>
            <select id="caseSelect">
                <option value="upper">UPPERCASE keywords</option>
                <option value="lower">lowercase keywords</option>
                <option value="preserve">Preserve case</option>
            </select>
        </div>
        <div class="settings-row">
            <label>Indent: <input type="number" id="indentSize" value="2" min="1" max="8"></label>
            <label><input type="checkbox" id="useTab"> Use tabs</label>
            <label><input type="checkbox" id="commaFirst"> Comma-first style</label>
            <label><input type="checkbox" id="newlineBetween" checked> Blank line between statements</label>
        </div>
        <div class="panels">
            <div class="panel">
                <div class="panel-header">
                    <span>Input SQL</span>
                    <button onclick="pasteInput()">Paste</button>
                </div>
                <textarea id="input" placeholder="Paste your SQL query here..."></textarea>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <span>Formatted Output</span>
                    <button onclick="copyOutput()">Copy</button>
                </div>
                <div class="output-area" id="output"></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <footer>
        <p>All processing happens locally in your browser. No data is sent anywhere.</p>
        <p style="margin-top:0.5rem;">
            <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
            &nbsp;·&nbsp;
            <a href="https://stevenli-phoenix.github.io/toolbox/">More Tools</a>
        </p>
    </footer>
    <script>
    (function() {
        const KEYWORDS = [
            'SELECT','DISTINCT','FROM','WHERE','AND','OR','NOT','IN','EXISTS',
            'BETWEEN','LIKE','IS','NULL','AS','ON','JOIN','INNER','LEFT','RIGHT',
            'FULL','OUTER','CROSS','NATURAL','USING','ORDER','BY','ASC','DESC',
            'GROUP','HAVING','LIMIT','OFFSET','FETCH','FIRST','NEXT','ROWS','ONLY',
            'UNION','ALL','INTERSECT','EXCEPT','INSERT','INTO','VALUES','UPDATE',
            'SET','DELETE','CREATE','TABLE','INDEX','VIEW','DROP','ALTER','ADD',
            'COLUMN','CONSTRAINT','PRIMARY','KEY','FOREIGN','REFERENCES','UNIQUE',
            'CHECK','DEFAULT','CASCADE','RESTRICT','IF','ELSE','THEN','END',
            'CASE','WHEN','BEGIN','COMMIT','ROLLBACK','TRANSACTION','GRANT',
            'REVOKE','WITH','RECURSIVE','RETURNING','OVER','PARTITION','WINDOW',
            'RANGE','UNBOUNDED','PRECEDING','FOLLOWING','CURRENT','ROW','ROWS',
            'REPLACE','TRUNCATE','EXPLAIN','ANALYZE','VACUUM','TEMP','TEMPORARY',
            'MATERIALIZED','LATERAL','TABLESAMPLE','ORDINALITY','GROUPING','SETS',
            'CUBE','ROLLUP','FILTER','WITHIN','RESPECT','IGNORE','NULLS','TIES',
            'PERCENT','TYPE','ENUM','DOMAIN','SCHEMA','DATABASE','USE','SHOW',
            'DESCRIBE','RENAME','TO','MODIFY','AUTO_INCREMENT','SERIAL','BOOLEAN',
            'INTEGER','INT','BIGINT','SMALLINT','TINYINT','FLOAT','DOUBLE','DECIMAL',
            'NUMERIC','REAL','VARCHAR','CHAR','TEXT','BLOB','DATE','TIME','TIMESTAMP',
            'DATETIME','INTERVAL','JSON','JSONB','UUID','ARRAY','PROCEDURE','FUNCTION',
            'TRIGGER','BEFORE','AFTER','FOR','EACH','STATEMENT','EXECUTE','DECLARE',
            'VARIABLE','CURSOR','OPEN','CLOSE','LOOP','WHILE','REPEAT','UNTIL',
            'LEAVE','ITERATE','RETURN','CALL','SIGNAL','RESIGNAL','HANDLER',
            'CONDITION','CONTINUE','EXIT','DO','ELSEIF','TOP','PERCENT','OUTPUT',
            'MERGE','MATCHED','SOURCE','TARGET','PIVOT','UNPIVOT','QUALIFY',
            'ILIKE','SIMILAR','ANY','SOME','COPY','PERFORM','RAISE','NOTICE',
            'EXCEPTION','FOUND','STRICT','PARALLEL','SAFE','STABLE','VOLATILE',
            'IMMUTABLE','SECURITY','DEFINER','INVOKER','COST','LANGUAGE','PLPGSQL',
            'SQL','TRUE','FALSE','ASC','DESC','NOWAIT','SKIP','LOCKED',
            'NO','ACTION','DEFERRABLE','INITIALLY','DEFERRED','IMMEDIATE',
            'ENABLE','DISABLE','FORCE','VALIDATE','NOVALIDATE','RELY','NORELY'
        ];
        const FUNCTIONS = [
            'COUNT','SUM','AVG','MIN','MAX','COALESCE','NULLIF','CAST','CONVERT',
            'CONCAT','SUBSTRING','SUBSTR','LENGTH','LEN','TRIM','LTRIM','RTRIM',
            'UPPER','LOWER','REPLACE','REVERSE','LEFT','RIGHT','LPAD','RPAD',
            'POSITION','STRPOS','CHARINDEX','STUFF','FORMAT','TRANSLATE',
            'ABS','CEIL','CEILING','FLOOR','ROUND','TRUNC','TRUNCATE','MOD',
            'POWER','SQRT','SIGN','RANDOM','RAND','LOG','LN','EXP',
            'NOW','CURRENT_TIMESTAMP','CURRENT_DATE','CURRENT_TIME',
            'DATE_TRUNC','DATE_PART','EXTRACT','DATEADD','DATEDIFF','DATEPART',
            'TO_DATE','TO_CHAR','TO_NUMBER','TO_TIMESTAMP',
            'ROW_NUMBER','RANK','DENSE_RANK','NTILE','LAG','LEAD',
            'FIRST_VALUE','LAST_VALUE','NTH_VALUE','PERCENT_RANK','CUME_DIST',
            'STRING_AGG','ARRAY_AGG','JSON_AGG','JSONB_AGG','JSON_BUILD_OBJECT',
            'LISTAGG','GROUP_CONCAT','GREATEST','LEAST','IF','IIF','IFNULL',
            'NVL','NVL2','DECODE','REGEXP_REPLACE','REGEXP_MATCHES',
            'REGEXP_SUBSTR','SPLIT_PART','UNNEST','GENERATE_SERIES','EXISTS'
        ];

        const MAJOR_CLAUSES = [
            'SELECT','FROM','WHERE','GROUP BY','HAVING','ORDER BY','LIMIT',
            'OFFSET','UNION','UNION ALL','INTERSECT','EXCEPT',
            'INSERT INTO','VALUES','UPDATE','SET','DELETE FROM',
            'CREATE TABLE','CREATE INDEX','CREATE VIEW','CREATE OR REPLACE',
            'DROP TABLE','DROP INDEX','DROP VIEW','ALTER TABLE',
            'JOIN','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN',
            'FULL OUTER JOIN','LEFT OUTER JOIN','RIGHT OUTER JOIN',
            'CROSS JOIN','NATURAL JOIN','ON','USING',
            'WITH','RETURNING','FETCH','MERGE INTO','WHEN MATCHED',
            'WHEN NOT MATCHED'
        ];

        function tokenize(sql) {
            const tokens = [];
            let i = 0;
            while (i < sql.length) {
                // Whitespace
                if (/\s/.test(sql[i])) {
                    let s = i;
                    while (i < sql.length && /\s/.test(sql[i])) i++;
                    tokens.push({ type: 'ws', value: sql.slice(s, i) });
                    continue;
                }
                // Single-line comment
                if (sql[i] === '-' && sql[i + 1] === '-') {
                    let s = i;
                    while (i < sql.length && sql[i] !== '\n') i++;
                    tokens.push({ type: 'comment', value: sql.slice(s, i) });
                    continue;
                }
                // Block comment
                if (sql[i] === '/' && sql[i + 1] === '*') {
                    let s = i;
                    i += 2;
                    while (i < sql.length && !(sql[i - 1] === '*' && sql[i] === '/')) i++;
                    i++;
                    tokens.push({ type: 'comment', value: sql.slice(s, i) });
                    continue;
                }
                // String
                if (sql[i] === "'" || sql[i] === '"') {
                    let q = sql[i], s = i;
                    i++;
                    while (i < sql.length) {
                        if (sql[i] === q) { if (sql[i + 1] === q) { i += 2; } else { i++; break; } }
                        else if (sql[i] === '\\') { i += 2; }
                        else { i++; }
                    }
                    tokens.push({ type: 'string', value: sql.slice(s, i) });
                    continue;
                }
                // Number
                if (/\d/.test(sql[i]) || (sql[i] === '.' && /\d/.test(sql[i + 1]))) {
                    let s = i;
                    while (i < sql.length && /[\d.eE+-]/.test(sql[i])) i++;
                    tokens.push({ type: 'number', value: sql.slice(s, i) });
                    continue;
                }
                // Parens
                if (sql[i] === '(') { tokens.push({ type: 'lparen', value: '(' }); i++; continue; }
                if (sql[i] === ')') { tokens.push({ type: 'rparen', value: ')' }); i++; continue; }
                // Semicolon
                if (sql[i] === ';') { tokens.push({ type: 'semi', value: ';' }); i++; continue; }
                // Comma
                if (sql[i] === ',') { tokens.push({ type: 'comma', value: ',' }); i++; continue; }
                // Operators
                if ('<>=!|&+-*/%^~'.includes(sql[i])) {
                    let s = i;
                    while (i < sql.length && '<>=!|&+-*/%^~'.includes(sql[i])) i++;
                    tokens.push({ type: 'operator', value: sql.slice(s, i) });
                    continue;
                }
                // Dot
                if (sql[i] === '.') { tokens.push({ type: 'dot', value: '.' }); i++; continue; }
                // Word
                if (/[\w$@#]/.test(sql[i])) {
                    let s = i;
                    while (i < sql.length && /[\w$@#.]/.test(sql[i])) i++;
                    let word = sql.slice(s, i);
                    let upper = word.toUpperCase();
                    if (KEYWORDS.includes(upper)) {
                        tokens.push({ type: 'keyword', value: word });
                    } else if (FUNCTIONS.includes(upper)) {
                        tokens.push({ type: 'function', value: word });
                    } else {
                        tokens.push({ type: 'identifier', value: word });
                    }
                    continue;
                }
                // Backtick-quoted identifier
                if (sql[i] === '`') {
                    let s = i; i++;
                    while (i < sql.length && sql[i] !== '`') i++;
                    i++;
                    tokens.push({ type: 'identifier', value: sql.slice(s, i) });
                    continue;
                }
                // Anything else
                tokens.push({ type: 'other', value: sql[i] });
                i++;
            }
            return tokens;
        }

        function getIndent(level) {
            const useTab = document.getElementById('useTab').checked;
            const size = parseInt(document.getElementById('indentSize').value) || 2;
            if (useTab) return '\t'.repeat(level);
            return ' '.repeat(level * size);
        }

        function applyCase(word) {
            const mode = document.getElementById('caseSelect').value;
            if (mode === 'upper') return word.toUpperCase();
            if (mode === 'lower') return word.toLowerCase();
            return word;
        }

        function isClauseStart(tokens, idx) {
            if (idx >= tokens.length) return null;
            let t = tokens[idx];
            if (t.type !== 'keyword') return null;
            let upper = t.value.toUpperCase();

            // Two-word clauses
            if (idx + 2 < tokens.length && tokens[idx + 1].type === 'ws') {
                let next = tokens[idx + 2];
                if (next.type === 'keyword') {
                    let combo = upper + ' ' + next.value.toUpperCase();
                    if (MAJOR_CLAUSES.includes(combo)) return { clause: combo, consume: 3 };
                    // Three-word: CREATE OR REPLACE, FULL OUTER JOIN, etc.
                    if (idx + 4 < tokens.length && tokens[idx + 3].type === 'ws' && tokens[idx + 4].type === 'keyword') {
                        let triple = combo + ' ' + tokens[idx + 4].value.toUpperCase();
                        if (MAJOR_CLAUSES.includes(triple)) return { clause: triple, consume: 5 };
                    }
                }
            }
            if (MAJOR_CLAUSES.includes(upper)) return { clause: upper, consume: 1 };
            return null;
        }

        function formatSQL() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            const commaFirst = document.getElementById('commaFirst').checked;
            const newlineBetween = document.getElementById('newlineBetween').checked;
            const tokens = tokenize(input);

            let result = '';
            let indent = 0;
            let parenDepth = 0;
            let parenIndent = [];
            let newlineNeeded = false;
            let isFirstToken = true;
            let lastNonWS = null;
            let afterStatement = false;

            for (let i = 0; i < tokens.length; i++) {
                let t = tokens[i];

                if (t.type === 'ws') continue; // We control whitespace

                // Semicolons: end statement
                if (t.type === 'semi') {
                    result += ';';
                    afterStatement = true;
                    newlineNeeded = true;
                    lastNonWS = t;
                    continue;
                }

                // Check for clause start (only at top level or low nesting)
                let clauseMatch = (parenDepth === 0) ? isClauseStart(tokens, i) : null;

                if (clauseMatch) {
                    let clauseWords = clauseMatch.clause.split(' ');
                    let formatted = clauseWords.map(w => applyCase(w)).join(' ');

                    if (afterStatement && newlineBetween) {
                        result += '\n';
                    }
                    afterStatement = false;

                    let cl = clauseMatch.clause;
                    let indentBefore = indent;

                    // Determine indentation for this clause
                    if (['SELECT','FROM','WHERE','GROUP BY','HAVING','ORDER BY',
                         'LIMIT','OFFSET','FETCH','SET','VALUES','RETURNING',
                         'UNION','UNION ALL','INTERSECT','EXCEPT',
                         'INSERT INTO','UPDATE','DELETE FROM',
                         'CREATE TABLE','CREATE INDEX','CREATE VIEW','CREATE OR REPLACE',
                         'DROP TABLE','DROP INDEX','DROP VIEW','ALTER TABLE',
                         'MERGE INTO','WITH'].includes(cl)) {
                        indent = 0;
                        if (!isFirstToken) result += '\n';
                        result += formatted;
                    } else if (['JOIN','INNER JOIN','LEFT JOIN','RIGHT JOIN','FULL JOIN',
                                'FULL OUTER JOIN','LEFT OUTER JOIN','RIGHT OUTER JOIN',
                                'CROSS JOIN','NATURAL JOIN'].includes(cl)) {
                        indent = 0;
                        result += '\n' + formatted;
                    } else if (['ON','USING'].includes(cl)) {
                        indent = 1;
                        result += '\n' + getIndent(1) + formatted;
                    } else if (['WHEN MATCHED','WHEN NOT MATCHED'].includes(cl)) {
                        result += '\n' + formatted;
                    } else {
                        if (!isFirstToken) result += '\n';
                        result += formatted;
                    }

                    indent = 1;
                    newlineNeeded = true;
                    isFirstToken = false;
                    lastNonWS = t;
                    i += clauseMatch.consume - 1;
                    continue;
                }

                // AND / OR at top level
                if (parenDepth === 0 && t.type === 'keyword' && ['AND','OR'].includes(t.value.toUpperCase())) {
                    result += '\n' + getIndent(1) + applyCase(t.value);
                    newlineNeeded = false;
                    lastNonWS = t;
                    isFirstToken = false;
                    continue;
                }

                // Comma handling
                if (t.type === 'comma') {
                    if (parenDepth === 0) {
                        if (commaFirst) {
                            result += '\n' + getIndent(1) + ',';
                        } else {
                            result += ',';
                            newlineNeeded = true;
                        }
                    } else {
                        result += ', ';
                    }
                    lastNonWS = t;
                    isFirstToken = false;
                    continue;
                }

                // Parens
                if (t.type === 'lparen') {
                    if (newlineNeeded && parenDepth === 0) {
                        result += '\n' + getIndent(indent);
                        newlineNeeded = false;
                    } else if (lastNonWS && lastNonWS.type !== 'function' && lastNonWS.type !== 'keyword' && lastNonWS.type !== 'lparen' && !isFirstToken) {
                        // Space before ( unless after function name
                        if (result.length > 0 && !/\s$/.test(result)) result += ' ';
                    }
                    result += '(';
                    parenDepth++;
                    parenIndent.push(indent);
                    lastNonWS = t;
                    isFirstToken = false;
                    continue;
                }

                if (t.type === 'rparen') {
                    result += ')';
                    parenDepth--;
                    if (parenIndent.length) indent = parenIndent.pop();
                    lastNonWS = t;
                    isFirstToken = false;
                    continue;
                }

                // Regular token
                if (afterStatement) {
                    if (newlineBetween) result += '\n';
                    result += '\n';
                    afterStatement = false;
                    indent = 0;
                    newlineNeeded = false;
                }

                if (newlineNeeded && parenDepth === 0) {
                    result += '\n' + getIndent(indent);
                    newlineNeeded = false;
                } else if (!isFirstToken && lastNonWS && lastNonWS.type !== 'lparen' && t.type !== 'dot' && lastNonWS.type !== 'dot') {
                    if (result.length > 0 && !/\s$/.test(result)) result += ' ';
                }

                // Apply case to keywords/functions
                if (t.type === 'keyword') {
                    result += applyCase(t.value);
                } else if (t.type === 'function') {
                    result += applyCase(t.value);
                } else {
                    result += t.value;
                }

                lastNonWS = t;
                isFirstToken = false;
            }

            renderHighlighted(result.trim());
        }

        function minifySQL() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;
            const tokens = tokenize(input);
            let result = '';
            let lastNonWS = null;

            for (const t of tokens) {
                if (t.type === 'ws') {
                    if (lastNonWS && needsSpace(lastNonWS)) result += ' ';
                    continue;
                }
                if (t.type === 'comment') continue;
                result += t.value;
                lastNonWS = t;
            }
            renderHighlighted(result.trim());
        }

        function needsSpace(token) {
            return ['keyword', 'identifier', 'number', 'function', 'string'].includes(token.type);
        }

        function renderHighlighted(sql) {
            const tokens = tokenize(sql);
            let html = '';
            for (const t of tokens) {
                const escaped = escapeHtml(t.value);
                switch (t.type) {
                    case 'keyword': html += `<span class="sql-keyword">${escaped}</span>`; break;
                    case 'function': html += `<span class="sql-function">${escaped}</span>`; break;
                    case 'string': html += `<span class="sql-string">${escaped}</span>`; break;
                    case 'number': html += `<span class="sql-number">${escaped}</span>`; break;
                    case 'comment': html += `<span class="sql-comment">${escaped}</span>`; break;
                    case 'operator': html += `<span class="sql-operator">${escaped}</span>`; break;
                    case 'lparen': case 'rparen': html += `<span class="sql-paren">${escaped}</span>`; break;
                    case 'comma': html += `<span class="sql-comma">${escaped}</span>`; break;
                    default: html += escaped;
                }
            }
            document.getElementById('output').innerHTML = html;
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        window.formatSQL = formatSQL;
        window.minifySQL = minifySQL;

        window.clearAll = function() {
            document.getElementById('input').value = '';
            document.getElementById('output').innerHTML = '';
        };

        window.copyOutput = function() {
            const text = document.getElementById('output').innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
        };

        window.pasteInput = async function() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('input').value = text;
                showToast('Pasted!');
            } catch(e) {
                showToast('Paste not available');
            }
        };

        window.loadSample = function() {
            document.getElementById('input').value = `SELECT u.id, u.name, u.email, COUNT(o.id) AS order_count, SUM(o.total) AS total_spent FROM users u INNER JOIN orders o ON u.id = o.user_id WHERE u.created_at >= '2024-01-01' AND u.status = 'active' AND o.total > 50.00 GROUP BY u.id, u.name, u.email HAVING COUNT(o.id) > 3 ORDER BY total_spent DESC LIMIT 20;`;
            formatSQL();
        };

        // Auto-format on paste into input
        document.getElementById('input').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                formatSQL();
            }
        });
    })();
    </script>
</body>
</html>
