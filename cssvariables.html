<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Variables Theme Builder - Free Online Design Token Tool</title>
<meta name="description" content="Build CSS custom property themes visually. Define design tokens for colors, spacing, typography, and borders — preview on live components and export clean CSS.">
<meta name="keywords" content="css variables, custom properties, design tokens, theme builder, css theme, dark mode, css generator">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/cssvariables.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .theme-panels { display: grid; grid-template-columns: 340px 1fr; gap: 1.5rem; }
  .var-group { margin-bottom: 1.25rem; }
  .var-group h3 { font-size: .85rem; font-weight: 600; margin-bottom: .5rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .var-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem; }
  .var-row label { font-size: .82rem; font-family: var(--mono); min-width: 140px; color: var(--text); }
  .var-row input[type="color"] { width: 32px; height: 28px; border: 1px solid var(--border); border-radius: 4px; padding: 1px; cursor: pointer; background: var(--bg); }
  .var-row input[type="text"], .var-row input[type="number"], .var-row select {
    flex: 1; padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: .82rem; font-family: var(--mono); background: var(--bg); color: var(--text);
  }
  .preview-frame {
    border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem;
    min-height: 500px; transition: all .2s;
  }
  .preview-frame * { transition: all .15s; }
  .p-card { border: 1px solid var(--pBorder); border-radius: var(--pRadius); padding: 1.25rem; margin-bottom: 1rem; background: var(--pSurface); }
  .p-card h4 { margin: 0 0 .5rem; font-size: 1rem; }
  .p-card p { margin: 0; font-size: .85rem; line-height: 1.5; }
  .p-btn { display: inline-block; padding: .5rem 1.25rem; border: none; border-radius: var(--pRadius); cursor: pointer; font-size: .85rem; font-weight: 600; margin-right: .5rem; margin-bottom: .5rem; }
  .p-btn-primary { background: var(--pAccent); color: #fff; }
  .p-btn-secondary { background: transparent; border: 1px solid var(--pBorder); color: var(--pText); }
  .p-btn-danger { background: var(--pError); color: #fff; }
  .p-input { width: 100%; padding: .5rem .75rem; border: 1px solid var(--pBorder); border-radius: var(--pRadius); background: var(--pBg); color: var(--pText); font-size: .85rem; margin-bottom: .75rem; font-family: inherit; }
  .p-badge { display: inline-block; padding: .15rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 600; margin-right: .35rem; }
  .p-nav { display: flex; gap: 0; border-bottom: 2px solid var(--pBorder); margin-bottom: 1rem; }
  .p-nav-item { padding: .5rem 1rem; font-size: .85rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--pMuted); }
  .p-nav-item.active { border-bottom-color: var(--pAccent); color: var(--pAccent); font-weight: 600; }
  .p-alert { padding: .75rem 1rem; border-radius: var(--pRadius); font-size: .85rem; margin-bottom: .75rem; }
  .preset-bar { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .preset-btn { padding: .35rem .75rem; font-size: .78rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; color: var(--text); }
  .preset-btn:hover { background: var(--surface2); }
  .export-area { width: 100%; min-height: 200px; font-family: var(--mono); font-size: .8rem; padding: .75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); resize: vertical; }
  @media (max-width: 768px) {
    .theme-panels { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>🎨 CSS Variables Theme Builder</h1>
<p class="subtitle">Define CSS custom properties visually, preview on live components, and export a clean theme</p>

<div class="preset-bar">
  <strong style="font-size:.85rem;line-height:2;">Presets:</strong>
  <button class="preset-btn" onclick="applyPreset('light')">Light</button>
  <button class="preset-btn" onclick="applyPreset('dark')">Dark</button>
  <button class="preset-btn" onclick="applyPreset('ocean')">Ocean</button>
  <button class="preset-btn" onclick="applyPreset('forest')">Forest</button>
  <button class="preset-btn" onclick="applyPreset('sunset')">Sunset</button>
  <button class="preset-btn" onclick="applyPreset('midnight')">Midnight</button>
</div>

<div class="theme-panels">
  <div class="card" style="overflow-y:auto;max-height:700px;">
    <h2>🎛️ Variables</h2>
    <div class="var-group">
      <h3>Colors</h3>
      <div class="var-row"><label>--bg</label><input type="color" id="v-bg" value="#ffffff" oninput="updatePreview()"><input type="text" id="v-bg-text" value="#ffffff" oninput="syncFromText(this,'v-bg')"></div>
      <div class="var-row"><label>--surface</label><input type="color" id="v-surface" value="#ffffff" oninput="updatePreview()"><input type="text" id="v-surface-text" value="#ffffff" oninput="syncFromText(this,'v-surface')"></div>
      <div class="var-row"><label>--text</label><input type="color" id="v-text" value="#111111" oninput="updatePreview()"><input type="text" id="v-text-text" value="#111111" oninput="syncFromText(this,'v-text')"></div>
      <div class="var-row"><label>--muted</label><input type="color" id="v-muted" value="#666666" oninput="updatePreview()"><input type="text" id="v-muted-text" value="#666666" oninput="syncFromText(this,'v-muted')"></div>
      <div class="var-row"><label>--accent</label><input type="color" id="v-accent" value="#2563eb" oninput="updatePreview()"><input type="text" id="v-accent-text" value="#2563eb" oninput="syncFromText(this,'v-accent')"></div>
      <div class="var-row"><label>--border</label><input type="color" id="v-border" value="#e0e0e0" oninput="updatePreview()"><input type="text" id="v-border-text" value="#e0e0e0" oninput="syncFromText(this,'v-border')"></div>
      <div class="var-row"><label>--success</label><input type="color" id="v-success" value="#16a34a" oninput="updatePreview()"><input type="text" id="v-success-text" value="#16a34a" oninput="syncFromText(this,'v-success')"></div>
      <div class="var-row"><label>--error</label><input type="color" id="v-error" value="#dc2626" oninput="updatePreview()"><input type="text" id="v-error-text" value="#dc2626" oninput="syncFromText(this,'v-error')"></div>
      <div class="var-row"><label>--warning</label><input type="color" id="v-warning" value="#d97706" oninput="updatePreview()"><input type="text" id="v-warning-text" value="#d97706" oninput="syncFromText(this,'v-warning')"></div>
    </div>
    <div class="var-group">
      <h3>Typography</h3>
      <div class="var-row"><label>--font-sans</label><input type="text" id="v-font-sans" value="system-ui, -apple-system, sans-serif" oninput="updatePreview()" style="flex:1;"></div>
      <div class="var-row"><label>--font-mono</label><input type="text" id="v-font-mono" value="'SF Mono', 'Fira Code', monospace" oninput="updatePreview()" style="flex:1;"></div>
      <div class="var-row"><label>--font-size</label><input type="text" id="v-font-size" value="16px" oninput="updatePreview()" style="flex:1;"></div>
      <div class="var-row"><label>--line-height</label><input type="text" id="v-line-height" value="1.6" oninput="updatePreview()" style="flex:1;"></div>
    </div>
    <div class="var-group">
      <h3>Spacing & Borders</h3>
      <div class="var-row"><label>--radius</label><input type="text" id="v-radius" value="8px" oninput="updatePreview()" style="flex:1;"></div>
      <div class="var-row"><label>--space-sm</label><input type="text" id="v-space-sm" value="0.5rem" oninput="updatePreview()" style="flex:1;"></div>
      <div class="var-row"><label>--space-md</label><input type="text" id="v-space-md" value="1rem" oninput="updatePreview()" style="flex:1;"></div>
      <div class="var-row"><label>--space-lg</label><input type="text" id="v-space-lg" value="2rem" oninput="updatePreview()" style="flex:1;"></div>
      <div class="var-row"><label>--shadow</label><input type="text" id="v-shadow" value="0 1px 3px rgba(0,0,0,.1)" oninput="updatePreview()" style="flex:1;"></div>
    </div>
  </div>

  <div>
    <div class="preview-frame" id="preview">
      <!-- Preview components rendered by JS -->
    </div>
  </div>
</div>

<div class="card" style="margin-top:1.5rem;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
    <h2>📋 Export CSS</h2>
    <button class="btn" onclick="copyExport()">Copy</button>
  </div>
  <textarea class="export-area" id="exportArea" readonly></textarea>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const VARS = [
  {id:'v-bg',css:'--bg',type:'color'},
  {id:'v-surface',css:'--surface',type:'color'},
  {id:'v-text',css:'--text',type:'color'},
  {id:'v-muted',css:'--muted',type:'color'},
  {id:'v-accent',css:'--accent',type:'color'},
  {id:'v-border',css:'--border',type:'color'},
  {id:'v-success',css:'--success',type:'color'},
  {id:'v-error',css:'--error',type:'color'},
  {id:'v-warning',css:'--warning',type:'color'},
  {id:'v-font-sans',css:'--font-sans',type:'text'},
  {id:'v-font-mono',css:'--font-mono',type:'text'},
  {id:'v-font-size',css:'--font-size',type:'text'},
  {id:'v-line-height',css:'--line-height',type:'text'},
  {id:'v-radius',css:'--radius',type:'text'},
  {id:'v-space-sm',css:'--space-sm',type:'text'},
  {id:'v-space-md',css:'--space-md',type:'text'},
  {id:'v-space-lg',css:'--space-lg',type:'text'},
  {id:'v-shadow',css:'--shadow',type:'text'},
];

const PRESETS = {
  light: {'v-bg':'#ffffff','v-surface':'#ffffff','v-text':'#111111','v-muted':'#666666','v-accent':'#2563eb','v-border':'#e0e0e0','v-success':'#16a34a','v-error':'#dc2626','v-warning':'#d97706','v-radius':'8px','v-shadow':'0 1px 3px rgba(0,0,0,.1)'},
  dark: {'v-bg':'#0f172a','v-surface':'#1e293b','v-text':'#f1f5f9','v-muted':'#94a3b8','v-accent':'#3b82f6','v-border':'#334155','v-success':'#22c55e','v-error':'#ef4444','v-warning':'#f59e0b','v-radius':'8px','v-shadow':'0 1px 3px rgba(0,0,0,.4)'},
  ocean: {'v-bg':'#f0f9ff','v-surface':'#e0f2fe','v-text':'#0c4a6e','v-muted':'#0369a1','v-accent':'#0284c7','v-border':'#bae6fd','v-success':'#059669','v-error':'#e11d48','v-warning':'#ea580c','v-radius':'12px','v-shadow':'0 2px 8px rgba(3,105,161,.12)'},
  forest: {'v-bg':'#f0fdf4','v-surface':'#dcfce7','v-text':'#14532d','v-muted':'#166534','v-accent':'#16a34a','v-border':'#bbf7d0','v-success':'#15803d','v-error':'#dc2626','v-warning':'#ca8a04','v-radius':'6px','v-shadow':'0 1px 4px rgba(22,101,52,.1)'},
  sunset: {'v-bg':'#fffbeb','v-surface':'#fef3c7','v-text':'#78350f','v-muted':'#92400e','v-accent':'#d97706','v-border':'#fcd34d','v-success':'#16a34a','v-error':'#dc2626','v-warning':'#ea580c','v-radius':'10px','v-shadow':'0 2px 6px rgba(217,119,6,.12)'},
  midnight: {'v-bg':'#020617','v-surface':'#0f172a','v-text':'#e2e8f0','v-muted':'#64748b','v-accent':'#a78bfa','v-border':'#1e293b','v-success':'#4ade80','v-error':'#f87171','v-warning':'#fbbf24','v-radius':'8px','v-shadow':'0 2px 8px rgba(0,0,0,.5)'},
};

function $(id){ return document.getElementById(id); }

function getVal(id){
  const el = $(id);
  if(!el) return '';
  if(el.type === 'color') return el.value;
  return el.value || ($(id+'-text') ? $(id+'-text').value : '');
}

function syncFromText(textEl, colorId){
  const val = textEl.value.trim();
  if(/^#[0-9a-fA-F]{6}$/.test(val)){
    $(colorId).value = val;
  }
  updatePreview();
}

function updatePreview(){
  // Sync color pickers with text fields
  VARS.forEach(v => {
    if(v.type === 'color'){
      const picker = $(v.id);
      const text = $(v.id + '-text');
      if(picker && text){
        // If the picker triggered this, update text
        if(document.activeElement === picker) text.value = picker.value;
      }
    }
  });

  const pf = $('preview');
  const vals = {};
  VARS.forEach(v => {
    vals[v.css] = v.type === 'color' ? $(v.id).value : $(v.id).value;
  });

  // Apply to preview
  pf.style.cssText = `
    --pBg: ${vals['--bg']};
    --pSurface: ${vals['--surface']};
    --pText: ${vals['--text']};
    --pMuted: ${vals['--muted']};
    --pAccent: ${vals['--accent']};
    --pBorder: ${vals['--border']};
    --pSuccess: ${vals['--success']};
    --pError: ${vals['--error']};
    --pWarning: ${vals['--warning']};
    --pRadius: ${vals['--radius']};
    --pShadow: ${vals['--shadow']};
    background: ${vals['--bg']};
    color: ${vals['--text']};
    font-family: ${vals['--font-sans']};
    font-size: ${vals['--font-size']};
    line-height: ${vals['--line-height']};
    border: 1px solid ${vals['--border']};
    border-radius: ${vals['--radius']};
    padding: 2rem;
    min-height: 500px;
  `;

  pf.innerHTML = `
    <div class="p-nav">
      <div class="p-nav-item active">Dashboard</div>
      <div class="p-nav-item">Settings</div>
      <div class="p-nav-item">Profile</div>
    </div>
    <div class="p-card">
      <h4 style="color:${vals['--text']}">Welcome Back</h4>
      <p style="color:${vals['--muted']}">Here's a preview of your theme applied to common UI components.</p>
    </div>
    <div style="margin-bottom:1rem;">
      <input class="p-input" placeholder="Search..." style="border-color:${vals['--border']};background:${vals['--surface']};color:${vals['--text']};border-radius:${vals['--radius']};">
    </div>
    <div style="margin-bottom:1rem;">
      <button class="p-btn p-btn-primary" style="background:${vals['--accent']};border-radius:${vals['--radius']};">Primary</button>
      <button class="p-btn p-btn-secondary" style="border-color:${vals['--border']};color:${vals['--text']};border-radius:${vals['--radius']};">Secondary</button>
      <button class="p-btn p-btn-danger" style="background:${vals['--error']};border-radius:${vals['--radius']};">Danger</button>
    </div>
    <div style="margin-bottom:1rem;">
      <span class="p-badge" style="background:${vals['--accent']}20;color:${vals['--accent']};">Active</span>
      <span class="p-badge" style="background:${vals['--success']}20;color:${vals['--success']};">Success</span>
      <span class="p-badge" style="background:${vals['--error']}20;color:${vals['--error']};">Error</span>
      <span class="p-badge" style="background:${vals['--warning']}20;color:${vals['--warning']};">Warning</span>
    </div>
    <div class="p-alert" style="background:${vals['--success']}15;border:1px solid ${vals['--success']}40;color:${vals['--success']};">
      ✓ Changes saved successfully.
    </div>
    <div class="p-alert" style="background:${vals['--error']}15;border:1px solid ${vals['--error']}40;color:${vals['--error']};">
      ✕ Something went wrong. Please try again.
    </div>
    <div class="p-card">
      <h4 style="color:${vals['--text']}">Code Block</h4>
      <pre style="background:${vals['--surface']};border:1px solid ${vals['--border']};border-radius:${vals['--radius']};padding:.75rem;font-family:${vals['--font-mono']};font-size:.82rem;color:${vals['--text']};overflow-x:auto;"><code>const theme = {
  bg: "${vals['--bg']}",
  text: "${vals['--text']}",
  accent: "${vals['--accent']}"
};</code></pre>
    </div>
  `;

  generateExport();
}

function generateExport(){
  const lines = [':root {'];
  VARS.forEach(v => {
    const val = v.type === 'color' ? $(v.id).value : $(v.id).value;
    lines.push(`  ${v.css}: ${val};`);
  });
  lines.push('}');
  $('exportArea').value = lines.join('\n');
}

function applyPreset(name){
  const p = PRESETS[name];
  if(!p) return;
  Object.keys(p).forEach(id => {
    const el = $(id);
    if(!el) return;
    el.value = p[id];
    const text = $(id + '-text');
    if(text) text.value = p[id];
  });
  updatePreview();
}

function copyExport(){
  const area = $('exportArea');
  navigator.clipboard.writeText(area.value).then(() => {
    const t = $('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

// Init
updatePreview();
</script>
</body>
</html>
