<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Icon Generator — Generate iOS, Android &amp; Web Icons | Free Online Tool</title>
    <meta name="description" content="Free online app icon generator. Upload an image and export icons in all sizes for iOS, Android, PWA, and web favicons. No signup required.">
    <meta name="keywords" content="app icon generator, iOS icon sizes, Android icon sizes, favicon generator, PWA icon, app store icon, adaptive icon, icon resizer">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/appicon.html">
    <meta property="og:title" content="App Icon Generator — iOS, Android &amp; Web Icons">
    <meta property="og:description" content="Upload an image and instantly generate app icons in every size you need for iOS, Android, PWA, and web.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/appicon.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="App Icon Generator — iOS, Android &amp; Web Icons">
    <meta name="twitter:description" content="Generate app icons in all standard sizes from a single image. Free, no signup.">
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
<div class="container">
    <h1>📱 App Icon Generator</h1>
    <p class="subtitle">Upload an image → export icons for iOS, Android, PWA &amp; Web</p>

    <div class="drop-zone" id="dropZone">
        <div class="icon">🖼️</div>
        <strong>Drop an image here or click to upload</strong>
        <p>PNG, JPG, SVG — square images work best (512×512+)</p>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
    </div>

    <div id="editor" class="hidden">
        <div class="preview-area">
            <div class="preview-box checkerboard"><img id="previewImg" alt="Preview"></div>
            <div class="preview-info">
                <p class="filename" id="fileName">image.png</p>
                <p id="fileDims">0 × 0 px</p>
                <p id="fileSize">0 KB</p>
                <button class="btn btn-outline btn-sm" onclick="resetImage()" style="margin-top:8px">Change Image</button>
            </div>
        </div>

        <div class="options">
            <h3>⚙️ Options</h3>
            <div class="opt-row">
                <div class="opt-group">
                    <label>Background</label>
                    <select id="bgMode">
                        <option value="transparent">Transparent</option>
                        <option value="color">Solid Color</option>
                    </select>
                </div>
                <div class="opt-group" id="bgColorGroup" style="display:none">
                    <label>Color</label>
                    <input type="color" id="bgColor" value="#ffffff">
                </div>
                <div class="opt-group">
                    <label>Padding</label>
                    <select id="padding">
                        <option value="0">None</option>
                        <option value="0.05">5%</option>
                        <option value="0.1" selected>10%</option>
                        <option value="0.15">15%</option>
                        <option value="0.2">20%</option>
                    </select>
                </div>
                <div class="opt-group">
                    <label>Shape</label>
                    <select id="shape">
                        <option value="square">Square</option>
                        <option value="rounded">Rounded</option>
                        <option value="circle">Circle</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="platform-tabs" id="tabs">
            <div class="tab active" data-platform="ios">iOS</div>
            <div class="tab" data-platform="android">Android</div>
            <div class="tab" data-platform="pwa">PWA</div>
            <div class="tab" data-platform="web">Web / Favicon</div>
            <div class="tab" data-platform="macos">macOS</div>
            <div class="tab" data-platform="all">All Sizes</div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="downloadAll()">⬇️ Download All (.zip)</button>
            <button class="btn btn-outline" onclick="regenerate()">🔄 Regenerate</button>
        </div>

        <div class="icon-grid" id="iconGrid"></div>
    </div>

    <div class="coffee">
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
    </div>
</div>

<script>
const PLATFORMS={
    ios:[
        {w:20,h:20,name:'Icon-20',label:'20pt Notification'},
        {w:29,h:29,name:'Icon-29',label:'29pt Settings'},
        {w:40,h:40,name:'Icon-40',label:'40pt Spotlight'},
        {w:58,h:58,name:'Icon-58',label:'29@2x Settings'},
        {w:60,h:60,name:'Icon-60',label:'20@3x Notification'},
        {w:76,h:76,name:'Icon-76',label:'76pt iPad'},
        {w:80,h:80,name:'Icon-80',label:'40@2x Spotlight'},
        {w:87,h:87,name:'Icon-87',label:'29@3x Settings'},
        {w:120,h:120,name:'Icon-120',label:'60@2x iPhone'},
        {w:152,h:152,name:'Icon-152',label:'76@2x iPad'},
        {w:167,h:167,name:'Icon-167',label:'83.5@2x iPad Pro'},
        {w:180,h:180,name:'Icon-180',label:'60@3x iPhone'},
        {w:1024,h:1024,name:'Icon-1024',label:'1024 App Store'},
    ],
    android:[
        {w:36,h:36,name:'mipmap-ldpi',label:'36 ldpi'},
        {w:48,h:48,name:'mipmap-mdpi',label:'48 mdpi'},
        {w:72,h:72,name:'mipmap-hdpi',label:'72 hdpi'},
        {w:96,h:96,name:'mipmap-xhdpi',label:'96 xhdpi'},
        {w:144,h:144,name:'mipmap-xxhdpi',label:'144 xxhdpi'},
        {w:192,h:192,name:'mipmap-xxxhdpi',label:'192 xxxhdpi'},
        {w:512,h:512,name:'playstore-512',label:'512 Play Store'},
    ],
    pwa:[
        {w:72,h:72,name:'pwa-72',label:'72'},
        {w:96,h:96,name:'pwa-96',label:'96'},
        {w:128,h:128,name:'pwa-128',label:'128'},
        {w:144,h:144,name:'pwa-144',label:'144'},
        {w:152,h:152,name:'pwa-152',label:'152'},
        {w:192,h:192,name:'pwa-192',label:'192'},
        {w:384,h:384,name:'pwa-384',label:'384'},
        {w:512,h:512,name:'pwa-512',label:'512'},
    ],
    web:[
        {w:16,h:16,name:'favicon-16',label:'16 favicon'},
        {w:32,h:32,name:'favicon-32',label:'32 favicon'},
        {w:48,h:48,name:'favicon-48',label:'48'},
        {w:64,h:64,name:'favicon-64',label:'64'},
        {w:96,h:96,name:'favicon-96',label:'96'},
        {w:128,h:128,name:'favicon-128',label:'128'},
        {w:180,h:180,name:'apple-touch-icon',label:'180 apple-touch'},
        {w:192,h:192,name:'icon-192',label:'192'},
        {w:256,h:256,name:'icon-256',label:'256'},
        {w:512,h:512,name:'icon-512',label:'512'},
    ],
    macos:[
        {w:16,h:16,name:'icon_16',label:'16'},
        {w:32,h:32,name:'icon_32',label:'32'},
        {w:64,h:64,name:'icon_64',label:'64'},
        {w:128,h:128,name:'icon_128',label:'128'},
        {w:256,h:256,name:'icon_256',label:'256'},
        {w:512,h:512,name:'icon_512',label:'512'},
        {w:1024,h:1024,name:'icon_1024',label:'1024'},
    ]
};

let sourceImg=null, currentPlatform='ios';

const $=s=>document.querySelector(s);
const dropZone=$('#dropZone'),fileInput=$('#fileInput'),editor=$('#editor'),grid=$('#iconGrid');

dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0])});

$('#bgMode').addEventListener('change',e=>{
    $('#bgColorGroup').style.display=e.target.value==='color'?'':'none';
    if(sourceImg)regenerate();
});
$('#bgColor').addEventListener('input',()=>{if(sourceImg)regenerate()});
$('#padding').addEventListener('change',()=>{if(sourceImg)regenerate()});
$('#shape').addEventListener('change',()=>{if(sourceImg)regenerate()});

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    currentPlatform=t.dataset.platform;
    if(sourceImg)regenerate();
}));

function loadFile(file){
    const reader=new FileReader();
    reader.onload=e=>{
        const img=new Image();
        img.onload=()=>{
            sourceImg=img;
            $('#previewImg').src=e.target.result;
            $('#fileName').textContent=file.name;
            $('#fileDims').textContent=`${img.naturalWidth} × ${img.naturalHeight} px`;
            $('#fileSize').textContent=formatBytes(file.size);
            dropZone.classList.add('hidden');
            editor.classList.remove('hidden');
            regenerate();
        };
        img.src=e.target.result;
    };
    reader.readAsDataURL(file);
}

function resetImage(){
    sourceImg=null;
    fileInput.value='';
    editor.classList.add('hidden');
    dropZone.classList.remove('hidden');
    grid.innerHTML='';
}

function getSizes(){
    if(currentPlatform==='all'){
        const seen=new Set(),all=[];
        Object.values(PLATFORMS).flat().forEach(s=>{
            const k=s.w+'x'+s.h;
            if(!seen.has(k)){seen.add(k);all.push(s)}
        });
        return all.sort((a,b)=>a.w-b.w);
    }
    return PLATFORMS[currentPlatform]||[];
}

function renderIcon(size){
    const c=document.createElement('canvas');
    c.width=size.w;c.height=size.h;
    const ctx=c.getContext('2d');
    const bgMode=$('#bgMode').value;
    const bgColor=$('#bgColor').value;
    const pad=parseFloat($('#padding').value);
    const shape=$('#shape').value;

    if(shape==='circle'){
        ctx.beginPath();
        ctx.arc(size.w/2,size.h/2,size.w/2,0,Math.PI*2);
        ctx.closePath();
        ctx.clip();
    }else if(shape==='rounded'){
        const r=size.w*0.2;
        roundRect(ctx,0,0,size.w,size.h,r);
        ctx.clip();
    }

    if(bgMode==='color'){
        ctx.fillStyle=bgColor;
        ctx.fillRect(0,0,size.w,size.h);
    }

    const inset=size.w*pad;
    const drawW=size.w-inset*2;
    const drawH=size.h-inset*2;
    ctx.drawImage(sourceImg,inset,inset,drawW,drawH);
    return c;
}

function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

function regenerate(){
    if(!sourceImg)return;
    grid.innerHTML='';
    const sizes=getSizes();
    sizes.forEach((s,i)=>{
        const card=document.createElement('div');
        card.className='icon-card';
        const canvas=renderIcon(s);
        const displaySize=Math.min(90,s.w);
        canvas.style.width=displaySize+'px';
        canvas.style.height=displaySize+'px';
        const dlBtn=document.createElement('button');
        dlBtn.className='dl-btn';dlBtn.textContent='⬇';
        dlBtn.title='Download';
        dlBtn.onclick=e=>{e.stopPropagation();downloadSingle(canvas,s)};
        const label=document.createElement('div');
        label.className='size-label';
        label.textContent=`${s.w}×${s.h}`;
        card.appendChild(dlBtn);
        card.appendChild(canvas);
        card.appendChild(label);
        grid.appendChild(card);
    });
}

function downloadSingle(canvas,size){
    const a=document.createElement('a');
    a.download=`${size.name}-${size.w}x${size.h}.png`;
    a.href=canvas.toDataURL('image/png');
    a.click();
}

async function downloadAll(){
    if(!sourceImg)return;
    const sizes=getSizes();
    // Dynamic import JSZip from CDN
    if(!window.JSZip){
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    }
    const zip=new JSZip();
    const folder=zip.folder(currentPlatform==='all'?'icons':currentPlatform);
    for(const s of sizes){
        const canvas=renderIcon(s);
        const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
        folder.file(`${s.name}-${s.w}x${s.h}.png`,blob);
    }
    const content=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');
    a.download=`icons-${currentPlatform}.zip`;
    a.href=URL.createObjectURL(content);
    a.click();
    URL.revokeObjectURL(a.href);
}

function loadScript(src){
    return new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src=src;s.onload=res;s.onerror=rej;
        document.head.appendChild(s);
    });
}

function formatBytes(b){
    if(b<1024)return b+' B';
    if(b<1048576)return(b/1024).toFixed(1)+' KB';
    return(b/1048576).toFixed(1)+' MB';
}
</script>
</body>
</html>
