<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Zone Converter — DevToolbox</title>
    <meta name="description" content="Convert times between any time zones instantly. World clock, meeting planner, and overlap finder for distributed teams.">
    <meta name="keywords" content="time zone converter, world clock, meeting planner, timezone, UTC, developer tool">
    <meta property="og:title" content="Time Zone Converter — DevToolbox">
    <meta property="og:description" content="Convert times between any time zones instantly. World clock, meeting planner, and overlap finder.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/timezone.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Time Zone Converter — DevToolbox">
    <meta name="twitter:description" content="Convert times between any time zones instantly. World clock and meeting planner.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/timezone.html">
    <link rel="stylesheet" href="toolbox.css">
<style>
  .tabs{display:flex;gap:4px;margin-bottom:16px}
  .tab{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);cursor:pointer;font-size:.85rem}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .swap-btn{background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1.2rem}
  .quick-zones{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
  .quick-zone{font-size:.75rem;padding:3px 8px;border:1px solid var(--border);border-radius:12px;cursor:pointer;background:var(--surface2)}
  .quick-zone:hover{border-color:var(--accent)}
  .result-box{text-align:center;padding:16px;border:1px solid var(--border);border-radius:var(--radius);margin:12px 0}
  .result-time{font-size:2rem;font-weight:700}
  .result-date{color:var(--muted);font-size:.9rem}
  .result-offset{font-size:.8rem;color:var(--muted);margin-top:4px}
  .diff-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
  .diff-badge.same{background:var(--surface2);color:var(--muted)}
  .diff-badge.ahead{background:#e6f9e6;color:var(--success)}
  .diff-badge.behind{background:#fde8e8;color:var(--error)}
  .world-clock{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .clock-item{position:relative;border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
  .clock-remove{position:absolute;top:4px;right:6px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.8rem}
  .clock-city{font-weight:600;font-size:.85rem;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:4px}
  .clock-time{font-size:1.2rem;font-weight:700;font-family:var(--mono)}
  .clock-date,.clock-offset{font-size:.7rem;color:var(--muted)}
  .day-indicator{width:8px;height:8px;border-radius:50%;display:inline-block}
  .day-indicator.day{background:#fbbf24}
  .day-indicator.night{background:#475569}
  .add-zone{display:flex;gap:8px;align-items:center;margin:10px 0}
  .timeline{overflow-x:auto;margin-top:12px}
  .timeline-grid{display:grid;grid-template-columns:100px repeat(24,1fr);gap:1px;font-size:.65rem}
  .timeline-header{text-align:center;padding:4px;color:var(--muted);font-weight:600}
  .timeline-label{padding:4px;font-size:.75rem;font-weight:600;display:flex;align-items:center}
  .timeline-cell{height:24px;background:var(--surface2);border-radius:2px}
  .timeline-cell.work{background:#bbf7d0}
  .timeline-cell.current{background:var(--accent)}
  .coffee{display:inline-block;margin-top:16px;font-size:.85rem}
</style>
</head>
<body>
<div class="container">
    <h1>🕐 Time Zone Converter</h1>
    <p class="subtitle">Convert times across zones &bull; World clock &bull; Meeting planner</p>

    <div class="tabs">
        <div class="tab active" data-tab="convert" onclick="switchTab('convert')">Convert</div>
        <div class="tab" data-tab="worldclock" onclick="switchTab('worldclock')">World Clock</div>
        <div class="tab" data-tab="planner" onclick="switchTab('planner')">Meeting Planner</div>
    </div>

    <!-- Convert Tab -->
    <div id="tab-convert">
        <div class="card">
            <h2>Convert Time</h2>
            <div class="row">
                <div>
                    <label>Date & Time</label>
                    <input type="datetime-local" id="srcDateTime" step="60">
                </div>
                <div>
                    <label>From Zone</label>
                    <select id="srcZone"></select>
                </div>
            </div>
            <div style="text-align:center;padding:.6rem 0">
                <button class="swap-btn" onclick="swapZones()" title="Swap zones">⇅</button>
            </div>
            <div>
                <label>To Zone</label>
                <select id="dstZone"></select>
            </div>
            <div class="quick-zones" id="quickZones"></div>
            <div class="result-box" id="convertResult">
                <div class="result-time" id="resTime">--:--</div>
                <div class="result-date" id="resDate"></div>
                <div class="result-offset" id="resOffset"></div>
                <div style="margin-top:.5rem">
                    <span class="diff-badge same" id="resDiff"></span>
                </div>
            </div>
            <div style="margin-top:.6rem;display:flex;gap:.5rem;flex-wrap:wrap">
                <button class="btn btn-sm" onclick="setNow()">Now</button>
                <button class="btn btn-sm" onclick="copyResult()">📋 Copy</button>
            </div>
        </div>
    </div>

    <!-- World Clock Tab -->
    <div id="tab-worldclock" style="display:none">
        <div class="card">
            <h2>World Clock</h2>
            <div class="world-clock" id="worldClockGrid"></div>
            <div class="add-zone">
                <select id="addClockZone"></select>
                <button class="btn btn-sm" onclick="addClockZone()">+ Add</button>
            </div>
        </div>
    </div>

    <!-- Meeting Planner Tab -->
    <div id="tab-planner" style="display:none">
        <div class="card">
            <h2>Meeting Planner</h2>
            <p style="font-size:.8rem;color:var(--muted);margin-bottom:.6rem">Find overlapping work hours (9 AM – 6 PM). Green = work hours.</p>
            <div class="add-zone">
                <select id="addPlannerZone"></select>
                <button class="btn btn-sm" onclick="addPlannerZone()">+ Add Zone</button>
                <button class="btn btn-sm" onclick="resetPlanner()">Reset</button>
            </div>
            <div class="timeline" id="plannerTimeline"></div>
        </div>
    </div>

    <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener" class="coffee">☕ Buy me a coffee</a>
</div>

<script>
const POPULAR_ZONES = [
    'UTC','America/New_York','America/Chicago','America/Denver','America/Los_Angeles',
    'Europe/London','Europe/Paris','Europe/Berlin','Europe/Moscow',
    'Asia/Tokyo','Asia/Shanghai','Asia/Kolkata','Asia/Singapore','Asia/Dubai',
    'Australia/Sydney','Pacific/Auckland','America/Sao_Paulo','America/Toronto',
    'Asia/Seoul','Asia/Hong_Kong','Africa/Cairo','Africa/Lagos'
];
const QUICK = ['UTC','America/New_York','America/Los_Angeles','Europe/London','Asia/Tokyo','Asia/Shanghai','Australia/Sydney'];
const ALL_ZONES = Intl.supportedValuesOf ? Intl.supportedValuesOf('timeZone') : POPULAR_ZONES;
let worldClocks = JSON.parse(localStorage.getItem('tz_world') || 'null') || ['America/New_York','Europe/London','Asia/Tokyo','Asia/Shanghai','Australia/Sydney'];
let plannerZones = JSON.parse(localStorage.getItem('tz_planner') || 'null') || ['America/New_York','Europe/London','Asia/Tokyo'];
let clockInterval;

function shortName(tz) {
    return tz.replace(/^.*\//, '').replace(/_/g, ' ');
}
function getOffset(tz, date) {
    const fmt = new Intl.DateTimeFormat('en-US', {timeZone: tz, timeZoneName: 'longOffset'});
    const parts = fmt.formatToParts(date);
    const p = parts.find(p => p.type === 'timeZoneName');
    return p ? p.value : '';
}
function populateSelect(sel, selected) {
    sel.innerHTML = '';
    const groups = {};
    ALL_ZONES.forEach(tz => {
        const region = tz.includes('/') ? tz.split('/')[0] : 'Other';
        if (!groups[region]) groups[region] = [];
        groups[region].push(tz);
    });
    Object.keys(groups).sort().forEach(region => {
        const og = document.createElement('optgroup');
        og.label = region;
        groups[region].forEach(tz => {
            const o = document.createElement('option');
            o.value = tz;
            o.textContent = tz.replace(/_/g, ' ');
            if (tz === selected) o.selected = true;
            og.appendChild(o);
        });
        sel.appendChild(og);
    });
}
function initSelects() {
    const local = Intl.DateTimeFormat().resolvedOptions().timeZone;
    populateSelect(document.getElementById('srcZone'), local);
    populateSelect(document.getElementById('dstZone'), 'UTC');
    populateSelect(document.getElementById('addClockZone'), 'Europe/Paris');
    populateSelect(document.getElementById('addPlannerZone'), 'America/Los_Angeles');
    const qc = document.getElementById('quickZones');
    QUICK.forEach(tz => {
        const b = document.createElement('span');
        b.className = 'quick-zone';
        b.textContent = shortName(tz);
        b.onclick = () => { document.getElementById('dstZone').value = tz; convert(); };
        qc.appendChild(b);
    });
}
function setNow() {
    const now = new Date();
    const tz = document.getElementById('srcZone').value;
    const parts = new Intl.DateTimeFormat('en-CA', {timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(now);
    const get = t => (parts.find(p=>p.type===t)||{}).value||'';
    let h = get('hour'); if(h==='24') h='00';
    document.getElementById('srcDateTime').value = `${get('year')}-${get('month')}-${get('day')}T${h}:${get('minute')}`;
    convert();
}
function convert() {
    const dt = document.getElementById('srcDateTime').value;
    if (!dt) { setNow(); return; }
    const srcZone = document.getElementById('srcZone').value;
    const dstZone = document.getElementById('dstZone').value;
    // Build date in source timezone
    const [datePart, timePart] = dt.split('T');
    const srcDate = new Date(dt);
    // Use formatter to get the src timezone offset, then compute
    const srcFmt = new Intl.DateTimeFormat('en-US', {timeZone:srcZone,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    const dstFmt = new Intl.DateTimeFormat('en-US', {timeZone:dstZone,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,weekday:'long'});
    // Trick: create date from input, figure offset
    const tempDate = new Date(`${datePart}T${timePart}:00`);
    const srcStr = srcFmt.format(tempDate);
    const srcParsed = new Date(srcStr);
    const inputParsed = new Date(`${datePart}T${timePart}:00`);
    const diff = inputParsed - srcParsed;
    const adjusted = new Date(tempDate.getTime() + diff);
    // Format in destination
    const dParts = dstFmt.formatToParts(adjusted);
    const dg = t => (dParts.find(p=>p.type===t)||{}).value||'';
    let dh = dg('hour'); if(dh==='24') dh='00';
    document.getElementById('resTime').textContent = `${dh}:${dg('minute')}`;
    document.getElementById('resDate').textContent = `${dg('weekday')}, ${dg('month')}/${dg('day')}/${dg('year')}`;
    const srcOff = getOffset(srcZone, adjusted);
    const dstOff = getOffset(dstZone, adjusted);
    document.getElementById('resOffset').textContent = `${shortName(srcZone)} (${srcOff}) → ${shortName(dstZone)} (${dstOff})`;
    // Compute hour diff
    const srcMs = new Date(new Intl.DateTimeFormat('en-CA',{timeZone:srcZone,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(adjusted).replace(',','')).getTime();
    const dstMs = new Date(new Intl.DateTimeFormat('en-CA',{timeZone:dstZone,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(adjusted).replace(',','')).getTime();
    const hourDiff = Math.round((dstMs - srcMs) / 3600000);
    const badge = document.getElementById('resDiff');
    if (hourDiff === 0) { badge.className='diff-badge same'; badge.textContent='Same time'; }
    else if (hourDiff > 0) { badge.className='diff-badge ahead'; badge.textContent=`+${hourDiff}h ahead`; }
    else { badge.className='diff-badge behind'; badge.textContent=`${hourDiff}h behind`; }
}
function swapZones() {
    const s = document.getElementById('srcZone');
    const d = document.getElementById('dstZone');
    [s.value, d.value] = [d.value, s.value];
    convert();
}
function copyResult() {
    const t = document.getElementById('resTime').textContent;
    const d = document.getElementById('resDate').textContent;
    const o = document.getElementById('resOffset').textContent;
    navigator.clipboard.writeText(`${t} — ${d}\n${o}`);
}
// World Clock
function renderWorldClock() {
    const grid = document.getElementById('worldClockGrid');
    grid.innerHTML = '';
    const now = new Date();
    worldClocks.forEach((tz, i) => {
        const fmt = new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
        const dfmt = new Intl.DateTimeFormat('en-US',{timeZone:tz,weekday:'short',month:'short',day:'numeric'});
        const hfmt = new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',hour12:false});
        const h = parseInt(hfmt.format(now));
        const isDay = h >= 6 && h < 20;
        const div = document.createElement('div');
        div.className = 'clock-item';
        div.innerHTML = `
            <button class="clock-remove" onclick="removeClockZone(${i})">&times;</button>
            <div class="clock-city"><span class="day-indicator ${isDay?'day':'night'}"></span>${shortName(tz)}</div>
            <div class="clock-time">${fmt.format(now)}</div>
            <div class="clock-date">${dfmt.format(now)}</div>
            <div class="clock-offset">${getOffset(tz, now)}</div>
        `;
        grid.appendChild(div);
    });
}
function addClockZone() {
    const tz = document.getElementById('addClockZone').value;
    if (!worldClocks.includes(tz)) { worldClocks.push(tz); localStorage.setItem('tz_world', JSON.stringify(worldClocks)); renderWorldClock(); }
}
function removeClockZone(i) {
    worldClocks.splice(i, 1);
    localStorage.setItem('tz_world', JSON.stringify(worldClocks));
    renderWorldClock();
}
// Meeting Planner
function renderPlanner() {
    const container = document.getElementById('plannerTimeline');
    if (plannerZones.length === 0) { container.innerHTML = '<p style="color:var(--muted);font-size:.8rem">Add time zones to compare work hours.</p>'; return; }
    const now = new Date();
    const localHour = parseInt(new Intl.DateTimeFormat('en-US',{timeZone:plannerZones[0],hour:'numeric',hour12:false}).format(now));
    let html = '<div class="timeline-grid"><div class="timeline-header" style="border:none"></div>';
    for (let h = 0; h < 24; h++) html += `<div class="timeline-header">${h.toString().padStart(2,'0')}</div>`;
    html += '';
    plannerZones.forEach(tz => {
        html += `<div class="timeline-label">${shortName(tz)}</div>`;
        for (let h = 0; h < 24; h++) {
            // Convert h in first zone to this zone
            const ref = new Date(now);
            ref.setHours(h, 0, 0, 0);
            const localH = parseInt(new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',hour12:false}).format(ref));
            const inWork = localH >= 9 && localH < 18;
            const isCurrent = h === now.getHours();
            html += `<div class="timeline-cell${inWork?' work':''}${isCurrent?' current':' sleep'}"></div>`;
        }
    });
    html += '</div>';
    container.innerHTML = html;
}
function addPlannerZone() {
    const tz = document.getElementById('addPlannerZone').value;
    if (!plannerZones.includes(tz)) { plannerZones.push(tz); localStorage.setItem('tz_planner', JSON.stringify(plannerZones)); renderPlanner(); }
}
function resetPlanner() {
    plannerZones = [];
    localStorage.setItem('tz_planner', JSON.stringify(plannerZones));
    renderPlanner();
}
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    ['convert','worldclock','planner'].forEach(t => {
        document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
    });
    if (tab === 'worldclock') renderWorldClock();
    if (tab === 'planner') renderPlanner();
}
// Init
initSelects();
setNow();
document.getElementById('srcDateTime').addEventListener('input', convert);
document.getElementById('srcZone').addEventListener('change', convert);
document.getElementById('dstZone').addEventListener('change', convert);
clockInterval = setInterval(() => {
    if (document.getElementById('tab-worldclock').style.display !== 'none') renderWorldClock();
}, 1000);
</script>
</body>
</html>
