<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Format Converter — Free Online PNG/JPG/WebP/BMP Converter</title>
<meta name="description" content="Convert images between PNG, JPG, WebP, BMP, and GIF formats instantly in your browser. No upload needed — 100% client-side, private, and free.">
<meta name="keywords" content="image converter, PNG to JPG, JPG to WebP, WebP to PNG, image format converter, online image converter, free image converter, browser image converter">
<meta name="author" content="Steven Li">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/imgconvert.html">
<meta property="og:title" content="Image Format Converter — Free Online Tool">
<meta property="og:description" content="Convert images between PNG, JPG, WebP, BMP formats instantly in your browser. No upload, 100% private.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/imgconvert.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Image Format Converter — Free Online Tool">
<meta name="twitter:description" content="Convert images between PNG, JPG, WebP, BMP formats instantly. No server upload needed.">
<link rel="stylesheet" href="toolbox.css">
<style>
  main{max-width:900px;margin:0 auto;padding:0 20px 20px}
  .drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;color:var(--muted);transition:border-color .15s}
  .drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);color:var(--text)}
  .drop-zone svg{width:40px;height:40px;stroke:var(--muted);margin-bottom:8px}
  #fileInput{display:none}
  .batch-list{margin-top:12px}
  .batch-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;font-size:.85rem}
  .batch-item img{width:36px;height:36px;object-fit:cover;border-radius:4px}
  .batch-item .name{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .batch-item .size{color:var(--muted);font-size:.8rem}
  .batch-item .status{font-size:.85rem}
  .batch-item .status.done{color:var(--success)}
  .batch-item .remove{cursor:pointer;color:var(--muted);font-size:1.1rem;padding:0 4px}
  .batch-item .remove:hover{color:var(--error)}
  .controls{margin-top:14px}
  .control-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:.85rem}
  .control-row label{font-weight:600;min-width:60px}
  .quality-val{min-width:36px;text-align:right;font-weight:600}
  .progress-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;opacity:0;transition:opacity .2s}
  .progress-bar.active{opacity:1}
  .progress-bar .fill{height:100%;background:var(--accent);transition:width .3s}
  .preview-area{display:none;margin-top:16px}
  .preview-area.active{display:block}
  .preview-container{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .preview-box{text-align:center}
  .preview-box h3{font-size:.85rem;margin-bottom:6px}
  .preview-box img{max-width:100%;max-height:200px;border-radius:var(--radius);border:1px solid var(--border)}
  .file-info{font-size:.8rem;color:var(--muted);margin-top:4px}
  @media(max-width:768px){.preview-container{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>🖼️ Image Format Converter</h1>
<p>Convert between PNG, JPG, WebP, and BMP — 100% in your browser</p>
</header>
<main>
<div class="drop-zone" id="dropZone">
<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
<p>Drop images here or click to browse</p>
<div class="hint">Supports PNG, JPG, WebP, BMP, GIF • Multiple files OK</div>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>

<div class="batch-list" id="batchList"></div>

<div class="controls" id="controls" style="display:none">
<div class="control-row">
<label for="formatSelect">Output</label>
<select id="formatSelect">
<option value="image/png">PNG</option>
<option value="image/jpeg">JPG</option>
<option value="image/webp" selected>WebP</option>
<option value="image/bmp">BMP</option>
</select>
</div>
<div class="control-row" id="qualityRow">
<label for="qualityRange">Quality</label>
<input type="range" id="qualityRange" min="1" max="100" value="90">
<span class="quality-val" id="qualityVal">90%</span>
</div>
<div class="control-row" id="resizeRow">
<label>Resize</label>
<select id="resizeSelect">
<option value="original">Original Size</option>
<option value="0.75">75%</option>
<option value="0.5">50%</option>
<option value="0.25">25%</option>
<option value="1920">Max 1920px</option>
<option value="1280">Max 1280px</option>
<option value="800">Max 800px</option>
<option value="512">Max 512px</option>
</select>
</div>
<div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
<div class="btn-row" style="margin-top:1rem">
<button class="btn btn-primary" id="convertBtn" disabled>Convert & Download</button>
<button class="btn btn-secondary" id="clearBtn">Clear All</button>
</div>
</div>

<div class="preview-area" id="previewArea">
<div class="preview-container">
<div class="preview-box">
<h3>Original</h3>
<img id="previewOriginal" alt="Original preview">
<div class="file-info" id="origInfo"></div>
</div>
<div class="preview-box">
<h3>Converted</h3>
<img id="previewConverted" alt="Converted preview">
<div class="file-info" id="convInfo"></div>
</div>
</div>
</div>
</main>
<footer>
<a class="coffee" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
<br>
<a href="https://stevenli-phoenix.github.io/toolbox/">← More Tools</a>
</footer>
<script>
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),batchList=document.getElementById('batchList'),controls=document.getElementById('controls'),formatSelect=document.getElementById('formatSelect'),qualityRange=document.getElementById('qualityRange'),qualityVal=document.getElementById('qualityVal'),qualityRow=document.getElementById('qualityRow'),resizeSelect=document.getElementById('resizeSelect'),convertBtn=document.getElementById('convertBtn'),clearBtn=document.getElementById('clearBtn'),progressBar=document.getElementById('progressBar'),progressFill=document.getElementById('progressFill'),previewArea=document.getElementById('previewArea'),previewOriginal=document.getElementById('previewOriginal'),previewConverted=document.getElementById('previewConverted'),origInfo=document.getElementById('origInfo'),convInfo=document.getElementById('convInfo');

let files=[];

dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');addFiles(e.dataTransfer.files)});
fileInput.addEventListener('change',e=>addFiles(e.target.files));

formatSelect.addEventListener('change',updateQualityVisibility);
qualityRange.addEventListener('input',()=>{qualityVal.textContent=qualityRange.value+'%'});

function updateQualityVisibility(){
  const fmt=formatSelect.value;
  qualityRow.style.display=(fmt==='image/png'||fmt==='image/bmp')?'none':'flex';
}

function formatSize(b){
  if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  return(b/1048576).toFixed(1)+' MB';
}

function getExt(mime){return{['image/png']:'.png',['image/jpeg']:'.jpg',['image/webp']:'.webp',['image/bmp']:'.bmp'}[mime]||'.png'}

function addFiles(fileList){
  for(const f of fileList){
    if(!f.type.startsWith('image/'))continue;
    files.push({file:f,url:URL.createObjectURL(f)});
  }
  renderList();
  controls.style.display=files.length?'block':'none';
  convertBtn.disabled=!files.length;
}

function renderList(){
  batchList.innerHTML='';
  files.forEach((item,i)=>{
    const el=document.createElement('div');
    el.className='batch-item';
    el.innerHTML=`<img src="${item.url}" alt=""><span class="name">${item.file.name}</span><span class="size">${formatSize(item.file.size)}</span><span class="status" id="status-${i}"></span><span class="remove" data-i="${i}">&times;</span>`;
    batchList.appendChild(el);
  });
  batchList.querySelectorAll('.remove').forEach(btn=>btn.addEventListener('click',e=>{
    const idx=+e.target.dataset.i;
    URL.revokeObjectURL(files[idx].url);
    files.splice(idx,1);
    renderList();
    controls.style.display=files.length?'block':'none';
    convertBtn.disabled=!files.length;
    previewArea.classList.remove('active');
  }));
}

function loadImage(src){
  return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src});
}

function calcSize(img,opt){
  let w=img.naturalWidth,h=img.naturalHeight;
  const v=opt;
  if(v==='original')return{w,h};
  const n=parseFloat(v);
  if(n<=1){w=Math.round(w*n);h=Math.round(h*n)}
  else{if(w>n||h>n){const r=Math.min(n/w,n/h);w=Math.round(w*r);h=Math.round(h*r)}}
  return{w,h};
}

async function convertOne(item,fmt,quality,resize){
  const img=await loadImage(item.url);
  const{w,h}=calcSize(img,resize);
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  if(fmt==='image/jpeg'||fmt==='image/bmp'){ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h)}
  ctx.drawImage(img,0,0,w,h);
  return new Promise(res=>{
    c.toBlob(blob=>{
      const base=item.file.name.replace(/\.[^.]+$/,'');
      res({blob,name:base+getExt(fmt),originalSize:item.file.size});
    },fmt,quality);
  });
}

convertBtn.addEventListener('click',async()=>{
  const fmt=formatSelect.value;
  const quality=parseFloat(qualityRange.value)/100;
  const resize=resizeSelect.value;
  convertBtn.disabled=true;
  progressBar.classList.add('active');
  progressFill.style.width='0%';

  const results=[];
  for(let i=0;i<files.length;i++){
    const statusEl=document.getElementById('status-'+i);
    try{
      const r=await convertOne(files[i],fmt,quality,resize);
      results.push(r);
      statusEl.textContent='✓';statusEl.className='status done';
    }catch(e){
      statusEl.textContent='✗';statusEl.className='status';statusEl.style.color='#f85149';
    }
    progressFill.style.width=((i+1)/files.length*100)+'%';
  }

  if(results.length===1){
    const r=results[0];
    const a=document.createElement('a');
    a.href=URL.createObjectURL(r.blob);a.download=r.name;a.click();
    URL.revokeObjectURL(a.href);
    // show preview
    previewOriginal.src=files[0].url;
    origInfo.textContent=files[0].file.name+' — '+formatSize(files[0].file.size);
    const convUrl=URL.createObjectURL(r.blob);
    previewConverted.src=convUrl;
    convInfo.textContent=r.name+' — '+formatSize(r.blob.size);
    previewArea.classList.add('active');
  }else if(results.length>1){
    // download as zip if available, otherwise one by one
    if(typeof JSZip!=='undefined'||true){
      // sequential downloads
      for(const r of results){
        const a=document.createElement('a');
        a.href=URL.createObjectURL(r.blob);a.download=r.name;a.click();
        URL.revokeObjectURL(a.href);
        await new Promise(r=>setTimeout(r,300));
      }
    }
    previewArea.classList.remove('active');
  }

  convertBtn.disabled=false;
  setTimeout(()=>{progressBar.classList.remove('active')},1000);
});

clearBtn.addEventListener('click',()=>{
  files.forEach(f=>URL.revokeObjectURL(f.url));
  files=[];
  renderList();
  controls.style.display='none';
  convertBtn.disabled=true;
  previewArea.classList.remove('active');
  fileInput.value='';
});

updateQualityVisibility();
</script>
</body>
</html>
