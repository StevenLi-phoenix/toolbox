<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh;display:flex;flex-direction:column}
header{text-align:center;padding:2rem 1rem 1rem}
header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:#8b949e;margin-top:.4rem;font-size:.95rem}
main{flex:1;max-width:800px;width:100%;margin:0 auto;padding:1rem}
.drop-zone{border:2px dashed #30363d;border-radius:12px;padding:3rem 1.5rem;text-align:center;cursor:pointer;transition:all .2s;background:#161b22;margin-bottom:1.5rem}
.drop-zone:hover,.drop-zone.dragover{border-color:#58a6ff;background:#1a2332}
.drop-zone svg{width:48px;height:48px;stroke:#58a6ff;margin-bottom:1rem}
.drop-zone p{color:#8b949e;font-size:.95rem}
.drop-zone .hint{font-size:.8rem;color:#484f58;margin-top:.5rem}
input[type="file"]{display:none}
.preview-area{display:none;margin-bottom:1.5rem}
.preview-area.active{display:block}
.preview-container{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.preview-box{flex:1;min-width:200px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1rem;text-align:center}
.preview-box h3{font-size:.85rem;color:#8b949e;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.05em}
.preview-box img{max-width:100%;max-height:250px;border-radius:6px;object-fit:contain;background:repeating-conic-gradient(#21262d 0% 25%,#161b22 0% 50%) 50%/16px 16px}
.file-info{margin-top:.5rem;font-size:.8rem;color:#58a6ff}
.controls{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1.25rem;margin-bottom:1.5rem}
.control-row{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.control-row:last-child{margin-bottom:0}
label{font-size:.85rem;color:#c9d1d9;font-weight:500;min-width:80px}
select,input[type="range"]{background:#0d1117;border:1px solid #30363d;color:#e1e4e8;border-radius:6px;padding:.5rem .75rem;font-size:.9rem;flex:1;max-width:250px}
select:focus,input[type="range"]:focus{outline:none;border-color:#58a6ff}
input[type="range"]{padding:.25rem;cursor:pointer;-webkit-appearance:none;height:6px;border-radius:3px;background:#30363d}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#58a6ff;cursor:pointer}
.quality-val{font-size:.85rem;color:#58a6ff;min-width:40px;text-align:center}
.btn-row{display:flex;gap:.75rem;flex-wrap:wrap}
.btn{padding:.65rem 1.5rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.btn-secondary:hover{background:#30363d}
.batch-list{margin-top:1rem}
.batch-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;background:#0d1117;border:1px solid #30363d;border-radius:8px;margin-bottom:.5rem;font-size:.85rem}
.batch-item img{width:40px;height:40px;object-fit:cover;border-radius:4px;background:repeating-conic-gradient(#21262d 0% 25%,#161b22 0% 50%) 50%/8px 8px}
.batch-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#c9d1d9}
.batch-item .size{color:#8b949e;min-width:70px;text-align:right}
.batch-item .status{min-width:24px;text-align:center}
.batch-item .status.done{color:#3fb950}
.batch-item .remove{cursor:pointer;color:#484f58;font-size:1.1rem;padding:0 .25rem}
.batch-item .remove:hover{color:#f85149}
.progress-bar{width:100%;height:4px;background:#21262d;border-radius:2px;margin-top:.5rem;overflow:hidden;display:none}
.progress-bar.active{display:block}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,#58a6ff,#bc8cff);border-radius:2px;transition:width .3s}
footer{text-align:center;padding:1.5rem 1rem;border-top:1px solid #21262d;margin-top:auto}
footer a{color:#58a6ff;text-decoration:none;font-size:.85rem}
footer a:hover{text-decoration:underline}
.coffee{display:inline-flex;align-items:center;gap:.4rem;background:#ffdd00;color:#0d0d0d;padding:.4rem .9rem;border-radius:6px;font-weight:600;font-size:.82rem;text-decoration:none;margin-bottom:.5rem}
.coffee:hover{background:#ffcc00;text-decoration:none}
@media(max-width:600px){
  header h1{font-size:1.4rem}
  .preview-container{flex-direction:column}
  .control-row{flex-direction:column;align-items:stretch}
  select,input[type="range"]{max-width:100%}
  .btn-row{flex-direction:column}
  .btn{width:100%;text-align:center}
}
</style>
</head>
<body>
<header>
<h1>🖼️ Image Format Converter</h1>
<p>Convert between PNG, JPG, WebP, and BMP — 100% in your browser</p>
</header>
<main>
<div class="drop-zone" id="dropZone">
<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
<p>Drop images here or click to browse</p>
<div class="hint">Supports PNG, JPG, WebP, BMP, GIF • Multiple files OK</div>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>

<div class="batch-list" id="batchList"></div>

<div class="controls" id="controls" style="display:none">
<div class="control-row">
<label for="formatSelect">Output</label>
<select id="formatSelect">
<option value="image/png">PNG</option>
<option value="image/jpeg">JPG</option>
<option value="image/webp" selected>WebP</option>
<option value="image/bmp">BMP</option>
</select>
</div>
<div class="control-row" id="qualityRow">
<label for="qualityRange">Quality</label>
<input type="range" id="qualityRange" min="1" max="100" value="90">
<span class="quality-val" id="qualityVal">90%</span>
</div>
<div class="control-row" id="resizeRow">
<label>Resize</label>
<select id="resizeSelect">
<option value="original">Original Size</option>
<option value="0.75">75%</option>
<option value="0.5">50%</option>
<option value="0.25">25%</option>
<option value="1920">Max 1920px</option>
<option value="1280">Max 1280px</option>
<option value="800">Max 800px</option>
<option value="512">Max 512px</option>
</select>
</div>
<div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
<div class="btn-row" style="margin-top:1rem">
<button class="btn btn-primary" id="convertBtn" disabled>Convert & Download</button>
<button class="btn btn-secondary" id="clearBtn">Clear All</button>
</div>
</div>

<div class="preview-area" id="previewArea">
<div class="preview-container">
<div class="preview-box">
<h3>Original</h3>
<img id="previewOriginal" alt="Original preview">
<div class="file-info" id="origInfo"></div>
</div>
<div class="preview-box">
<h3>Converted</h3>
<img id="previewConverted" alt="Converted preview">
<div class="file-info" id="convInfo"></div>
</div>
</div>
</div>
</main>
<footer>
<a class="coffee" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
<br>
<a href="https://stevenli-phoenix.github.io/toolbox/">← More Tools</a>
</footer>
<script>
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),batchList=document.getElementById('batchList'),controls=document.getElementById('controls'),formatSelect=document.getElementById('formatSelect'),qualityRange=document.getElementById('qualityRange'),qualityVal=document.getElementById('qualityVal'),qualityRow=document.getElementById('qualityRow'),resizeSelect=document.getElementById('resizeSelect'),convertBtn=document.getElementById('convertBtn'),clearBtn=document.getElementById('clearBtn'),progressBar=document.getElementById('progressBar'),progressFill=document.getElementById('progressFill'),previewArea=document.getElementById('previewArea'),previewOriginal=document.getElementById('previewOriginal'),previewConverted=document.getElementById('previewConverted'),origInfo=document.getElementById('origInfo'),convInfo=document.getElementById('convInfo');

let files=[];

dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');addFiles(e.dataTransfer.files)});
fileInput.addEventListener('change',e=>addFiles(e.target.files));

formatSelect.addEventListener('change',updateQualityVisibility);
qualityRange.addEventListener('input',()=>{qualityVal.textContent=qualityRange.value+'%'});

function updateQualityVisibility(){
  const fmt=formatSelect.value;
  qualityRow.style.display=(fmt==='image/png'||fmt==='image/bmp')?'none':'flex';
}

function formatSize(b){
  if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  return(b/1048576).toFixed(1)+' MB';
}

function getExt(mime){return{['image/png']:'.png',['image/jpeg']:'.jpg',['image/webp']:'.webp',['image/bmp']:'.bmp'}[mime]||'.png'}

function addFiles(fileList){
  for(const f of fileList){
    if(!f.type.startsWith('image/'))continue;
    files.push({file:f,url:URL.createObjectURL(f)});
  }
  renderList();
  controls.style.display=files.length?'block':'none';
  convertBtn.disabled=!files.length;
}

function renderList(){
  batchList.innerHTML='';
  files.forEach((item,i)=>{
    const el=document.createElement('div');
    el.className='batch-item';
    el.innerHTML=`<img src="${item.url}" alt=""><span class="name">${item.file.name}</span><span class="size">${formatSize(item.file.size)}</span><span class="status" id="status-${i}"></span><span class="remove" data-i="${i}">&times;</span>`;
    batchList.appendChild(el);
  });
  batchList.querySelectorAll('.remove').forEach(btn=>btn.addEventListener('click',e=>{
    const idx=+e.target.dataset.i;
    URL.revokeObjectURL(files[idx].url);
    files.splice(idx,1);
    renderList();
    controls.style.display=files.length?'block':'none';
    convertBtn.disabled=!files.length;
    previewArea.classList.remove('active');
  }));
}

function loadImage(src){
  return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src});
}

function calcSize(img,opt){
  let w=img.naturalWidth,h=img.naturalHeight;
  const v=opt;
  if(v==='original')return{w,h};
  const n=parseFloat(v);
  if(n<=1){w=Math.round(w*n);h=Math.round(h*n)}
  else{if(w>n||h>n){const r=Math.min(n/w,n/h);w=Math.round(w*r);h=Math.round(h*r)}}
  return{w,h};
}

async function convertOne(item,fmt,quality,resize){
  const img=await loadImage(item.url);
  const{w,h}=calcSize(img,resize);
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  if(fmt==='image/jpeg'||fmt==='image/bmp'){ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h)}
  ctx.drawImage(img,0,0,w,h);
  return new Promise(res=>{
    c.toBlob(blob=>{
      const base=item.file.name.replace(/\.[^.]+$/,'');
      res({blob,name:base+getExt(fmt),originalSize:item.file.size});
    },fmt,quality);
  });
}

convertBtn.addEventListener('click',async()=>{
  const fmt=formatSelect.value;
  const quality=parseFloat(qualityRange.value)/100;
  const resize=resizeSelect.value;
  convertBtn.disabled=true;
  progressBar.classList.add('active');
  progressFill.style.width='0%';

  const results=[];
  for(let i=0;i<files.length;i++){
    const statusEl=document.getElementById('status-'+i);
    try{
      const r=await convertOne(files[i],fmt,quality,resize);
      results.push(r);
      statusEl.textContent='✓';statusEl.className='status done';
    }catch(e){
      statusEl.textContent='✗';statusEl.className='status';statusEl.style.color='#f85149';
    }
    progressFill.style.width=((i+1)/files.length*100)+'%';
  }

  if(results.length===1){
    const r=results[0];
    const a=document.createElement('a');
    a.href=URL.createObjectURL(r.blob);a.download=r.name;a.click();
    URL.revokeObjectURL(a.href);
    // show preview
    previewOriginal.src=files[0].url;
    origInfo.textContent=files[0].file.name+' — '+formatSize(files[0].file.size);
    const convUrl=URL.createObjectURL(r.blob);
    previewConverted.src=convUrl;
    convInfo.textContent=r.name+' — '+formatSize(r.blob.size);
    previewArea.classList.add('active');
  }else if(results.length>1){
    // download as zip if available, otherwise one by one
    if(typeof JSZip!=='undefined'||true){
      // sequential downloads
      for(const r of results){
        const a=document.createElement('a');
        a.href=URL.createObjectURL(r.blob);a.download=r.name;a.click();
        URL.revokeObjectURL(a.href);
        await new Promise(r=>setTimeout(r,300));
      }
    }
    previewArea.classList.remove('active');
  }

  convertBtn.disabled=false;
  setTimeout(()=>{progressBar.classList.remove('active')},1000);
});

clearBtn.addEventListener('click',()=>{
  files.forEach(f=>URL.revokeObjectURL(f.url));
  files=[];
  renderList();
  controls.style.display='none';
  convertBtn.disabled=true;
  previewArea.classList.remove('active');
  fileInput.value='';
});

updateQualityVisibility();
</script>
</body>
</html>
