<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Expression Builder - Free Online Tool</title>
<meta name="description" content="Free online cron expression generator and parser. Build cron schedules visually, see next run times, and get human-readable descriptions. No signup required.">
<meta name="keywords" content="cron expression, cron generator, crontab, cron schedule, cron parser, free cron tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/cron.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--error:#ef4444;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:800px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
label{display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:.35rem;margin-top:.75rem}
label:first-child{margin-top:0}
input[type="text"],select{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;font-family:'Courier New',monospace;font-size:1rem}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.cron-input{font-size:1.4rem;text-align:center;letter-spacing:6px;font-weight:700}
.cron-parts{display:grid;grid-template-columns:repeat(5,1fr);gap:.75rem;margin-top:1rem}
.part{text-align:center}
.part-label{font-size:.7rem;color:var(--muted);margin-bottom:.3rem;font-weight:600;text-transform:uppercase}
.part select{font-family:var(--font);font-size:.85rem;text-align:center}
.description{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:1rem;font-size:.95rem;text-align:center;min-height:44px}
.next-runs{margin-top:1rem}
.run-item{display:flex;align-items:center;gap:.5rem;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.85rem;font-family:'Courier New',monospace}
.run-item:last-child{border-bottom:none}
.run-idx{color:var(--accent);font-weight:600;width:20px}
.presets{display:flex;flex-wrap:wrap;gap:.5rem}
.preset{padding:.35rem .7rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer}
.preset:hover{border-color:var(--accent);color:var(--text)}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
@media(max-width:600px){.cron-parts{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Cron Expression Builder</h1>
<p class="subtitle">Build and understand cron schedules visually</p>

<div class="card">
<h2>⏰ Expression</h2>
<input type="text" id="cron" class="cron-input" value="0 9 * * 1-5" oninput="parse()">
<div class="cron-parts">
<div class="part"><div class="part-label">Minute</div><select id="p-min" onchange="build()"></select></div>
<div class="part"><div class="part-label">Hour</div><select id="p-hour" onchange="build()"></select></div>
<div class="part"><div class="part-label">Day (Month)</div><select id="p-dom" onchange="build()"></select></div>
<div class="part"><div class="part-label">Month</div><select id="p-month" onchange="build()"></select></div>
<div class="part"><div class="part-label">Day (Week)</div><select id="p-dow" onchange="build()"></select></div>
</div>
<div class="description" id="desc"></div>
</div>

<div class="card">
<h2>📅 Next 5 Runs</h2>
<div class="next-runs" id="runs"></div>
</div>

<div class="card">
<h2>⚡ Presets</h2>
<div class="presets">
<button class="preset" onclick="set('* * * * *')">Every minute</button>
<button class="preset" onclick="set('*/5 * * * *')">Every 5 min</button>
<button class="preset" onclick="set('*/15 * * * *')">Every 15 min</button>
<button class="preset" onclick="set('0 * * * *')">Every hour</button>
<button class="preset" onclick="set('0 */6 * * *')">Every 6 hours</button>
<button class="preset" onclick="set('0 0 * * *')">Daily midnight</button>
<button class="preset" onclick="set('0 9 * * 1-5')">Weekdays 9am</button>
<button class="preset" onclick="set('0 0 * * 0')">Weekly Sunday</button>
<button class="preset" onclick="set('0 0 1 * *')">Monthly 1st</button>
<button class="preset" onclick="set('0 0 1 1 *')">Yearly Jan 1</button>
</div>
</div>

<div class="card">
<div class="btn-row">
<button class="btn-primary" onclick="copy()">📋 Copy Expression</button>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
function $id(id){return document.getElementById(id)}
const MONTHS=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function initSelects(){
  const minOpts=['*','*/5','*/10','*/15','*/30',...Array.from({length:60},(_,i)=>String(i))];
  const hourOpts=['*','*/2','*/3','*/4','*/6','*/8','*/12',...Array.from({length:24},(_,i)=>String(i))];
  const domOpts=['*','*/2',...Array.from({length:31},(_,i)=>String(i+1))];
  const monthOpts=['*',...Array.from({length:12},(_,i)=>String(i+1))];
  const dowOpts=['*','1-5','0,6','0','1','2','3','4','5','6'];

  fill('p-min',minOpts);fill('p-hour',hourOpts);fill('p-dom',domOpts);fill('p-month',monthOpts);fill('p-dow',dowOpts);
}

function fill(id,opts){
  $id(id).innerHTML=opts.map(o=>`<option value="${o}">${o}</option>`).join('');
}

function build(){
  const expr=[$id('p-min').value,$id('p-hour').value,$id('p-dom').value,$id('p-month').value,$id('p-dow').value].join(' ');
  $id('cron').value=expr;
  parse();
}

function parse(){
  const parts=$id('cron').value.trim().split(/\s+/);
  if(parts.length!==5){$id('desc').textContent='Invalid: need exactly 5 fields';$id('runs').innerHTML='';return}

  // Sync selects
  ['p-min','p-hour','p-dom','p-month','p-dow'].forEach((id,i)=>{
    const sel=$id(id);
    if([...sel.options].some(o=>o.value===parts[i])) sel.value=parts[i];
  });

  $id('desc').textContent=describe(parts);
  calcNextRuns(parts);
}

function describe(p){
  let d='Runs ';
  // Minute
  if(p[0]==='*') d+='every minute';
  else if(p[0].startsWith('*/')) d+=`every ${p[0].slice(2)} minutes`;
  else d+=`at minute ${p[0]}`;
  // Hour
  if(p[1]==='*') d+=' of every hour';
  else if(p[1].startsWith('*/')) d+=` every ${p[1].slice(2)} hours`;
  else d+=` at ${p[1].padStart(2,'0')}:${p[0]==='*'?'xx':p[0].padStart(2,'0')}`;
  // DOM
  if(p[2]!=='*'){
    if(p[2].startsWith('*/')) d+=` every ${p[2].slice(2)} days`;
    else d+=` on day ${p[2]}`;
  }
  // Month
  if(p[3]!=='*') d+=` in ${MONTHS[parseInt(p[3])]||p[3]}`;
  // DOW
  if(p[4]!=='*'){
    if(p[4]==='1-5') d+=' (weekdays)';
    else if(p[4]==='0,6') d+=' (weekends)';
    else{const days=p[4].split(',').map(n=>DAYS[parseInt(n)]||n).join(', ');d+=` on ${days}`}
  }
  return d;
}

function expandField(field,min,max){
  if(field==='*') return Array.from({length:max-min+1},(_,i)=>i+min);
  const result=new Set();
  field.split(',').forEach(part=>{
    if(part.includes('/')){
      const [range,step]=part.split('/');
      const s=parseInt(step);
      let start=min;
      if(range!=='*') start=parseInt(range);
      for(let i=start;i<=max;i+=s) result.add(i);
    }else if(part.includes('-')){
      const [a,b]=part.split('-').map(Number);
      for(let i=a;i<=b;i++) result.add(i);
    }else result.add(parseInt(part));
  });
  return [...result].sort((a,b)=>a-b);
}

function calcNextRuns(p){
  const mins=expandField(p[0],0,59);
  const hours=expandField(p[1],0,23);
  const doms=expandField(p[2],1,31);
  const months=expandField(p[3],1,12);
  const dows=expandField(p[4],0,6);

  const now=new Date();
  const runs=[];
  let d=new Date(now);
  d.setSeconds(0,0);

  for(let i=0;i<525960&&runs.length<5;i++){
    d=new Date(d.getTime()+60000);
    if(months.includes(d.getMonth()+1)&&
       (p[2]==='*'||doms.includes(d.getDate()))&&
       (p[4]==='*'||dows.includes(d.getDay()))&&
       hours.includes(d.getHours())&&
       mins.includes(d.getMinutes())){
      runs.push(new Date(d));
    }
  }

  $id('runs').innerHTML=runs.length?runs.map((r,i)=>`<div class="run-item"><span class="run-idx">${i+1}</span>${r.toLocaleString()}</div>`).join(''):'<div style="color:var(--muted);font-size:.85rem">No upcoming runs found within the next year</div>';
}

function set(expr){$id('cron').value=expr;parse()}

function copy(){
  navigator.clipboard.writeText($id('cron').value).then(()=>{
    const t=$id('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

initSelects();parse();
</script>
</body>
</html>
