<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fetch API Code Generator - Free Online Tool</title>
<meta name="description" content="Build JavaScript fetch() calls visually. Configure method, headers, body, auth, and generate copy-paste code. 100% client-side.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/fetchbuilder.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .header-row { display: flex; gap: .5rem; margin-bottom: .5rem; align-items: center; }
  .header-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .85rem; }
  .header-row button { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--error); cursor: pointer; font-size: .85rem; }
  .header-row button:hover { background: var(--surface2); }
  .add-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; font-size: .85rem; }
  .add-btn:hover { background: var(--surface2); }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .35rem; color: var(--text); }
  .form-group select, .form-group input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--sans); font-size: .9rem; }
  .form-group select { font-family: var(--sans); }
  .form-row { display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; }
  #output { min-height: 300px; font-family: var(--mono); font-size: .85rem; white-space: pre; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; overflow: auto; line-height: 1.5; }
  .output-tabs { display: flex; gap: .5rem; margin-bottom: .75rem; }
  .output-tab { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--muted); cursor: pointer; font-size: .82rem; }
  .output-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .actions { display: flex; gap: .5rem; margin-top: .75rem; }
  @media (max-width: 768px) {
    .panels { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>Fetch API Code Generator</h1>
<p class="subtitle">Build JavaScript fetch() calls visually &mdash; configure method, headers, body, and auth, then copy the generated code.</p>

<div class="panels">
<div>
  <div class="card">
    <h2>🌐 Request</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Method</label>
        <select id="method" onchange="generate()">
          <option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option><option>HEAD</option><option>OPTIONS</option>
        </select>
      </div>
      <div class="form-group">
        <label>URL</label>
        <input id="url" type="text" value="https://api.example.com/data" oninput="generate()" placeholder="https://api.example.com/endpoint">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>📋 Headers</h2>
    <div id="headers"></div>
    <button class="add-btn" onclick="addHeader()">+ Add Header</button>
  </div>

  <div class="card">
    <h2>🔐 Auth</h2>
    <div class="form-group">
      <label>Type</label>
      <select id="authType" onchange="toggleAuth();generate()">
        <option value="none">None</option>
        <option value="bearer">Bearer Token</option>
        <option value="basic">Basic Auth</option>
        <option value="apikey">API Key (Header)</option>
      </select>
    </div>
    <div id="authFields"></div>
  </div>

  <div class="card" id="bodyCard">
    <h2>📦 Body</h2>
    <div class="form-group">
      <label>Content Type</label>
      <select id="bodyType" onchange="generate()">
        <option value="json">JSON</option>
        <option value="form">URL-Encoded Form</option>
        <option value="text">Plain Text</option>
        <option value="none">None</option>
      </select>
    </div>
    <textarea id="bodyContent" placeholder='{"key": "value"}' oninput="generate()"></textarea>
  </div>

  <div class="card">
    <h2>⚙️ Options</h2>
    <div class="form-group">
      <label><input type="checkbox" id="optCors" onchange="generate()"> CORS mode</label>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="optCredentials" onchange="generate()"> Include credentials</label>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="optAsync" checked onchange="generate()"> async/await syntax</label>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="optError" checked onchange="generate()"> Error handling</label>
    </div>
  </div>
</div>

<div>
  <div class="card">
    <h2>💻 Generated Code</h2>
    <div class="output-tabs">
      <button class="output-tab active" onclick="setFormat('fetch',this)">fetch()</button>
      <button class="output-tab" onclick="setFormat('axios',this)">axios</button>
      <button class="output-tab" onclick="setFormat('curl',this)">cURL</button>
    </div>
    <div id="output"></div>
    <div class="actions">
      <button class="btn" onclick="copyCode()">Copy Code</button>
      <button class="btn btn-secondary" onclick="resetAll()">Reset</button>
    </div>
  </div>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let headers=[{key:'Content-Type',value:'application/json'}];
let format='fetch';

function renderHeaders(){
  $('headers').innerHTML=headers.map((h,i)=>`<div class="header-row"><input placeholder="Header name" value="${esc(h.key)}" oninput="headers[${i}].key=this.value;generate()"><input placeholder="Value" value="${esc(h.value)}" oninput="headers[${i}].value=this.value;generate()"><button onclick="headers.splice(${i},1);renderHeaders();generate()">×</button></div>`).join('');
}

function esc(s){return s.replace(/"/g,'&quot;');}

function addHeader(){headers.push({key:'',value:''});renderHeaders();generate();}

function toggleAuth(){
  const t=$('authType').value;
  let html='';
  if(t==='bearer') html='<div class="form-group"><label>Token</label><input id="authToken" oninput="generate()" placeholder="your-token-here"></div>';
  else if(t==='basic') html='<div class="form-group"><label>Username</label><input id="authUser" oninput="generate()" placeholder="username"></div><div class="form-group"><label>Password</label><input id="authPass" type="password" oninput="generate()" placeholder="password"></div>';
  else if(t==='apikey') html='<div class="form-group"><label>Header Name</label><input id="authKeyName" value="X-API-Key" oninput="generate()" placeholder="X-API-Key"></div><div class="form-group"><label>Key</label><input id="authKeyVal" oninput="generate()" placeholder="your-api-key"></div>';
  $('authFields').innerHTML=html;
}

function setFormat(f,el){
  format=f;
  document.querySelectorAll('.output-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  generate();
}

function getHeaders(){
  const h={};
  headers.forEach(({key,value})=>{if(key.trim())h[key.trim()]=value;});
  const auth=$('authType').value;
  if(auth==='bearer'){const t=($('authToken')||{}).value||'';if(t)h['Authorization']='Bearer '+t;}
  else if(auth==='basic'){const u=($('authUser')||{}).value||'';const p=($('authPass')||{}).value||'';if(u)h['Authorization']='Basic '+btoa(u+':'+p);}
  else if(auth==='apikey'){const n=($('authKeyName')||{}).value||'X-API-Key';const v=($('authKeyVal')||{}).value||'';if(v)h[n]=v;}
  return h;
}

function getBody(){
  const method=$('method').value;
  if(['GET','HEAD','OPTIONS'].includes(method))return null;
  const bt=$('bodyType').value;
  if(bt==='none')return null;
  const raw=$('bodyContent').value;
  if(!raw.trim())return null;
  if(bt==='json'){try{return JSON.stringify(JSON.parse(raw),null,2);}catch(e){return raw;}}
  return raw;
}

function generate(){
  const method=$('method').value;
  const url=$('url').value||'https://api.example.com/data';
  const h=getHeaders();
  const body=getBody();
  const useAsync=$('optAsync').checked;
  const useError=$('optError').checked;
  const cors=$('optCors').checked;
  const creds=$('optCredentials').checked;

  let code='';
  if(format==='fetch') code=genFetch(method,url,h,body,useAsync,useError,cors,creds);
  else if(format==='axios') code=genAxios(method,url,h,body,useAsync,useError);
  else code=genCurl(method,url,h,body);

  $('output').textContent=code;
}

function genFetch(method,url,h,body,useAsync,useError,cors,creds){
  const opts=[];
  if(method!=='GET')opts.push(`  method: '${method}'`);
  if(Object.keys(h).length)opts.push(`  headers: ${JSON.stringify(h,null,2).split('\n').map((l,i)=>i?'  '+l:l).join('\n')}`);
  if(body)opts.push(`  body: ${$('bodyType').value==='json'?'JSON.stringify('+body+')':JSON.stringify(body)}`);
  if(cors)opts.push(`  mode: 'cors'`);
  if(creds)opts.push(`  credentials: 'include'`);

  const optStr=opts.length?`, {\n${opts.join(',\n')}\n}`:'';
  const fetchCall=`fetch('${url}'${optStr})`;

  if(useAsync){
    let code='';
    if(useError) code+='try {\n';
    const indent=useError?'  ':'';
    code+=`${indent}const response = await ${fetchCall};\n`;
    if(useError) code+=`${indent}if (!response.ok) {\n${indent}  throw new Error(\`HTTP \${response.status}: \${response.statusText}\`);\n${indent}}\n`;
    code+=`${indent}const data = await response.json();\n`;
    code+=`${indent}console.log(data);\n`;
    if(useError) code+=`} catch (error) {\n  console.error('Fetch failed:', error);\n}`;
    return code;
  }else{
    let code=`${fetchCall}\n`;
    if(useError) code+=`  .then(response => {\n    if (!response.ok) {\n      throw new Error(\`HTTP \${response.status}: \${response.statusText}\`);\n    }\n    return response.json();\n  })\n`;
    else code+=`  .then(response => response.json())\n`;
    code+=`  .then(data => console.log(data))`;
    if(useError) code+=`\n  .catch(error => console.error('Fetch failed:', error))`;
    code+=';';
    return code;
  }
}

function genAxios(method,url,h,body,useAsync,useError){
  const m=method.toLowerCase();
  const hasBody=body&&!['get','head','options'].includes(m);
  const config=[];
  if(Object.keys(h).length)config.push(`    headers: ${JSON.stringify(h,null,2).split('\n').map((l,i)=>i?'    '+l:l).join('\n')}`);

  let args=`'${url}'`;
  if(hasBody){
    args+=`, ${$('bodyType').value==='json'?body:JSON.stringify(body)}`;
  }
  if(config.length){
    const cfgStr=`{\n${config.join(',\n')}\n  }`;
    args+=hasBody?`, ${cfgStr}`:`, ${cfgStr}`;
  }

  const call=`axios.${m}(${args})`;

  if(useAsync){
    let code='';
    if(useError) code+='try {\n';
    const indent=useError?'  ':'';
    code+=`${indent}const { data } = await ${call};\n`;
    code+=`${indent}console.log(data);\n`;
    if(useError) code+=`} catch (error) {\n  console.error('Request failed:', error.message);\n}`;
    return code;
  }else{
    let code=`${call}\n  .then(({ data }) => console.log(data))`;
    if(useError) code+=`\n  .catch(error => console.error('Request failed:', error.message))`;
    code+=';';
    return code;
  }
}

function genCurl(method,url,h,body){
  let parts=[`curl`];
  if(method!=='GET')parts.push(`-X ${method}`);
  parts.push(`'${url}'`);
  Object.entries(h).forEach(([k,v])=>parts.push(`-H '${k}: ${v}'`));
  if(body)parts.push(`-d '${body.replace(/'/g,"\\'")}'`);
  if(parts.length<=3) return parts.join(' ');
  return parts.join(' \\\n  ');
}

function copyCode(){
  navigator.clipboard.writeText($('output').textContent).then(()=>{
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function resetAll(){
  $('method').value='GET';
  $('url').value='https://api.example.com/data';
  headers=[{key:'Content-Type',value:'application/json'}];
  $('authType').value='none';$('authFields').innerHTML='';
  $('bodyType').value='json';$('bodyContent').value='';
  $('optCors').checked=false;$('optCredentials').checked=false;
  $('optAsync').checked=true;$('optError').checked=true;
  renderHeaders();generate();
}

renderHeaders();
generate();
</script>
</body>
</html>
