<style>
  body{overflow:hidden;background:#0f172a}

  .tool-btn.active{background:#334155;border-color:#475569;color:#f1f5f9}
  .tool-btn:disabled{opacity:.35;cursor:default}
  .tool-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tooltip{display:none;position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;font-size:.7rem;padding:3px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:20}

  .sep{width:1px;height:24px;background:#334155;margin:0 4px}
  .palette{display:flex;gap:4px;align-items:center}

  .palette-dot.active,.palette-dot:hover{border-color:#f1f5f9}
  .color-wrap{position:relative}
  .color-swatch{width:24px;height:24px;border-radius:4px;border:1px solid #475569;cursor:pointer;overflow:hidden}

  .width-slider{width:80px;accent-color:#94a3b8}
  .width-label{font-size:.75rem;color:#94a3b8;min-width:28px}
  .fill-toggle{font-size:.75rem;color:#94a3b8;display:flex;align-items:center;gap:4px;cursor:pointer}
  .dropdown{display:none;position:absolute;top:100%;right:0;background:#1e293b;border:1px solid #334155;border-radius:6px;overflow:hidden;z-index:30;min-width:180px}

  .canvas-container canvas{position:absolute;top:0;left:0}
  .text-input-overlay{display:none;position:absolute;z-index:5}

  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 12px;background:#1e293b;border-top:1px solid #334155;font-size:.75rem;color:#94a3b8}
  .bg-color-pick{display:flex;align-items:center;gap:6px}
  .bg-swatch{width:20px;height:20px;border-radius:3px;border:1px solid #475569;cursor:pointer;overflow:hidden}
  .bg-swatch input{opacity:0;width:100%;height:100%;cursor:pointer}
  .zoom-controls{display:flex;align-items:center;gap:4px}

  #zoomLabel{min-width:40px;text-align:center}

  <!-- Status bar -->
  <div class="status-bar">
    <div class="bg-color-pick">
      <label>BG:</label>

<script>
'use strict';

const app = (() => {
  // ---- State ----
  const CANVAS_W = 4000, CANVAS_H = 3000;
  let tool = 'pen';
  let color = '#f1f5f9';
  let lineWidth = 3;
  let fillShapes = false;
  let bgColor = '#0f172a';

  let zoom = 1, panX = 0, panY = 0;
  let isPanning = false, lastPanPt = null;
  let isDrawing = false;
  let startPt = null;
  let currentPath = [];

  // History (undo/redo)
  let strokes = []; // array of stroke objects
  let redoStack = [];

  // DOM
  const container = document.getElementById('canvasContainer');
  const mainCanvas = document.getElementById('mainCanvas');
  const overlayCanvas = document.getElementById('overlayCanvas');
  const mainCtx = mainCanvas.getContext('2d');
  const overlayCtx = overlayCanvas.getContext('2d');
  const textOverlay = document.getElementById('textOverlay');
  const textInput = document.getElementById('textInput');

  // ---- Init ----
  function init() {
    mainCanvas.width = overlayCanvas.width = CANVAS_W;
    mainCanvas.height = overlayCanvas.height = CANVAS_H;
    updateTransform();
    redrawMain();
    bindEvents();
    centerView();
  }

  function centerView() {
    const rect = container.getBoundingClientRect();
    panX = (rect.width - CANVAS_W * zoom) / 2;
    panY = (rect.height - CANVAS_H * zoom) / 2;
    updateTransform();
  }

  function updateTransform() {
    const t = `translate(${panX}px,${panY}px) scale(${zoom})`;
    mainCanvas.style.transform = t;
    overlayCanvas.style.transform = t;
    document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
  }

  // ---- Coordinate helpers ----
  function clientToCanvas(cx, cy) {
    const rect = container.getBoundingClientRect();
    return {
      x: (cx - rect.left - panX) / zoom,
      y: (cy - rect.top - panY) / zoom
    };
  }

  // ---- Drawing engine ----
  function redrawMain() {
    mainCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    // Background
    mainCtx.fillStyle = bgColor;
    mainCtx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    // Replay strokes
    for (const s of strokes) {
      renderStroke(mainCtx, s);
    }
    updateUndoRedo();
  }

  function renderStroke(ctx, s) {
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (s.type === 'pen') {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.width;
      ctx.globalCompositeOperation = 'source-over';
      if (s.points.length < 2) { ctx.restore(); return; }
      ctx.beginPath();
      ctx.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length; i++) {
        const p0 = s.points[i - 1], p1 = s.points[i];
        const mx = (p0.x + p1.x) / 2, my = (p0.y + p1.y) / 2;
        ctx.quadraticCurveTo(p0.x, p0.y, mx, my);
      }
      ctx.stroke();
    }
    else if (s.type === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.lineWidth = s.width;
      if (s.points.length < 2) { ctx.restore(); return; }
      ctx.beginPath();
      ctx.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length; i++) {
        ctx.lineTo(s.points[i].x, s.points[i].y);
      }
      ctx.stroke();
    }
    else if (s.type === 'line') {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.width;
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
    }
    else if (s.type === 'arrow') {
      ctx.strokeStyle = s.color;
      ctx.fillStyle = s.color;
      ctx.lineWidth = s.width;
      const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
      const angle = Math.atan2(dy, dx);
      const headLen = Math.max(s.width * 3, 12);
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
      // Arrowhead
      ctx.beginPath();
      ctx.moveTo(s.x2, s.y2);
      ctx.lineTo(s.x2 - headLen * Math.cos(angle - Math.PI / 6), s.y2 - headLen * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(s.x2 - headLen * Math.cos(angle + Math.PI / 6), s.y2 - headLen * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }
    else if (s.type === 'rect') {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.width;
      if (s.fill) {
        ctx.fillStyle = s.color;
        ctx.fillRect(s.x, s.y, s.w, s.h);
      }
      ctx.strokeRect(s.x, s.y, s.w, s.h);
    }
    else if (s.type === 'ellipse') {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.width;
      ctx.beginPath();
      ctx.ellipse(s.cx, s.cy, Math.abs(s.rx), Math.abs(s.ry), 0, 0, Math.PI * 2);
      if (s.fill) {
        ctx.fillStyle = s.color;
        ctx.fill();
      }
      ctx.stroke();
    }
    else if (s.type === 'text') {
      ctx.fillStyle = s.color;
      ctx.font = `${s.fontSize}px Inter, -apple-system, sans-serif`;
      ctx.textBaseline = 'top';
      const lines = s.text.split('\n');
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], s.x, s.y + i * s.fontSize * 1.3);
      }
    }
    ctx.restore();
  }

  function clearOverlay() {
    overlayCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  }

  function pushStroke(s) {
    strokes.push(s);
    redoStack = [];
    redrawMain();
  }

  // ---- Undo / Redo ----
  function undo() {
    if (!strokes.length) return;
    redoStack.push(strokes.pop());
    redrawMain();
  }
  function redo() {
    if (!redoStack.length) return;
    strokes.push(redoStack.pop());
    redrawMain();
  }
  function updateUndoRedo() {
    document.getElementById('undoBtn').disabled = strokes.length === 0;
    document.getElementById('redoBtn').disabled = redoStack.length === 0;
  }

  // ---- Event binding ----
  function bindEvents() {
    // Tools
    document.querySelectorAll('[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tool = btn.dataset.tool;
        hideTextInput();
        container.style.cursor = tool === 'text' ? 'text' : tool === 'eraser' ? 'cell' : 'crosshair';
      });
    });

    // Palette
    document.querySelectorAll('.palette-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        setColor(dot.dataset.color);
      });
    });

    // Color picker
    const cp = document.getElementById('colorPicker');
    cp.addEventListener('input', (e) => setColor(e.target.value));

    // Width
    const ws = document.getElementById('widthSlider');
    ws.addEventListener('input', () => {
      lineWidth = parseInt(ws.value);
      document.getElementById('widthLabel').textContent = lineWidth + 'px';
    });

    // Fill
    document.getElementById('fillToggle').addEventListener('change', (e) => {
      fillShapes = e.target.checked;
    });

    // Undo/Redo buttons
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);

    // Clear
    document.getElementById('clearBtn').addEventListener('click', () => {
      if (strokes.length && !confirm('Clear the entire canvas?')) return;
      strokes = [];
      redoStack = [];
      redrawMain();
    });

    // File menu
    document.getElementById('fileBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('fileMenu').classList.toggle('open');
    });
    document.addEventListener('click', () => {
      document.getElementById('fileMenu').classList.remove('open');
    });

    // Background color
    document.getElementById('bgColor').addEventListener('input', (e) => {
      bgColor = e.target.value;
      document.getElementById('bgSwatch').style.background = bgColor;
      redrawMain();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', onKeyDown);

    // Pointer events on container
    container.addEventListener('pointerdown', onPointerDown);
    container.addEventListener('pointermove', onPointerMove);
    container.addEventListener('pointerup', onPointerUp);
    container.addEventListener('pointercancel', onPointerUp);

    // Wheel zoom
    container.addEventListener('wheel', onWheel, { passive: false });

    // Touch prevent default
    container.addEventListener('touchstart', (e) => {
      if (e.touches.length > 1) return;
      // allow single touch through
    }, { passive: true });

    // Resize
    window.addEventListener('resize', () => updateTransform());

    // Text input confirm
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        commitText();
      }
      if (e.key === 'Escape') hideTextInput();
    });
    textInput.addEventListener('blur', () => {
      setTimeout(() => {
        if (textOverlay.style.display !== 'none' && textInput.value.trim()) {
          commitText();
        } else {
          hideTextInput();
        }
      }, 150);
    });
  }

  function setColor(c) {
    color = c;
    document.getElementById('colorPicker').value = c;
    document.getElementById('colorSwatch').style.background = c;
    document.querySelectorAll('.palette-dot').forEach(d => {
      d.classList.toggle('active', d.dataset.color === c);
    });
  }

  // ---- Pointer handlers ----
  function onPointerDown(e) {
    // Middle mouse or space+click = pan
    if (e.button === 1 || (e.button === 0 && e.altKey)) {
      isPanning = true;
      lastPanPt = { x: e.clientX, y: e.clientY };
      container.style.cursor = 'grabbing';
      container.setPointerCapture(e.pointerId);
      e.preventDefault();
      return;
    }

    if (e.button !== 0) return;
    container.setPointerCapture(e.pointerId);

    const pt = clientToCanvas(e.clientX, e.clientY);

    if (tool === 'text') {
      showTextInput(e.clientX, e.clientY, pt);
      return;
    }

    isDrawing = true;
    startPt = pt;
    currentPath = [pt];
    setStatus(tool === 'eraser' ? 'Erasing...' : 'Drawing...');
  }

  function onPointerMove(e) {
    if (isPanning) {
      panX += e.clientX - lastPanPt.x;
      panY += e.clientY - lastPanPt.y;
      lastPanPt = { x: e.clientX, y: e.clientY };
      updateTransform();
      return;
    }
    if (!isDrawing) return;

    const pt = clientToCanvas(e.clientX, e.clientY);

    if (tool === 'pen' || tool === 'eraser') {
      currentPath.push(pt);
      // Draw incrementally on overlay for smooth feel
      clearOverlay();
      const preview = {
        type: tool, color, width: lineWidth, points: currentPath
      };
      renderStroke(overlayCtx, preview);
    } else {
      // Shape preview
      clearOverlay();
      const preview = buildShapeStroke(startPt, pt);
      if (preview) renderStroke(overlayCtx, preview);
    }
  }

  function onPointerUp(e) {
    if (isPanning) {
      isPanning = false;
      container.style.cursor = tool === 'text' ? 'text' : tool === 'eraser' ? 'cell' : 'crosshair';
      return;
    }
    if (!isDrawing) return;
    isDrawing = false;
    clearOverlay();

    const pt = clientToCanvas(e.clientX, e.clientY);

    if (tool === 'pen' || tool === 'eraser') {
      if (currentPath.length > 1) {
        pushStroke({ type: tool, color, width: lineWidth, points: [...currentPath] });
      }
    } else {
      const s = buildShapeStroke(startPt, pt);
      if (s) pushStroke(s);
    }
    currentPath = [];
    setStatus('Ready');
  }

  function buildShapeStroke(p1, p2) {
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return null;

    if (tool === 'line') {
      return { type: 'line', color, width: lineWidth, x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y };
    }
    if (tool === 'arrow') {
      return { type: 'arrow', color, width: lineWidth, x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y };
    }
    if (tool === 'rect') {
      return {
        type: 'rect', color, width: lineWidth, fill: fillShapes,
        x: Math.min(p1.x, p2.x), y: Math.min(p1.y, p2.y),
        w: Math.abs(dx), h: Math.abs(dy)
      };
    }
    if (tool === 'ellipse') {
      return {
        type: 'ellipse', color, width: lineWidth, fill: fillShapes,
        cx: (p1.x + p2.x) / 2, cy: (p1.y + p2.y) / 2,
        rx: Math.abs(dx) / 2, ry: Math.abs(dy) / 2
      };
    }
    return null;
  }

  // ---- Text tool ----
  let textCanvasPt = null;

  function showTextInput(cx, cy, canvasPt) {
    textCanvasPt = canvasPt;
    const rect = container.getBoundingClientRect();
    textOverlay.style.display = 'block';
    textOverlay.style.left = (cx - rect.left) + 'px';
    textOverlay.style.top = (cy - rect.top) + 'px';
    textInput.value = '';
    textInput.style.color = color;
    textInput.style.fontSize = Math.max(lineWidth * 5, 16) + 'px';
    setTimeout(() => textInput.focus(), 50);
  }

  function commitText() {
    const txt = textInput.value.trim();
    if (txt && textCanvasPt) {
      pushStroke({
        type: 'text', color, text: txt,
        x: textCanvasPt.x, y: textCanvasPt.y,
        fontSize: Math.max(lineWidth * 5, 16)
      });
    }
    hideTextInput();
  }

  function hideTextInput() {
    textOverlay.style.display = 'none';
    textInput.value = '';
  }

  // ---- Wheel zoom ----
  function onWheel(e) {
    e.preventDefault();
    const delta = -e.deltaY * 0.001;
    const newZoom = Math.max(0.1, Math.min(5, zoom + delta * zoom));
    // Zoom towards cursor
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const ratio = newZoom / zoom;
    panX = mx - ratio * (mx - panX);
    panY = my - ratio * (my - panY);
    zoom = newZoom;
    updateTransform();
  }

  function zoomBy(d) {
    const rect = container.getBoundingClientRect();
    const cx = rect.width / 2, cy = rect.height / 2;
    const newZoom = Math.max(0.1, Math.min(5, zoom + d));
    const ratio = newZoom / zoom;
    panX = cx - ratio * (cx - panX);
    panY = cy - ratio * (cy - panY);
    zoom = newZoom;
    updateTransform();
  }

  function resetView() {
    zoom = 1;
    centerView();
  }

  // ---- Keyboard ----
  function onKeyDown(e) {
    // Skip if typing in text input
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'z') {
      e.preventDefault(); redo(); return;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault(); undo(); return;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault(); save(); return;
    }

    const keyMap = { p: 'pen', e: 'eraser', l: 'line', a: 'arrow', r: 'rect', o: 'ellipse', t: 'text' };
    if (keyMap[e.key]) {
      document.querySelector(`[data-tool="${keyMap[e.key]}"]`).click();
    }

    if (e.key === '+' || e.key === '=') zoomBy(0.1);
    if (e.key === '-') zoomBy(-0.1);
    if (e.key === '0') resetView();
  }

  // ---- Save / Load ----
  function save() {
    const data = { strokes, bgColor, version: 1 };
    try {
      localStorage.setItem('whiteboard_data', JSON.stringify(data));
      setStatus('Saved to browser storage');
    } catch (err) {
      setStatus('Save failed: ' + err.message);
    }
    document.getElementById('fileMenu').classList.remove('open');
  }

  function load() {
    try {
      const raw = localStorage.getItem('whiteboard_data');
      if (!raw) { setStatus('No saved drawing found'); return; }
      const data = JSON.parse(raw);
      strokes = data.strokes || [];
      bgColor = data.bgColor || '#0f172a';
      document.getElementById('bgColor').value = bgColor;
      document.getElementById('bgSwatch').style.background = bgColor;
      redoStack = [];
      redrawMain();
      setStatus('Loaded from browser storage');
    } catch (err) {
      setStatus('Load failed: ' + err.message);
    }
    document.getElementById('fileMenu').classList.remove('open');
  }

  // ---- Export PNG ----
  function exportPNG() {
    const link = document.createElement('a');
    link.download = 'whiteboard.png';
    link.href = mainCanvas.toDataURL('image/png');
    link.click();
    setStatus('Exported as PNG');
    document.getElementById('fileMenu').classList.remove('open');
  }

  // ---- Export SVG ----
  function exportSVG() {
    let svgParts = [];
    svgParts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${CANVAS_W}" height="${CANVAS_H}" viewBox="0 0 ${CANVAS_W} ${CANVAS_H}">`);
    svgParts.push(`<rect width="100%" height="100%" fill="${escSvg(bgColor)}"/>`);

    for (const s of strokes) {
      if (s.type === 'pen' && s.points.length > 1) {
        let d = `M${s.points[0].x} ${s.points[0].y}`;
        for (let i = 1; i < s.points.length; i++) {
          d += ` L${s.points[i].x} ${s.points[i].y}`;
        }
        svgParts.push(`<path d="${d}" stroke="${escSvg(s.color)}" stroke-width="${s.width}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);
      }
      else if (s.type === 'line') {
        svgParts.push(`<line x1="${s.x1}" y1="${s.y1}" x2="${s.x2}" y2="${s.y2}" stroke="${escSvg(s.color)}" stroke-width="${s.width}" stroke-linecap="round"/>`);
      }
      else if (s.type === 'arrow') {
        const angle = Math.atan2(s.y2 - s.y1, s.x2 - s.x1);
        const hl = Math.max(s.width * 3, 12);
        const ax1 = s.x2 - hl * Math.cos(angle - Math.PI / 6);
        const ay1 = s.y2 - hl * Math.sin(angle - Math.PI / 6);
        const ax2 = s.x2 - hl * Math.cos(angle + Math.PI / 6);
        const ay2 = s.y2 - hl * Math.sin(angle + Math.PI / 6);
        svgParts.push(`<line x1="${s.x1}" y1="${s.y1}" x2="${s.x2}" y2="${s.y2}" stroke="${escSvg(s.color)}" stroke-width="${s.width}" stroke-linecap="round"/>`);
        svgParts.push(`<polygon points="${s.x2},${s.y2} ${ax1},${ay1} ${ax2},${ay2}" fill="${escSvg(s.color)}"/>`);
      }
      else if (s.type === 'rect') {
        svgParts.push(`<rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" stroke="${escSvg(s.color)}" stroke-width="${s.width}" fill="${s.fill ? escSvg(s.color) : 'none'}"/>`);
      }
      else if (s.type === 'ellipse') {
        svgParts.push(`<ellipse cx="${s.cx}" cy="${s.cy}" rx="${Math.abs(s.rx)}" ry="${Math.abs(s.ry)}" stroke="${escSvg(s.color)}" stroke-width="${s.width}" fill="${s.fill ? escSvg(s.color) : 'none'}"/>`);
      }
      else if (s.type === 'text') {
        const lines = s.text.split('\n');
        for (let i = 0; i < lines.length; i++) {
          svgParts.push(`<text x="${s.x}" y="${s.y + s.fontSize + i * s.fontSize * 1.3}" font-size="${s.fontSize}" fill="${escSvg(s.color)}" font-family="Inter, -apple-system, sans-serif">${escSvg(lines[i])}</text>`);
        }
      }
    }

    svgParts.push('</svg>');
    const blob = new Blob([svgParts.join('\n')], { type: 'image/svg+xml' });
    const link = document.createElement('a');
    link.download = 'whiteboard.svg';
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
    setStatus('Exported as SVG');
    document.getElementById('fileMenu').classList.remove('open');
  }

  function escSvg(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ---- Status ----
  function setStatus(msg) {
    document.getElementById('statusText').textContent = msg;
  }

  // ---- Auto-save periodically ----
  setInterval(() => {
    if (strokes.length > 0) {
      try {
        localStorage.setItem('whiteboard_autosave', JSON.stringify({ strokes, bgColor, version: 1 }));
      } catch(e) {}
    }
  }, 30000);

  // ---- Boot ----
  init();

  // Try loading autosave
  try {
    const auto = localStorage.getItem('whiteboard_autosave');
    if (auto) {
      const data = JSON.parse(auto);
      if (data.strokes && data.strokes.length) {
        strokes = data.strokes;
        bgColor = data.bgColor || bgColor;
        document.getElementById('bgColor').value = bgColor;
        document.getElementById('bgSwatch').style.background = bgColor;
        redrawMain();
        setStatus('Restored autosave');
      }
    }
  } catch(e) {}

  return { undo, redo, save, load, exportPNG, exportSVG, zoomBy, resetView };
})();
</script>
</body>
</html>
