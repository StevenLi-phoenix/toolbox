<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Command Builder — Visual Git Command Generator</title>
    <meta name="description" content="Build complex git commands visually. Select operations, add flags, and copy the result. No memorizing syntax — just point and click.">
    <meta name="keywords" content="git command builder, git generator, git cheat sheet, git flags, visual git, git tool">
    <meta name="author" content="Steven Li">
    <meta property="og:title" content="Git Command Builder — Visual Git Command Generator">
    <meta property="og:description" content="Build complex git commands visually. Select operations, add flags, and copy ready-to-use commands.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/gitcmd.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Git Command Builder">
    <meta name="twitter:description" content="Build complex git commands visually. No memorizing syntax.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/gitcmd.html">
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
<div class="container">
    <h1><span class="icon">⌥</span> Git Command Builder</h1>
    <p class="subtitle">Build git commands visually — select a command, toggle flags, fill in arguments.</p>

    <div class="card">
        <h2>① Category</h2>
        <div class="category-tabs" id="catTabs"></div>
    </div>

    <div class="card">
        <h2>② Command</h2>
        <select id="cmdSelect"><option value="">— pick a command —</option></select>
        <div class="desc-text" id="cmdDesc" style="display:none"></div>
    </div>

    <div class="card" id="argsCard" style="display:none">
        <h2>③ Arguments</h2>
        <div class="arg-inputs" id="argInputs"></div>
    </div>

    <div class="card" id="flagsCard" style="display:none">
        <h2>④ Flags</h2>
        <div class="flags-grid" id="flagsGrid"></div>
    </div>

    <div class="card">
        <h2>Result</h2>
        <div class="output-box">
            <span class="output-cmd" id="output">git ...</span>
            <button class="copy-btn" id="copyBtn" onclick="copyCmd()">Copy</button>
        </div>
        <p class="hint" id="hintText"></p>
    </div>

    <div class="coffee">
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy me a coffee if this saved you a trip to Stack Overflow</a>
    </div>
</div>

<script>
const COMMANDS = {
  "Basics": {
    "init": { desc: "Create a new git repository", args: [{ name: "directory", placeholder: ".", optional: true }], flags: [
      { flag: "--bare", desc: "Create bare repo" },
      { flag: "--initial-branch", desc: "Set initial branch", value: "main" },
      { flag: "--template", desc: "Template directory", value: "" },
      { flag: "--quiet", desc: "Suppress output" }
    ]},
    "clone": { desc: "Clone a repository", args: [{ name: "url", placeholder: "https://github.com/user/repo.git" }, { name: "directory", placeholder: "(optional)", optional: true }], flags: [
      { flag: "--depth", desc: "Shallow clone", value: "1" },
      { flag: "--branch", desc: "Specific branch", value: "" },
      { flag: "--single-branch", desc: "Only one branch" },
      { flag: "--recurse-submodules", desc: "Include submodules" },
      { flag: "--bare", desc: "Clone as bare" },
      { flag: "--mirror", desc: "Mirror clone" },
      { flag: "--shallow-submodules", desc: "Shallow submodules" }
    ]},
    "status": { desc: "Show working tree status", args: [], flags: [
      { flag: "-s", desc: "Short format" },
      { flag: "--branch", desc: "Show branch info" },
      { flag: "--ignored", desc: "Show ignored files" },
      { flag: "--porcelain", desc: "Machine-readable" }
    ]},
    "add": { desc: "Stage files for commit", args: [{ name: "pathspec", placeholder: ". or file.txt" }], flags: [
      { flag: "-A", desc: "All files (modified+new+deleted)" },
      { flag: "-p", desc: "Interactive patch mode" },
      { flag: "-n", desc: "Dry run" },
      { flag: "-f", desc: "Force add ignored files" },
      { flag: "-u", desc: "Update tracked files only" }
    ]},
    "commit": { desc: "Record changes to the repository", args: [], flags: [
      { flag: "-m", desc: "Commit message", value: "" },
      { flag: "-a", desc: "Auto-stage tracked files" },
      { flag: "--amend", desc: "Amend previous commit" },
      { flag: "--no-edit", desc: "Keep previous message" },
      { flag: "--allow-empty", desc: "Allow empty commit" },
      { flag: "-S", desc: "GPG sign commit" },
      { flag: "--fixup", desc: "Fixup commit", value: "" },
      { flag: "--squash", desc: "Squash commit", value: "" }
    ]},
    "diff": { desc: "Show changes between commits/working tree", args: [{ name: "ref", placeholder: "HEAD~1 or branch (optional)", optional: true }], flags: [
      { flag: "--staged", desc: "Staged changes" },
      { flag: "--cached", desc: "Same as --staged" },
      { flag: "--stat", desc: "Summary stats only" },
      { flag: "--name-only", desc: "File names only" },
      { flag: "--name-status", desc: "Names + status" },
      { flag: "--color-words", desc: "Word-level diff" },
      { flag: "-w", desc: "Ignore whitespace" }
    ]}
  },
  "Branching": {
    "branch": { desc: "List, create, or delete branches", args: [{ name: "name", placeholder: "branch-name (optional)", optional: true }], flags: [
      { flag: "-a", desc: "Show all branches" },
      { flag: "-r", desc: "Remote branches only" },
      { flag: "-d", desc: "Delete branch" },
      { flag: "-D", desc: "Force delete" },
      { flag: "-m", desc: "Rename branch", value: "" },
      { flag: "-v", desc: "Verbose (last commit)" },
      { flag: "--merged", desc: "Only merged branches" },
      { flag: "--no-merged", desc: "Only unmerged branches" },
      { flag: "--sort=-committerdate", desc: "Sort by date" }
    ]},
    "checkout": { desc: "Switch branches or restore files", args: [{ name: "target", placeholder: "branch or file" }], flags: [
      { flag: "-b", desc: "Create & switch", value: "" },
      { flag: "-B", desc: "Force create & switch", value: "" },
      { flag: "--orphan", desc: "New orphan branch", value: "" },
      { flag: "-f", desc: "Force (discard changes)" },
      { flag: "--track", desc: "Track remote branch" },
      { flag: "--", desc: "Treat as file path" }
    ]},
    "switch": { desc: "Switch branches (modern)", args: [{ name: "branch", placeholder: "branch-name" }], flags: [
      { flag: "-c", desc: "Create new branch", value: "" },
      { flag: "-C", desc: "Force create", value: "" },
      { flag: "--detach", desc: "Detach HEAD" },
      { flag: "--discard-changes", desc: "Discard local changes" }
    ]},
    "merge": { desc: "Join branches together", args: [{ name: "branch", placeholder: "branch-to-merge" }], flags: [
      { flag: "--no-ff", desc: "Always create merge commit" },
      { flag: "--ff-only", desc: "Fast-forward only" },
      { flag: "--squash", desc: "Squash commits" },
      { flag: "--abort", desc: "Abort current merge" },
      { flag: "--continue", desc: "Continue after conflict" },
      { flag: "-m", desc: "Merge message", value: "" },
      { flag: "--no-commit", desc: "Merge without commit" },
      { flag: "-S", desc: "GPG sign" }
    ]},
    "rebase": { desc: "Reapply commits on another base", args: [{ name: "upstream", placeholder: "main or commit" }], flags: [
      { flag: "-i", desc: "Interactive rebase" },
      { flag: "--onto", desc: "Rebase onto", value: "" },
      { flag: "--abort", desc: "Abort rebase" },
      { flag: "--continue", desc: "Continue after conflict" },
      { flag: "--skip", desc: "Skip current patch" },
      { flag: "--autosquash", desc: "Auto-squash fixups" },
      { flag: "--autostash", desc: "Auto-stash changes" },
      { flag: "--root", desc: "Rebase from root" }
    ]},
    "cherry-pick": { desc: "Apply specific commits to current branch", args: [{ name: "commit", placeholder: "commit-sha" }], flags: [
      { flag: "-n", desc: "Don't auto-commit" },
      { flag: "-x", desc: "Append cherry-pick info" },
      { flag: "--abort", desc: "Abort" },
      { flag: "--continue", desc: "Continue" },
      { flag: "-m", desc: "Mainline parent number", value: "1" }
    ]}
  },
  "Remote": {
    "push": { desc: "Upload local commits to remote", args: [{ name: "remote", placeholder: "origin", optional: true }, { name: "branch", placeholder: "main (optional)", optional: true }], flags: [
      { flag: "-u", desc: "Set upstream" },
      { flag: "--force", desc: "Force push" },
      { flag: "--force-with-lease", desc: "Safe force push" },
      { flag: "--tags", desc: "Push all tags" },
      { flag: "--delete", desc: "Delete remote branch" },
      { flag: "--dry-run", desc: "Dry run" },
      { flag: "--no-verify", desc: "Skip pre-push hooks" }
    ]},
    "pull": { desc: "Fetch and integrate remote changes", args: [{ name: "remote", placeholder: "origin (optional)", optional: true }, { name: "branch", placeholder: "main (optional)", optional: true }], flags: [
      { flag: "--rebase", desc: "Rebase instead of merge" },
      { flag: "--ff-only", desc: "Fast-forward only" },
      { flag: "--no-commit", desc: "Pull without commit" },
      { flag: "--autostash", desc: "Auto-stash changes" },
      { flag: "--tags", desc: "Fetch tags" },
      { flag: "--depth", desc: "Shallow fetch", value: "1" }
    ]},
    "fetch": { desc: "Download objects from remote", args: [{ name: "remote", placeholder: "origin (optional)", optional: true }], flags: [
      { flag: "--all", desc: "Fetch all remotes" },
      { flag: "--prune", desc: "Remove stale remote refs" },
      { flag: "--tags", desc: "Fetch all tags" },
      { flag: "--depth", desc: "Shallow fetch", value: "" },
      { flag: "--dry-run", desc: "Dry run" },
      { flag: "--force", desc: "Force update refs" }
    ]},
    "remote": { desc: "Manage remote repositories", args: [{ name: "subcommand", placeholder: "add / remove / rename / -v", optional: true }, { name: "args", placeholder: "name url (optional)", optional: true }], flags: [
      { flag: "-v", desc: "Verbose (show URLs)" }
    ]}
  },
  "History": {
    "log": { desc: "Show commit history", args: [{ name: "ref", placeholder: "branch or file (optional)", optional: true }], flags: [
      { flag: "--oneline", desc: "One line per commit" },
      { flag: "--graph", desc: "ASCII commit graph" },
      { flag: "--all", desc: "All branches" },
      { flag: "--decorate", desc: "Show ref names" },
      { flag: "-n", desc: "Limit commits", value: "10" },
      { flag: "--stat", desc: "Show file stats" },
      { flag: "-p", desc: "Show patches" },
      { flag: "--author", desc: "Filter by author", value: "" },
      { flag: "--since", desc: "Since date", value: "" },
      { flag: "--until", desc: "Until date", value: "" },
      { flag: "--grep", desc: "Filter by message", value: "" },
      { flag: "--pretty=format:", desc: "Custom format", value: "%h %s" },
      { flag: "--follow", desc: "Follow file renames" },
      { flag: "--first-parent", desc: "First parent only" }
    ]},
    "show": { desc: "Show commit details", args: [{ name: "object", placeholder: "HEAD or commit-sha", optional: true }], flags: [
      { flag: "--stat", desc: "File stats only" },
      { flag: "--name-only", desc: "File names only" },
      { flag: "--format", desc: "Output format", value: "" },
      { flag: "-q", desc: "Suppress diff" }
    ]},
    "blame": { desc: "Show who changed each line", args: [{ name: "file", placeholder: "path/to/file" }], flags: [
      { flag: "-L", desc: "Line range", value: "1,10" },
      { flag: "-w", desc: "Ignore whitespace" },
      { flag: "-C", desc: "Detect moved/copied lines" },
      { flag: "--date=short", desc: "Short date format" }
    ]},
    "reflog": { desc: "Show reference log (safety net)", args: [], flags: [
      { flag: "-n", desc: "Limit entries", value: "20" },
      { flag: "--date=relative", desc: "Relative dates" }
    ]}
  },
  "Stash & Undo": {
    "stash": { desc: "Stash uncommitted changes", args: [], flags: [
      { flag: "push", desc: "Push to stash (default)" },
      { flag: "pop", desc: "Apply & remove top stash" },
      { flag: "apply", desc: "Apply without removing" },
      { flag: "list", desc: "List all stashes" },
      { flag: "drop", desc: "Drop a stash" },
      { flag: "clear", desc: "Clear all stashes" },
      { flag: "-u", desc: "Include untracked files" },
      { flag: "-m", desc: "Stash message", value: "" },
      { flag: "-p", desc: "Partial stash (interactive)" }
    ]},
    "reset": { desc: "Reset HEAD to a state", args: [{ name: "commit", placeholder: "HEAD~1 or commit-sha", optional: true }], flags: [
      { flag: "--soft", desc: "Keep changes staged" },
      { flag: "--mixed", desc: "Unstage changes (default)" },
      { flag: "--hard", desc: "Discard all changes" },
      { flag: "--merge", desc: "Reset merge" },
      { flag: "--keep", desc: "Keep working tree" }
    ]},
    "revert": { desc: "Create a commit that undoes a commit", args: [{ name: "commit", placeholder: "commit-sha" }], flags: [
      { flag: "-n", desc: "Don't auto-commit" },
      { flag: "--no-edit", desc: "Skip editor" },
      { flag: "-m", desc: "Mainline parent", value: "1" }
    ]},
    "restore": { desc: "Restore working tree files (modern)", args: [{ name: "pathspec", placeholder: "file.txt or ." }], flags: [
      { flag: "--staged", desc: "Unstage files" },
      { flag: "--source", desc: "Restore from ref", value: "HEAD" },
      { flag: "--worktree", desc: "Restore working tree" }
    ]},
    "clean": { desc: "Remove untracked files", args: [], flags: [
      { flag: "-n", desc: "Dry run (show what would be removed)" },
      { flag: "-f", desc: "Force removal" },
      { flag: "-d", desc: "Remove directories too" },
      { flag: "-x", desc: "Remove ignored files too" },
      { flag: "-X", desc: "Remove ONLY ignored files" },
      { flag: "-i", desc: "Interactive mode" }
    ]}
  },
  "Tags & Config": {
    "tag": { desc: "Create, list, or delete tags", args: [{ name: "tagname", placeholder: "v1.0.0 (optional)", optional: true }], flags: [
      { flag: "-a", desc: "Annotated tag" },
      { flag: "-m", desc: "Tag message", value: "" },
      { flag: "-d", desc: "Delete tag" },
      { flag: "-l", desc: "List tags" },
      { flag: "-f", desc: "Force (overwrite)" },
      { flag: "-s", desc: "GPG sign tag" }
    ]},
    "config": { desc: "Get/set git configuration", args: [{ name: "key", placeholder: "user.name (optional)", optional: true }, { name: "value", placeholder: "value (optional)", optional: true }], flags: [
      { flag: "--global", desc: "Global config" },
      { flag: "--local", desc: "Repo-level config" },
      { flag: "--system", desc: "System-level config" },
      { flag: "--list", desc: "List all config" },
      { flag: "--unset", desc: "Remove a key" },
      { flag: "-e", desc: "Edit in editor" }
    ]},
    "worktree": { desc: "Manage multiple working trees", args: [{ name: "subcommand", placeholder: "add / list / remove" }, { name: "path", placeholder: "path (for add)", optional: true }], flags: [
      { flag: "-b", desc: "Create new branch", value: "" },
      { flag: "--detach", desc: "Detach HEAD" },
      { flag: "--force", desc: "Force operation" }
    ]},
    "bisect": { desc: "Binary search for a bug", args: [{ name: "subcommand", placeholder: "start / good / bad / reset" }], flags: [
      { flag: "start", desc: "Start bisect session" },
      { flag: "good", desc: "Mark as good" },
      { flag: "bad", desc: "Mark as bad" },
      { flag: "reset", desc: "End bisect session" }
    ]}
  }
};

let activeFlags = new Set();
let currentCmd = null;
let currentCategory = null;

const catTabs = document.getElementById('catTabs');
const cmdSelect = document.getElementById('cmdSelect');
const cmdDesc = document.getElementById('cmdDesc');
const argsCard = document.getElementById('argsCard');
const argInputs = document.getElementById('argInputs');
const flagsCard = document.getElementById('flagsCard');
const flagsGrid = document.getElementById('flagsGrid');
const output = document.getElementById('output');
const hintText = document.getElementById('hintText');

// Build category tabs
Object.keys(COMMANDS).forEach((cat, i) => {
    const tab = document.createElement('div');
    tab.className = 'cat-tab' + (i === 0 ? ' active' : '');
    tab.textContent = cat;
    tab.onclick = () => selectCategory(cat, tab);
    catTabs.appendChild(tab);
});

function selectCategory(cat, tabEl) {
    currentCategory = cat;
    catTabs.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    
    cmdSelect.innerHTML = '<option value="">— pick a command —</option>';
    Object.keys(COMMANDS[cat]).forEach(cmd => {
        const opt = document.createElement('option');
        opt.value = cmd;
        opt.textContent = `git ${cmd}`;
        cmdSelect.appendChild(opt);
    });
    
    // Reset
    cmdDesc.style.display = 'none';
    argsCard.style.display = 'none';
    flagsCard.style.display = 'none';
    activeFlags.clear();
    currentCmd = null;
    buildOutput();
}

// Init first category
selectCategory(Object.keys(COMMANDS)[0], catTabs.children[0]);

cmdSelect.addEventListener('change', () => {
    const cmd = cmdSelect.value;
    if (!cmd || !currentCategory) {
        argsCard.style.display = 'none';
        flagsCard.style.display = 'none';
        cmdDesc.style.display = 'none';
        currentCmd = null;
        buildOutput();
        return;
    }
    
    currentCmd = COMMANDS[currentCategory][cmd];
    currentCmd._name = cmd;
    activeFlags.clear();
    
    // Description
    cmdDesc.textContent = currentCmd.desc;
    cmdDesc.style.display = 'block';
    
    // Args
    argInputs.innerHTML = '';
    if (currentCmd.args.length > 0) {
        argsCard.style.display = 'block';
        currentCmd.args.forEach((arg, i) => {
            const row = document.createElement('div');
            row.className = 'arg-row';
            row.innerHTML = `<label>${arg.name}${arg.optional ? ' (opt)' : ''}:</label><input type="text" id="arg_${i}" placeholder="${arg.placeholder}" oninput="buildOutput()">`;
            argInputs.appendChild(row);
        });
    } else {
        argsCard.style.display = 'none';
    }
    
    // Flags
    flagsGrid.innerHTML = '';
    if (currentCmd.flags.length > 0) {
        flagsCard.style.display = 'block';
        currentCmd.flags.forEach((f, i) => {
            const chip = document.createElement('div');
            chip.className = 'flag-chip';
            chip.dataset.idx = i;
            
            if (f.value !== undefined) {
                chip.innerHTML = `<span class="flag-code">${f.flag}</span><span class="flag-desc">${f.desc}</span>`;
                chip.onclick = () => {
                    if (activeFlags.has(i)) {
                        activeFlags.delete(i);
                        chip.classList.remove('active');
                        const vinput = chip.querySelector('.flag-val');
                        if (vinput) vinput.remove();
                    } else {
                        activeFlags.add(i);
                        chip.classList.add('active');
                        if (f.value !== undefined && f.flag !== 'push' && f.flag !== 'pop' && f.flag !== 'apply' && f.flag !== 'list' && f.flag !== 'drop' && f.flag !== 'clear' && f.flag !== 'start' && f.flag !== 'good' && f.flag !== 'bad' && f.flag !== 'reset') {
                            const vinput = document.createElement('input');
                            vinput.type = 'text';
                            vinput.className = 'flag-val';
                            vinput.value = f.value;
                            vinput.placeholder = 'value';
                            vinput.style.cssText = 'width:80px;padding:3px 6px;margin-left:4px;font-size:.8rem;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.2);border-radius:4px;color:#fff;outline:none';
                            vinput.oninput = () => buildOutput();
                            vinput.onclick = (e) => e.stopPropagation();
                            chip.appendChild(vinput);
                        }
                    }
                    buildOutput();
                };
            } else {
                chip.innerHTML = `<span class="flag-code">${f.flag}</span><span class="flag-desc">${f.desc}</span>`;
                chip.onclick = () => {
                    if (activeFlags.has(i)) {
                        activeFlags.delete(i);
                        chip.classList.remove('active');
                    } else {
                        activeFlags.add(i);
                        chip.classList.add('active');
                    }
                    buildOutput();
                };
            }
            flagsGrid.appendChild(chip);
        });
    } else {
        flagsCard.style.display = 'none';
    }
    
    buildOutput();
});

function buildOutput() {
    if (!currentCmd) {
        output.textContent = 'git ...';
        hintText.textContent = '';
        return;
    }
    
    let parts = ['git', currentCmd._name];
    
    // Flags (some are subcommands like stash push/pop)
    const stashSubcmds = new Set(['push','pop','apply','list','drop','clear']);
    const bisectSubcmds = new Set(['start','good','bad','reset']);
    
    let subCmd = null;
    activeFlags.forEach(i => {
        const f = currentCmd.flags[i];
        if (stashSubcmds.has(f.flag) || bisectSubcmds.has(f.flag)) {
            subCmd = f.flag;
            return;
        }
        const chip = flagsGrid.querySelector(`[data-idx="${i}"]`);
        const vinput = chip ? chip.querySelector('.flag-val') : null;
        if (vinput) {
            const val = vinput.value.trim();
            if (f.flag.endsWith(':') || f.flag.endsWith('=')) {
                parts.push(val ? `${f.flag}${val}` : f.flag.slice(0, -1));
            } else if (val) {
                parts.push(f.flag);
                parts.push(`"${val}"`);
            } else {
                parts.push(f.flag);
            }
        } else {
            parts.push(f.flag);
        }
    });
    
    if (subCmd) {
        parts.splice(2, 0, subCmd);
    }
    
    // Args
    currentCmd.args.forEach((arg, i) => {
        const el = document.getElementById(`arg_${i}`);
        if (el && el.value.trim()) {
            parts.push(el.value.trim());
        }
    });
    
    const cmd = parts.join(' ');
    output.textContent = cmd;
    
    // Contextual hints
    const hints = [];
    if (currentCmd._name === 'reset' && activeFlags.has(currentCmd.flags.findIndex(f => f.flag === '--hard'))) {
        hints.push('⚠️ --hard will permanently discard uncommitted changes!');
    }
    if (currentCmd._name === 'push' && activeFlags.has(currentCmd.flags.findIndex(f => f.flag === '--force'))) {
        hints.push('⚠️ Force push rewrites remote history. Prefer --force-with-lease.');
    }
    if (currentCmd._name === 'clean' && activeFlags.has(currentCmd.flags.findIndex(f => f.flag === '-f'))) {
        hints.push('⚠️ Clean -f permanently deletes untracked files. Use -n first for a dry run.');
    }
    hintText.textContent = hints.join(' ');
}

function copyCmd() {
    const text = output.textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    });
}
</script>
</body>
</html>
