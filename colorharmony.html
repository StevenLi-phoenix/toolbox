<style>
  .layout { display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; align-items: start; }
  .wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  canvas { border-radius: 50%; cursor: crosshair; }
  .base-color { display: flex; align-items: center; gap: .75rem; margin-top: .5rem; }
  .base-color input[type="color"] { width: 48px; height: 48px; border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer; padding: 0; background: none; }
  .base-color input[type="text"] { width: 100px; padding: 6px 8px; font-family: var(--mono); font-size: .9rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); }
  .harmony-tabs { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: 1rem; }
  .harmony-tabs button { font-size: .8rem; padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; transition: all .15s; }
  .harmony-tabs button.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .palette { display: flex; flex-wrap: wrap; gap: .75rem; }
  .swatch { width: 100%; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: transform .15s; }
  .swatch:hover { transform: translateY(-2px); }
  .swatch-color { height: 80px; cursor: pointer; position: relative; }
  .swatch-color::after { content: "Click to copy"; position: absolute; bottom: 4px; right: 6px; font-size: .65rem; color: rgba(255,255,255,.7); opacity: 0; transition: opacity .15s; }
  .swatch:hover .swatch-color::after { opacity: 1; }
  .swatch-info { padding: .5rem .75rem; background: var(--surface2); font-size: .8rem; }
  .swatch-info .hex { font-family: var(--mono); font-weight: 600; }
  .swatch-info .hsl { color: var(--muted); font-size: .75rem; }
  .palette-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: .75rem; }
  .css-output { margin-top: 1rem; }
  .css-output textarea { width: 100%; height: 80px; font-family: var(--mono); font-size: .8rem; padding: 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); color: var(--text); resize: vertical; }
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .wheel-wrap canvas { width: 240px; height: 240px; }

<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>Color Harmony</h1>
<p class="subtitle">Generate harmonious color palettes using color theory relationships</p>

<div class="layout">
  <div class="card wheel-wrap">
    <canvas id="wheel" width="280" height="280"></canvas>
    <div class="base-color">
      <input type="color" id="colorPick" value="#e74c3c" oninput="setColor(this.value)">
      <input type="text" id="hexInput" value="#e74c3c" onchange="setColor(this.value)" placeholder="#hex">
      <button class="btn btn-secondary" onclick="randomColor()" title="Random color">Random</button>
    </div>
  </div>

  <div>
    <div class="card">
      <div class="harmony-tabs" id="tabs"></div>
      <div class="palette-grid" id="palette"></div>
      <div class="css-output">
        <label style="font-size:.8rem;font-weight:600;color:var(--muted)">CSS Variables</label>
        <textarea id="cssOut" readonly></textarea>
      </div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast">&check; Copied!</div>
<footer>Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser</footer>

<script>
const $ = id => document.getElementById(id);

// --- Color math ---
function hexToHSL(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const r = parseInt(hex.substring(0, 2), 16) / 255;
  const g = parseInt(hex.substring(2, 4), 16) / 255;
  const b = parseInt(hex.substring(4, 6), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [h * 360, s * 100, l * 100];
}

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

// --- Harmony definitions ---
const harmonies = {
  complementary: { label: 'Complementary', fn: h => [0, 180] },
  analogous: { label: 'Analogous', fn: h => [-30, -15, 0, 15, 30] },
  triadic: { label: 'Triadic', fn: h => [0, 120, 240] },
  'split-complementary': { label: 'Split-Comp', fn: h => [0, 150, 210] },
  tetradic: { label: 'Tetradic', fn: h => [0, 90, 180, 270] },
  'double-complementary': { label: 'Double-Comp', fn: h => [0, 30, 180, 210] },
  monochromatic: { label: 'Monochromatic', fn: h => [0, 0, 0, 0, 0], mono: true },
};

let baseHSL = [0, 72, 56];
let activeHarmony = 'complementary';

function setColor(hex) {
  if (!/^#?[0-9a-fA-F]{3,6}$/.test(hex)) return;
  if (!hex.startsWith('#')) hex = '#' + hex;
  baseHSL = hexToHSL(hex);
  $('colorPick').value = hex;
  $('hexInput').value = hex;
  render();
}

function randomColor() {
  const h = Math.random() * 360;
  const s = 50 + Math.random() * 40;
  const l = 35 + Math.random() * 30;
  const hex = hslToHex(h, s, l);
  setColor(hex);
}

function generatePalette() {
  const [h, s, l] = baseHSL;
  const def = harmonies[activeHarmony];
  const offsets = def.fn(h);

  if (def.mono) {
    // Monochromatic: same hue, vary lightness and saturation
    return [
      { h, s: Math.max(s - 20, 10), l: Math.min(l + 30, 90) },
      { h, s: Math.max(s - 10, 10), l: Math.min(l + 15, 85) },
      { h, s, l },
      { h, s: Math.min(s + 10, 100), l: Math.max(l - 15, 15) },
      { h, s: Math.min(s + 20, 100), l: Math.max(l - 30, 10) },
    ].map(c => ({ hex: hslToHex(c.h, c.s, c.l), h: c.h, s: c.s, l: c.l }));
  }

  return offsets.map(offset => {
    const nh = (h + offset + 360) % 360;
    return { hex: hslToHex(nh, s, l), h: nh, s, l };
  });
}

function render() {
  drawWheel();
  drawMarkers();
  renderPalette();
}

// --- Color wheel ---
function drawWheel() {
  const canvas = $('wheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 10;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw hue wheel
  for (let angle = 0; angle < 360; angle += 0.5) {
    const startAngle = (angle - 0.5) * Math.PI / 180;
    const endAngle = (angle + 1) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = `hsl(${angle}, 75%, 55%)`;
    ctx.fill();
  }

  // Inner circle
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
  const bg = getComputedStyle(document.body).getPropertyValue('--bg').trim() || '#1a1a2e';
  ctx.fillStyle = bg;
  ctx.fill();
}

function drawMarkers() {
  const canvas = $('wheel');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 10;
  const palette = generatePalette();

  // Draw connecting lines
  ctx.beginPath();
  palette.forEach((c, i) => {
    const angle = (c.h - 90) * Math.PI / 180;
    const mr = r * 0.775;
    const x = cx + Math.cos(angle) * mr;
    const y = cy + Math.sin(angle) * mr;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Draw markers
  palette.forEach((c, i) => {
    const angle = (c.h - 90) * Math.PI / 180;
    const mr = r * 0.775;
    const x = cx + Math.cos(angle) * mr;
    const y = cy + Math.sin(angle) * mr;
    ctx.beginPath();
    ctx.arc(x, y, i === 0 ? 10 : 7, 0, Math.PI * 2);
    ctx.fillStyle = c.hex;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  });
}

function renderPalette() {
  const palette = generatePalette();
  const grid = $('palette');
  grid.innerHTML = palette.map((c, i) =>
    `<div class="swatch">
      <div class="swatch-color" style="background:${c.hex}" onclick="copyHex('${c.hex}')" title="${c.hex}"></div>
      <div class="swatch-info">
        <div class="hex">${c.hex.toUpperCase()}</div>
        <div class="hsl">hsl(${Math.round(c.h)}, ${Math.round(c.s)}%, ${Math.round(c.l)}%)</div>
      </div>
    </div>`
  ).join('');

  // CSS output
  const vars = palette.map((c, i) => `  --color-${i + 1}: ${c.hex.toUpperCase()};`).join('\n');
  $('cssOut').value = `:root {\n${vars}\n}`;
}

function copyHex(hex) {
  navigator.clipboard.writeText(hex.toUpperCase()).then(() => {
    const toast = $('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

// --- Wheel click ---
$('wheel').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const x = e.clientX - rect.left - rect.width / 2;
  const y = e.clientY - rect.top - rect.height / 2;
  const dist = Math.sqrt(x * x + y * y);
  const maxR = rect.width / 2;
  if (dist < maxR * 0.55 || dist > maxR) return;
  let angle = Math.atan2(y, x) * 180 / Math.PI + 90;
  if (angle < 0) angle += 360;
  baseHSL[0] = angle;
  const hex = hslToHex(baseHSL[0], baseHSL[1], baseHSL[2]);
  $('colorPick').value = hex;
  $('hexInput').value = hex;
  render();
});

// --- Tabs ---
function buildTabs() {
  const container = $('tabs');
  container.innerHTML = Object.entries(harmonies).map(([key, val]) =>
    `<button class="${key === activeHarmony ? 'active' : ''}" onclick="setHarmony('${key}')">${val.label}</button>`
  ).join('');
}

function setHarmony(key) {
  activeHarmony = key;
  buildTabs();
  render();
}

// --- Init ---
setColor('#e74c3c');
buildTabs();
</script>
</body>
