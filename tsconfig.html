<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeScript Config Generator - Free Online tsconfig.json Builder</title>
<meta name="description" content="Generate tsconfig.json files visually. Pick a preset for React, Node, Next.js, or library projects. 100% client-side.">
<meta name="keywords" content="tsconfig generator, tsconfig.json, typescript config, typescript compiler options, tsconfig builder, free online tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/tsconfig.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .preset-bar { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
  .preset-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; font-size: .82rem; font-family: var(--sans); transition: background .15s, border-color .15s; }
  .preset-btn:hover { border-color: var(--text); }
  .preset-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .option-group { margin-bottom: 1.25rem; }
  .option-group h3 { font-size: .9rem; font-weight: 600; margin-bottom: .5rem; padding-bottom: .35rem; border-bottom: 1px solid var(--border); }
  .option-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem; font-size: .85rem; }
  .option-row label { flex: 1; cursor: pointer; }
  .option-row select, .option-row input[type="text"] { padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: .82rem; font-family: var(--mono); min-width: 160px; }
  .output-area { position: relative; }
  .output-area textarea { width: 100%; min-height: 500px; font-family: var(--mono); font-size: .85rem; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); resize: vertical; }
  .copy-btn { position: absolute; top: 8px; right: 8px; }
  .form-scroll { max-height: 550px; overflow-y: auto; padding-right: 4px; }
  @media (max-width: 768px) { .panels { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>tsconfig.json Generator</h1>
<p class="subtitle">Build TypeScript configuration files visually with presets for popular frameworks</p>

<div class="card">
  <h2>Presets</h2>
  <div class="preset-bar" id="presetBar"></div>
</div>

<div class="panels">
  <div class="card">
    <h2>Compiler Options</h2>
    <div class="form-scroll" id="optionsForm"></div>
  </div>
  <div class="card output-area">
    <h2>tsconfig.json</h2>
    <button class="btn btn-secondary copy-btn" onclick="copyOutput()">Copy</button>
    <textarea id="output" readonly></textarea>
  </div>
</div>
</div>

<div class="toast" id="toast">&check; Copied!</div>
<footer>Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser</footer>

<script>
const $ = id => document.getElementById(id);

const OPTIONS = [
  { group: 'Language & Environment', items: [
    { key: 'target', type: 'select', values: ['ES5','ES6','ES2016','ES2017','ES2018','ES2019','ES2020','ES2021','ES2022','ES2023','ESNext'], default: 'ES2022' },
    { key: 'module', type: 'select', values: ['commonjs','es6','es2015','es2020','es2022','esnext','node16','nodenext','preserve'], default: 'es2022' },
    { key: 'moduleResolution', type: 'select', values: ['node','node16','nodenext','bundler','classic'], default: 'bundler' },
    { key: 'lib', type: 'text', default: '' },
    { key: 'jsx', type: 'select', values: ['','preserve','react','react-jsx','react-jsxdev','react-native'], default: '' },
  ]},
  { group: 'Strict Checks', items: [
    { key: 'strict', type: 'bool', default: true },
    { key: 'noUncheckedIndexedAccess', type: 'bool', default: false },
    { key: 'noImplicitOverride', type: 'bool', default: false },
    { key: 'noPropertyAccessFromIndexSignature', type: 'bool', default: false },
    { key: 'exactOptionalPropertyTypes', type: 'bool', default: false },
    { key: 'noFallthroughCasesInSwitch', type: 'bool', default: true },
  ]},
  { group: 'Module Resolution', items: [
    { key: 'esModuleInterop', type: 'bool', default: true },
    { key: 'allowImportingTsExtensions', type: 'bool', default: false },
    { key: 'resolveJsonModule', type: 'bool', default: true },
    { key: 'isolatedModules', type: 'bool', default: true },
    { key: 'verbatimModuleSyntax', type: 'bool', default: false },
    { key: 'allowSyntheticDefaultImports', type: 'bool', default: false },
    { key: 'paths', type: 'text', default: '' },
    { key: 'baseUrl', type: 'text', default: '' },
  ]},
  { group: 'Emit', items: [
    { key: 'outDir', type: 'text', default: './dist' },
    { key: 'rootDir', type: 'text', default: '' },
    { key: 'declaration', type: 'bool', default: false },
    { key: 'declarationMap', type: 'bool', default: false },
    { key: 'sourceMap', type: 'bool', default: true },
    { key: 'noEmit', type: 'bool', default: false },
    { key: 'removeComments', type: 'bool', default: false },
    { key: 'incremental', type: 'bool', default: false },
    { key: 'composite', type: 'bool', default: false },
  ]},
  { group: 'Type Checking', items: [
    { key: 'skipLibCheck', type: 'bool', default: true },
    { key: 'forceConsistentCasingInFileNames', type: 'bool', default: true },
    { key: 'allowJs', type: 'bool', default: false },
    { key: 'checkJs', type: 'bool', default: false },
  ]},
  { group: 'Project', items: [
    { key: 'include', type: 'text', default: 'src' },
    { key: 'exclude', type: 'text', default: 'node_modules,dist' },
  ]},
];

const PRESETS = {
  'Strict Modern': { target:'ES2022', module:'es2022', moduleResolution:'bundler', strict:true, esModuleInterop:true, resolveJsonModule:true, isolatedModules:true, skipLibCheck:true, forceConsistentCasingInFileNames:true, noFallthroughCasesInSwitch:true, sourceMap:true, outDir:'./dist', include:'src', exclude:'node_modules,dist' },
  'React (Vite)': { target:'ES2020', module:'esnext', moduleResolution:'bundler', strict:true, jsx:'react-jsx', esModuleInterop:true, resolveJsonModule:true, isolatedModules:true, skipLibCheck:true, forceConsistentCasingInFileNames:true, noFallthroughCasesInSwitch:true, noEmit:true, lib:'ES2020,DOM,DOM.Iterable', include:'src', exclude:'node_modules' },
  'Next.js': { target:'ES2017', module:'esnext', moduleResolution:'bundler', strict:true, jsx:'preserve', esModuleInterop:true, resolveJsonModule:true, isolatedModules:true, skipLibCheck:true, forceConsistentCasingInFileNames:true, noEmit:true, incremental:true, lib:'DOM,DOM.Iterable,ESNext', include:'next-env.d.ts,**/*.ts,**/*.tsx,.next/types/**/*.ts', exclude:'node_modules' },
  'Node.js': { target:'ES2022', module:'node16', moduleResolution:'node16', strict:true, esModuleInterop:true, resolveJsonModule:true, isolatedModules:true, skipLibCheck:true, forceConsistentCasingInFileNames:true, noFallthroughCasesInSwitch:true, outDir:'./dist', rootDir:'./src', sourceMap:true, declaration:true, include:'src', exclude:'node_modules,dist' },
  'Library': { target:'ES2020', module:'es2022', moduleResolution:'bundler', strict:true, esModuleInterop:true, resolveJsonModule:true, isolatedModules:true, skipLibCheck:true, forceConsistentCasingInFileNames:true, declaration:true, declarationMap:true, sourceMap:true, outDir:'./dist', rootDir:'./src', include:'src', exclude:'node_modules,dist,**/*.test.ts' },
};

let currentPreset = 'Strict Modern';

function buildForm() {
  const bar = $('presetBar');
  bar.innerHTML = '';
  for (const name of Object.keys(PRESETS)) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (name === currentPreset ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => applyPreset(name);
    bar.appendChild(btn);
  }

  const form = $('optionsForm');
  form.innerHTML = '';
  for (const group of OPTIONS) {
    const div = document.createElement('div');
    div.className = 'option-group';
    div.innerHTML = `<h3>${group.group}</h3>`;
    for (const item of group.items) {
      const row = document.createElement('div');
      row.className = 'option-row';
      if (item.type === 'bool') {
        row.innerHTML = `<input type="checkbox" id="opt_${item.key}" onchange="generate()"><label for="opt_${item.key}">${item.key}</label>`;
      } else if (item.type === 'select') {
        const opts = item.values.map(v => `<option value="${v}">${v || '(none)'}</option>`).join('');
        row.innerHTML = `<label for="opt_${item.key}">${item.key}</label><select id="opt_${item.key}" onchange="generate()">${opts}</select>`;
      } else {
        row.innerHTML = `<label for="opt_${item.key}">${item.key}</label><input type="text" id="opt_${item.key}" placeholder="comma-separated" oninput="generate()">`;
      }
      div.appendChild(row);
    }
    form.appendChild(div);
  }
}

function applyPreset(name) {
  currentPreset = name;
  const preset = PRESETS[name];

  // Reset all to defaults first
  for (const group of OPTIONS) {
    for (const item of group.items) {
      const el = $(`opt_${item.key}`);
      if (!el) continue;
      if (item.type === 'bool') el.checked = item.default;
      else el.value = item.default;
    }
  }

  // Apply preset values
  for (const [key, val] of Object.entries(preset)) {
    const el = $(`opt_${key}`);
    if (!el) continue;
    if (typeof val === 'boolean') el.checked = val;
    else el.value = val;
  }

  // Update active button
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === name);
  });

  generate();
}

function generate() {
  const config = { compilerOptions: {} };

  for (const group of OPTIONS) {
    for (const item of group.items) {
      if (item.key === 'include' || item.key === 'exclude') continue;
      const el = $(`opt_${item.key}`);
      if (!el) continue;

      if (item.type === 'bool') {
        if (el.checked) config.compilerOptions[item.key] = true;
      } else if (item.type === 'select') {
        if (el.value) config.compilerOptions[item.key] = el.value;
      } else {
        const val = el.value.trim();
        if (val) {
          if (item.key === 'lib') {
            config.compilerOptions.lib = val.split(',').map(s => s.trim()).filter(Boolean);
          } else if (item.key === 'paths') {
            try {
              config.compilerOptions.paths = JSON.parse(val);
            } catch {
              config.compilerOptions.paths = val;
            }
          } else {
            config.compilerOptions[item.key] = val;
          }
        }
      }
    }
  }

  const incEl = $('opt_include');
  const excEl = $('opt_exclude');
  if (incEl && incEl.value.trim()) {
    config.include = incEl.value.split(',').map(s => s.trim()).filter(Boolean);
  }
  if (excEl && excEl.value.trim()) {
    config.exclude = excEl.value.split(',').map(s => s.trim()).filter(Boolean);
  }

  $('output').value = JSON.stringify(config, null, 2);
}

function copyOutput() {
  const text = $('output').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const toast = $('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

buildForm();
applyPreset('Strict Modern');
</script>
</body>
</html>
