<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON ⇄ XML Converter — Free Online Tool</title>
    <meta name="description" content="Convert JSON to XML and XML to JSON instantly in your browser. Free, fast, private — no data leaves your device.">
    <meta name="keywords" content="json to xml, xml to json, converter, online tool, developer tool, free">
    <meta property="og:title" content="JSON ⇄ XML Converter — Free Online Tool">
    <meta property="og:description" content="Convert JSON to XML and XML to JSON instantly. Free, private, runs entirely in your browser.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/json2xml.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="JSON ⇄ XML Converter">
    <meta name="twitter:description" content="Convert JSON to XML and XML to JSON instantly in your browser.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/json2xml.html">
    <link rel="stylesheet" href="toolbox.css">
<style>
  .options{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px;padding:0 20px;font-size:.85rem}
  .options label{display:flex;align-items:center;gap:4px;cursor:pointer}
  .options input[type="text"]{width:80px;padding:4px 8px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;padding:0 20px;margin-bottom:14px}
  .controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .main{display:grid;grid-template-columns:1fr auto 1fr;gap:0;padding:0 20px;margin-bottom:14px}
  .panel{border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden}
  .panel label{display:block;padding:8px 12px;font-size:.85rem;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border)}
  .panel textarea{flex:1;min-height:300px;resize:vertical;border:none;padding:12px;font-family:var(--mono);font-size:.85rem;line-height:1.5;background:var(--bg);color:var(--text);outline:none}
  .panel textarea[readonly]{background:var(--surface2)}
  .arrow{display:flex;align-items:center;justify-content:center;padding:0 12px;cursor:pointer;font-size:1.2rem;color:var(--muted)}
  .arrow:hover{color:var(--text)}
  .status.ok{color:var(--success)}.status.error{color:var(--error)}
  @media(max-width:768px){.main{grid-template-columns:1fr}.arrow{padding:8px 0;justify-content:center}}
</style>
</head>
<body>
    <header>
        <h1>JSON ⇄ XML Converter</h1>
        <p>Convert between JSON and XML — runs entirely in your browser</p>
    </header>

    <div class="options">
        <label>Root tag: <input type="text" id="rootTag" value="root"></label>
        <label><input type="checkbox" id="prettyPrint" checked> Pretty print</label>
        <label><input type="checkbox" id="xmlDecl" checked> XML declaration</label>
    </div>

    <div class="controls">
        <button onclick="convertDirection('j2x')" id="btnJ2X" class="active">JSON → XML</button>
        <button onclick="convertDirection('x2j')" id="btnX2J">XML → JSON</button>
        <button onclick="copyOutput()">Copy Output</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div class="main">
        <div class="panel">
            <label id="inputLabel">JSON Input</label>
            <textarea id="input" spellcheck="false" placeholder='{"name": "Alice", "age": 30}'></textarea>
        </div>
        <div class="arrow" onclick="swapPanels()" title="Swap input/output">⇄</div>
        <div class="panel">
            <label id="outputLabel">XML Output</label>
            <textarea id="output" spellcheck="false" readonly></textarea>
        </div>
    </div>

    <div class="status" id="status"></div>

    <footer>
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
        &nbsp;·&nbsp;
        <a href="index.html">← All Tools</a>
    </footer>

    <script>
    let dir = 'j2x';

    function convertDirection(d) {
        dir = d;
        document.getElementById('btnJ2X').classList.toggle('active', d === 'j2x');
        document.getElementById('btnX2J').classList.toggle('active', d === 'x2j');
        document.getElementById('inputLabel').textContent = d === 'j2x' ? 'JSON Input' : 'XML Input';
        document.getElementById('outputLabel').textContent = d === 'j2x' ? 'XML Output' : 'JSON Output';
        convert();
    }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status ' + (type || '');
    }

    // JSON → XML
    function jsonToXml(obj, indent, level) {
        const pretty = document.getElementById('prettyPrint').checked;
        const nl = pretty ? '\n' : '';
        const pad = pretty ? '  '.repeat(level) : '';
        let xml = '';

        if (Array.isArray(obj)) {
            obj.forEach(item => {
                xml += pad + '<item>' + nl;
                if (typeof item === 'object' && item !== null) {
                    xml += jsonToXml(item, indent, level + 1);
                } else {
                    xml += (pretty ? pad + '  ' : '') + escXml(String(item)) + nl;
                }
                xml += pad + '</item>' + nl;
            });
        } else if (typeof obj === 'object' && obj !== null) {
            for (const [key, val] of Object.entries(obj)) {
                const tag = sanitizeTag(key);
                if (val === null) {
                    xml += pad + '<' + tag + ' />' + nl;
                } else if (Array.isArray(val)) {
                    val.forEach(item => {
                        if (typeof item === 'object' && item !== null) {
                            xml += pad + '<' + tag + '>' + nl + jsonToXml(item, indent, level + 1) + pad + '</' + tag + '>' + nl;
                        } else {
                            xml += pad + '<' + tag + '>' + escXml(String(item)) + '</' + tag + '>' + nl;
                        }
                    });
                } else if (typeof val === 'object') {
                    xml += pad + '<' + tag + '>' + nl + jsonToXml(val, indent, level + 1) + pad + '</' + tag + '>' + nl;
                } else {
                    xml += pad + '<' + tag + '>' + escXml(String(val)) + '</' + tag + '>' + nl;
                }
            }
        } else {
            xml += pad + escXml(String(obj)) + nl;
        }
        return xml;
    }

    function sanitizeTag(name) {
        let t = name.replace(/[^a-zA-Z0-9_.-]/g, '_');
        if (/^[^a-zA-Z_]/.test(t)) t = '_' + t;
        return t || '_';
    }

    function escXml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
    }

    // XML → JSON
    function xmlToJson(xmlStr) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlStr, 'application/xml');
        const err = doc.querySelector('parsererror');
        if (err) throw new Error('Invalid XML: ' + err.textContent.slice(0, 120));
        return nodeToJson(doc.documentElement);
    }

    function nodeToJson(node) {
        // Text-only node
        if (!node.children.length) {
            const text = node.textContent.trim();
            if (text === '') return null;
            if (text === 'true') return true;
            if (text === 'false') return false;
            const n = Number(text);
            if (!isNaN(n) && text !== '') return n;
            return text;
        }

        const obj = {};
        for (const child of node.children) {
            const key = child.tagName;
            const val = nodeToJson(child);
            if (key in obj) {
                if (!Array.isArray(obj[key])) obj[key] = [obj[key]];
                obj[key].push(val);
            } else {
                obj[key] = val;
            }
        }
        return obj;
    }

    function convert() {
        const input = document.getElementById('input').value.trim();
        const output = document.getElementById('output');
        if (!input) { output.value = ''; setStatus(''); return; }

        try {
            if (dir === 'j2x') {
                const json = JSON.parse(input);
                const root = document.getElementById('rootTag').value || 'root';
                const pretty = document.getElementById('prettyPrint').checked;
                const nl = pretty ? '\n' : '';
                let xml = '';
                if (document.getElementById('xmlDecl').checked) xml += '<?xml version="1.0" encoding="UTF-8"?>' + nl;
                xml += '<' + sanitizeTag(root) + '>' + nl;
                xml += jsonToXml(json, '  ', 1);
                xml += '</' + sanitizeTag(root) + '>';
                output.value = xml;
                setStatus('Converted successfully', 'ok');
            } else {
                const json = xmlToJson(input);
                const pretty = document.getElementById('prettyPrint').checked;
                output.value = JSON.stringify(json, null, pretty ? 2 : 0);
                setStatus('Converted successfully', 'ok');
            }
        } catch (e) {
            output.value = '';
            setStatus(e.message, 'error');
        }
    }

    function swapPanels() {
        const inp = document.getElementById('input');
        const out = document.getElementById('output');
        const tmp = out.value;
        inp.value = tmp;
        out.value = '';
        convertDirection(dir === 'j2x' ? 'x2j' : 'j2x');
    }

    function copyOutput() {
        const text = document.getElementById('output').value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => setStatus('Copied!', 'ok'));
    }

    function clearAll() {
        document.getElementById('input').value = '';
        document.getElementById('output').value = '';
        setStatus('');
    }

    document.getElementById('input').addEventListener('input', convert);
    document.getElementById('rootTag').addEventListener('input', convert);
    document.getElementById('prettyPrint').addEventListener('change', convert);
    document.getElementById('xmlDecl').addEventListener('change', convert);
    </script>
</body>
</html>
