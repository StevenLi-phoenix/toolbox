<div class="container">

<p class="subtitle">Write Markdown, see it rendered live</p>

<div class="editor-wrap">
<div class="pane">
<div class="pane-header">
<span>Markdown</span>
<div class="toolbar">
<button onclick="ins('**','**')" title="Bold"><b>B</b></button>
<button onclick="ins('*','*')" title="Italic"><i>I</i></button>
<button onclick="ins('~~','~~')" title="Strikethrough"><s>S</s></button>
<button onclick="ins('`','`')" title="Code">{ }</button>
<button onclick="ins('\n```\n','\n```\n')" title="Code Block">```</button>
<button onclick="ins('[','](url)')" title="Link">🔗</button>
<button onclick="ins('![alt](',')')" title="Image">🖼</button>
<button onclick="insLine('> ')" title="Quote">❝</button>
<button onclick="insLine('- ')" title="List">•</button>
<button onclick="insLine('- [ ] ')" title="Task">☐</button>
</div>
</div>
<textarea id="editor" placeholder="Type Markdown here..." oninput="render()"># Hello World

Welcome to the **Markdown Preview** tool!

## Features

- **Bold**, *italic*, ~~strikethrough~~
- `inline code` and code blocks
- [Links](https://example.com)
- Lists and task lists

### Code Block

```
function hello() {
  console.log("Hello!");
}
```

### Table

| Feature | Status |
|---------|--------|
| Headers | ✅ |
| Lists | ✅ |
| Code | ✅ |
| Tables | ✅ |

### Task List

- [x] Write markdown
- [x] Preview it
- [ ] Ship it

> This is a blockquote. It can contain **formatted** text.

*Built with no dependencies — pure JavaScript parsing.*</textarea>
</div>
<div class="pane">
<div class="pane-header">
<span>Preview</span>
<div class="btn-row">
<button class="btn-sm btn-secondary" onclick="copyHTML()">📋 HTML</button>
<button class="btn-sm btn-secondary" onclick="copyMd()">📋 MD</button>
</div>
</div>
<div class="preview" id="preview"></div>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
const editor=$('editor');

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseMarkdown(md){
  let html=md;
  // code blocks
  html=html.replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>`<pre><code>${esc(code.trim())}</code></pre>`);
  // inline code
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
  // images
  html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  // links
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  // headings
  html=html.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // hr
  html=html.replace(/^---+$/gm,'<hr>');
  // bold & italic
  html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
  html=html.replace(/~~(.+?)~~/g,'<del>$1</del>');
  // blockquotes
  html=html.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  html=html.replace(/<\/blockquote>\n<blockquote>/g,'\n');
  // task lists
  html=html.replace(/^- \[x\] (.+)$/gm,'<li class="task"><input type="checkbox" checked disabled> $1</li>');
  html=html.replace(/^- \[ \] (.+)$/gm,'<li class="task"><input type="checkbox" disabled> $1</li>');
  // unordered lists
  html=html.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');
  // ordered lists
  html=html.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  // wrap consecutive <li> in <ul>
  html=html.replace(/((?:<li[^>]*>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  html=html.replace(/<ul>((?:<li class="task">.*<\/li>\n?)+)<\/ul>/g,'<ul class="task-list">$1</ul>');
  // tables
  html=html.replace(/^(\|.+\|)\n(\|[\-\s|:]+\|)\n((?:\|.+\|\n?)*)/gm,(_,header,_sep,body)=>{
    const th=header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const rows=body.trim().split('\n').map(r=>{
      const cells=r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  // paragraphs - wrap remaining text lines
  html=html.split('\n\n').map(block=>{
    block=block.trim();
    if(!block)return '';
    if(/^<(h[1-6]|ul|ol|pre|blockquote|table|hr|div|li)/.test(block)) return block;
    if(!block.startsWith('<')) return `<p>${block.replace(/\n/g,'<br>')}</p>`;
    return block;
  }).join('\n');
  return html;
}

function render(){
  $('preview').innerHTML=parseMarkdown(editor.value);
}

function ins(before,after){
  const s=editor.selectionStart,e=editor.selectionEnd;
  const sel=editor.value.substring(s,e)||'text';
  editor.value=editor.value.substring(0,s)+before+sel+after+editor.value.substring(e);
  editor.selectionStart=s+before.length;
  editor.selectionEnd=s+before.length+sel.length;
  editor.focus();render();
}

function insLine(prefix){
  const s=editor.selectionStart;
  const before=editor.value.substring(0,s);
  const lineStart=before.lastIndexOf('\n')+1;
  editor.value=editor.value.substring(0,lineStart)+prefix+editor.value.substring(lineStart);
  editor.selectionStart=editor.selectionEnd=s+prefix.length;
  editor.focus();render();
}

function copyHTML(){
  navigator.clipboard.writeText($('preview').innerHTML).then(toast);
}
function copyMd(){
  navigator.clipboard.writeText(editor.value).then(toast);
}
function toast(){const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}

// tab key support
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart;
    editor.value=editor.value.substring(0,s)+'  '+editor.value.substring(editor.selectionEnd);
    editor.selectionStart=editor.selectionEnd=s+2;
    render();
  }
});

render();
</script>
</body>
</html>
