<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Preview - Free Online Markdown Renderer</title>
<meta name="description" content="Free online Markdown preview. Write Markdown and see it rendered in real time. Supports GitHub Flavored Markdown. No data sent to any server.">
<meta name="keywords" content="markdown preview, markdown editor, markdown renderer, github markdown, gfm, free markdown tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/markdown.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:1200px}
.editor-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
@media(max-width:768px){.editor-wrap{grid-template-columns:1fr}}
.pane{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;min-height:500px}
.pane-header{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.85rem;font-weight:600;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
textarea{flex:1;width:100%;background:transparent;color:var(--text);border:none;padding:1rem;font-family:'Courier New',monospace;font-size:.9rem;line-height:1.6;resize:none}
textarea:focus{outline:none}
textarea::placeholder{color:var(--muted)}
.preview{flex:1;padding:1rem;overflow-y:auto;line-height:1.7;font-size:.95rem}
.preview h1{font-size:1.8rem;margin:1.5rem 0 .75rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
.preview h2{font-size:1.4rem;margin:1.25rem 0 .6rem;padding-bottom:.25rem;border-bottom:1px solid var(--border)}
.preview h3{font-size:1.15rem;margin:1rem 0 .5rem}
.preview h4{font-size:1rem;margin:.75rem 0 .4rem}
.preview p{margin:.6rem 0}
.preview a{color:var(--accent);text-decoration:none}
.preview a:hover{text-decoration:underline}
.preview code{background:var(--bg);padding:.15rem .4rem;border-radius:4px;font-size:.85em;font-family:'Courier New',monospace}
.preview pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;overflow-x:auto;margin:.75rem 0}
.preview pre code{background:none;padding:0;font-size:.85rem}
.preview blockquote{border-left:3px solid var(--accent);padding:.5rem 1rem;margin:.75rem 0;color:var(--muted);background:rgba(59,130,246,.05);border-radius:0 8px 8px 0}
.preview ul,.preview ol{padding-left:1.5rem;margin:.5rem 0}
.preview li{margin:.25rem 0}
.preview table{border-collapse:collapse;width:100%;margin:.75rem 0}
.preview th,.preview td{border:1px solid var(--border);padding:.5rem .75rem;text-align:left}
.preview th{background:var(--bg);font-weight:600}
.preview img{max-width:100%;border-radius:8px}
.preview hr{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
.preview input[type="checkbox"]{margin-right:.4rem;accent-color:var(--accent)}
.preview .task-list{list-style:none;padding-left:.5rem}
.btn-row{display:flex;gap:.75rem;flex-wrap:wrap}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-sm{padding:.4rem .75rem;font-size:.8rem}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.toolbar{display:flex;gap:.25rem;flex-wrap:wrap}
.toolbar button{background:transparent;color:var(--muted);border:1px solid transparent;padding:.3rem .5rem;font-size:.8rem;border-radius:4px}
.toolbar button:hover{color:var(--text);border-color:var(--border)}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Markdown Preview</h1>
<p class="subtitle">Write Markdown, see it rendered live</p>

<div class="editor-wrap">
<div class="pane">
<div class="pane-header">
<span>Markdown</span>
<div class="toolbar">
<button onclick="ins('**','**')" title="Bold"><b>B</b></button>
<button onclick="ins('*','*')" title="Italic"><i>I</i></button>
<button onclick="ins('~~','~~')" title="Strikethrough"><s>S</s></button>
<button onclick="ins('`','`')" title="Code">{ }</button>
<button onclick="ins('\n```\n','\n```\n')" title="Code Block">```</button>
<button onclick="ins('[','](url)')" title="Link">🔗</button>
<button onclick="ins('![alt](',')')" title="Image">🖼</button>
<button onclick="insLine('> ')" title="Quote">❝</button>
<button onclick="insLine('- ')" title="List">•</button>
<button onclick="insLine('- [ ] ')" title="Task">☐</button>
</div>
</div>
<textarea id="editor" placeholder="Type Markdown here..." oninput="render()"># Hello World

Welcome to the **Markdown Preview** tool!

## Features

- **Bold**, *italic*, ~~strikethrough~~
- `inline code` and code blocks
- [Links](https://example.com)
- Lists and task lists

### Code Block

```
function hello() {
  console.log("Hello!");
}
```

### Table

| Feature | Status |
|---------|--------|
| Headers | ✅ |
| Lists | ✅ |
| Code | ✅ |
| Tables | ✅ |

### Task List

- [x] Write markdown
- [x] Preview it
- [ ] Ship it

> This is a blockquote. It can contain **formatted** text.

---

*Built with no dependencies — pure JavaScript parsing.*</textarea>
</div>
<div class="pane">
<div class="pane-header">
<span>Preview</span>
<div class="btn-row">
<button class="btn-sm btn-secondary" onclick="copyHTML()">📋 HTML</button>
<button class="btn-sm btn-secondary" onclick="copyMd()">📋 MD</button>
</div>
</div>
<div class="preview" id="preview"></div>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
const editor=$('editor');

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseMarkdown(md){
  let html=md;
  // code blocks
  html=html.replace(/```(\w*)\n([\s\S]*?)```/g,(_,lang,code)=>`<pre><code>${esc(code.trim())}</code></pre>`);
  // inline code
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
  // images
  html=html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  // links
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  // headings
  html=html.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // hr
  html=html.replace(/^---+$/gm,'<hr>');
  // bold & italic
  html=html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
  html=html.replace(/~~(.+?)~~/g,'<del>$1</del>');
  // blockquotes
  html=html.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  html=html.replace(/<\/blockquote>\n<blockquote>/g,'\n');
  // task lists
  html=html.replace(/^- \[x\] (.+)$/gm,'<li class="task"><input type="checkbox" checked disabled> $1</li>');
  html=html.replace(/^- \[ \] (.+)$/gm,'<li class="task"><input type="checkbox" disabled> $1</li>');
  // unordered lists
  html=html.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');
  // ordered lists
  html=html.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  // wrap consecutive <li> in <ul>
  html=html.replace(/((?:<li[^>]*>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  html=html.replace(/<ul>((?:<li class="task">.*<\/li>\n?)+)<\/ul>/g,'<ul class="task-list">$1</ul>');
  // tables
  html=html.replace(/^(\|.+\|)\n(\|[\-\s|:]+\|)\n((?:\|.+\|\n?)*)/gm,(_,header,_sep,body)=>{
    const th=header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const rows=body.trim().split('\n').map(r=>{
      const cells=r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  // paragraphs - wrap remaining text lines
  html=html.split('\n\n').map(block=>{
    block=block.trim();
    if(!block)return '';
    if(/^<(h[1-6]|ul|ol|pre|blockquote|table|hr|div|li)/.test(block)) return block;
    if(!block.startsWith('<')) return `<p>${block.replace(/\n/g,'<br>')}</p>`;
    return block;
  }).join('\n');
  return html;
}

function render(){
  $('preview').innerHTML=parseMarkdown(editor.value);
}

function ins(before,after){
  const s=editor.selectionStart,e=editor.selectionEnd;
  const sel=editor.value.substring(s,e)||'text';
  editor.value=editor.value.substring(0,s)+before+sel+after+editor.value.substring(e);
  editor.selectionStart=s+before.length;
  editor.selectionEnd=s+before.length+sel.length;
  editor.focus();render();
}

function insLine(prefix){
  const s=editor.selectionStart;
  const before=editor.value.substring(0,s);
  const lineStart=before.lastIndexOf('\n')+1;
  editor.value=editor.value.substring(0,lineStart)+prefix+editor.value.substring(lineStart);
  editor.selectionStart=editor.selectionEnd=s+prefix.length;
  editor.focus();render();
}

function copyHTML(){
  navigator.clipboard.writeText($('preview').innerHTML).then(toast);
}
function copyMd(){
  navigator.clipboard.writeText(editor.value).then(toast);
}
function toast(){const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}

// tab key support
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart;
    editor.value=editor.value.substring(0,s)+'  '+editor.value.substring(editor.selectionEnd);
    editor.selectionStart=editor.selectionEnd=s+2;
    render();
  }
});

render();
</script>
</body>
</html>
