<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filter Playground - Visual CSS Filter Generator</title>
    <meta name="description" content="Visually adjust CSS filter properties like blur, brightness, contrast, grayscale, hue-rotate, and more. Get instant CSS code output.">
    <meta name="keywords" content="CSS filter, filter generator, CSS effects, blur, brightness, contrast, grayscale, hue-rotate, web tool, developer tool">
    <meta name="author" content="Steven Li">
    <meta property="og:title" content="CSS Filter Playground - Visual CSS Filter Generator">
    <meta property="og:description" content="Drag sliders to visually adjust CSS filter properties and copy the generated CSS code instantly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/cssfilter.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="CSS Filter Playground">
    <meta name="twitter:description" content="Visual CSS filter generator with live preview and instant code output.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/cssfilter.html">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh;display:flex;flex-direction:column}
        header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        header h1{font-size:1.25rem;font-weight:600;color:#f0f6fc}
        header h1 span{color:#79c0ff}
        .coffee-link{color:#f0883e;text-decoration:none;font-size:.85rem;transition:color .2s}
        .coffee-link:hover{color:#ffa657}
        main{flex:1;display:flex;gap:20px;padding:20px;max-width:1400px;width:100%;margin:0 auto}
        .preview-panel{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px}
        .controls-panel{width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
        .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
        .preview-area{flex:1;display:flex;align-items:center;justify-content:center;min-height:300px;overflow:hidden;position:relative}
        .preview-area img,.preview-area .demo-box{max-width:100%;max-height:100%;object-fit:contain;transition:filter .15s}
        .demo-box{width:280px;height:200px;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3)}
        .upload-hint{position:absolute;bottom:12px;right:12px;font-size:.75rem;color:#8b949e;background:rgba(13,17,23,.8);padding:6px 10px;border-radius:6px;cursor:pointer;border:1px dashed #30363d;transition:border-color .2s}
        .upload-hint:hover{border-color:#58a6ff}
        .slider-group{display:flex;flex-direction:column;gap:4px}
        .slider-header{display:flex;justify-content:space-between;align-items:center}
        .slider-label{font-size:.8rem;color:#c9d1d9;font-weight:500}
        .slider-value{font-size:.75rem;color:#8b949e;font-family:'SF Mono',monospace;min-width:50px;text-align:right}
        input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:#21262d;border-radius:3px;outline:none;cursor:pointer}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#58a6ff;border-radius:50%;cursor:pointer;transition:background .2s}
        input[type=range]::-webkit-slider-thumb:hover{background:#79c0ff}
        input[type=range]::-moz-range-thumb{width:16px;height:16px;background:#58a6ff;border-radius:50%;cursor:pointer;border:none}
        .code-output{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;font-family:'SF Mono',Consolas,monospace;font-size:.8rem;color:#79c0ff;white-space:pre-wrap;word-break:break-all;line-height:1.5;position:relative;min-height:60px}
        .btn-row{display:flex;gap:8px;flex-wrap:wrap}
        .btn{padding:8px 14px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:.8rem;font-weight:500;transition:all .2s;flex:1;text-align:center}
        .btn:hover{background:#30363d;border-color:#58a6ff;color:#f0f6fc}
        .btn.primary{background:#238636;border-color:#2ea043;color:#fff}
        .btn.primary:hover{background:#2ea043}
        .btn.danger{border-color:#f85149}
        .btn.danger:hover{background:#da3633;color:#fff}
        .presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
        .preset{padding:4px 10px;border-radius:4px;background:#21262d;border:1px solid #30363d;color:#8b949e;cursor:pointer;font-size:.7rem;transition:all .2s}
        .preset:hover{border-color:#58a6ff;color:#c9d1d9}
        .section-title{font-size:.85rem;font-weight:600;color:#f0f6fc;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #21262d}
        .copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:6px;font-size:.85rem;z-index:999;animation:fadeOut 2s forwards}
        @keyframes fadeOut{0%,70%{opacity:1}100%{opacity:0}}
        footer{text-align:center;padding:16px;color:#8b949e;font-size:.75rem;border-top:1px solid #21262d}
        footer a{color:#58a6ff;text-decoration:none}
        #fileInput{display:none}
        @media(max-width:768px){
            main{flex-direction:column;padding:12px}
            .controls-panel{width:100%}
            .preview-area{min-height:220px}
        }
    </style>
</head>
<body>
    <header>
        <h1>🎨 CSS Filter <span>Playground</span></h1>
        <a class="coffee-link" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
    </header>
    <main>
        <div class="preview-panel">
            <div class="card preview-area" id="previewArea">
                <div class="demo-box" id="demoBox">CSS Filters</div>
                <img id="previewImg" style="display:none" alt="Preview">
                <label class="upload-hint" for="fileInput">📁 Upload image</label>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <div class="card">
                <div class="section-title">Generated CSS</div>
                <div class="code-output" id="codeOutput"></div>
                <div class="btn-row" style="margin-top:10px">
                    <button class="btn primary" onclick="copyCSS()">📋 Copy CSS</button>
                    <button class="btn danger" onclick="resetAll()">↺ Reset All</button>
                </div>
            </div>
        </div>
        <div class="controls-panel">
            <div class="card">
                <div class="section-title">Filter Controls</div>
                <div id="sliders"></div>
            </div>
            <div class="card">
                <div class="section-title">Presets</div>
                <div class="presets" id="presets"></div>
            </div>
        </div>
    </main>
    <footer>
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Support this project</a> · Built by Steven Li
    </footer>

    <script>
    const filters = [
        {id:'blur',label:'Blur',min:0,max:20,step:0.5,def:0,unit:'px'},
        {id:'brightness',label:'Brightness',min:0,max:3,step:0.05,def:1,unit:''},
        {id:'contrast',label:'Contrast',min:0,max:3,step:0.05,def:1,unit:''},
        {id:'grayscale',label:'Grayscale',min:0,max:1,step:0.05,def:0,unit:''},
        {id:'hueRotate',label:'Hue Rotate',min:0,max:360,step:1,def:0,unit:'deg',cssProp:'hue-rotate'},
        {id:'invert',label:'Invert',min:0,max:1,step:0.05,def:0,unit:''},
        {id:'opacity',label:'Opacity',min:0,max:1,step:0.05,def:1,unit:''},
        {id:'saturate',label:'Saturate',min:0,max:3,step:0.05,def:1,unit:''},
        {id:'sepia',label:'Sepia',min:0,max:1,step:0.05,def:0,unit:''},
        {id:'dropShadowX',label:'Drop Shadow X',min:-20,max:20,step:1,def:0,unit:'px',group:'dropShadow'},
        {id:'dropShadowY',label:'Drop Shadow Y',min:-20,max:20,step:1,def:0,unit:'px',group:'dropShadow'},
        {id:'dropShadowBlur',label:'Drop Shadow Blur',min:0,max:30,step:1,def:0,unit:'px',group:'dropShadow'},
    ];

    const presets = [
        {name:'Vintage',values:{brightness:1.1,contrast:0.9,saturate:0.8,sepia:0.4}},
        {name:'B&W',values:{grayscale:1,contrast:1.2}},
        {name:'Warm',values:{brightness:1.05,saturate:1.3,sepia:0.2,hueRotate:10}},
        {name:'Cool',values:{brightness:1.05,saturate:1.1,hueRotate:200}},
        {name:'High Contrast',values:{contrast:1.8,brightness:1.1}},
        {name:'Dreamy',values:{blur:1.5,brightness:1.15,contrast:0.9,saturate:1.4}},
        {name:'Neon',values:{brightness:1.3,contrast:1.5,saturate:2.5}},
        {name:'Faded',values:{brightness:1.1,contrast:0.85,saturate:0.6}},
        {name:'Inverted',values:{invert:1}},
        {name:'X-Ray',values:{invert:1,hueRotate:180,brightness:1.3}},
    ];

    const state = {};
    const slidersEl = document.getElementById('sliders');
    const codeEl = document.getElementById('codeOutput');
    const demoBox = document.getElementById('demoBox');
    const previewImg = document.getElementById('previewImg');
    let useImage = false;

    filters.forEach(f => {
        state[f.id] = f.def;
        const div = document.createElement('div');
        div.className = 'slider-group';
        div.innerHTML = `
            <div class="slider-header">
                <span class="slider-label">${f.label}</span>
                <span class="slider-value" id="val-${f.id}">${f.def}${f.unit}</span>
            </div>
            <input type="range" id="s-${f.id}" min="${f.min}" max="${f.max}" step="${f.step}" value="${f.def}">
        `;
        slidersEl.appendChild(div);
        const input = div.querySelector('input');
        input.addEventListener('input', () => {
            state[f.id] = parseFloat(input.value);
            document.getElementById(`val-${f.id}`).textContent = input.value + f.unit;
            update();
        });
    });

    const presetsEl = document.getElementById('presets');
    presets.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'preset';
        btn.textContent = p.name;
        btn.addEventListener('click', () => {
            resetAll(true);
            Object.entries(p.values).forEach(([k,v]) => {
                state[k] = v;
                const input = document.getElementById(`s-${k}`);
                const f = filters.find(x => x.id === k);
                if (input && f) {
                    input.value = v;
                    document.getElementById(`val-${k}`).textContent = v + f.unit;
                }
            });
            update();
        });
        presetsEl.appendChild(btn);
    });

    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            previewImg.src = ev.target.result;
            previewImg.style.display = 'block';
            demoBox.style.display = 'none';
            useImage = true;
            update();
        };
        reader.readAsDataURL(file);
    });

    function buildFilter() {
        const parts = [];
        filters.forEach(f => {
            if (f.group === 'dropShadow') return;
            const v = state[f.id];
            if (v === f.def) return;
            const prop = f.cssProp || f.id.replace(/([A-Z])/g, '-$1').toLowerCase();
            parts.push(`${prop}(${v}${f.unit})`);
        });
        const sx = state.dropShadowX, sy = state.dropShadowY, sb = state.dropShadowBlur;
        if (sx !== 0 || sy !== 0 || sb !== 0) {
            parts.push(`drop-shadow(${sx}px ${sy}px ${sb}px rgba(0,0,0,0.5))`);
        }
        return parts.length ? parts.join(' ') : 'none';
    }

    function update() {
        const filterStr = buildFilter();
        const target = useImage ? previewImg : demoBox;
        target.style.filter = filterStr;
        if (filterStr === 'none') {
            codeEl.textContent = 'filter: none;';
        } else {
            codeEl.textContent = `filter: ${filterStr};`;
        }
    }

    function resetAll(silent) {
        filters.forEach(f => {
            state[f.id] = f.def;
            const input = document.getElementById(`s-${f.id}`);
            input.value = f.def;
            document.getElementById(`val-${f.id}`).textContent = f.def + f.unit;
        });
        if (!silent) update();
    }

    function copyCSS() {
        const text = codeEl.textContent;
        navigator.clipboard.writeText(text).then(() => {
            const msg = document.createElement('div');
            msg.className = 'copied';
            msg.textContent = '✓ Copied!';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        });
    }

    update();
    </script>
</body>
</html>
