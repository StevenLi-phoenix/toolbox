<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filter Playground - Visual CSS Filter Generator</title>
    <meta name="description" content="Visually adjust CSS filter properties like blur, brightness, contrast, grayscale, hue-rotate, and more. Get instant CSS code output.">
    <meta name="keywords" content="CSS filter, filter generator, CSS effects, blur, brightness, contrast, grayscale, hue-rotate, web tool, developer tool">
    <meta name="author" content="Steven Li">
    <meta property="og:title" content="CSS Filter Playground - Visual CSS Filter Generator">
    <meta property="og:description" content="Drag sliders to visually adjust CSS filter properties and copy the generated CSS code instantly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/cssfilter.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="CSS Filter Playground">
    <meta name="twitter:description" content="Visual CSS filter generator with live preview and instant code output.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/cssfilter.html">
    <link rel="stylesheet" href="toolbox.css">
    <style>
      header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px}
      header h1{font-size:1.3rem}
      header h1 span{font-weight:400;color:var(--muted)}
      .coffee-link{color:var(--muted);text-decoration:none;font-size:.82rem}
      .coffee-link:hover{color:var(--text)}
      main{display:grid;grid-template-columns:1fr 300px;gap:16px;max-width:1100px;margin:0 auto;padding:0 20px 20px}
      .preview-panel{display:grid;gap:16px}
      .preview-area{min-height:260px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:var(--radius);overflow:hidden;position:relative}
      .demo-box{font-size:2.5rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:30px}
      .preview-area img{max-width:100%;max-height:300px;display:block;object-fit:contain}
      .upload-hint{position:absolute;bottom:10px;right:10px;font-size:.78rem;color:var(--muted);cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
      .preview-area input[type=file]{display:none}
      .controls-panel{display:grid;gap:16px;align-content:start}
      .section-title{font-size:.9rem;font-weight:600;margin-bottom:10px}
      .code-output{font-family:var(--mono);font-size:.85rem;background:var(--surface2);padding:12px;border-radius:var(--radius);border:1px solid var(--border);white-space:pre-wrap;min-height:40px}
      .slider-group{margin-bottom:14px}
      .slider-header{display:flex;justify-content:space-between;margin-bottom:4px}
      .slider-label{font-size:.82rem;font-weight:600}
      .slider-value{font-size:.78rem;color:var(--muted);font-family:var(--mono)}
      .slider-group input[type=range]{width:100%;accent-color:var(--accent)}
      .presets{display:flex;flex-wrap:wrap;gap:6px}
      .preset{padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.82rem;cursor:pointer}
      .preset:hover{border-color:var(--accent)}
      .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
      .btn.danger{color:var(--error);border-color:var(--error)}
      .copied{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 18px;border-radius:var(--radius);font-size:.85rem;font-weight:600;z-index:999;animation:fadeUp .3s ease}
      @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
      @media(max-width:768px){main{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <header>
        <h1>🎨 CSS Filter <span>Playground</span></h1>
        <a class="coffee-link" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
    </header>
    <main>
        <div class="preview-panel">
            <div class="card preview-area" id="previewArea">
                <div class="demo-box" id="demoBox">CSS Filters</div>
                <img id="previewImg" style="display:none" alt="Preview">
                <label class="upload-hint" for="fileInput">📁 Upload image</label>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <div class="card">
                <div class="section-title">Generated CSS</div>
                <div class="code-output" id="codeOutput"></div>
                <div class="btn-row" style="margin-top:10px">
                    <button class="btn primary" onclick="copyCSS()">📋 Copy CSS</button>
                    <button class="btn danger" onclick="resetAll()">↺ Reset All</button>
                </div>
            </div>
        </div>
        <div class="controls-panel">
            <div class="card">
                <div class="section-title">Filter Controls</div>
                <div id="sliders"></div>
            </div>
            <div class="card">
                <div class="section-title">Presets</div>
                <div class="presets" id="presets"></div>
            </div>
        </div>
    </main>
    <footer>
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Support this project</a> · Built by Steven Li
    </footer>

    <script>
    const filters = [
        {id:'blur',label:'Blur',min:0,max:20,step:0.5,def:0,unit:'px'},
        {id:'brightness',label:'Brightness',min:0,max:3,step:0.05,def:1,unit:''},
        {id:'contrast',label:'Contrast',min:0,max:3,step:0.05,def:1,unit:''},
        {id:'grayscale',label:'Grayscale',min:0,max:1,step:0.05,def:0,unit:''},
        {id:'hueRotate',label:'Hue Rotate',min:0,max:360,step:1,def:0,unit:'deg',cssProp:'hue-rotate'},
        {id:'invert',label:'Invert',min:0,max:1,step:0.05,def:0,unit:''},
        {id:'opacity',label:'Opacity',min:0,max:1,step:0.05,def:1,unit:''},
        {id:'saturate',label:'Saturate',min:0,max:3,step:0.05,def:1,unit:''},
        {id:'sepia',label:'Sepia',min:0,max:1,step:0.05,def:0,unit:''},
        {id:'dropShadowX',label:'Drop Shadow X',min:-20,max:20,step:1,def:0,unit:'px',group:'dropShadow'},
        {id:'dropShadowY',label:'Drop Shadow Y',min:-20,max:20,step:1,def:0,unit:'px',group:'dropShadow'},
        {id:'dropShadowBlur',label:'Drop Shadow Blur',min:0,max:30,step:1,def:0,unit:'px',group:'dropShadow'},
    ];

    const presets = [
        {name:'Vintage',values:{brightness:1.1,contrast:0.9,saturate:0.8,sepia:0.4}},
        {name:'B&W',values:{grayscale:1,contrast:1.2}},
        {name:'Warm',values:{brightness:1.05,saturate:1.3,sepia:0.2,hueRotate:10}},
        {name:'Cool',values:{brightness:1.05,saturate:1.1,hueRotate:200}},
        {name:'High Contrast',values:{contrast:1.8,brightness:1.1}},
        {name:'Dreamy',values:{blur:1.5,brightness:1.15,contrast:0.9,saturate:1.4}},
        {name:'Neon',values:{brightness:1.3,contrast:1.5,saturate:2.5}},
        {name:'Faded',values:{brightness:1.1,contrast:0.85,saturate:0.6}},
        {name:'Inverted',values:{invert:1}},
        {name:'X-Ray',values:{invert:1,hueRotate:180,brightness:1.3}},
    ];

    const state = {};
    const slidersEl = document.getElementById('sliders');
    const codeEl = document.getElementById('codeOutput');
    const demoBox = document.getElementById('demoBox');
    const previewImg = document.getElementById('previewImg');
    let useImage = false;

    filters.forEach(f => {
        state[f.id] = f.def;
        const div = document.createElement('div');
        div.className = 'slider-group';
        div.innerHTML = `
            <div class="slider-header">
                <span class="slider-label">${f.label}</span>
                <span class="slider-value" id="val-${f.id}">${f.def}${f.unit}</span>
            </div>
            <input type="range" id="s-${f.id}" min="${f.min}" max="${f.max}" step="${f.step}" value="${f.def}">
        `;
        slidersEl.appendChild(div);
        const input = div.querySelector('input');
        input.addEventListener('input', () => {
            state[f.id] = parseFloat(input.value);
            document.getElementById(`val-${f.id}`).textContent = input.value + f.unit;
            update();
        });
    });

    const presetsEl = document.getElementById('presets');
    presets.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'preset';
        btn.textContent = p.name;
        btn.addEventListener('click', () => {
            resetAll(true);
            Object.entries(p.values).forEach(([k,v]) => {
                state[k] = v;
                const input = document.getElementById(`s-${k}`);
                const f = filters.find(x => x.id === k);
                if (input && f) {
                    input.value = v;
                    document.getElementById(`val-${k}`).textContent = v + f.unit;
                }
            });
            update();
        });
        presetsEl.appendChild(btn);
    });

    document.getElementById('fileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            previewImg.src = ev.target.result;
            previewImg.style.display = 'block';
            demoBox.style.display = 'none';
            useImage = true;
            update();
        };
        reader.readAsDataURL(file);
    });

    function buildFilter() {
        const parts = [];
        filters.forEach(f => {
            if (f.group === 'dropShadow') return;
            const v = state[f.id];
            if (v === f.def) return;
            const prop = f.cssProp || f.id.replace(/([A-Z])/g, '-$1').toLowerCase();
            parts.push(`${prop}(${v}${f.unit})`);
        });
        const sx = state.dropShadowX, sy = state.dropShadowY, sb = state.dropShadowBlur;
        if (sx !== 0 || sy !== 0 || sb !== 0) {
            parts.push(`drop-shadow(${sx}px ${sy}px ${sb}px rgba(0,0,0,0.5))`);
        }
        return parts.length ? parts.join(' ') : 'none';
    }

    function update() {
        const filterStr = buildFilter();
        const target = useImage ? previewImg : demoBox;
        target.style.filter = filterStr;
        if (filterStr === 'none') {
            codeEl.textContent = 'filter: none;';
        } else {
            codeEl.textContent = `filter: ${filterStr};`;
        }
    }

    function resetAll(silent) {
        filters.forEach(f => {
            state[f.id] = f.def;
            const input = document.getElementById(`s-${f.id}`);
            input.value = f.def;
            document.getElementById(`val-${f.id}`).textContent = f.def + f.unit;
        });
        if (!silent) update();
    }

    function copyCSS() {
        const text = codeEl.textContent;
        navigator.clipboard.writeText(text).then(() => {
            const msg = document.createElement('div');
            msg.className = 'copied';
            msg.textContent = '✓ Copied!';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        });
    }

    update();
    </script>
</body>
</html>
