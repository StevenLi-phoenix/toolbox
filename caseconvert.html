<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Case Converter - Free Online Tool</title>
<meta name="description" content="Free online text case converter. Convert text to uppercase, lowercase, title case, sentence case, camelCase, snake_case, kebab-case and more instantly.">
<meta name="keywords" content="text case converter, uppercase, lowercase, title case, camelCase, snake_case, kebab-case, free text tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/caseconvert.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:800px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:var(--font);font-size:.95rem;line-height:1.5;min-height:140px;resize:vertical;transition:border-color .2s}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.btns{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem}
button{padding:.5rem 1rem;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-case{background:var(--border);color:var(--text)}
.btn-case:hover{background:var(--accent);color:#fff}
.btn-case.active{background:var(--accent);color:#fff}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.stats{font-size:.8rem;color:var(--muted);margin-top:.5rem}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Text Case Converter</h1>
<p class="subtitle">Convert text between different cases instantly</p>

<div class="card">
<h2>📝 Input</h2>
<textarea id="input" placeholder="Type or paste your text here..." oninput="convert()">The Quick Brown Fox Jumps Over The Lazy Dog</textarea>
<div class="stats" id="stats"></div>
</div>

<div class="card">
<h2>🔄 Convert To</h2>
<div class="btns">
<button class="btn-case" onclick="apply('upper',this)">UPPERCASE</button>
<button class="btn-case" onclick="apply('lower',this)">lowercase</button>
<button class="btn-case" onclick="apply('title',this)">Title Case</button>
<button class="btn-case" onclick="apply('sentence',this)">Sentence case</button>
<button class="btn-case" onclick="apply('camel',this)">camelCase</button>
<button class="btn-case" onclick="apply('pascal',this)">PascalCase</button>
<button class="btn-case" onclick="apply('snake',this)">snake_case</button>
<button class="btn-case" onclick="apply('kebab',this)">kebab-case</button>
<button class="btn-case" onclick="apply('constant',this)">CONSTANT_CASE</button>
<button class="btn-case" onclick="apply('dot',this)">dot.case</button>
<button class="btn-case" onclick="apply('toggle',this)">tOGGLE cASE</button>
<button class="btn-case" onclick="apply('alternating',this)">aLtErNaTiNg</button>
</div>
</div>

<div class="card">
<h2>📤 Output</h2>
<textarea id="output" readonly></textarea>
<div style="display:flex;gap:.75rem;margin-top:1rem">
<button class="btn-primary" onclick="copyOut()">📋 Copy</button>
<button class="btn-case" onclick="useAsInput()">↩️ Use as Input</button>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
let currentMode='upper';
function $id(id){return document.getElementById(id)}

function words(s){return s.replace(/([a-z])([A-Z])/g,'$1 $2').replace(/[_\-\.]+/g,' ').split(/\s+/).filter(Boolean)}

const converters={
  upper:s=>s.toUpperCase(),
  lower:s=>s.toLowerCase(),
  title:s=>s.replace(/\w\S*/g,t=>t[0].toUpperCase()+t.slice(1).toLowerCase()),
  sentence:s=>{return s.toLowerCase().replace(/(^\s*|[.!?]\s+)(\w)/g,(m,p,c)=>p+c.toUpperCase())},
  camel:s=>{const w=words(s);return w.map((t,i)=>i===0?t.toLowerCase():t[0].toUpperCase()+t.slice(1).toLowerCase()).join('')},
  pascal:s=>words(s).map(t=>t[0].toUpperCase()+t.slice(1).toLowerCase()).join(''),
  snake:s=>words(s).map(t=>t.toLowerCase()).join('_'),
  kebab:s=>words(s).map(t=>t.toLowerCase()).join('-'),
  constant:s=>words(s).map(t=>t.toUpperCase()).join('_'),
  dot:s=>words(s).map(t=>t.toLowerCase()).join('.'),
  toggle:s=>[...s].map(c=>c===c.toUpperCase()?c.toLowerCase():c.toUpperCase()).join(''),
  alternating:s=>[...s].map((c,i)=>i%2===0?c.toLowerCase():c.toUpperCase()).join('')
};

function apply(mode,btn){
  currentMode=mode;
  document.querySelectorAll('.btn-case').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  convert();
}

function convert(){
  const input=$id('input').value;
  $id('output').value=converters[currentMode]?converters[currentMode](input):input;
  const w=input.trim()?input.trim().split(/\s+/).length:0;
  $id('stats').textContent=`${input.length} chars · ${w} words`;
}

function copyOut(){
  navigator.clipboard.writeText($id('output').value).then(()=>{
    const t=$id('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function useAsInput(){
  $id('input').value=$id('output').value;
  convert();
}

convert();
</script>
</body>
</html>
