<style>
.theme-toggle{position:fixed;top:12px;right:12px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

.slider-wrap{display:flex;align-items:center;gap:10px}

<body>

<div class="container">

  <main class="card">
    <!-- Input -->
    <div class="input-section">

        <span class="word-count" id="inputCount">0 words</span>

      <textarea id="inputText" placeholder="Paste or type your text here... Articles, essays, reports — anything you want summarized." spellcheck="false"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:.4rem">
        <button class="btn btn-clear" id="clearBtn" title="Clear input">✕ Clear</button>

    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="control-group">
        <label>Summary Length</label>
        <div class="slider-wrap">
          <input type="range" id="lengthSlider" min="1" max="3" value="2" step="1">
          <span class="slider-label" id="lengthLabel">Medium</span>

    <!-- Summarize Button -->
    <div class="btn-row">

      <button class="btn btn-secondary" id="copyBtn" disabled>📋 Copy Summary</button>

    <p style="margin-top:.75rem">Built with pure JavaScript. No API keys. No tracking.</p>

<div class="toast" id="toast"></div>

<script>
// ─── Theme Toggle ──────────────────────────────────────────
const html = document.documentElement;
const themeBtn = document.getElementById('themeToggle');
const stored = localStorage.getItem('theme');
if (stored) html.setAttribute('data-theme', stored);
function updateThemeIcon() {
  themeBtn.textContent = html.getAttribute('data-theme') === 'dark' ? '🌙' : '☀️';
}
updateThemeIcon();
themeBtn.addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon();
});

// ─── DOM Refs ──────────────────────────────────────────────
const inputEl = document.getElementById('inputText');
const inputCount = document.getElementById('inputCount');
const outputBox = document.getElementById('outputBox');
const outputCount = document.getElementById('outputCount');
const lengthSlider = document.getElementById('lengthSlider');
const lengthLabel = document.getElementById('lengthLabel');
const bulletToggle = document.getElementById('bulletToggle');
const summarizeBtn = document.getElementById('summarizeBtn');
const copyBtn = document.getElementById('copyBtn');
const downloadBtn = document.getElementById('downloadBtn');
const clearBtn = document.getElementById('clearBtn');
const toast = document.getElementById('toast');

const LENGTH_MAP = { 1: 'Short', 2: 'Medium', 3: 'Long' };
const RATIO_MAP = { 1: 0.2, 2: 0.35, 3: 0.5 };

// ─── Utility ───────────────────────────────────────────────
function countWords(s) {
  const t = s.trim();
  return t ? t.split(/\s+/).length : 0;
}

function showToast(msg, duration = 2000) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

// ─── Word Count ────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputCount.textContent = countWords(inputEl.value) + ' words';
});

lengthSlider.addEventListener('input', () => {
  lengthLabel.textContent = LENGTH_MAP[lengthSlider.value];
});

clearBtn.addEventListener('click', () => {
  inputEl.value = '';
  outputBox.innerHTML = '';
  inputCount.textContent = '0 words';
  outputCount.textContent = '0 words';
  copyBtn.disabled = true;
  downloadBtn.disabled = true;
});

// ─── TF-IDF Extractive Summarizer ─────────────────────────
function tokenize(text) {
  return text.toLowerCase().replace(/[^a-z0-9\s'-]/g, ' ').split(/\s+/).filter(Boolean);
}

// Common English stop words
const STOP_WORDS = new Set([
  'a','an','the','and','or','but','in','on','at','to','for','of','with','by',
  'from','is','am','are','was','were','be','been','being','have','has','had',
  'do','does','did','will','would','shall','should','may','might','must','can',
  'could','it','its','this','that','these','those','i','you','he','she','we',
  'they','me','him','her','us','them','my','your','his','our','their','mine',
  'yours','hers','ours','theirs','what','which','who','whom','whose','when',
  'where','why','how','if','then','else','than','so','no','not','nor','as',
  'up','out','about','into','over','after','before','between','under','again',
  'further','once','here','there','all','each','every','both','few','more',
  'most','other','some','such','only','own','same','too','very','just','also',
  'now','new','like','well','way','because','any','also','back','much','go',
  'make','even','still','get','got','said','one','two','many','much','s','t',
  've','re','d','ll','m','don','doesn','didn','won','wouldn','couldn','shouldn',
  'ain','aren','hadn','hasn','haven','isn','wasn','weren','let','need','say'
]);

function splitSentences(text) {
  // Split on sentence-ending punctuation, keeping the delimiter with the sentence
  const raw = text.replace(/\n{2,}/g, '\n').split(/(?<=[.!?])\s+/);
  const sentences = [];
  for (const s of raw) {
    const trimmed = s.trim();
    if (trimmed.length > 10 && countWords(trimmed) >= 3) {
      sentences.push(trimmed);
    }
  }
  return sentences;
}

function computeTFIDF(sentences) {
  const N = sentences.length;
  if (N === 0) return [];

  // Tokenize each sentence
  const tokenized = sentences.map(s => tokenize(s));

  // Document frequency
  const df = {};
  for (const tokens of tokenized) {
    const seen = new Set(tokens);
    for (const t of seen) {
      if (!STOP_WORDS.has(t) && t.length > 1) {
        df[t] = (df[t] || 0) + 1;
      }
    }
  }

  // Compute TF-IDF score per sentence
  const scores = tokenized.map((tokens, idx) => {
    const tf = {};
    let total = 0;
    for (const t of tokens) {
      if (!STOP_WORDS.has(t) && t.length > 1) {
        tf[t] = (tf[t] || 0) + 1;
        total++;
      }
    }
    let score = 0;
    if (total > 0) {
      for (const [term, count] of Object.entries(tf)) {
        const tfVal = count / total;
        const idf = Math.log((N + 1) / ((df[term] || 0) + 1)) + 1;
        score += tfVal * idf;
      }
    }

    // Position bonus: first ~20% sentences get a small boost
    const posRatio = idx / N;
    if (posRatio < 0.2) score *= 1.15;

    // Length normalization: slightly prefer medium-length sentences
    const wc = tokens.length;
    if (wc >= 8 && wc <= 35) score *= 1.05;

    return { index: idx, score, text: sentences[idx] };
  });

  return scores;
}

function summarize(text, ratio) {
  const sentences = splitSentences(text);
  if (sentences.length <= 2) return sentences;

  const scored = computeTFIDF(sentences);
  const numKeep = Math.max(1, Math.min(sentences.length, Math.round(sentences.length * ratio)));

  // Pick top sentences by score
  const ranked = [...scored].sort((a, b) => b.score - a.score).slice(0, numKeep);

  // Return in original order
  ranked.sort((a, b) => a.index - b.index);
  return ranked.map(s => s.text);
}

// ─── Summarize Action ──────────────────────────────────────
let currentSummary = '';

summarizeBtn.addEventListener('click', () => {
  const text = inputEl.value.trim();
  if (!text) {
    showToast('Please paste some text first.');
    return;
  }
  if (countWords(text) < 20) {
    showToast('Text is too short to summarize. Try at least 20 words.');
    return;
  }

  // Brief visual feedback
  const origLabel = summarizeBtn.innerHTML;
  summarizeBtn.innerHTML = '<span class="spinner"></span> Summarizing...';
  summarizeBtn.disabled = true;

  // Use setTimeout to allow UI to update
  setTimeout(() => {
    const ratio = RATIO_MAP[lengthSlider.value];
    const result = summarize(text, ratio);
    const bullets = bulletToggle.checked;

    if (bullets) {
      outputBox.innerHTML = '<ul>' + result.map(s => `<li>${escapeHTML(s)}</li>`).join('') + '</ul>';
      currentSummary = result.map(s => '• ' + s).join('\n');
    } else {
      currentSummary = result.join(' ');
      outputBox.innerHTML = escapeHTML(currentSummary);
    }

    outputCount.textContent = countWords(currentSummary) + ' words';
    copyBtn.disabled = false;
    downloadBtn.disabled = false;
    summarizeBtn.innerHTML = origLabel;
    summarizeBtn.disabled = false;
    showToast('Summary generated!');
  }, 80);
});

function escapeHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Re-render on format toggle ────────────────────────────
bulletToggle.addEventListener('change', () => {
  if (!currentSummary) return;
  // Re-summarize to update format
  summarizeBtn.click();
});

// ─── Copy ──────────────────────────────────────────────────
copyBtn.addEventListener('click', async () => {
  if (!currentSummary) return;
  try {
    await navigator.clipboard.writeText(currentSummary);
    showToast('Copied to clipboard!');
  } catch {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = currentSummary;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard!');
  }
});

// ─── Download ──────────────────────────────────────────────
downloadBtn.addEventListener('click', () => {
  if (!currentSummary) return;
  const blob = new Blob([currentSummary], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'summary.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Downloaded summary.txt');
});

// ─── Keyboard shortcut ────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    summarizeBtn.click();
  }
});
</script>
</body>
