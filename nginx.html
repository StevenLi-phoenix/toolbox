<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nginx Config Generator — DevToolbox</title>
<meta name="description" content="Generate production-ready Nginx configuration files. Supports reverse proxy, static sites, SSL/TLS, redirects, rate limiting, caching, and more.">
<meta name="keywords" content="nginx, config generator, reverse proxy, ssl, web server, configuration, devtools">
<meta name="author" content="Steven Li">
<meta property="og:title" content="Nginx Config Generator — DevToolbox">
<meta property="og:description" content="Generate production-ready Nginx configuration files with SSL, reverse proxy, caching, and more.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/nginx.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Nginx Config Generator — DevToolbox">
<meta name="twitter:description" content="Generate production-ready Nginx configuration files with SSL, reverse proxy, caching, and more.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/nginx.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: 4px; }
  .section-title { font-size: .88rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin: 14px 0 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .section-title:first-child { border-top: none; padding-top: 0; }
  .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .checkbox-item { display: flex; align-items: center; gap: 6px; font-size: .85rem; cursor: pointer; }
  .upstream-entry { display: flex; gap: 6px; margin-bottom: 6px; }
  .upstream-entry input { flex: 1; }
  .btn-remove { padding: 4px 10px; background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); cursor: pointer; font-size: 1rem; }
  .btn-remove:hover { color: var(--error); border-color: var(--error); }
  .tag { font-size: .72rem; color: var(--muted); font-weight: 400; }
  .btn-sm { font-size: .8rem; padding: 5px 12px; }
  #output { font-family: var(--mono); font-size: .82rem; white-space: pre-wrap; word-break: break-word; margin: 0; }
  @media (max-width: 768px) { .checkbox-group { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<header>
<h1>Nginx Config Generator</h1>
<p>Generate production-ready Nginx server blocks</p>
</header>
<div class="layout">
<div class="panel">
<div class="panel-header"><h2>Configuration</h2></div>
<div class="panel-body" id="formArea">

<div class="section-title">Server Type</div>
<div class="form-group">
<label>Type</label>
<select id="serverType" onchange="generate()">
<option value="reverse-proxy">Reverse Proxy</option>
<option value="static">Static Site</option>
<option value="spa">Single Page App (SPA)</option>
<option value="php">PHP (FastCGI)</option>
<option value="redirect">Redirect</option>
<option value="load-balancer">Load Balancer</option>
</select>
</div>

<div class="section-title">Domain & Ports</div>
<div class="form-group">
<label>Server Name (domain)</label>
<input type="text" id="serverName" value="example.com" oninput="generate()">
</div>
<div class="row">
<div class="form-group">
<label>Listen Port</label>
<input type="number" id="listenPort" value="80" oninput="generate()">
</div>
<div class="form-group" id="proxyPortGroup">
<label>Proxy Pass Port</label>
<input type="number" id="proxyPort" value="3000" oninput="generate()">
</div>
</div>
<div class="form-group" id="proxyHostGroup">
<label>Proxy Pass Host</label>
<input type="text" id="proxyHost" value="127.0.0.1" oninput="generate()">
</div>
<div class="form-group" id="rootDirGroup">
<label>Root Directory</label>
<input type="text" id="rootDir" value="/var/www/html" oninput="generate()">
</div>
<div class="form-group" id="redirectUrlGroup" style="display:none">
<label>Redirect URL</label>
<input type="text" id="redirectUrl" value="https://www.example.com$request_uri" oninput="generate()">
</div>
<div class="form-group" id="redirectCodeGroup" style="display:none">
<label>Redirect Code</label>
<select id="redirectCode" onchange="generate()">
<option value="301">301 Permanent</option>
<option value="302">302 Temporary</option>
<option value="307">307 Temporary (preserve method)</option>
<option value="308">308 Permanent (preserve method)</option>
</select>
</div>

<div id="upstreamSection" style="display:none">
<div class="section-title">Upstream Servers</div>
<div id="upstreamList"></div>
<button class="btn btn-sm" onclick="addUpstream()">+ Add Server</button>
<div class="form-group" style="margin-top:.7rem">
<label>Load Balancing Method</label>
<select id="lbMethod" onchange="generate()">
<option value="">Round Robin (default)</option>
<option value="least_conn">Least Connections</option>
<option value="ip_hash">IP Hash</option>
<option value="random">Random</option>
</select>
</div>
</div>

<div class="section-title">SSL / TLS</div>
<div class="checkbox-group" style="margin-bottom:.7rem">
<label class="checkbox-item"><input type="checkbox" id="enableSSL" onchange="generate()"> Enable SSL</label>
<label class="checkbox-item"><input type="checkbox" id="httpRedirect" onchange="generate()"> HTTP → HTTPS Redirect</label>
<label class="checkbox-item"><input type="checkbox" id="hsts" onchange="generate()"> HSTS</label>
<label class="checkbox-item"><input type="checkbox" id="http2" checked onchange="generate()"> HTTP/2</label>
</div>
<div id="sslPaths" style="display:none">
<div class="row">
<div class="form-group">
<label>SSL Certificate</label>
<input type="text" id="sslCert" value="/etc/letsencrypt/live/example.com/fullchain.pem" oninput="generate()">
</div>
<div class="form-group">
<label>SSL Key</label>
<input type="text" id="sslKey" value="/etc/letsencrypt/live/example.com/privkey.pem" oninput="generate()">
</div>
</div>
</div>

<div class="section-title">Features</div>
<div class="checkbox-group" style="margin-bottom:.7rem">
<label class="checkbox-item"><input type="checkbox" id="gzip" checked onchange="generate()"> Gzip</label>
<label class="checkbox-item"><input type="checkbox" id="securityHeaders" onchange="generate()"> Security Headers</label>
<label class="checkbox-item"><input type="checkbox" id="rateLimit" onchange="generate()"> Rate Limiting</label>
<label class="checkbox-item"><input type="checkbox" id="caching" onchange="generate()"> Static Asset Caching</label>
<label class="checkbox-item"><input type="checkbox" id="accessLog" checked onchange="generate()"> Access Log</label>
<label class="checkbox-item"><input type="checkbox" id="errorLog" checked onchange="generate()"> Error Log</label>
<label class="checkbox-item"><input type="checkbox" id="websocket" onchange="generate()"> WebSocket Support</label>
<label class="checkbox-item"><input type="checkbox" id="cors" onchange="generate()"> CORS Headers</label>
<label class="checkbox-item"><input type="checkbox" id="clientMaxBody" onchange="generate()"> Client Max Body Size</label>
</div>
<div class="row" id="rateLimitOpts" style="display:none">
<div class="form-group">
<label>Rate (req/sec)</label>
<input type="number" id="rateValue" value="10" min="1" oninput="generate()">
</div>
<div class="form-group">
<label>Burst</label>
<input type="number" id="burstValue" value="20" min="1" oninput="generate()">
</div>
</div>
<div class="form-group" id="corsOriginGroup" style="display:none">
<label>CORS Allowed Origin</label>
<input type="text" id="corsOrigin" value="*" oninput="generate()">
</div>
<div class="form-group" id="maxBodyGroup" style="display:none">
<label>Max Body Size</label>
<input type="text" id="maxBodySize" value="50M" oninput="generate()">
</div>
<div class="form-group" id="customLocationGroup">
<label>Custom Location Blocks <span class="tag">optional</span></label>
<textarea id="customLocation" placeholder="location /api/ {&#10;    proxy_pass http://backend;&#10;}" rows="3" oninput="generate()"></textarea>
</div>
</div>
</div>

<div class="panel">
<div class="panel-header">
<h2>Generated Config</h2>
<div class="actions">
<button class="btn btn-sm" onclick="copyConfig()">📋 Copy</button>
<button class="btn btn-sm" onclick="downloadConfig()">⬇ Download</button>
</div>
</div>
<div class="panel-body">
<pre id="output"></pre>
</div>
</div>
</div>

<footer>
<p>Part of <a href="https://stevenli-phoenix.github.io/toolbox/">DevToolbox</a> · <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a></p>
</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let upstreams = ['127.0.0.1:3001', '127.0.0.1:3002'];

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function addUpstream() {
  upstreams.push('127.0.0.1:300' + (upstreams.length + 1));
  renderUpstreams();
  generate();
}

function removeUpstream(i) {
  upstreams.splice(i, 1);
  renderUpstreams();
  generate();
}

function renderUpstreams() {
  const list = $('upstreamList');
  list.innerHTML = upstreams.map((u, i) => `
    <div class="upstream-entry">
      <input type="text" value="${u}" oninput="upstreams[${i}]=this.value;generate()">
      <button class="btn-remove" onclick="removeUpstream(${i})">&times;</button>
    </div>
  `).join('');
}

function toggleVisibility() {
  const type = $('serverType').value;
  const isProxy = type === 'reverse-proxy';
  const isStatic = type === 'static' || type === 'spa' || type === 'php';
  const isRedirect = type === 'redirect';
  const isLB = type === 'load-balancer';

  $('proxyPortGroup').style.display = (isProxy) ? '' : 'none';
  $('proxyHostGroup').style.display = (isProxy) ? '' : 'none';
  $('rootDirGroup').style.display = isStatic ? '' : 'none';
  $('redirectUrlGroup').style.display = isRedirect ? '' : 'none';
  $('redirectCodeGroup').style.display = isRedirect ? '' : 'none';
  $('upstreamSection').style.display = isLB ? '' : 'none';
  $('customLocationGroup').style.display = isRedirect ? 'none' : '';

  if (isLB) renderUpstreams();
}

function indent(lines, level) {
  const pad = '    '.repeat(level);
  return lines.map(l => l ? pad + l : '').join('\n');
}

function generate() {
  toggleVisibility();
  const type = $('serverType').value;
  const serverName = $('serverName').value || 'example.com';
  const listenPort = $('listenPort').value || '80';
  const proxyPort = $('proxyPort').value || '3000';
  const proxyHost = $('proxyHost').value || '127.0.0.1';
  const rootDir = $('rootDir').value || '/var/www/html';
  const ssl = $('enableSSL').checked;
  const httpRedir = $('httpRedirect').checked;
  const hsts = $('hsts').checked;
  const http2 = $('http2').checked;
  const gzip = $('gzip').checked;
  const secHeaders = $('securityHeaders').checked;
  const rateLimit = $('rateLimit').checked;
  const caching = $('caching').checked;
  const accessLog = $('accessLog').checked;
  const errorLog = $('errorLog').checked;
  const ws = $('websocket').checked;
  const cors = $('cors').checked;
  const maxBody = $('clientMaxBody').checked;
  const customLoc = $('customLocation').value.trim();
  const redirectUrl = $('redirectUrl').value || 'https://www.example.com$request_uri';
  const redirectCode = $('redirectCode').value;

  $('rateLimitOpts').style.display = rateLimit ? '' : 'none';
  $('sslPaths').style.display = ssl ? '' : 'none';
  $('corsOriginGroup').style.display = cors ? '' : 'none';
  $('maxBodyGroup').style.display = maxBody ? '' : 'none';

  let lines = [];
  const sslPort = ssl ? '443' : listenPort;
  const sslSuffix = ssl && http2 ? ' ssl' : ssl ? ' ssl' : '';
  const h2 = http2 && ssl ? ' http2' : '';

  // Rate limit zone
  if (rateLimit) {
    const rate = $('rateValue').value || '10';
    lines.push(`limit_req_zone $binary_remote_addr zone=ratelimit:10m rate=${rate}r/s;`);
    lines.push('');
  }

  // Upstream block for LB
  if (type === 'load-balancer') {
    const lbMethod = $('lbMethod').value;
    lines.push(`upstream backend {`);
    if (lbMethod) lines.push(`    ${lbMethod};`);
    upstreams.forEach(u => lines.push(`    server ${u};`));
    lines.push('}');
    lines.push('');
  }

  // HTTP redirect block
  if (ssl && httpRedir) {
    lines.push('server {');
    lines.push(`    listen 80;`);
    lines.push(`    listen [::]:80;`);
    lines.push(`    server_name ${serverName};`);
    lines.push(`    return 301 https://$host$request_uri;`);
    lines.push('}');
    lines.push('');
  }

  // Main server block
  lines.push('server {');
  lines.push(`    listen ${sslPort}${sslSuffix}${h2};`);
  lines.push(`    listen [::]:${sslPort}${sslSuffix}${h2};`);
  lines.push(`    server_name ${serverName};`);

  // SSL config
  if (ssl) {
    const cert = $('sslCert').value || '/etc/letsencrypt/live/example.com/fullchain.pem';
    const key = $('sslKey').value || '/etc/letsencrypt/live/example.com/privkey.pem';
    lines.push('');
    lines.push('    # SSL Configuration');
    lines.push(`    ssl_certificate ${cert};`);
    lines.push(`    ssl_certificate_key ${key};`);
    lines.push('    ssl_protocols TLSv1.2 TLSv1.3;');
    lines.push('    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;');
    lines.push('    ssl_prefer_server_ciphers off;');
    lines.push('    ssl_session_cache shared:SSL:10m;');
    lines.push('    ssl_session_timeout 1d;');
    lines.push('    ssl_session_tickets off;');
  }

  // HSTS
  if (hsts) {
    lines.push('');
    lines.push('    # HSTS');
    lines.push('    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;');
  }

  // Security headers
  if (secHeaders) {
    lines.push('');
    lines.push('    # Security Headers');
    lines.push('    add_header X-Frame-Options "SAMEORIGIN" always;');
    lines.push('    add_header X-Content-Type-Options "nosniff" always;');
    lines.push('    add_header X-XSS-Protection "1; mode=block" always;');
    lines.push('    add_header Referrer-Policy "strict-origin-when-cross-origin" always;');
    lines.push('    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;');
  }

  // CORS
  if (cors) {
    const origin = $('corsOrigin').value || '*';
    lines.push('');
    lines.push('    # CORS');
    lines.push(`    add_header Access-Control-Allow-Origin "${origin}" always;`);
    lines.push('    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;');
    lines.push('    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;');
    lines.push('    add_header Access-Control-Max-Age 86400 always;');
  }

  // Client max body
  if (maxBody) {
    const size = $('maxBodySize').value || '50M';
    lines.push('');
    lines.push(`    client_max_body_size ${size};`);
  }

  // Gzip
  if (gzip) {
    lines.push('');
    lines.push('    # Gzip Compression');
    lines.push('    gzip on;');
    lines.push('    gzip_vary on;');
    lines.push('    gzip_proxied any;');
    lines.push('    gzip_comp_level 6;');
    lines.push('    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;');
  }

  // Logs
  if (accessLog || errorLog) {
    lines.push('');
    if (accessLog) lines.push(`    access_log /var/log/nginx/${serverName}.access.log;`);
    if (errorLog) lines.push(`    error_log /var/log/nginx/${serverName}.error.log;`);
  }

  // Rate limiting
  if (rateLimit) {
    const burst = $('burstValue').value || '20';
    lines.push('');
    lines.push('    # Rate Limiting');
    lines.push(`    limit_req zone=ratelimit burst=${burst} nodelay;`);
    lines.push('    limit_req_status 429;');
  }

  // Root for static types
  if (type === 'static' || type === 'spa' || type === 'php') {
    lines.push('');
    lines.push(`    root ${rootDir};`);
    lines.push('    index index.html index.htm;');
  }

  // Type-specific location blocks
  lines.push('');

  if (type === 'reverse-proxy') {
    lines.push('    location / {');
    lines.push(`        proxy_pass http://${proxyHost}:${proxyPort};`);
    lines.push('        proxy_http_version 1.1;');
    lines.push('        proxy_set_header Host $host;');
    lines.push('        proxy_set_header X-Real-IP $remote_addr;');
    lines.push('        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;');
    lines.push('        proxy_set_header X-Forwarded-Proto $scheme;');
    if (ws) {
      lines.push('');
      lines.push('        # WebSocket Support');
      lines.push('        proxy_set_header Upgrade $http_upgrade;');
      lines.push('        proxy_set_header Connection "upgrade";');
      lines.push('        proxy_read_timeout 86400;');
    }
    lines.push('    }');
  } else if (type === 'static') {
    lines.push('    location / {');
    lines.push('        try_files $uri $uri/ =404;');
    lines.push('    }');
  } else if (type === 'spa') {
    lines.push('    location / {');
    lines.push('        try_files $uri $uri/ /index.html;');
    lines.push('    }');
  } else if (type === 'php') {
    lines.push('    location / {');
    lines.push('        try_files $uri $uri/ /index.php?$query_string;');
    lines.push('    }');
    lines.push('');
    lines.push('    location ~ \\.php$ {');
    lines.push('        fastcgi_pass unix:/var/run/php/php-fpm.sock;');
    lines.push('        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;');
    lines.push('        include fastcgi_params;');
    lines.push('        fastcgi_intercept_errors on;');
    lines.push('        fastcgi_buffer_size 16k;');
    lines.push('        fastcgi_buffers 4 16k;');
    lines.push('    }');
    lines.push('');
    lines.push('    # Deny access to .ht files');
    lines.push('    location ~ /\\.ht {');
    lines.push('        deny all;');
    lines.push('    }');
  } else if (type === 'redirect') {
    lines.push(`    return ${redirectCode} ${redirectUrl};`);
  } else if (type === 'load-balancer') {
    lines.push('    location / {');
    lines.push('        proxy_pass http://backend;');
    lines.push('        proxy_http_version 1.1;');
    lines.push('        proxy_set_header Host $host;');
    lines.push('        proxy_set_header X-Real-IP $remote_addr;');
    lines.push('        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;');
    lines.push('        proxy_set_header X-Forwarded-Proto $scheme;');
    if (ws) {
      lines.push('');
      lines.push('        # WebSocket Support');
      lines.push('        proxy_set_header Upgrade $http_upgrade;');
      lines.push('        proxy_set_header Connection "upgrade";');
      lines.push('        proxy_read_timeout 86400;');
    }
    lines.push('    }');
  }

  // Static asset caching
  if (caching && type !== 'redirect') {
    lines.push('');
    lines.push('    # Static Asset Caching');
    lines.push('    location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {');
    if (type === 'reverse-proxy' || type === 'load-balancer') {
      lines.push(`        proxy_pass http://${type === 'load-balancer' ? 'backend' : proxyHost + ':' + proxyPort};`);
    }
    lines.push('        expires 30d;');
    lines.push('        add_header Cache-Control "public, no-transform";');
    lines.push('        access_log off;');
    lines.push('    }');
  }

  // Custom location
  if (customLoc && type !== 'redirect') {
    lines.push('');
    lines.push('    # Custom Location');
    customLoc.split('\n').forEach(l => {
      lines.push('    ' + l);
    });
  }

  lines.push('}');

  $('output').textContent = lines.join('\n');
}

function copyConfig() {
  navigator.clipboard.writeText($('output').textContent).then(() => showToast('Copied to clipboard!'));
}

function downloadConfig() {
  const name = $('serverName').value || 'example.com';
  const blob = new Blob([$('output').textContent], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name + '.conf';
  a.click();
  URL.revokeObjectURL(a.href);
}

// Initialize
generate();
</script>
</body>
</html>
