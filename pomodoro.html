<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer - Free Online Tool</title>
<meta name="description" content="Free online Pomodoro timer for productivity. Customizable work and break intervals with audio alerts. Track your focus sessions. No signup required.">
<meta name="keywords" content="pomodoro timer, focus timer, productivity timer, work timer, break timer, free pomodoro tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/pomodoro.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .timer-wrap{display:flex;justify-content:center;padding:24px 0}
  .timer-ring{position:relative;width:240px;height:240px}
  .timer-ring svg{transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:var(--border);stroke-width:8}
  .ring-fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .3s,stroke .3s}
  .timer-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .timer-digits{font-size:2.4rem;font-weight:700;font-family:var(--mono);letter-spacing:.04em}
  .timer-label{font-size:.85rem;color:var(--muted);margin-top:4px}
  .controls{display:flex;justify-content:center;gap:10px;margin:16px 0}
  .controls button{padding:10px 20px;font-size:.9rem;font-weight:600;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;background:var(--surface)}
  .controls button:hover{background:var(--surface2)}
  .btn-start{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
  .btn-reset,.btn-skip{background:var(--surface)}
  .session-count{text-align:center;margin-top:12px;font-size:.85rem;color:var(--muted)}
  .session-dots{display:flex;justify-content:center;gap:8px;margin-top:8px}
  .dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--surface)}
  .dot.done{background:var(--accent);border-color:var(--accent)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1;min-width:100px}
  :root{--work:var(--accent);--break:var(--success);--long:var(--warning)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Pomodoro Timer</h1>
<p class="subtitle">Stay focused with timed work and break sessions</p>

<div class="card">
<div class="tabs">
<button class="tab active" data-mode="work" onclick="setMode('work')">Work</button>
<button class="tab" data-mode="break" onclick="setMode('break')">Break</button>
<button class="tab" data-mode="long" onclick="setMode('long')">Long Break</button>
</div>

<div class="timer-wrap">
<div class="timer-ring">
<svg width="240" height="240" viewBox="0 0 240 240">
<circle class="ring-bg" cx="120" cy="120" r="108"/>
<circle class="ring-fg" id="ring" cx="120" cy="120" r="108" stroke-dasharray="678.58" stroke-dashoffset="0"/>
</svg>
<div class="timer-text">
<div class="timer-digits" id="digits">25:00</div>
<div class="timer-label" id="label">Work Session</div>
</div>
</div>
</div>

<div class="controls">
<button class="btn-reset" onclick="resetTimer()">↺ Reset</button>
<button class="btn-start" id="startBtn" onclick="toggleTimer()">▶ Start</button>
<button class="btn-skip" onclick="skipSession()">⏭ Skip</button>
</div>

<div class="session-count">
<span id="count-text">Session 1 of 4</span>
<div class="session-dots" id="dots"></div>
</div>
</div>

<div class="card">
<h2>⚙️ Settings</h2>
<div class="row">
<div><label>Work (min)</label><input type="number" id="s-work" value="25" min="1" max="120" onchange="updateSettings()"></div>
<div><label>Break (min)</label><input type="number" id="s-break" value="5" min="1" max="60" onchange="updateSettings()"></div>
<div><label>Long Break</label><input type="number" id="s-long" value="15" min="1" max="60" onchange="updateSettings()"></div>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>

<script>
const CIRC=2*Math.PI*108;
let mode='work',running=false,interval=null;
let durations={work:25*60,break:5*60,long:15*60};
let timeLeft=durations.work,totalTime=durations.work;
let session=1,totalSessions=4;

function $id(id){return document.getElementById(id)}

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  const colors={work:'var(--work)',break:'var(--break)',long:'var(--long)'};
  const labels={work:'Work Session',break:'Short Break',long:'Long Break'};
  $id('ring').style.stroke=colors[m];
  $id('label').textContent=labels[m];
  totalTime=durations[m];
  if(!running){timeLeft=totalTime;updateDisplay()}
}

function updateDisplay(){
  const m=Math.floor(timeLeft/60);
  const s=timeLeft%60;
  $id('digits').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const offset=CIRC*(1-timeLeft/totalTime);
  $id('ring').style.strokeDashoffset=offset;
  document.title=(running?'⏱ ':'')+$id('digits').textContent+' — Pomodoro';
}

function toggleTimer(){
  if(running){
    clearInterval(interval);running=false;
    $id('startBtn').textContent='▶ Start';
  }else{
    running=true;
    $id('startBtn').textContent='⏸ Pause';
    interval=setInterval(()=>{
      timeLeft--;
      if(timeLeft<=0){
        clearInterval(interval);running=false;
        $id('startBtn').textContent='▶ Start';
        playSound();
        if(mode==='work'){
          markDot(session-1);
          if(session>=totalSessions){setMode('long');session=0;}
          else setMode('break');
          session++;
        }else{
          setMode('work');
        }
        timeLeft=totalTime;
        updateDots();
      }
      updateDisplay();
    },1000);
  }
}

function resetTimer(){
  clearInterval(interval);running=false;
  $id('startBtn').textContent='▶ Start';
  timeLeft=totalTime;
  updateDisplay();
}

function skipSession(){
  clearInterval(interval);running=false;
  $id('startBtn').textContent='▶ Start';
  if(mode==='work'){
    markDot(session-1);
    if(session>=totalSessions){setMode('long');session=0;}
    else setMode('break');
    session++;
  }else setMode('work');
  timeLeft=totalTime;
  updateDisplay();
  updateDots();
}

function updateSettings(){
  durations.work=parseInt($id('s-work').value)*60||25*60;
  durations.break=parseInt($id('s-break').value)*60||5*60;
  durations.long=parseInt($id('s-long').value)*60||15*60;
  if(!running){totalTime=durations[mode];timeLeft=totalTime;updateDisplay()}
}

function updateDots(){
  $id('count-text').textContent=`Session ${Math.min(session,totalSessions)} of ${totalSessions}`;
  const dots=$id('dots');
  dots.innerHTML='';
  for(let i=0;i<totalSessions;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<session-1?' done':'');
    dots.appendChild(d);
  }
}

function markDot(i){/* handled by updateDots */}

function playSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [0,.15,.3].forEach(t=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=800;o.type='sine';
      g.gain.setValueAtTime(.3,ac.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.01,ac.currentTime+t+.12);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+.12);
    });
  }catch(e){}
}

updateDisplay();updateDots();
</script>
</body>
</html>
