<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL JOIN Visualizer - Free Online Tool</title>
<meta name="description" content="Visualize SQL JOIN types with interactive Venn diagrams and sample data. Understand INNER, LEFT, RIGHT, FULL OUTER, and CROSS JOINs instantly.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/sqljoin.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .join-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
  .join-btn { padding: 10px 8px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; text-align: center; font-size: .85rem; font-weight: 600; transition: all .15s; }
  .join-btn:hover { border-color: var(--accent); }
  .join-btn.active { border-color: var(--accent); background: var(--accent); color: var(--bg); }
  .venn-wrap { text-align: center; margin: 1.5rem 0; }
  .venn-wrap svg { max-width: 320px; width: 100%; }
  .tables-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .tbl-card h3 { font-size: .9rem; margin-bottom: .5rem; }
  table.data-tbl { width: 100%; border-collapse: collapse; font-size: .82rem; font-family: var(--mono); }
  table.data-tbl th, table.data-tbl td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; }
  table.data-tbl th { background: var(--surface2); font-weight: 600; font-family: var(--sans); }
  table.data-tbl tr.matched { background: #ecfdf5; }
  table.data-tbl tr.unmatched { background: #fef2f2; }
  .result-card { margin-top: 1rem; }
  .result-card h3 { font-size: .9rem; margin-bottom: .5rem; }
  .sql-display { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-family: var(--mono); font-size: .82rem; line-height: 1.6; margin-bottom: 1rem; white-space: pre-wrap; }
  .sql-kw { color: #7c3aed; font-weight: 700; }
  .sql-tbl { color: #0369a1; }
  .sql-col { color: #b45309; }
  .explanation { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; font-size: .85rem; line-height: 1.6; color: var(--muted); margin-bottom: 1rem; }
  .row-count { font-size: .82rem; color: var(--muted); margin-bottom: .5rem; }
  .null-val { color: var(--muted); font-style: italic; }
  @media (max-width: 768px) {
    .tables-row { grid-template-columns: 1fr; }
    .join-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>SQL JOIN Visualizer</h1>
<p class="subtitle">Understand SQL JOIN types with interactive Venn diagrams and live sample data</p>

<div class="card">
<h2>Select JOIN Type</h2>
<div class="join-grid">
  <button class="join-btn active" onclick="selectJoin('inner')">INNER JOIN</button>
  <button class="join-btn" onclick="selectJoin('left')">LEFT JOIN</button>
  <button class="join-btn" onclick="selectJoin('right')">RIGHT JOIN</button>
  <button class="join-btn" onclick="selectJoin('full')">FULL OUTER</button>
  <button class="join-btn" onclick="selectJoin('cross')">CROSS JOIN</button>
  <button class="join-btn" onclick="selectJoin('left_excl')">LEFT EXCL.</button>
  <button class="join-btn" onclick="selectJoin('right_excl')">RIGHT EXCL.</button>
  <button class="join-btn" onclick="selectJoin('full_excl')">FULL EXCL.</button>
</div>

<div class="venn-wrap" id="venn"></div>

<div class="explanation" id="explanation"></div>

<div class="sql-display" id="sqlDisplay"></div>
</div>

<div class="card">
<h2>Sample Data</h2>
<div class="tables-row">
  <div class="tbl-card">
    <h3>Table A — Employees</h3>
    <table class="data-tbl" id="tableA"></table>
  </div>
  <div class="tbl-card">
    <h3>Table B — Departments</h3>
    <table class="data-tbl" id="tableB"></table>
  </div>
</div>
</div>

<div class="card result-card">
<h2>JOIN Result</h2>
<div class="row-count" id="rowCount"></div>
<table class="data-tbl" id="resultTable"></table>
</div>
</div>

<div class="toast" id="toast">Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const tableA = [
  { id: 1, name: 'Alice',   dept_id: 10 },
  { id: 2, name: 'Bob',     dept_id: 20 },
  { id: 3, name: 'Charlie', dept_id: 10 },
  { id: 4, name: 'Diana',   dept_id: 30 },
  { id: 5, name: 'Eve',     dept_id: null },
];

const tableB = [
  { dept_id: 10, dept_name: 'Engineering' },
  { dept_id: 20, dept_name: 'Marketing' },
  { dept_id: 40, dept_name: 'Sales' },
];

const joinInfo = {
  inner: {
    label: 'INNER JOIN',
    sql: '<span class="sql-kw">SELECT</span> <span class="sql-col">A.id</span>, <span class="sql-col">A.name</span>, <span class="sql-col">B.dept_id</span>, <span class="sql-col">B.dept_name</span>\n<span class="sql-kw">FROM</span> <span class="sql-tbl">employees</span> A\n<span class="sql-kw">INNER JOIN</span> <span class="sql-tbl">departments</span> B\n  <span class="sql-kw">ON</span> <span class="sql-col">A.dept_id</span> = <span class="sql-col">B.dept_id</span>',
    explain: 'Returns only rows that have matching values in both tables. Rows from A or B without a match are excluded.',
    fill: 'intersection'
  },
  left: {
    label: 'LEFT JOIN',
    sql: '<span class="sql-kw">SELECT</span> <span class="sql-col">A.id</span>, <span class="sql-col">A.name</span>, <span class="sql-col">B.dept_id</span>, <span class="sql-col">B.dept_name</span>\n<span class="sql-kw">FROM</span> <span class="sql-tbl">employees</span> A\n<span class="sql-kw">LEFT JOIN</span> <span class="sql-tbl">departments</span> B\n  <span class="sql-kw">ON</span> <span class="sql-col">A.dept_id</span> = <span class="sql-col">B.dept_id</span>',
    explain: 'Returns all rows from the left table (A), plus matched rows from the right table (B). If no match in B, NULLs fill the B columns.',
    fill: 'left'
  },
  right: {
    label: 'RIGHT JOIN',
    sql: '<span class="sql-kw">SELECT</span> <span class="sql-col">A.id</span>, <span class="sql-col">A.name</span>, <span class="sql-col">B.dept_id</span>, <span class="sql-col">B.dept_name</span>\n<span class="sql-kw">FROM</span> <span class="sql-tbl">employees</span> A\n<span class="sql-kw">RIGHT JOIN</span> <span class="sql-tbl">departments</span> B\n  <span class="sql-kw">ON</span> <span class="sql-col">A.dept_id</span> = <span class="sql-col">B.dept_id</span>',
    explain: 'Returns all rows from the right table (B), plus matched rows from the left table (A). If no match in A, NULLs fill the A columns.',
    fill: 'right'
  },
  full: {
    label: 'FULL OUTER JOIN',
    sql: '<span class="sql-kw">SELECT</span> <span class="sql-col">A.id</span>, <span class="sql-col">A.name</span>, <span class="sql-col">B.dept_id</span>, <span class="sql-col">B.dept_name</span>\n<span class="sql-kw">FROM</span> <span class="sql-tbl">employees</span> A\n<span class="sql-kw">FULL OUTER JOIN</span> <span class="sql-tbl">departments</span> B\n  <span class="sql-kw">ON</span> <span class="sql-col">A.dept_id</span> = <span class="sql-col">B.dept_id</span>',
    explain: 'Returns all rows from both tables. Matched rows are combined; unmatched rows from either side get NULLs for the missing columns.',
    fill: 'full'
  },
  cross: {
    label: 'CROSS JOIN',
    sql: '<span class="sql-kw">SELECT</span> <span class="sql-col">A.id</span>, <span class="sql-col">A.name</span>, <span class="sql-col">B.dept_id</span>, <span class="sql-col">B.dept_name</span>\n<span class="sql-kw">FROM</span> <span class="sql-tbl">employees</span> A\n<span class="sql-kw">CROSS JOIN</span> <span class="sql-tbl">departments</span> B',
    explain: 'Returns the Cartesian product — every row from A paired with every row from B. No ON clause needed. Result has |A| × |B| rows.',
    fill: 'cross'
  },
  left_excl: {
    label: 'LEFT EXCLUSIVE',
    sql: '<span class="sql-kw">SELECT</span> <span class="sql-col">A.id</span>, <span class="sql-col">A.name</span>, <span class="sql-col">B.dept_id</span>, <span class="sql-col">B.dept_name</span>\n<span class="sql-kw">FROM</span> <span class="sql-tbl">employees</span> A\n<span class="sql-kw">LEFT JOIN</span> <span class="sql-tbl">departments</span> B\n  <span class="sql-kw">ON</span> <span class="sql-col">A.dept_id</span> = <span class="sql-col">B.dept_id</span>\n<span class="sql-kw">WHERE</span> <span class="sql-col">B.dept_id</span> <span class="sql-kw">IS NULL</span>',
    explain: 'Returns rows from A that have no match in B. This is a LEFT JOIN filtered to only the "left-only" rows.',
    fill: 'left_excl'
  },
  right_excl: {
    label: 'RIGHT EXCLUSIVE',
    sql: '<span class="sql-kw">SELECT</span> <span class="sql-col">A.id</span>, <span class="sql-col">A.name</span>, <span class="sql-col">B.dept_id</span>, <span class="sql-col">B.dept_name</span>\n<span class="sql-kw">FROM</span> <span class="sql-tbl">employees</span> A\n<span class="sql-kw">RIGHT JOIN</span> <span class="sql-tbl">departments</span> B\n  <span class="sql-kw">ON</span> <span class="sql-col">A.dept_id</span> = <span class="sql-col">B.dept_id</span>\n<span class="sql-kw">WHERE</span> <span class="sql-col">A.id</span> <span class="sql-kw">IS NULL</span>',
    explain: 'Returns rows from B that have no match in A. This is a RIGHT JOIN filtered to only the "right-only" rows.',
    fill: 'right_excl'
  },
  full_excl: {
    label: 'FULL EXCLUSIVE',
    sql: '<span class="sql-kw">SELECT</span> <span class="sql-col">A.id</span>, <span class="sql-col">A.name</span>, <span class="sql-col">B.dept_id</span>, <span class="sql-col">B.dept_name</span>\n<span class="sql-kw">FROM</span> <span class="sql-tbl">employees</span> A\n<span class="sql-kw">FULL OUTER JOIN</span> <span class="sql-tbl">departments</span> B\n  <span class="sql-kw">ON</span> <span class="sql-col">A.dept_id</span> = <span class="sql-col">B.dept_id</span>\n<span class="sql-kw">WHERE</span> <span class="sql-col">A.id</span> <span class="sql-kw">IS NULL OR</span> <span class="sql-col">B.dept_id</span> <span class="sql-kw">IS NULL</span>',
    explain: 'Returns rows from both sides that have no match — the union of LEFT EXCLUSIVE and RIGHT EXCLUSIVE.',
    fill: 'full_excl'
  }
};

let currentJoin = 'inner';

function selectJoin(type) {
  currentJoin = type;
  document.querySelectorAll('.join-btn').forEach((b, i) => {
    const types = ['inner','left','right','full','cross','left_excl','right_excl','full_excl'];
    b.classList.toggle('active', types[i] === type);
  });
  render();
}

function drawVenn(fill) {
  const hl = '#3b82f6';
  const hlO = '0.35';
  const dim = '#e5e7eb';
  const dimO = '0.6';
  let leftFill, rightFill, interFill;
  let leftO, rightO, interO;

  switch(fill) {
    case 'intersection':
      leftFill = dim; leftO = dimO; rightFill = dim; rightO = dimO;
      interFill = hl; interO = hlO; break;
    case 'left':
      leftFill = hl; leftO = hlO; rightFill = dim; rightO = dimO;
      interFill = hl; interO = hlO; break;
    case 'right':
      leftFill = dim; leftO = dimO; rightFill = hl; rightO = hlO;
      interFill = hl; interO = hlO; break;
    case 'full':
      leftFill = hl; leftO = hlO; rightFill = hl; rightO = hlO;
      interFill = hl; interO = hlO; break;
    case 'left_excl':
      leftFill = hl; leftO = hlO; rightFill = dim; rightO = dimO;
      interFill = dim; interO = dimO; break;
    case 'right_excl':
      leftFill = dim; leftO = dimO; rightFill = hl; rightO = hlO;
      interFill = dim; interO = dimO; break;
    case 'full_excl':
      leftFill = hl; leftO = hlO; rightFill = hl; rightO = hlO;
      interFill = dim; interO = dimO; break;
    case 'cross':
      leftFill = hl; leftO = hlO; rightFill = hl; rightO = hlO;
      interFill = hl; interO = hlO; break;
  }

  return `<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="clipL"><circle cx="120" cy="100" r="75"/></clipPath>
      <clipPath id="clipR"><circle cx="200" cy="100" r="75"/></clipPath>
    </defs>
    <!-- Left only -->
    <circle cx="120" cy="100" r="75" fill="${leftFill}" opacity="${leftO}" stroke="#333" stroke-width="2"/>
    <!-- Right only -->
    <circle cx="200" cy="100" r="75" fill="${rightFill}" opacity="${rightO}" stroke="#333" stroke-width="2"/>
    <!-- Intersection overlay -->
    <g clip-path="url(#clipL)">
      <circle cx="200" cy="100" r="75" fill="${interFill}" opacity="${interO}"/>
    </g>
    ${fill === 'cross' ? '<text x="160" y="185" text-anchor="middle" font-size="11" fill="#666">Cartesian Product</text>' : ''}
    <text x="95" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#333">A</text>
    <text x="225" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#333">B</text>
  </svg>`;
}

function computeJoin(type) {
  const results = [];
  const matchedA = new Set();
  const matchedB = new Set();

  if (type === 'cross') {
    for (const a of tableA) {
      for (const b of tableB) {
        results.push({ id: a.id, name: a.name, dept_id: b.dept_id, dept_name: b.dept_name, src: 'both' });
      }
    }
    return results;
  }

  for (let ai = 0; ai < tableA.length; ai++) {
    const a = tableA[ai];
    let found = false;
    for (let bi = 0; bi < tableB.length; bi++) {
      const b = tableB[bi];
      if (a.dept_id !== null && a.dept_id === b.dept_id) {
        found = true;
        matchedA.add(ai);
        matchedB.add(bi);
        if (type !== 'left_excl' && type !== 'right_excl' && type !== 'full_excl') {
          results.push({ id: a.id, name: a.name, dept_id: b.dept_id, dept_name: b.dept_name, src: 'both' });
        }
      }
    }
    if (!found && (type === 'left' || type === 'full' || type === 'left_excl' || type === 'full_excl')) {
      results.push({ id: a.id, name: a.name, dept_id: null, dept_name: null, src: 'left' });
    }
  }

  for (let bi = 0; bi < tableB.length; bi++) {
    if (!matchedB.has(bi) && (type === 'right' || type === 'full' || type === 'right_excl' || type === 'full_excl')) {
      results.push({ id: null, name: null, dept_id: tableB[bi].dept_id, dept_name: tableB[bi].dept_name, src: 'right' });
    }
  }

  return results;
}

function n(v) {
  return v === null || v === undefined ? '<span class="null-val">NULL</span>' : v;
}

function renderTable(el, data, cols) {
  let html = '<thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
  for (const row of data) {
    html += '<tr>' + cols.map(c => `<td>${n(row[c])}</td>`).join('') + '</tr>';
  }
  html += '</tbody>';
  el.innerHTML = html;
}

function render() {
  const info = joinInfo[currentJoin];
  document.getElementById('venn').innerHTML = drawVenn(info.fill);
  document.getElementById('explanation').textContent = info.explain;
  document.getElementById('sqlDisplay').innerHTML = info.sql;

  const matchedAIdx = new Set();
  const matchedBIdx = new Set();
  for (let ai = 0; ai < tableA.length; ai++) {
    for (let bi = 0; bi < tableB.length; bi++) {
      if (tableA[ai].dept_id !== null && tableA[ai].dept_id === tableB[bi].dept_id) {
        matchedAIdx.add(ai);
        matchedBIdx.add(bi);
      }
    }
  }

  // Render Table A with match highlighting
  const tblAEl = document.getElementById('tableA');
  let htmlA = '<thead><tr><th>id</th><th>name</th><th>dept_id</th></tr></thead><tbody>';
  tableA.forEach((r, i) => {
    const cls = matchedAIdx.has(i) ? 'matched' : 'unmatched';
    htmlA += `<tr class="${cls}"><td>${r.id}</td><td>${r.name}</td><td>${n(r.dept_id)}</td></tr>`;
  });
  htmlA += '</tbody>';
  tblAEl.innerHTML = htmlA;

  // Render Table B with match highlighting
  const tblBEl = document.getElementById('tableB');
  let htmlB = '<thead><tr><th>dept_id</th><th>dept_name</th></tr></thead><tbody>';
  tableB.forEach((r, i) => {
    const cls = matchedBIdx.has(i) ? 'matched' : 'unmatched';
    htmlB += `<tr class="${cls}"><td>${r.dept_id}</td><td>${r.dept_name}</td></tr>`;
  });
  htmlB += '</tbody>';
  tblBEl.innerHTML = htmlB;

  // Compute and render result
  const results = computeJoin(currentJoin);
  document.getElementById('rowCount').textContent = `${results.length} row${results.length !== 1 ? 's' : ''} returned`;

  const resTbl = document.getElementById('resultTable');
  let htmlR = '<thead><tr><th>A.id</th><th>A.name</th><th>B.dept_id</th><th>B.dept_name</th></tr></thead><tbody>';
  if (results.length === 0) {
    htmlR += '<tr><td colspan="4" style="text-align:center;color:var(--muted)">No rows returned</td></tr>';
  } else {
    for (const r of results) {
      const cls = r.src === 'both' ? 'matched' : 'unmatched';
      htmlR += `<tr class="${cls}"><td>${n(r.id)}</td><td>${n(r.name)}</td><td>${n(r.dept_id)}</td><td>${n(r.dept_name)}</td></tr>`;
    }
  }
  htmlR += '</tbody>';
  resTbl.innerHTML = htmlR;
}

render();
</script>
</body>
</html>
