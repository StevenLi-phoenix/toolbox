<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cURL Command Builder - Visual HTTP Request Builder | Free Online Tool</title>
    <meta name="description" content="Build HTTP requests visually and generate cURL, fetch, axios, and Python requests code. Free online cURL command builder with headers, auth, and body support.">
    <meta name="keywords" content="curl builder, curl generator, http request builder, curl to fetch, curl to axios, curl to python, api tester, rest client">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/curlbuilder.html">
    <meta property="og:title" content="cURL Command Builder - Visual HTTP Request Builder">
    <meta property="og:description" content="Build HTTP requests visually and generate cURL, fetch, axios, and Python requests code instantly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/curlbuilder.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="cURL Command Builder - Visual HTTP Request Builder">
    <meta name="twitter:description" content="Build HTTP requests visually and export to cURL, fetch, axios, or Python requests.">
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
<div class="container">
    <h1>⚡ cURL Command Builder</h1>
    <p class="subtitle">Build HTTP requests visually — export to cURL, fetch, axios, or Python</p>

    <!-- Import cURL -->
    <div class="card">
        <div class="toggle-row">
            <div class="card-title" style="margin:0">Import cURL</div>
            <div class="toggle" id="importToggle" onclick="toggleImport()"></div>
        </div>
        <div id="importSection" style="display:none">
            <div class="import-area">
                <textarea id="importInput" placeholder='Paste a cURL command here, e.g.: curl -X POST https://api.example.com/data -H "Content-Type: application/json" -d &#39;{"key":"value"}&#39;'></textarea>
                <button class="btn btn-primary btn-sm" style="margin-top:6px" onclick="parseCurl()">Parse</button>
            </div>
        </div>
    </div>

    <!-- Request -->
    <div class="card">
        <div class="card-title">Request</div>
        <div class="row">
            <select class="method-select" id="method" onchange="generate()">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="PATCH">PATCH</option>
                <option value="DELETE">DELETE</option>
                <option value="HEAD">HEAD</option>
                <option value="OPTIONS">OPTIONS</option>
            </select>
            <input class="url-input" id="url" type="text" placeholder="https://api.example.com/endpoint" oninput="generate()">
        </div>
    </div>

    <!-- Headers -->
    <div class="card">
        <div class="card-title">Headers</div>
        <div id="headers"></div>
        <button class="btn btn-ghost btn-sm" onclick="addHeader()">+ Add Header</button>
    </div>

    <!-- Auth -->
    <div class="card">
        <div class="card-title">Authentication</div>
        <select id="authType" onchange="updateAuth();generate()" style="margin-bottom:8px">
            <option value="none">None</option>
            <option value="bearer">Bearer Token</option>
            <option value="basic">Basic Auth</option>
            <option value="apikey">API Key (Header)</option>
        </select>
        <div id="authFields" class="auth-section"></div>
    </div>

    <!-- Body -->
    <div class="card" id="bodyCard">
        <div class="card-title">Body</div>
        <select id="bodyType" onchange="updateBodyType();generate()" style="margin-bottom:8px">
            <option value="none">None</option>
            <option value="json">JSON</option>
            <option value="form">Form URL-Encoded</option>
            <option value="raw">Raw Text</option>
        </select>
        <div id="bodyFields"></div>
    </div>

    <!-- Options -->
    <div class="card">
        <div class="card-title">Options</div>
        <div class="row" style="gap:16px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:6px;margin:0;cursor:pointer">
                <input type="checkbox" id="optFollowRedirects" onchange="generate()"> Follow Redirects (-L)
            </label>
            <label style="display:flex;align-items:center;gap:6px;margin:0;cursor:pointer">
                <input type="checkbox" id="optInsecure" onchange="generate()"> Insecure (-k)
            </label>
            <label style="display:flex;align-items:center;gap:6px;margin:0;cursor:pointer">
                <input type="checkbox" id="optVerbose" onchange="generate()"> Verbose (-v)
            </label>
            <label style="display:flex;align-items:center;gap:6px;margin:0;cursor:pointer">
                <input type="checkbox" id="optSilent" onchange="generate()"> Silent (-s)
            </label>
            <div style="display:flex;align-items:center;gap:6px">
                <label style="margin:0;white-space:nowrap">Timeout (s):</label>
                <input type="number" id="optTimeout" min="0" style="width:70px" oninput="generate()" placeholder="0">
            </div>
        </div>
    </div>

    <!-- Output -->
    <div class="card">
        <div class="card-title">Generated Code</div>
        <div class="tabs">
            <div class="tab active" onclick="setOutputTab('curl')">cURL</div>
            <div class="tab" onclick="setOutputTab('fetch')">fetch</div>
            <div class="tab" onclick="setOutputTab('axios')">axios</div>
            <div class="tab" onclick="setOutputTab('python')">Python</div>
            <div class="tab" onclick="setOutputTab('wget')">wget</div>
            <div class="tab" onclick="setOutputTab('powershell')">PowerShell</div>
        </div>
        <div class="output-box">
            <button class="copy-btn" onclick="copyOutput()">Copy</button>
            <div class="output-code" id="output"></div>
        </div>
    </div>

    <div class="coffee">
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
    </div>
</div>

<script>
let headers = [];
let currentTab = 'curl';
let importOpen = false;

function toggleImport(){
    importOpen = !importOpen;
    document.getElementById('importToggle').classList.toggle('on', importOpen);
    document.getElementById('importSection').style.display = importOpen ? 'block' : 'none';
}

function addHeader(key='', val=''){
    headers.push({key, val});
    renderHeaders();
    generate();
}

function removeHeader(i){
    headers.splice(i, 1);
    renderHeaders();
    generate();
}

function renderHeaders(){
    const c = document.getElementById('headers');
    c.innerHTML = headers.map((h, i) => `
        <div class="header-row">
            <input class="key" placeholder="Header name" value="${esc(h.key)}" oninput="headers[${i}].key=this.value;generate()">
            <input class="val" placeholder="Value" value="${esc(h.val)}" oninput="headers[${i}].val=this.value;generate()">
            <button class="btn btn-danger btn-sm" onclick="removeHeader(${i})">✕</button>
        </div>
    `).join('');
}

function esc(s){return s.replace(/"/g,'&quot;')}

function updateAuth(){
    const t = document.getElementById('authType').value;
    const f = document.getElementById('authFields');
    if(t==='none') f.innerHTML='';
    else if(t==='bearer') f.innerHTML='<input id="authToken" placeholder="Token" oninput="generate()">';
    else if(t==='basic') f.innerHTML='<div class="row"><input id="authUser" placeholder="Username" oninput="generate()"><input id="authPass" placeholder="Password" type="password" oninput="generate()"></div>';
    else if(t==='apikey') f.innerHTML='<div class="row"><input id="authKeyName" placeholder="Header name (e.g. X-API-Key)" oninput="generate()" style="width:45%"><input id="authKeyVal" placeholder="API Key" oninput="generate()"></div>';
}

function updateBodyType(){
    const t = document.getElementById('bodyType').value;
    const f = document.getElementById('bodyFields');
    if(t==='none') f.innerHTML='';
    else if(t==='json') f.innerHTML='<textarea id="bodyContent" placeholder=\'{"key": "value"}\' oninput="generate()"></textarea>';
    else if(t==='form') f.innerHTML='<textarea id="bodyContent" placeholder="key=value&key2=value2" oninput="generate()"></textarea>';
    else if(t==='raw') f.innerHTML='<textarea id="bodyContent" placeholder="Raw body content" oninput="generate()"></textarea>';
}

function getRequest(){
    const method = document.getElementById('method').value;
    const url = document.getElementById('url').value || 'https://api.example.com';
    const allHeaders = [...headers.filter(h=>h.key.trim())];
    const authType = document.getElementById('authType').value;
    const bodyType = document.getElementById('bodyType').value;
    const bodyEl = document.getElementById('bodyContent');
    const body = bodyEl ? bodyEl.value : '';

    // Auth headers
    if(authType==='bearer'){
        const tk = (document.getElementById('authToken')||{}).value||'';
        if(tk) allHeaders.push({key:'Authorization',val:'Bearer '+tk});
    } else if(authType==='basic'){
        const u = (document.getElementById('authUser')||{}).value||'';
        const p = (document.getElementById('authPass')||{}).value||'';
        if(u||p) allHeaders.push({key:'Authorization',val:'Basic '+btoa(u+':'+p)});
    } else if(authType==='apikey'){
        const n = (document.getElementById('authKeyName')||{}).value||'X-API-Key';
        const v = (document.getElementById('authKeyVal')||{}).value||'';
        if(v) allHeaders.push({key:n,val:v});
    }

    // Content-Type
    if(bodyType==='json' && body && !allHeaders.some(h=>h.key.toLowerCase()==='content-type'))
        allHeaders.push({key:'Content-Type',val:'application/json'});
    if(bodyType==='form' && body && !allHeaders.some(h=>h.key.toLowerCase()==='content-type'))
        allHeaders.push({key:'Content-Type',val:'application/x-www-form-urlencoded'});

    const opts = {
        followRedirects: document.getElementById('optFollowRedirects').checked,
        insecure: document.getElementById('optInsecure').checked,
        verbose: document.getElementById('optVerbose').checked,
        silent: document.getElementById('optSilent').checked,
        timeout: parseInt(document.getElementById('optTimeout').value)||0
    };

    return {method, url, headers: allHeaders, bodyType, body, authType, opts};
}

function sq(s){return "'"+s.replace(/'/g,"'\\''")+"'"}
function dq(s){return '"'+s.replace(/\\/g,'\\\\').replace(/"/g,'\\"')+'"'}

function genCurl(r){
    let parts = ['curl'];
    if(r.opts.silent) parts.push('-s');
    if(r.opts.verbose) parts.push('-v');
    if(r.opts.followRedirects) parts.push('-L');
    if(r.opts.insecure) parts.push('-k');
    if(r.opts.timeout) parts.push('--connect-timeout '+r.opts.timeout);
    if(r.method!=='GET') parts.push('-X '+r.method);
    parts.push(sq(r.url));
    r.headers.forEach(h=>parts.push('-H '+sq(h.key+': '+h.val)));
    if(r.body) parts.push('-d '+sq(r.body));
    return parts.join(' \\\n  ');
}

function genFetch(r){
    let opts = [];
    if(r.method!=='GET') opts.push(`  method: '${r.method}'`);
    if(r.headers.length){
        let hl = r.headers.map(h=>`    '${h.key}': '${h.val}'`).join(',\n');
        opts.push(`  headers: {\n${hl}\n  }`);
    }
    if(r.body){
        const val = r.bodyType==='json' ? `JSON.stringify(${r.body})` : `'${r.body.replace(/'/g,"\\'")}'`;
        opts.push(`  body: ${val}`);
    }
    let o = opts.length ? `, {\n${opts.join(',\n')}\n}` : '';
    return `fetch('${r.url}'${o})\n  .then(res => res.json())\n  .then(data => console.log(data))\n  .catch(err => console.error(err));`;
}

function genAxios(r){
    let config = [`  method: '${r.method.toLowerCase()}'`, `  url: '${r.url}'`];
    if(r.headers.length){
        let hl = r.headers.map(h=>`    '${h.key}': '${h.val}'`).join(',\n');
        config.push(`  headers: {\n${hl}\n  }`);
    }
    if(r.body){
        const val = r.bodyType==='json' ? r.body : `'${r.body.replace(/'/g,"\\'")}'`;
        config.push(`  data: ${val}`);
    }
    if(r.opts.timeout) config.push(`  timeout: ${r.opts.timeout*1000}`);
    return `axios({\n${config.join(',\n')}\n})\n  .then(res => console.log(res.data))\n  .catch(err => console.error(err));`;
}

function genPython(r){
    let lines = ['import requests', ''];
    let args = [`'${r.url}'`];
    if(r.headers.length){
        let hl = r.headers.map(h=>`    '${h.key}': '${h.val}'`).join(',\n');
        args.push(`headers={\n${hl}\n}`);
    }
    if(r.body && r.bodyType==='json'){
        lines.splice(1,0,'import json');
        args.push(`json=${r.body}`);
    } else if(r.body){
        args.push(`data='${r.body.replace(/'/g,"\\'")}'`);
    }
    if(r.opts.timeout) args.push(`timeout=${r.opts.timeout}`);
    if(r.opts.insecure) args.push('verify=False');
    if(r.opts.followRedirects===false) args.push('allow_redirects=False');
    lines.push(`response = requests.${r.method.toLowerCase()}(\n  ${args.join(',\n  ')}\n)`);
    lines.push('print(response.status_code)');
    lines.push('print(response.json())');
    return lines.join('\n');
}

function genWget(r){
    let parts = ['wget'];
    if(r.method!=='GET') parts.push('--method='+r.method);
    r.headers.forEach(h=>parts.push('--header='+sq(h.key+': '+h.val)));
    if(r.body) parts.push('--body-data='+sq(r.body));
    if(r.opts.timeout) parts.push('--timeout='+r.opts.timeout);
    if(r.opts.insecure) parts.push('--no-check-certificate');
    parts.push('-O -');
    parts.push(sq(r.url));
    return parts.join(' \\\n  ');
}

function genPowershell(r){
    let lines = [];
    let params = [`-Uri '${r.url}'`, `-Method ${r.method}`];
    if(r.headers.length){
        let hl = r.headers.map(h=>`  '${h.key}' = '${h.val}'`).join('\n');
        lines.push(`$headers = @{\n${hl}\n}`);
        params.push('-Headers $headers');
    }
    if(r.body){
        lines.push(`$body = '${r.body.replace(/'/g,"''")}'`);
        params.push('-Body $body');
        if(r.bodyType==='json') params.push("-ContentType 'application/json'");
    }
    if(r.opts.timeout) params.push(`-TimeoutSec ${r.opts.timeout}`);
    lines.push(`Invoke-RestMethod \`\n  ${params.join(' `\n  ')}`);
    return lines.join('\n\n');
}

const generators = {curl:genCurl, fetch:genFetch, axios:genAxios, python:genPython, wget:genWget, powershell:genPowershell};

function generate(){
    const r = getRequest();
    const code = generators[currentTab](r);
    document.getElementById('output').textContent = code;
}

function setOutputTab(tab){
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>{if(t.textContent.toLowerCase()===tab) t.classList.add('active')});
    generate();
}

function copyOutput(){
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(()=>{
        const btn = document.querySelector('.copy-btn');
        btn.textContent='Copied!';
        setTimeout(()=>btn.textContent='Copy',1500);
    });
}

function parseCurl(){
    const raw = document.getElementById('importInput').value.trim();
    if(!raw) return;
    // Simple cURL parser
    let s = raw.replace(/\\\n/g,' ').replace(/\s+/g,' ');
    // Remove leading 'curl'
    s = s.replace(/^curl\s+/,'');

    let method='GET', url='', hds=[], body='', bodyType='none';
    const tokens = [];
    let buf='', inQ=false, qc='';
    for(let i=0;i<s.length;i++){
        const c=s[i];
        if(inQ){
            if(c===qc){inQ=false;continue}
            if(c==='\\'&&i+1<s.length){buf+=s[++i];continue}
            buf+=c;
        } else {
            if(c==="'"||c==='"'){inQ=true;qc=c;continue}
            if(c===' '){if(buf){tokens.push(buf);buf=''}continue}
            buf+=c;
        }
    }
    if(buf) tokens.push(buf);

    let i=0;
    while(i<tokens.length){
        const t=tokens[i];
        if(t==='-X'||t==='--request'){method=tokens[++i]||'GET'}
        else if(t==='-H'||t==='--header'){
            const h=tokens[++i]||'';
            const idx=h.indexOf(':');
            if(idx>0) hds.push({key:h.slice(0,idx).trim(),val:h.slice(idx+1).trim()});
        }
        else if(t==='-d'||t==='--data'||t==='--data-raw'||t==='--data-binary'){
            body=tokens[++i]||'';
            if(method==='GET') method='POST';
        }
        else if(t==='-L'||t==='--location') document.getElementById('optFollowRedirects').checked=true;
        else if(t==='-k'||t==='--insecure') document.getElementById('optInsecure').checked=true;
        else if(t==='-v'||t==='--verbose') document.getElementById('optVerbose').checked=true;
        else if(t==='-s'||t==='--silent') document.getElementById('optSilent').checked=true;
        else if(t.startsWith('http')||t.startsWith('/')) url=t;
        i++;
    }

    document.getElementById('method').value=method;
    document.getElementById('url').value=url;

    // Detect auth headers
    const authH = hds.find(h=>h.key.toLowerCase()==='authorization');
    if(authH){
        if(authH.val.startsWith('Bearer ')){
            document.getElementById('authType').value='bearer';
            updateAuth();
            document.getElementById('authToken').value=authH.val.slice(7);
        } else if(authH.val.startsWith('Basic ')){
            document.getElementById('authType').value='basic';
            updateAuth();
            try{
                const [u,p]=atob(authH.val.slice(6)).split(':');
                document.getElementById('authUser').value=u||'';
                document.getElementById('authPass').value=p||'';
            }catch(e){}
        }
        hds=hds.filter(h=>h!==authH);
    }

    // Remove content-type from manual headers if we auto-detect body
    const ctH = hds.find(h=>h.key.toLowerCase()==='content-type');
    if(body){
        try{JSON.parse(body);bodyType='json'}catch(e){bodyType=body.includes('=')&&!body.includes('{') ? 'form' : 'raw'}
    }
    if(ctH && body){
        if(ctH.val.includes('json')) bodyType='json';
        else if(ctH.val.includes('form-urlencoded')) bodyType='form';
        hds=hds.filter(h=>h!==ctH);
    }

    headers=hds;
    renderHeaders();
    document.getElementById('bodyType').value=bodyType;
    updateBodyType();
    if(body){document.getElementById('bodyContent').value=body}
    generate();
}

// Init
addHeader('','');
generate();
</script>
</body>
</html>
