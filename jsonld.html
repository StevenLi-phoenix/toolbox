<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON-LD Generator - Free Structured Data / Schema.org Tool</title>
<meta name="description" content="Generate JSON-LD structured data for SEO. Support for Article, Product, FAQ, LocalBusiness, Organization, Event, and more Schema.org types. 100% client-side.">
<meta name="keywords" content="json-ld generator, structured data, schema.org, seo, rich snippets, google structured data, json-ld builder">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/jsonld.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .schema-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .schema-btn { padding: 10px; text-align: center; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: .85rem; background: var(--surface); color: var(--text); transition: all .15s; }
  .schema-btn:hover { background: var(--surface2); border-color: var(--border2); }
  .schema-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .schema-btn .schema-icon { display: block; font-size: 1.4rem; margin-bottom: 4px; }
  .field-group { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .field-group h3 { font-size: .88rem; margin-bottom: 10px; color: var(--text); }
  .faq-item { border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 8px; position: relative; }
  .faq-item .remove-faq { position: absolute; top: 8px; right: 8px; padding: 2px 8px; font-size: .75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--error); cursor: pointer; }
  .output-area { position: relative; }
  .output-area pre { max-height: 500px; overflow: auto; margin: 0; }
  .validation { margin-top: 10px; padding: 10px 14px; border-radius: var(--radius); font-size: .85rem; }
  .validation.valid { background: #ecfdf5; color: var(--success); border: 1px solid #bbf7d0; }
  .validation.warn { background: #fffbeb; color: var(--warning); border: 1px solid #fde68a; }
  .test-link { margin-top: 10px; font-size: .85rem; }
  .test-link a { color: var(--accent); }
  @media (max-width: 768px) {
    .schema-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>JSON-LD Generator</h1>
<p class="subtitle">Generate Schema.org structured data in JSON-LD format for SEO and rich snippets</p>

<div class="card">
<h2>📋 Schema Type</h2>
<div class="schema-grid" id="schemaGrid">
  <button class="schema-btn active" onclick="selectType('Article')"><span class="schema-icon">📰</span>Article</button>
  <button class="schema-btn" onclick="selectType('Product')"><span class="schema-icon">🛍️</span>Product</button>
  <button class="schema-btn" onclick="selectType('FAQPage')"><span class="schema-icon">❓</span>FAQ</button>
  <button class="schema-btn" onclick="selectType('LocalBusiness')"><span class="schema-icon">🏪</span>Local Business</button>
  <button class="schema-btn" onclick="selectType('Organization')"><span class="schema-icon">🏢</span>Organization</button>
  <button class="schema-btn" onclick="selectType('Event')"><span class="schema-icon">📅</span>Event</button>
  <button class="schema-btn" onclick="selectType('BreadcrumbList')"><span class="schema-icon">🔗</span>Breadcrumb</button>
  <button class="schema-btn" onclick="selectType('WebSite')"><span class="schema-icon">🌐</span>WebSite</button>
</div>
</div>

<div class="card" id="fieldsCard">
<h2>✏️ Properties</h2>
<div id="fields"></div>
</div>

<div class="card">
<h2>📄 Generated JSON-LD</h2>
<div class="output-area">
  <div class="btn-row" style="margin-bottom:10px">
    <button class="btn" onclick="copyOutput()">Copy JSON-LD</button>
    <button class="btn-secondary" onclick="copyScript()">Copy &lt;script&gt; Tag</button>
  </div>
  <pre><code id="output"></code></pre>
</div>
<div id="validation"></div>
<div class="test-link" id="testLink"></div>
</div>
</div>

<div class="toast" id="toast">Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let currentType='Article';
let faqItems=[{q:'',a:''}];
let breadcrumbItems=[{name:'Home',url:'https://example.com/'}];

const SCHEMAS={
  Article:{
    fields:[
      {id:'headline',label:'Headline',type:'text',placeholder:'Article title',required:true},
      {id:'description',label:'Description',type:'textarea',placeholder:'Brief description of the article'},
      {id:'image',label:'Image URL',type:'text',placeholder:'https://example.com/image.jpg'},
      {id:'authorName',label:'Author Name',type:'text',placeholder:'John Doe',required:true},
      {id:'authorUrl',label:'Author URL',type:'text',placeholder:'https://example.com/author'},
      {id:'publisherName',label:'Publisher Name',type:'text',placeholder:'Example News'},
      {id:'publisherLogo',label:'Publisher Logo URL',type:'text',placeholder:'https://example.com/logo.png'},
      {id:'datePublished',label:'Date Published',type:'date'},
      {id:'dateModified',label:'Date Modified',type:'date'},
      {id:'url',label:'Article URL',type:'text',placeholder:'https://example.com/article'}
    ]
  },
  Product:{
    fields:[
      {id:'name',label:'Product Name',type:'text',placeholder:'Product name',required:true},
      {id:'description',label:'Description',type:'textarea',placeholder:'Product description'},
      {id:'image',label:'Image URL',type:'text',placeholder:'https://example.com/product.jpg'},
      {id:'brand',label:'Brand',type:'text',placeholder:'Brand name'},
      {id:'sku',label:'SKU',type:'text',placeholder:'SKU12345'},
      {id:'price',label:'Price',type:'text',placeholder:'29.99'},
      {id:'currency',label:'Currency',type:'text',placeholder:'USD',value:'USD'},
      {id:'availability',label:'Availability',type:'select',options:['InStock','OutOfStock','PreOrder','SoldOut']},
      {id:'ratingValue',label:'Rating (1-5)',type:'text',placeholder:'4.5'},
      {id:'reviewCount',label:'Review Count',type:'text',placeholder:'89'},
      {id:'url',label:'Product URL',type:'text',placeholder:'https://example.com/product'}
    ]
  },
  FAQPage:{fields:'faq'},
  LocalBusiness:{
    fields:[
      {id:'name',label:'Business Name',type:'text',placeholder:'My Local Shop',required:true},
      {id:'description',label:'Description',type:'textarea',placeholder:'A family-owned shop since 1990'},
      {id:'image',label:'Image URL',type:'text',placeholder:'https://example.com/shop.jpg'},
      {id:'telephone',label:'Phone',type:'text',placeholder:'+1-555-123-4567'},
      {id:'email',label:'Email',type:'text',placeholder:'info@example.com'},
      {id:'url',label:'Website',type:'text',placeholder:'https://example.com'},
      {id:'streetAddress',label:'Street Address',type:'text',placeholder:'123 Main St'},
      {id:'city',label:'City',type:'text',placeholder:'Springfield'},
      {id:'state',label:'State/Region',type:'text',placeholder:'IL'},
      {id:'postalCode',label:'Postal Code',type:'text',placeholder:'62704'},
      {id:'country',label:'Country',type:'text',placeholder:'US'},
      {id:'priceRange',label:'Price Range',type:'text',placeholder:'$$'}
    ]
  },
  Organization:{
    fields:[
      {id:'name',label:'Organization Name',type:'text',placeholder:'Acme Corp',required:true},
      {id:'url',label:'Website',type:'text',placeholder:'https://example.com'},
      {id:'logo',label:'Logo URL',type:'text',placeholder:'https://example.com/logo.png'},
      {id:'description',label:'Description',type:'textarea',placeholder:'A leading company in...'},
      {id:'email',label:'Email',type:'text',placeholder:'contact@example.com'},
      {id:'telephone',label:'Phone',type:'text',placeholder:'+1-555-123-4567'},
      {id:'streetAddress',label:'Street Address',type:'text',placeholder:'123 Main St'},
      {id:'city',label:'City',type:'text',placeholder:'Springfield'},
      {id:'state',label:'State/Region',type:'text',placeholder:'IL'},
      {id:'postalCode',label:'Postal Code',type:'text',placeholder:'62704'},
      {id:'country',label:'Country',type:'text',placeholder:'US'}
    ]
  },
  Event:{
    fields:[
      {id:'name',label:'Event Name',type:'text',placeholder:'Annual Tech Conference',required:true},
      {id:'description',label:'Description',type:'textarea',placeholder:'Join us for an amazing event...'},
      {id:'image',label:'Image URL',type:'text',placeholder:'https://example.com/event.jpg'},
      {id:'startDate',label:'Start Date',type:'datetime-local'},
      {id:'endDate',label:'End Date',type:'datetime-local'},
      {id:'locationName',label:'Venue Name',type:'text',placeholder:'Convention Center'},
      {id:'streetAddress',label:'Street Address',type:'text',placeholder:'123 Main St'},
      {id:'city',label:'City',type:'text',placeholder:'Springfield'},
      {id:'country',label:'Country',type:'text',placeholder:'US'},
      {id:'url',label:'Event URL',type:'text',placeholder:'https://example.com/event'},
      {id:'organizerName',label:'Organizer',type:'text',placeholder:'Tech Events Inc'},
      {id:'eventStatus',label:'Status',type:'select',options:['EventScheduled','EventCancelled','EventPostponed','EventRescheduled']},
      {id:'eventAttendanceMode',label:'Attendance Mode',type:'select',options:['OfflineEventAttendanceMode','OnlineEventAttendanceMode','MixedEventAttendanceMode']}
    ]
  },
  BreadcrumbList:{fields:'breadcrumb'},
  WebSite:{
    fields:[
      {id:'name',label:'Site Name',type:'text',placeholder:'My Website',required:true},
      {id:'url',label:'Site URL',type:'text',placeholder:'https://example.com',required:true},
      {id:'description',label:'Description',type:'textarea',placeholder:'A website about...'},
      {id:'searchUrl',label:'Search URL Template',type:'text',placeholder:'https://example.com/search?q={search_term_string}'},
    ]
  }
};

function selectType(type){
  currentType=type;
  document.querySelectorAll('.schema-btn').forEach(b=>b.classList.remove('active'));
  event.target.closest('.schema-btn').classList.add('active');
  renderFields();
  generate();
}

function renderFields(){
  const schema=SCHEMAS[currentType];
  const container=$('fields');
  if(schema.fields==='faq'){
    renderFAQ(container);return;
  }
  if(schema.fields==='breadcrumb'){
    renderBreadcrumb(container);return;
  }
  container.innerHTML=schema.fields.map(f=>{
    if(f.type==='textarea'){
      return `<div class="field"><label for="${f.id}">${f.label}${f.required?' *':''}</label><textarea id="${f.id}" rows="2" placeholder="${f.placeholder||''}" oninput="generate()"></textarea></div>`;
    }
    if(f.type==='select'){
      const opts=f.options.map(o=>`<option value="${o}">${o}</option>`).join('');
      return `<div class="field"><label for="${f.id}">${f.label}</label><select id="${f.id}" onchange="generate()">${opts}</select></div>`;
    }
    return `<div class="field"><label for="${f.id}">${f.label}${f.required?' *':''}</label><input type="${f.type}" id="${f.id}" placeholder="${f.placeholder||''}" value="${f.value||''}" oninput="generate()"></div>`;
  }).join('');
}

function renderFAQ(container){
  container.innerHTML=`<p style="font-size:.85rem;color:var(--muted);margin-bottom:12px">Add question & answer pairs for your FAQ page.</p>
  <div id="faqList">${faqItems.map((item,i)=>`<div class="faq-item"><button class="remove-faq" onclick="removeFAQ(${i})">Remove</button><div class="field"><label>Question ${i+1}</label><input type="text" value="${esc(item.q)}" oninput="faqItems[${i}].q=this.value;generate()" placeholder="What is your return policy?"></div><div class="field"><label>Answer</label><textarea rows="2" oninput="faqItems[${i}].a=this.value;generate()" placeholder="Our return policy allows...">${esc(item.a)}</textarea></div></div>`).join('')}</div>
  <button class="btn-secondary" onclick="addFAQ()" style="margin-top:8px">+ Add Question</button>`;
}

function addFAQ(){faqItems.push({q:'',a:''});renderFields();generate();}
function removeFAQ(i){faqItems.splice(i,1);if(!faqItems.length)faqItems=[{q:'',a:''}];renderFields();generate();}

function renderBreadcrumb(container){
  container.innerHTML=`<p style="font-size:.85rem;color:var(--muted);margin-bottom:12px">Define breadcrumb items in order.</p>
  <div id="breadcrumbList">${breadcrumbItems.map((item,i)=>`<div class="faq-item"><button class="remove-faq" onclick="removeBreadcrumb(${i})">Remove</button><div class="field"><label>Item ${i+1} Name</label><input type="text" value="${esc(item.name)}" oninput="breadcrumbItems[${i}].name=this.value;generate()" placeholder="Home"></div><div class="field"><label>URL</label><input type="text" value="${esc(item.url)}" oninput="breadcrumbItems[${i}].url=this.value;generate()" placeholder="https://example.com/"></div></div>`).join('')}</div>
  <button class="btn-secondary" onclick="addBreadcrumb()" style="margin-top:8px">+ Add Item</button>`;
}

function addBreadcrumb(){breadcrumbItems.push({name:'',url:''});renderFields();generate();}
function removeBreadcrumb(i){breadcrumbItems.splice(i,1);if(!breadcrumbItems.length)breadcrumbItems=[{name:'',url:''}];renderFields();generate();}

function esc(s){return s.replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function v(id){const el=$(id);return el?el.value.trim():'';}

function generate(){
  let data={'@context':'https://schema.org'};
  const warnings=[];

  if(currentType==='Article'){
    data['@type']='Article';
    if(v('headline'))data.headline=v('headline');
    if(v('description'))data.description=v('description');
    if(v('image'))data.image=v('image');
    if(v('authorName'))data.author={'@type':'Person',name:v('authorName')};
    if(v('authorUrl')&&data.author)data.author.url=v('authorUrl');
    if(v('publisherName')){
      data.publisher={'@type':'Organization',name:v('publisherName')};
      if(v('publisherLogo'))data.publisher.logo={'@type':'ImageObject',url:v('publisherLogo')};
    }
    if(v('datePublished'))data.datePublished=v('datePublished');
    if(v('dateModified'))data.dateModified=v('dateModified');
    if(v('url'))data.url=v('url');
    if(!v('headline'))warnings.push('Headline is required');
    if(!v('authorName'))warnings.push('Author name is recommended');
  }
  else if(currentType==='Product'){
    data['@type']='Product';
    if(v('name'))data.name=v('name');
    if(v('description'))data.description=v('description');
    if(v('image'))data.image=v('image');
    if(v('brand'))data.brand={'@type':'Brand',name:v('brand')};
    if(v('sku'))data.sku=v('sku');
    if(v('price')){
      data.offers={'@type':'Offer',price:v('price'),priceCurrency:v('currency')||'USD'};
      if(v('availability'))data.offers.availability='https://schema.org/'+v('availability');
      if(v('url'))data.offers.url=v('url');
    }
    if(v('ratingValue')){
      data.aggregateRating={'@type':'AggregateRating',ratingValue:v('ratingValue'),bestRating:'5'};
      if(v('reviewCount'))data.aggregateRating.reviewCount=v('reviewCount');
    }
    if(!v('name'))warnings.push('Product name is required');
  }
  else if(currentType==='FAQPage'){
    data['@type']='FAQPage';
    const valid=faqItems.filter(f=>f.q&&f.a);
    if(valid.length){
      data.mainEntity=valid.map(f=>({'@type':'Question',name:f.q,acceptedAnswer:{'@type':'Answer',text:f.a}}));
    }
    if(!valid.length)warnings.push('Add at least one Q&A pair');
  }
  else if(currentType==='LocalBusiness'){
    data['@type']='LocalBusiness';
    if(v('name'))data.name=v('name');
    if(v('description'))data.description=v('description');
    if(v('image'))data.image=v('image');
    if(v('telephone'))data.telephone=v('telephone');
    if(v('email'))data.email=v('email');
    if(v('url'))data.url=v('url');
    if(v('streetAddress')||v('city')){
      data.address={'@type':'PostalAddress'};
      if(v('streetAddress'))data.address.streetAddress=v('streetAddress');
      if(v('city'))data.address.addressLocality=v('city');
      if(v('state'))data.address.addressRegion=v('state');
      if(v('postalCode'))data.address.postalCode=v('postalCode');
      if(v('country'))data.address.addressCountry=v('country');
    }
    if(v('priceRange'))data.priceRange=v('priceRange');
    if(!v('name'))warnings.push('Business name is required');
  }
  else if(currentType==='Organization'){
    data['@type']='Organization';
    if(v('name'))data.name=v('name');
    if(v('url'))data.url=v('url');
    if(v('logo'))data.logo=v('logo');
    if(v('description'))data.description=v('description');
    if(v('email'))data.email=v('email');
    if(v('telephone'))data.telephone=v('telephone');
    if(v('streetAddress')||v('city')){
      data.address={'@type':'PostalAddress'};
      if(v('streetAddress'))data.address.streetAddress=v('streetAddress');
      if(v('city'))data.address.addressLocality=v('city');
      if(v('state'))data.address.addressRegion=v('state');
      if(v('postalCode'))data.address.postalCode=v('postalCode');
      if(v('country'))data.address.addressCountry=v('country');
    }
    if(!v('name'))warnings.push('Organization name is required');
  }
  else if(currentType==='Event'){
    data['@type']='Event';
    if(v('name'))data.name=v('name');
    if(v('description'))data.description=v('description');
    if(v('image'))data.image=v('image');
    if(v('startDate'))data.startDate=new Date(v('startDate')).toISOString();
    if(v('endDate'))data.endDate=new Date(v('endDate')).toISOString();
    if(v('eventStatus'))data.eventStatus='https://schema.org/'+v('eventStatus');
    if(v('eventAttendanceMode'))data.eventAttendanceMode='https://schema.org/'+v('eventAttendanceMode');
    if(v('locationName')){
      data.location={'@type':'Place',name:v('locationName')};
      if(v('streetAddress')||v('city')){
        data.location.address={'@type':'PostalAddress'};
        if(v('streetAddress'))data.location.address.streetAddress=v('streetAddress');
        if(v('city'))data.location.address.addressLocality=v('city');
        if(v('country'))data.location.address.addressCountry=v('country');
      }
    }
    if(v('url'))data.url=v('url');
    if(v('organizerName'))data.organizer={'@type':'Organization',name:v('organizerName')};
    if(!v('name'))warnings.push('Event name is required');
    if(!v('startDate'))warnings.push('Start date is recommended');
  }
  else if(currentType==='BreadcrumbList'){
    data['@type']='BreadcrumbList';
    const valid=breadcrumbItems.filter(b=>b.name);
    if(valid.length){
      data.itemListElement=valid.map((b,i)=>{
        const item={'@type':'ListItem',position:i+1,name:b.name};
        if(b.url)item.item=b.url;
        return item;
      });
    }
    if(!valid.length)warnings.push('Add at least one breadcrumb item');
  }
  else if(currentType==='WebSite'){
    data['@type']='WebSite';
    if(v('name'))data.name=v('name');
    if(v('url'))data.url=v('url');
    if(v('description'))data.description=v('description');
    if(v('searchUrl')){
      data.potentialAction={'@type':'SearchAction',target:{'@type':'EntryPoint',urlTemplate:v('searchUrl')},'query-input':'required name=search_term_string'};
    }
    if(!v('name'))warnings.push('Site name is required');
  }

  const json=JSON.stringify(data,null,2);
  $('output').textContent=json;

  const valEl=$('validation');
  if(warnings.length){
    valEl.className='validation warn';
    valEl.innerHTML='⚠ '+warnings.join(' · ');
  } else {
    valEl.className='validation valid';
    valEl.innerHTML='✓ Valid structured data — all required fields present';
  }

  const encoded=encodeURIComponent(json);
  $('testLink').innerHTML=`<strong>Test your markup:</strong> Paste the output into <a href="https://search.google.com/test/rich-results" target="_blank" rel="noopener">Google Rich Results Test</a>`;
}

function copyOutput(){
  navigator.clipboard.writeText($('output').textContent).then(()=>{
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function copyScript(){
  const script=`<script type="application/ld+json">\n${$('output').textContent}\n<\/script>`;
  navigator.clipboard.writeText(script).then(()=>{
    const t=$('toast');t.textContent='Script tag copied!';t.classList.add('show');
    setTimeout(()=>{t.classList.remove('show');t.textContent='Copied!';},1500);
  });
}

renderFields();
generate();
</script>
</body>
</html>
