<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XML Formatter & Validator - Free Online XML Tool</title>
<meta name="description" content="Free online XML formatter, validator, and minifier. Format, beautify, validate, and minify XML documents with syntax highlighting. No data sent to any server.">
<meta name="keywords" content="xml formatter, xml validator, xml minifier, xml beautifier, xml online, free xml tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/xmlformat.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel textarea { width: 100%; min-height: 320px; font-family: var(--mono); font-size: .85rem; resize: vertical; }
  .panel .output-box { min-height: 320px; max-height: 600px; overflow: auto; font-family: var(--mono); font-size: .85rem; white-space: pre-wrap; word-break: break-word; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .stats { display: flex; gap: 16px; font-size: .82rem; color: var(--muted); margin-top: 8px; flex-wrap: wrap; }
  .stats span { display: inline-flex; align-items: center; gap: 4px; }
  .xml-tag { color: #0550ae; }
  .xml-attr { color: #953800; }
  .xml-val { color: #0a3069; }
  .xml-comment { color: #6e7781; font-style: italic; }
  .xml-cdata { color: #8250df; }
  .xml-decl { color: #6e7781; }
  .indent-opts { display: flex; align-items: center; gap: 8px; font-size: .85rem; }
  .indent-opts label { font-weight: 400; color: var(--muted); }
  .indent-opts select { padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: .82rem; background: var(--bg); color: var(--text); }
  .error-box { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); padding: 10px 14px; border-radius: var(--radius); font-size: .85rem; margin-top: 8px; }
  .success-box { background: #ecfdf5; border: 1px solid #bbf7d0; color: var(--success); padding: 10px 14px; border-radius: var(--radius); font-size: .85rem; margin-top: 8px; }
  @media (max-width: 768px) {
    .panels { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>XML Formatter & Validator</h1>
<p class="subtitle">Format, validate, and minify XML documents. 100% client-side.</p>

<div class="toolbar">
  <button class="btn" onclick="formatXml()">Format</button>
  <button class="btn-secondary" onclick="minifyXml()">Minify</button>
  <button class="btn-secondary" onclick="validateXml()">Validate</button>
  <button class="btn-secondary" onclick="copyOutput()">📋 Copy</button>
  <button class="btn-secondary" onclick="downloadOutput()">💾 Download</button>
  <button class="btn-secondary" onclick="clearAll()">🗑️ Clear</button>
  <div class="indent-opts">
    <label for="indent-size">Indent:</label>
    <select id="indent-size">
      <option value="2" selected>2 spaces</option>
      <option value="4">4 spaces</option>
      <option value="tab">Tab</option>
    </select>
  </div>
</div>

<div class="panels">
  <div class="panel">
    <div class="card">
      <h2>📝 Input XML</h2>
      <textarea id="input" placeholder="Paste your XML here..."><?xml version="1.0" encoding="UTF-8"?>
<catalog><book id="bk101"><author>Gambardella, Matthew</author><title>XML Developer's Guide</title><genre>Computer</genre><price>44.95</price><publish_date>2000-10-01</publish_date><description>An in-depth look at creating applications with XML.</description></book><book id="bk102"><author>Ralls, Kim</author><title>Midnight Rain</title><genre>Fantasy</genre><price>5.95</price><publish_date>2000-12-16</publish_date><description>A former architect battles corporate zombies.</description></book></catalog></textarea>
      <div class="stats" id="input-stats"></div>
    </div>
  </div>
  <div class="panel">
    <div class="card">
      <h2>✨ Output</h2>
      <div class="output-box" id="output"></div>
      <div class="stats" id="output-stats"></div>
      <div id="status"></div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const statusEl = document.getElementById('status');
const inputStats = document.getElementById('input-stats');
const outputStats = document.getElementById('output-stats');
let lastOutput = '';

function getIndent() {
  const v = document.getElementById('indent-size').value;
  return v === 'tab' ? '\t' : ' '.repeat(parseInt(v));
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function parseXml(str) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(str, 'application/xml');
  const err = doc.querySelector('parsererror');
  if (err) {
    return { error: err.textContent };
  }
  return { doc };
}

function serializeFormatted(node, indent, level) {
  const ind = indent.repeat(level);
  const indChild = indent.repeat(level + 1);
  let result = '';

  if (node.nodeType === Node.DOCUMENT_NODE) {
    for (const child of node.childNodes) {
      result += serializeFormatted(child, indent, 0);
    }
    return result;
  }

  if (node.nodeType === Node.PROCESSING_INSTRUCTION_NODE) {
    result += ind + '<?' + node.nodeName;
    if (node.nodeValue) result += ' ' + node.nodeValue;
    result += '?>\n';
    return result;
  }

  if (node.nodeType === Node.COMMENT_NODE) {
    result += ind + '<!--' + node.nodeValue + '-->\n';
    return result;
  }

  if (node.nodeType === Node.CDATA_SECTION_NODE) {
    result += ind + '<![CDATA[' + node.nodeValue + ']]>\n';
    return result;
  }

  if (node.nodeType === Node.TEXT_NODE) {
    const text = node.nodeValue.trim();
    if (text) return ind + text + '\n';
    return '';
  }

  if (node.nodeType === Node.ELEMENT_NODE) {
    result += ind + '<' + node.tagName;
    for (const attr of node.attributes) {
      result += ' ' + attr.name + '="' + escapeAttr(attr.value) + '"';
    }

    const children = Array.from(node.childNodes);
    const meaningfulChildren = children.filter(c =>
      c.nodeType !== Node.TEXT_NODE || c.nodeValue.trim()
    );

    if (meaningfulChildren.length === 0) {
      result += '/>\n';
    } else if (meaningfulChildren.length === 1 && meaningfulChildren[0].nodeType === Node.TEXT_NODE) {
      result += '>' + meaningfulChildren[0].nodeValue.trim() + '</' + node.tagName + '>\n';
    } else {
      result += '>\n';
      for (const child of children) {
        result += serializeFormatted(child, indent, level + 1);
      }
      result += ind + '</' + node.tagName + '>\n';
    }
  }

  return result;
}

function escapeAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function highlightXml(xml) {
  return xml
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(&lt;\?[\s\S]*?\?&gt;)/g, '<span class="xml-decl">$1</span>')
    .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="xml-comment">$1</span>')
    .replace(/(&lt;!\[CDATA\[[\s\S]*?\]\]&gt;)/g, '<span class="xml-cdata">$1</span>')
    .replace(/(&lt;\/?)([\w:.-]+)/g, '$1<span class="xml-tag">$2</span>')
    .replace(/([\w:.-]+)(=)(&quot;[^&]*?&quot;)/g, '<span class="xml-attr">$1</span>$2<span class="xml-val">$3</span>');
}

function updateStats(el, text) {
  const lines = text.split('\n').length;
  const bytes = new Blob([text]).size;
  const sizeStr = bytes > 1024 ? (bytes / 1024).toFixed(1) + ' KB' : bytes + ' B';
  el.innerHTML = `<span>${lines} lines</span><span>${sizeStr}</span>`;
}

function formatXml() {
  const src = inputEl.value.trim();
  if (!src) { statusEl.innerHTML = ''; outputEl.innerHTML = ''; return; }

  const result = parseXml(src);
  if (result.error) {
    statusEl.innerHTML = '<div class="error-box">✗ ' + escapeHtml(result.error) + '</div>';
    outputEl.innerHTML = '';
    outputStats.innerHTML = '';
    return;
  }

  const indent = getIndent();
  lastOutput = serializeFormatted(result.doc, indent, 0).trimEnd();
  outputEl.innerHTML = highlightXml(lastOutput);
  statusEl.innerHTML = '<div class="success-box">✓ Formatted successfully</div>';
  updateStats(inputStats, src);
  updateStats(outputStats, lastOutput);
}

function minifyXml() {
  const src = inputEl.value.trim();
  if (!src) return;

  const result = parseXml(src);
  if (result.error) {
    statusEl.innerHTML = '<div class="error-box">✗ ' + escapeHtml(result.error) + '</div>';
    outputEl.innerHTML = '';
    return;
  }

  const serializer = new XMLSerializer();
  let minified = serializer.serializeToString(result.doc);
  // Remove extra whitespace between tags
  minified = minified.replace(/>\s+</g, '><').replace(/\s+/g, ' ').replace(/> </g, '>').replace(/ </g, '<').trim();
  // Re-parse and serialize cleanly
  lastOutput = minified;
  outputEl.innerHTML = highlightXml(lastOutput);

  const origSize = new Blob([src]).size;
  const minSize = new Blob([lastOutput]).size;
  const pct = ((1 - minSize / origSize) * 100).toFixed(1);
  statusEl.innerHTML = `<div class="success-box">✓ Minified — saved ${pct}% (${origSize} → ${minSize} bytes)</div>`;
  updateStats(inputStats, src);
  updateStats(outputStats, lastOutput);
}

function validateXml() {
  const src = inputEl.value.trim();
  if (!src) return;

  const result = parseXml(src);
  if (result.error) {
    statusEl.innerHTML = '<div class="error-box">✗ Invalid XML: ' + escapeHtml(result.error) + '</div>';
    outputEl.innerHTML = '';
  } else {
    const doc = result.doc;
    const root = doc.documentElement;
    const elements = root.getElementsByTagName('*').length + 1;
    const attrs = Array.from(root.querySelectorAll('*')).reduce((sum, el) => sum + el.attributes.length, 0) + root.attributes.length;
    statusEl.innerHTML = `<div class="success-box">✓ Valid XML — ${elements} element${elements !== 1 ? 's' : ''}, ${attrs} attribute${attrs !== 1 ? 's' : ''}</div>`;
    // Also format it
    formatXml();
  }
}

function copyOutput() {
  if (!lastOutput) return;
  navigator.clipboard.writeText(lastOutput).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

function downloadOutput() {
  if (!lastOutput) return;
  const blob = new Blob([lastOutput], { type: 'application/xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'formatted.xml';
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearAll() {
  inputEl.value = '';
  outputEl.innerHTML = '';
  statusEl.innerHTML = '';
  inputStats.innerHTML = '';
  outputStats.innerHTML = '';
  lastOutput = '';
}

inputEl.addEventListener('input', () => updateStats(inputStats, inputEl.value));
updateStats(inputStats, inputEl.value);
formatXml();
</script>
</body>
</html>
