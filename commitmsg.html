<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commit Message Generator — Conventional Commits Builder</title>
<meta name="description" content="Free online Conventional Commit message generator. Build well-structured git commit messages with type, scope, description, body, and footer fields. Follows the Conventional Commits spec.">
<meta name="keywords" content="commit message generator, conventional commits, git commit, semantic commits, commit format, dev tools">
<meta property="og:title" content="Commit Message Generator — Conventional Commits Builder">
<meta property="og:description" content="Build well-structured git commit messages following the Conventional Commits specification.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/commitmsg.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Commit Message Generator">
<meta name="twitter:description" content="Build well-structured git commit messages following the Conventional Commits specification.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/commitmsg.html">
<link rel="stylesheet" href="toolbox.css">
</head>
<body>
<header>
  <h1>📝 Commit Message Generator</h1>
  <p>Build Conventional Commit messages — structured, clean, spec-compliant</p>
</header>
<main>
  <div class="row">
    <div class="form-group">
      <label for="type">Type *</label>
      <select id="type">
        <option value="feat">feat — A new feature</option>
        <option value="fix">fix — A bug fix</option>
        <option value="docs">docs — Documentation only</option>
        <option value="style">style — Formatting, missing semi-colons</option>
        <option value="refactor">refactor — Code restructuring</option>
        <option value="perf">perf — Performance improvement</option>
        <option value="test">test — Adding/fixing tests</option>
        <option value="build">build — Build system or dependencies</option>
        <option value="ci">ci — CI configuration</option>
        <option value="chore">chore — Maintenance tasks</option>
        <option value="revert">revert — Revert a commit</option>
      </select>
    </div>
    <div class="form-group">
      <label for="scope">Scope <span style="color:#475569">(optional)</span></label>
      <input type="text" id="scope" placeholder="e.g. auth, api, ui">
    </div>
  </div>

  <div class="form-group">
    <label for="description">Description *</label>
    <input type="text" id="description" placeholder="Short summary in imperative mood" maxlength="100">
    <div class="type-hint" id="charCount">0 / 100 characters</div>
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="breaking">
    <label for="breaking">⚠️ Breaking change</label>
  </div>

  <div class="form-group">
    <label for="body">Body <span style="color:#475569">(optional — explain what &amp; why)</span></label>
    <textarea id="body" rows="3" placeholder="Longer description of the change..."></textarea>
  </div>

  <div class="form-group">
    <label for="footer">Footer <span style="color:#475569">(optional — refs, breaking change notes)</span></label>
    <textarea id="footer" rows="2" placeholder="Closes #123&#10;BREAKING CHANGE: description"></textarea>
  </div>

  <div class="output-section">
    <h2>Generated Commit Message</h2>
    <div class="output-box" id="output"><span class="placeholder">Fill in the fields above to generate...</span></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="copyBtn" onclick="copyMessage()">📋 Copy</button>
      <button class="btn btn-secondary" onclick="copyAsCommand()">💻 Copy as git command</button>
      <button class="btn btn-secondary" onclick="saveToHistory()">💾 Save to History</button>
      <button class="btn btn-danger" onclick="clearAll()">🗑 Clear</button>
    </div>
  </div>

  <div class="history-section" id="historySection">
    <h2>Recent History</h2>
    <div id="historyList"><span class="empty-history">No saved messages yet.</span></div>
  </div>
</main>

<div class="copied-toast" id="toast">Copied!</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
  &nbsp;·&nbsp; Follows the <a href="https://www.conventionalcommits.org/" target="_blank" rel="noopener">Conventional Commits</a> spec
</footer>

<script>
const typeEl=document.getElementById('type'),scopeEl=document.getElementById('scope'),descEl=document.getElementById('description'),breakingEl=document.getElementById('breaking'),bodyEl=document.getElementById('body'),footerEl=document.getElementById('footer'),outputEl=document.getElementById('output'),charCountEl=document.getElementById('charCount'),toast=document.getElementById('toast');

function buildMessage(){
  const t=typeEl.value,s=scopeEl.value.trim(),d=descEl.value.trim(),br=breakingEl.checked,b=bodyEl.value.trim(),f=footerEl.value.trim();
  if(!d){outputEl.innerHTML='<span class="placeholder">Fill in the fields above to generate...</span>';return '';}
  let header=t;
  if(s)header+=`(${s})`;
  if(br)header+='!';
  header+=': '+d;
  let msg=header;
  if(b)msg+='\n\n'+b;
  if(f)msg+='\n\n'+f;
  outputEl.textContent=msg;
  return msg;
}

function updateCharCount(){
  const len=descEl.value.length;
  charCountEl.textContent=len+' / 100 characters';
  charCountEl.style.color=len>72?'#f87171':len>50?'#fbbf24':'#64748b';
}

[typeEl,scopeEl,descEl,breakingEl,bodyEl,footerEl].forEach(el=>{
  el.addEventListener(el.type==='checkbox'?'change':'input',()=>{buildMessage();if(el===descEl)updateCharCount();});
});

function showToast(text){
  toast.textContent=text||'Copied!';
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1500);
}

function copyMessage(){
  const msg=buildMessage();
  if(!msg)return;
  navigator.clipboard.writeText(msg).then(()=>showToast('Copied!'));
}

function copyAsCommand(){
  const msg=buildMessage();
  if(!msg)return;
  const escaped=msg.replace(/'/g,"'\\''");
  const cmd=msg.includes('\n')?`git commit -m $'${escaped.replace(/\n/g,"\\n")}'`:`git commit -m '${escaped}'`;
  navigator.clipboard.writeText(cmd).then(()=>showToast('Git command copied!'));
}

function clearAll(){
  scopeEl.value='';descEl.value='';breakingEl.checked=false;bodyEl.value='';footerEl.value='';typeEl.selectedIndex=0;
  buildMessage();updateCharCount();
}

// History (localStorage)
const HISTORY_KEY='commitmsg_history';
function getHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[];}catch{return[];}}
function setHistory(h){localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,20)));}

function saveToHistory(){
  const msg=buildMessage();
  if(!msg)return;
  const h=getHistory();
  if(h[0]===msg)return showToast('Already saved!');
  h.unshift(msg);
  setHistory(h);
  renderHistory();
  showToast('Saved!');
}

function renderHistory(){
  const h=getHistory(),list=document.getElementById('historyList');
  if(!h.length){list.innerHTML='<span class="empty-history">No saved messages yet.</span>';return;}
  list.innerHTML=h.map((m,i)=>`<div class="history-item" onclick="loadFromHistory(${i})"><span class="msg">${escHtml(m.split('\n')[0])}</span><span class="remove" onclick="event.stopPropagation();removeHistory(${i})">&times;</span></div>`).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function loadFromHistory(i){
  const h=getHistory(),msg=h[i];if(!msg)return;
  // Parse first line
  const lines=msg.split('\n');
  const headerMatch=lines[0].match(/^(\w+)(\(([^)]*)\))?(!)?:\s*(.*)$/);
  if(headerMatch){
    typeEl.value=headerMatch[1]||'feat';
    scopeEl.value=headerMatch[3]||'';
    breakingEl.checked=!!headerMatch[4];
    descEl.value=headerMatch[5]||'';
  }
  // Body & footer: split by double newline
  const rest=lines.slice(1).join('\n').replace(/^\n+/,'');
  const parts=rest.split(/\n\n/);
  if(parts.length>=2){bodyEl.value=parts[0];footerEl.value=parts.slice(1).join('\n\n');}
  else if(parts[0]){bodyEl.value=parts[0];footerEl.value='';}
  else{bodyEl.value='';footerEl.value='';}
  buildMessage();updateCharCount();
  showToast('Loaded!');
}

function removeHistory(i){
  const h=getHistory();h.splice(i,1);setHistory(h);renderHistory();
}

renderHistory();
</script>
</body>
</html>
