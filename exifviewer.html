<script>
// Minimal EXIF parser — supports JPEG EXIF (TIFF IFDs), basic PNG text chunks
const BYTE_ORDER_LE = 0x4949, BYTE_ORDER_BE = 0x4D4D;

const TAG_NAMES = {
    // IFD0 / Image
    0x010E:'ImageDescription',0x010F:'Make',0x0110:'Model',0x0112:'Orientation',
    0x011A:'XResolution',0x011B:'YResolution',0x0128:'ResolutionUnit',
    0x0131:'Software',0x0132:'DateTime',0x013B:'Artist',0x0213:'YCbCrPositioning',
    0x8298:'Copyright',0x8769:'ExifIFDPointer',0x8825:'GPSInfoIFDPointer',
    // Exif
    0x829A:'ExposureTime',0x829D:'FNumber',0x8822:'ExposureProgram',
    0x8827:'ISOSpeedRatings',0x9000:'ExifVersion',0x9003:'DateTimeOriginal',
    0x9004:'DateTimeDigitized',0x9101:'ComponentsConfiguration',
    0x9102:'CompressedBitsPerPixel',0x9201:'ShutterSpeedValue',0x9202:'ApertureValue',
    0x9203:'BrightnessValue',0x9204:'ExposureBiasValue',0x9205:'MaxApertureValue',
    0x9206:'SubjectDistance',0x9207:'MeteringMode',0x9208:'LightSource',
    0x9209:'Flash',0x920A:'FocalLength',0x927C:'MakerNote',0x9286:'UserComment',
    0xA000:'FlashpixVersion',0xA001:'ColorSpace',0xA002:'PixelXDimension',
    0xA003:'PixelYDimension',0xA005:'InteroperabilityIFDPointer',
    0xA20E:'FocalPlaneXResolution',0xA20F:'FocalPlaneYResolution',
    0xA210:'FocalPlaneResolutionUnit',0xA217:'SensingMethod',0xA300:'FileSource',
    0xA301:'SceneType',0xA302:'CFAPattern',0xA401:'CustomRendered',
    0xA402:'ExposureMode',0xA403:'WhiteBalance',0xA404:'DigitalZoomRatio',
    0xA405:'FocalLengthIn35mmFilm',0xA406:'SceneCaptureType',0xA407:'GainControl',
    0xA408:'Contrast',0xA409:'Saturation',0xA40A:'Sharpness',
    0xA40C:'SubjectDistanceRange',0xA420:'ImageUniqueID',
    0xA431:'BodySerialNumber',0xA432:'LensSpecification',0xA433:'LensMake',
    0xA434:'LensModel',0xA435:'LensSerialNumber',
    // GPS
    0x0000:'GPSVersionID',0x0001:'GPSLatitudeRef',0x0002:'GPSLatitude',
    0x0003:'GPSLongitudeRef',0x0004:'GPSLongitude',0x0005:'GPSAltitudeRef',
    0x0006:'GPSAltitude',0x0007:'GPSTimeStamp',0x0008:'GPSSatellites',
    0x0009:'GPSStatus',0x000A:'GPSMeasureMode',0x000B:'GPSDOP',
    0x000C:'GPSSpeedRef',0x000D:'GPSSpeed',0x000E:'GPSTrackRef',
    0x000F:'GPSTrack',0x0010:'GPSImgDirectionRef',0x0011:'GPSImgDirection',
    0x0012:'GPSMapDatum',0x0013:'GPSDestLatitudeRef',0x0014:'GPSDestLatitude',
    0x0015:'GPSDestLongitudeRef',0x0016:'GPSDestLongitude',0x001D:'GPSDateStamp'
};

const GPS_TAG_NAMES = {
    0x0000:'GPSVersionID',0x0001:'GPSLatitudeRef',0x0002:'GPSLatitude',
    0x0003:'GPSLongitudeRef',0x0004:'GPSLongitude',0x0005:'GPSAltitudeRef',
    0x0006:'GPSAltitude',0x0007:'GPSTimeStamp',0x0008:'GPSSatellites',
    0x0009:'GPSStatus',0x000A:'GPSMeasureMode',0x000B:'GPSDOP',
    0x000C:'GPSSpeedRef',0x000D:'GPSSpeed',0x000E:'GPSTrackRef',
    0x000F:'GPSTrack',0x0010:'GPSImgDirectionRef',0x0011:'GPSImgDirection',
    0x0012:'GPSMapDatum',0x0013:'GPSDestLatitudeRef',0x0014:'GPSDestLatitude',
    0x0015:'GPSDestLongitudeRef',0x0016:'GPSDestLongitude',0x001D:'GPSDateStamp'
};

let currentMeta = null, currentFile = null;

class DataReader {
    constructor(buf) { this.view = new DataView(buf); this.le = true; }
    setLE(le) { this.le = le; }
    u8(o) { return this.view.getUint8(o); }
    u16(o) { return this.view.getUint16(o, this.le); }
    u32(o) { return this.view.getUint32(o, this.le); }
    i32(o) { return this.view.getInt32(o, this.le); }
    str(o, len) {
        let s = '';
        for (let i = 0; i < len; i++) { const c = this.u8(o + i); if (c === 0) break; s += String.fromCharCode(c); }
        return s.trim();
    }
    rational(o) { const n = this.u32(o), d = this.u32(o + 4); return d ? n / d : 0; }
    srational(o) { const n = this.i32(o), d = this.i32(o + 4); return d ? n / d : 0; }
    rationalStr(o) { return `${this.u32(o)}/${this.u32(o+4)}`; }
}

function readIFD(reader, offset, tiffStart, tagMap) {
    const tags = {};
    const count = reader.u16(offset);
    for (let i = 0; i < count; i++) {
        const entryOff = offset + 2 + i * 12;
        const tag = reader.u16(entryOff);
        const type = reader.u16(entryOff + 2);
        const num = reader.u32(entryOff + 4);
        const valOff = entryOff + 8;
        const sizes = [0,1,1,2,4,8,1,1,2,4,8,4,8];
        const totalBytes = num * (sizes[type] || 0);
        const dataOff = totalBytes > 4 ? tiffStart + reader.u32(valOff) : valOff;
        const name = (tagMap || TAG_NAMES)[tag] || `Tag_0x${tag.toString(16).padStart(4,'0')}`;
        let val;
        try {
            switch(type) {
                case 1: val = num === 1 ? reader.u8(dataOff) : Array.from({length:num},(_,j)=>reader.u8(dataOff+j)); break;
                case 2: val = reader.str(dataOff, num); break;
                case 3: val = num === 1 ? reader.u16(dataOff) : Array.from({length:num},(_,j)=>reader.u16(dataOff+j*2)); break;
                case 4: val = num === 1 ? reader.u32(dataOff) : Array.from({length:num},(_,j)=>reader.u32(dataOff+j*4)); break;
                case 5: val = num === 1 ? reader.rational(dataOff) : Array.from({length:num},(_,j)=>reader.rational(dataOff+j*8)); break;
                case 7: val = Array.from({length:Math.min(num,64)},(_,j)=>reader.u8(dataOff+j)); break;
                case 9: val = num === 1 ? reader.i32(dataOff) : Array.from({length:num},(_,j)=>reader.i32(dataOff+j*4)); break;
                case 10: val = num === 1 ? reader.srational(dataOff) : Array.from({length:num},(_,j)=>reader.srational(dataOff+j*8)); break;
                default: val = `[${type}] ${num} values`;
            }
        } catch(e) { val = '(unreadable)'; }
        tags[name] = val;
        tags['_raw_' + tag.toString(16)] = { tag, type, num, val, name };
    }
    return tags;
}

function parseExif(buf) {
    const reader = new DataReader(buf);
    const result = { file: {}, image: {}, exif: {}, gps: {}, thumbnail: {} };

    // Find EXIF in JPEG
    if (reader.u8(0) === 0xFF && reader.u8(1) === 0xD8) {
        let off = 2;
        while (off < buf.byteLength - 1) {
            if (reader.u8(off) !== 0xFF) break;
            const marker = reader.u8(off + 1);
            if (marker === 0xDA) break; // SOS
            const segLen = reader.u16(off + 2);
            reader.setLE(false); // segment length is always big-endian
            const len = reader.view.getUint16(off + 2);
            if (marker === 0xE1) { // APP1
                const exifStr = reader.str(off + 4, 4);
                if (exifStr === 'Exif') {
                    const tiffStart = off + 10;
                    const bo = reader.view.getUint16(tiffStart);
                    reader.setLE(bo === BYTE_ORDER_LE);
                    const ifdOff = reader.u32(tiffStart + 4);
                    // IFD0
                    const ifd0 = readIFD(reader, tiffStart + ifdOff, tiffStart, TAG_NAMES);
                    Object.assign(result.image, ifd0);
                    // EXIF sub-IFD
                    if (ifd0.ExifIFDPointer) {
                        const exifTags = readIFD(reader, tiffStart + ifd0.ExifIFDPointer, tiffStart, TAG_NAMES);
                        Object.assign(result.exif, exifTags);
                    }
                    // GPS sub-IFD
                    if (ifd0.GPSInfoIFDPointer) {
                        const gpsTags = readIFD(reader, tiffStart + ifd0.GPSInfoIFDPointer, tiffStart, GPS_TAG_NAMES);
                        Object.assign(result.gps, gpsTags);
                    }
                    // IFD1 (thumbnail)
                    const ifd0Count = reader.u16(tiffStart + ifdOff);
                    const nextIFDOff = reader.u32(tiffStart + ifdOff + 2 + ifd0Count * 12);
                    if (nextIFDOff) {
                        try {
                            const ifd1 = readIFD(reader, tiffStart + nextIFDOff, tiffStart, TAG_NAMES);
                            Object.assign(result.thumbnail, ifd1);
                        } catch(e) {}
                    }
                }
            }
            off += 2 + len;
        }
    }
    return result;
}

function gpsToDecimal(arr, ref) {
    if (!Array.isArray(arr) || arr.length < 3) return null;
    let dec = arr[0] + arr[1]/60 + arr[2]/3600;
    if (ref === 'S' || ref === 'W') dec = -dec;
    return Math.round(dec * 1000000) / 1000000;
}

function formatExposure(val) {
    if (!val || val === '(unreadable)') return val;
    if (val < 1) return `1/${Math.round(1/val)}s`;
    return `${val}s`;
}

function formatVal(key, val) {
    if (val === undefined || val === null) return '';
    if (Array.isArray(val)) {
        if (val.length <= 8) return val.join(', ');
        return val.slice(0,8).join(', ') + `… (${val.length} items)`;
    }
    return String(val);
}

// Drop zone handling
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
    currentFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        const buf = e.target.result;
        const meta = parseExif(buf);
        // Add file info
        meta.file = {
            FileName: file.name,
            FileSize: formatSize(file.size),
            FileType: file.type || 'unknown',
            LastModified: new Date(file.lastModified).toLocaleString()
        };
        // Get image dimensions
        const img = new Image();
        const blob = new Blob([buf], {type: file.type});
        img.onload = () => {
            meta.file.ImageWidth = img.naturalWidth + 'px';
            meta.file.ImageHeight = img.naturalHeight + 'px';
            meta.file.AspectRatio = simplifyRatio(img.naturalWidth, img.naturalHeight);
            currentMeta = meta;
            renderResults(meta, URL.createObjectURL(blob));
        };
        img.src = URL.createObjectURL(blob);
    };
    reader.readAsArrayBuffer(file);
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(2) + ' MB';
}

function gcd(a,b) { return b ? gcd(b, a%b) : a; }
function simplifyRatio(w,h) { const d = gcd(w,h); return `${w/d}:${h/d}`; }

function renderResults(meta, imgSrc) {
    document.getElementById('results').style.display = 'block';
    document.getElementById('previewImg').src = imgSrc;

    // Quick info cards
    const qi = document.getElementById('quickInfo');
    let cards = '';
    const cam = [meta.image.Make, meta.image.Model].filter(Boolean).join(' ');
    if (cam) cards += quickCard('Camera', cam);
    const lens = meta.exif.LensModel || meta.exif.LensMake || '';
    if (lens) cards += quickCard('Lens', formatVal('', lens));
    const date = meta.exif.DateTimeOriginal || meta.image.DateTime || '';
    if (date) cards += quickCard('Date Taken', date);
    const settings = [];
    if (meta.exif.ExposureTime) settings.push(formatExposure(meta.exif.ExposureTime));
    if (meta.exif.FNumber) settings.push(`f/${meta.exif.FNumber}`);
    if (meta.exif.ISOSpeedRatings) settings.push(`ISO ${meta.exif.ISOSpeedRatings}`);
    if (meta.exif.FocalLength) settings.push(`${meta.exif.FocalLength}mm`);
    if (settings.length) cards += quickCard('Settings', settings.join('  •  '));
    cards += quickCard('Dimensions', `${meta.file.ImageWidth} × ${meta.file.ImageHeight}`, `${meta.file.FileSize} • ${meta.file.AspectRatio}`);

    // GPS
    const lat = gpsToDecimal(meta.gps.GPSLatitude, meta.gps.GPSLatitudeRef);
    const lon = gpsToDecimal(meta.gps.GPSLongitude, meta.gps.GPSLongitudeRef);
    if (lat !== null && lon !== null) {
        cards += `<div class="quick-card"><h3>📍 Location</h3><div class="val"><a class="gps-link" href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" rel="noopener">${lat}, ${lon}</a></div><iframe class="map-frame" src="https://www.openstreetmap.org/export/embed.html?bbox=${lon-0.01},${lat-0.01},${lon+0.01},${lat+0.01}&marker=${lat},${lon}&layer=mapnik" loading="lazy"></iframe></div>`;
    }
    if (!cards) cards = quickCard('Info', meta.file.FileName, `${meta.file.FileSize} • ${meta.file.FileType}`);
    qi.innerHTML = cards;

    // Tabs
    const sections = [];
    const cleanTags = obj => {
        const r = {};
        for (const [k,v] of Object.entries(obj)) {
            if (k.startsWith('_raw_') || k === 'ExifIFDPointer' || k === 'GPSInfoIFDPointer' || k === 'InteroperabilityIFDPointer' || k === 'MakerNote') continue;
            r[k] = v;
        }
        return r;
    };
    if (Object.keys(meta.file).length) sections.push({id:'file',label:'File',data:meta.file});
    const imgClean = cleanTags(meta.image);
    if (Object.keys(imgClean).length) sections.push({id:'image',label:'Image (IFD0)',data:imgClean});
    const exifClean = cleanTags(meta.exif);
    if (Object.keys(exifClean).length) sections.push({id:'exif',label:'EXIF',data:exifClean});
    const gpsClean = cleanTags(meta.gps);
    if (Object.keys(gpsClean).length) sections.push({id:'gps',label:'GPS',data:gpsClean});
    const thumbClean = cleanTags(meta.thumbnail);
    if (Object.keys(thumbClean).length) sections.push({id:'thumb',label:'Thumbnail',data:thumbClean});

    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = sections.map((s,i) =>
        `<button class="tab-btn${i===0?' active':''}" onclick="showTab('${s.id}')">${s.label} <span style="opacity:.5">(${Object.keys(s.data).length})</span></button>`
    ).join('');

    // Store for tab switching
    window._sections = sections;
    if (sections.length) showTab(sections[0].id);
}

function quickCard(title, value, sub) {
    return `<div class="quick-card"><h3>${title}</h3><div class="val">${value}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
}

function showTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(id) || b.onclick.toString().includes(`'${id}'`)));
    // More reliable active toggle
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('active');
        if (b.getAttribute('onclick')?.includes(`'${id}'`)) b.classList.add('active');
    });
    const sec = window._sections.find(s => s.id === id);
    if (!sec) return;
    const rows = Object.entries(sec.data).map(([k,v]) =>
        `<tr><th>${k}</th><td>${formatVal(k,v)}</td></tr>`
    ).join('');
    document.getElementById('tabContent').innerHTML = rows
        ? `<table class="meta-table">${rows}</table>`
        : `<div class="no-data">No metadata found in this section</div>`;
}

function getAllFlat() {
    if (!currentMeta) return {};
    const flat = {};
    for (const sec of ['file','image','exif','gps','thumbnail']) {
        for (const [k,v] of Object.entries(currentMeta[sec] || {})) {
            if (k.startsWith('_raw_') || k === 'MakerNote') continue;
            flat[k] = v;
        }
    }
    return flat;
}

function exportJSON() {
    const json = JSON.stringify(getAllFlat(), null, 2);
    download(json, 'exif-data.json', 'application/json');
}

function exportCSV() {
    const flat = getAllFlat();
    const rows = [['Key','Value']];
    for (const [k,v] of Object.entries(flat)) rows.push([k, String(Array.isArray(v) ? v.join('; ') : v)]);
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    download(csv, 'exif-data.csv', 'text/csv');
}

function copyAll() {
    const flat = getAllFlat();
    const text = Object.entries(flat).map(([k,v]) => `${k}: ${Array.isArray(v)?v.join(', '):v}`).join('\n');
    navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
    });
}

function stripExif() {
    if (!currentFile) return;
    const canvas = document.createElement('canvas');
    const img = document.getElementById('previewImg');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    canvas.toBlob(blob => {
        const name = currentFile.name.replace(/(\.[^.]+)$/, '-no-exif$1');
        download(URL.createObjectURL(blob), name, blob.type, true);
    }, currentFile.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.95);
}

function download(content, name, type, isUrl) {
    const a = document.createElement('a');
    a.href = isUrl ? content : URL.createObjectURL(new Blob([content], {type}));
    a.download = name;
    a.click();
}
</script>
</body>
</html>
