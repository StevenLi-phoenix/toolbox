<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Cursor Gallery - Free Online Tool</title>
<meta name="description" content="Preview all CSS cursor types in one place. Hover to see each cursor in action, click to copy the CSS. 100% client-side.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/csscursors.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .cursor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .75rem; margin: 1.5rem 0; }
  .cursor-card {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 1.25rem .75rem; border: 2px solid var(--border); border-radius: var(--radius);
    background: var(--surface); transition: all .15s; text-align: center; min-height: 100px;
  }
  .cursor-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); }
  .cursor-card.copied { border-color: var(--success); }
  .cursor-name { font-family: var(--mono); font-size: .85rem; font-weight: 600; margin-bottom: .25rem; }
  .cursor-css { font-family: var(--mono); font-size: .7rem; color: var(--muted); word-break: break-all; }
  .cursor-hint { font-size: .7rem; color: var(--muted); margin-top: .35rem; }
  .category-label {
    font-size: .85rem; font-weight: 600; color: var(--muted); text-transform: uppercase;
    margin-top: 1.5rem; margin-bottom: .5rem; padding-bottom: .35rem; border-bottom: 1px solid var(--border);
    letter-spacing: .04em;
  }
  .test-area {
    border: 2px dashed var(--border); border-radius: var(--radius); padding: 2rem;
    text-align: center; margin: 1.5rem 0; min-height: 120px;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: .5rem;
  }
  .test-area code { font-family: var(--mono); font-size: 1rem; font-weight: 600; }
  .test-area .hint { font-size: .8rem; color: var(--muted); }
  .search-box {
    width: 100%; padding: .6rem .75rem; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-family: var(--sans); font-size: .9rem;
    margin-bottom: 1rem;
  }
  @media (max-width: 768px) {
    .cursor-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>CSS Cursor Gallery</h1>
<p class="subtitle">Preview every CSS cursor value. Hover each card to see the cursor in action, click to copy the CSS property. Use the test area to try any cursor.</p>

<div class="card" style="margin-bottom:1.5rem">
  <label style="display:block;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:.3rem">Test Area</label>
  <div class="test-area" id="testArea">
    <code id="testCursorName">default</code>
    <span class="hint">Click any cursor card below to test it here</span>
  </div>
</div>

<input type="text" class="search-box" id="search" placeholder="Search cursors..." autocomplete="off">

<div id="gallery"></div>

<footer>Built with ☕ by Steven Li · No data leaves your browser</footer>
</div>

<script>
const CURSORS = {
  General: [
    { name: 'auto', desc: 'Browser determines cursor' },
    { name: 'default', desc: 'Platform default (arrow)' },
    { name: 'none', desc: 'No cursor displayed' },
  ],
  'Links & Status': [
    { name: 'context-menu', desc: 'Context menu available' },
    { name: 'help', desc: 'Help information available' },
    { name: 'pointer', desc: 'Link / clickable element' },
    { name: 'progress', desc: 'Program busy, still interactive' },
    { name: 'wait', desc: 'Program busy, not interactive' },
  ],
  Selection: [
    { name: 'cell', desc: 'Table cell selection' },
    { name: 'crosshair', desc: 'Crosshair / precise selection' },
    { name: 'text', desc: 'Text can be selected' },
    { name: 'vertical-text', desc: 'Vertical text selection' },
  ],
  'Drag & Drop': [
    { name: 'alias', desc: 'Alias / shortcut to create' },
    { name: 'copy', desc: 'Something to be copied' },
    { name: 'move', desc: 'Something to be moved' },
    { name: 'no-drop', desc: 'Drop not allowed here' },
    { name: 'not-allowed', desc: 'Action not allowed' },
    { name: 'grab', desc: 'Something can be grabbed' },
    { name: 'grabbing', desc: 'Something is being grabbed' },
  ],
  Resizing: [
    { name: 'col-resize', desc: 'Column resize' },
    { name: 'row-resize', desc: 'Row resize' },
    { name: 'n-resize', desc: 'Resize north (up)' },
    { name: 's-resize', desc: 'Resize south (down)' },
    { name: 'e-resize', desc: 'Resize east (right)' },
    { name: 'w-resize', desc: 'Resize west (left)' },
    { name: 'ne-resize', desc: 'Resize north-east' },
    { name: 'nw-resize', desc: 'Resize north-west' },
    { name: 'se-resize', desc: 'Resize south-east' },
    { name: 'sw-resize', desc: 'Resize south-west' },
    { name: 'ew-resize', desc: 'Horizontal resize' },
    { name: 'ns-resize', desc: 'Vertical resize' },
    { name: 'nesw-resize', desc: 'Diagonal resize (NE-SW)' },
    { name: 'nwse-resize', desc: 'Diagonal resize (NW-SE)' },
  ],
  Zoom: [
    { name: 'zoom-in', desc: 'Zoom in (magnify)' },
    { name: 'zoom-out', desc: 'Zoom out (reduce)' },
  ],
};

const gallery = document.getElementById('gallery');

function render(filter = '') {
  gallery.innerHTML = '';
  const q = filter.toLowerCase();
  let anyVisible = false;

  Object.entries(CURSORS).forEach(([category, cursors]) => {
    const filtered = cursors.filter(c =>
      c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || category.toLowerCase().includes(q)
    );
    if (!filtered.length) return;
    anyVisible = true;

    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = category;
    gallery.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'cursor-grid';

    filtered.forEach(c => {
      const card = document.createElement('div');
      card.className = 'cursor-card';
      card.style.cursor = c.name;
      card.innerHTML = `
        <div class="cursor-name">${c.name}</div>
        <div class="cursor-css">cursor: ${c.name};</div>
        <div class="cursor-hint">${c.desc}</div>
      `;
      card.addEventListener('click', () => {
        const css = `cursor: ${c.name};`;
        navigator.clipboard.writeText(css).then(() => {
          card.classList.add('copied');
          setTimeout(() => card.classList.remove('copied'), 600);
        });
        document.getElementById('testArea').style.cursor = c.name;
        document.getElementById('testCursorName').textContent = c.name;
      });
      grid.appendChild(card);
    });

    gallery.appendChild(grid);
  });

  if (!anyVisible) {
    gallery.innerHTML = '<p style="text-align:center;color:var(--muted);padding:2rem">No cursors match your search.</p>';
  }
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));
render();
</script>
</body>
</html>
