<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenSSL Command Builder — Free Online Tool</title>
<meta name="description" content="Build common OpenSSL commands for keys, CSRs, self-signed certificates, PKCS#12 bundles, conversions, and hash/HMAC operations. Copy ready-to-run commands.">
<meta name="keywords" content="openssl, command builder, CSR, certificate, self-signed, PKCS12, PEM, DER, hash">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/opensslcmd.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-top: 14px; flex-wrap: wrap; }
  .tab { padding: 8px 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font-size: .85rem; font-family: var(--sans); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }
  .tab:hover { color: var(--text); }
  .tab-panel { display: none; padding: 16px 0; }
  .tab-panel.active { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  input[type="text"], input[type="number"], select, textarea {
    padding: 8px 10px; font-family: var(--mono); font-size: .85rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text);
  }
  .output-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; font-family: var(--mono); font-size: .85rem; color: var(--text);
    white-space: pre-wrap; word-break: break-word; margin-top: 14px; line-height: 1.55;
  }
  .hint { font-size: .78rem; color: var(--muted); margin-top: 6px; }
  .out-head { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .out-head h3 { font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin: 0; }
  @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>🔐 OpenSSL Command Builder</h1>
<p class="subtitle">Generate ready-to-run OpenSSL commands for keys, CSRs, self-signed certs, PKCS#12 bundles, format conversion, and hashing. Fill in the form, copy the command.</p>

<div class="tabs" id="tabs">
  <button class="tab active" data-panel="key">Private Key</button>
  <button class="tab" data-panel="csr">CSR</button>
  <button class="tab" data-panel="selfsign">Self-signed Cert</button>
  <button class="tab" data-panel="inspect">Inspect</button>
  <button class="tab" data-panel="convert">Convert</button>
  <button class="tab" data-panel="p12">PKCS#12</button>
  <button class="tab" data-panel="hash">Hash / HMAC</button>
</div>

<!-- PRIVATE KEY -->
<div class="tab-panel active" data-panel="key">
  <div class="form-grid">
    <div class="field">
      <label>Algorithm</label>
      <select id="key-alg"><option value="rsa">RSA</option><option value="ec">ECDSA</option><option value="ed25519">Ed25519</option></select>
    </div>
    <div class="field" id="key-bits-wrap">
      <label>RSA key size</label>
      <select id="key-bits"><option>2048</option><option selected>3072</option><option>4096</option></select>
    </div>
    <div class="field" id="key-curve-wrap" style="display:none">
      <label>EC curve</label>
      <select id="key-curve"><option>prime256v1</option><option>secp384r1</option><option>secp521r1</option></select>
    </div>
    <div class="field">
      <label>Output file</label>
      <input type="text" id="key-out" value="private.key">
    </div>
    <div class="field full">
      <label><input type="checkbox" id="key-encrypt"> Encrypt with passphrase (AES-256)</label>
    </div>
  </div>
</div>

<!-- CSR -->
<div class="tab-panel" data-panel="csr">
  <div class="form-grid">
    <div class="field"><label>Private key file</label><input type="text" id="csr-key" value="private.key"></div>
    <div class="field"><label>Output CSR file</label><input type="text" id="csr-out" value="request.csr"></div>
    <div class="field"><label>Country (C)</label><input type="text" id="csr-c" value="US"></div>
    <div class="field"><label>State (ST)</label><input type="text" id="csr-st" value="California"></div>
    <div class="field"><label>Locality (L)</label><input type="text" id="csr-l" value="San Francisco"></div>
    <div class="field"><label>Organization (O)</label><input type="text" id="csr-o" value="Example Inc"></div>
    <div class="field"><label>Org Unit (OU)</label><input type="text" id="csr-ou" value="IT"></div>
    <div class="field"><label>Common Name (CN)</label><input type="text" id="csr-cn" value="example.com"></div>
    <div class="field full"><label>Subject Alt Names (comma-separated)</label><input type="text" id="csr-san" value="example.com,www.example.com"></div>
  </div>
</div>

<!-- SELF-SIGNED -->
<div class="tab-panel" data-panel="selfsign">
  <div class="form-grid">
    <div class="field"><label>Key file</label><input type="text" id="ss-key" value="private.key"></div>
    <div class="field"><label>Output cert file</label><input type="text" id="ss-out" value="cert.pem"></div>
    <div class="field"><label>Common Name (CN)</label><input type="text" id="ss-cn" value="localhost"></div>
    <div class="field"><label>Validity (days)</label><input type="number" id="ss-days" value="365"></div>
    <div class="field full"><label>Subject Alt Names (comma-separated)</label><input type="text" id="ss-san" value="localhost,127.0.0.1"></div>
    <div class="field full"><label><input type="checkbox" id="ss-newkey" checked> Generate new key + cert together (single command)</label></div>
  </div>
</div>

<!-- INSPECT -->
<div class="tab-panel" data-panel="inspect">
  <div class="form-grid">
    <div class="field">
      <label>Target type</label>
      <select id="ins-type"><option value="cert">Certificate (x509)</option><option value="csr">CSR (req)</option><option value="key-rsa">RSA Private Key</option><option value="key-ec">EC Private Key</option><option value="pubkey">Public Key</option><option value="p12">PKCS#12</option></select>
    </div>
    <div class="field"><label>Input file</label><input type="text" id="ins-in" value="cert.pem"></div>
  </div>
</div>

<!-- CONVERT -->
<div class="tab-panel" data-panel="convert">
  <div class="form-grid">
    <div class="field"><label>From</label><select id="cv-from"><option>PEM cert</option><option>DER cert</option><option>PEM key (RSA)</option><option>DER key (RSA)</option><option>PKCS#12 (.p12)</option></select></div>
    <div class="field"><label>To</label><select id="cv-to"><option>PEM cert</option><option>DER cert</option><option>PEM key (RSA)</option><option>DER key (RSA)</option><option>PEM cert + key from P12</option></select></div>
    <div class="field"><label>Input file</label><input type="text" id="cv-in" value="input"></div>
    <div class="field"><label>Output file</label><input type="text" id="cv-out" value="output"></div>
  </div>
</div>

<!-- P12 -->
<div class="tab-panel" data-panel="p12">
  <div class="form-grid">
    <div class="field"><label>Certificate file</label><input type="text" id="p12-cert" value="cert.pem"></div>
    <div class="field"><label>Key file</label><input type="text" id="p12-key" value="private.key"></div>
    <div class="field"><label>CA chain file (optional)</label><input type="text" id="p12-ca" value=""></div>
    <div class="field"><label>Friendly name</label><input type="text" id="p12-name" value="mycert"></div>
    <div class="field full"><label>Output PKCS#12 file</label><input type="text" id="p12-out" value="bundle.p12"></div>
  </div>
</div>

<!-- HASH -->
<div class="tab-panel" data-panel="hash">
  <div class="form-grid">
    <div class="field">
      <label>Algorithm</label>
      <select id="hash-alg"><option>sha256</option><option>sha384</option><option>sha512</option><option>sha1</option><option>md5</option><option>blake2b512</option></select>
    </div>
    <div class="field">
      <label>Mode</label>
      <select id="hash-mode"><option value="dgst">Digest</option><option value="hmac">HMAC</option><option value="b64">Random base64</option><option value="hex">Random hex</option></select>
    </div>
    <div class="field" id="hash-file-wrap"><label>Input file</label><input type="text" id="hash-in" value="file.bin"></div>
    <div class="field" id="hash-key-wrap" style="display:none"><label>HMAC key</label><input type="text" id="hash-key" value="secret"></div>
    <div class="field" id="hash-len-wrap" style="display:none"><label>Bytes</label><input type="number" id="hash-len" value="32"></div>
  </div>
</div>

<div class="out-head">
  <h3>Generated command</h3>
  <button class="btn btn-secondary" id="copy">Copy</button>
</div>
<pre id="output" class="output-box"></pre>
<div class="hint" id="note"></div>

</div>

<footer>
  Built with ☕ by Steven Li · No data leaves your browser
</footer>

<script>
const $ = (id) => document.getElementById(id);
const tabs = document.querySelectorAll('.tab');
const panels = document.querySelectorAll('.tab-panel');
let currentPanel = 'key';

tabs.forEach(t => t.addEventListener('click', () => {
  tabs.forEach(x => x.classList.remove('active'));
  panels.forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  currentPanel = t.dataset.panel;
  document.querySelector('.tab-panel[data-panel="' + currentPanel + '"]').classList.add('active');
  build();
}));

function q(s) {
  if (s === '' || s == null) return '""';
  if (/^[A-Za-z0-9_\-./:=,@]+$/.test(s)) return s;
  return "'" + String(s).replace(/'/g, "'\\''") + "'";
}

function buildKey() {
  const alg = $('key-alg').value;
  const out = $('key-out').value || 'private.key';
  const enc = $('key-encrypt').checked ? ' -aes256' : '';
  if (alg === 'rsa') {
    const bits = $('key-bits').value;
    return `openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:${bits}${enc} -out ${q(out)}`;
  } else if (alg === 'ec') {
    const c = $('key-curve').value;
    return `openssl genpkey -algorithm EC -pkeyopt ec_paramgen_curve:${c}${enc} -out ${q(out)}`;
  } else {
    return `openssl genpkey -algorithm ED25519${enc} -out ${q(out)}`;
  }
}

$('key-alg').addEventListener('change', () => {
  const v = $('key-alg').value;
  $('key-bits-wrap').style.display = v === 'rsa' ? '' : 'none';
  $('key-curve-wrap').style.display = v === 'ec' ? '' : 'none';
  build();
});

function sanCsv(csv) {
  return csv.split(',').map(s => s.trim()).filter(Boolean).map((s, i) => {
    const isIp = /^\d{1,3}(\.\d{1,3}){3}$|:/.test(s);
    return `${isIp ? 'IP' : 'DNS'}.${i+1} = ${s}`;
  }).join('\\n');
}

function subjectString() {
  const parts = [
    ['C', $('csr-c').value],
    ['ST', $('csr-st').value],
    ['L', $('csr-l').value],
    ['O', $('csr-o').value],
    ['OU', $('csr-ou').value],
    ['CN', $('csr-cn').value],
  ].filter(([k, v]) => v);
  return '/' + parts.map(([k, v]) => `${k}=${v.replace(/\//g, '\\/')}`).join('/');
}

function buildCsr() {
  const key = $('csr-key').value;
  const out = $('csr-out').value;
  const san = $('csr-san').value.trim();
  const subj = subjectString();
  if (san) {
    const names = san.split(',').map(s => s.trim()).filter(Boolean);
    const sanStr = names.map(n => (/^\d{1,3}(\.\d{1,3}){3}$|:/.test(n) ? 'IP:' : 'DNS:') + n).join(',');
    return `openssl req -new -key ${q(key)} -out ${q(out)} \\\n  -subj ${q(subj)} \\\n  -addext ${q('subjectAltName=' + sanStr)}`;
  }
  return `openssl req -new -key ${q(key)} -out ${q(out)} -subj ${q(subj)}`;
}

function buildSelfSign() {
  const key = $('ss-key').value;
  const out = $('ss-out').value;
  const cn = $('ss-cn').value;
  const days = $('ss-days').value;
  const san = $('ss-san').value.trim();
  const subj = '/CN=' + cn;
  const sanNames = san.split(',').map(s => s.trim()).filter(Boolean);
  const sanStr = sanNames.map(n => (/^\d{1,3}(\.\d{1,3}){3}$|:/.test(n) ? 'IP:' : 'DNS:') + n).join(',');
  if ($('ss-newkey').checked) {
    let cmd = `openssl req -x509 -newkey rsa:3072 -nodes -keyout ${q(key)} -out ${q(out)} -days ${days} -subj ${q(subj)}`;
    if (sanStr) cmd += ` \\\n  -addext ${q('subjectAltName=' + sanStr)}`;
    return cmd;
  } else {
    let cmd = `openssl req -x509 -key ${q(key)} -out ${q(out)} -days ${days} -subj ${q(subj)}`;
    if (sanStr) cmd += ` \\\n  -addext ${q('subjectAltName=' + sanStr)}`;
    return cmd;
  }
}

function buildInspect() {
  const t = $('ins-type').value;
  const f = $('ins-in').value;
  switch (t) {
    case 'cert': return `openssl x509 -in ${q(f)} -noout -text`;
    case 'csr': return `openssl req -in ${q(f)} -noout -text -verify`;
    case 'key-rsa': return `openssl rsa -in ${q(f)} -check -noout`;
    case 'key-ec': return `openssl ec -in ${q(f)} -check -noout`;
    case 'pubkey': return `openssl pkey -pubin -in ${q(f)} -text -noout`;
    case 'p12': return `openssl pkcs12 -info -in ${q(f)} -nodes`;
  }
  return '';
}

function buildConvert() {
  const from = $('cv-from').value;
  const to = $('cv-to').value;
  const i = $('cv-in').value;
  const o = $('cv-out').value;
  const key = from + '→' + to;
  const table = {
    'PEM cert→DER cert': `openssl x509 -in ${q(i)} -outform DER -out ${q(o)}`,
    'DER cert→PEM cert': `openssl x509 -in ${q(i)} -inform DER -out ${q(o)}`,
    'PEM key (RSA)→DER key (RSA)': `openssl rsa -in ${q(i)} -outform DER -out ${q(o)}`,
    'DER key (RSA)→PEM key (RSA)': `openssl rsa -in ${q(i)} -inform DER -out ${q(o)}`,
    'PKCS#12 (.p12)→PEM cert + key from P12': `openssl pkcs12 -in ${q(i)} -out ${q(o)} -nodes`,
  };
  return table[key] || '# Conversion not supported in this direction';
}

function buildP12() {
  const cert = $('p12-cert').value;
  const key = $('p12-key').value;
  const ca = $('p12-ca').value.trim();
  const name = $('p12-name').value;
  const out = $('p12-out').value;
  let cmd = `openssl pkcs12 -export -in ${q(cert)} -inkey ${q(key)} -out ${q(out)} -name ${q(name)}`;
  if (ca) cmd += ` -certfile ${q(ca)}`;
  return cmd;
}

$('hash-mode').addEventListener('change', () => {
  const m = $('hash-mode').value;
  $('hash-file-wrap').style.display = (m === 'dgst' || m === 'hmac') ? '' : 'none';
  $('hash-key-wrap').style.display = (m === 'hmac') ? '' : 'none';
  $('hash-len-wrap').style.display = (m === 'b64' || m === 'hex') ? '' : 'none';
  build();
});

function buildHash() {
  const alg = $('hash-alg').value;
  const mode = $('hash-mode').value;
  if (mode === 'dgst') return `openssl dgst -${alg} ${q($('hash-in').value)}`;
  if (mode === 'hmac') return `openssl dgst -${alg} -hmac ${q($('hash-key').value)} ${q($('hash-in').value)}`;
  if (mode === 'b64') return `openssl rand -base64 ${$('hash-len').value}`;
  if (mode === 'hex') return `openssl rand -hex ${$('hash-len').value}`;
  return '';
}

function build() {
  let cmd = '';
  let note = '';
  switch (currentPanel) {
    case 'key': cmd = buildKey(); if ($('key-encrypt').checked) note = 'You will be prompted for the passphrase.'; break;
    case 'csr': cmd = buildCsr(); break;
    case 'selfsign': cmd = buildSelfSign(); note = 'SANs are required by modern browsers; CN alone is not enough.'; break;
    case 'inspect': cmd = buildInspect(); break;
    case 'convert': cmd = buildConvert(); break;
    case 'p12': cmd = buildP12(); note = 'OpenSSL will prompt for the export password.'; break;
    case 'hash': cmd = buildHash(); break;
  }
  $('output').textContent = cmd;
  $('note').textContent = note;
}

// Bind all inputs
document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', build);
  el.addEventListener('change', build);
});

$('copy').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText($('output').textContent);
    const orig = $('copy').textContent;
    $('copy').textContent = 'Copied!';
    setTimeout(() => $('copy').textContent = orig, 1200);
  } catch {}
});

build();
</script>
</body>
</html>
