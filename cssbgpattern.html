<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Background Pattern Generator - Free Online Tool</title>
<meta name="description" content="Generate pure CSS background patterns using gradients — stripes, dots, checkerboard, diamonds, grid, zigzag, and more. Customize colors and size. Copy one-click.">
<meta name="keywords" content="css background pattern, css gradient pattern, repeating gradient, css stripes, polka dots css, checkerboard css, herringbone css, pattern generator">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/cssbgpattern.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .patterns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .pat-chip {
    padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: .82rem; font-weight: 500;
    transition: background .15s, border-color .15s;
  }
  .pat-chip:hover { border-color: var(--accent); }
  .pat-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .control-group label { display: block; font-size: .8rem; font-weight: 600; margin-bottom: 4px; }
  .color-row { display: flex; align-items: center; gap: 8px; }
  .color-row input[type="color"] { width: 36px; height: 30px; border: 1px solid var(--border); border-radius: var(--radius); padding: 2px; cursor: pointer; background: none; }
  .color-row input[type="text"] { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); font-size: .82rem; }
  .range-row { display: flex; align-items: center; gap: 8px; }
  .range-row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .range-val { font-size: .82rem; font-family: var(--mono); min-width: 40px; text-align: right; }
  .preview-area {
    width: 100%; min-height: 320px; border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 16px; position: relative;
  }
  .resize-hint { position: absolute; bottom: 8px; right: 12px; font-size: .72rem; color: var(--muted); pointer-events: none; opacity: .6; }
  .code-block {
    position: relative; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; font-family: var(--mono); font-size: .82rem;
    white-space: pre-wrap; word-break: break-all; line-height: 1.6; max-height: 240px; overflow-y: auto;
  }
  .copy-float {
    position: absolute; top: 8px; right: 8px; padding: 4px 10px;
    border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface);
    cursor: pointer; font-size: .78rem;
  }
  .copy-float:hover { border-color: var(--accent); }
  .presets { margin-top: 16px; }
  .presets h3 { font-size: .9rem; font-weight: 600; margin-bottom: 8px; }
  .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
  .preset-swatch {
    aspect-ratio: 1; border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; transition: box-shadow .15s;
  }
  .preset-swatch:hover { box-shadow: var(--shadow-lg); }
  @media (max-width: 768px) {
    .controls { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>CSS Background Pattern Generator</h1>
<p class="subtitle">Generate pure-CSS repeating background patterns with live preview</p>

<div class="card">
<h2>🎨 Pattern Type</h2>
<div class="patterns" id="patternPicker"></div>

<div class="controls">
  <div class="control-group">
    <label>Color 1</label>
    <div class="color-row">
      <input type="color" id="color1" value="#111111" oninput="syncColor('color1')">
      <input type="text" id="color1Text" value="#111111" oninput="syncColorText('color1')" maxlength="30">
    </div>
  </div>
  <div class="control-group">
    <label>Color 2</label>
    <div class="color-row">
      <input type="color" id="color2" value="#ffffff" oninput="syncColor('color2')">
      <input type="text" id="color2Text" value="#ffffff" oninput="syncColorText('color2')" maxlength="30">
    </div>
  </div>
  <div class="control-group">
    <label>Pattern Size</label>
    <div class="range-row">
      <input type="range" id="size" min="4" max="120" value="20" oninput="update()">
      <span class="range-val" id="sizeVal">20px</span>
    </div>
  </div>
  <div class="control-group">
    <label>Angle</label>
    <div class="range-row">
      <input type="range" id="angle" min="0" max="360" value="45" oninput="update()">
      <span class="range-val" id="angleVal">45°</span>
    </div>
  </div>
  <div class="control-group">
    <label>Opacity</label>
    <div class="range-row">
      <input type="range" id="opacity" min="5" max="100" value="100" oninput="update()">
      <span class="range-val" id="opacityVal">100%</span>
    </div>
  </div>
  <div class="control-group">
    <label>Stripe Width</label>
    <div class="range-row">
      <input type="range" id="thickness" min="1" max="50" value="10" oninput="update()">
      <span class="range-val" id="thicknessVal">10px</span>
    </div>
  </div>
</div>
</div>

<div class="card">
<h2>👁️ Preview</h2>
<div class="preview-area" id="preview"><span class="resize-hint">Live preview</span></div>
</div>

<div class="card">
<h2>📋 CSS Code</h2>
<div class="code-block" id="codeOutput"><button class="copy-float" onclick="copyCSS()">Copy</button></div>
</div>

<div class="card presets">
<h2>🎯 Presets</h2>
<div class="preset-grid" id="presetGrid"></div>
</div>

<footer class="footer">Built with ☕ by Steven Li · No data leaves your browser</footer>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const PATTERNS = [
  { id: 'h-stripes', name: 'H. Stripes' },
  { id: 'v-stripes', name: 'V. Stripes' },
  { id: 'd-stripes', name: 'Diagonal' },
  { id: 'dots', name: 'Polka Dots' },
  { id: 'checker', name: 'Checkerboard' },
  { id: 'grid', name: 'Grid' },
  { id: 'diamonds', name: 'Diamonds' },
  { id: 'crosshatch', name: 'Cross-Hatch' },
  { id: 'zigzag', name: 'Zigzag' },
  { id: 'carbon', name: 'Carbon Fiber' },
  { id: 'waves', name: 'Waves' },
  { id: 'herringbone', name: 'Herringbone' },
];

let current = 'd-stripes';

function $(id) { return document.getElementById(id); }

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  if (alpha >= 1) return hex;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function getValues() {
  const c1 = $('color1Text').value || '#111111';
  const c2 = $('color2Text').value || '#ffffff';
  const size = parseInt($('size').value);
  const angle = parseInt($('angle').value);
  const opacity = parseInt($('opacity').value) / 100;
  const thickness = parseInt($('thickness').value);
  return { c1: hexToRgba(c1, opacity), c2, size, angle, thickness, rawC1: c1 };
}

function generateCSS(v) {
  const { c1, c2, size, angle, thickness } = v;
  const half = Math.round(size / 2);
  const quarter = Math.round(size / 4);
  const line = Math.min(thickness, size);

  switch (current) {
    case 'h-stripes':
      return {
        'background': `repeating-linear-gradient(\n  0deg,\n  ${c1} 0px,\n  ${c1} ${line}px,\n  ${c2} ${line}px,\n  ${c2} ${size}px\n)`
      };
    case 'v-stripes':
      return {
        'background': `repeating-linear-gradient(\n  90deg,\n  ${c1} 0px,\n  ${c1} ${line}px,\n  ${c2} ${line}px,\n  ${c2} ${size}px\n)`
      };
    case 'd-stripes':
      return {
        'background': `repeating-linear-gradient(\n  ${angle}deg,\n  ${c1} 0px,\n  ${c1} ${line}px,\n  ${c2} ${line}px,\n  ${c2} ${size}px\n)`
      };
    case 'dots': {
      const dotR = Math.max(1, Math.round(line / 2));
      return {
        'background-color': c2,
        'background-image': `radial-gradient(\n  circle ${dotR}px,\n  ${c1} 100%,\n  transparent 100%\n)`,
        'background-size': `${size}px ${size}px`
      };
    }
    case 'checker':
      return {
        'background-color': c2,
        'background-image': `linear-gradient(\n  45deg,\n  ${c1} 25%,\n  transparent 25%,\n  transparent 75%,\n  ${c1} 75%\n),\nlinear-gradient(\n  45deg,\n  ${c1} 25%,\n  transparent 25%,\n  transparent 75%,\n  ${c1} 75%\n)`,
        'background-size': `${size}px ${size}px`,
        'background-position': `0 0, ${half}px ${half}px`
      };
    case 'grid':
      return {
        'background-color': c2,
        'background-image': `linear-gradient(\n  ${c1} ${Math.max(1, Math.round(line / 3))}px,\n  transparent ${Math.max(1, Math.round(line / 3))}px\n),\nlinear-gradient(\n  90deg,\n  ${c1} ${Math.max(1, Math.round(line / 3))}px,\n  transparent ${Math.max(1, Math.round(line / 3))}px\n)`,
        'background-size': `${size}px ${size}px`
      };
    case 'diamonds':
      return {
        'background-color': c2,
        'background-image': `linear-gradient(\n  45deg,\n  ${c1} 25%,\n  transparent 25%\n),\nlinear-gradient(\n  -45deg,\n  ${c1} 25%,\n  transparent 25%\n),\nlinear-gradient(\n  45deg,\n  transparent 75%,\n  ${c1} 75%\n),\nlinear-gradient(\n  -45deg,\n  transparent 75%,\n  ${c1} 75%\n)`,
        'background-size': `${size}px ${size}px`,
        'background-position': `0 0, 0 ${half}px, ${half}px -${half}px, -${half}px 0`
      };
    case 'crosshatch': {
      const lw = Math.max(1, Math.round(line / 3));
      return {
        'background-color': c2,
        'background-image': `repeating-linear-gradient(\n  0deg,\n  ${c1} 0px,\n  ${c1} ${lw}px,\n  transparent ${lw}px,\n  transparent ${size}px\n),\nrepeating-linear-gradient(\n  90deg,\n  ${c1} 0px,\n  ${c1} ${lw}px,\n  transparent ${lw}px,\n  transparent ${size}px\n),\nrepeating-linear-gradient(\n  45deg,\n  ${c1} 0px,\n  ${c1} ${lw}px,\n  transparent ${lw}px,\n  transparent ${Math.round(size * 1.414)}px\n)`,
      };
    }
    case 'zigzag': {
      const h = size;
      const w = half;
      return {
        'background-color': c2,
        'background-image': `linear-gradient(\n  135deg,\n  ${c1} 25%,\n  transparent 25%\n),\nlinear-gradient(\n  225deg,\n  ${c1} 25%,\n  transparent 25%\n),\nlinear-gradient(\n  315deg,\n  ${c1} 25%,\n  transparent 25%\n),\nlinear-gradient(\n  45deg,\n  ${c1} 25%,\n  transparent 25%\n)`,
        'background-size': `${size}px ${size}px`,
        'background-position': `0 0, ${half}px 0, ${half}px -${half}px, 0 ${half}px`
      };
    }
    case 'carbon': {
      const s = size;
      return {
        'background': `linear-gradient(\n  27deg,\n  ${c2} 5px,\n  transparent 5px\n) 0 5px,\nlinear-gradient(\n  207deg,\n  ${c2} 5px,\n  transparent 5px\n) 10px 0,\nlinear-gradient(\n  27deg,\n  ${c1} 5px,\n  transparent 5px\n) 0 10px,\nlinear-gradient(\n  207deg,\n  ${c1} 5px,\n  transparent 5px\n) 10px 5px,\nlinear-gradient(\n  90deg,\n  ${c2} 10px,\n  transparent 10px\n),\nlinear-gradient(\n  ${c1} 25%,\n  ${c2} 25%,\n  ${c2} 50%,\n  transparent 50%,\n  transparent 75%,\n  ${c2} 75%\n)`,
        'background-color': c1,
        'background-size': `20px 20px`
      };
    }
    case 'waves': {
      const r = Math.round(size / 2);
      return {
        'background-color': c2,
        'background-image': `radial-gradient(\n  circle at 100% 50%,\n  transparent ${r}px,\n  ${c1} ${r}px,\n  ${c1} ${r + Math.max(1, Math.round(line / 2))}px,\n  transparent ${r + Math.max(1, Math.round(line / 2))}px\n),\nradial-gradient(\n  circle at 0% 50%,\n  transparent ${r}px,\n  ${c1} ${r}px,\n  ${c1} ${r + Math.max(1, Math.round(line / 2))}px,\n  transparent ${r + Math.max(1, Math.round(line / 2))}px\n)`,
        'background-size': `${size}px ${size}px`,
        'background-position': `0 0, ${half}px ${half}px`
      };
    }
    case 'herringbone': {
      const lw = Math.max(1, Math.round(line / 2));
      return {
        'background-color': c2,
        'background-image': `repeating-linear-gradient(\n  ${angle}deg,\n  ${c1} 0px,\n  ${c1} ${lw}px,\n  transparent ${lw}px,\n  transparent ${half}px\n),\nrepeating-linear-gradient(\n  ${(angle + 90) % 360}deg,\n  ${c1} 0px,\n  ${c1} ${lw}px,\n  transparent ${lw}px,\n  transparent ${half}px\n)`,
      };
    }
    default:
      return { 'background': c2 };
  }
}

function cssObjToString(obj) {
  return Object.entries(obj).map(([k, v]) => `${k}: ${v};`).join('\n');
}

function update() {
  $('sizeVal').textContent = $('size').value + 'px';
  $('angleVal').textContent = $('angle').value + '°';
  $('opacityVal').textContent = $('opacity').value + '%';
  $('thicknessVal').textContent = $('thickness').value + 'px';

  const v = getValues();
  const css = generateCSS(v);
  const cssStr = cssObjToString(css);

  // Apply to preview
  const preview = $('preview');
  preview.style.cssText = '';
  for (const [k, val] of Object.entries(css)) {
    preview.style.setProperty(k, val);
  }

  // Show code
  $('codeOutput').innerHTML = `<button class="copy-float" onclick="copyCSS()">Copy</button>` +
    escapeHtml(cssStr);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function copyCSS() {
  const v = getValues();
  const css = generateCSS(v);
  const text = cssObjToString(css);
  navigator.clipboard.writeText(text).then(() => {
    const t = $('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

function setPattern(id) {
  current = id;
  document.querySelectorAll('.pat-chip').forEach(c => c.classList.toggle('active', c.dataset.id === id));
  update();
}

function syncColor(id) {
  $(id + 'Text').value = $(id).value;
  update();
}

function syncColorText(id) {
  const v = $(id + 'Text').value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) $(id).value = v;
  update();
}

// Presets
const PRESETS = [
  { pattern: 'd-stripes', c1: '#3b82f6', c2: '#eff6ff', size: 16, angle: 45, thickness: 6, opacity: 100 },
  { pattern: 'dots', c1: '#e11d48', c2: '#fff1f2', size: 24, angle: 0, thickness: 8, opacity: 80 },
  { pattern: 'checker', c1: '#18181b', c2: '#fafafa', size: 32, angle: 0, thickness: 10, opacity: 100 },
  { pattern: 'grid', c1: '#d4d4d8', c2: '#ffffff', size: 24, angle: 0, thickness: 3, opacity: 100 },
  { pattern: 'diamonds', c1: '#7c3aed', c2: '#f5f3ff', size: 20, angle: 0, thickness: 10, opacity: 70 },
  { pattern: 'zigzag', c1: '#f59e0b', c2: '#fffbeb', size: 20, angle: 0, thickness: 10, opacity: 100 },
  { pattern: 'carbon', c1: '#1e293b', c2: '#334155', size: 20, angle: 0, thickness: 10, opacity: 100 },
  { pattern: 'waves', c1: '#0891b2', c2: '#ecfeff', size: 30, angle: 0, thickness: 8, opacity: 80 },
  { pattern: 'h-stripes', c1: '#16a34a', c2: '#f0fdf4', size: 12, angle: 0, thickness: 4, opacity: 60 },
  { pattern: 'crosshatch', c1: '#6366f1', c2: '#eef2ff', size: 20, angle: 0, thickness: 6, opacity: 40 },
  { pattern: 'herringbone', c1: '#be185d', c2: '#fdf2f8', size: 16, angle: 45, thickness: 4, opacity: 70 },
  { pattern: 'v-stripes', c1: '#ea580c', c2: '#fff7ed', size: 18, angle: 0, thickness: 6, opacity: 80 },
];

function applyPreset(p) {
  $('color1').value = p.c1;
  $('color1Text').value = p.c1;
  $('color2').value = p.c2;
  $('color2Text').value = p.c2;
  $('size').value = p.size;
  $('angle').value = p.angle;
  $('thickness').value = p.thickness;
  $('opacity').value = p.opacity;
  current = p.pattern;
  document.querySelectorAll('.pat-chip').forEach(c => c.classList.toggle('active', c.dataset.id === p.pattern));
  update();
}

function renderPresets() {
  const grid = $('presetGrid');
  PRESETS.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'preset-swatch';
    div.title = PATTERNS.find(pt => pt.id === p.pattern)?.name || p.pattern;
    // Generate a quick preview
    const saved = current;
    current = p.pattern;
    const css = generateCSS({
      c1: hexToRgba(p.c1, p.opacity / 100),
      c2: p.c2,
      size: p.size,
      angle: p.angle,
      thickness: p.thickness,
      rawC1: p.c1
    });
    current = saved;
    for (const [k, v] of Object.entries(css)) {
      div.style.setProperty(k, v);
    }
    div.onclick = () => applyPreset(p);
    grid.appendChild(div);
  });
}

// Init
function init() {
  const picker = $('patternPicker');
  PATTERNS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pat-chip' + (p.id === current ? ' active' : '');
    btn.textContent = p.name;
    btn.dataset.id = p.id;
    btn.onclick = () => setPattern(p.id);
    picker.appendChild(btn);
  });
  renderPresets();
  update();
}

init();
</script>
</body>
</html>
