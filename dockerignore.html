<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.dockerignore Builder — Free Online Tool</title>
<meta name="description" content="Build .dockerignore files visually. Pick from common presets for Node.js, Python, Go, Java, Rust, and more — then customize and download. 100% client-side.">
<meta name="keywords" content="dockerignore, docker ignore, docker build, dockerfile, docker context, build optimization">
<meta name="author" content="Steven Li">
<meta property="og:title" content=".dockerignore Builder">
<meta property="og:description" content="Build .dockerignore files visually with presets and custom patterns.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/dockerignore.html">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/dockerignore.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .section-title {
    font-size: .82rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted); margin: 16px 0 8px;
    padding-top: 8px; border-top: 1px solid var(--border);
  }
  .section-title:first-child { border-top: none; margin-top: 0; padding-top: 0; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: .82rem; cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pattern-list { list-style: none; padding: 0; margin: 0; }
  .pattern-item {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: .85rem;
  }
  .pattern-item:last-child { border-bottom: none; }
  .pattern-item input[type="checkbox"] { margin: 0; cursor: pointer; }
  .pattern-item label { cursor: pointer; flex: 1; }
  .pattern-item .desc { font-size: .75rem; color: var(--muted); font-family: var(--sans); }
  .custom-area {
    width: 100%; min-height: 100px; padding: 10px; font-family: var(--mono); font-size: .85rem;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); resize: vertical; line-height: 1.5;
  }
  .output-box {
    position: relative; margin-top: 14px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 48px 14px 14px; font-family: var(--mono); font-size: .82rem;
    white-space: pre-wrap; word-break: break-all; min-height: 80px; line-height: 1.6;
  }
  .copy-btn {
    position: absolute; top: 8px; right: 8px; padding: 4px 10px; font-size: .78rem;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--accent); color: #fff; cursor: pointer;
  }
  .copy-btn.copied { background: var(--success); border-color: var(--success); }
  .stats { font-size: .82rem; color: var(--muted); margin-top: 8px; }
  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .add-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-row input { flex: 1; padding: 8px 10px; font-family: var(--mono); font-size: .85rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); }
  @media (max-width: 768px) {
    .panels { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>.dockerignore Builder</h1>
<p class="subtitle">Build .dockerignore files with common presets. Reduce Docker build context size and speed up builds.</p>

<div class="card">
<div class="section-title">Language / Framework Presets</div>
<div class="chip-group" id="lang-presets">
  <button class="chip" onclick="togglePreset(this, 'node')">Node.js</button>
  <button class="chip" onclick="togglePreset(this, 'python')">Python</button>
  <button class="chip" onclick="togglePreset(this, 'go')">Go</button>
  <button class="chip" onclick="togglePreset(this, 'java')">Java</button>
  <button class="chip" onclick="togglePreset(this, 'rust')">Rust</button>
  <button class="chip" onclick="togglePreset(this, 'ruby')">Ruby</button>
  <button class="chip" onclick="togglePreset(this, 'php')">PHP</button>
  <button class="chip" onclick="togglePreset(this, 'dotnet')">.NET</button>
</div>

<div class="section-title">Common Patterns</div>
<div class="chip-group" id="common-presets">
  <button class="chip" onclick="togglePreset(this, 'git')">Git</button>
  <button class="chip" onclick="togglePreset(this, 'ide')">IDE / Editor</button>
  <button class="chip" onclick="togglePreset(this, 'os')">OS Files</button>
  <button class="chip" onclick="togglePreset(this, 'docker')">Docker</button>
  <button class="chip" onclick="togglePreset(this, 'ci')">CI/CD</button>
  <button class="chip" onclick="togglePreset(this, 'docs')">Docs</button>
  <button class="chip" onclick="togglePreset(this, 'test')">Tests</button>
  <button class="chip" onclick="togglePreset(this, 'secrets')">Secrets / Env</button>
</div>

<div class="panels">
<div>
<div class="section-title">Selected Patterns</div>
<ul class="pattern-list" id="patterns"></ul>
<div class="add-row">
  <input type="text" id="custom-pattern" placeholder="Add custom pattern (e.g. *.log)">
  <button class="btn" onclick="addCustom()">Add</button>
</div>
</div>
<div>
<div class="section-title">Output</div>
<div style="position:relative">
  <div class="output-box" id="output"></div>
  <button class="copy-btn" onclick="copyOutput()">Copy</button>
</div>
<div class="stats" id="stats"></div>
<div class="actions">
  <button class="btn-secondary" onclick="downloadFile()">Download .dockerignore</button>
  <button class="btn-secondary" onclick="clearAll()">Clear All</button>
</div>
</div>
</div>
</div>

<footer>Built with ☕ by Steven Li · No data leaves your browser</footer>
</div>

<script>
const presets = {
  node: {
    label: 'Node.js',
    patterns: [
      { p: 'node_modules/', d: 'Dependencies' },
      { p: 'npm-debug.log*', d: 'npm debug logs' },
      { p: 'yarn-debug.log*', d: 'Yarn debug logs' },
      { p: 'yarn-error.log*', d: 'Yarn error logs' },
      { p: '.npm', d: 'npm cache' },
      { p: '.yarn', d: 'Yarn cache' },
      { p: 'dist/', d: 'Build output' },
      { p: 'build/', d: 'Build output' },
      { p: 'coverage/', d: 'Test coverage' },
      { p: '.next/', d: 'Next.js build' },
      { p: '.nuxt/', d: 'Nuxt build' },
    ]
  },
  python: {
    label: 'Python',
    patterns: [
      { p: '__pycache__/', d: 'Bytecode cache' },
      { p: '*.py[cod]', d: 'Compiled Python' },
      { p: '*.pyo', d: 'Optimized bytecode' },
      { p: '.venv/', d: 'Virtual environment' },
      { p: 'venv/', d: 'Virtual environment' },
      { p: 'env/', d: 'Virtual environment' },
      { p: '*.egg-info/', d: 'Package metadata' },
      { p: '.eggs/', d: 'Egg cache' },
      { p: '.mypy_cache/', d: 'Mypy cache' },
      { p: '.pytest_cache/', d: 'Pytest cache' },
      { p: '.ruff_cache/', d: 'Ruff cache' },
    ]
  },
  go: {
    label: 'Go',
    patterns: [
      { p: 'vendor/', d: 'Vendored deps' },
      { p: '*.exe', d: 'Windows binaries' },
      { p: '*.test', d: 'Test binaries' },
      { p: '*.out', d: 'Coverage output' },
    ]
  },
  java: {
    label: 'Java',
    patterns: [
      { p: 'target/', d: 'Maven build output' },
      { p: 'build/', d: 'Gradle build output' },
      { p: '.gradle/', d: 'Gradle cache' },
      { p: '*.class', d: 'Compiled classes' },
      { p: '*.jar', d: 'JAR files' },
      { p: '*.war', d: 'WAR files' },
      { p: '.m2/', d: 'Maven local repo' },
    ]
  },
  rust: {
    label: 'Rust',
    patterns: [
      { p: 'target/', d: 'Build output' },
      { p: '*.rs.bk', d: 'Backup files' },
    ]
  },
  ruby: {
    label: 'Ruby',
    patterns: [
      { p: 'vendor/bundle/', d: 'Bundled gems' },
      { p: '.bundle/', d: 'Bundle config' },
      { p: 'tmp/', d: 'Temp files' },
      { p: 'log/', d: 'Log files' },
      { p: '*.gem', d: 'Gem files' },
    ]
  },
  php: {
    label: 'PHP',
    patterns: [
      { p: 'vendor/', d: 'Composer deps' },
      { p: 'storage/', d: 'Laravel storage' },
      { p: 'bootstrap/cache/', d: 'Laravel cache' },
    ]
  },
  dotnet: {
    label: '.NET',
    patterns: [
      { p: 'bin/', d: 'Build output' },
      { p: 'obj/', d: 'Intermediate output' },
      { p: '*.user', d: 'User-specific files' },
      { p: 'packages/', d: 'NuGet packages' },
    ]
  },
  git: {
    label: 'Git',
    patterns: [
      { p: '.git', d: 'Git directory' },
      { p: '.gitignore', d: 'Git ignore file' },
      { p: '.gitattributes', d: 'Git attributes' },
      { p: '.gitmodules', d: 'Git submodules' },
    ]
  },
  ide: {
    label: 'IDE / Editor',
    patterns: [
      { p: '.vscode/', d: 'VS Code settings' },
      { p: '.idea/', d: 'JetBrains settings' },
      { p: '*.swp', d: 'Vim swap files' },
      { p: '*.swo', d: 'Vim swap files' },
      { p: '*~', d: 'Editor backup files' },
      { p: '.editorconfig', d: 'Editor config' },
    ]
  },
  os: {
    label: 'OS Files',
    patterns: [
      { p: '.DS_Store', d: 'macOS metadata' },
      { p: 'Thumbs.db', d: 'Windows thumbnails' },
      { p: 'desktop.ini', d: 'Windows folder settings' },
      { p: '*.tmp', d: 'Temporary files' },
    ]
  },
  docker: {
    label: 'Docker',
    patterns: [
      { p: 'Dockerfile*', d: 'Dockerfiles (optional)' },
      { p: 'docker-compose*.yml', d: 'Compose files' },
      { p: 'docker-compose*.yaml', d: 'Compose files' },
      { p: '.dockerignore', d: 'This file' },
    ]
  },
  ci: {
    label: 'CI/CD',
    patterns: [
      { p: '.github/', d: 'GitHub Actions' },
      { p: '.gitlab-ci.yml', d: 'GitLab CI' },
      { p: '.circleci/', d: 'CircleCI' },
      { p: '.travis.yml', d: 'Travis CI' },
      { p: 'Jenkinsfile', d: 'Jenkins' },
    ]
  },
  docs: {
    label: 'Docs',
    patterns: [
      { p: '*.md', d: 'Markdown files' },
      { p: 'docs/', d: 'Documentation' },
      { p: 'LICENSE', d: 'License file' },
      { p: 'CHANGELOG*', d: 'Changelog' },
    ]
  },
  test: {
    label: 'Tests',
    patterns: [
      { p: 'tests/', d: 'Test directory' },
      { p: 'test/', d: 'Test directory' },
      { p: '__tests__/', d: 'Jest tests' },
      { p: '*.test.*', d: 'Test files' },
      { p: '*.spec.*', d: 'Spec files' },
      { p: 'coverage/', d: 'Coverage reports' },
      { p: '.nyc_output/', d: 'NYC coverage' },
    ]
  },
  secrets: {
    label: 'Secrets / Env',
    patterns: [
      { p: '.env', d: 'Environment file' },
      { p: '.env.*', d: 'Environment files' },
      { p: '*.pem', d: 'Certificates' },
      { p: '*.key', d: 'Private keys' },
      { p: '*.p12', d: 'PKCS12 certs' },
      { p: 'credentials.json', d: 'Credentials' },
    ]
  }
};

let activePresets = new Set();
let customPatterns = [];

function togglePreset(el, name) {
  el.classList.toggle('active');
  if (el.classList.contains('active')) {
    activePresets.add(name);
  } else {
    activePresets.delete(name);
  }
  render();
}

function addCustom() {
  const input = document.getElementById('custom-pattern');
  const val = input.value.trim();
  if (!val) return;
  customPatterns.push({ p: val, d: 'Custom' });
  input.value = '';
  render();
}

function removeCustom(i) {
  customPatterns.splice(i, 1);
  render();
}

function clearAll() {
  activePresets.clear();
  customPatterns = [];
  document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
  render();
}

function getAllPatterns() {
  const seen = new Set();
  const result = [];
  for (const name of activePresets) {
    const preset = presets[name];
    if (!preset) continue;
    for (const p of preset.patterns) {
      if (!seen.has(p.p)) {
        seen.add(p.p);
        result.push({ ...p, source: preset.label });
      }
    }
  }
  for (const p of customPatterns) {
    if (!seen.has(p.p)) {
      seen.add(p.p);
      result.push({ ...p, source: 'Custom', custom: true });
    }
  }
  return result;
}

function render() {
  const patterns = getAllPatterns();
  const list = document.getElementById('patterns');

  if (patterns.length === 0) {
    list.innerHTML = '<li style="padding:1rem;color:var(--muted);font-size:.85rem;">Select presets or add custom patterns above.</li>';
  } else {
    list.innerHTML = patterns.map((p, i) => {
      const rmBtn = p.custom ? `<button class="btn-sm" style="padding:2px 8px;font-size:.75rem;color:var(--error);border-color:var(--error)" onclick="removeCustom(${customPatterns.indexOf(p)})">×</button>` : '';
      return `<li class="pattern-item"><code>${esc(p.p)}</code><span class="desc">${esc(p.d)} · ${esc(p.source)}</span>${rmBtn}</li>`;
    }).join('');
  }

  generateOutput(patterns);
}

function generateOutput(patterns) {
  if (patterns.length === 0) {
    document.getElementById('output').textContent = '# Select presets to generate .dockerignore';
    document.getElementById('stats').textContent = '';
    return;
  }

  const grouped = {};
  for (const p of patterns) {
    if (!grouped[p.source]) grouped[p.source] = [];
    grouped[p.source].push(p);
  }

  let out = '# .dockerignore\n# Generated by toolbox — stevenli-phoenix.github.io/toolbox/dockerignore.html\n\n';

  for (const [source, items] of Object.entries(grouped)) {
    out += `# ${source}\n`;
    for (const item of items) {
      out += `${item.p}\n`;
    }
    out += '\n';
  }

  document.getElementById('output').textContent = out.trimEnd();
  document.getElementById('stats').textContent = `${patterns.length} patterns from ${Object.keys(grouped).length} categories`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function copyOutput() {
  const btn = document.querySelector('.copy-btn');
  navigator.clipboard.writeText(document.getElementById('output').textContent).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function downloadFile() {
  const content = document.getElementById('output').textContent;
  const blob = new Blob([content + '\n'], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '.dockerignore';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('custom-pattern').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCustom();
});

render();
</script>
</body>
</html>
