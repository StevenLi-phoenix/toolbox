<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Key Path Extractor - Free Online Tool</title>
<meta name="description" content="Extract all unique key paths from any JSON document. See dot paths, bracket paths, types, and sample values. 100% client-side.">
<meta name="keywords" content="json, key path, extract keys, json paths, json structure, jsonpath, schema, flatten">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/jsonkeys.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .paths-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: .82rem; }
  .paths-table th, .paths-table td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .paths-table th { background: var(--surface2); font-family: var(--sans); font-size: .78rem; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); position: sticky; top: 0; }
  .paths-table tr:hover td { background: var(--surface2); }
  .paths-table td.path { word-break: break-all; }
  .type-badge { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: .72rem; font-weight: 600; font-family: var(--sans); }
  .t-string { background: #dcfce7; color: #15803d; }
  .t-number { background: #dbeafe; color: #1d4ed8; }
  .t-boolean { background: #fef3c7; color: #a16207; }
  .t-null { background: #f3f4f6; color: #6b7280; }
  .t-object { background: #ede9fe; color: #6d28d9; }
  .t-array { background: #fce7f3; color: #be185d; }
  .table-wrap { max-height: 480px; overflow: auto; border: 1px solid var(--border); border-radius: var(--radius); }
  .sample { color: var(--muted); max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .options-row { display: flex; gap: 1rem; flex-wrap: wrap; margin: .5rem 0 .75rem; font-size: .85rem; }
  .options-row label { display: flex; align-items: center; gap: .35rem; cursor: pointer; }
  .meta { font-size: .8rem; color: var(--muted); margin-top: .5rem; }
  .filter-row { display: flex; gap: .5rem; margin-bottom: .5rem; flex-wrap: wrap; }
  .filter-row input { flex: 1; min-width: 200px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .85rem; }
  .filter-row select { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: .85rem; }
  .error { color: var(--error); font-size: .85rem; margin-top: .5rem; font-family: var(--mono); }
  .empty-state { padding: 2rem; text-align: center; color: var(--muted); font-size: .9rem; }
  @media (max-width: 768px) {
    .paths-table th:nth-child(4), .paths-table td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>JSON Key Path Extractor</h1>
<p class="subtitle">List every unique path in a JSON document — with types, sample values, and filter controls.</p>

<div class="card">
<h2>📥 Input JSON</h2>
<textarea id="input" placeholder='{"user": {"name": "Ada", "roles": ["admin", "dev"]}}' spellcheck="false"></textarea>
<div class="options-row">
  <label><input type="radio" name="notation" value="dot" checked> Dot notation</label>
  <label><input type="radio" name="notation" value="bracket"> Bracket notation</label>
  <label><input type="radio" name="notation" value="jsonpath"> JSONPath ($)</label>
  <label><input type="checkbox" id="collapseArrays" checked> Collapse array indices to [*]</label>
  <label><input type="checkbox" id="leavesOnly"> Leaves only (hide containers)</label>
</div>
<div class="row">
  <button class="btn" onclick="extract()">Extract Paths</button>
  <button class="btn btn-secondary" onclick="loadSample()">Sample</button>
  <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
</div>
<div class="error" id="err"></div>
</div>

<div class="card" id="resultCard" style="display:none">
<h2>🔑 Paths <span class="meta" id="meta"></span></h2>
<div class="filter-row">
  <input type="text" id="filter" placeholder="Filter paths…" oninput="renderTable()">
  <select id="typeFilter" onchange="renderTable()">
    <option value="">All types</option>
    <option>string</option>
    <option>number</option>
    <option>boolean</option>
    <option>null</option>
    <option>object</option>
    <option>array</option>
  </select>
  <button class="btn btn-secondary" onclick="copyPaths()">📋 Copy Paths</button>
  <button class="btn btn-secondary" onclick="downloadCSV()">💾 CSV</button>
</div>
<div class="table-wrap">
  <table class="paths-table">
    <thead><tr><th>#</th><th>Path</th><th>Type</th><th>Sample</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</div>
</div>

<footer style="text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.85rem">
Built with ☕ by Steven Li · No data leaves your browser
</footer>

<script>
let allPaths = [];

function typeOf(v) {
  if (v === null) return 'null';
  if (Array.isArray(v)) return 'array';
  return typeof v;
}

function formatKey(k, notation) {
  if (notation === 'bracket' || notation === 'jsonpath') {
    return /^[A-Za-z_$][\w$]*$/.test(k) ? '.' + k : `["${k.replace(/"/g, '\\"')}"]`;
  }
  return /^[A-Za-z_$][\w$]*$/.test(k) ? '.' + k : `["${k.replace(/"/g, '\\"')}"]`;
}

function walk(node, path, out, opts) {
  const t = typeOf(node);
  const isContainer = t === 'object' || t === 'array';
  if (!opts.leavesOnly || !isContainer) {
    out.push({ path: path || (opts.notation === 'jsonpath' ? '$' : '(root)'), type: t, value: node });
  }
  if (t === 'object') {
    for (const k of Object.keys(node)) {
      const seg = formatKey(k, opts.notation);
      const newPath = (path || (opts.notation === 'jsonpath' ? '$' : '')) + seg;
      walk(node[k], newPath.startsWith('.') ? newPath.slice(1) : newPath, out, opts);
    }
  } else if (t === 'array') {
    if (opts.collapseArrays) {
      // Walk only first element as representative, tag path with [*]
      if (node.length > 0) {
        const newPath = (path || (opts.notation === 'jsonpath' ? '$' : '')) + '[*]';
        walk(node[0], newPath, out, opts);
      }
    } else {
      node.forEach((v, i) => {
        const newPath = (path || (opts.notation === 'jsonpath' ? '$' : '')) + `[${i}]`;
        walk(v, newPath, out, opts);
      });
    }
  }
}

function extract() {
  const err = document.getElementById('err');
  err.textContent = '';
  const raw = document.getElementById('input').value.trim();
  if (!raw) { err.textContent = 'Paste some JSON first.'; return; }
  let data;
  try { data = JSON.parse(raw); }
  catch (e) { err.textContent = 'Invalid JSON: ' + e.message; return; }

  const opts = {
    notation: document.querySelector('input[name="notation"]:checked').value,
    collapseArrays: document.getElementById('collapseArrays').checked,
    leavesOnly: document.getElementById('leavesOnly').checked,
  };

  const raw_paths = [];
  walk(data, '', raw_paths, opts);

  // Dedup by path (when collapseArrays, multiple rows may share path under arrays of objects)
  const seen = new Map();
  for (const p of raw_paths) {
    if (!seen.has(p.path)) seen.set(p.path, p);
  }
  allPaths = Array.from(seen.values());
  document.getElementById('resultCard').style.display = 'block';
  renderTable();
}

function renderTable() {
  const filter = document.getElementById('filter').value.toLowerCase();
  const typeFilter = document.getElementById('typeFilter').value;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let shown = 0;
  allPaths.forEach((p) => {
    if (filter && !p.path.toLowerCase().includes(filter)) return;
    if (typeFilter && p.type !== typeFilter) return;
    shown++;
    const tr = document.createElement('tr');
    const sample = sampleValue(p.value);
    tr.innerHTML = `<td>${shown}</td><td class="path">${escapeHtml(p.path)}</td><td><span class="type-badge t-${p.type}">${p.type}</span></td><td class="sample" title="${escapeHtml(sample)}">${escapeHtml(sample)}</td>`;
    tbody.appendChild(tr);
  });
  if (shown === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No paths match current filters.</td></tr>';
  }
  document.getElementById('meta').textContent = `${shown} of ${allPaths.length} unique paths`;
}

function sampleValue(v) {
  const t = typeOf(v);
  if (t === 'string') return JSON.stringify(v);
  if (t === 'number' || t === 'boolean') return String(v);
  if (t === 'null') return 'null';
  if (t === 'array') return `[${v.length}]`;
  if (t === 'object') return `{${Object.keys(v).length}}`;
  return '';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function copyPaths() {
  const text = allPaths.map(p => p.path).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const old = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = old, 1500);
  });
}

function downloadCSV() {
  const rows = [['path','type','sample']];
  allPaths.forEach(p => rows.push([p.path, p.type, sampleValue(p.value)]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'json-paths.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadSample() {
  document.getElementById('input').value = JSON.stringify({
    api: "v2",
    user: {
      id: 42,
      name: "Ada Lovelace",
      email: "ada@example.com",
      verified: true,
      roles: ["admin", "editor"],
      profile: { avatar: null, bio: "Computing pioneer", tags: ["math", "poetry"] }
    },
    posts: [
      { id: 1, title: "Hello", likes: 12, tags: ["intro"] },
      { id: 2, title: "World", likes: 34, tags: ["update"] }
    ],
    meta: { fetchedAt: "2025-01-01T00:00:00Z", count: 2 }
  }, null, 2);
  extract();
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('err').textContent = '';
  document.getElementById('resultCard').style.display = 'none';
  allPaths = [];
}

document.querySelectorAll('input[name="notation"], #collapseArrays, #leavesOnly').forEach(el => {
  el.addEventListener('change', () => { if (allPaths.length) extract(); });
});
</script>
</body>
</html>
