<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Line Sorter & Deduplicator - Free Online Tool</title>
<meta name="description" content="Sort, deduplicate, shuffle, reverse, and filter text lines instantly. No data leaves your browser.">
<meta name="keywords" content="text sorter, line sorter, deduplicate lines, remove duplicates, sort lines, shuffle lines, reverse lines">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/textsort.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .controls select, .controls input { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font: inherit; font-size: .85rem; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel textarea { width: 100%; height: 400px; resize: vertical; font-family: var(--mono); font-size: .85rem; }
  .stats { font-size: .8rem; color: var(--muted); margin-top: 6px; }
  .options { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .options label { font-size: .85rem; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  @media (max-width: 768px) {
    .panels { grid-template-columns: 1fr; }
    .panel textarea { height: 250px; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>Text Line Sorter</h1>
<p class="subtitle">Sort, deduplicate, shuffle, reverse, and filter text lines</p>

<div class="card">
<div class="controls">
  <select id="sortMode" onchange="process()">
    <option value="alpha-asc">A → Z (Alphabetical)</option>
    <option value="alpha-desc">Z → A (Reverse Alpha)</option>
    <option value="num-asc">0 → 9 (Numeric Asc)</option>
    <option value="num-desc">9 → 0 (Numeric Desc)</option>
    <option value="length-asc">Short → Long (Length)</option>
    <option value="length-desc">Long → Short (Length)</option>
    <option value="shuffle">Shuffle (Random)</option>
    <option value="reverse">Reverse Order</option>
    <option value="none">No Sort (Keep Order)</option>
  </select>
  <div class="options">
    <label><input type="checkbox" id="dedupe" onchange="process()"> Remove duplicates</label>
    <label><input type="checkbox" id="trimLines" onchange="process()"> Trim whitespace</label>
    <label><input type="checkbox" id="removeEmpty" onchange="process()" checked> Remove empty lines</label>
    <label><input type="checkbox" id="caseInsensitive" onchange="process()"> Case-insensitive</label>
  </div>
</div>
</div>

<div class="panels">
  <div class="panel card">
    <h2>Input</h2>
    <textarea id="input" placeholder="Paste your text here — one item per line…" oninput="process()">banana
apple
Cherry
apple
grape
BANANA
orange

cherry
date
fig
grape
elderberry</textarea>
    <div class="stats" id="inputStats"></div>
  </div>
  <div class="panel card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Output</h2>
      <button class="btn" onclick="copyOutput()">Copy</button>
    </div>
    <textarea id="output" readonly></textarea>
    <div class="stats" id="outputStats"></div>
  </div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $ = id => document.getElementById(id);

function process() {
  const raw = $('input').value;
  let lines = raw.split('\n');

  const trimWs = $('trimLines').checked;
  const removeEmpty = $('removeEmpty').checked;
  const dedupe = $('dedupe').checked;
  const ci = $('caseInsensitive').checked;
  const mode = $('sortMode').value;

  const totalInput = lines.length;

  if (trimWs) lines = lines.map(l => l.trim());
  if (removeEmpty) lines = lines.filter(l => l.trim() !== '');

  if (dedupe) {
    const seen = new Set();
    lines = lines.filter(l => {
      const key = ci ? l.toLowerCase() : l;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  switch (mode) {
    case 'alpha-asc':
      lines.sort((a, b) => ci ? a.toLowerCase().localeCompare(b.toLowerCase()) : a.localeCompare(b));
      break;
    case 'alpha-desc':
      lines.sort((a, b) => ci ? b.toLowerCase().localeCompare(a.toLowerCase()) : b.localeCompare(a));
      break;
    case 'num-asc':
      lines.sort((a, b) => parseNum(a) - parseNum(b));
      break;
    case 'num-desc':
      lines.sort((a, b) => parseNum(b) - parseNum(a));
      break;
    case 'length-asc':
      lines.sort((a, b) => a.length - b.length);
      break;
    case 'length-desc':
      lines.sort((a, b) => b.length - a.length);
      break;
    case 'shuffle':
      for (let i = lines.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [lines[i], lines[j]] = [lines[j], lines[i]];
      }
      break;
    case 'reverse':
      lines.reverse();
      break;
  }

  $('output').value = lines.join('\n');
  $('inputStats').textContent = `${totalInput} lines`;
  const removed = totalInput - lines.length;
  $('outputStats').textContent = `${lines.length} lines` + (removed ? ` (${removed} removed)` : '');
}

function parseNum(s) {
  const m = s.match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : Infinity;
}

function copyOutput() {
  navigator.clipboard.writeText($('output').value).then(() => {
    const t = $('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

process();
</script>
</body>
</html>
