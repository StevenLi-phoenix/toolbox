<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator — Free Online Barcode Maker | DevToolbox</title>
    <meta name="description" content="Free online barcode generator. Create Code 128, EAN-13, UPC-A, Code 39, ITF, Codabar, and Pharmacode barcodes instantly. Download as PNG or SVG.">
    <meta name="keywords" content="barcode generator, code 128, ean-13, upc-a, code 39, barcode maker, free barcode, online barcode tool">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/barcode.html">
    <meta property="og:title" content="Barcode Generator — Free Online Barcode Maker">
    <meta property="og:description" content="Generate barcodes in Code 128, EAN-13, UPC-A, Code 39, ITF, Codabar, and Pharmacode formats. Download as PNG or SVG.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/barcode.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Barcode Generator — Free Online Barcode Maker">
    <meta name="twitter:description" content="Generate barcodes in multiple formats. Free, instant, no sign-up required.">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
    <div class="container">
        <h1>📊 Barcode Generator</h1>
        <p class="subtitle">Generate barcodes in multiple formats — download as PNG or SVG</p>

        <div class="card">
            <div class="form-group">
                <label>Barcode Format</label>
                <div class="presets" id="formatPresets">
                    <button class="preset-btn active" data-format="CODE128">Code 128</button>
                    <button class="preset-btn" data-format="EAN13">EAN-13</button>
                    <button class="preset-btn" data-format="UPC">UPC-A</button>
                    <button class="preset-btn" data-format="CODE39">Code 39</button>
                    <button class="preset-btn" data-format="ITF14">ITF-14</button>
                    <button class="preset-btn" data-format="codabar">Codabar</button>
                    <button class="preset-btn" data-format="pharmacode">Pharmacode</button>
                    <button class="preset-btn" data-format="MSI">MSI</button>
                </div>
                <div class="format-info" id="formatInfo">Code 128 — Supports all ASCII characters. Most versatile general-purpose barcode.</div>
            </div>

            <div class="form-group">
                <label for="barcodeValue">Value</label>
                <input type="text" id="barcodeValue" placeholder="Enter barcode value..." value="Hello-World-2026">
                <div class="error-msg" id="errorMsg"></div>
            </div>

            <div class="options-row">
                <div class="form-group">
                    <label for="barWidth">Bar Width</label>
                    <input type="number" id="barWidth" value="2" min="1" max="5" step="1">
                </div>
                <div class="form-group">
                    <label for="barHeight">Height (px)</label>
                    <input type="number" id="barHeight" value="100" min="20" max="300" step="10">
                </div>
                <div class="form-group">
                    <label for="fontSize">Font Size</label>
                    <input type="number" id="fontSize" value="16" min="0" max="40" step="2">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Line Color</label>
                    <div class="color-input-wrap">
                        <input type="color" id="lineColor" value="#000000">
                        <input type="text" id="lineColorText" value="#000000" maxlength="7">
                    </div>
                </div>
                <div class="form-group">
                    <label>Background</label>
                    <div class="color-input-wrap">
                        <input type="color" id="bgColor" value="#ffffff">
                        <input type="text" id="bgColorText" value="#ffffff" maxlength="7">
                    </div>
                </div>
            </div>

            <div class="row" style="margin-bottom:16px">
                <label class="checkbox-wrap">
                    <input type="checkbox" id="showText" checked>
                    Show text below barcode
                </label>
                <label class="checkbox-wrap">
                    <input type="checkbox" id="flatBarcode">
                    Flat (no quiet zone)
                </label>
            </div>

            <div class="preview">
                <div class="preview-white" id="previewWrap">
                    <svg id="barcodeSvg"></svg>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" onclick="downloadPng()">⬇ Download PNG</button>
                <button class="btn btn-secondary" onclick="downloadSvg()">⬇ Download SVG</button>
                <button class="btn btn-secondary" onclick="copyToClipboard()">📋 Copy PNG</button>
            </div>
        </div>
    </div>

    <footer>
        <a href="index.html">← Back to DevToolbox</a> ·
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
    </footer>

    <script>
        const formatDescriptions = {
            CODE128: 'Code 128 — Supports all ASCII characters. Most versatile general-purpose barcode.',
            EAN13: 'EAN-13 — 13 digits. Standard international retail barcode (e.g. 5901234123457).',
            UPC: 'UPC-A — 12 digits. Standard North American retail barcode (e.g. 123456789012).',
            CODE39: 'Code 39 — Alphanumeric (A-Z, 0-9, - . $ / + % SPACE). Common in non-retail.',
            ITF14: 'ITF-14 — 14 digits. Used on shipping cartons and outer packaging.',
            codabar: 'Codabar — Digits + - $ : / . +. Used in libraries, blood banks, parcels.',
            pharmacode: 'Pharmacode — Number 3-131070. Used in pharmaceutical packaging.',
            MSI: 'MSI — Digits only. Used in inventory, warehouse shelf marking.'
        };

        const formatDefaults = {
            CODE128: 'Hello-World-2026',
            EAN13: '5901234123457',
            UPC: '123456789012',
            CODE39: 'HELLO-2026',
            ITF14: '12345678901231',
            codabar: 'A12345B',
            pharmacode: '1234',
            MSI: '80523'
        };

        let currentFormat = 'CODE128';

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFormat = btn.dataset.format;
                document.getElementById('formatInfo').textContent = formatDescriptions[currentFormat];
                document.getElementById('barcodeValue').value = formatDefaults[currentFormat];
                generate();
            });
        });

        // Color sync
        const lineColor = document.getElementById('lineColor');
        const lineColorText = document.getElementById('lineColorText');
        const bgColor = document.getElementById('bgColor');
        const bgColorText = document.getElementById('bgColorText');

        lineColor.addEventListener('input', () => { lineColorText.value = lineColor.value; generate(); });
        lineColorText.addEventListener('input', () => { lineColor.value = lineColorText.value; generate(); });
        bgColor.addEventListener('input', () => { bgColorText.value = bgColor.value; generate(); });
        bgColorText.addEventListener('input', () => { bgColor.value = bgColorText.value; generate(); });

        // Auto-generate on any input change
        document.querySelectorAll('input').forEach(el => {
            el.addEventListener('input', generate);
            el.addEventListener('change', generate);
        });

        function generate() {
            const value = document.getElementById('barcodeValue').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';

            if (!value) {
                errorMsg.textContent = 'Please enter a value.';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                JsBarcode('#barcodeSvg', value, {
                    format: currentFormat,
                    width: parseInt(document.getElementById('barWidth').value) || 2,
                    height: parseInt(document.getElementById('barHeight').value) || 100,
                    displayValue: document.getElementById('showText').checked,
                    fontSize: parseInt(document.getElementById('fontSize').value) || 16,
                    lineColor: lineColor.value,
                    background: bgColor.value,
                    margin: document.getElementById('flatBarcode').checked ? 0 : 10,
                    flat: document.getElementById('flatBarcode').checked
                });
                document.getElementById('previewWrap').style.background = bgColor.value;
            } catch (e) {
                errorMsg.textContent = 'Invalid value for ' + currentFormat + ': ' + e.message;
                errorMsg.style.display = 'block';
            }
        }

        function getSvgDataUrl() {
            const svg = document.getElementById('barcodeSvg');
            const data = new XMLSerializer().serializeToString(svg);
            return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(data);
        }

        function downloadSvg() {
            const a = document.createElement('a');
            a.href = getSvgDataUrl();
            a.download = 'barcode-' + currentFormat.toLowerCase() + '.svg';
            a.click();
        }

        function svgToCanvas() {
            return new Promise(resolve => {
                const svg = document.getElementById('barcodeSvg');
                const data = new XMLSerializer().serializeToString(svg);
                const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    const scale = 2;
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.scale(scale, scale);
                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(url);
                    resolve(canvas);
                };
                img.src = url;
            });
        }

        async function downloadPng() {
            const canvas = await svgToCanvas();
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = 'barcode-' + currentFormat.toLowerCase() + '.png';
            a.click();
        }

        async function copyToClipboard() {
            try {
                const canvas = await svgToCanvas();
                canvas.toBlob(async blob => {
                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    const btn = event.target;
                    const orig = btn.textContent;
                    btn.textContent = '✅ Copied!';
                    setTimeout(() => btn.textContent = orig, 1500);
                });
            } catch (e) {
                alert('Copy failed: ' + e.message);
            }
        }

        generate();
    </script>
</body>
</html>
