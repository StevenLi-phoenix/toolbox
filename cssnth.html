  .field label { font-size: .8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

  .field input:focus, .field select:focus { border-color: var(--accent); }
  .expr-input { min-width: 200px; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }

  .grid-item.matched { background: #111; color: #fff; border-color: #111; transform: scale(1.05); }
  .grid-item.matched::after { content: '✓'; position: absolute; top: 2px; right: 4px; font-size: .6rem; }
  .info-bar { display: flex; gap: 20px; flex-wrap: wrap; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); margin-bottom: 16px; }
  .info-item { display: flex; flex-direction: column; gap: 2px; }

<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>CSS :nth-child() Tester</h1>
<p class="subtitle">Visualize which elements match your :nth-child(), :nth-last-child(), and :nth-of-type() selectors.</p>

<div class="controls">
  <div class="field">
    <label for="selector">Selector type</label>
    <select id="selector" onchange="update()">
      <option value="nth-child">:nth-child()</option>
      <option value="nth-last-child">:nth-last-child()</option>
      <option value="nth-of-type">:nth-of-type()</option>
      <option value="nth-last-of-type">:nth-last-of-type()</option>
    </select>
  </div>
  <div class="field">
    <label for="expression">Expression</label>
    <input type="text" id="expression" class="expr-input" value="2n+1" placeholder="e.g. 2n+1, odd, 3, -n+5" spellcheck="false" oninput="update()">
  </div>
  <div class="field">
    <label for="count">Items</label>
    <input type="number" id="count" value="24" min="1" max="100" style="width:80px" oninput="update()">
  </div>
</div>

<div class="presets">
  <button class="preset" onclick="setExpr('odd')">odd</button>
  <button class="preset" onclick="setExpr('even')">even</button>
  <button class="preset" onclick="setExpr('2n+1')">2n+1</button>
  <button class="preset" onclick="setExpr('3n')">3n</button>
  <button class="preset" onclick="setExpr('3n+1')">3n+1</button>
  <button class="preset" onclick="setExpr('4n-1')">4n-1</button>
  <button class="preset" onclick="setExpr('-n+3')">-n+3</button>
  <button class="preset" onclick="setExpr('-n+5')">-n+5</button>
  <button class="preset" onclick="setExpr('n+4')">n+4</button>
  <button class="preset" onclick="setExpr('5')">5</button>
</div>

<div class="grid-preview" id="grid"></div>

<div class="info-bar" id="info">
  <div class="info-item"><span class="info-label">Total items</span><span class="info-value" id="infoTotal">24</span></div>
  <div class="info-item"><span class="info-label">Matched</span><span class="info-value" id="infoMatched">0</span></div>
  <div class="info-item"><span class="info-label">Match indices</span><span class="info-value" id="infoIndices">—</span></div>
</div>

<div class="css-output" id="cssOutput"></div>
<div class="explanation" id="explanation"></div>
</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);

function parseNth(expr) {
  expr = expr.trim().toLowerCase();
  if (expr === 'odd') return { a: 2, b: 1 };
  if (expr === 'even') return { a: 2, b: 0 };

  // Match An+B patterns
  const m = expr.match(/^([+-]?\d*)?n([+-]\d+)?$/);
  if (m) {
    let a = m[1];
    if (a === '' || a === '+') a = 1;
    else if (a === '-') a = -1;
    else a = parseInt(a, 10);
    const b = m[2] ? parseInt(m[2], 10) : 0;
    return { a, b };
  }

  // Pure number
  const num = parseInt(expr, 10);
  if (!isNaN(num)) return { a: 0, b: num };

  return null;
}

function matchesNth(a, b, index) {
  // index is 1-based
  if (a === 0) return index === b;
  // a*n + b = index  =>  n = (index - b) / a, n >= 0
  const n = (index - b) / a;
  return n >= 0 && Number.isInteger(n);
}

function explain(expr, parsed, selectorType) {
  if (!parsed) return 'Invalid expression. Use formats like: <strong>2n+1</strong>, <strong>odd</strong>, <strong>even</strong>, <strong>3n</strong>, <strong>-n+5</strong>, or a number.';

  const { a, b } = parsed;
  const pseudo = ':' + selectorType;
  const isLast = selectorType.includes('last');
  const direction = isLast ? 'from the end' : 'from the start';

  if (a === 0 && b > 0) return `Selects only the <strong>${ordinal(b)}</strong> child ${direction}.`;
  if (a === 2 && b === 1) return `Selects <strong>odd</strong> children ${direction} (1st, 3rd, 5th, ...).`;
  if (a === 2 && b === 0) return `Selects <strong>even</strong> children ${direction} (2nd, 4th, 6th, ...).`;
  if (a > 0 && b === 0) return `Selects every <strong>${ordinal(a)}</strong> child ${direction} (${a}, ${a*2}, ${a*3}, ...).`;
  if (a > 0 && b > 0) return `Selects every <strong>${ordinal(a)}</strong> child ${direction}, starting from the <strong>${ordinal(b)}</strong> (${b}, ${b+a}, ${b+a*2}, ...).`;
  if (a > 0 && b < 0) return `Selects every <strong>${ordinal(a)}</strong> child ${direction}, starting from position <strong>${a + b}</strong>.`;
  if (a < 0 && b > 0) return `Selects the first <strong>${b}</strong> children ${direction} (${Array.from({length: b}, (_, i) => i + 1).join(', ')}).`;
  if (a < 0 && b <= 0) return `Selects <strong>nothing</strong> — the expression never matches a positive index.`;

  return `Matches children where <strong>(index ${isLast ? 'from end' : ''} - ${b}) / ${a}</strong> is a non-negative integer.`;
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function update() {
  const expr = $('expression').value.trim();
  const count = Math.min(100, Math.max(1, parseInt($('count').value, 10) || 24));
  const selectorType = $('selector').value;
  const isLast = selectorType.includes('last');

  const parsed = parseNth(expr);
  const grid = $('grid');
  const matched = [];

  // Build grid items
  let html = '';
  for (let i = 1; i <= count; i++) {
    const idx = isLast ? (count - i + 1) : i;
    const isMatch = parsed && matchesNth(parsed.a, parsed.b, idx);
    if (isMatch) matched.push(i);
    html += `<div class="grid-item${isMatch ? ' matched' : ''}">${i}</div>`;
  }
  grid.innerHTML = html;

  // Update info
  $('infoTotal').textContent = count;
  $('infoMatched').textContent = matched.length;
  $('infoIndices').textContent = matched.length > 0 ? matched.join(', ') : '—';

  // CSS output
  const pseudoFull = `:${selectorType}(${expr || '...'})`;
  $('cssOutput').innerHTML = `<span class="kw">li</span><span class="sel">${escHtml(pseudoFull)}</span> {\n  <span class="kw">background</span>: #111;\n  <span class="kw">color</span>: #fff;\n}`;

  // Explanation
  $('explanation').innerHTML = explain(expr, parsed, selectorType);

  // Update preset active state
  document.querySelectorAll('.preset').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === expr);
  });
}

function setExpr(expr) {
  $('expression').value = expr;
  update();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Initialize
update();
</script>
</body>
</html>
