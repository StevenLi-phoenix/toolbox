<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Diagram Editor — Live Preview & Export | DevToolbox</title>
    <meta name="description" content="Free online Mermaid diagram editor with live preview. Create flowcharts, sequence diagrams, class diagrams, Gantt charts and more. Export as SVG or PNG.">
    <meta name="keywords" content="mermaid, diagram editor, flowchart, sequence diagram, class diagram, gantt chart, mermaid.js, live preview, svg export, png export, developer tool">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/mermaid.html">
    <meta property="og:title" content="Mermaid Diagram Editor — Live Preview & Export">
    <meta property="og:description" content="Free online Mermaid.js editor with live rendering. Create flowcharts, sequence diagrams, class diagrams and more. Export SVG/PNG.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/mermaid.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Mermaid Diagram Editor — Live Preview & Export">
    <meta name="twitter:description" content="Free online Mermaid.js editor with live rendering. Create flowcharts, sequence diagrams, class diagrams and more.">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
    <header>
        <h1>◇ <span>Mermaid</span> Diagram Editor</h1>
        <div class="header-actions">
            <button onclick="exportSVG()">Export SVG</button>
            <button onclick="exportPNG()">Export PNG</button>
            <button onclick="copyCode()">Copy Code</button>
            <button onclick="resetEditor()">Clear</button>
        </div>
    </header>

    <div class="templates">
        <button class="active" data-tpl="flowchart">Flowchart</button>
        <button data-tpl="sequence">Sequence</button>
        <button data-tpl="class">Class</button>
        <button data-tpl="state">State</button>
        <button data-tpl="er">ER Diagram</button>
        <button data-tpl="gantt">Gantt</button>
        <button data-tpl="pie">Pie Chart</button>
        <button data-tpl="gitgraph">Git Graph</button>
        <button data-tpl="mindmap">Mind Map</button>
    </div>

    <div class="main">
        <div class="editor-pane">
            <div class="pane-label">Editor</div>
            <textarea id="code" spellcheck="false" placeholder="Type Mermaid syntax here..."></textarea>
            <div class="status">
                <span id="statusText"></span>
                <span id="charCount"></span>
            </div>
        </div>
        <div class="preview-pane">
            <div class="pane-label">Preview</div>
            <div class="preview-container">
                <div id="preview"></div>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
        &nbsp;·&nbsp; Built with Mermaid.js
        &nbsp;·&nbsp; <a href="https://stevenli-phoenix.github.io/toolbox/">More Tools</a>
    </footer>

    <script>
    const templates = {
        flowchart: `graph TD
    A[Start] --> B{Is it working?}
    B -->|Yes| C[Great!]
    B -->|No| D[Debug]
    D --> E[Check logs]
    E --> B
    C --> F[Deploy 🚀]`,
        sequence: `sequenceDiagram
    participant Client
    participant Server
    participant Database

    Client->>Server: POST /api/login
    Server->>Database: Query user
    Database-->>Server: User found
    Server-->>Client: 200 OK + JWT token
    Client->>Server: GET /api/data (Bearer token)
    Server-->>Client: 200 OK + data`,
        class: `classDiagram
    class Animal {
        +String name
        +int age
        +makeSound() void
    }
    class Dog {
        +String breed
        +fetch() void
    }
    class Cat {
        +bool indoor
        +purr() void
    }
    Animal <|-- Dog
    Animal <|-- Cat`,
        state: `stateDiagram-v2
    [*] --> Idle
    Idle --> Processing : Submit
    Processing --> Success : Valid
    Processing --> Error : Invalid
    Error --> Idle : Retry
    Success --> [*]`,
        er: `erDiagram
    USERS ||--o{ ORDERS : places
    USERS {
        int id PK
        string name
        string email
    }
    ORDERS ||--|{ LINE_ITEMS : contains
    ORDERS {
        int id PK
        date created_at
        string status
    }
    PRODUCTS ||--o{ LINE_ITEMS : "ordered in"
    PRODUCTS {
        int id PK
        string name
        float price
    }`,
        gantt: `gantt
    title Project Timeline
    dateFormat YYYY-MM-DD
    section Design
        Wireframes       :a1, 2024-01-01, 7d
        Mockups          :a2, after a1, 5d
    section Development
        Frontend         :b1, after a2, 14d
        Backend          :b2, after a2, 14d
        Integration      :b3, after b1, 7d
    section Testing
        QA               :c1, after b3, 7d
        UAT              :c2, after c1, 5d`,
        pie: `pie title Browser Market Share (2024)
    "Chrome" : 65
    "Safari" : 18
    "Firefox" : 7
    "Edge" : 5
    "Other" : 5`,
        gitgraph: `gitGraph
    commit
    commit
    branch develop
    checkout develop
    commit
    commit
    checkout main
    merge develop
    commit
    branch feature
    checkout feature
    commit
    commit
    checkout develop
    merge feature
    checkout main
    merge develop
    commit`,
        mindmap: `mindmap
  root((Web Dev))
    Frontend
      HTML
      CSS
        Flexbox
        Grid
      JavaScript
        React
        Vue
    Backend
      Node.js
      Python
      Go
    DevOps
      Docker
      CI/CD
      Cloud`
    };

    const codeEl = document.getElementById('code');
    const previewEl = document.getElementById('preview');
    const statusText = document.getElementById('statusText');
    const charCount = document.getElementById('charCount');
    let debounceTimer;

    mermaid.initialize({
        startOnLoad: false,
        theme: 'dark',
        securityLevel: 'loose',
        fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
    });

    async function renderDiagram() {
        const code = codeEl.value.trim();
        charCount.textContent = code.length + ' chars';

        if (!code) {
            previewEl.innerHTML = '<span style="color:var(--text-dim)">Enter Mermaid syntax to see a preview</span>';
            statusText.innerHTML = '';
            return;
        }

        try {
            const { svg } = await mermaid.render('mermaid-output', code);
            previewEl.innerHTML = svg;
            statusText.innerHTML = '<span class="ok">✓ Rendered</span>';
        } catch (err) {
            const msg = (err.message || String(err)).replace(/</g, '&lt;');
            previewEl.innerHTML = '<div class="error-msg">' + msg + '</div>';
            statusText.innerHTML = '<span class="err">✗ Syntax error</span>';
            // Clean up mermaid's error artifacts
            const errEl = document.getElementById('dmermaid-output');
            if (errEl) errEl.remove();
        }
    }

    codeEl.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(renderDiagram, 400);
    });

    // Tab key support
    codeEl.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = codeEl.selectionStart;
            const end = codeEl.selectionEnd;
            codeEl.value = codeEl.value.substring(0, start) + '    ' + codeEl.value.substring(end);
            codeEl.selectionStart = codeEl.selectionEnd = start + 4;
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(renderDiagram, 400);
        }
    });

    // Template buttons
    document.querySelectorAll('.templates button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.templates button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            codeEl.value = templates[btn.dataset.tpl];
            renderDiagram();
        });
    });

    function getSVGSource() {
        const svg = previewEl.querySelector('svg');
        if (!svg) return null;
        const clone = svg.cloneNode(true);
        clone.removeAttribute('id');
        if (!clone.getAttribute('xmlns')) clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        return new XMLSerializer().serializeToString(clone);
    }

    function exportSVG() {
        const source = getSVGSource();
        if (!source) return alert('Nothing to export — render a diagram first.');
        const blob = new Blob([source], { type: 'image/svg+xml' });
        downloadBlob(blob, 'diagram.svg');
    }

    function exportPNG() {
        const source = getSVGSource();
        if (!source) return alert('Nothing to export — render a diagram first.');
        const svg = previewEl.querySelector('svg');
        const w = svg.viewBox.baseVal.width || svg.clientWidth || 800;
        const h = svg.viewBox.baseVal.height || svg.clientHeight || 600;
        const scale = 2;
        const canvas = document.createElement('canvas');
        canvas.width = w * scale;
        canvas.height = h * scale;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
            ctx.fillStyle = '#1a1d27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(blob => downloadBlob(blob, 'diagram.png'), 'image/png');
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(source)));
    }

    function downloadBlob(blob, name) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function copyCode() {
        navigator.clipboard.writeText(codeEl.value).then(() => {
            const btn = document.querySelector('.header-actions button:nth-child(3)');
            const orig = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = orig, 1500);
        });
    }

    function resetEditor() {
        codeEl.value = '';
        previewEl.innerHTML = '<span style="color:var(--text-dim)">Enter Mermaid syntax to see a preview</span>';
        statusText.innerHTML = '';
        charCount.textContent = '0 chars';
        document.querySelectorAll('.templates button').forEach(b => b.classList.remove('active'));
    }

    // Init with flowchart
    codeEl.value = templates.flowchart;
    renderDiagram();
    </script>
</body>
</html>
