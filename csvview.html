<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
header{background:#161b22;border-bottom:1px solid #30363d;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
h1{font-size:1.25rem;font-weight:600;color:#e6edf3}
h1 span{color:#58a6ff}
.header-links{display:flex;gap:.75rem;align-items:center;font-size:.85rem}
.header-links a{color:#8b949e;text-decoration:none;transition:color .2s}
.header-links a:hover{color:#58a6ff}
.bmc{background:#ffdd00;color:#000;padding:.35rem .75rem;border-radius:6px;font-weight:600;font-size:.8rem;text-decoration:none;transition:opacity .2s}
.bmc:hover{opacity:.85;color:#000}
main{flex:1;padding:1.5rem;max-width:100%;overflow:hidden}
.input-section{margin-bottom:1rem}
textarea{width:100%;height:160px;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;padding:.75rem;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.85rem;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:#58a6ff}
textarea::placeholder{color:#484f58}
.toolbar{display:flex;gap:.5rem;flex-wrap:wrap;margin:.75rem 0;align-items:center}
button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:.45rem .9rem;border-radius:6px;font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap}
button:hover{background:#30363d;border-color:#58a6ff}
button.primary{background:#238636;border-color:#2ea043;color:#fff}
button.primary:hover{background:#2ea043}
button.danger{background:#da3633;border-color:#f85149;color:#fff}
button.danger:hover{background:#f85149}
.filter-bar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.75rem}
.filter-bar input{background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:.4rem .65rem;font-size:.8rem;outline:none;flex:1;min-width:150px;max-width:300px}
.filter-bar input:focus{border-color:#58a6ff}
.filter-bar select{background:#161b22;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:.4rem .5rem;font-size:.8rem;outline:none;cursor:pointer}
.stats{font-size:.8rem;color:#8b949e;margin-left:auto}
.table-wrap{overflow:auto;border:1px solid #30363d;border-radius:8px;max-height:65vh}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead{position:sticky;top:0;z-index:2}
th{background:#161b22;color:#e6edf3;padding:.55rem .75rem;text-align:left;border-bottom:2px solid #30363d;cursor:pointer;user-select:none;white-space:nowrap;position:relative}
th:hover{background:#1c2128}
th .sort-icon{margin-left:.3rem;font-size:.7rem;color:#58a6ff}
th .col-actions{position:absolute;right:4px;top:50%;transform:translateY(-50%);opacity:0;transition:opacity .2s}
th:hover .col-actions{opacity:1}
th .col-actions button{padding:2px 5px;font-size:.65rem;border:none;background:transparent;color:#f85149}
td{padding:.45rem .75rem;border-bottom:1px solid #21262d;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td[contenteditable]{cursor:text;outline:none;white-space:pre-wrap;overflow:visible;max-width:none}
td[contenteditable]:focus{background:#1c2128;box-shadow:inset 0 0 0 2px #58a6ff;border-radius:2px}
tr:hover td{background:#161b22}
tr.row-num td:first-child{color:#484f58;font-size:.75rem;width:40px;min-width:40px;text-align:center;padding:.45rem .35rem}
.drop-zone{border:2px dashed #30363d;border-radius:8px;padding:2rem;text-align:center;color:#8b949e;transition:all .2s;margin-bottom:.75rem;cursor:pointer}
.drop-zone.dragover{border-color:#58a6ff;background:#161b22;color:#58a6ff}
.drop-zone input[type=file]{display:none}
.empty-state{text-align:center;padding:3rem;color:#484f58}
.empty-state p{margin-top:.5rem;font-size:.9rem}
.delimiter-group{display:flex;gap:.35rem;align-items:center;font-size:.8rem;color:#8b949e}
.delimiter-group label{display:flex;align-items:center;gap:.2rem;cursor:pointer}
.delimiter-group input[type=radio]{accent-color:#58a6ff}
footer{text-align:center;padding:1rem;font-size:.8rem;color:#484f58;border-top:1px solid #21262d}
footer a{color:#58a6ff;text-decoration:none}
@media(max-width:640px){
  header{padding:.75rem 1rem}
  h1{font-size:1.05rem}
  main{padding:1rem}
  textarea{height:120px;font-size:.78rem}
  .toolbar{gap:.35rem}
  button{padding:.4rem .6rem;font-size:.75rem}
  td,th{padding:.35rem .5rem;font-size:.78rem}
  .table-wrap{max-height:50vh}
}
</style>
</head>
<body>
<header>
  <h1>📊 CSV <span>Viewer & Editor</span></h1>
  <div class="header-links">
    <a href="https://stevenli-phoenix.github.io/toolbox/">← All Tools</a>
    <a href="https://buymeacoffee.com/stevenli.phoenix" class="bmc" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
  </div>
</header>
<main>
  <div class="input-section">
    <div class="drop-zone" id="dropZone" tabindex="0">
      <p>📁 Drop a CSV file here or <strong>click to upload</strong></p>
      <input type="file" id="fileInput" accept=".csv,.tsv,.txt">
    </div>
    <textarea id="csvInput" placeholder="Or paste CSV data here...&#10;&#10;name,email,role&#10;Alice,alice@example.com,Engineer&#10;Bob,bob@example.com,Designer"></textarea>
    <div class="toolbar">
      <div class="delimiter-group">
        <span>Delimiter:</span>
        <label><input type="radio" name="delim" value="," checked> Comma</label>
        <label><input type="radio" name="delim" value="&#9;"> Tab</label>
        <label><input type="radio" name="delim" value="|"> Pipe</label>
        <label><input type="radio" name="delim" value=";">  Semi</label>
      </div>
      <label style="font-size:.8rem;color:#8b949e;display:flex;align-items:center;gap:.25rem;cursor:pointer">
        <input type="checkbox" id="hasHeader" checked style="accent-color:#58a6ff"> First row is header
      </label>
    </div>
    <div class="toolbar">
      <button class="primary" onclick="parseCSV()">▶ Parse & View</button>
      <button onclick="loadSample()">📋 Sample Data</button>
      <button onclick="clearAll()">✕ Clear</button>
    </div>
  </div>
  <div id="tableSection" style="display:none">
    <div class="filter-bar">
      <input type="text" id="filterInput" placeholder="🔍 Filter rows…" oninput="applyFilter()">
      <select id="filterCol" onchange="applyFilter()"><option value="-1">All columns</option></select>
      <button onclick="addRow()">+ Row</button>
      <button onclick="addCol()">+ Column</button>
      <button onclick="exportCSV()">⬇ Export CSV</button>
      <button onclick="copyTable()">📋 Copy</button>
      <span class="stats" id="stats"></span>
    </div>
    <div class="table-wrap" id="tableWrap"></div>
  </div>
  <div class="empty-state" id="emptyState">
    <p style="font-size:2rem">📊</p>
    <p>Paste CSV data above or drop a file to get started</p>
  </div>
</main>
<footer>
  CSV Viewer & Editor — <a href="https://stevenli-phoenix.github.io/toolbox/">DevToolbox</a> by <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">Steven Li</a>
</footer>
<script>
let headers=[], rows=[], sortCol=-1, sortAsc=true;

function getDelimiter(){return document.querySelector('input[name="delim"]:checked').value}

function parseCSVText(text,delim){
  const result=[];let row=[],cell='',inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],next=text[i+1];
    if(inQuotes){
      if(c==='"'&&next==='"'){cell+='"';i++}
      else if(c==='"'){inQuotes=false}
      else{cell+=c}
    }else{
      if(c==='"'){inQuotes=true}
      else if(c===delim){row.push(cell);cell=''}
      else if(c==='\n'||(c==='\r'&&next==='\n')){
        if(c==='\r')i++;
        row.push(cell);cell='';
        if(row.length>1||row[0]!=='')result.push(row);
        row=[]
      }else{cell+=c}
    }
  }
  row.push(cell);
  if(row.length>1||row[0]!=='')result.push(row);
  return result
}

function parseCSV(){
  const text=document.getElementById('csvInput').value.trim();
  if(!text)return;
  const delim=getDelimiter();
  const parsed=parseCSVText(text,delim);
  if(parsed.length===0)return;
  const maxCols=Math.max(...parsed.map(r=>r.length));
  parsed.forEach(r=>{while(r.length<maxCols)r.push('')});
  if(document.getElementById('hasHeader').checked){
    headers=parsed.shift();
  }else{
    headers=Array.from({length:maxCols},(_,i)=>'Col '+(i+1));
  }
  rows=parsed;
  sortCol=-1;sortAsc=true;
  buildFilterSelect();
  renderTable();
  document.getElementById('tableSection').style.display='block';
  document.getElementById('emptyState').style.display='none';
}

function buildFilterSelect(){
  const sel=document.getElementById('filterCol');
  sel.innerHTML='<option value="-1">All columns</option>';
  headers.forEach((h,i)=>{const o=document.createElement('option');o.value=i;o.textContent=h;sel.appendChild(o)});
}

function renderTable(){
  const wrap=document.getElementById('tableWrap');
  const filter=document.getElementById('filterInput').value.toLowerCase();
  const filterColIdx=parseInt(document.getElementById('filterCol').value);
  let displayed=rows.map((r,i)=>({data:r,origIdx:i}));
  if(filter){
    displayed=displayed.filter(({data})=>{
      if(filterColIdx>=0)return data[filterColIdx]?.toLowerCase().includes(filter);
      return data.some(c=>c.toLowerCase().includes(filter));
    });
  }
  if(sortCol>=0){
    displayed.sort((a,b)=>{
      let va=a.data[sortCol]||'',vb=b.data[sortCol]||'';
      const na=parseFloat(va),nb=parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb)){return sortAsc?na-nb:nb-na}
      return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    });
  }
  let html='<table><thead><tr><th style="cursor:default;width:40px">#</th>';
  headers.forEach((h,i)=>{
    const icon=sortCol===i?(sortAsc?'▲':'▼'):'';
    html+=`<th onclick="sortBy(${i})">${esc(h)}<span class="sort-icon">${icon}</span><span class="col-actions"><button onclick="event.stopPropagation();deleteCol(${i})" title="Delete column">✕</button></span></th>`;
  });
  html+='</tr></thead><tbody>';
  displayed.forEach(({data,origIdx},di)=>{
    html+=`<tr class="row-num"><td>${origIdx+1}<br><button style="border:none;background:none;color:#f85149;font-size:.65rem;cursor:pointer;padding:0" onclick="deleteRow(${origIdx})" title="Delete row">✕</button></td>`;
    data.forEach((cell,ci)=>{
      html+=`<td contenteditable="true" data-row="${origIdx}" data-col="${ci}" onblur="cellEdit(this)">${esc(cell)}</td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
  document.getElementById('stats').textContent=`${displayed.length} of ${rows.length} rows · ${headers.length} cols`;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function cellEdit(el){
  const r=parseInt(el.dataset.row),c=parseInt(el.dataset.col);
  rows[r][c]=el.textContent;
}

function sortBy(col){
  if(sortCol===col){sortAsc=!sortAsc}else{sortCol=col;sortAsc=true}
  renderTable();
}

function applyFilter(){renderTable()}

function addRow(){
  rows.push(Array(headers.length).fill(''));
  renderTable();
  const wrap=document.getElementById('tableWrap');
  wrap.scrollTop=wrap.scrollHeight;
}

function addCol(){
  const name=prompt('Column name:','New Column');
  if(name===null)return;
  headers.push(name||'New Column');
  rows.forEach(r=>r.push(''));
  buildFilterSelect();
  renderTable();
}

function deleteRow(idx){
  rows.splice(idx,1);
  renderTable();
}

function deleteCol(idx){
  if(headers.length<=1)return;
  headers.splice(idx,1);
  rows.forEach(r=>r.splice(idx,1));
  if(sortCol===idx)sortCol=-1;
  else if(sortCol>idx)sortCol--;
  buildFilterSelect();
  renderTable();
}

function exportCSV(){
  const delim=getDelimiter();
  const csvRows=[headers.map(h=>quoteField(h,delim)).join(delim)];
  rows.forEach(r=>csvRows.push(r.map(c=>quoteField(c,delim)).join(delim)));
  const blob=new Blob([csvRows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='data.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function quoteField(val,delim){
  if(val.includes(delim)||val.includes('"')||val.includes('\n')){
    return '"'+val.replace(/"/g,'""')+'"';
  }
  return val;
}

function copyTable(){
  const tsv=[headers.join('\t'),...rows.map(r=>r.join('\t'))].join('\n');
  navigator.clipboard.writeText(tsv).then(()=>{
    const btn=event.target;btn.textContent='✓ Copied';setTimeout(()=>btn.textContent='📋 Copy',1500);
  });
}

function loadSample(){
  document.getElementById('csvInput').value=`name,email,role,salary,start_date
Alice Johnson,alice@example.com,Senior Engineer,145000,2019-03-15
Bob Smith,bob@example.com,UX Designer,98000,2021-07-01
Carol White,carol@example.com,Product Manager,135000,2018-11-20
David Lee,david@example.com,DevOps Engineer,128000,2020-01-10
Eva Martinez,eva@example.com,Data Scientist,152000,2019-08-22
Frank Brown,frank@example.com,Frontend Dev,105000,2022-02-14
Grace Kim,grace@example.com,Backend Dev,118000,2021-05-03
Henry Patel,henry@example.com,QA Lead,110000,2017-09-30
Ivy Chen,ivy@example.com,Security Analyst,140000,2020-06-18
Jack Taylor,jack@example.com,Mobile Dev,112000,2023-01-09`;
  document.querySelector('input[name="delim"][value=","]').checked=true;
  document.getElementById('hasHeader').checked=true;
  parseCSV();
}

function clearAll(){
  document.getElementById('csvInput').value='';
  document.getElementById('filterInput').value='';
  headers=[];rows=[];
  document.getElementById('tableSection').style.display='none';
  document.getElementById('emptyState').style.display='block';
  document.getElementById('tableWrap').innerHTML='';
}

// Drag & drop
const dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');handleFile(e.dataTransfer.files[0])});
fi.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0])});

function handleFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('csvInput').value=e.target.result;
    if(file.name.endsWith('.tsv'))document.querySelector('input[name="delim"][value="\\t"]').checked=true;
    parseCSV();
  };
  reader.readAsText(file);
}

// Keyboard: Enter in textarea
document.getElementById('csvInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();parseCSV()}
});
</script>
</body>
</html>
