<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Status Code Reference | DevToolbox</title>
    <meta name="description" content="Interactive HTTP status code reference. Search and browse all HTTP response codes with descriptions, common causes, and fix suggestions.">
    <meta name="keywords" content="HTTP status codes, HTTP response codes, 404, 500, 301, 200, REST API, web development, status code lookup">
    <meta name="author" content="Steven Li">
    <meta property="og:title" content="HTTP Status Code Reference | DevToolbox">
    <meta property="og:description" content="Interactive HTTP status code reference with search, filtering, and detailed explanations for every status code.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/httpstatus.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="HTTP Status Code Reference | DevToolbox">
    <meta name="twitter:description" content="Interactive HTTP status code reference with search, filtering, and detailed explanations.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/httpstatus.html">
    <link rel="stylesheet" href="toolbox.css">
<style>
  .stats-bar{display:flex;gap:12px;align-items:center;margin-bottom:12px;font-size:.85rem;color:var(--muted)}
  .search-bar{margin-bottom:14px}
  .search-bar input{width:100%;padding:10px 14px;font-size:.95rem}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .filter-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.82rem;cursor:pointer;font-weight:600}
  .filter-btn:hover{border-color:var(--accent);color:var(--text)}
  .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .category-section{margin-bottom:20px}
  .category-header{font-size:.9rem;font-weight:700;padding:8px 0;border-bottom:2px solid var(--border);margin-bottom:8px;color:var(--muted)}
  .cat-1xx .category-header{border-color:#6366f1}.cat-2xx .category-header{border-color:var(--success)}.cat-3xx .category-header{border-color:var(--warning)}.cat-4xx .category-header{border-color:var(--error)}.cat-5xx .category-header{border-color:#dc2626}
  .status-card{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden;cursor:pointer;transition:border-color .15s}
  .status-card:hover{border-color:var(--border2)}
  .status-card .card-header{display:flex;align-items:center;gap:10px;padding:10px 14px}
  .code-num{font-family:var(--mono);font-weight:700;font-size:1rem;min-width:36px}
  .code-name{font-weight:600;font-size:.9rem;flex:1}
  .badge-common{color:var(--warning);border-color:var(--warning)}
  .badge-cacheable{color:var(--success);border-color:var(--success)}
  .expand-icon{font-size:.75rem;color:var(--muted);transition:transform .15s}
  .status-card.expanded .expand-icon{transform:rotate(90deg)}
  .card-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
  .status-card.expanded .card-detail{display:block}
  .detail-section{padding:8px 0;border-bottom:1px solid var(--border)}
  .detail-section:last-child{border-bottom:none}
  .detail-label{font-size:.78rem;font-weight:600;text-transform:uppercase;color:var(--muted);letter-spacing:.04em;margin-bottom:4px}
  .detail-text{font-size:.88rem;line-height:1.6}
  .no-results{text-align:center;padding:24px;color:var(--muted);font-style:italic}
</style>
</head>
<body>
    <div class="container">
        <h1>HTTP Status Code Reference</h1>
        <p class="subtitle">Search &amp; browse every HTTP response status code</p>

        <div class="stats-bar">
            <div class="stat">Showing <strong id="visibleCount">0</strong> codes</div>
        </div>

        <div class="search-bar">
            <input type="text" id="search" placeholder="Search by code, name, or keyword... (e.g. 404, redirect, auth)" autofocus>
        </div>

        <div class="filters" id="filters"></div>
        <div id="results"></div>

        <div class="coffee">
            <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
        </div>
    </div>

<script>
const STATUS_CODES = [
    // 1xx Informational
    { code: 100, name: "Continue", cat: "1xx", desc: "The server has received the request headers, and the client should proceed to send the request body.", use: "Used with large request bodies. The client sends Expect: 100-continue header, and the server responds before the client sends the body.", tips: "Common in file uploads and PUT requests with large payloads.", common: false },
    { code: 101, name: "Switching Protocols", cat: "1xx", desc: "The server is switching protocols as requested by the client via the Upgrade header.", use: "WebSocket handshake — the server acknowledges the protocol switch from HTTP to WebSocket.", tips: "Look for this in browser DevTools when establishing WebSocket connections.", common: true },
    { code: 102, name: "Processing", cat: "1xx", desc: "The server has received and is processing the request, but no response is available yet.", use: "WebDAV. Prevents the client from timing out while the server processes a long request.", tips: "Rarely seen outside of WebDAV environments.", common: false },
    { code: 103, name: "Early Hints", cat: "1xx", desc: "Used to return some response headers before the final HTTP message.", use: "Allows the browser to start preloading resources (CSS, JS) while the server prepares the full response.", tips: "Send Link headers with rel=preload. Supported by modern browsers and CDNs like Cloudflare.", common: false },

    // 2xx Success
    { code: 200, name: "OK", cat: "2xx", desc: "The request has succeeded. The meaning depends on the HTTP method used.", use: "GET: resource returned. POST: result of action returned. Standard success response.", tips: "The most common HTTP status code. If your API returns 200 for errors, consider using proper status codes instead.", common: true, cacheable: true },
    { code: 201, name: "Created", cat: "2xx", desc: "The request has been fulfilled and a new resource has been created.", use: "Response to POST or PUT that creates a new resource. Should include a Location header pointing to the new resource.", tips: "Always return the created resource in the body and a Location header with the URI.", common: true },
    { code: 202, name: "Accepted", cat: "2xx", desc: "The request has been accepted for processing, but the processing is not complete.", use: "Async operations — the server acknowledges the request but will process it later.", tips: "Return a URL where the client can poll for status updates.", common: true },
    { code: 203, name: "Non-Authoritative Information", cat: "2xx", desc: "The returned metadata is not exactly the same as available from the origin server.", use: "A transforming proxy modified the response headers. The original 200 response was altered.", tips: "Rarely used intentionally. Usually set by proxy servers.", common: false },
    { code: 204, name: "No Content", cat: "2xx", desc: "The server successfully processed the request but is not returning any content.", use: "DELETE requests, or PUT/PATCH where no response body is needed. Also used for fire-and-forget endpoints.", tips: "Great for DELETE endpoints and form submissions that don't need a response body.", common: true },
    { code: 205, name: "Reset Content", cat: "2xx", desc: "The server successfully processed the request and asks the client to reset the document view.", use: "After a form submission, tells the browser to clear the form. Like 204 but with a reset instruction.", tips: "Almost never used in practice. Most apps handle form resets client-side.", common: false },
    { code: 206, name: "Partial Content", cat: "2xx", desc: "The server is delivering only part of the resource due to a Range header sent by the client.", use: "Video streaming, resumable downloads. The client requests byte ranges and the server delivers chunks.", tips: "Check for Content-Range header. Essential for video players and download managers.", common: true, cacheable: true },
    { code: 207, name: "Multi-Status", cat: "2xx", desc: "Conveys information about multiple resources in situations where multiple status codes might be appropriate.", use: "WebDAV batch operations. The response body contains XML with individual status codes per resource.", tips: "Used in WebDAV and some batch REST APIs. Check the XML body for per-item statuses.", common: false },
    { code: 208, name: "Already Reported", cat: "2xx", desc: "Used inside a DAV: propstat response to avoid repeatedly enumerating internal members of multiple bindings.", use: "WebDAV binding operations. Prevents duplicate listing of resources.", tips: "Very niche — only relevant in WebDAV environments.", common: false },
    { code: 226, name: "IM Used", cat: "2xx", desc: "The server has fulfilled a GET request for the resource, and the response represents instance-manipulations applied to the current instance.", use: "Delta encoding — the server sends only the changes since the last response.", tips: "Extremely rare. Related to RFC 3229 delta encoding.", common: false },

    // 3xx Redirection
    { code: 300, name: "Multiple Choices", cat: "3xx", desc: "The request has more than one possible response. The user or user agent should choose one.", use: "Content negotiation — multiple representations available (e.g., different languages or formats).", tips: "Rarely used. Most servers pick the best representation automatically.", common: false, cacheable: true },
    { code: 301, name: "Moved Permanently", cat: "3xx", desc: "The URL of the requested resource has been changed permanently. The new URL is given in the response.", use: "Domain migrations, HTTP→HTTPS redirects, URL restructuring. Search engines transfer link equity.", tips: "Browsers cache 301s aggressively. Use for permanent URL changes. The method may change to GET.", common: true, cacheable: true },
    { code: 302, name: "Found", cat: "3xx", desc: "The URI of requested resource has been changed temporarily. The client should use the same method for future requests.", use: "Temporary redirects — login pages, A/B testing, maintenance pages.", tips: "Historically, browsers changed POST to GET on 302. Use 307 if you need to preserve the method.", common: true },
    { code: 303, name: "See Other", cat: "3xx", desc: "The server sent this response to direct the client to get the requested resource at another URI with a GET request.", use: "After POST/PUT — redirect to a GET endpoint to prevent form resubmission (POST-Redirect-GET pattern).", tips: "Always changes the method to GET. Perfect after form submissions.", common: true },
    { code: 304, name: "Not Modified", cat: "3xx", desc: "Indicates that the resource has not been modified since the version specified by the request headers.", use: "Conditional requests with If-None-Match (ETag) or If-Modified-Since headers. Saves bandwidth.", tips: "No body is sent. The client uses its cached version. Check your ETag and Last-Modified headers.", common: true, cacheable: true },
    { code: 307, name: "Temporary Redirect", cat: "3xx", desc: "The server sends this to direct the client to get the requested resource at another URI with the same method.", use: "Like 302 but guarantees the HTTP method and body won't change. HSTS redirects use this.", tips: "Use instead of 302 when the request method must be preserved (e.g., POST stays POST).", common: true },
    { code: 308, name: "Permanent Redirect", cat: "3xx", desc: "The resource is now permanently located at another URI. The method and body must not change.", use: "Like 301 but guarantees the HTTP method won't change. Use for permanent API endpoint moves.", tips: "Use instead of 301 when you need to preserve the request method permanently.", common: true },

    // 4xx Client Error
    { code: 400, name: "Bad Request", cat: "4xx", desc: "The server cannot process the request due to something perceived to be a client error.", use: "Malformed syntax, invalid request framing, deceptive request routing, or invalid parameters.", tips: "Include a descriptive error message in the response body. Validate inputs and return specific field errors.", common: true },
    { code: 401, name: "Unauthorized", cat: "4xx", desc: "The client must authenticate itself to get the requested response.", use: "Missing or invalid authentication credentials. The server must send a WWW-Authenticate header.", tips: "Despite the name, this means 'unauthenticated', not 'unauthorized'. Use 403 for authorization failures.", common: true },
    { code: 402, name: "Payment Required", cat: "4xx", desc: "Reserved for future use. Originally intended for digital payment systems.", use: "Some APIs use this for billing/quota limits (e.g., Stripe, Shopify).", tips: "Not standardized yet, but commonly used for subscription/paywall scenarios.", common: false },
    { code: 403, name: "Forbidden", cat: "4xx", desc: "The client does not have access rights to the content. Unlike 401, the client's identity is known.", use: "Authenticated but not authorized. The user doesn't have permission for this resource.", tips: "Don't reveal whether the resource exists. Some APIs return 404 instead of 403 for security.", common: true },
    { code: 404, name: "Not Found", cat: "4xx", desc: "The server cannot find the requested resource. The URL is not recognized.", use: "The resource doesn't exist, or the server wants to hide its existence from unauthorized clients.", tips: "The most famous HTTP error. Create a custom 404 page. In APIs, return a helpful error message.", common: true, cacheable: true },
    { code: 405, name: "Method Not Allowed", cat: "4xx", desc: "The request method is known by the server but is not supported by the target resource.", use: "Sending POST to a read-only endpoint, or DELETE to a resource that doesn't support deletion.", tips: "The server must return an Allow header listing the supported methods.", common: true },
    { code: 406, name: "Not Acceptable", cat: "4xx", desc: "The server cannot produce a response matching the list of acceptable values in the request's Accept headers.", use: "Content negotiation failure — the server can't provide the format the client requested.", tips: "Usually related to Accept, Accept-Language, or Accept-Encoding headers.", common: false },
    { code: 407, name: "Proxy Authentication Required", cat: "4xx", desc: "Similar to 401, but authentication is needed for a proxy between the client and server.", use: "Corporate proxy servers that require credentials before forwarding requests.", tips: "The proxy must send a Proxy-Authenticate header. Configure proxy credentials in your HTTP client.", common: false },
    { code: 408, name: "Request Timeout", cat: "4xx", desc: "The server would like to shut down this unused connection.", use: "The client didn't produce a request within the time the server was prepared to wait.", tips: "Some servers send this on idle connections. Implement retry logic with backoff.", common: true },
    { code: 409, name: "Conflict", cat: "4xx", desc: "The request conflicts with the current state of the server.", use: "Edit conflicts, duplicate resources, optimistic locking failures, conflicting state transitions.", tips: "Great for REST APIs — use when PUT/PATCH conflicts with another update (version mismatch).", common: true },
    { code: 410, name: "Gone", cat: "4xx", desc: "The content has been permanently deleted from the server, with no forwarding address.", use: "The resource existed but was intentionally removed. Unlike 404, this is permanent.", tips: "Search engines remove 410 pages faster than 404. Use for intentionally removed content.", common: true, cacheable: true },
    { code: 411, name: "Length Required", cat: "4xx", desc: "The server rejected the request because the Content-Length header is not defined.", use: "The server requires a Content-Length header for this request.", tips: "Ensure your HTTP client sends Content-Length for POST/PUT requests.", common: false },
    { code: 412, name: "Precondition Failed", cat: "4xx", desc: "The client has indicated preconditions in its headers which the server does not meet.", use: "Conditional requests with If-Match, If-Unmodified-Since that fail.", tips: "Common in optimistic concurrency control — the resource was modified since you last fetched it.", common: true },
    { code: 413, name: "Payload Too Large", cat: "4xx", desc: "The request entity is larger than limits defined by the server.", use: "File upload exceeds size limit, request body too large.", tips: "Check your server's max body size config (e.g., nginx client_max_body_size, Express limit).", common: true },
    { code: 414, name: "URI Too Long", cat: "4xx", desc: "The URI requested by the client is longer than the server is willing to interpret.", use: "Extremely long query strings, usually from client bugs or GET requests that should be POST.", tips: "Most servers limit URIs to 8KB. If your URL is too long, switch to POST with a request body.", common: false },
    { code: 415, name: "Unsupported Media Type", cat: "4xx", desc: "The media format of the requested data is not supported by the server.", use: "Sending JSON to an endpoint that only accepts XML, or wrong Content-Type header.", tips: "Check your Content-Type header. Common mistake: forgetting to set application/json.", common: true },
    { code: 416, name: "Range Not Satisfiable", cat: "4xx", desc: "The range specified by the Range header field in the request cannot be fulfilled.", use: "Requested byte range is outside the size of the resource.", tips: "Check the Content-Range header in the response for the actual resource size.", common: false },
    { code: 417, name: "Expectation Failed", cat: "4xx", desc: "The expectation indicated by the Expect request header cannot be met by the server.", use: "Server can't meet the Expect: 100-continue header.", tips: "Rarely encountered. Some proxies don't support the Expect header.", common: false },
    { code: 418, name: "I'm a Teapot", cat: "4xx", desc: "The server refuses to brew coffee because it is, permanently, a teapot.", use: "Easter egg from RFC 2324 (Hyper Text Coffee Pot Control Protocol). Not a real status code.", tips: "Used as an easter egg by many APIs. Google has a fun 418 page at google.com/teapot.", common: false },
    { code: 421, name: "Misdirected Request", cat: "4xx", desc: "The request was directed at a server that is not able to produce a response.", use: "HTTP/2: the server is not configured for the combination of scheme and authority in the request URI.", tips: "Usually a TLS/SNI configuration issue with HTTP/2 connection coalescing.", common: false },
    { code: 422, name: "Unprocessable Entity", cat: "4xx", desc: "The request was well-formed but was unable to be followed due to semantic errors.", use: "Validation errors — the JSON/XML is valid but the content doesn't pass business rules.", tips: "Popular in REST APIs for input validation errors. Return field-level error details.", common: true },
    { code: 423, name: "Locked", cat: "4xx", desc: "The resource that is being accessed is locked.", use: "WebDAV — the resource is locked by another user or process.", tips: "Usually encountered in WebDAV or collaborative editing scenarios.", common: false },
    { code: 424, name: "Failed Dependency", cat: "4xx", desc: "The request failed because it depended on another request that failed.", use: "WebDAV — a dependent operation in a batch failed, causing this one to fail too.", tips: "Niche WebDAV status. Some batch APIs use it for cascading failures.", common: false },
    { code: 425, name: "Too Early", cat: "4xx", desc: "The server is unwilling to risk processing a request that might be replayed.", use: "TLS 1.3 early data (0-RTT). The server won't process the request to prevent replay attacks.", tips: "Related to TLS 1.3 0-RTT. The client should retry after the TLS handshake completes.", common: false },
    { code: 426, name: "Upgrade Required", cat: "4xx", desc: "The server refuses to perform the request using the current protocol.", use: "The server requires the client to switch to a different protocol (e.g., TLS).", tips: "The server should include an Upgrade header indicating required protocol(s).", common: false },
    { code: 428, name: "Precondition Required", cat: "4xx", desc: "The origin server requires the request to be conditional.", use: "The server wants If-Match or If-Unmodified-Since headers to prevent lost update problems.", tips: "Different from 412 — this says 'you must include a precondition', not 'your precondition failed'.", common: false },
    { code: 429, name: "Too Many Requests", cat: "4xx", desc: "The user has sent too many requests in a given amount of time (rate limiting).", use: "Rate limiting. The server should include Retry-After header indicating when to retry.", tips: "Implement exponential backoff. Check Retry-After, X-RateLimit-Remaining, and X-RateLimit-Reset headers.", common: true },
    { code: 431, name: "Request Header Fields Too Large", cat: "4xx", desc: "The server is unwilling to process the request because its header fields are too large.", use: "Cookies or other headers have grown too large for the server to process.", tips: "Common cause: too many or too large cookies. Try clearing cookies for the domain.", common: false },
    { code: 451, name: "Unavailable For Legal Reasons", cat: "4xx", desc: "The user agent requested a resource that cannot legally be provided.", use: "Government censorship, court orders, GDPR takedowns, DMCA.", tips: "Named after Fahrenheit 451. Should include a Link header to the legal authority requiring the block.", common: false },

    // 5xx Server Error
    { code: 500, name: "Internal Server Error", cat: "5xx", desc: "The server has encountered a situation it does not know how to handle.", use: "Unhandled exception, application crash, unexpected condition in server code.", tips: "Check server logs immediately. Never expose stack traces to clients in production.", common: true },
    { code: 501, name: "Not Implemented", cat: "5xx", desc: "The request method is not supported by the server and cannot be handled.", use: "The server doesn't recognize the request method or lacks the ability to fulfill it.", tips: "Different from 405: 501 means the server doesn't support the method at all, 405 means this resource doesn't.", common: false },
    { code: 502, name: "Bad Gateway", cat: "5xx", desc: "The server, while working as a gateway, got an invalid response from the upstream server.", use: "Reverse proxy (nginx, CloudFlare) can't reach the backend, or the backend returned garbage.", tips: "Check if your backend is running. Common with nginx → Node.js/Python setups. Check upstream server health.", common: true },
    { code: 503, name: "Service Unavailable", cat: "5xx", desc: "The server is not ready to handle the request. Common during maintenance or overload.", use: "Server overloaded, in maintenance mode, or temporarily unable to handle requests.", tips: "Include a Retry-After header. Show a maintenance page. Use for graceful degradation.", common: true },
    { code: 504, name: "Gateway Timeout", cat: "5xx", desc: "The server is acting as a gateway and cannot get a response from the upstream server in time.", use: "Reverse proxy timeout — the backend is too slow to respond.", tips: "Increase proxy timeout, optimize the slow endpoint, or add request queuing/async processing.", common: true },
    { code: 505, name: "HTTP Version Not Supported", cat: "5xx", desc: "The HTTP version used in the request is not supported by the server.", use: "Server doesn't support the HTTP protocol version the client used.", tips: "Very rare. Usually means a severely misconfigured client or ancient server.", common: false },
    { code: 506, name: "Variant Also Negotiates", cat: "5xx", desc: "Transparent content negotiation for the request results in a circular reference.", use: "Server configuration error in content negotiation — a chosen variant is itself configured to negotiate.", tips: "Fix your server's content negotiation configuration. Very rare.", common: false },
    { code: 507, name: "Insufficient Storage", cat: "5xx", desc: "The server is unable to store the representation needed to complete the request.", use: "WebDAV — the server ran out of disk space or storage quota.", tips: "Check disk space on the server. Clean up old files or increase storage.", common: false },
    { code: 508, name: "Loop Detected", cat: "5xx", desc: "The server detected an infinite loop while processing the request.", use: "WebDAV — processing a request with Depth: infinity encountered a loop.", tips: "Check for circular references in your resource hierarchy.", common: false },
    { code: 510, name: "Not Extended", cat: "5xx", desc: "Further extensions to the request are required for the server to fulfill it.", use: "The server requires a specific extension that the client didn't include.", tips: "Extremely rare. Related to HTTP Extension Framework (RFC 2774).", common: false },
    { code: 511, name: "Network Authentication Required", cat: "5xx", desc: "The client needs to authenticate to gain network access.", use: "Captive portals — hotel/airport WiFi login pages that intercept HTTP requests.", tips: "Not from the origin server. Generated by network intermediaries (captive portals).", common: false },
];

const CATEGORIES = {
    '1xx': 'Informational',
    '2xx': 'Success',
    '3xx': 'Redirection',
    '4xx': 'Client Error',
    '5xx': 'Server Error'
};

let activeFilter = 'all';
let expandedCards = new Set();

function init() {
    const filtersEl = document.getElementById('filters');
    let html = `<button class="filter-btn active" data-filter="all">All</button>`;
    for (const [key, label] of Object.entries(CATEGORIES)) {
        html += `<button class="filter-btn" data-filter="${key}">${key} ${label}</button>`;
    }
    html += `<button class="filter-btn" data-filter="common">⭐ Common</button>`;
    filtersEl.innerHTML = html;

    filtersEl.addEventListener('click', e => {
        if (!e.target.classList.contains('filter-btn')) return;
        activeFilter = e.target.dataset.filter;
        filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        render();
    });

    document.getElementById('search').addEventListener('input', render);
    render();
}

function render() {
    const query = document.getElementById('search').value.toLowerCase().trim();
    let filtered = STATUS_CODES;

    if (activeFilter === 'common') {
        filtered = filtered.filter(s => s.common);
    } else if (activeFilter !== 'all') {
        filtered = filtered.filter(s => s.cat === activeFilter);
    }

    if (query) {
        filtered = filtered.filter(s =>
            String(s.code).includes(query) ||
            s.name.toLowerCase().includes(query) ||
            s.desc.toLowerCase().includes(query) ||
            s.use.toLowerCase().includes(query) ||
            s.tips.toLowerCase().includes(query)
        );
    }

    document.getElementById('visibleCount').textContent = filtered.length;

    const grouped = {};
    for (const s of filtered) {
        if (!grouped[s.cat]) grouped[s.cat] = [];
        grouped[s.cat].push(s);
    }

    const resultsEl = document.getElementById('results');
    if (filtered.length === 0) {
        resultsEl.innerHTML = '<div class="no-results">No matching status codes found</div>';
        return;
    }

    let html = '';
    for (const cat of ['1xx', '2xx', '3xx', '4xx', '5xx']) {
        if (!grouped[cat]) continue;
        const expanded = expandedCards.has(cat);
        html += `<div class="category-section cat-${cat}">`;
        html += `<div class="category-header">${cat} — ${CATEGORIES[cat]}</div>`;
        for (const s of grouped[cat]) {
            const isExpanded = expandedCards.has(s.code);
            html += `<div class="status-card${isExpanded ? ' expanded' : ''}" data-code="${s.code}" onclick="toggleCard(${s.code})">`;
            html += `<div class="card-header">`;
            html += `<span class="code-num">${s.code}</span>`;
            html += `<span class="code-name">${s.name}</span>`;
            if (s.common) html += `<span class="badge badge-common">common</span>`;
            if (s.cacheable) html += `<span class="badge badge-cacheable">cacheable</span>`;
            html += `<span class="expand-icon">▶</span>`;
            html += `</div>`;
            html += `<div class="card-detail">`;
            html += `<div class="detail-section"><div class="detail-label">Description</div><div class="detail-text">${s.desc}</div></div>`;
            html += `<div class="detail-section"><div class="detail-label">When It's Used</div><div class="detail-text">${s.use}</div></div>`;
            html += `<div class="detail-section"><div class="detail-label">Tips</div><div class="detail-text">${s.tips}</div></div>`;
            html += `</div></div>`;
        }
        html += `</div>`;
    }
    resultsEl.innerHTML = html;
}

function toggleCard(code) {
    if (expandedCards.has(code)) expandedCards.delete(code);
    else expandedCards.add(code);
    render();
}

init();
</script>
</body>
</html>
