<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Dithering Tool — Retro Effects | Free Online Tool</title>
<meta name="description" content="Apply retro dithering effects to images. Floyd-Steinberg, Atkinson, ordered, Bayer dithering and more. Free, private, runs in your browser.">
<meta name="keywords" content="image dithering, Floyd-Steinberg, Atkinson dithering, ordered dithering, retro image effect, pixel art, halftone, image processing">
<meta property="og:title" content="Image Dithering Tool — Retro Effects">
<meta property="og:description" content="Apply retro dithering algorithms to images. Floyd-Steinberg, Atkinson, ordered, and more. Free & private.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/dither.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Image Dithering Tool — Retro Effects">
<meta name="twitter:description" content="Apply retro dithering algorithms to images. Runs entirely in your browser.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/dither.html">
<link rel="stylesheet" href="toolbox.css">
</head>
<body>
<header>
  <h1><span>▦</span> Image Dithering Tool</h1>
  <a class="coffee" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy me a coffee</a>
</header>
<main>
  <div class="drop-zone" id="dropZone">
    <p>Drop an image here or click to upload</p>
    <span class="hint">PNG, JPG, GIF, WebP — processed locally in your browser</span>
    <input type="file" id="fileInput" accept="image/*" class="hidden">
  </div>

  <div class="controls" id="controls" style="display:none">
    <div class="control-group">
      <label>Algorithm</label>
      <select id="algorithm">
        <option value="floydSteinberg">Floyd-Steinberg</option>
        <option value="atkinson">Atkinson</option>
        <option value="ordered2">Ordered 2×2 (Bayer)</option>
        <option value="ordered4">Ordered 4×4 (Bayer)</option>
        <option value="ordered8">Ordered 8×8 (Bayer)</option>
        <option value="stucki">Stucki</option>
        <option value="burkes">Burkes</option>
        <option value="sierra">Sierra</option>
        <option value="random">Random (noise)</option>
        <option value="threshold">Threshold (no dither)</option>
      </select>
    </div>
    <div class="control-group">
      <label>Palette</label>
      <select id="palette">
        <option value="bw">Black & White</option>
        <option value="2bit">2-bit Gray (4 shades)</option>
        <option value="cga">CGA (4 colors)</option>
        <option value="gameboy">Game Boy</option>
        <option value="c64">Commodore 64</option>
        <option value="nes">NES</option>
        <option value="websafe">Web-Safe 216</option>
        <option value="custom">Custom...</option>
      </select>
    </div>
    <div class="control-group">
      <label>Scale <span class="range-val" id="scaleVal">100%</span></label>
      <input type="range" id="scale" min="10" max="100" value="100" step="5">
    </div>
    <div class="control-group">
      <label>Strength <span class="range-val" id="strengthVal">100%</span></label>
      <input type="range" id="strength" min="0" max="100" value="100" step="5">
    </div>
    <div class="control-group" style="justify-content:flex-end">
      <button class="btn-primary" id="applyBtn">Apply</button>
    </div>
    <div class="control-group" style="justify-content:flex-end">
      <button id="downloadBtn">Download PNG</button>
    </div>
  </div>

  <div class="palette-section hidden" id="customPaletteSection">
    <div class="control-group">
      <label>Custom Palette Colors (click to edit, right-click to remove)</label>
      <div class="palette-row" id="paletteRow"></div>
      <button id="addColorBtn" style="margin-top:.4rem;font-size:.8rem">+ Add Color</button>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap" style="display:none">
    <div class="canvas-panel">
      <h3>Original</h3>
      <div class="canvas-container"><canvas id="srcCanvas"></canvas></div>
    </div>
    <div class="canvas-panel">
      <h3>Dithered</h3>
      <div class="canvas-container"><canvas id="dstCanvas"></canvas></div>
    </div>
  </div>
</main>
<footer>Image Dithering Tool — all processing happens in your browser. <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">Support this project ☕</a></footer>

<script>
const $ = s => document.querySelector(s);
const dropZone = $('#dropZone'), fileInput = $('#fileInput');
const srcCanvas = $('#srcCanvas'), dstCanvas = $('#dstCanvas');
const srcCtx = srcCanvas.getContext('2d'), dstCtx = dstCanvas.getContext('2d');
let srcImage = null;

// Palettes
const PALETTES = {
  bw: [[0,0,0],[255,255,255]],
  '2bit': [[0,0,0],[85,85,85],[170,170,170],[255,255,255]],
  cga: [[0,0,0],[0,255,255],[255,0,255],[255,255,255]],
  gameboy: [[15,56,15],[48,98,48],[139,172,15],[155,188,15]],
  c64: [[0,0,0],[255,255,255],[136,0,0],[170,255,238],[204,68,204],[0,204,85],[0,0,170],[238,238,119],[221,136,85],[102,68,0],[255,119,119],[51,51,51],[119,119,119],[170,255,102],[0,136,255],[187,187,187]],
  nes: [[0,0,0],[252,252,252],[188,188,188],[124,124,124],[168,0,16],[228,0,88],[216,0,204],[132,0,188],[32,0,188],[0,48,164],[0,88,0],[0,120,0],[0,104,56],[252,56,4],[252,116,96],[252,152,56],[240,188,60],[184,248,24],[88,216,84],[0,232,216],[120,120,120],[0,0,0],[104,68,252],[248,120,248],[120,188,236],[0,0,252]],
  websafe: (()=>{const p=[];for(let r=0;r<6;r++)for(let g=0;g<6;g++)for(let b=0;b<6;b++)p.push([r*51,g*51,b*51]);return p})(),
};
let customColors = [[0,0,0],[255,255,255],[255,0,0],[0,255,0],[0,0,255]];

// Bayer matrices
function bayerMatrix(n){
  if(n===1) return [[0]];
  const h=n/2, prev=bayerMatrix(h), m=Array.from({length:n},()=>new Array(n));
  for(let y=0;y<h;y++)for(let x=0;x<h;x++){
    const v=prev[y][x]*4;
    m[y][x]=v; m[y][x+h]=v+2; m[y+h][x]=v+3; m[y+h][x+h]=v+1;
  }
  return m;
}
const BAYER2=bayerMatrix(2),BAYER4=bayerMatrix(4),BAYER8=bayerMatrix(8);

function closestColor(r,g,b,pal){
  let best=0,bestD=Infinity;
  for(let i=0;i<pal.length;i++){
    const d=(r-pal[i][0])**2+(g-pal[i][1])**2+(b-pal[i][2])**2;
    if(d<bestD){bestD=d;best=i;}
  }
  return pal[best];
}

function getPalette(){
  const v=$('#palette').value;
  return v==='custom'?customColors:PALETTES[v];
}

function dither(imageData,algo,pal,strength){
  const w=imageData.width, h=imageData.height, d=new Uint8ClampedArray(imageData.data);
  const s=strength/100;

  function setErr(x,y,er,eg,eb,f){
    if(x<0||x>=w||y<0||y>=h)return;
    const i=(y*w+x)*4;
    d[i]+=er*f*s; d[i+1]+=eg*f*s; d[i+2]+=eb*f*s;
  }

  if(algo.startsWith('ordered')){
    const sz=algo==='ordered2'?2:algo==='ordered4'?4:8;
    const mat=sz===2?BAYER2:sz===4?BAYER4:BAYER8;
    const n2=sz*sz;
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const t=(mat[y%sz][x%sz]/n2-0.5)*s*64;
      const nr=d[i]+t, ng=d[i+1]+t, nb=d[i+2]+t;
      const c=closestColor(nr,ng,nb,pal);
      d[i]=c[0];d[i+1]=c[1];d[i+2]=c[2];
    }
  } else if(algo==='random'){
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const t=(Math.random()-0.5)*s*128;
      const c=closestColor(d[i]+t,d[i+1]+t,d[i+2]+t,pal);
      d[i]=c[0];d[i+1]=c[1];d[i+2]=c[2];
    }
  } else if(algo==='threshold'){
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const c=closestColor(d[i],d[i+1],d[i+2],pal);
      d[i]=c[0];d[i+1]=c[1];d[i+2]=c[2];
    }
  } else {
    // Error diffusion algorithms
    const kernels={
      floydSteinberg:[[1,0,7/16],[-1,1,3/16],[0,1,5/16],[1,1,1/16]],
      atkinson:[[1,0,1/8],[2,0,1/8],[-1,1,1/8],[0,1,1/8],[1,1,1/8],[0,2,1/8]],
      stucki:[[1,0,8/42],[2,0,4/42],[-2,1,2/42],[-1,1,4/42],[0,1,8/42],[1,1,4/42],[2,1,2/42],[-2,2,1/42],[-1,2,2/42],[0,2,4/42],[1,2,2/42],[2,2,1/42]],
      burkes:[[1,0,8/32],[2,0,4/32],[-2,1,2/32],[-1,1,4/32],[0,1,8/32],[1,1,4/32],[2,1,2/32]],
      sierra:[[1,0,5/32],[2,0,3/32],[-2,1,2/32],[-1,1,4/32],[0,1,5/32],[1,1,4/32],[2,1,2/32],[-1,2,2/32],[0,2,3/32],[1,2,2/32]],
    };
    const k=kernels[algo]||kernels.floydSteinberg;
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const or=d[i],og=d[i+1],ob=d[i+2];
      const c=closestColor(or,og,ob,pal);
      d[i]=c[0];d[i+1]=c[1];d[i+2]=c[2];
      const er=or-c[0],eg=og-c[1],eb=ob-c[2];
      for(const[dx,dy,f]of k) setErr(x+dx,y+dy,er,eg,eb,f);
    }
  }
  return new ImageData(d,w,h);
}

function loadImage(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      srcImage=img;
      drawOriginal();
      $('#controls').style.display='flex';
      $('#canvasWrap').style.display='grid';
      applyDither();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawOriginal(){
  const sc=$('#scale').value/100;
  const w=Math.round(srcImage.width*sc), h=Math.round(srcImage.height*sc);
  srcCanvas.width=w; srcCanvas.height=h;
  srcCtx.imageSmoothingEnabled=sc<1;
  srcCtx.drawImage(srcImage,0,0,w,h);
}

function applyDither(){
  if(!srcImage) return;
  drawOriginal();
  const sc=$('#scale').value/100;
  const w=srcCanvas.width, h=srcCanvas.height;
  dstCanvas.width=w; dstCanvas.height=h;
  const data=srcCtx.getImageData(0,0,w,h);
  const algo=$('#algorithm').value;
  const pal=getPalette();
  const str=+$('#strength').value;
  const result=dither(data,algo,pal,str);
  dstCtx.putImageData(result,0,0);
}

// Event listeners
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0])});
fileInput.addEventListener('change',()=>{if(fileInput.files[0])loadImage(fileInput.files[0])});

$('#applyBtn').addEventListener('click',applyDither);
$('#algorithm').addEventListener('change',applyDither);
$('#palette').addEventListener('change',()=>{
  $('#customPaletteSection').classList.toggle('hidden',$('#palette').value!=='custom');
  applyDither();
});
$('#scale').addEventListener('input',()=>{$('#scaleVal').textContent=$('#scale').value+'%'});
$('#scale').addEventListener('change',applyDither);
$('#strength').addEventListener('input',()=>{$('#strengthVal').textContent=$('#strength').value+'%'});
$('#strength').addEventListener('change',applyDither);

$('#downloadBtn').addEventListener('click',()=>{
  if(!srcImage) return;
  const a=document.createElement('a');
  a.download='dithered.png';
  a.href=dstCanvas.toDataURL('image/png');
  a.click();
});

// Custom palette
function renderPalette(){
  const row=$('#paletteRow');
  row.innerHTML='';
  customColors.forEach((c,i)=>{
    const sw=document.createElement('div');
    sw.className='palette-swatch';
    sw.style.background=`rgb(${c[0]},${c[1]},${c[2]})`;
    sw.title=`#${c.map(v=>v.toString(16).padStart(2,'0')).join('')}`;
    sw.addEventListener('click',()=>{
      const inp=document.createElement('input');
      inp.type='color';
      inp.value=`#${c.map(v=>v.toString(16).padStart(2,'0')).join('')}`;
      inp.addEventListener('input',()=>{
        const hex=inp.value;
        customColors[i]=[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
        renderPalette();
        applyDither();
      });
      inp.click();
    });
    sw.addEventListener('contextmenu',e=>{
      e.preventDefault();
      if(customColors.length>2){customColors.splice(i,1);renderPalette();applyDither();}
    });
    row.appendChild(sw);
  });
}
renderPalette();
$('#addColorBtn').addEventListener('click',()=>{
  customColors.push([128,128,128]);
  renderPalette();
  applyDither();
});
</script>
</body>
</html>
