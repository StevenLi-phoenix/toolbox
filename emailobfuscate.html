<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Obfuscator — Protect Emails From Scrapers | Free Online Tool</title>
<meta name="description" content="Free email obfuscator — protect email addresses from spam bots using HTML entities, character codes, JavaScript encoding, ROT13, and CSS direction tricks.">
<meta name="keywords" content="email obfuscator, anti-spam, scraper protection, html entities, email encoder, rot13 email">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/emailobfuscate.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .input-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .input-row input[type=text] {
    flex: 1; min-width: 260px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .95rem;
  }
  .methods { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .method { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; background: var(--surface2); }
  .method h3 { font-size: .95rem; margin: 0 0 4px; }
  .method .desc { font-size: .78rem; color: var(--muted); margin-bottom: 10px; line-height: 1.4; }
  .method .output {
    font-family: var(--mono); font-size: .8rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 12px; white-space: pre-wrap; word-break: break-all; max-height: 160px; overflow: auto;
  }
  .method .preview { margin-top: 8px; padding: 10px 12px; background: var(--bg); border: 1px dashed var(--border); border-radius: var(--radius); font-size: .88rem; }
  .method .preview a { color: var(--accent); }
  .method-actions { display: flex; gap: 8px; margin-top: 8px; }
  .score-row { display: flex; gap: 10px; align-items: center; font-size: .78rem; color: var(--muted); margin-top: 6px; }
  .score-pill { padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); font-family: var(--mono); font-size: .72rem; }
  .score-weak { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; }
  .score-med { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
  .score-strong { background: #dcfce7; color: #166534; border-color: #86efac; }
  .empty-hint { color: var(--muted); font-size: .85rem; padding: 24px; text-align: center; }
  /* Method 5: CSS direction trick */
  .rtl-trick { unicode-bidi: bidi-override; direction: rtl; }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>📧 Email Obfuscator</h1>
<p class="subtitle">Protect email addresses from scrapers with multiple obfuscation techniques. Everything runs locally — your address never leaves the browser.</p>

<div class="card">
  <div class="input-row">
    <input type="text" id="email" placeholder="you@example.com" value="hello@example.com" autocomplete="off" spellcheck="false">
    <button class="btn" id="genBtn">Generate</button>
  </div>
  <div id="methods" class="methods"></div>
</div>

</div>

<footer>
  Built with ☕ by Steven Li · No data leaves your browser
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
const $ = (id) => document.getElementById(id);

function isValidEmail(s) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
}

function htmlEntities(s) {
  return [...s].map(c => '&#' + c.charCodeAt(0) + ';').join('');
}
function htmlEntitiesHex(s) {
  return [...s].map(c => '&#x' + c.charCodeAt(0).toString(16) + ';').join('');
}
function percentEncode(s) {
  return [...s].map(c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0').toUpperCase()).join('');
}
function rot13(s) {
  return s.replace(/[a-zA-Z]/g, c => {
    const base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
  });
}
function escHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function buildMethods(email) {
  const [local, domain] = email.split('@');
  return [
    {
      name: '1. HTML Entities (decimal)',
      desc: 'Encode every character as a numeric HTML entity. Scrapers that parse raw HTML will miss it; browsers render it normally.',
      strength: 'weak',
      code: `<a href="mailto:${htmlEntities(email)}">${htmlEntities(email)}</a>`,
      preview: `<a href="mailto:${htmlEntities(email)}">${htmlEntities(email)}</a>`
    },
    {
      name: '2. HTML Entities (hex)',
      desc: 'Same as decimal entities but uses hex codes. Slightly less common and harder to detect with naive regex.',
      strength: 'weak',
      code: `<a href="mailto:${htmlEntitiesHex(email)}">${htmlEntitiesHex(email)}</a>`,
      preview: `<a href="mailto:${htmlEntitiesHex(email)}">${htmlEntitiesHex(email)}</a>`
    },
    {
      name: '3. URL Percent Encoding',
      desc: 'Percent-encode the email inside a mailto: link. Works with any browser and hides literal "@" from very naive bots.',
      strength: 'weak',
      code: `<a href="mailto:${percentEncode(email)}">${escHtml(email)}</a>`,
      preview: `<a href="mailto:${percentEncode(email)}">${escHtml(email)}</a>`
    },
    {
      name: '4. JavaScript Concatenation',
      desc: 'Splits the address across multiple string fragments assembled at runtime. Defeats bots that do not execute JavaScript.',
      strength: 'medium',
      code: `<span id="e"></span>
<script>
  var u = ${JSON.stringify(local)};
  var d = ${JSON.stringify(domain)};
  var a = u + String.fromCharCode(64) + d;
  var el = document.getElementById('e');
  el.innerHTML = '<a href="mailto:' + a + '">' + a + '</a>';
${'<'}/script>`,
      previewHtml: () => {
        const a = local + '@' + domain;
        return `<a href="mailto:${escHtml(a)}">${escHtml(a)}</a>`;
      }
    },
    {
      name: '5. ROT13 + JavaScript',
      desc: 'Email is stored ROT13-encoded and reversed at runtime. Decodes only after JS execution.',
      strength: 'medium',
      code: `<a id="e" href="#">email me</a>
<script>
(function(){
  var r = ${JSON.stringify(rot13(email))};
  var d = r.replace(/[a-zA-Z]/g, function(c){
    var b = c <= 'Z' ? 65 : 97;
    return String.fromCharCode((c.charCodeAt(0) - b + 13) % 26 + b);
  });
  var el = document.getElementById('e');
  el.href = 'mailto:' + d;
  el.textContent = d;
})();
${'<'}/script>`,
      previewHtml: () => `<a href="mailto:${escHtml(email)}">${escHtml(email)}</a>`
    },
    {
      name: '6. CSS direction:rtl Reversal',
      desc: 'Email is written backwards in the HTML and flipped visually with CSS. Not clickable — use when you just need a visible address.',
      strength: 'weak',
      code: `<style>.e{unicode-bidi:bidi-override;direction:rtl}</style>
<span class="e">${escHtml([...email].reverse().join(''))}</span>`,
      previewHtml: () => `<span class="rtl-trick">${escHtml([...email].reverse().join(''))}</span>`
    },
    {
      name: '7. Base64 + JavaScript',
      desc: 'Stores the email Base64-encoded. Requires JS to decode, blocking most static scrapers.',
      strength: 'medium',
      code: `<a id="e" href="#">contact</a>
<script>
(function(){
  var b = ${JSON.stringify(btoa(email))};
  var a = atob(b);
  var el = document.getElementById('e');
  el.href = 'mailto:' + a;
  el.textContent = a;
})();
${'<'}/script>`,
      previewHtml: () => `<a href="mailto:${escHtml(email)}">${escHtml(email)}</a>`
    },
    {
      name: '8. Replaceable Placeholder ("at" / "dot")',
      desc: 'Human-readable fallback. Works without JS but asks the reader to replace placeholders manually.',
      strength: 'weak',
      code: escHtml(`${local} [at] ${domain.replace(/\./g, ' [dot] ')}`),
      previewHtml: () => `${escHtml(local)} [at] ${escHtml(domain.replace(/\./g, ' [dot] '))}`
    }
  ];
}

function render() {
  const email = $('email').value.trim();
  const container = $('methods');
  container.innerHTML = '';
  if (!email) {
    container.innerHTML = '<div class="empty-hint">Enter an email address to generate obfuscated versions.</div>';
    return;
  }
  if (!isValidEmail(email)) {
    container.innerHTML = '<div class="empty-hint" style="color:var(--error)">Not a valid email address.</div>';
    return;
  }
  const methods = buildMethods(email);
  methods.forEach((m, idx) => {
    const div = document.createElement('div');
    div.className = 'method';
    const strClass = m.strength === 'strong' ? 'score-strong' : m.strength === 'medium' ? 'score-med' : 'score-weak';
    const previewHtml = m.previewHtml ? m.previewHtml() : m.preview;
    div.innerHTML = `
      <h3>${escHtml(m.name)}</h3>
      <div class="desc">${escHtml(m.desc)}</div>
      <div class="score-row">
        <span class="score-pill ${strClass}">strength: ${m.strength}</span>
      </div>
      <div class="output" id="out-${idx}"></div>
      <div class="method-actions">
        <button class="btn btn-secondary" data-copy="${idx}">Copy snippet</button>
      </div>
      <div class="desc" style="margin-top:10px">Preview:</div>
      <div class="preview">${previewHtml}</div>
    `;
    container.appendChild(div);
    // set the raw code as textContent so entities stay literal
    div.querySelector('#out-' + idx).textContent = m.code;
  });

  container.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.copy;
      navigator.clipboard.writeText(methods[idx].code);
      const toast = $('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    });
  });
}

$('genBtn').addEventListener('click', render);
$('email').addEventListener('input', render);
$('email').addEventListener('keydown', e => { if (e.key === 'Enter') render(); });
render();
</script>
</body>
</html>
