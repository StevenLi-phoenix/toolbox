<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Art Editor — Free Online Pixel Drawing Tool</title>
<meta name="description" content="Free online pixel art editor. Draw pixel art in your browser with customizable grid, color palette, undo/redo, mirror mode, and export to PNG. No signup required.">
<meta name="keywords" content="pixel art, pixel editor, pixel drawing, sprite editor, online pixel art, free pixel art tool, game art, retro art">
<meta name="author" content="Steven Li">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/pixelart.html">
<meta property="og:title" content="Pixel Art Editor — Free Online Drawing Tool">
<meta property="og:description" content="Draw pixel art in your browser. Customizable grid, color palette, undo/redo, mirror mode, and PNG export.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/pixelart.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Pixel Art Editor — Free Online Drawing Tool">
<meta name="twitter:description" content="Draw pixel art in your browser with color palette, mirror mode, and PNG export.">
<link rel="stylesheet" href="toolbox.css">
</head>
<body>
<header>
  <h1>🎨 Pixel Art Editor</h1>
  <a class="coffee" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
</header>
<div class="app">
  <div class="sidebar">
    <div>
      <h3>Tools</h3>
      <div class="tool-group">
        <button class="tool-btn active" data-tool="pen" title="Pen (P)">✏️</button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">🧹</button>
        <button class="tool-btn" data-tool="fill" title="Fill Bucket (F)">🪣</button>
        <button class="tool-btn" data-tool="picker" title="Color Picker (I)">💉</button>
        <button class="tool-btn" data-tool="line" title="Line (L)">📏</button>
        <button class="tool-btn" data-tool="rect" title="Rectangle (R)">⬜</button>
      </div>
    </div>
    <div>
      <h3>Color</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="color-current" id="colorPreview">
          <input type="color" class="color-input" id="colorPicker" value="#c9a0ff">
        </div>
        <span id="colorHex" style="font-size:.82rem;color:#aaa">#c9a0ff</span>
      </div>
      <div class="palette" id="palette" style="margin-top:8px"></div>
    </div>
    <div class="size-group">
      <h3>Canvas</h3>
      <label>W: <input type="number" id="gridW" value="32" min="4" max="128" step="1"></label>
      <label>H: <input type="number" id="gridH" value="32" min="4" max="128" step="1"></label>
      <button class="btn" id="resizeBtn">Resize</button>
    </div>
    <div>
      <h3>Options</h3>
      <div class="toggle-row"><label><input type="checkbox" id="gridToggle" checked> Grid Lines</label></div>
      <div class="toggle-row"><label><input type="checkbox" id="mirrorX"> Mirror X</label></div>
      <div class="toggle-row"><label><input type="checkbox" id="mirrorY"> Mirror Y</label></div>
    </div>
    <div>
      <h3>Actions</h3>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="btn" id="undoBtn">↩ Undo (Z)</button>
        <button class="btn" id="redoBtn">↪ Redo (Y)</button>
        <button class="btn primary" id="exportBtn">💾 Export PNG</button>
        <button class="btn danger" id="clearBtn">🗑 Clear</button>
      </div>
    </div>
  </div>
  <div class="canvas-area">
    <canvas id="pixelCanvas"></canvas>
    <div class="zoom-controls">
      <button id="zoomOut">−</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button id="zoomIn">+</button>
    </div>
  </div>
</div>
<footer>Pixel Art Editor — Free &amp; Open Source · <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">Support this project ☕</a></footer>

<script>
const PALETTE_COLORS = [
  '#000000','#ffffff','#ff0000','#00ff00','#0000ff',
  '#ffff00','#ff00ff','#00ffff','#ff8800','#88ff00',
  '#0088ff','#ff0088','#8800ff','#00ff88','#ff4444',
  '#44ff44','#4444ff','#ffaa44','#44ffaa','#aa44ff',
  '#c9a0ff','#a0ffc9','#ffc9a0','#666666','#333333',
];

let gridW = 32, gridH = 32;
let pixels = [];
let zoom = 12;
let currentColor = '#c9a0ff';
let currentTool = 'pen';
let drawing = false;
let history = [], historyIdx = -1;
let lineStart = null;
let rectStart = null;
let previewPixels = [];

const canvas = document.getElementById('pixelCanvas');
const ctx = canvas.getContext('2d');

function initGrid(w, h, old) {
  const p = [];
  for (let y = 0; y < h; y++) {
    p[y] = [];
    for (let x = 0; x < w; x++) {
      p[y][x] = (old && old[y] && old[y][x]) ? old[y][x] : null;
    }
  }
  return p;
}

function saveState() {
  history = history.slice(0, historyIdx + 1);
  history.push(JSON.parse(JSON.stringify(pixels)));
  historyIdx = history.length - 1;
  if (history.length > 100) { history.shift(); historyIdx--; }
}

function undo() {
  if (historyIdx > 0) { historyIdx--; pixels = JSON.parse(JSON.stringify(history[historyIdx])); render(); }
}

function redo() {
  if (historyIdx < history.length - 1) { historyIdx++; pixels = JSON.parse(JSON.stringify(history[historyIdx])); render(); }
}

function resizeCanvas() {
  canvas.width = gridW * zoom;
  canvas.height = gridH * zoom;
  render();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Checkerboard background for transparency
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const light = (x + y) % 2 === 0;
      ctx.fillStyle = light ? '#2a2d3a' : '#1e2030';
      ctx.fillRect(x * zoom, y * zoom, zoom, zoom);
    }
  }
  // Pixels
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      if (pixels[y][x]) {
        ctx.fillStyle = pixels[y][x];
        ctx.fillRect(x * zoom, y * zoom, zoom, zoom);
      }
    }
  }
  // Preview pixels (for line/rect)
  for (const pp of previewPixels) {
    ctx.fillStyle = currentColor;
    ctx.globalAlpha = 0.5;
    ctx.fillRect(pp.x * zoom, pp.y * zoom, zoom, zoom);
    ctx.globalAlpha = 1;
  }
  // Grid
  if (document.getElementById('gridToggle').checked && zoom >= 4) {
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= gridW; x++) {
      ctx.beginPath(); ctx.moveTo(x * zoom, 0); ctx.lineTo(x * zoom, gridH * zoom); ctx.stroke();
    }
    for (let y = 0; y <= gridH; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * zoom); ctx.lineTo(gridW * zoom, y * zoom); ctx.stroke();
    }
  }
}

function getPixelCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX ?? e.touches?.[0]?.clientX) - rect.left;
  const cy = (e.clientY ?? e.touches?.[0]?.clientY) - rect.top;
  const x = Math.floor(cx / zoom);
  const y = Math.floor(cy / zoom);
  return { x: Math.max(0, Math.min(gridW - 1, x)), y: Math.max(0, Math.min(gridH - 1, y)) };
}

function setPixel(x, y, color) {
  if (x < 0 || x >= gridW || y < 0 || y >= gridH) return;
  pixels[y][x] = color;
  const mirrorX = document.getElementById('mirrorX').checked;
  const mirrorY = document.getElementById('mirrorY').checked;
  if (mirrorX) { const mx = gridW - 1 - x; if (mx >= 0 && mx < gridW) pixels[y][mx] = color; }
  if (mirrorY) { const my = gridH - 1 - y; if (my >= 0 && my < gridH) pixels[my][x] = color; }
  if (mirrorX && mirrorY) { const mx = gridW - 1 - x, my = gridH - 1 - y; if (mx >= 0 && mx < gridW && my >= 0 && my < gridH) pixels[my][mx] = color; }
}

function floodFill(sx, sy, newColor) {
  const target = pixels[sy][sx];
  if (target === newColor) return;
  const stack = [[sx, sy]];
  const visited = new Set();
  while (stack.length) {
    const [x, y] = stack.pop();
    const key = `${x},${y}`;
    if (visited.has(key)) continue;
    if (x < 0 || x >= gridW || y < 0 || y >= gridH) continue;
    if (pixels[y][x] !== target) continue;
    visited.add(key);
    pixels[y][x] = newColor;
    stack.push([x-1,y],[x+1,y],[x,y-1],[x,y+1]);
  }
}

function bresenhamLine(x0, y0, x1, y1) {
  const pts = [];
  let dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  let sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  while (true) {
    pts.push({ x: x0, y: y0 });
    if (x0 === x1 && y0 === y1) break;
    let e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx) { err += dx; y0 += sy; }
  }
  return pts;
}

function rectOutline(x0, y0, x1, y1) {
  const pts = [];
  const minX = Math.min(x0, x1), maxX = Math.max(x0, x1);
  const minY = Math.min(y0, y1), maxY = Math.max(y0, y1);
  for (let x = minX; x <= maxX; x++) { pts.push({x, y: minY}); pts.push({x, y: maxY}); }
  for (let y = minY + 1; y < maxY; y++) { pts.push({x: minX, y}); pts.push({x: maxX, y}); }
  return pts;
}

function handleDown(e) {
  e.preventDefault();
  const {x, y} = getPixelCoords(e);
  drawing = true;
  if (currentTool === 'pen') {
    saveState();
    setPixel(x, y, currentColor);
    render();
  } else if (currentTool === 'eraser') {
    saveState();
    setPixel(x, y, null);
    render();
  } else if (currentTool === 'fill') {
    saveState();
    floodFill(x, y, currentColor);
    render();
    drawing = false;
  } else if (currentTool === 'picker') {
    if (pixels[y][x]) {
      currentColor = pixels[y][x];
      updateColorUI();
    }
    drawing = false;
  } else if (currentTool === 'line') {
    lineStart = {x, y};
  } else if (currentTool === 'rect') {
    rectStart = {x, y};
  }
}

function handleMove(e) {
  if (!drawing) return;
  e.preventDefault();
  const {x, y} = getPixelCoords(e);
  if (currentTool === 'pen') {
    setPixel(x, y, currentColor);
    render();
  } else if (currentTool === 'eraser') {
    setPixel(x, y, null);
    render();
  } else if (currentTool === 'line' && lineStart) {
    previewPixels = bresenhamLine(lineStart.x, lineStart.y, x, y);
    render();
  } else if (currentTool === 'rect' && rectStart) {
    previewPixels = rectOutline(rectStart.x, rectStart.y, x, y);
    render();
  }
}

function handleUp(e) {
  if (!drawing) return;
  const {x, y} = getPixelCoords(e);
  if (currentTool === 'line' && lineStart) {
    saveState();
    const pts = bresenhamLine(lineStart.x, lineStart.y, x, y);
    pts.forEach(p => setPixel(p.x, p.y, currentColor));
    lineStart = null;
    previewPixels = [];
    render();
  } else if (currentTool === 'rect' && rectStart) {
    saveState();
    const pts = rectOutline(rectStart.x, rectStart.y, x, y);
    pts.forEach(p => setPixel(p.x, p.y, currentColor));
    rectStart = null;
    previewPixels = [];
    render();
  }
  drawing = false;
}

canvas.addEventListener('mousedown', handleDown);
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mouseup', handleUp);
canvas.addEventListener('mouseleave', () => { drawing = false; previewPixels = []; render(); });
canvas.addEventListener('touchstart', handleDown, {passive: false});
canvas.addEventListener('touchmove', handleMove, {passive: false});
canvas.addEventListener('touchend', handleUp);

// Palette
const paletteEl = document.getElementById('palette');
PALETTE_COLORS.forEach(c => {
  const s = document.createElement('div');
  s.className = 'palette-swatch';
  s.style.background = c;
  if (c === currentColor) s.classList.add('active');
  s.addEventListener('click', () => {
    currentColor = c;
    updateColorUI();
  });
  paletteEl.appendChild(s);
});

function updateColorUI() {
  document.getElementById('colorPreview').style.background = currentColor;
  document.getElementById('colorPicker').value = currentColor;
  document.getElementById('colorHex').textContent = currentColor;
  document.querySelectorAll('.palette-swatch').forEach(s => {
    s.classList.toggle('active', s.style.backgroundColor === hexToRgbStr(currentColor));
  });
}

function hexToRgbStr(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

document.getElementById('colorPicker').addEventListener('input', e => {
  currentColor = e.target.value;
  updateColorUI();
});

// Tools
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const k = e.key.toLowerCase();
  if (k === 'p') selectTool('pen');
  else if (k === 'e') selectTool('eraser');
  else if (k === 'f') selectTool('fill');
  else if (k === 'i') selectTool('picker');
  else if (k === 'l') selectTool('line');
  else if (k === 'r') selectTool('rect');
  else if (k === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) { e.preventDefault(); undo(); }
  else if ((k === 'y' && (e.ctrlKey || e.metaKey)) || (k === 'z' && (e.ctrlKey || e.metaKey) && e.shiftKey)) { e.preventDefault(); redo(); }
});

function selectTool(t) {
  currentTool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
}

// Zoom
document.getElementById('zoomIn').addEventListener('click', () => { zoom = Math.min(40, zoom + 2); resizeCanvas(); updateZoomLabel(); });
document.getElementById('zoomOut').addEventListener('click', () => { zoom = Math.max(2, zoom - 2); resizeCanvas(); updateZoomLabel(); });
function updateZoomLabel() { document.getElementById('zoomLabel').textContent = Math.round(zoom / 12 * 100) + '%'; }

// Grid toggle
document.getElementById('gridToggle').addEventListener('change', render);

// Resize
document.getElementById('resizeBtn').addEventListener('click', () => {
  const w = parseInt(document.getElementById('gridW').value) || 32;
  const h = parseInt(document.getElementById('gridH').value) || 32;
  gridW = Math.max(4, Math.min(128, w));
  gridH = Math.max(4, Math.min(128, h));
  pixels = initGrid(gridW, gridH, pixels);
  saveState();
  resizeCanvas();
});

// Undo/Redo
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);

// Clear
document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm('Clear entire canvas?')) {
    saveState();
    pixels = initGrid(gridW, gridH);
    render();
  }
});

// Export PNG
document.getElementById('exportBtn').addEventListener('click', () => {
  const exp = document.createElement('canvas');
  // Export at 1px per pixel (actual pixel art resolution)
  const scale = Math.max(1, Math.ceil(512 / Math.max(gridW, gridH)));
  exp.width = gridW * scale;
  exp.height = gridH * scale;
  const ectx = exp.getContext('2d');
  ectx.imageSmoothingEnabled = false;
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      if (pixels[y][x]) {
        ectx.fillStyle = pixels[y][x];
        ectx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }
  const link = document.createElement('a');
  link.download = `pixelart-${gridW}x${gridH}.png`;
  link.href = exp.toDataURL('image/png');
  link.click();
});

// Init
pixels = initGrid(gridW, gridH);
saveState();
updateColorUI();
resizeCanvas();
</script>
</body>
</html>
