<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG Image Generator - Create Social Media Preview Images | Free Online Tool</title>

<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/ogimage.html">
<meta property="og:title" content="OG Image Generator - Create Social Media Preview Images">
<meta property="og:description" content="Create beautiful Open Graph images for social media sharing. Customize text, gradients, patterns, and export as PNG.">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="OG Image Generator - Free Social Preview Image Creator">

</head>
<body>
<div class="container">
<header>
<h1>OG Image Generator</h1>
<p>Create stunning social media preview images — export as PNG</p>
</header>
<div class="workspace">
<div class="preview-area">
<h2>Preview</h2>
<div class="canvas-wrap">
<canvas id="canvas"></canvas>
</div>
<div style="margin-top:16px;display:flex;gap:10px;width:100%;max-width:640px">
<button class="btn btn-primary" onclick="downloadImage()" style="flex:1">⬇ Download PNG</button>
<button class="btn btn-secondary" onclick="copyToClipboard()" style="flex:1;margin-top:0">📋 Copy to Clipboard</button>
</div>
</div>
<div class="controls">
<div class="section">
<div class="section-title">Canvas Size</div>
<div class="size-presets">
<button class="size-btn active" onclick="setSize(1200,630,this)">OG (1200×630)</button>
<button class="size-btn" onclick="setSize(1200,675,this)">Twitter (1200×675)</button>
<button class="size-btn" onclick="setSize(1080,1080,this)">Square (1080²)</button>
<button class="size-btn" onclick="setSize(1080,1350,this)">Portrait (1080×1350)</button>
<button class="size-btn" onclick="setSize(1920,1080,this)">Banner (1920×1080)</button>
</div>
</div>
<div class="section">
<div class="section-title">Background</div>
<div class="field">
<label>Gradient Presets</label>
<div class="presets" id="gradientPresets"></div>
</div>
<div class="row">
<div class="field">
<label>Color 1</label>
<div class="color-row">
<input type="color" id="bgColor1" value="#1a1a2e" oninput="updateGradientHex(this,'bgHex1');render()">
<input type="text" id="bgHex1" value="#1a1a2e" oninput="syncColor(this,'bgColor1');render()" style="font-size:.8rem">
</div>
</div>
<div class="field">
<label>Color 2</label>
<div class="color-row">
<input type="color" id="bgColor2" value="#16213e" oninput="updateGradientHex(this,'bgHex2');render()">
<input type="text" id="bgHex2" value="#16213e" oninput="syncColor(this,'bgColor2');render()" style="font-size:.8rem">
</div>
</div>
</div>
<div class="field">
<label>Gradient Angle</label>
<div class="range-wrap">
<input type="range" id="gradAngle" min="0" max="360" value="135" oninput="this.nextElementSibling.textContent=this.value+'°';render()">
<span>135°</span>
</div>
</div>
<div class="field">
<label>Pattern Overlay</label>
<div class="pattern-grid">
<button class="pattern-btn active" data-pattern="none" onclick="setPattern(this)">None</button>
<button class="pattern-btn" data-pattern="dots" onclick="setPattern(this)">Dots</button>
<button class="pattern-btn" data-pattern="grid" onclick="setPattern(this)">Grid</button>
<button class="pattern-btn" data-pattern="diagonal" onclick="setPattern(this)">Diagonal</button>
<button class="pattern-btn" data-pattern="noise" onclick="setPattern(this)">Noise</button>
<button class="pattern-btn" data-pattern="circles" onclick="setPattern(this)">Circles</button>
<button class="pattern-btn" data-pattern="waves" onclick="setPattern(this)">Waves</button>
<button class="pattern-btn" data-pattern="hexagons" onclick="setPattern(this)">Hexagons</button>
</div>
<div class="field">
<label>Pattern Opacity</label>
<div class="range-wrap">
<input type="range" id="patternOpacity" min="0" max="100" value="15" oninput="this.nextElementSibling.textContent=this.value+'%';render()">
<span>15%</span>
</div>
</div>
</div>
</div>
<div class="section">
<div class="section-title">Title</div>
<div class="field">
<textarea id="titleText" rows="2" oninput="render()" placeholder="Your awesome title here">Hello World</textarea>
</div>
<div class="row">
<div class="field">
<label>Font Size</label>
<div class="range-wrap">
<input type="range" id="titleSize" min="20" max="120" value="64" oninput="this.nextElementSibling.textContent=this.value;render()">
<span>64</span>
</div>
</div>
</div>
<div class="row">
<div class="field">
<label>Font</label>
<select id="titleFont" onchange="render()">
<option value="Inter, sans-serif">Inter</option>
<option value="Georgia, serif">Georgia</option>
<option value="'Courier New', monospace">Courier New</option>
<option value="system-ui, sans-serif" selected>System UI</option>
<option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
<option value="Verdana, sans-serif">Verdana</option>
<option value="Impact, sans-serif">Impact</option>
</select>
</div>
<div class="field">
<label>Weight</label>
<select id="titleWeight" onchange="render()">
<option value="400">Regular</option>
<option value="600">Semi-Bold</option>
<option value="700" selected>Bold</option>
<option value="900">Black</option>
</select>
</div>
</div>
<div class="row">
<div class="field">
<label>Color</label>
<div class="color-row">
<input type="color" id="titleColor" value="#ffffff" oninput="render()">
<input type="text" id="titleHex" value="#ffffff" oninput="syncColor(this,'titleColor');render()" style="font-size:.8rem">
</div>
</div>
<div class="field">
<label>Align</label>
<div class="align-btns">
<button class="align-btn active" data-align="left" onclick="setAlign(this,'title')">⫷</button>
<button class="align-btn" data-align="center" onclick="setAlign(this,'title')">☰</button>
<button class="align-btn" data-align="right" onclick="setAlign(this,'title')">⫸</button>
</div>
</div>
</div>
</div>
<div class="section">
<div class="section-title">Subtitle</div>
<div class="field">
<textarea id="subtitleText" rows="2" oninput="render()" placeholder="Optional subtitle or description"></textarea>
</div>
<div class="row">
<div class="field">
<label>Font Size</label>
<div class="range-wrap">
<input type="range" id="subtitleSize" min="12" max="60" value="28" oninput="this.nextElementSibling.textContent=this.value;render()">
<span>28</span>
</div>
</div>
</div>
<div class="row">
<div class="field">
<label>Color</label>
<div class="color-row">
<input type="color" id="subtitleColor" value="#a0a0b8" oninput="render()">
</div>
</div>
</div>
</div>
<div class="section">
<div class="section-title">Logo / Image</div>
<div class="logo-upload">
<label class="upload-btn" for="logoFile">Upload Logo</label>
<input type="file" id="logoFile" accept="image/*" style="display:none" onchange="loadLogo(this)">
<span id="logoName" style="font-size:.8rem;color:#666">No file</span>
<button class="align-btn" onclick="removeLogo()" title="Remove logo">✕</button>
</div>
<div class="row" style="margin-top:10px">
<div class="field">
<label>Logo Size</label>
<div class="range-wrap">
<input type="range" id="logoSize" min="20" max="200" value="60" oninput="this.nextElementSibling.textContent=this.value+'px';render()">
<span>60px</span>
</div>
</div>
<div class="field">
<label>Position</label>
<select id="logoPos" onchange="render()">
<option value="top-left">Top Left</option>
<option value="top-right">Top Right</option>
<option value="bottom-left" selected>Bottom Left</option>
<option value="bottom-right">Bottom Right</option>
</select>
</div>
</div>
</div>
<div class="section">
<div class="section-title">Author / Branding</div>
<div class="field">
<input type="text" id="authorText" placeholder="@username or site name" oninput="render()">
</div>
<div class="row">
<div class="field">
<label>Color</label>
<input type="color" id="authorColor" value="#888899" oninput="render()">
</div>
<div class="field">
<label>Position</label>
<select id="authorPos" onchange="render()">
<option value="bottom-left">Bottom Left</option>
<option value="bottom-right" selected>Bottom Right</option>
<option value="bottom-center">Bottom Center</option>
</select>
</div>
</div>
</div>
<div class="section">
<div class="section-title">Effects</div>
<div class="field">
<label>Vignette</label>
<div class="range-wrap">
<input type="range" id="vignette" min="0" max="100" value="0" oninput="this.nextElementSibling.textContent=this.value+'%';render()">
<span>0%</span>
</div>
</div>
<div class="field">
<label>Border Radius (visual)</label>
<div class="range-wrap">
<input type="range" id="borderRad" min="0" max="40" value="0" oninput="this.nextElementSibling.textContent=this.value+'px';render()">
<span>0px</span>
</div>
</div>
</div>
</div>
</div>
</div>
<footer>
<p>OG Image Generator — create social preview images in seconds.</p>
<a class="coffee-btn" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
</footer>
<script>
const C=document.getElementById('canvas');
const ctx=C.getContext('2d');
let W=1200,H=630;
let currentPattern='none';
let titleAlign='left';
let logoImg=null;

const gradients=[
['#0f0c29','#302b63'],['#1a1a2e','#16213e'],['#0d1b2a','#1b263b'],
['#2d1b69','#11998e'],['#ee0979','#ff6a00'],['#7f00ff','#e100ff'],
['#fc466b','#3f5efb'],['#11998e','#38ef7d'],['#2193b0','#6dd5ed'],
['#8e2de2','#4a00e0'],['#f12711','#f5af19'],['#000428','#004e92'],
['#1f1c2c','#928dab'],['#c31432','#240b36'],['#000000','#434343'],
['#0f2027','#2c5364']
];

function initPresets(){
const c=document.getElementById('gradientPresets');
gradients.forEach(([a,b],i)=>{
const d=document.createElement('div');
d.className='preset'+(i===1?' active':'');
d.style.background=`linear-gradient(135deg,${a},${b})`;
d.onclick=()=>{
document.querySelectorAll('.preset').forEach(p=>p.classList.remove('active'));
d.classList.add('active');
document.getElementById('bgColor1').value=a;
document.getElementById('bgHex1').value=a;
document.getElementById('bgColor2').value=b;
document.getElementById('bgHex2').value=b;
render();
};
c.appendChild(d);
});
}

function setSize(w,h,btn){
W=w;H=h;
document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
render();
}

function setPattern(btn){
document.querySelectorAll('.pattern-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
currentPattern=btn.dataset.pattern;
render();
}

function setAlign(btn,type){
btn.parentElement.querySelectorAll('.align-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
titleAlign=btn.dataset.align;
render();
}

function updateGradientHex(picker,hexId){
document.getElementById(hexId).value=picker.value;
}

function syncColor(hexInput,pickerId){
const v=hexInput.value;
if(/^#[0-9a-f]{6}$/i.test(v))document.getElementById(pickerId).value=v;
}

function loadLogo(input){
const f=input.files[0];
if(!f)return;
document.getElementById('logoName').textContent=f.name;
const r=new FileReader();
r.onload=e=>{
const img=new Image();
img.onload=()=>{logoImg=img;render()};
img.src=e.target.result;
};
r.readAsDataURL(f);
}

function removeLogo(){
logoImg=null;
document.getElementById('logoFile').value='';
document.getElementById('logoName').textContent='No file';
render();
}

function drawPattern(ctx,w,h,pattern,opacity){
if(pattern==='none'||opacity===0)return;
ctx.save();
ctx.globalAlpha=opacity/100;
ctx.strokeStyle='#ffffff';
ctx.fillStyle='#ffffff';
switch(pattern){
case'dots':
for(let x=20;x<w;x+=30)for(let y=20;y<h;y+=30){ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();}
break;
case'grid':
ctx.lineWidth=1;
for(let x=0;x<w;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
for(let y=0;y<h;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
break;
case'diagonal':
ctx.lineWidth=1;
for(let i=-h;i<w+h;i+=30){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+h,h);ctx.stroke();}
break;
case'noise':
const id=ctx.createImageData(w,h);
for(let i=0;i<id.data.length;i+=4){const v=Math.random()*255;id.data[i]=v;id.data[i+1]=v;id.data[i+2]=v;id.data[i+3]=20;}
ctx.putImageData(id,0,0);
break;
case'circles':
for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(w/2,h/2,(i+1)*Math.min(w,h)/10,0,Math.PI*2);ctx.lineWidth=1;ctx.stroke();}
break;
case'waves':
for(let y=40;y<h;y+=50){ctx.beginPath();for(let x=0;x<w;x++){ctx.lineTo(x,y+Math.sin(x/40)*15);}ctx.lineWidth=1;ctx.stroke();}
break;
case'hexagons':
const s=30;const hh=s*Math.sqrt(3);
for(let row=0;row<h/hh+1;row++){for(let col=0;col<w/(s*3)+1;col++){
const cx=col*s*3+(row%2?s*1.5:0);const cy=row*hh;
ctx.beginPath();
for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;ctx.lineTo(cx+s*Math.cos(a),cy+s*Math.sin(a));}
ctx.closePath();ctx.lineWidth=1;ctx.stroke();
}}
break;
}
ctx.restore();
}

function wrapText(ctx,text,maxWidth,fontSize){
const lines=[];
const paragraphs=text.split('\n');
paragraphs.forEach(para=>{
const words=para.split(' ');
let line='';
words.forEach(word=>{
const test=line?line+' '+word:word;
if(ctx.measureText(test).width>maxWidth&&line){
lines.push(line);line=word;
}else line=test;
});
if(line)lines.push(line);
});
return lines;
}

function render(){
C.width=W;C.height=H;
const c1=document.getElementById('bgColor1').value;
const c2=document.getElementById('bgColor2').value;
const angle=(+document.getElementById('gradAngle').value)*Math.PI/180;
const cx=W/2,cy=H/2;
const len=Math.sqrt(W*W+H*H)/2;
const x1=cx-Math.cos(angle)*len,y1=cy-Math.sin(angle)*len;
const x2=cx+Math.cos(angle)*len,y2=cy+Math.sin(angle)*len;
const grad=ctx.createLinearGradient(x1,y1,x2,y2);
grad.addColorStop(0,c1);grad.addColorStop(1,c2);
ctx.fillStyle=grad;
const br=+document.getElementById('borderRad').value*(W/600);
if(br>0){roundRect(ctx,0,0,W,H,br);ctx.fill();}
else{ctx.fillRect(0,0,W,H);}
if(br>0){ctx.save();roundRect(ctx,0,0,W,H,br);ctx.clip();}

drawPattern(ctx,W,H,currentPattern,+document.getElementById('patternOpacity').value);

// Vignette
const vig=+document.getElementById('vignette').value;
if(vig>0){
const vg=ctx.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W*0.8);
vg.addColorStop(0,'rgba(0,0,0,0)');
vg.addColorStop(1,`rgba(0,0,0,${vig/100})`);
ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

// Padding
const pad=W*0.06;
const contentW=W-pad*2;

// Title
const titleText=document.getElementById('titleText').value;
const titleSize=+document.getElementById('titleSize').value*(W/1200);
const titleFont=document.getElementById('titleFont').value;
const titleWeight=document.getElementById('titleWeight').value;
const titleColor=document.getElementById('titleColor').value;

ctx.fillStyle=titleColor;
ctx.font=`${titleWeight} ${titleSize}px ${titleFont}`;
ctx.textBaseline='top';
const tAlign=titleAlign;
ctx.textAlign=tAlign;

const lines=wrapText(ctx,titleText,contentW,titleSize);
const lineH=titleSize*1.2;
const totalTextH=lines.length*lineH;

// Subtitle
const subText=document.getElementById('subtitleText').value;
const subSize=+document.getElementById('subtitleSize').value*(W/1200);
const subColor=document.getElementById('subtitleColor').value;
let subLines=[];
if(subText){
ctx.font=`400 ${subSize}px ${titleFont}`;
subLines=wrapText(ctx,subText,contentW,subSize);
}
const subLineH=subSize*1.3;
const totalSubH=subLines.length*subLineH;
const gap=subText?titleSize*0.4:0;
const totalH=totalTextH+gap+totalSubH;
let startY=(H-totalH)/2;

// Draw title
ctx.font=`${titleWeight} ${titleSize}px ${titleFont}`;
ctx.fillStyle=titleColor;
const tx=tAlign==='left'?pad:tAlign==='right'?W-pad:W/2;
lines.forEach((line,i)=>{
ctx.fillText(line,tx,startY+i*lineH);
});

// Draw subtitle
if(subText){
ctx.font=`400 ${subSize}px ${titleFont}`;
ctx.fillStyle=subColor;
ctx.textAlign=tAlign;
const subY=startY+totalTextH+gap;
subLines.forEach((line,i)=>{
ctx.fillText(line,tx,subY+i*subLineH);
});
}

// Logo
if(logoImg){
const ls=+document.getElementById('logoSize').value*(W/1200);
const pos=document.getElementById('logoPos').value;
const ar=logoImg.width/logoImg.height;
const lw=ls*ar,lh=ls;
let lx=pad,ly=pad;
if(pos.includes('right'))lx=W-pad-lw;
if(pos.includes('bottom'))ly=H-pad-lh;
ctx.drawImage(logoImg,lx,ly,lw,lh);
}

// Author
const authorText=document.getElementById('authorText').value;
if(authorText){
const authorColor=document.getElementById('authorColor').value;
const authorPos=document.getElementById('authorPos').value;
const authorSize=18*(W/1200);
ctx.font=`500 ${authorSize}px ${titleFont}`;
ctx.fillStyle=authorColor;
ctx.textBaseline='bottom';
const ay=H-pad;
if(authorPos==='bottom-left'){ctx.textAlign='left';ctx.fillText(authorText,pad,ay);}
else if(authorPos==='bottom-right'){ctx.textAlign='right';ctx.fillText(authorText,W-pad,ay);}
else{ctx.textAlign='center';ctx.fillText(authorText,W/2,ay);}
}

if(br>0)ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
ctx.beginPath();
ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
ctx.closePath();
}

function downloadImage(){
const a=document.createElement('a');
a.download='og-image.png';
a.href=C.toDataURL('image/png');
a.click();
}

async function copyToClipboard(){
try{
const blob=await new Promise(r=>C.toBlob(r,'image/png'));
await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
alert('Copied to clipboard!');
}catch(e){alert('Copy failed — try downloading instead.');}
}

// Sync hex displays
document.getElementById('titleColor').addEventListener('input',function(){
document.getElementById('titleHex').value=this.value;
});

initPresets();
render();
</script>
</body>
</html>
