<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Builder — Instant Data Visualization | Free Online Tool</title>
    <meta name="description" content="Free online chart builder. Paste CSV or JSON data and instantly create bar, line, pie, doughnut, radar, and polar area charts. Export as PNG. No signup required.">
    <meta name="keywords" content="chart builder, data visualization, CSV to chart, JSON to chart, bar chart, pie chart, line chart, free chart maker, online chart tool">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/chartbuilder.html">
    <meta property="og:title" content="Chart Builder — Instant Data Visualization">
    <meta property="og:description" content="Paste CSV or JSON data and instantly create beautiful charts. Bar, line, pie, doughnut, radar, polar area. Export as PNG.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/chartbuilder.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Chart Builder — Instant Data Visualization">
    <meta name="twitter:description" content="Paste CSV or JSON data and instantly create beautiful charts. Export as PNG.">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3348;
            --text: #e4e4e7;
            --text2: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 10px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        header {
            text-align: center;
            padding: 2rem 0 1rem;
        }
        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p {
            color: var(--text2);
            font-size: 0.95rem;
            margin-top: 0.3rem;
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
        }
        .panel h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text);
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text2);
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.82rem;
            padding: 0.75rem;
            resize: vertical;
            min-height: 180px;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--accent); }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0.75rem 0;
            align-items: end;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        select, input[type="text"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            padding: 0.5rem 0.7rem;
            outline: none;
        }
        select:focus, input[type="text"]:focus { border-color: var(--accent); }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 1rem;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); }
        .btn-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }
        .chart-types {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .chart-type-btn {
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text2);
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .chart-type-btn:hover { border-color: var(--accent); color: var(--text); }
        .chart-type-btn.active {
            border-color: var(--accent);
            background: rgba(99,102,241,0.15);
            color: var(--accent-hover);
        }
        .chart-type-btn .icon { font-size: 1.3rem; display: block; margin-bottom: 0.15rem; }
        .chart-canvas-wrap {
            background: var(--surface2);
            border-radius: 8px;
            padding: 1rem;
            position: relative;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #chart-canvas { max-width: 100%; max-height: 500px; }
        .placeholder-msg {
            color: var(--text2);
            font-size: 0.9rem;
            text-align: center;
        }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
            color: var(--danger);
            padding: 0.6rem 0.8rem;
            font-size: 0.82rem;
            margin-top: 0.5rem;
            display: none;
        }
        .sample-btns {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .sample-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text2);
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sample-btn:hover { border-color: var(--accent); color: var(--accent-hover); }
        .color-scheme {
            display: flex;
            gap: 0.3rem;
            margin: 0.5rem 0;
        }
        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s;
        }
        .color-dot:hover, .color-dot.active { border-color: #fff; transform: scale(1.2); }
        .coffee {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
        }
        .coffee a {
            color: var(--accent-hover);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .coffee a:hover { text-decoration: underline; }
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text2);
            font-size: 0.8rem;
        }
        footer a { color: var(--accent-hover); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin: 0.5rem 0;
        }
        .checkbox-row input[type="checkbox"] { accent-color: var(--accent); }
        .checkbox-row label { margin-bottom: 0; font-size: 0.82rem; }

        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
            header h1 { font-size: 1.4rem; }
            .chart-types { grid-template-columns: repeat(3, 1fr); }
            .controls { flex-direction: column; }
            .control-group { width: 100%; }
            select, input[type="text"] { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Chart Builder</h1>
            <p>Paste your data, pick a chart type, get instant visualization</p>
        </header>

        <div class="layout">
            <div class="left-col">
                <div class="panel">
                    <h2>Data Input</h2>
                    <label for="data-input">Paste CSV or JSON data</label>
                    <textarea id="data-input" placeholder="CSV format:
Label,Value
January,65
February,59
March,80

Or JSON:
[{&quot;label&quot;:&quot;A&quot;,&quot;value&quot;:42},{&quot;label&quot;:&quot;B&quot;,&quot;value&quot;:73}]

Or multi-series CSV:
Month,Sales,Expenses
Jan,120,80
Feb,150,95
Mar,180,110"></textarea>
                    <div class="sample-btns">
                        <button class="sample-btn" onclick="loadSample('basic')">Basic</button>
                        <button class="sample-btn" onclick="loadSample('multi')">Multi-Series</button>
                        <button class="sample-btn" onclick="loadSample('json')">JSON</button>
                        <button class="sample-btn" onclick="loadSample('monthly')">Monthly</button>
                    </div>
                    <div class="error-msg" id="error-msg"></div>
                </div>

                <div class="panel" style="margin-top:1rem;">
                    <h2>Chart Type</h2>
                    <div class="chart-types">
                        <button class="chart-type-btn active" data-type="bar"><span class="icon">📊</span>Bar</button>
                        <button class="chart-type-btn" data-type="line"><span class="icon">📈</span>Line</button>
                        <button class="chart-type-btn" data-type="pie"><span class="icon">🥧</span>Pie</button>
                        <button class="chart-type-btn" data-type="doughnut"><span class="icon">🍩</span>Doughnut</button>
                        <button class="chart-type-btn" data-type="radar"><span class="icon">🕸️</span>Radar</button>
                        <button class="chart-type-btn" data-type="polarArea"><span class="icon">🎯</span>Polar</button>
                    </div>

                    <label>Color Palette</label>
                    <div class="color-scheme" id="palette-picker"></div>

                    <div class="controls">
                        <div class="control-group" style="flex:1;">
                            <label for="chart-title">Chart Title</label>
                            <input type="text" id="chart-title" placeholder="My Chart">
                        </div>
                    </div>

                    <div class="checkbox-row">
                        <input type="checkbox" id="show-legend" checked>
                        <label for="show-legend">Show Legend</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="show-grid" checked>
                        <label for="show-grid">Show Grid</label>
                    </div>
                    <div class="checkbox-row">
                        <input type="checkbox" id="show-values">
                        <label for="show-values">Show Values on Chart</label>
                    </div>

                    <div class="btn-row">
                        <button class="btn btn-primary" onclick="buildChart()">⚡ Build Chart</button>
                        <button class="btn btn-secondary" onclick="exportPNG()">📥 Export PNG</button>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="panel" style="height:100%;">
                    <h2>Preview</h2>
                    <div class="chart-canvas-wrap" id="chart-wrap">
                        <p class="placeholder-msg" id="placeholder">Paste data and click Build Chart to visualize</p>
                        <canvas id="chart-canvas" style="display:none;"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="coffee">
            <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee — Support Free Tools</a>
        </div>

        <footer>
            <p>Chart Builder — Part of the <a href="https://stevenli-phoenix.github.io/toolbox/">Developer Toolbox</a></p>
        </footer>
    </div>

    <script>
        const PALETTES = [
            { name: 'Indigo', colors: ['#6366f1','#8b5cf6','#a78bfa','#c084fc','#e879f9','#f472b6','#fb7185','#f97316','#eab308','#22c55e'] },
            { name: 'Ocean', colors: ['#0ea5e9','#06b6d4','#14b8a6','#10b981','#22c55e','#84cc16','#a3e635','#facc15','#f59e0b','#f97316'] },
            { name: 'Sunset', colors: ['#ef4444','#f97316','#f59e0b','#eab308','#facc15','#a3e635','#22c55e','#14b8a6','#06b6d4','#0ea5e9'] },
            { name: 'Pastel', colors: ['#93c5fd','#a5b4fc','#c4b5fd','#d8b4fe','#f0abfc','#f9a8d4','#fda4af','#fdba74','#fde047','#86efac'] },
            { name: 'Neon', colors: ['#00ff87','#00d4ff','#7b61ff','#ff6b9d','#c4ff0e','#ff8800','#ff0055','#bd00ff','#0099ff','#00ff44'] },
        ];

        let currentChart = null;
        let selectedType = 'bar';
        let selectedPalette = 0;

        // Init palette picker
        const palettePicker = document.getElementById('palette-picker');
        PALETTES.forEach((p, i) => {
            const dot = document.createElement('div');
            dot.className = 'color-dot' + (i === 0 ? ' active' : '');
            dot.style.background = `linear-gradient(135deg, ${p.colors[0]}, ${p.colors[2]})`;
            dot.title = p.name;
            dot.onclick = () => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                selectedPalette = i;
                buildChart();
            };
            palettePicker.appendChild(dot);
        });

        // Chart type buttons
        document.querySelectorAll('.chart-type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chart-type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedType = btn.dataset.type;
                buildChart();
            });
        });

        // Auto-rebuild on option changes
        ['show-legend','show-grid','show-values'].forEach(id => {
            document.getElementById(id).addEventListener('change', buildChart);
        });
        document.getElementById('chart-title').addEventListener('input', buildChart);

        const SAMPLES = {
            basic: `Language,Popularity
JavaScript,65
Python,60
TypeScript,42
Rust,28
Go,25
Java,38`,
            multi: `Quarter,Revenue,Costs,Profit
Q1,120,80,40
Q2,150,95,55
Q3,180,110,70
Q4,220,130,90`,
            json: `[
  {"label":"React","value":62},
  {"label":"Vue","value":35},
  {"label":"Angular","value":28},
  {"label":"Svelte","value":18},
  {"label":"Next.js","value":45}
]`,
            monthly: `Month,Users,Sessions
Jan,1200,3400
Feb,1350,3800
Mar,1500,4200
Apr,1800,5100
May,2100,5900
Jun,2400,6700`
        };

        function loadSample(key) {
            document.getElementById('data-input').value = SAMPLES[key];
            buildChart();
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        function parseData(raw) {
            raw = raw.trim();
            if (!raw) throw new Error('No data provided');

            // Try JSON
            if (raw.startsWith('[') || raw.startsWith('{')) {
                let arr = JSON.parse(raw);
                if (!Array.isArray(arr)) arr = [arr];
                if (arr.length === 0) throw new Error('Empty JSON array');

                const keys = Object.keys(arr[0]);
                // Find label key and value keys
                const labelKey = keys.find(k => typeof arr[0][k] === 'string') || keys[0];
                const valueKeys = keys.filter(k => k !== labelKey && !isNaN(Number(arr[0][k])));
                if (valueKeys.length === 0) throw new Error('No numeric columns found in JSON');

                return {
                    labels: arr.map(r => r[labelKey]),
                    datasets: valueKeys.map(k => ({
                        label: k,
                        data: arr.map(r => Number(r[k]))
                    }))
                };
            }

            // CSV
            const delim = raw.includes('\t') ? '\t' : ',';
            const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
            if (lines.length < 2) throw new Error('Need at least a header row and one data row');

            const headers = lines[0].split(delim).map(h => h.trim());
            const rows = lines.slice(1).map(l => l.split(delim).map(c => c.trim()));

            const labels = rows.map(r => r[0]);
            const datasets = [];
            for (let i = 1; i < headers.length; i++) {
                datasets.push({
                    label: headers[i],
                    data: rows.map(r => {
                        const v = parseFloat(r[i]);
                        return isNaN(v) ? 0 : v;
                    })
                });
            }

            if (datasets.length === 0) throw new Error('No numeric columns found');
            return { labels, datasets };
        }

        function buildChart() {
            const raw = document.getElementById('data-input').value;
            if (!raw.trim()) return;

            showError('');
            let parsed;
            try {
                parsed = parseData(raw);
            } catch (e) {
                showError(e.message);
                return;
            }

            const canvas = document.getElementById('chart-canvas');
            const placeholder = document.getElementById('placeholder');
            placeholder.style.display = 'none';
            canvas.style.display = 'block';

            if (currentChart) currentChart.destroy();

            const colors = PALETTES[selectedPalette].colors;
            const isPie = ['pie', 'doughnut', 'polarArea'].includes(selectedType);
            const showLegend = document.getElementById('show-legend').checked;
            const showGrid = document.getElementById('show-grid').checked;
            const showValues = document.getElementById('show-values').checked;
            const titleText = document.getElementById('chart-title').value;

            const datasets = parsed.datasets.map((ds, i) => {
                const base = {
                    label: ds.label,
                    data: ds.data,
                };
                if (isPie) {
                    base.backgroundColor = ds.data.map((_, j) => colors[j % colors.length] + 'cc');
                    base.borderColor = ds.data.map((_, j) => colors[j % colors.length]);
                    base.borderWidth = 2;
                } else {
                    const c = colors[i % colors.length];
                    base.backgroundColor = c + '66';
                    base.borderColor = c;
                    base.borderWidth = 2;
                    if (selectedType === 'line') {
                        base.tension = 0.3;
                        base.pointBackgroundColor = c;
                        base.pointRadius = 4;
                        base.fill = parsed.datasets.length === 1;
                    }
                    if (selectedType === 'radar') {
                        base.backgroundColor = c + '33';
                        base.pointBackgroundColor = c;
                    }
                }
                return base;
            });

            const config = {
                type: selectedType,
                data: { labels: parsed.labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: showLegend, labels: { color: '#e4e4e7', padding: 12 } },
                        title: {
                            display: !!titleText,
                            text: titleText,
                            color: '#e4e4e7',
                            font: { size: 16, weight: 600 }
                        },
                    },
                    scales: isPie ? {} : {
                        x: {
                            grid: { display: showGrid, color: '#2e334833' },
                            ticks: { color: '#9ca3af' }
                        },
                        y: {
                            grid: { display: showGrid, color: '#2e334866' },
                            ticks: { color: '#9ca3af' },
                            beginAtZero: true
                        }
                    }
                }
            };

            if (selectedType === 'radar') {
                config.options.scales = {
                    r: {
                        grid: { color: '#2e334866' },
                        angleLines: { color: '#2e334866' },
                        ticks: { color: '#9ca3af', backdropColor: 'transparent' },
                        pointLabels: { color: '#e4e4e7' }
                    }
                };
            }

            // Datalabels plugin (inline, lightweight)
            if (showValues) {
                config.options.plugins.datalabels = { display: false }; // no plugin, use custom
                config.options.animation = {
                    onComplete: function() {
                        const ctx = this.ctx;
                        ctx.font = '11px -apple-system, sans-serif';
                        ctx.fillStyle = '#e4e4e7';
                        ctx.textAlign = 'center';
                        this.data.datasets.forEach((ds, di) => {
                            const meta = this.getDatasetMeta(di);
                            meta.data.forEach((el, idx) => {
                                const val = ds.data[idx];
                                if (isPie) {
                                    const mid = el.tooltipPosition();
                                    ctx.fillText(val, mid.x, mid.y);
                                } else {
                                    ctx.fillText(val, el.x, el.y - 8);
                                }
                            });
                        });
                    }
                };
            }

            currentChart = new Chart(canvas.getContext('2d'), config);
        }

        function exportPNG() {
            if (!currentChart) return;
            const canvas = document.getElementById('chart-canvas');
            // Create a white-background version
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const ctx = tempCanvas.getContext('2d');
            ctx.fillStyle = '#1a1d27';
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            ctx.drawImage(canvas, 0, 0);

            const link = document.createElement('a');
            link.download = 'chart.png';
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
        }

        // Build on paste
        document.getElementById('data-input').addEventListener('paste', () => {
            setTimeout(buildChart, 100);
        });
    </script>
</body>
</html>
