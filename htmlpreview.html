<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live HTML/CSS/JS Editor — Online Code Playground</title>
<meta name="description" content="Free online HTML, CSS, and JavaScript editor with live preview. Write code and see results instantly — like a mini CodePen in your browser.">
<meta name="keywords" content="html editor, css editor, javascript editor, live preview, code playground, online ide, codepen alternative, web development, front-end tools">
<meta name="author" content="Steven Li">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/htmlpreview.html">
<meta property="og:title" content="Live HTML/CSS/JS Editor — Online Code Playground">
<meta property="og:description" content="Free online HTML, CSS, and JavaScript editor with live preview. Write code and see results instantly.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/htmlpreview.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Live HTML/CSS/JS Editor — Online Code Playground">
<meta name="twitter:description" content="Free online HTML, CSS, and JavaScript editor with live preview. Write code and see results instantly.">
<link rel="stylesheet" href="toolbox.css">
<style>
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);text-align:left}
  header h1{font-size:1rem;margin:0}
  .header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .auto-label{display:flex;align-items:center;gap:4px;font-size:.82rem;cursor:pointer}
  .template-dropdown{position:relative}
  .template-menu{display:none;position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);z-index:10;min-width:140px;box-shadow:var(--shadow-lg)}
  .template-menu.show{display:block}
  .template-menu button{display:block;width:100%;text-align:left;padding:6px 12px;border:none;background:none;font-size:.82rem;cursor:pointer;color:var(--text)}
  .template-menu button:hover{background:var(--surface2)}
  .layout-toggle{display:flex;gap:2px}
  .btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.green{color:var(--success);border-color:var(--success)}
  .main{display:flex;flex:1;min-height:0}
  .main.horizontal{flex-direction:column}
  .editors-panel{width:50%;display:flex;flex-direction:column;min-width:0}
  .main.horizontal .editors-panel{width:100%;height:50%}
  .editor-container{flex:1;min-height:0;position:relative}
  .editor-wrapper{display:none;height:100%}
  .editor-wrapper.active{display:block}
  .code-editor{width:100%;height:100%;resize:none;border:none;outline:none;padding:10px;font-family:var(--mono);font-size:.85rem;line-height:1.5;background:var(--bg);color:var(--text);box-sizing:border-box}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
  .html-dot{background:#e44d26}.css-dot{background:#264de4}.js-dot{background:#f0db4f}
  .divider{width:4px;cursor:col-resize;background:var(--border);flex-shrink:0}
  .divider.dragging{background:var(--accent)}
  .main.horizontal .divider{width:100%;height:4px;cursor:row-resize}
  .preview-panel{flex:1;display:flex;flex-direction:column;min-width:0}
  .preview-header{padding:6px 12px;font-size:.82rem;color:var(--muted);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .preview-frame{flex:1;border:none;width:100%;background:#fff}
  .console-panel{display:none;border-top:1px solid var(--border);max-height:200px;overflow:auto;font-family:var(--mono);font-size:.8rem}
  .console-panel.visible{display:block}
  .console-header{padding:4px 10px;font-size:.8rem;color:var(--muted);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .console-logs{padding:4px 10px}
  .console-log{padding:2px 0;border-bottom:1px solid var(--border)}
  .log-error{color:var(--error)}.log-warn{color:var(--warning)}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 14px;font-size:.78rem;color:var(--muted);border-top:1px solid var(--border)}
  .coffee-link{color:var(--muted);text-decoration:none}
  .coffee-link:hover{color:var(--text)}
  @media(max-width:768px){.main:not(.horizontal){flex-direction:column}.editors-panel{width:100%!important;height:50%}}
</style>
</head>
<body>

<header>
  <h1>&#x276E;/&#x276F; <span>Live Editor</span></h1>
  <div class="header-actions">
    <label class="auto-label"><input type="checkbox" id="autoRun" checked> Auto-run</label>
    <button class="btn accent" id="runBtn" title="Run (Ctrl+Enter)">&#9654; Run</button>
    <div class="template-dropdown">
      <button class="btn" id="templateBtn">Templates &#x25BE;</button>
      <div class="template-menu" id="templateMenu">
        <button data-tpl="blank">Blank</button>
        <button data-tpl="hello">Hello World</button>
        <button data-tpl="flexbox">Flexbox Layout</button>
        <button data-tpl="animation">CSS Animation</button>
        <button data-tpl="canvas">Canvas Drawing</button>
        <button data-tpl="fetch">Fetch API</button>
        <button data-tpl="clock">Live Clock</button>
      </div>
    </div>
    <button class="btn" id="consoleBtn" title="Toggle Console">Console</button>
    <button class="btn green" id="downloadBtn" title="Download as HTML">&#x2B07; Save</button>
    <div class="layout-toggle">
      <button class="btn" id="vertBtn" title="Side by side">&#x25EB;</button>
      <button class="btn" id="horizBtn" title="Top and bottom">&#x2B12;</button>
    </div>
  </div>
</header>

<div class="main" id="mainContainer">
  <div class="editors-panel" id="editorsPanel">
    <div class="tabs">
      <div class="tab active" data-target="html-editor"><span class="dot html-dot"></span>HTML</div>
      <div class="tab" data-target="css-editor"><span class="dot css-dot"></span>CSS</div>
      <div class="tab" data-target="js-editor"><span class="dot js-dot"></span>JS</div>
    </div>
    <div class="editor-container">
      <div class="editor-wrapper active" id="html-editor">
        <textarea class="code-editor" id="htmlCode" placeholder="Write HTML here..." spellcheck="false"></textarea>
      </div>
      <div class="editor-wrapper" id="css-editor">
        <textarea class="code-editor" id="cssCode" placeholder="Write CSS here..." spellcheck="false"></textarea>
      </div>
      <div class="editor-wrapper" id="js-editor">
        <textarea class="code-editor" id="jsCode" placeholder="Write JavaScript here..." spellcheck="false"></textarea>
      </div>
    </div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="preview-panel" id="previewPanel">
    <div class="preview-header">
      <span>Preview</span>
      <button class="btn" id="newWindowBtn" title="Open in new window" style="padding:2px 8px;font-size:11px">&#x2197; Pop Out</button>
    </div>
    <iframe class="preview-frame" id="preview" sandbox="allow-scripts allow-modals allow-forms allow-same-origin"></iframe>
    <div class="console-panel" id="consolePanel">
      <div class="console-header">
        <span>Console</span>
        <button class="btn" id="clearConsole" style="padding:1px 6px;font-size:10px">Clear</button>
      </div>
      <div class="console-logs" id="consoleLogs"></div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="statusText">Ready</span>
  <a class="coffee-link" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">&#x2615; Buy me a coffee</a>
</div>

<script>
const htmlCode=document.getElementById('htmlCode');
const cssCode=document.getElementById('cssCode');
const jsCode=document.getElementById('jsCode');
const preview=document.getElementById('preview');
const autoRun=document.getElementById('autoRun');
const consoleLogs=document.getElementById('consoleLogs');
const consolePanel=document.getElementById('consolePanel');
const mainContainer=document.getElementById('mainContainer');
const statusText=document.getElementById('statusText');

// Templates
const templates={
  blank:{html:'',css:'',js:''},
  hello:{
    html:'<div class="container">\n  <h1>Hello, World!</h1>\n  <p>Start editing to see changes live.</p>\n  <button id="clickMe">Click Me</button>\n  <p id="output"></p>\n</div>',
    css:'.container {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  min-height: 100vh;\n  font-family: system-ui, sans-serif;\n  background: #1a1a2e;\n  color: #eee;\n}\n\nh1 {\n  font-size: 2.5rem;\n  margin-bottom: 0.5rem;\n  background: linear-gradient(135deg, #667eea, #764ba2);\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n}\n\nbutton {\n  margin-top: 1rem;\n  padding: 10px 24px;\n  border: none;\n  border-radius: 8px;\n  background: #667eea;\n  color: white;\n  font-size: 1rem;\n  cursor: pointer;\n  transition: transform 0.2s;\n}\n\nbutton:hover {\n  transform: scale(1.05);\n}',
    js:'let count = 0;\ndocument.getElementById("clickMe").addEventListener("click", () => {\n  count++;\n  document.getElementById("output").textContent = `Clicked ${count} time${count !== 1 ? "s" : ""}!`;\n  console.log("Button clicked:", count);\n});'
  },
  flexbox:{
    html:'<div class="flex-container">\n  <div class="box">1</div>\n  <div class="box">2</div>\n  <div class="box">3</div>\n  <div class="box">4</div>\n  <div class="box">5</div>\n</div>',
    css:'body {\n  margin: 0;\n  min-height: 100vh;\n  background: #0f0f23;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n\n.flex-container {\n  display: flex;\n  gap: 12px;\n  padding: 20px;\n  flex-wrap: wrap;\n  justify-content: center;\n}\n\n.box {\n  width: 80px;\n  height: 80px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  border-radius: 12px;\n  font-family: system-ui;\n  font-size: 1.5rem;\n  font-weight: bold;\n  color: white;\n  transition: transform 0.3s;\n}\n\n.box:hover {\n  transform: scale(1.15) rotate(5deg);\n}\n\n.box:nth-child(1) { background: #ff6b6b; }\n.box:nth-child(2) { background: #feca57; }\n.box:nth-child(3) { background: #48dbfb; }\n.box:nth-child(4) { background: #ff9ff3; }\n.box:nth-child(5) { background: #54a0ff; }',
    js:'console.log("Try changing flex properties!");'
  },
  animation:{
    html:'<div class="scene">\n  <div class="orbit">\n    <div class="planet"></div>\n  </div>\n  <div class="star"></div>\n</div>',
    css:'body {\n  margin: 0;\n  min-height: 100vh;\n  background: #0a0a1a;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  overflow: hidden;\n}\n\n.scene { position: relative; width: 200px; height: 200px; }\n\n.star {\n  position: absolute;\n  top: 50%; left: 50%;\n  width: 40px; height: 40px;\n  margin: -20px;\n  background: #ffd700;\n  border-radius: 50%;\n  box-shadow: 0 0 40px #ffd700, 0 0 80px #ff8c00;\n  animation: pulse 2s ease-in-out infinite;\n}\n\n.orbit {\n  position: absolute;\n  inset: 0;\n  border: 1px dashed rgba(255,255,255,0.15);\n  border-radius: 50%;\n  animation: spin 4s linear infinite;\n}\n\n.planet {\n  position: absolute;\n  top: -8px; left: 50%;\n  width: 16px; height: 16px;\n  margin-left: -8px;\n  background: #48dbfb;\n  border-radius: 50%;\n  box-shadow: 0 0 12px #48dbfb;\n}\n\n@keyframes spin {\n  to { transform: rotate(360deg); }\n}\n\n@keyframes pulse {\n  0%, 100% { transform: scale(1); }\n  50% { transform: scale(1.15); }\n}',
    js:'console.log("Orbiting...");'
  },
  canvas:{
    html:'<canvas id="c"></canvas>',
    css:'body { margin: 0; overflow: hidden; background: #111; }',
    js:'const c = document.getElementById("c");\nconst ctx = c.getContext("2d");\nc.width = window.innerWidth;\nc.height = window.innerHeight;\n\nconst particles = Array.from({length: 100}, () => ({\n  x: Math.random() * c.width,\n  y: Math.random() * c.height,\n  r: Math.random() * 3 + 1,\n  dx: (Math.random() - 0.5) * 2,\n  dy: (Math.random() - 0.5) * 2,\n  hue: Math.random() * 360\n}));\n\nfunction draw() {\n  ctx.fillStyle = "rgba(17,17,17,0.1)";\n  ctx.fillRect(0, 0, c.width, c.height);\n  particles.forEach(p => {\n    ctx.beginPath();\n    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);\n    ctx.fillStyle = `hsl(${p.hue}, 80%, 60%)`;\n    ctx.fill();\n    p.x += p.dx; p.y += p.dy;\n    p.hue += 0.5;\n    if (p.x < 0 || p.x > c.width) p.dx *= -1;\n    if (p.y < 0 || p.y > c.height) p.dy *= -1;\n  });\n  requestAnimationFrame(draw);\n}\ndraw();\nconsole.log("Canvas particles running!");'
  },
  fetch:{
    html:'<div id="app">\n  <h2>Random User</h2>\n  <button id="fetchBtn">Fetch User</button>\n  <div id="card"></div>\n</div>',
    css:'body {\n  font-family: system-ui;\n  background: #1a1a2e;\n  color: #eee;\n  display: flex;\n  justify-content: center;\n  padding: 2rem;\n}\n\n#app { text-align: center; }\n\nbutton {\n  padding: 10px 20px;\n  border: none;\n  border-radius: 8px;\n  background: #e94560;\n  color: white;\n  font-size: 1rem;\n  cursor: pointer;\n  margin: 1rem 0;\n}\n\n#card {\n  margin-top: 1rem;\n  padding: 1rem;\n  background: rgba(255,255,255,0.05);\n  border-radius: 12px;\n  display: inline-block;\n}\n\n#card img {\n  border-radius: 50%;\n  width: 100px;\n  margin-bottom: 0.5rem;\n}',
    js:'document.getElementById("fetchBtn").addEventListener("click", async () => {\n  const card = document.getElementById("card");\n  card.innerHTML = "Loading...";\n  try {\n    const res = await fetch("https://randomuser.me/api/");\n    const data = await res.json();\n    const user = data.results[0];\n    card.innerHTML = `\n      <img src="${user.picture.large}" alt="avatar">\n      <h3>${user.name.first} ${user.name.last}</h3>\n      <p>${user.email}</p>\n      <p>${user.location.city}, ${user.location.country}</p>\n    `;\n    console.log("Fetched user:", user.name.first);\n  } catch (e) {\n    card.textContent = "Error: " + e.message;\n    console.error(e);\n  }\n});'
  },
  clock:{
    html:'<div class="clock" id="clock"></div>',
    css:'body {\n  margin: 0;\n  min-height: 100vh;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  background: #0a0a0a;\n}\n\n.clock {\n  font-family: "SF Mono", monospace;\n  font-size: 4rem;\n  font-weight: 200;\n  color: #0ff;\n  text-shadow: 0 0 20px rgba(0,255,255,0.5);\n  letter-spacing: 0.1em;\n}',
    js:'function tick() {\n  const now = new Date();\n  const h = String(now.getHours()).padStart(2, "0");\n  const m = String(now.getMinutes()).padStart(2, "0");\n  const s = String(now.getSeconds()).padStart(2, "0");\n  const ms = String(now.getMilliseconds()).padStart(3, "0");\n  document.getElementById("clock").textContent = `${h}:${m}:${s}.${ms}`;\n  requestAnimationFrame(tick);\n}\ntick();'
  }
};

// Load template
function loadTemplate(name){
  const t=templates[name];
  if(!t) return;
  htmlCode.value=t.html;
  cssCode.value=t.css;
  jsCode.value=t.js;
  run();
  saveToStorage();
  statusText.textContent=`Loaded template: ${name}`;
}

// Tabs
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.editor-wrapper').forEach(e=>e.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.target).classList.add('active');
    document.querySelector(`#${tab.dataset.target} textarea`).focus();
  });
});

// Template menu
const templateBtn=document.getElementById('templateBtn');
const templateMenu=document.getElementById('templateMenu');
templateBtn.addEventListener('click',e=>{e.stopPropagation();templateMenu.classList.toggle('show');});
document.addEventListener('click',()=>templateMenu.classList.remove('show'));
templateMenu.querySelectorAll('button').forEach(b=>{
  b.addEventListener('click',()=>{loadTemplate(b.dataset.tpl);templateMenu.classList.remove('show');});
});

// Run
let runTimeout;
function run(){
  const consoleScript=`
<script>
(function(){
  const _post=(t,a)=>{try{parent.postMessage({type:'console',level:t,args:a.map(x=>{try{return typeof x==='object'?JSON.stringify(x,null,2):String(x)}catch(e){return String(x)}})},'*')}catch(e){}};
  const _orig={log:console.log,warn:console.warn,error:console.error,info:console.info};
  console.log=(...a)=>{_orig.log(...a);_post('info',a)};
  console.warn=(...a)=>{_orig.warn(...a);_post('warn',a)};
  console.error=(...a)=>{_orig.error(...a);_post('error',a)};
  console.info=(...a)=>{_orig.info(...a);_post('info',a)};
  window.onerror=(m,s,l,c,e)=>{_post('error',[\`\${m} (line \${l}:\${c})\`]);};
  window.addEventListener('unhandledrejection',e=>{_post('error',['Unhandled rejection: '+e.reason]);});
})();
<\/script>`;
  const doc=`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">${consoleScript}</head><body>${htmlCode.value}<script>${jsCode.value}<\/script></body></html>`;
  const blob=new Blob([doc],{type:'text/html'});
  preview.src=URL.createObjectURL(blob);
  statusText.textContent=`Last run: ${new Date().toLocaleTimeString()}`;
}

function scheduleRun(){
  if(!autoRun.checked) return;
  clearTimeout(runTimeout);
  runTimeout=setTimeout(run,400);
}

[htmlCode,cssCode,jsCode].forEach(el=>{
  el.addEventListener('input',()=>{scheduleRun();saveToStorage();});
  // Tab key support
  el.addEventListener('keydown',e=>{
    if(e.key==='Tab'){
      e.preventDefault();
      const s=el.selectionStart,end=el.selectionEnd;
      el.value=el.value.substring(0,s)+'  '+el.value.substring(end);
      el.selectionStart=el.selectionEnd=s+2;
      scheduleRun();
    }
  });
});

document.getElementById('runBtn').addEventListener('click',run);
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();run();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveToStorage();statusText.textContent='Saved!';}
});

// Console
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='console'){
    const div=document.createElement('div');
    div.className=`console-log log-${e.data.level}`;
    div.textContent=e.data.args.join(' ');
    consoleLogs.appendChild(div);
    consoleLogs.scrollTop=consoleLogs.scrollHeight;
  }
});

document.getElementById('consoleBtn').addEventListener('click',()=>{
  consolePanel.classList.toggle('visible');
});
document.getElementById('clearConsole').addEventListener('click',()=>{
  consoleLogs.innerHTML='';
});

// Layout
document.getElementById('vertBtn').addEventListener('click',()=>{mainContainer.classList.remove('horizontal');saveLayoutPref('vertical');});
document.getElementById('horizBtn').addEventListener('click',()=>{mainContainer.classList.add('horizontal');saveLayoutPref('horizontal');});

// Divider drag
const divider=document.getElementById('divider');
const editorsPanel=document.getElementById('editorsPanel');
let dragging=false;
divider.addEventListener('mousedown',e=>{dragging=true;divider.classList.add('dragging');e.preventDefault();});
document.addEventListener('mousemove',e=>{
  if(!dragging) return;
  const isHoriz=mainContainer.classList.contains('horizontal');
  if(isHoriz){
    const rect=mainContainer.getBoundingClientRect();
    const pct=((e.clientY-rect.top)/rect.height)*100;
    editorsPanel.style.height=Math.min(85,Math.max(15,pct))+'%';
    editorsPanel.style.width='100%';
  } else {
    const rect=mainContainer.getBoundingClientRect();
    const pct=((e.clientX-rect.left)/rect.width)*100;
    editorsPanel.style.width=Math.min(85,Math.max(15,pct))+'%';
    editorsPanel.style.height='';
  }
});
document.addEventListener('mouseup',()=>{dragging=false;divider.classList.remove('dragging');});

// Download
document.getElementById('downloadBtn').addEventListener('click',()=>{
  const doc=`<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>My Page</title>\n\n</head>\n<body>\n${htmlCode.value}\n<script>\n${jsCode.value}\n<\/script>\n</body>\n</html>`;
  const blob=new Blob([doc],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='page.html';
  a.click();
});

// Pop out
document.getElementById('newWindowBtn').addEventListener('click',()=>{
  const doc=`<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>${htmlCode.value}<script>${jsCode.value}<\/script></body></html>`;
  const w=window.open('','_blank');
  w.document.write(doc);
  w.document.close();
});

// LocalStorage
function saveToStorage(){
  try{localStorage.setItem('liveEditor',JSON.stringify({html:htmlCode.value,css:cssCode.value,js:jsCode.value}));}catch(e){}
}
function loadFromStorage(){
  try{
    const d=JSON.parse(localStorage.getItem('liveEditor'));
    if(d){htmlCode.value=d.html||'';cssCode.value=d.css||'';jsCode.value=d.js||'';return true;}
  }catch(e){}
  return false;
}
function saveLayoutPref(l){try{localStorage.setItem('liveEditorLayout',l);}catch(e){}}
function loadLayoutPref(){try{const l=localStorage.getItem('liveEditorLayout');if(l==='horizontal')mainContainer.classList.add('horizontal');}catch(e){}}

// Init
loadLayoutPref();
if(!loadFromStorage()){loadTemplate('hello');}else{run();}

// Mobile: default to horizontal
if(window.innerWidth<=768&&!localStorage.getItem('liveEditorLayout')){mainContainer.classList.add('horizontal');}
</script>
</body>
</html>
