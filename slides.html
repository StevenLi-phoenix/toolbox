<body>
<div class="app">
  <div class="toolbar">
    <h1>📽️ Markdown <span>Slides</span></h1>
    <div class="theme-picker">
      <div class="theme-dot active" data-theme="dark" title="Dark"></div>

      </div>
      <textarea id="editor" placeholder="# My Presentation

Write your slides in Markdown.

"></textarea>

        <div class="slide-nav">

</div>

<div class="fullscreen-overlay" id="fullscreen">
  <div class="slide" id="fsSlide"></div>
  <div class="fs-controls">
    <button onclick="fsPrev()">◀</button>
    <span class="fs-counter" id="fsCounter">1 / 1</span>
    <button onclick="fsNext()">▶</button>
    <button onclick="exitPresent()" title="Exit">✕</button>

<script>
const editor = document.getElementById('editor');
const slidePreview = document.getElementById('slidePreview');
const fsSlide = document.getElementById('fsSlide');
const counter = document.getElementById('counter');
const fsCounter = document.getElementById('fsCounter');
const slideCount = document.getElementById('slideCount');
const fullscreen = document.getElementById('fullscreen');
const themeWrap = document.getElementById('slideThemeWrap');

let slides = [];
let currentSlide = 0;
let currentTheme = 'dark';

const defaultMd = `# Markdown Slides
### Write. Present. Share.

Turn your Markdown into beautiful presentations

---

## How It Works

- Write Markdown in the **left panel**
- Separate slides with \`---\`
- Navigate with **arrow keys**
- Click **Present** for fullscreen

---

## Rich Content Support

### Code blocks
\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

### Inline \`code\` and **bold** text

---

## Lists & Quotes

> "The best way to predict the future is to invent it."
> — Alan Kay

1. Write your content
2. Choose a theme
3. Hit Present
4. Impress everyone

---

## Themes

Pick a theme from the **dots** in the toolbar:

| Theme | Vibe |
|-------|------|
| 🌑 Dark | Classic dev |
| ☀️ Light | Clean & bright |
| 🔵 Blue | Deep ocean |
| 🟢 Green | Matrix vibes |
| 🟣 Purple | Creative night |

---

# Thank You!

Made with ☕ by [Steven Li](https://buymeacoffee.com/stevenli.phoenix)`;

// Simple Markdown parser
function parseMd(md) {
  let html = md
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${esc(code.trim())}</code></pre>`)
    // Images
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Strikethrough
    .replace(/~~(.+?)~~/g, '<del>$1</del>');

  // Process line by line
  const lines = html.split('\n');
  let result = '';
  let inList = false;
  let inOl = false;
  let inBlockquote = false;
  let inTable = false;
  let tableHeader = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // Table
    if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
      if (trimmed.replace(/[\s|:-]/g, '') === '') { tableHeader = true; continue; }
      if (!inTable) { result += '<table>'; inTable = true; }
      const cells = trimmed.split('|').filter(c => c.trim() !== '');
      const tag = !tableHeader ? 'th' : 'td';
      if (!tableHeader) tableHeader = false;
      result += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      continue;
    } else if (inTable) { result += '</table>'; inTable = false; tableHeader = false; }

    // Blockquote
    if (trimmed.startsWith('>')) {
      if (!inBlockquote) { result += '<blockquote>'; inBlockquote = true; }
      result += trimmed.replace(/^>\s?/, '') + '<br>';
      continue;
    } else if (inBlockquote) { result += '</blockquote>'; inBlockquote = false; }

    // Unordered list
    if (/^[\-\*]\s/.test(trimmed)) {
      if (inOl) { result += '</ol>'; inOl = false; }
      if (!inList) { result += '<ul>'; inList = true; }
      result += `<li>${trimmed.replace(/^[\-\*]\s/, '')}</li>`;
      continue;
    } else if (inList) { result += '</ul>'; inList = false; }

    // Ordered list
    if (/^\d+\.\s/.test(trimmed)) {
      if (inList) { result += '</ul>'; inList = false; }
      if (!inOl) { result += '<ol>'; inOl = true; }
      result += `<li>${trimmed.replace(/^\d+\.\s/, '')}</li>`;
      continue;
    } else if (inOl) { result += '</ol>'; inOl = false; }

    // Skip if inside pre
    if (trimmed.startsWith('<pre>') || trimmed.startsWith('</pre>')) {
      result += line + '\n'; continue;
    }

    // HR
    if (/^---+$/.test(trimmed)) { result += '<hr>'; continue; }

    // Headers
    if (trimmed.startsWith('### ')) { result += `<h3>${trimmed.slice(4)}</h3>`; continue; }
    if (trimmed.startsWith('## ')) { result += `<h2>${trimmed.slice(3)}</h2>`; continue; }
    if (trimmed.startsWith('# ')) { result += `<h1>${trimmed.slice(2)}</h1>`; continue; }

    // Empty line
    if (trimmed === '') { continue; }

    // Paragraph
    result += `<p>${trimmed}</p>`;
  }

  if (inList) result += '</ul>';
  if (inOl) result += '</ol>';
  if (inBlockquote) result += '</blockquote>';
  if (inTable) result += '</table>';

  return result;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseSlides() {
  const md = editor.value || '';
  slides = md.split(/\n---\n/).map(s => s.trim()).filter(s => s);
  if (slides.length === 0) slides = [''];
  if (currentSlide >= slides.length) currentSlide = slides.length - 1;
  renderSlide();
  slideCount.textContent = `${slides.length} slide${slides.length !== 1 ? 's' : ''}`;
}

function renderSlide() {
  const html = parseMd(slides[currentSlide] || '');
  slidePreview.innerHTML = html;
  fsSlide.innerHTML = html;
  counter.textContent = `${currentSlide + 1} / ${slides.length}`;
  fsCounter.textContent = `${currentSlide + 1} / ${slides.length}`;
}

function nextSlide() { if (currentSlide < slides.length - 1) { currentSlide++; renderSlide(); } }
function prevSlide() { if (currentSlide > 0) { currentSlide--; renderSlide(); } }
function fsNext() { nextSlide(); }
function fsPrev() { prevSlide(); }

function startPresent() {
  fullscreen.classList.add('active');
  renderSlide();
  if (fullscreen.requestFullscreen) fullscreen.requestFullscreen();
}
function exitPresent() {
  fullscreen.classList.remove('active');
  if (document.exitFullscreen && document.fullscreenElement) document.exitFullscreen();
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) fullscreen.classList.remove('active');
});

// Theme
document.querySelectorAll('.theme-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    currentTheme = dot.dataset.theme;
    themeWrap.className = 'slide-container' + (currentTheme !== 'dark' ? ` theme-${currentTheme}` : '');
    fullscreen.className = 'fullscreen-overlay' + (fullscreen.classList.contains('active') ? ' active' : '') + (currentTheme !== 'dark' ? ` theme-${currentTheme}` : '');
  });
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.target === editor) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevSlide(); }
  if (e.key === 'Escape') exitPresent();
  if (e.key === 'f' || e.key === 'F') { if (!fullscreen.classList.contains('active')) startPresent(); }
});

// Export
function exportHTML() {
  const slideHtmls = slides.map(s => parseMd(s));
  const themeClass = currentTheme !== 'dark' ? `theme-${currentTheme}` : '';
  const html = `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Presentation</title>
</head><body>
<div class="slides" id="deck">
${slideHtmls.map((h, i) => `  <div class="slide${i === 0 ? ' active' : ''}">${h}</div>`).join('\n')}
</div>
<div class="controls"><button onclick="go(-1)">◀</button><span id="c">1 / ${slideHtmls.length}</span><button onclick="go(1)">▶</button></div>
<script>
let cur=0;const ss=document.querySelectorAll('.slide'),c=document.getElementById('c');
function go(d){ss[cur].classList.remove('active');cur=Math.max(0,Math.min(ss.length-1,cur+d));ss[cur].classList.add('active');c.textContent=(cur+1)+' / '+ss.length;}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(1);if(e.key==='ArrowLeft')go(-1);});
<\/script></body></html>`;
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'presentation.html'; a.click();
  URL.revokeObjectURL(url);
}

// Save/restore
function save() {
  try { localStorage.setItem('md-slides', editor.value); localStorage.setItem('md-slides-theme', currentTheme); } catch {}
}
function load() {
  const saved = localStorage.getItem('md-slides');
  editor.value = saved || defaultMd;
  const t = localStorage.getItem('md-slides-theme');
  if (t) { currentTheme = t; document.querySelectorAll('.theme-dot').forEach(d => { d.classList.toggle('active', d.dataset.theme === t); }); themeWrap.className = 'slide-container' + (t !== 'dark' ? ` theme-${t}` : ''); }
  parseSlides();
}

let debounce;
editor.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { parseSlides(); save(); }, 200);
});

// Tab key in editor
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = s + 2;
    parseSlides(); save();
  }
});

load();
</script>
</body>
