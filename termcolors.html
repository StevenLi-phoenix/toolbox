<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Color Theme Preview — DevToolbox</title>
<meta name="description" content="Design and preview terminal color themes with live ANSI color preview. Export to iTerm2, Windows Terminal, Alacritty, and more.">
<meta name="keywords" content="terminal colors, ANSI colors, color theme, iTerm2, Windows Terminal, Alacritty, terminal theme generator, color scheme">
<meta property="og:title" content="Terminal Color Theme Preview — DevToolbox">
<meta property="og:description" content="Design custom terminal color themes with live preview and export to popular terminal formats.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/termcolors.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Terminal Color Theme Preview — DevToolbox">
<meta name="twitter:description" content="Design custom terminal color themes with live preview and export to popular terminal formats.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/termcolors.html">
<link rel="stylesheet" href="toolbox.css">
</head>
<body>
<div class="container">
<header>
<h1>Terminal Color Theme Preview</h1>
<p>Design terminal color schemes with live preview. Export to iTerm2, Windows Terminal, Alacritty &amp; more.</p>
<a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" class="bmc">☕ Buy Me a Coffee</a>
</header>

<div class="layout">
<div class="panel" id="controls">
<h2>Colors</h2>
<div class="presets" id="presets"></div>
<div class="color-grid" id="colorGrid"></div>
</div>

<div>
<div class="panel">
<h2>Live Preview</h2>
<div class="terminal" id="terminal">
<div class="terminal-bar">
<div class="terminal-dot" id="dotClose" style="background:#ff5f56"></div>
<div class="terminal-dot" id="dotMin" style="background:#ffbd2e"></div>
<div class="terminal-dot" id="dotMax" style="background:#27c93f"></div>
<span style="margin-left:8px;font-size:.75rem;color:#888">Terminal</span>
</div>
<div class="terminal-body" id="termBody"></div>
</div>
</div>

<div class="panel export-section">
<h2>Export</h2>
<div class="export-tabs" id="exportTabs"></div>
<div style="position:relative">
<pre class="export-output" id="exportOutput"></pre>
<button class="copy-btn" id="copyBtn" onclick="copyExport()">Copy</button>
</div>
<div class="actions">
<button class="primary" onclick="downloadExport()">Download</button>
<button onclick="importTheme()">Import JSON</button>
<button onclick="randomize()">Randomize</button>
</div>
</div>
</div>
</div>

<footer>
Part of <a href="https://stevenli-phoenix.github.io/toolbox/">DevToolbox</a> ·
<a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">Support this project ☕</a>
</footer>
</div>

<script>
const NAMES=['background','foreground','cursor','black','red','green','yellow','blue','magenta','cyan','white','brightBlack','brightRed','brightGreen','brightYellow','brightBlue','brightMagenta','brightCyan','brightWhite'];
const LABELS=['bg','fg','cursor','black','red','green','yellow','blue','magenta','cyan','white','br black','br red','br green','br yellow','br blue','br magenta','br cyan','br white'];
const PRESETS={
'Dracula':{background:'#282a36',foreground:'#f8f8f2',cursor:'#f8f8f2',black:'#21222c',red:'#ff5555',green:'#50fa7b',yellow:'#f1fa8c',blue:'#bd93f9',magenta:'#ff79c6',cyan:'#8be9fd',white:'#f8f8f2',brightBlack:'#6272a4',brightRed:'#ff6e6e',brightGreen:'#69ff94',brightYellow:'#ffffa5',brightBlue:'#d6acff',brightMagenta:'#ff92df',brightCyan:'#a4ffff',brightWhite:'#ffffff'},
'Monokai':{background:'#272822',foreground:'#f8f8f2',cursor:'#f8f8f0',black:'#272822',red:'#f92672',green:'#a6e22e',yellow:'#f4bf75',blue:'#66d9ef',magenta:'#ae81ff',cyan:'#a1efe4',white:'#f8f8f2',brightBlack:'#75715e',brightRed:'#f92672',brightGreen:'#a6e22e',brightYellow:'#f4bf75',brightBlue:'#66d9ef',brightMagenta:'#ae81ff',brightCyan:'#a1efe4',brightWhite:'#f9f8f5'},
'Nord':{background:'#2e3440',foreground:'#d8dee9',cursor:'#d8dee9',black:'#3b4252',red:'#bf616a',green:'#a3be8c',yellow:'#ebcb8b',blue:'#81a1c1',magenta:'#b48ead',cyan:'#88c0d0',white:'#e5e9f0',brightBlack:'#4c566a',brightRed:'#bf616a',brightGreen:'#a3be8c',brightYellow:'#ebcb8b',brightBlue:'#81a1c1',brightMagenta:'#b48ead',brightCyan:'#8fbcbb',brightWhite:'#eceff4'},
'Solarized Dark':{background:'#002b36',foreground:'#839496',cursor:'#839496',black:'#073642',red:'#dc322f',green:'#859900',yellow:'#b58900',blue:'#268bd2',magenta:'#d33682',cyan:'#2aa198',white:'#eee8d5',brightBlack:'#586e75',brightRed:'#cb4b16',brightGreen:'#586e75',brightYellow:'#657b83',brightBlue:'#839496',brightMagenta:'#6c71c4',brightCyan:'#93a1a1',brightWhite:'#fdf6e3'},
'Gruvbox':{background:'#282828',foreground:'#ebdbb2',cursor:'#ebdbb2',black:'#282828',red:'#cc241d',green:'#98971a',yellow:'#d79921',blue:'#458588',magenta:'#b16286',cyan:'#689d6a',white:'#a89984',brightBlack:'#928374',brightRed:'#fb4934',brightGreen:'#b8bb26',brightYellow:'#fabd2f',brightBlue:'#83a598',brightMagenta:'#d3869b',brightCyan:'#8ec07c',brightWhite:'#ebdbb2'},
'Tokyo Night':{background:'#1a1b26',foreground:'#c0caf5',cursor:'#c0caf5',black:'#15161e',red:'#f7768e',green:'#9ece6a',yellow:'#e0af68',blue:'#7aa2f7',magenta:'#bb9af7',cyan:'#7dcfff',white:'#a9b1d6',brightBlack:'#414868',brightRed:'#f7768e',brightGreen:'#9ece6a',brightYellow:'#e0af68',brightBlue:'#7aa2f7',brightMagenta:'#bb9af7',brightCyan:'#7dcfff',brightWhite:'#c0caf5'},
'Catppuccin Mocha':{background:'#1e1e2e',foreground:'#cdd6f4',cursor:'#f5e0dc',black:'#45475a',red:'#f38ba8',green:'#a6e3a1',yellow:'#f9e2af',blue:'#89b4fa',magenta:'#f5c2e7',cyan:'#94e2d5',white:'#bac2de',brightBlack:'#585b70',brightRed:'#f38ba8',brightGreen:'#a6e3a1',brightYellow:'#f9e2af',brightBlue:'#89b4fa',brightMagenta:'#f5c2e7',brightCyan:'#94e2d5',brightWhite:'#a6adc8'},
'One Dark':{background:'#282c34',foreground:'#abb2bf',cursor:'#528bff',black:'#282c34',red:'#e06c75',green:'#98c379',yellow:'#e5c07b',blue:'#61afef',magenta:'#c678dd',cyan:'#56b6c2',white:'#abb2bf',brightBlack:'#545862',brightRed:'#e06c75',brightGreen:'#98c379',brightYellow:'#e5c07b',brightBlue:'#61afef',brightMagenta:'#c678dd',brightCyan:'#56b6c2',brightWhite:'#c8ccd4'}
};

let theme={...PRESETS['Dracula']};
let activeExport='windowsTerminal';
const EXPORTS=['windowsTerminal','iTerm2','alacritty','kitty','xresources','json'];
const EXPORT_LABELS=['Windows Terminal','iTerm2','Alacritty','Kitty','Xresources','JSON'];

function init(){
  const pg=document.getElementById('presets');
  Object.keys(PRESETS).forEach(n=>{
    const b=document.createElement('button');
    b.textContent=n;b.onclick=()=>loadPreset(n);pg.appendChild(b);
  });
  buildColorGrid();buildExportTabs();render();
}

function buildColorGrid(){
  const g=document.getElementById('colorGrid');g.innerHTML='';
  const sections=[{label:'Base',start:0,end:3},{label:'Normal',start:3,end:11},{label:'Bright',start:11,end:19}];
  sections.forEach(s=>{
    const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent=s.label;g.appendChild(lbl);
    for(let i=s.start;i<s.end;i++){
      const d=document.createElement('div');d.className='color-item';
      const l=document.createElement('label');l.textContent=LABELS[i];
      const ci=document.createElement('input');ci.type='color';ci.value=theme[NAMES[i]];ci.dataset.idx=i;
      ci.addEventListener('input',e=>{theme[NAMES[i]]=e.target.value;d.querySelector('input[type=text]').value=e.target.value;render();});
      const ti=document.createElement('input');ti.type='text';ti.value=theme[NAMES[i]];ti.dataset.idx=i;
      ti.addEventListener('change',e=>{const v=e.target.value;if(/^#[0-9a-fA-F]{6}$/.test(v)){theme[NAMES[i]]=v;ci.value=v;render();}});
      d.appendChild(l);d.appendChild(ci);d.appendChild(ti);g.appendChild(d);
    }
  });
}

function buildExportTabs(){
  const t=document.getElementById('exportTabs');
  EXPORTS.forEach((e,i)=>{
    const b=document.createElement('button');b.textContent=EXPORT_LABELS[i];
    b.className=e===activeExport?'active':'';
    b.onclick=()=>{activeExport=e;document.querySelectorAll('#exportTabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderExport();};
    t.appendChild(b);
  });
}

function s(c,t){return `<span style="color:${c}">${t}</span>`;}
function bg(b,f,t){return `<span style="background:${b};color:${f}">${t}</span>`;}

function render(){
  const t=theme;
  document.getElementById('terminal').querySelector('.terminal-body').parentElement.style.background=t.background;
  const body=document.getElementById('termBody');
  const lines=[
    s(t.green,'user')+s(t.foreground,'@')+s(t.blue,'dev-machine')+s(t.foreground,':')+s(t.magenta,'~/projects')+s(t.foreground,' $ ')+s(t.white,'ls -la'),
    s(t.brightBlack,'total 42'),
    s(t.blue,'drwxr-xr-x')+s(t.foreground,'  5 user staff  160 Apr  3 ')+s(t.cyan,'src/'),
    s(t.green,'-rwxr-xr-x')+s(t.foreground,'  1 user staff 2048 Apr  3 ')+s(t.white,'main.py'),
    s(t.foreground,'-rw-r--r--')+s(t.foreground,'  1 user staff  512 Apr  2 ')+s(t.yellow,'config.yml'),
    s(t.red,'-rw-------')+s(t.foreground,'  1 user staff   64 Apr  1 ')+s(t.brightRed,'.env'),
    '',
    s(t.green,'user')+s(t.foreground,'@')+s(t.blue,'dev-machine')+s(t.foreground,':')+s(t.magenta,'~/projects')+s(t.foreground,' $ ')+s(t.white,'git status'),
    s(t.foreground,'On branch ')+s(t.cyan,'main'),
    s(t.green,'  modified:   ')+s(t.foreground,'src/app.ts'),
    s(t.red,'  deleted:    ')+s(t.foreground,'old_module.py'),
    s(t.yellow,'  untracked:  ')+s(t.foreground,'new_feature.rs'),
    '',
    s(t.green,'user')+s(t.foreground,'@')+s(t.blue,'dev-machine')+s(t.foreground,':')+s(t.magenta,'~/projects')+s(t.foreground,' $ ')+s(t.white,'echo "Color test"'),
    s(t.black,'███')+s(t.red,'███')+s(t.green,'███')+s(t.yellow,'███')+s(t.blue,'███')+s(t.magenta,'███')+s(t.cyan,'███')+s(t.white,'███'),
    s(t.brightBlack,'███')+s(t.brightRed,'███')+s(t.brightGreen,'███')+s(t.brightYellow,'███')+s(t.brightBlue,'███')+s(t.brightMagenta,'███')+s(t.brightCyan,'███')+s(t.brightWhite,'███'),
    '',
    s(t.green,'user')+s(t.foreground,'@')+s(t.blue,'dev-machine')+s(t.foreground,':')+s(t.magenta,'~/projects')+s(t.foreground,' $ ')+bg(t.cursor,t.background,' '),
  ];
  body.innerHTML=lines.join('\n');
  body.style.color=t.foreground;
  renderExport();
}

function hex2rgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b};}
function hex2f(h){const{r,g,b}=hex2rgb(h);return{r:+(r/255).toFixed(6),g:+(g/255).toFixed(6),b:+(b/255).toFixed(6)};}

function exportWindowsTerminal(){
  const t=theme;
  return JSON.stringify({name:"Custom Theme",background:t.background,foreground:t.foreground,cursorColor:t.cursor,black:t.black,red:t.red,green:t.green,yellow:t.yellow,blue:t.blue,purple:t.magenta,cyan:t.cyan,white:t.white,brightBlack:t.brightBlack,brightRed:t.brightRed,brightGreen:t.brightGreen,brightYellow:t.brightYellow,brightBlue:t.brightBlue,brightPurple:t.brightMagenta,brightCyan:t.brightCyan,brightWhite:t.brightWhite},null,2);
}

function exportITerm2(){
  const t=theme;
  const map=[['Background Color',t.background],['Foreground Color',t.foreground],['Cursor Color',t.cursor],
    ['Ansi 0 Color',t.black],['Ansi 1 Color',t.red],['Ansi 2 Color',t.green],['Ansi 3 Color',t.yellow],
    ['Ansi 4 Color',t.blue],['Ansi 5 Color',t.magenta],['Ansi 6 Color',t.cyan],['Ansi 7 Color',t.white],
    ['Ansi 8 Color',t.brightBlack],['Ansi 9 Color',t.brightRed],['Ansi 10 Color',t.brightGreen],
    ['Ansi 11 Color',t.brightYellow],['Ansi 12 Color',t.brightBlue],['Ansi 13 Color',t.brightMagenta],
    ['Ansi 14 Color',t.brightCyan],['Ansi 15 Color',t.brightWhite]];
  let xml='<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n';
  map.forEach(([name,hex])=>{const c=hex2f(hex);xml+=`\t<key>${name}</key>\n\t<dict>\n\t\t<key>Color Space</key>\n\t\t<string>sRGB</string>\n\t\t<key>Red Component</key>\n\t\t<real>${c.r}</real>\n\t\t<key>Green Component</key>\n\t\t<real>${c.g}</real>\n\t\t<key>Blue Component</key>\n\t\t<real>${c.b}</real>\n\t</dict>\n`;});
  xml+='</dict>\n</plist>';return xml;
}

function exportAlacritty(){
  const t=theme;
  return `[colors.primary]
background = "${t.background}"
foreground = "${t.foreground}"

[colors.cursor]
text = "${t.background}"
cursor = "${t.cursor}"

[colors.normal]
black = "${t.black}"
red = "${t.red}"
green = "${t.green}"
yellow = "${t.yellow}"
blue = "${t.blue}"
magenta = "${t.magenta}"
cyan = "${t.cyan}"
white = "${t.white}"

[colors.bright]
black = "${t.brightBlack}"
red = "${t.brightRed}"
green = "${t.brightGreen}"
yellow = "${t.brightYellow}"
blue = "${t.brightBlue}"
magenta = "${t.brightMagenta}"
cyan = "${t.brightCyan}"
white = "${t.brightWhite}"`;
}

function exportKitty(){
  const t=theme;
  return `background ${t.background}
foreground ${t.foreground}
cursor ${t.cursor}

color0 ${t.black}
color1 ${t.red}
color2 ${t.green}
color3 ${t.yellow}
color4 ${t.blue}
color5 ${t.magenta}
color6 ${t.cyan}
color7 ${t.white}
color8 ${t.brightBlack}
color9 ${t.brightRed}
color10 ${t.brightGreen}
color11 ${t.brightYellow}
color12 ${t.brightBlue}
color13 ${t.brightMagenta}
color14 ${t.brightCyan}
color15 ${t.brightWhite}`;
}

function exportXresources(){
  const t=theme;
  return `*.background: ${t.background}
*.foreground: ${t.foreground}
*.cursorColor: ${t.cursor}
*.color0: ${t.black}
*.color1: ${t.red}
*.color2: ${t.green}
*.color3: ${t.yellow}
*.color4: ${t.blue}
*.color5: ${t.magenta}
*.color6: ${t.cyan}
*.color7: ${t.white}
*.color8: ${t.brightBlack}
*.color9: ${t.brightRed}
*.color10: ${t.brightGreen}
*.color11: ${t.brightYellow}
*.color12: ${t.brightBlue}
*.color13: ${t.brightMagenta}
*.color14: ${t.brightCyan}
*.color15: ${t.brightWhite}`;
}

function renderExport(){
  const fns={windowsTerminal:exportWindowsTerminal,iTerm2:exportITerm2,alacritty:exportAlacritty,kitty:exportKitty,xresources:exportXresources,json:()=>JSON.stringify(theme,null,2)};
  document.getElementById('exportOutput').textContent=fns[activeExport]();
}

function copyExport(){
  navigator.clipboard.writeText(document.getElementById('exportOutput').textContent).then(()=>{
    const b=document.getElementById('copyBtn');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1500);
  });
}

function downloadExport(){
  const exts={windowsTerminal:'json',iTerm2:'itermcolors',alacritty:'toml',kitty:'conf',xresources:'Xresources',json:'json'};
  const blob=new Blob([document.getElementById('exportOutput').textContent],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`theme.${exts[activeExport]}`;a.click();
}

function importTheme(){
  const inp=prompt('Paste JSON theme:');
  if(!inp)return;
  try{const o=JSON.parse(inp);NAMES.forEach(n=>{if(o[n]&&/^#[0-9a-fA-F]{6}$/.test(o[n]))theme[n]=o[n];});buildColorGrid();render();}
  catch(e){alert('Invalid JSON');}
}

function loadPreset(name){
  theme={...PRESETS[name]};
  document.querySelectorAll('#presets button').forEach(b=>b.classList.toggle('active',b.textContent===name));
  buildColorGrid();render();
}

function randomize(){
  const rh=()=>'#'+[...Array(6)].map(()=>'0123456789abcdef'[Math.random()*16|0]).join('');
  const bg=rh(),fg=rh();
  theme.background=bg;theme.foreground=fg;theme.cursor=fg;
  for(let i=3;i<NAMES.length;i++)theme[NAMES[i]]=rh();
  document.querySelectorAll('#presets button').forEach(b=>b.classList.remove('active'));
  buildColorGrid();render();
}

init();
</script>
</body>
</html>
