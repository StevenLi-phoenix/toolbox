<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Color Palette Extractor - Extract Dominant Colors from Images</title>
    <meta name="description" content="Extract dominant color palettes from any image. Upload a photo and instantly get the top colors with HEX, RGB, and HSL values. Free online tool for designers and developers.">
    <meta name="keywords" content="color palette extractor, image colors, dominant colors, color picker, design tool, hex color, rgb color, image palette">
    <meta name="author" content="Steven Li">
    <meta property="og:title" content="Image Color Palette Extractor - Free Online Tool">
    <meta property="og:description" content="Extract dominant color palettes from any image instantly. Get HEX, RGB, and HSL values.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/palette-extractor.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Image Color Palette Extractor">
    <meta name="twitter:description" content="Extract dominant colors from any image. Free tool for designers and developers.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/palette-extractor.html">
    <link rel="stylesheet" href="toolbox.css">
<style>
  .drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .15s;color:var(--muted)}
  .drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);color:var(--text)}
  .drop-zone svg{width:48px;height:48px;fill:var(--muted);margin-bottom:8px}
  .browse{color:var(--accent);font-weight:600;cursor:pointer}
  #fileInput{display:none}
  .controls{display:flex;align-items:center;gap:12px;margin:16px 0}
  .controls select{width:auto}
  #extractBtn{padding:8px 16px;background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:var(--radius);cursor:pointer;font-weight:600}
  .preview-area{display:none;margin:16px 0;text-align:center}
  .preview-area canvas{max-width:100%;border-radius:var(--radius);border:1px solid var(--border)}
  .results{display:none;margin-top:16px}
  .palette-bar{display:flex;height:48px;border-radius:var(--radius);overflow:hidden;margin-bottom:16px;cursor:pointer}
  .swatch{position:relative;transition:flex .2s}
  .swatch:hover{flex-grow:2!important}
  .swatch .tooltip{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:2px 8px;border-radius:4px;font-size:.75rem;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none}
  .swatch:hover .tooltip{opacity:1}
  .export-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .export-row button{padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:.82rem;font-weight:600}
  .export-row button:hover{background:var(--surface2)}
  .color-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .color-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .15s}
  .color-card:hover{box-shadow:var(--shadow-lg)}
  .card-swatch{height:64px;display:flex;align-items:flex-end;justify-content:flex-end;padding:6px}
  .pct{font-size:.75rem;font-weight:600}
  .card-info{padding:8px 10px}
  .hex{font-weight:700;font-size:.9rem}
  .formats{font-size:.75rem;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
    <div class="container">
        <h1>🎨 Image Color Palette Extractor</h1>
        <p class="subtitle">Upload an image to extract its dominant colors</p>

        <div class="drop-zone" id="dropZone">
            <svg viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
            <p>Drag & drop an image here or <span class="browse">browse</span></p>
            <p style="font-size:0.8rem;color:#555;margin-top:0.3rem">PNG, JPG, GIF, WebP, SVG</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">

        <div class="controls" id="controls" style="display:none">
            <label>Colors:</label>
            <select id="numColors">
                <option value="5">5</option>
                <option value="6" selected>6</option>
                <option value="8">8</option>
                <option value="10">10</option>
                <option value="12">12</option>
            </select>
            <button id="extractBtn">Extract Palette</button>
        </div>

        <div class="preview-area" id="previewArea">
            <canvas id="previewCanvas"></canvas>
        </div>

        <div class="results" id="results">
            <div class="palette-bar" id="paletteBar"></div>
            <div class="export-row" id="exportRow">
                <button onclick="exportCSS()">Copy as CSS Variables</button>
                <button onclick="exportArray()">Copy as Array</button>
                <button onclick="exportTailwind()">Copy as Tailwind Config</button>
                <button onclick="exportSASS()">Copy as SASS Variables</button>
            </div>
            <div class="color-cards" id="colorCards"></div>
        </div>

        <div class="coffee">
            <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
        </div>
    </div>

    <div class="copied-toast" id="toast">Copied!</div>

    <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewCanvas = document.getElementById('previewCanvas');
    const ctx = previewCanvas.getContext('2d', { willReadFrequently: true });
    let currentImage = null;
    let extractedColors = [];

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });
    document.getElementById('extractBtn').addEventListener('click', extract);
    document.getElementById('numColors').addEventListener('change', () => { if (currentImage) extract(); });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                currentImage = img;
                const maxW = 800, maxH = 500;
                let w = img.width, h = img.height;
                if (w > maxW) { h = h * maxW / w; w = maxW; }
                if (h > maxH) { w = w * maxH / h; h = maxH; }
                previewCanvas.width = w;
                previewCanvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                document.getElementById('previewArea').style.display = 'block';
                document.getElementById('controls').style.display = 'flex';
                extract();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function getPixels() {
        // Sample down to ~50k pixels for speed
        const sw = Math.min(previewCanvas.width, 200);
        const sh = Math.round(sw * previewCanvas.height / previewCanvas.width);
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = sw; tmpCanvas.height = sh;
        const tctx = tmpCanvas.getContext('2d');
        tctx.drawImage(previewCanvas, 0, 0, sw, sh);
        const data = tctx.getImageData(0, 0, sw, sh).data;
        const pixels = [];
        for (let i = 0; i < data.length; i += 4) {
            if (data[i + 3] < 128) continue; // skip transparent
            pixels.push([data[i], data[i+1], data[i+2]]);
        }
        return pixels;
    }

    function kMeans(pixels, k, maxIter = 20) {
        // Initialize centroids with k-means++
        const centroids = [pixels[Math.floor(Math.random() * pixels.length)].slice()];
        for (let c = 1; c < k; c++) {
            const dists = pixels.map(p => {
                let minD = Infinity;
                for (const cen of centroids) {
                    const d = (p[0]-cen[0])**2 + (p[1]-cen[1])**2 + (p[2]-cen[2])**2;
                    if (d < minD) minD = d;
                }
                return minD;
            });
            const total = dists.reduce((a, b) => a + b, 0);
            let r = Math.random() * total, acc = 0;
            for (let i = 0; i < dists.length; i++) {
                acc += dists[i];
                if (acc >= r) { centroids.push(pixels[i].slice()); break; }
            }
        }

        let assignments = new Int32Array(pixels.length);
        for (let iter = 0; iter < maxIter; iter++) {
            // Assign
            let changed = false;
            for (let i = 0; i < pixels.length; i++) {
                const p = pixels[i];
                let minD = Infinity, minC = 0;
                for (let c = 0; c < k; c++) {
                    const d = (p[0]-centroids[c][0])**2 + (p[1]-centroids[c][1])**2 + (p[2]-centroids[c][2])**2;
                    if (d < minD) { minD = d; minC = c; }
                }
                if (assignments[i] !== minC) { changed = true; assignments[i] = minC; }
            }
            if (!changed) break;
            // Update
            const sums = Array.from({length: k}, () => [0,0,0,0]);
            for (let i = 0; i < pixels.length; i++) {
                const c = assignments[i], p = pixels[i];
                sums[c][0] += p[0]; sums[c][1] += p[1]; sums[c][2] += p[2]; sums[c][3]++;
            }
            for (let c = 0; c < k; c++) {
                if (sums[c][3] === 0) continue;
                centroids[c] = [sums[c][0]/sums[c][3], sums[c][1]/sums[c][3], sums[c][2]/sums[c][3]];
            }
        }
        // Count
        const counts = new Array(k).fill(0);
        for (let i = 0; i < assignments.length; i++) counts[assignments[i]]++;
        return centroids.map((c, i) => ({
            r: Math.round(c[0]), g: Math.round(c[1]), b: Math.round(c[2]),
            count: counts[i]
        })).sort((a, b) => b.count - a.count);
    }

    function rgbToHex(r, g, b) {
        return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
    }

    function rgbToHSL(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r,g,b), min = Math.min(r,g,b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; } else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                case g: h = ((b - r) / d + 2) / 6; break;
                case b: h = ((r - g) / d + 4) / 6; break;
            }
        }
        return `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`;
    }

    function luminance(r, g, b) {
        return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    }

    function extract() {
        if (!currentImage) return;
        const k = parseInt(document.getElementById('numColors').value);
        const pixels = getPixels();
        if (pixels.length < k) return;
        const colors = kMeans(pixels, k);
        const total = colors.reduce((a, c) => a + c.count, 0);
        extractedColors = colors.map(c => ({
            ...c,
            hex: rgbToHex(c.r, c.g, c.b),
            rgb: `rgb(${c.r}, ${c.g}, ${c.b})`,
            hsl: rgbToHSL(c.r, c.g, c.b),
            pct: ((c.count / total) * 100).toFixed(1)
        }));
        render();
    }

    function render() {
        const bar = document.getElementById('paletteBar');
        bar.innerHTML = extractedColors.map(c =>
            `<div class="swatch" style="background:${c.hex};flex:${c.pct}" onclick="copyText('${c.hex}')">
                <div class="tooltip">${c.hex}</div>
            </div>`
        ).join('');

        const cards = document.getElementById('colorCards');
        cards.innerHTML = extractedColors.map(c => {
            const textColor = luminance(c.r, c.g, c.b) > 0.5 ? '#111' : '#fff';
            return `<div class="color-card" onclick="copyText('${c.hex}')">
                <div class="card-swatch" style="background:${c.hex}">
                    <span class="pct" style="color:${textColor};background:transparent">${c.pct}%</span>
                </div>
                <div class="card-info">
                    <div class="hex">${c.hex.toUpperCase()}</div>
                    <div class="formats">${c.rgb}<br>${c.hsl}</div>
                </div>
            </div>`;
        }).join('');

        document.getElementById('results').style.display = 'block';
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('toast');
            t.textContent = `Copied: ${text}`;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        });
    }

    function exportCSS() {
        const css = ':root {\n' + extractedColors.map((c, i) =>
            `  --color-${i + 1}: ${c.hex};`
        ).join('\n') + '\n}';
        copyText(css);
    }

    function exportArray() {
        const arr = JSON.stringify(extractedColors.map(c => c.hex));
        copyText(arr);
    }

    function exportTailwind() {
        const tw = 'colors: {\n  palette: {\n' + extractedColors.map((c, i) =>
            `    ${(i + 1) * 100}: '${c.hex}',`
        ).join('\n') + '\n  }\n}';
        copyText(tw);
    }

    function exportSASS() {
        const sass = extractedColors.map((c, i) =>
            `$color-${i + 1}: ${c.hex};`
        ).join('\n');
        copyText(sass);
    }
    </script>
</body>
</html>
