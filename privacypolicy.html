<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy Generator — Free Online Tool | DevToolbox</title>
    <meta name="description" content="Generate a professional privacy policy for your website or app in seconds. Free, customizable, and ready to publish. No signup required.">
    <meta name="keywords" content="privacy policy generator, free privacy policy, GDPR privacy policy, CCPA, website privacy policy, app privacy policy, online tool">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/privacypolicy.html">
    <meta property="og:title" content="Privacy Policy Generator — Free Online Tool">
    <meta property="og:description" content="Generate a professional privacy policy for your website or app in seconds. Free and customizable.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/privacypolicy.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Privacy Policy Generator — Free Online Tool">
    <meta name="twitter:description" content="Generate a professional privacy policy for your website or app in seconds.">
    <link rel="stylesheet" href="toolbox.css">
<style>
  .inline-row{display:flex;gap:12px;flex-wrap:wrap}
  .inline-row>.form-group{flex:1;min-width:200px}
  .form-group{margin-bottom:12px}
  .form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:4px}
  .checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
  .checkbox-item{display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:400;cursor:pointer;padding:4px 0}
  .output-tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
  .tab-btn{padding:8px 16px;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent}
  .tab-btn:hover{color:var(--text)}
  .tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
  .tab-content{display:none;padding:16px}
  .tab-content.active{display:block}
  .tab-content textarea{width:100%;min-height:300px;font-family:var(--mono);font-size:.82rem;resize:vertical}
  #output-section{display:none;margin-top:16px}
  #output-section.visible{display:block}
  #preview-html h1{font-size:1.4rem;margin-bottom:8px}
  #preview-html h2{font-size:1.1rem;margin:16px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px}
  #preview-html p{margin:6px 0;line-height:1.6}
  #preview-html ul{margin:6px 0 6px 20px}
  #preview-html li{margin:4px 0}
  .btn-copy{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒 Privacy Policy Generator</h1>
            <p>Generate a professional privacy policy for your website or app — free and instant</p>
        </header>

        <!-- Basic Info -->
        <div class="card">
            <h2>📋 Basic Information</h2>
            <div class="inline-row">
                <div class="form-group">
                    <label>Company / App Name *</label>
                    <input type="text" id="companyName" placeholder="Acme Inc.">
                </div>
                <div class="form-group">
                    <label>Website URL</label>
                    <input type="url" id="websiteUrl" placeholder="https://example.com">
                </div>
            </div>
            <div class="inline-row">
                <div class="form-group">
                    <label>Contact Email *</label>
                    <input type="email" id="contactEmail" placeholder="privacy@example.com">
                </div>
                <div class="form-group">
                    <label>Effective Date</label>
                    <input type="date" id="effectiveDate">
                </div>
            </div>
            <div class="form-group">
                <label>Type of Service</label>
                <select id="serviceType">
                    <option value="website">Website</option>
                    <option value="app">Mobile App</option>
                    <option value="both">Website & Mobile App</option>
                    <option value="saas">SaaS Platform</option>
                </select>
            </div>
        </div>

        <!-- Data Collection -->
        <div class="card">
            <h2>📊 Data Collection</h2>
            <label style="font-size:0.85rem;color:#9ca3af;margin-bottom:0.75rem;display:block;">What personal data do you collect?</label>
            <div class="checkbox-grid">
                <label class="checkbox-item"><input type="checkbox" value="name" class="data-type"> Name</label>
                <label class="checkbox-item"><input type="checkbox" value="email" class="data-type"> Email address</label>
                <label class="checkbox-item"><input type="checkbox" value="phone" class="data-type"> Phone number</label>
                <label class="checkbox-item"><input type="checkbox" value="address" class="data-type"> Mailing address</label>
                <label class="checkbox-item"><input type="checkbox" value="payment" class="data-type"> Payment information</label>
                <label class="checkbox-item"><input type="checkbox" value="ip" class="data-type"> IP address</label>
                <label class="checkbox-item"><input type="checkbox" value="cookies" class="data-type"> Cookies & tracking</label>
                <label class="checkbox-item"><input type="checkbox" value="location" class="data-type"> Location data</label>
                <label class="checkbox-item"><input type="checkbox" value="device" class="data-type"> Device information</label>
                <label class="checkbox-item"><input type="checkbox" value="usage" class="data-type"> Usage/analytics data</label>
                <label class="checkbox-item"><input type="checkbox" value="social" class="data-type"> Social media profiles</label>
                <label class="checkbox-item"><input type="checkbox" value="photos" class="data-type"> Photos / files</label>
            </div>
        </div>

        <!-- Third Parties & Compliance -->
        <div class="card">
            <h2>🌐 Third Parties & Compliance</h2>
            <label style="font-size:0.85rem;color:#9ca3af;margin-bottom:0.75rem;display:block;">Third-party services used</label>
            <div class="checkbox-grid">
                <label class="checkbox-item"><input type="checkbox" value="google-analytics" class="third-party"> Google Analytics</label>
                <label class="checkbox-item"><input type="checkbox" value="stripe" class="third-party"> Stripe / Payment processor</label>
                <label class="checkbox-item"><input type="checkbox" value="aws" class="third-party"> AWS / Cloud hosting</label>
                <label class="checkbox-item"><input type="checkbox" value="mailchimp" class="third-party"> Email marketing (Mailchimp, etc.)</label>
                <label class="checkbox-item"><input type="checkbox" value="social-login" class="third-party"> Social login (Google, Facebook)</label>
                <label class="checkbox-item"><input type="checkbox" value="ads" class="third-party"> Advertising networks</label>
                <label class="checkbox-item"><input type="checkbox" value="crm" class="third-party"> CRM tools</label>
                <label class="checkbox-item"><input type="checkbox" value="cdn" class="third-party"> CDN services</label>
            </div>
            <div style="margin-top:1rem;">
                <label style="font-size:0.85rem;color:#9ca3af;margin-bottom:0.75rem;display:block;">Compliance frameworks</label>
                <div class="checkbox-grid">
                    <label class="checkbox-item"><input type="checkbox" value="gdpr" class="compliance"> GDPR (EU)</label>
                    <label class="checkbox-item"><input type="checkbox" value="ccpa" class="compliance"> CCPA (California)</label>
                    <label class="checkbox-item"><input type="checkbox" value="coppa" class="compliance"> COPPA (Children)</label>
                    <label class="checkbox-item"><input type="checkbox" value="caloppa" class="compliance"> CalOPPA</label>
                </div>
            </div>
        </div>

        <!-- Additional -->
        <div class="card">
            <h2>⚙️ Additional Options</h2>
            <div class="checkbox-grid">
                <label class="checkbox-item"><input type="checkbox" id="optDataRetention"> Include data retention section</label>
                <label class="checkbox-item"><input type="checkbox" id="optSecurity"> Include security practices section</label>
                <label class="checkbox-item"><input type="checkbox" id="optMinors"> Include children's privacy section</label>
                <label class="checkbox-item"><input type="checkbox" id="optInternational"> Include international transfers</label>
                <label class="checkbox-item"><input type="checkbox" id="optDNT"> Include Do Not Track disclosure</label>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="generate()">Generate Privacy Policy</button>
            <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
        </div>

        <!-- Output -->
        <div id="output-section">
            <div class="card" style="padding:0; overflow:hidden;">
                <div class="output-tabs">
                    <button class="tab-btn active" onclick="switchTab('preview')">Preview</button>
                    <button class="tab-btn" onclick="switchTab('html')">HTML</button>
                    <button class="tab-btn" onclick="switchTab('markdown')">Markdown</button>
                    <button class="tab-btn" onclick="switchTab('plain')">Plain Text</button>
                </div>
                <div id="tab-preview" class="tab-content active">
                    <div id="preview-html"></div>
                </div>
                <div id="tab-html" class="tab-content">
                    <textarea id="raw-html" readonly></textarea>
                </div>
                <div id="tab-markdown" class="tab-content">
                    <textarea id="raw-markdown" readonly></textarea>
                </div>
                <div id="tab-plain" class="tab-content">
                    <textarea id="raw-plain" readonly></textarea>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-copy" onclick="copyOutput()">📋 Copy Current Format</button>
                <button class="btn btn-secondary" onclick="downloadOutput()">⬇ Download as .txt</button>
            </div>
        </div>

        <div class="coffee">
            <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee — support free tools!</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    document.getElementById('effectiveDate').valueAsDate = new Date();

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function getChecked(cls) {
        return [...document.querySelectorAll('.' + cls + ':checked')].map(c => c.value);
    }

    const dataLabels = {
        name: 'Full name', email: 'Email address', phone: 'Phone number',
        address: 'Mailing address', payment: 'Payment and billing information',
        ip: 'IP address', cookies: 'Cookies and similar tracking technologies',
        location: 'Geographic location data', device: 'Device and browser information',
        usage: 'Usage and analytics data', social: 'Social media profile information',
        photos: 'Photos, files, or user-uploaded content'
    };

    const thirdPartyLabels = {
        'google-analytics': 'Google Analytics (website analytics)',
        'stripe': 'Payment processors (e.g., Stripe)',
        'aws': 'Cloud hosting providers (e.g., AWS, Google Cloud)',
        'mailchimp': 'Email marketing services (e.g., Mailchimp, SendGrid)',
        'social-login': 'Social authentication providers (e.g., Google, Facebook Login)',
        'ads': 'Advertising networks and partners',
        'crm': 'Customer relationship management tools',
        'cdn': 'Content delivery networks (CDN)'
    };

    const serviceLabels = { website: 'website', app: 'mobile application', both: 'website and mobile application', saas: 'platform' };

    function generate() {
        const name = document.getElementById('companyName').value.trim();
        const url = document.getElementById('websiteUrl').value.trim();
        const email = document.getElementById('contactEmail').value.trim();
        const date = document.getElementById('effectiveDate').value;
        const type = document.getElementById('serviceType').value;

        if (!name || !email) { showToast('Please fill in company name and email'); return; }

        const dataTypes = getChecked('data-type');
        const thirdParties = getChecked('third-party');
        const compliance = getChecked('compliance');
        const svc = serviceLabels[type];
        const effDate = date ? new Date(date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : 'the date listed above';

        let sections = [];

        // Title
        sections.push({ title: `Privacy Policy for ${name}`, body: `Effective Date: ${effDate}\n\nThis Privacy Policy describes how ${name} ("we," "us," or "our") collects, uses, and shares information when you use our ${svc}${url ? ' at ' + url : ''} (the "Service"). By using the Service, you agree to the collection and use of information as described in this policy.` });

        // Information We Collect
        let collectBody = 'We may collect the following types of information:\n\n';
        if (dataTypes.length > 0) {
            collectBody += '**Personal Information:**\n';
            dataTypes.forEach(d => { collectBody += `- ${dataLabels[d]}\n`; });
        } else {
            collectBody += 'We collect minimal information necessary to provide our Service.';
        }
        if (dataTypes.includes('cookies')) {
            collectBody += '\n**Cookies and Tracking:**\nWe use cookies and similar tracking technologies to monitor activity on our Service and store certain information. You can instruct your browser to refuse all cookies or to indicate when a cookie is being sent.';
        }
        sections.push({ title: 'Information We Collect', body: collectBody });

        // How We Use Information
        sections.push({ title: 'How We Use Your Information', body: `We use the collected information for various purposes:\n\n- To provide, maintain, and improve our Service\n- To notify you about changes to our Service\n- To provide customer support\n- To monitor the usage of our Service\n- To detect, prevent, and address technical issues${dataTypes.includes('email') ? '\n- To send you newsletters, marketing, or promotional materials (with your consent)' : ''}${dataTypes.includes('payment') ? '\n- To process transactions and send related information' : ''}${dataTypes.includes('usage') ? '\n- To gather analysis or valuable information to improve our Service' : ''}` });

        // Third Parties
        if (thirdParties.length > 0) {
            let tpBody = 'We may employ third-party companies and individuals to facilitate our Service, provide the Service on our behalf, or assist us in analyzing how our Service is used. These third parties have access to your personal information only to perform these tasks on our behalf and are obligated not to disclose or use it for any other purpose.\n\n**Service providers we use include:**\n';
            thirdParties.forEach(tp => { tpBody += `- ${thirdPartyLabels[tp]}\n`; });
            sections.push({ title: 'Third-Party Services', body: tpBody });
        }

        // Data Retention
        if (document.getElementById('optDataRetention').checked) {
            sections.push({ title: 'Data Retention', body: `We will retain your personal information only for as long as is necessary for the purposes set out in this Privacy Policy. We will retain and use your information to the extent necessary to comply with our legal obligations, resolve disputes, and enforce our policies.\n\nWhen your personal data is no longer needed, we will delete or anonymize it in a secure manner.` });
        }

        // Security
        if (document.getElementById('optSecurity').checked) {
            sections.push({ title: 'Security of Your Data', body: `The security of your data is important to us. We use commercially acceptable means to protect your personal information, including encryption, access controls, and secure infrastructure. However, no method of transmission over the Internet or method of electronic storage is 100% secure, and we cannot guarantee its absolute security.` });
        }

        // International Transfers
        if (document.getElementById('optInternational').checked) {
            sections.push({ title: 'International Data Transfers', body: `Your information may be transferred to — and maintained on — computers located outside of your state, province, country, or other governmental jurisdiction where data protection laws may differ from those in your jurisdiction.\n\nIf you are located outside the country where our servers are based and choose to provide information to us, please note that we transfer the data to our server location and process it there. Your consent to this Privacy Policy followed by your submission of such information represents your agreement to that transfer.` });
        }

        // Children
        if (document.getElementById('optMinors').checked || compliance.includes('coppa')) {
            sections.push({ title: "Children's Privacy", body: `Our Service does not address anyone under the age of 13 ("Children"). We do not knowingly collect personally identifiable information from anyone under the age of 13. If you are a parent or guardian and you are aware that your child has provided us with personal data, please contact us. If we become aware that we have collected personal data from children without verification of parental consent, we take steps to remove that information from our servers.` });
        }

        // DNT
        if (document.getElementById('optDNT').checked) {
            sections.push({ title: 'Do Not Track Signals', body: `We respect Do Not Track ("DNT") signals. When a DNT browser mechanism is in place, we will not track your activity across other websites. However, note that some third-party services we use may not respond to DNT signals.` });
        }

        // GDPR
        if (compliance.includes('gdpr')) {
            sections.push({ title: 'Your Rights Under GDPR', body: `If you are a resident of the European Economic Area (EEA), you have certain data protection rights under the General Data Protection Regulation (GDPR):\n\n- **Right of Access** — You can request copies of your personal data.\n- **Right to Rectification** — You can request that we correct inaccurate or incomplete information.\n- **Right to Erasure** — You can request that we erase your personal data under certain conditions.\n- **Right to Restrict Processing** — You can request that we restrict the processing of your personal data.\n- **Right to Data Portability** — You can request that we transfer the data we have collected to another organization or directly to you.\n- **Right to Object** — You can object to our processing of your personal data.\n\nTo exercise any of these rights, please contact us at ${email}. We will respond to your request within 30 days.` });
        }

        // CCPA
        if (compliance.includes('ccpa')) {
            sections.push({ title: 'Your Rights Under CCPA', body: `If you are a California resident, the California Consumer Privacy Act (CCPA) grants you specific rights regarding your personal information:\n\n- **Right to Know** — You can request that we disclose what personal information we collect, use, and share.\n- **Right to Delete** — You can request the deletion of your personal information.\n- **Right to Opt-Out** — You can opt out of the sale of your personal information. We do not sell personal information.\n- **Right to Non-Discrimination** — We will not discriminate against you for exercising your CCPA rights.\n\nTo exercise your rights, contact us at ${email}.` });
        }

        // Changes
        sections.push({ title: 'Changes to This Privacy Policy', body: `We may update our Privacy Policy from time to time. We will notify you of any changes by posting the new Privacy Policy on this page and updating the "Effective Date" at the top.\n\nYou are advised to review this Privacy Policy periodically for any changes. Changes are effective when they are posted on this page.` });

        // Contact
        sections.push({ title: 'Contact Us', body: `If you have any questions about this Privacy Policy, please contact us:\n\n- **Email:** ${email}${url ? '\n- **Website:** ' + url : ''}` });

        // Render all formats
        renderAll(sections, name);
    }

    function renderAll(sections, companyName) {
        // HTML
        let html = '';
        sections.forEach((s, i) => {
            if (i === 0) {
                html += `<h1>${esc(s.title)}</h1>\n${mdToHtml(s.body)}\n`;
            } else {
                html += `<h2>${esc(s.title)}</h2>\n${mdToHtml(s.body)}\n`;
            }
        });
        document.getElementById('preview-html').innerHTML = html;
        document.getElementById('raw-html').value = html;

        // Markdown
        let md = '';
        sections.forEach((s, i) => {
            md += (i === 0 ? '# ' : '## ') + s.title + '\n\n' + s.body + '\n\n';
        });
        document.getElementById('raw-markdown').value = md.trim();

        // Plain text
        let plain = '';
        sections.forEach((s, i) => {
            plain += s.title.toUpperCase() + '\n' + '='.repeat(s.title.length) + '\n\n';
            plain += s.body.replace(/\*\*(.+?)\*\*/g, '$1').replace(/^- /gm, '• ') + '\n\n';
        });
        document.getElementById('raw-plain').value = plain.trim();

        document.getElementById('output-section').classList.add('visible');
        document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function mdToHtml(text) {
        return text
            .split('\n\n').map(block => {
                block = block.trim();
                if (!block) return '';
                // Lists
                if (block.match(/^- /m)) {
                    const items = block.split('\n').filter(l => l.startsWith('- ')).map(l => `<li>${boldify(esc(l.slice(2)))}</li>`).join('\n');
                    return `<ul>\n${items}\n</ul>`;
                }
                // Bold headings within block
                return `<p>${boldify(esc(block)).replace(/\n/g, '<br>')}</p>`;
            }).join('\n');
    }

    function boldify(s) { return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); }

    let currentTab = 'preview';
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelector(`.tab-btn:nth-child(${['preview','html','markdown','plain'].indexOf(tab)+1})`).classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        currentTab = tab;
    }

    function copyOutput() {
        let text = '';
        if (currentTab === 'preview') text = document.getElementById('raw-html').value;
        else if (currentTab === 'html') text = document.getElementById('raw-html').value;
        else if (currentTab === 'markdown') text = document.getElementById('raw-markdown').value;
        else text = document.getElementById('raw-plain').value;
        navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => showToast('Copy failed'));
    }

    function downloadOutput() {
        let text = '', ext = 'txt';
        if (currentTab === 'html' || currentTab === 'preview') { text = document.getElementById('raw-html').value; ext = 'html'; }
        else if (currentTab === 'markdown') { text = document.getElementById('raw-markdown').value; ext = 'md'; }
        else { text = document.getElementById('raw-plain').value; }
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `privacy-policy.${ext}`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function resetForm() {
        document.querySelectorAll('input[type="text"], input[type="email"], input[type="url"]').forEach(i => i.value = '');
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        document.getElementById('serviceType').selectedIndex = 0;
        document.getElementById('effectiveDate').valueAsDate = new Date();
        document.getElementById('output-section').classList.remove('visible');
    }
    </script>
</body>
</html>
