<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Table Generator - Free Online Tool</title>
<meta name="description" content="Free online HTML table generator. Create tables visually, edit cells, add rows and columns, and export as HTML or Markdown. No data leaves your browser.">
<meta name="keywords" content="html table generator, table builder, html table, markdown table, table creator, free table tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/htmltable.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .size-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .size-controls label { font-size: .82rem; font-weight: 600; }
  .size-controls input[type="number"] { width: 60px; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); font-size: .85rem; background: var(--bg); color: var(--text); }
  .table-wrap { overflow-x: auto; margin: 12px 0; }
  #editTable { width: 100%; border-collapse: collapse; }
  #editTable th, #editTable td { border: 1px solid var(--border); padding: 0; min-width: 80px; }
  #editTable th { background: var(--surface2); }
  #editTable input { width: 100%; border: none; padding: 8px 10px; font: inherit; font-size: .85rem; background: transparent; color: var(--text); outline: none; box-sizing: border-box; }
  #editTable input:focus { background: #f0f9ff; }
  .col-actions { display: flex; gap: 2px; }
  .col-actions button { flex: 1; font-size: .7rem; padding: 4px 6px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--muted); cursor: pointer; }
  .col-actions button:hover { background: var(--surface2); color: var(--text); }
  .col-actions button.del:hover { color: var(--error); }
  .row-action { padding: 4px !important; text-align: center; width: 32px; }
  .row-action button { font-size: .7rem; padding: 3px 6px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--muted); cursor: pointer; }
  .row-action button:hover { background: var(--surface2); color: var(--error); }
  .option-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 12px 0; }
  .option-row label { font-size: .82rem; display: flex; align-items: center; gap: 4px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>HTML Table Generator</h1>
<p class="subtitle">Build HTML tables visually — edit cells, add rows/columns, export HTML or Markdown</p>

<div class="card">
<h2>📐 Table Size</h2>
<div class="size-controls">
  <label>Rows: <input type="number" id="rows" value="3" min="1" max="50" onchange="rebuild()"></label>
  <label>Columns: <input type="number" id="cols" value="3" min="1" max="20" onchange="rebuild()"></label>
  <button class="btn-secondary" onclick="addRow()">+ Row</button>
  <button class="btn-secondary" onclick="addCol()">+ Column</button>
  <button class="btn-secondary" onclick="clearTable()">Clear</button>
</div>
<div class="option-row">
  <label><input type="checkbox" id="hasHeader" checked onchange="generate()"> Header row</label>
  <label><input type="checkbox" id="stripedRows" onchange="generate()"> Striped rows</label>
  <label><input type="checkbox" id="borderedCells" checked onchange="generate()"> Bordered</label>
</div>
<div class="table-wrap" id="tableWrap"></div>
</div>

<div class="card">
<h2>📤 Output</h2>
<div class="tabs">
  <button class="tab active" onclick="setFormat('html',this)">HTML</button>
  <button class="tab" onclick="setFormat('markdown',this)">Markdown</button>
</div>
<textarea id="output" readonly style="min-height:180px;font-family:var(--mono);font-size:.82rem"></textarea>
<div class="btn-row">
  <button class="btn-primary" onclick="copyOut()">📋 Copy</button>
  <button class="btn-secondary" onclick="downloadOut()">⬇️ Download</button>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let data=[], format='html';

function initData(r,c){
  data=[];
  for(let i=0;i<r;i++){
    const row=[];
    for(let j=0;j<c;j++) row.push(i===0?'Header '+(j+1):'');
    data.push(row);
  }
}

function rebuild(){
  const r=Math.max(1,Math.min(50,parseInt($('rows').value)||3));
  const c=Math.max(1,Math.min(20,parseInt($('cols').value)||3));
  $('rows').value=r; $('cols').value=c;
  // preserve existing data
  const old=data.slice();
  data=[];
  for(let i=0;i<r;i++){
    const row=[];
    for(let j=0;j<c;j++){
      row.push(old[i]&&old[i][j]!==undefined?old[i][j]:(i===0?'Header '+(j+1):''));
    }
    data.push(row);
  }
  renderTable();
}

function renderTable(){
  const r=data.length, c=data[0]?data[0].length:0;
  let html='<table id="editTable">';
  // column action row
  html+='<tr>';
  for(let j=0;j<c;j++){
    html+=`<td style="border:none;padding:2px"><div class="col-actions"><button onclick="insertCol(${j})" title="Insert column left">+</button><button class="del" onclick="removeCol(${j})" title="Delete column">&times;</button></div></td>`;
  }
  html+='<td style="border:none"></td></tr>';
  // data rows
  for(let i=0;i<r;i++){
    const tag=(i===0&&$('hasHeader').checked)?'th':'td';
    html+='<tr>';
    for(let j=0;j<c;j++){
      html+=`<${tag}><input value="${esc(data[i][j])}" onchange="data[${i}][${j}]=this.value;generate()" placeholder="${i===0?'Header':'Cell'}"></${tag}>`;
    }
    html+=`<td class="row-action"><button onclick="removeRow(${i})" title="Delete row">&times;</button></td>`;
    html+='</tr>';
  }
  html+='</table>';
  $('tableWrap').innerHTML=html;
  generate();
}

function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function addRow(){
  const c=data[0]?data[0].length:parseInt($('cols').value);
  data.push(Array(c).fill(''));
  $('rows').value=data.length;
  renderTable();
}

function addCol(){
  data.forEach((row,i)=>row.push(i===0?'Header '+(row.length+1):''));
  $('cols').value=data[0].length;
  renderTable();
}

function insertCol(j){
  data.forEach((row,i)=>row.splice(j,0,i===0?'New':''));
  $('cols').value=data[0].length;
  renderTable();
}

function removeRow(i){
  if(data.length<=1)return;
  data.splice(i,1);
  $('rows').value=data.length;
  renderTable();
}

function removeCol(j){
  if(!data[0]||data[0].length<=1)return;
  data.forEach(row=>row.splice(j,1));
  $('cols').value=data[0].length;
  renderTable();
}

function clearTable(){
  data.forEach((row,i)=>row.fill(i===0?'':''));
  renderTable();
}

function setFormat(f,btn){
  format=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  generate();
}

function generate(){
  if(format==='html') generateHTML();
  else generateMarkdown();
}

function generateHTML(){
  const hasHeader=$('hasHeader').checked;
  const striped=$('stripedRows').checked;
  const bordered=$('borderedCells').checked;
  let style='border-collapse:collapse;width:100%';
  let cellStyle=bordered?'border:1px solid #ddd;padding:8px 12px;text-align:left':'padding:8px 12px;text-align:left';
  let headerStyle=cellStyle+';background:#f5f5f5;font-weight:600';

  let html=`<table style="${style}">\n`;
  data.forEach((row,i)=>{
    const isHeader=hasHeader&&i===0;
    const rowStyle=(striped&&!isHeader&&i%2===1)?'background:#fafafa':'';
    html+=rowStyle?`  <tr style="${rowStyle}">\n`:'  <tr>\n';
    const tag=isHeader?'th':'td';
    const st=isHeader?headerStyle:cellStyle;
    row.forEach(cell=>{
      html+=`    <${tag} style="${st}">${cell}</${tag}>\n`;
    });
    html+='  </tr>\n';
  });
  html+='</table>';
  $('output').value=html;
}

function generateMarkdown(){
  if(!data.length){$('output').value='';return;}
  const hasHeader=$('hasHeader').checked;
  const widths=data[0].map((_,j)=>Math.max(3,...data.map(r=>(r[j]||'').length)));
  const pad=(s,w)=>s+' '.repeat(Math.max(0,w-s.length));
  let lines=[];
  data.forEach((row,i)=>{
    lines.push('| '+row.map((c,j)=>pad(c||'',widths[j])).join(' | ')+' |');
    if(i===0&&hasHeader){
      lines.push('| '+widths.map(w=>'-'.repeat(w)).join(' | ')+' |');
    }
  });
  if(!hasHeader){
    lines.splice(0,0,'| '+widths.map(w=>'-'.repeat(w)).join(' | ')+' |');
  }
  $('output').value=lines.join('\n');
}

function copyOut(){
  navigator.clipboard.writeText($('output').value).then(()=>{
    const el=$('toast');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500);
  });
}

function downloadOut(){
  const ext=format==='html'?'html':'md';
  const blob=new Blob([$('output').value],{type:'text/'+ext});
  const a=document.createElement('a');
  a.download='table.'+ext;a.href=URL.createObjectURL(blob);a.click();
}

// init
initData(3,3);
renderTable();
</script>
</body>
</html>
