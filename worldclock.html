<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock — Multi-Timezone Live Clock for Distributed Teams</title>
<meta name="description" content="Track time across any number of IANA timezones with a live-updating world clock. Designed for distributed teams, standups, and meeting planning. 100% client-side.">
<meta name="keywords" content="world clock, timezone, IANA, distributed team, meeting planner, free tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/worldclock.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .clock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .clock {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    position: relative;
    transition: border-color .15s, box-shadow .15s;
  }
  .clock.night { background: #0f172a; color: #e2e8f0; border-color: #1e293b; }
  .clock.night .tz-sub { color: #94a3b8; }
  .clock.night .tz-date { color: #cbd5e1; }
  .clock.day { background: #fefce8; border-color: #fde68a; }
  .clock.work { background: #ecfdf5; border-color: #a7f3d0; }
  .clock .remove { position: absolute; top: 6px; right: 8px; background: none; border: 0; cursor: pointer; font-size: 1.1rem; color: var(--muted); padding: 2px 6px; }
  .clock .remove:hover { color: var(--error); }
  .tz-label { font-weight: 700; font-size: .95rem; margin-bottom: 2px; }
  .tz-sub { font-size: .75rem; color: var(--muted); margin-bottom: 8px; font-family: var(--mono); }
  .tz-time { font-family: var(--mono); font-size: 1.8rem; font-weight: 700; line-height: 1.1; letter-spacing: -1px; }
  .tz-date { font-size: .8rem; color: var(--muted); margin-top: 4px; }
  .tz-offset { font-size: .7rem; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
  .add-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .add-row input { flex: 1; min-width: 180px; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--mono); }
  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .pill { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: .75rem; cursor: pointer; }
  .pill:hover { background: var(--surface2); }
  .format-row { display: flex; gap: 12px; font-size: .85rem; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .format-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .meeting-picker { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .meeting-picker input { padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); background: var(--bg); color: var(--text); }
  .note { font-size: .8rem; color: var(--muted); }
  .empty { text-align: center; padding: 24px; color: var(--muted); }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; All Tools</a>
<h1>🌍 World Clock</h1>
<p class="subtitle">Track time across any number of IANA timezones at once. Pick a target instant to plan meetings across regions — cards update live every second.</p>

<div class="container">
  <div class="card">
    <h2>Add a timezone</h2>
    <div class="add-row">
      <input type="text" id="tz-input" placeholder="Type any IANA zone, e.g. Europe/Berlin or Asia/Tokyo" list="tz-list" spellcheck="false">
      <datalist id="tz-list"></datalist>
      <button class="btn" onclick="addFromInput()">Add</button>
    </div>
    <div class="suggestions" id="suggest"></div>
    <div class="format-row">
      <label><input type="checkbox" id="f24" checked> 24-hour</label>
      <label><input type="checkbox" id="fsec" checked> Show seconds</label>
      <button class="btn-secondary" onclick="clearAll()">Remove all</button>
    </div>
    <div class="meeting-picker">
      <span class="note">Plan a meeting at:</span>
      <input type="datetime-local" id="when" step="60">
      <button class="btn-secondary" onclick="clearWhen()">Now</button>
    </div>
  </div>

  <div class="card">
    <div class="clock-grid" id="clocks"></div>
  </div>
</div>

<footer>Built with ☕ by Steven Li · No data leaves your browser</footer>
<div class="toast" id="toast">Saved</div>

<script>
const DEFAULTS = [
  'UTC',
  Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC',
  'America/Los_Angeles',
  'America/New_York',
  'Europe/London',
  'Europe/Berlin',
  'Asia/Tokyo'
];

const SUGGESTED = [
  'UTC', 'America/Los_Angeles', 'America/Denver', 'America/Chicago', 'America/New_York',
  'America/Sao_Paulo', 'Europe/London', 'Europe/Berlin', 'Europe/Paris', 'Europe/Moscow',
  'Africa/Johannesburg', 'Asia/Dubai', 'Asia/Karachi', 'Asia/Kolkata', 'Asia/Bangkok',
  'Asia/Shanghai', 'Asia/Singapore', 'Asia/Tokyo', 'Asia/Seoul', 'Australia/Sydney', 'Pacific/Auckland'
];

// Pull a broad list of IANA zones if the runtime supports it
let ALL_ZONES = SUGGESTED.slice();
try {
  if (typeof Intl.supportedValuesOf === 'function') {
    ALL_ZONES = Intl.supportedValuesOf('timeZone');
  }
} catch (e) {}

const dl = document.getElementById('tz-list');
dl.innerHTML = ALL_ZONES.map(z => `<option value="${z}">`).join('');

const sug = document.getElementById('suggest');
sug.innerHTML = SUGGESTED.map(z => `<span class="pill" data-tz="${z}">${z.split('/').pop().replace(/_/g, ' ')}</span>`).join('');
sug.addEventListener('click', e => {
  const t = e.target.closest('.pill');
  if (t) addZone(t.dataset.tz);
});

let zones = [];
try { zones = JSON.parse(localStorage.getItem('worldclock.zones') || ''); } catch (e) {}
if (!Array.isArray(zones) || !zones.length) zones = [...new Set(DEFAULTS)];

function save() { localStorage.setItem('worldclock.zones', JSON.stringify(zones)); }

function addZone(tz) {
  try {
    new Intl.DateTimeFormat('en-US', { timeZone: tz });
  } catch (e) {
    flash('Invalid timezone: ' + tz);
    return;
  }
  if (zones.includes(tz)) return;
  zones.push(tz);
  save();
  render();
}
function removeZone(tz) {
  zones = zones.filter(z => z !== tz);
  save();
  render();
}
function clearAll() {
  zones = [];
  save();
  render();
}
function addFromInput() {
  const v = document.getElementById('tz-input').value.trim();
  if (!v) return;
  addZone(v);
  document.getElementById('tz-input').value = '';
}
document.getElementById('tz-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFromInput();
});

function flash(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1400);
}

function getParts(date, tz) {
  const fmt = new Intl.DateTimeFormat('en-GB', {
    timeZone: tz,
    hour12: false,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    weekday: 'short'
  });
  const parts = {};
  fmt.formatToParts(date).forEach(p => { parts[p.type] = p.value; });
  return parts;
}
function getOffsetMinutes(date, tz) {
  // Compute offset by comparing formatted local components vs UTC timestamp
  const p = getParts(date, tz);
  const asUTC = Date.UTC(+p.year, +p.month - 1, +p.day, +p.hour, +p.minute, +p.second);
  return Math.round((asUTC - date.getTime()) / 60000);
}
function fmtOffset(mins) {
  const sign = mins >= 0 ? '+' : '-';
  const a = Math.abs(mins);
  return 'UTC' + sign + String(Math.floor(a / 60)).padStart(2, '0') + ':' + String(a % 60).padStart(2, '0');
}

function render() {
  const grid = document.getElementById('clocks');
  if (!zones.length) {
    grid.innerHTML = '<div class="empty">No timezones added yet. Click suggestions or type one above.</div>';
    return;
  }
  const show24 = document.getElementById('f24').checked;
  const showSec = document.getElementById('fsec').checked;
  const whenVal = document.getElementById('when').value;
  const now = whenVal ? new Date(whenVal) : new Date();

  grid.innerHTML = zones.map(tz => {
    let parts;
    try { parts = getParts(now, tz); }
    catch (e) { return `<div class="clock"><button class="remove" onclick="removeZone('${tz}')">&times;</button><div class="tz-label">${tz}</div><div class="tz-sub">invalid zone</div></div>`; }
    let hour = +parts.hour;
    const min = parts.minute;
    const sec = parts.second;
    let suffix = '';
    if (!show24) {
      suffix = hour >= 12 ? ' PM' : ' AM';
      hour = hour % 12 || 12;
    }
    const timeStr = String(hour).padStart(show24 ? 2 : 1, '0') + ':' + min + (showSec ? ':' + sec : '') + suffix;
    const offset = fmtOffset(getOffsetMinutes(now, tz));
    const hr24 = +parts.hour;
    let cls = '';
    if (hr24 >= 9 && hr24 < 17) cls = 'work';
    else if (hr24 >= 6 && hr24 < 20) cls = 'day';
    else cls = 'night';
    const display = tz.split('/').pop().replace(/_/g, ' ');
    const dateStr = `${parts.weekday}, ${parts.day} ${monthName(+parts.month)} ${parts.year}`;
    return `<div class="clock ${cls}">
      <button class="remove" title="Remove" onclick="removeZone('${tz}')">&times;</button>
      <div class="tz-label">${display}</div>
      <div class="tz-sub">${tz}</div>
      <div class="tz-time">${timeStr}</div>
      <div class="tz-date">${dateStr}</div>
      <div class="tz-offset">${offset}</div>
    </div>`;
  }).join('');
}

function monthName(m) {
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m - 1];
}

function clearWhen() { document.getElementById('when').value = ''; render(); }

document.getElementById('f24').addEventListener('change', render);
document.getElementById('fsec').addEventListener('change', render);
document.getElementById('when').addEventListener('input', render);

render();
setInterval(render, 1000);
</script>
</body>
</html>
