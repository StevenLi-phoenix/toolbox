<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker — Daily Streak & Heatmap</title>
    <meta name="description" content="Free online habit tracker with GitHub-style contribution heatmap. Track daily habits, build streaks, and visualize your consistency. Data stored locally in your browser.">
    <meta name="keywords" content="habit tracker, streak tracker, daily habits, contribution graph, heatmap, productivity, free tool">
    <meta name="author" content="Steven Li">
    <meta property="og:title" content="Habit Tracker — Daily Streak & Heatmap">
    <meta property="og:description" content="Track daily habits with a beautiful contribution heatmap. Build streaks and stay consistent. Free, no sign-up required.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/habits.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Habit Tracker — Daily Streak & Heatmap">
    <meta name="twitter:description" content="Track daily habits with a beautiful contribution heatmap. Build streaks and stay consistent.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/habits.html">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:20px}
        .container{max-width:960px;margin:0 auto}
        h1{font-size:1.8rem;margin-bottom:6px;text-align:center}
        .subtitle{text-align:center;color:#8b949e;margin-bottom:24px;font-size:.9rem}
        .coffee{text-align:center;margin-bottom:28px}
        .coffee a{color:#f0b429;text-decoration:none;font-size:.85rem;border:1px solid #f0b42955;padding:5px 14px;border-radius:20px;transition:all .2s}
        .coffee a:hover{background:#f0b42922;border-color:#f0b429}

        /* Add habit */
        .add-section{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
        .add-section input{flex:1;min-width:200px;background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:10px 14px;border-radius:8px;font-size:.95rem;outline:none}
        .add-section input:focus{border-color:#58a6ff}
        .add-section input::placeholder{color:#484f58}
        .color-picker{width:42px;height:42px;border:1px solid #30363d;border-radius:8px;background:#161b22;cursor:pointer;padding:2px}
        .color-picker::-webkit-color-swatch-wrapper{padding:0}
        .color-picker::-webkit-color-swatch{border:none;border-radius:5px}
        .btn{background:#238636;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:500;transition:background .2s}
        .btn:hover{background:#2ea043}
        .btn-danger{background:#da3633}
        .btn-danger:hover{background:#f85149}
        .btn-sm{padding:6px 12px;font-size:.8rem}

        /* Habit card */
        .habit-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin-bottom:20px;transition:border-color .2s}
        .habit-card:hover{border-color:#484f58}
        .habit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:8px}
        .habit-name{font-size:1.15rem;font-weight:600;display:flex;align-items:center;gap:8px}
        .habit-dot{width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0}
        .habit-actions{display:flex;gap:6px;align-items:center}
        .streak-badge{background:#30363d;padding:4px 10px;border-radius:12px;font-size:.78rem;color:#f0b429;white-space:nowrap}
        .streak-badge span{font-weight:700}

        .stats-row{display:flex;gap:16px;margin:10px 0 14px;flex-wrap:wrap}
        .stat{font-size:.8rem;color:#8b949e}
        .stat strong{color:#e6edf3}

        /* Heatmap */
        .heatmap-wrapper{overflow-x:auto;padding-bottom:8px}
        .heatmap{display:flex;gap:3px;direction:rtl}
        .heatmap-week{display:flex;flex-direction:column;gap:3px}
        .heatmap-day{width:14px;height:14px;border-radius:3px;background:#161b22;border:1px solid #1b2028;cursor:pointer;transition:all .15s}
        .heatmap-day:hover{border-color:#58a6ff;transform:scale(1.3);z-index:1}
        .heatmap-day.checked{border-color:transparent}
        .heatmap-day.today{border-color:#58a6ff!important}

        .month-labels{display:flex;gap:3px;direction:rtl;margin-bottom:2px;padding-left:0}
        .month-label{font-size:.65rem;color:#484f58;min-width:14px;text-align:center}

        .day-labels{display:flex;flex-direction:column;gap:3px;margin-right:6px;flex-shrink:0}
        .day-labels span{font-size:.6rem;color:#484f58;height:14px;line-height:14px}

        .heatmap-container{display:flex;align-items:flex-start}

        /* Toggle button for today */
        .toggle-today{padding:10px 24px;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;border:2px solid;transition:all .2s;margin-top:10px}
        .toggle-today.done{background:transparent;color:#8b949e;border-color:#30363d}
        .toggle-today.not-done{color:#fff;border-color:transparent}

        /* Tooltip */
        .tooltip{position:fixed;background:#1c2128;border:1px solid #30363d;color:#e6edf3;padding:6px 10px;border-radius:6px;font-size:.78rem;pointer-events:none;z-index:100;display:none;white-space:nowrap}

        /* Empty state */
        .empty{text-align:center;padding:60px 20px;color:#484f58}
        .empty p{font-size:1.1rem;margin-bottom:8px}
        .empty small{font-size:.85rem}

        /* Legend */
        .legend{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:6px;font-size:.7rem;color:#484f58}
        .legend-box{width:12px;height:12px;border-radius:2px}

        @media(max-width:600px){
            body{padding:12px}
            h1{font-size:1.4rem}
            .heatmap-day{width:11px;height:11px}
            .habit-card{padding:14px}
            .stats-row{gap:10px}
            .day-labels{display:none}
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Habit Tracker</h1>
        <p class="subtitle">Build streaks. Visualize consistency. All data stored locally.</p>
        <div class="coffee"><a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy me a coffee</a></div>

        <div class="add-section">
            <input type="text" id="habitName" placeholder="New habit name (e.g., Exercise, Read, Meditate)" maxlength="50">
            <input type="color" class="color-picker" id="habitColor" value="#39d353">
            <button class="btn" onclick="addHabit()">+ Add Habit</button>
        </div>

        <div id="habits"></div>
        <div class="tooltip" id="tooltip"></div>
    </div>

    <script>
    const STORAGE_KEY = 'habit-tracker-v1';
    const WEEKS = 26; // ~6 months
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function loadData() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }
    function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    function todayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function dateStr(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function addHabit() {
        const name = document.getElementById('habitName').value.trim();
        if (!name) return;
        const color = document.getElementById('habitColor').value;
        const data = loadData();
        data.push({ id: Date.now().toString(36), name, color, dates: {}, created: todayStr() });
        saveData(data);
        document.getElementById('habitName').value = '';
        render();
    }

    function deleteHabit(id) {
        if (!confirm('Delete this habit and all its data?')) return;
        const data = loadData().filter(h => h.id !== id);
        saveData(data);
        render();
    }

    function toggleDate(id, date) {
        const data = loadData();
        const habit = data.find(h => h.id === id);
        if (!habit) return;
        if (habit.dates[date]) delete habit.dates[date];
        else habit.dates[date] = 1;
        saveData(data);
        render();
    }

    function getStreak(habit) {
        let streak = 0;
        const d = new Date();
        // Check if today is done; if not, start from yesterday
        if (!habit.dates[dateStr(d)]) d.setDate(d.getDate() - 1);
        while (habit.dates[dateStr(d)]) {
            streak++;
            d.setDate(d.getDate() - 1);
        }
        return streak;
    }

    function getLongestStreak(habit) {
        const sorted = Object.keys(habit.dates).sort();
        if (!sorted.length) return 0;
        let max = 1, cur = 1;
        for (let i = 1; i < sorted.length; i++) {
            const prev = new Date(sorted[i-1]);
            const curr = new Date(sorted[i]);
            const diff = (curr - prev) / 86400000;
            if (diff === 1) { cur++; max = Math.max(max, cur); }
            else cur = 1;
        }
        return Math.max(max, cur);
    }

    function getCompletionRate(habit) {
        const created = new Date(habit.created || '2025-01-01');
        const now = new Date();
        const totalDays = Math.max(1, Math.floor((now - created) / 86400000) + 1);
        const done = Object.keys(habit.dates).length;
        return Math.round((done / totalDays) * 100);
    }

    function colorWithOpacity(hex, opacity) {
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        return `rgba(${r},${g},${b},${opacity})`;
    }

    function buildHeatmap(habit) {
        const today = new Date();
        today.setHours(0,0,0,0);
        const todayS = dateStr(today);

        // Build grid: WEEKS columns (weeks), 7 rows (days)
        let html = '<div class="heatmap-container"><div class="day-labels">';
        for (let i = 0; i < 7; i++) html += `<span>${i%2===1?DAYS[i]:''}</span>`;
        html += '</div><div><div class="heatmap-wrapper"><div class="heatmap">';

        const startDay = new Date(today);
        // Go back to get full weeks
        const totalDays = WEEKS * 7;
        startDay.setDate(today.getDate() - totalDays + 1);
        // Align to Sunday
        startDay.setDate(startDay.getDate() - startDay.getDay());

        let weekHtml = '';
        let dayCount = 0;
        const d = new Date(startDay);

        while (d <= today || d.getDay() !== 0) {
            if (dayCount % 7 === 0) {
                if (weekHtml) html += `<div class="heatmap-week">${weekHtml}</div>`;
                weekHtml = '';
            }
            const ds = dateStr(d);
            const isFuture = d > today;
            const isToday = ds === todayS;
            const checked = habit.dates[ds];
            let bg = '#161b22';
            let cls = 'heatmap-day';
            if (checked && !isFuture) {
                bg = habit.color;
                cls += ' checked';
            }
            if (isToday) cls += ' today';
            if (isFuture) {
                weekHtml += `<div class="${cls}" style="background:${bg};opacity:.3" data-date="${ds}"></div>`;
            } else {
                weekHtml += `<div class="${cls}" style="background:${bg}" data-date="${ds}" data-id="${habit.id}" onclick="toggleDate('${habit.id}','${ds}')" onmouseenter="showTip(event,'${ds}',${checked?'true':'false'})" onmouseleave="hideTip()"></div>`;
            }
            d.setDate(d.getDate() + 1);
            dayCount++;
            if (d > today && d.getDay() === 0) break;
        }
        if (weekHtml) html += `<div class="heatmap-week">${weekHtml}</div>`;

        html += '</div></div>';
        // Legend
        html += `<div class="legend"><span>Less</span>`;
        html += `<div class="legend-box" style="background:#161b22;border:1px solid #1b2028"></div>`;
        [0.25, 0.5, 0.75, 1].forEach(o => {
            html += `<div class="legend-box" style="background:${colorWithOpacity(habit.color, o)}"></div>`;
        });
        html += `<span>More</span></div>`;
        html += '</div></div>';
        return html;
    }

    function render() {
        const data = loadData();
        const el = document.getElementById('habits');
        if (!data.length) {
            el.innerHTML = '<div class="empty"><p>No habits yet</p><small>Add your first habit above to start tracking!</small></div>';
            return;
        }

        const todayS = todayStr();
        el.innerHTML = data.map(h => {
            const streak = getStreak(h);
            const longest = getLongestStreak(h);
            const rate = getCompletionRate(h);
            const total = Object.keys(h.dates).length;
            const doneToday = !!h.dates[todayS];
            return `
            <div class="habit-card">
                <div class="habit-header">
                    <div class="habit-name">
                        <span class="habit-dot" style="background:${h.color}"></span>
                        ${esc(h.name)}
                    </div>
                    <div class="habit-actions">
                        ${streak > 0 ? `<span class="streak-badge">🔥 <span>${streak}</span> day${streak>1?'s':''}</span>` : ''}
                        <button class="btn btn-danger btn-sm" onclick="deleteHabit('${h.id}')">✕</button>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat">Total: <strong>${total}</strong></div>
                    <div class="stat">Best: <strong>${longest} day${longest!==1?'s':''}</strong></div>
                    <div class="stat">Rate: <strong>${rate}%</strong></div>
                </div>
                ${buildHeatmap(h)}
                <div style="text-align:center">
                    <button class="toggle-today ${doneToday?'done':'not-done'}" style="background:${doneToday?'transparent':h.color}" onclick="toggleDate('${h.id}','${todayS}')">
                        ${doneToday ? '✓ Done today' : 'Mark today ✓'}
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    const tooltip = document.getElementById('tooltip');
    function showTip(e, date, checked) {
        const d = new Date(date + 'T12:00:00');
        const formatted = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        tooltip.textContent = `${formatted} — ${checked ? '✓ Done' : 'Not done'}`;
        tooltip.style.display = 'block';
        tooltip.style.left = e.clientX + 12 + 'px';
        tooltip.style.top = e.clientY - 30 + 'px';
    }
    function hideTip() { tooltip.style.display = 'none'; }

    // Handle Enter key
    document.getElementById('habitName').addEventListener('keydown', e => {
        if (e.key === 'Enter') addHabit();
    });

    render();
    </script>
</body>
</html>
