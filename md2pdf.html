    .pdf-content hr { border: none; border-top: 1px solid #d2d2d7; margin: 1.5em 0; }
  </style>

      gfm: true,
    });

    // ===== Render =====
    let renderTimeout;
    function render() {
      const md = editor.value;
      const raw = marked.parse(md);
      preview.innerHTML = DOMPurify.sanitize(raw);

      // Stats
      const chars = md.length;
      const words = md.trim() ? md.trim().split(/\s+/).length : 0;
      charCount.textContent = `${chars.toLocaleString()} chars`;
      wordCount.textContent = `${words.toLocaleString()} words`;

      // Save to localStorage
      try { localStorage.setItem('md2pdf_content', md); } catch(e) {}
    }

    editor.addEventListener('input', () => {
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(render, 80);
    });

    // ===== Tab key support =====
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
        render();
      }
    });

    // ===== Load saved content =====
    const saved = localStorage.getItem('md2pdf_content');
    editor.value = saved !== null ? saved : defaultContent;
    render();

    // ===== PDF Download =====
    downloadBtn.addEventListener('click', async () => {
      if (!editor.value.trim()) {
        toast('Nothing to export');
        return;
      }

      generatingEl.classList.add('show');
      downloadBtn.disabled = true;

      try {
        // Build offscreen container
        const container = document.createElement('div');
        container.className = 'pdf-content';
        container.innerHTML = DOMPurify.sanitize(marked.parse(editor.value));
        container.style.width = '700px';
        container.style.padding = '0';

        const opt = {
          margin:       [12, 14, 12, 14],
          filename:     'document.pdf',
          image:        { type: 'jpeg', quality: 0.96 },
          html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
          jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
        };

        await html2pdf().set(opt).from(container).save();
        toast('PDF downloaded!');
      } catch (err) {
        console.error(err);
        toast('Failed to generate PDF');
      } finally {
        generatingEl.classList.remove('show');
        downloadBtn.disabled = false;
      }
    });

    // ===== Clear =====
    clearBtn.addEventListener('click', () => {
      if (editor.value && !confirm('Clear the editor?')) return;
      editor.value = '';
      render();
      editor.focus();
    });

    // ===== Theme =====
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      iconSun.style.display = theme === 'dark' ? 'none' : 'block';
      iconMoon.style.display = theme === 'dark' ? 'block' : 'none';
      try { localStorage.setItem('md2pdf_theme', theme); } catch(e) {}
    }

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Load saved theme or detect system preference
    const savedTheme = localStorage.getItem('md2pdf_theme');
    if (savedTheme) {
      setTheme(savedTheme);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      setTheme('dark');
    }

    // ===== Toast =====
    let toastTimer;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    // ===== Divider Drag =====
    let dragging = false;
    divider.addEventListener('mousedown', (e) => {
      dragging = true;
      divider.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const main = document.querySelector('.main');
      const rect = main.getBoundingClientRect();
      const pct = ((e.clientX - rect.left) / rect.width) * 100;
      const clamped = Math.max(20, Math.min(80, pct));
      document.getElementById('editorPanel').style.flex = `0 0 ${clamped}%`;
      document.getElementById('previewPanel').style.flex = `0 0 ${100 - clamped}%`;
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      divider.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    // ===== Mobile Tabs =====
    document.querySelectorAll('.mobile-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mobile-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('editorPanel').classList.toggle('active', tab === 'editor');
        document.getElementById('previewPanel').classList.toggle('active', tab === 'preview');
      });
    });

    // ===== Keyboard Shortcuts =====
    document.addEventListener('keydown', (e) => {
      // Ctrl/Cmd+S → Download PDF
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        downloadBtn.click();
      }
      // Ctrl/Cmd+Shift+L → Toggle theme
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'L') {
        e.preventDefault();
        themeToggle.click();
      }
    });
  </script>
</body>
</html>
