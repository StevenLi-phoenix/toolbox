  <script>
    // ===== Elements =====
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const charCount = document.getElementById('charCount');
    const wordCount = document.getElementById('wordCount');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const themeToggle = document.getElementById('themeToggle');
    const iconSun = document.getElementById('iconSun');
    const iconMoon = document.getElementById('iconMoon');
    const toastEl = document.getElementById('toast');
    const generatingEl = document.getElementById('generating');
    const divider = document.getElementById('divider');

    // ===== Default content =====
    const defaultContent = `# Welcome to MD2PDF

A free, **privacy-first** Markdown to PDF converter that runs entirely in your browser.

## Features

- ✏️ **Live Preview** — See your Markdown rendered in real-time
- 📄 **PDF Export** — One-click download as a clean PDF
- 🌙 **Dark Mode** — Easy on the eyes
- 🔒 **Private** — Your data never leaves your browser
- 📱 **Responsive** — Works on desktop and mobile

## Getting Started

Simply start typing in the editor on the left. The preview updates instantly.

### Syntax Examples

**Bold text**, *italic text*, ~~strikethrough~~, and \`inline code\`.

> Blockquotes look great for callouts and notes.

#### Code Blocks

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}

console.log(greet('World'));
\`\`\`

#### Tables

| Feature       | Status |
|---------------|--------|
| Live Preview  | ✅      |
| PDF Export    | ✅      |
| Dark Mode     | ✅      |
| Spell Check   | ✅      |

#### Task Lists

- [x] Write Markdown
- [x] Preview in real-time
- [ ] Download as PDF

---

When you're ready, click **Download PDF** to save your document. Enjoy! 🎉
`;

    // ===== Marked Config =====
    marked.setOptions({
      breaks: true,
      gfm: true,
    });

    // ===== Render =====
    let renderTimeout;
    function render() {
      const md = editor.value;
      const raw = marked.parse(md);
      preview.innerHTML = DOMPurify.sanitize(raw);

      // Stats
      const chars = md.length;
      const words = md.trim() ? md.trim().split(/\s+/).length : 0;
      charCount.textContent = `${chars.toLocaleString()} chars`;
      wordCount.textContent = `${words.toLocaleString()} words`;

      // Save to localStorage
      try { localStorage.setItem('md2pdf_content', md); } catch(e) {}
    }

    editor.addEventListener('input', () => {
      clearTimeout(renderTimeout);
      renderTimeout = setTimeout(render, 80);
    });

    // ===== Tab key support =====
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
        render();
      }
    });

    // ===== Load saved content =====
    const saved = localStorage.getItem('md2pdf_content');
    editor.value = saved !== null ? saved : defaultContent;
    render();

    // ===== PDF Download =====
    downloadBtn.addEventListener('click', async () => {
      if (!editor.value.trim()) {
        toast('Nothing to export');
        return;
      }

      generatingEl.classList.add('show');
      downloadBtn.disabled = true;

      try {
        // Build container and append to DOM so CSS applies for html2canvas
        const container = document.createElement('div');
        container.className = 'pdf-content';
        container.innerHTML = DOMPurify.sanitize(marked.parse(editor.value));
        container.style.cssText = 'position:fixed;left:-9999px;top:0;width:700px;padding:40px;background:#fff;color:#1d1d1f;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.75;';
        document.body.appendChild(container);

        const opt = {
          margin:       [12, 14, 12, 14],
          filename:     'document.pdf',
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#ffffff' },
          jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
        };

        await html2pdf().set(opt).from(container).save();
        document.body.removeChild(container);
        toast('PDF downloaded!');
      } catch (err) {
        console.error(err);
        toast('Failed to generate PDF');
      } finally {
        generatingEl.classList.remove('show');
        downloadBtn.disabled = false;
      }
    });

    // ===== Clear =====
    clearBtn.addEventListener('click', () => {
      if (editor.value && !confirm('Clear the editor?')) return;
      editor.value = '';
      render();
      editor.focus();
    });

    // ===== Theme =====
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      iconSun.style.display = theme === 'dark' ? 'none' : 'block';
      iconMoon.style.display = theme === 'dark' ? 'block' : 'none';
      try { localStorage.setItem('md2pdf_theme', theme); } catch(e) {}
    }

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // Load saved theme or detect system preference
    const savedTheme = localStorage.getItem('md2pdf_theme');
    if (savedTheme) {
      setTheme(savedTheme);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      setTheme('dark');
    }

    // ===== Toast =====
    let toastTimer;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    // ===== Divider Drag =====
    let dragging = false;
    divider.addEventListener('mousedown', (e) => {
      dragging = true;
      divider.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const main = document.querySelector('.main');
      const rect = main.getBoundingClientRect();
      const pct = ((e.clientX - rect.left) / rect.width) * 100;
      const clamped = Math.max(20, Math.min(80, pct));
      document.getElementById('editorPanel').style.flex = `0 0 ${clamped}%`;
      document.getElementById('previewPanel').style.flex = `0 0 ${100 - clamped}%`;
    });

    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      divider.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });

    // ===== Mobile Tabs =====
    document.querySelectorAll('.mobile-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mobile-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('editorPanel').classList.toggle('active', tab === 'editor');
        document.getElementById('previewPanel').classList.toggle('active', tab === 'preview');
      });
    });

    // ===== Keyboard Shortcuts =====
    document.addEventListener('keydown', (e) => {
      // Ctrl/Cmd+S → Download PDF
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        downloadBtn.click();
      }
      // Ctrl/Cmd+Shift+L → Toggle theme
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'L') {
        e.preventDefault();
        themeToggle.click();
      }
    });
  </script>
