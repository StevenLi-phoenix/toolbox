<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const savingsEl = document.getElementById('savings');
let lastOutput = '';

function getIndent() {
  const v = document.getElementById('indent-size').value;
  return v === 'tab' ? '\t' : ' '.repeat(parseInt(v));
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function updateStats(id, text) {
  const el = document.getElementById(id);
  const lines = text.split('\n').length;
  const bytes = new Blob([text]).size;
  const sizeStr = bytes > 1024 ? (bytes / 1024).toFixed(1) + ' KB' : bytes + ' B';
  el.innerHTML = `<span>${lines} line${lines !== 1 ? 's' : ''}</span><span>${sizeStr}</span>`;
}

function showSavings(original, result) {
  const origSize = new Blob([original]).size;
  const resultSize = new Blob([result]).size;
  const diff = origSize - resultSize;
  const pct = origSize > 0 ? ((diff / origSize) * 100).toFixed(1) : 0;

  if (diff > 0) {
    savingsEl.innerHTML = `<div class="savings positive">✓ Saved ${Math.abs(pct)}% — ${origSize.toLocaleString()} → ${resultSize.toLocaleString()} bytes (${diff.toLocaleString()} bytes smaller)</div>`;
  } else if (diff < 0) {
    savingsEl.innerHTML = `<div class="savings negative">⚠ Output is ${Math.abs(diff).toLocaleString()} bytes larger (beautified)</div>`;
  } else {
    savingsEl.innerHTML = `<div class="savings neutral">No size change</div>`;
  }
}

const BOOLEAN_ATTRS = new Set([
  'allowfullscreen', 'async', 'autofocus', 'autoplay', 'checked',
  'controls', 'default', 'defer', 'disabled', 'formnovalidate',
  'hidden', 'inert', 'ismap', 'loop', 'multiple', 'muted', 'nomodule',
  'novalidate', 'open', 'playsinline', 'readonly', 'required',
  'reversed', 'selected'
]);

const SAFE_UNQUOTED_RE = /^[a-zA-Z0-9_\-.:]+$/;

function minify() {
  const src = inputEl.value;
  if (!src.trim()) return;

  const removeComments = document.getElementById('opt-comments').checked;
  const collapseWhitespace = document.getElementById('opt-whitespace').checked;
  const removeQuotes = document.getElementById('opt-quotes').checked;
  const collapseBooleans = document.getElementById('opt-booleans').checked;

  let result = src;

  // Remove HTML comments (but keep conditional comments)
  if (removeComments) {
    result = result.replace(/<!--(?!\[if\s)[\s\S]*?-->/g, '');
  }

  // Collapse whitespace between tags
  if (collapseWhitespace) {
    result = result.replace(/\s+/g, ' ');
    result = result.replace(/>\s+</g, '><');
    result = result.replace(/\s+>/g, '>');
    result = result.replace(/<\s+/g, '<');
  }

  // Collapse boolean attributes (disabled="disabled" → disabled)
  if (collapseBooleans) {
    for (const attr of BOOLEAN_ATTRS) {
      const re = new RegExp(`\\b(${attr})=["'](?:${attr}|true|)["']`, 'gi');
      result = re[Symbol.replace](result, '$1');
    }
  }

  // Remove optional quotes around safe attribute values
  if (removeQuotes) {
    result = result.replace(/(\s)([\w-]+)="([^"]*?)"/g, (match, space, name, value) => {
      if (SAFE_UNQUOTED_RE.test(value) && value.length > 0) {
        return space + name + '=' + value;
      }
      return match;
    });
  }

  result = result.trim();
  lastOutput = result;
  outputEl.innerHTML = highlightHtml(result);
  updateStats('input-stats', src);
  updateStats('output-stats', result);
  showSavings(src, result);
}

function beautify() {
  const src = inputEl.value;
  if (!src.trim()) return;

  const indent = getIndent();
  let result = '';
  let level = 0;

  // Normalize input
  let html = src.replace(/\r\n?/g, '\n').trim();

  // Tokenize: split into tags and text
  const tokens = [];
  const re = /(<!\[CDATA\[[\s\S]*?\]\]>|<!--[\s\S]*?-->|<!DOCTYPE[^>]*>|<\/?\w[\s\S]*?>)/gi;
  let lastIdx = 0;
  let m;
  while ((m = re.exec(html)) !== null) {
    if (m.index > lastIdx) {
      const text = html.slice(lastIdx, m.index).trim();
      if (text) tokens.push({ type: 'text', content: text });
    }
    tokens.push({ type: 'tag', content: m[0] });
    lastIdx = re.lastIndex;
  }
  if (lastIdx < html.length) {
    const text = html.slice(lastIdx).trim();
    if (text) tokens.push({ type: 'text', content: text });
  }

  const VOID_TAGS = new Set([
    'area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input',
    'link', 'meta', 'param', 'source', 'track', 'wbr'
  ]);
  const INLINE_TAGS = new Set([
    'a', 'abbr', 'b', 'bdi', 'bdo', 'br', 'cite', 'code', 'data',
    'em', 'i', 'kbd', 'mark', 'q', 's', 'samp', 'small', 'span',
    'strong', 'sub', 'sup', 'time', 'u', 'var'
  ]);

  const lines = [];
  for (let i = 0; i < tokens.length; i++) {
    const token = tokens[i];
    if (token.type === 'text') {
      lines.push(indent.repeat(level) + token.content);
      continue;
    }

    const tag = token.content;

    // Comment or doctype
    if (tag.startsWith('<!--') || tag.startsWith('<!DOCTYPE') || tag.startsWith('<!doctype')) {
      lines.push(indent.repeat(level) + tag);
      continue;
    }

    // Closing tag
    if (tag.startsWith('</')) {
      level = Math.max(0, level - 1);
      lines.push(indent.repeat(level) + tag);
      continue;
    }

    // Self-closing or void tag
    const tagName = (tag.match(/<(\w+)/) || [])[1] || '';
    const isVoid = VOID_TAGS.has(tagName.toLowerCase());
    const isSelfClose = tag.endsWith('/>');

    lines.push(indent.repeat(level) + tag);

    if (!isVoid && !isSelfClose) {
      level++;
    }
  }

  result = lines.join('\n');
  lastOutput = result;
  outputEl.innerHTML = highlightHtml(result);
  updateStats('input-stats', src);
  updateStats('output-stats', result);
  showSavings(src, result);
}

function highlightHtml(html) {
  return html
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // DOCTYPE
    .replace(/(&lt;!DOCTYPE[^&]*?&gt;)/gi, '<span class="html-doctype">$1</span>')
    // Comments
    .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="html-comment">$1</span>')
    // Tags
    .replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="html-tag">$2</span>')
    // Attributes
    .replace(/([\w-]+)(=)(&quot;[^&]*?&quot;|&#39;[^&]*?&#39;|[\w\-.:]+)/g,
      '<span class="html-attr">$1</span>$2<span class="html-val">$3</span>')
    // Boolean attrs (standalone words inside tags)
    ;
}

function copyOutput() {
  if (!lastOutput) return;
  navigator.clipboard.writeText(lastOutput).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

function downloadOutput() {
  if (!lastOutput) return;
  const blob = new Blob([lastOutput], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'output.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearAll() {
  inputEl.value = '';
  outputEl.innerHTML = '';
  savingsEl.innerHTML = '';
  document.getElementById('input-stats').innerHTML = '';
  document.getElementById('output-stats').innerHTML = '';
  lastOutput = '';
}

inputEl.addEventListener('input', () => updateStats('input-stats', inputEl.value));
updateStats('input-stats', inputEl.value);
</script>
