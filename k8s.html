<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubernetes Manifest Generator - Free Online K8s YAML Tool</title>
<meta name="description" content="Generate Kubernetes YAML manifests for Deployments, Services, ConfigMaps, Secrets, Ingress, and PVCs. 100% client-side, no data leaves your browser.">
<meta name="keywords" content="kubernetes, k8s, yaml generator, deployment, service, configmap, ingress, manifest, devops">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/k8s.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .resource-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
  .resource-tab { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--muted); cursor: pointer; font-size: .82rem; font-weight: 600; transition: all .15s; }
  .resource-tab:hover { background: var(--surface2); }
  .resource-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: .82rem; font-weight: 600; color: var(--muted); }
  .form-group input, .form-group select { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font: inherit; font-size: .85rem; }
  .form-group.full { grid-column: 1 / -1; }
  .kv-list { display: flex; flex-direction: column; gap: 6px; }
  .kv-row { display: flex; gap: 6px; align-items: center; }
  .kv-row input { flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font: inherit; font-size: .82rem; }
  .kv-row button { padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--error); cursor: pointer; font-size: .78rem; }
  .kv-row button:hover { background: var(--surface2); }
  .add-btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--muted); cursor: pointer; font-size: .78rem; margin-top: 4px; }
  .add-btn:hover { background: var(--surface2); }
  .output-wrap { position: relative; }
  .output-wrap pre { margin: 0; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .85rem; line-height: 1.5; overflow-x: auto; white-space: pre; min-height: 200px; }
  .copy-btn { position: absolute; top: 8px; right: 8px; padding: 4px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--muted); cursor: pointer; font-size: .78rem; }
  .copy-btn:hover { background: var(--surface2); }
  .port-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; align-items: end; }
  .port-row .form-group { gap: 2px; }
  .actions-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .port-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>Kubernetes Manifest Generator</h1>
<p class="subtitle">Generate YAML manifests for common Kubernetes resources — Deployments, Services, ConfigMaps, Secrets, Ingress, and PVCs.</p>

<div class="card">
<h2>Resource Type</h2>
<div class="resource-tabs" id="resourceTabs">
  <button class="resource-tab active" data-type="deployment">Deployment</button>
  <button class="resource-tab" data-type="service">Service</button>
  <button class="resource-tab" data-type="configmap">ConfigMap</button>
  <button class="resource-tab" data-type="secret">Secret</button>
  <button class="resource-tab" data-type="ingress">Ingress</button>
  <button class="resource-tab" data-type="pvc">PVC</button>
</div>

<!-- Deployment -->
<div class="resource-form" id="form-deployment">
  <div class="form-grid">
    <div class="form-group"><label>Name</label><input id="dep-name" value="my-app" oninput="generate()"></div>
    <div class="form-group"><label>Namespace</label><input id="dep-ns" value="default" oninput="generate()"></div>
    <div class="form-group"><label>Image</label><input id="dep-image" value="nginx:1.25" oninput="generate()"></div>
    <div class="form-group"><label>Replicas</label><input id="dep-replicas" type="number" value="3" min="1" oninput="generate()"></div>
    <div class="form-group"><label>Container Port</label><input id="dep-port" type="number" value="80" oninput="generate()"></div>
    <div class="form-group"><label>CPU Request</label><input id="dep-cpu-req" value="100m" oninput="generate()"></div>
    <div class="form-group"><label>Memory Request</label><input id="dep-mem-req" value="128Mi" oninput="generate()"></div>
    <div class="form-group"><label>CPU Limit</label><input id="dep-cpu-lim" value="500m" oninput="generate()"></div>
    <div class="form-group"><label>Memory Limit</label><input id="dep-mem-lim" value="256Mi" oninput="generate()"></div>
    <div class="form-group"><label>Strategy</label>
      <select id="dep-strategy" onchange="generate()">
        <option value="RollingUpdate">RollingUpdate</option>
        <option value="Recreate">Recreate</option>
      </select>
    </div>
    <div class="form-group full"><label>Labels (key=value, comma-separated)</label><input id="dep-labels" value="app=my-app,env=production" oninput="generate()"></div>
    <div class="form-group full"><label>Environment Variables</label>
      <div class="kv-list" id="dep-env"></div>
      <button class="add-btn" onclick="addEnvRow()">+ Add Env Var</button>
    </div>
  </div>
</div>

<!-- Service -->
<div class="resource-form" id="form-service" style="display:none">
  <div class="form-grid">
    <div class="form-group"><label>Name</label><input id="svc-name" value="my-app-svc" oninput="generate()"></div>
    <div class="form-group"><label>Namespace</label><input id="svc-ns" value="default" oninput="generate()"></div>
    <div class="form-group"><label>Type</label>
      <select id="svc-type" onchange="generate()">
        <option value="ClusterIP">ClusterIP</option>
        <option value="NodePort">NodePort</option>
        <option value="LoadBalancer">LoadBalancer</option>
      </select>
    </div>
    <div class="form-group"><label>Selector (app)</label><input id="svc-selector" value="my-app" oninput="generate()"></div>
    <div class="form-group"><label>Port</label><input id="svc-port" type="number" value="80" oninput="generate()"></div>
    <div class="form-group"><label>Target Port</label><input id="svc-target" type="number" value="80" oninput="generate()"></div>
  </div>
</div>

<!-- ConfigMap -->
<div class="resource-form" id="form-configmap" style="display:none">
  <div class="form-grid">
    <div class="form-group"><label>Name</label><input id="cm-name" value="my-config" oninput="generate()"></div>
    <div class="form-group"><label>Namespace</label><input id="cm-ns" value="default" oninput="generate()"></div>
    <div class="form-group full"><label>Data (key=value pairs)</label>
      <div class="kv-list" id="cm-data"></div>
      <button class="add-btn" onclick="addCmRow()">+ Add Entry</button>
    </div>
  </div>
</div>

<!-- Secret -->
<div class="resource-form" id="form-secret" style="display:none">
  <div class="form-grid">
    <div class="form-group"><label>Name</label><input id="sec-name" value="my-secret" oninput="generate()"></div>
    <div class="form-group"><label>Namespace</label><input id="sec-ns" value="default" oninput="generate()"></div>
    <div class="form-group"><label>Type</label>
      <select id="sec-type" onchange="generate()">
        <option value="Opaque">Opaque</option>
        <option value="kubernetes.io/tls">kubernetes.io/tls</option>
        <option value="kubernetes.io/dockerconfigjson">kubernetes.io/dockerconfigjson</option>
      </select>
    </div>
    <div class="form-group full"><label>Data (key=value — values will be base64 encoded)</label>
      <div class="kv-list" id="sec-data"></div>
      <button class="add-btn" onclick="addSecRow()">+ Add Entry</button>
    </div>
  </div>
</div>

<!-- Ingress -->
<div class="resource-form" id="form-ingress" style="display:none">
  <div class="form-grid">
    <div class="form-group"><label>Name</label><input id="ing-name" value="my-ingress" oninput="generate()"></div>
    <div class="form-group"><label>Namespace</label><input id="ing-ns" value="default" oninput="generate()"></div>
    <div class="form-group"><label>Ingress Class</label><input id="ing-class" value="nginx" oninput="generate()"></div>
    <div class="form-group"><label>Host</label><input id="ing-host" value="example.com" oninput="generate()"></div>
    <div class="form-group"><label>Path</label><input id="ing-path" value="/" oninput="generate()"></div>
    <div class="form-group"><label>Path Type</label>
      <select id="ing-pathtype" onchange="generate()">
        <option value="Prefix">Prefix</option>
        <option value="Exact">Exact</option>
        <option value="ImplementationSpecific">ImplementationSpecific</option>
      </select>
    </div>
    <div class="form-group"><label>Service Name</label><input id="ing-svc" value="my-app-svc" oninput="generate()"></div>
    <div class="form-group"><label>Service Port</label><input id="ing-svcport" type="number" value="80" oninput="generate()"></div>
    <div class="form-group"><label>TLS Secret (optional)</label><input id="ing-tls" placeholder="tls-secret" oninput="generate()"></div>
  </div>
</div>

<!-- PVC -->
<div class="resource-form" id="form-pvc" style="display:none">
  <div class="form-grid">
    <div class="form-group"><label>Name</label><input id="pvc-name" value="my-pvc" oninput="generate()"></div>
    <div class="form-group"><label>Namespace</label><input id="pvc-ns" value="default" oninput="generate()"></div>
    <div class="form-group"><label>Storage Size</label><input id="pvc-size" value="10Gi" oninput="generate()"></div>
    <div class="form-group"><label>Access Mode</label>
      <select id="pvc-access" onchange="generate()">
        <option value="ReadWriteOnce">ReadWriteOnce</option>
        <option value="ReadOnlyMany">ReadOnlyMany</option>
        <option value="ReadWriteMany">ReadWriteMany</option>
      </select>
    </div>
    <div class="form-group"><label>Storage Class (optional)</label><input id="pvc-class" placeholder="standard" oninput="generate()"></div>
  </div>
</div>
</div>

<div class="card">
<h2>Generated YAML</h2>
<div class="output-wrap">
  <button class="copy-btn" onclick="copyYaml()">Copy</button>
  <pre id="output"></pre>
</div>
<div class="actions-row">
  <button class="btn" onclick="downloadYaml()">Download YAML</button>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let currentType='deployment';

// Tab switching
$('resourceTabs').addEventListener('click',e=>{
  const btn=e.target.closest('.resource-tab');
  if(!btn)return;
  document.querySelectorAll('.resource-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.resource-form').forEach(f=>f.style.display='none');
  currentType=btn.dataset.type;
  $('form-'+currentType).style.display='';
  generate();
});

// KV row helpers
function makeKvRow(container,k='',v=''){
  const row=document.createElement('div');
  row.className='kv-row';
  row.innerHTML=`<input placeholder="KEY" value="${esc(k)}" oninput="generate()"><input placeholder="VALUE" value="${esc(v)}" oninput="generate()"><button onclick="this.parentElement.remove();generate()">✕</button>`;
  $(container).appendChild(row);
  generate();
}
function esc(s){return s.replace(/"/g,'&quot;');}
function addEnvRow(){makeKvRow('dep-env');}
function addCmRow(){makeKvRow('cm-data');}
function addSecRow(){makeKvRow('sec-data');}

// Parse labels string
function parseLabels(str){
  const labels={};
  str.split(',').forEach(p=>{
    const [k,v]=p.split('=').map(s=>s.trim());
    if(k)labels[k]=v||'';
  });
  return labels;
}

// Get KV pairs from container
function getKvPairs(containerId){
  const pairs=[];
  $(containerId).querySelectorAll('.kv-row').forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const k=inputs[0].value.trim();
    const v=inputs[1].value.trim();
    if(k)pairs.push([k,v]);
  });
  return pairs;
}

// Indent helper
function indent(lines,n){
  const pad=' '.repeat(n);
  return lines.map(l=>pad+l).join('\n');
}

// YAML generation
function generate(){
  let yaml='';
  switch(currentType){
    case 'deployment': yaml=genDeployment(); break;
    case 'service': yaml=genService(); break;
    case 'configmap': yaml=genConfigMap(); break;
    case 'secret': yaml=genSecret(); break;
    case 'ingress': yaml=genIngress(); break;
    case 'pvc': yaml=genPvc(); break;
  }
  $('output').textContent=yaml;
}

function genDeployment(){
  const name=$('dep-name').value||'my-app';
  const ns=$('dep-ns').value||'default';
  const image=$('dep-image').value||'nginx:latest';
  const replicas=parseInt($('dep-replicas').value)||1;
  const port=parseInt($('dep-port').value)||80;
  const cpuReq=$('dep-cpu-req').value||'100m';
  const memReq=$('dep-mem-req').value||'128Mi';
  const cpuLim=$('dep-cpu-lim').value||'500m';
  const memLim=$('dep-mem-lim').value||'256Mi';
  const strategy=$('dep-strategy').value;
  const labels=parseLabels($('dep-labels').value);
  const envVars=getKvPairs('dep-env');

  let labelYaml=Object.entries(labels).map(([k,v])=>`    ${k}: "${v}"`).join('\n');
  let matchYaml=Object.entries(labels).map(([k,v])=>`        ${k}: "${v}"`).join('\n');
  let podLabelYaml=Object.entries(labels).map(([k,v])=>`          ${k}: "${v}"`).join('\n');

  let envYaml='';
  if(envVars.length){
    envYaml='\n          env:\n'+envVars.map(([k,v])=>`            - name: ${k}\n              value: "${v}"`).join('\n');
  }

  return `apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${name}
  namespace: ${ns}
  labels:
${labelYaml}
spec:
  replicas: ${replicas}
  strategy:
    type: ${strategy}
  selector:
    matchLabels:
${matchYaml}
  template:
    metadata:
      labels:
${podLabelYaml}
    spec:
      containers:
        - name: ${name}
          image: ${image}
          ports:
            - containerPort: ${port}
          resources:
            requests:
              cpu: "${cpuReq}"
              memory: "${memReq}"
            limits:
              cpu: "${cpuLim}"
              memory: "${memLim}"${envYaml}`;
}

function genService(){
  const name=$('svc-name').value||'my-svc';
  const ns=$('svc-ns').value||'default';
  const type=$('svc-type').value;
  const selector=$('svc-selector').value||'my-app';
  const port=parseInt($('svc-port').value)||80;
  const target=parseInt($('svc-target').value)||80;

  return `apiVersion: v1
kind: Service
metadata:
  name: ${name}
  namespace: ${ns}
spec:
  type: ${type}
  selector:
    app: ${selector}
  ports:
    - protocol: TCP
      port: ${port}
      targetPort: ${target}`;
}

function genConfigMap(){
  const name=$('cm-name').value||'my-config';
  const ns=$('cm-ns').value||'default';
  const data=getKvPairs('cm-data');

  let dataYaml='  {}';
  if(data.length){
    dataYaml=data.map(([k,v])=>`  ${k}: "${v}"`).join('\n');
  }

  return `apiVersion: v1
kind: ConfigMap
metadata:
  name: ${name}
  namespace: ${ns}
data:
${dataYaml}`;
}

function genSecret(){
  const name=$('sec-name').value||'my-secret';
  const ns=$('sec-ns').value||'default';
  const type=$('sec-type').value;
  const data=getKvPairs('sec-data');

  let dataYaml='  {}';
  if(data.length){
    dataYaml=data.map(([k,v])=>`  ${k}: ${btoa(v)}`).join('\n');
  }

  return `apiVersion: v1
kind: Secret
metadata:
  name: ${name}
  namespace: ${ns}
type: ${type}
data:
${dataYaml}`;
}

function genIngress(){
  const name=$('ing-name').value||'my-ingress';
  const ns=$('ing-ns').value||'default';
  const cls=$('ing-class').value||'nginx';
  const host=$('ing-host').value||'example.com';
  const path=$('ing-path').value||'/';
  const pathType=$('ing-pathtype').value;
  const svc=$('ing-svc').value||'my-svc';
  const svcPort=parseInt($('ing-svcport').value)||80;
  const tls=$('ing-tls').value.trim();

  let tlsYaml='';
  if(tls){
    tlsYaml=`
  tls:
    - hosts:
        - ${host}
      secretName: ${tls}`;
  }

  return `apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${name}
  namespace: ${ns}
  annotations:
    kubernetes.io/ingress.class: ${cls}
spec:${tlsYaml}
  rules:
    - host: ${host}
      http:
        paths:
          - path: ${path}
            pathType: ${pathType}
            backend:
              service:
                name: ${svc}
                port:
                  number: ${svcPort}`;
}

function genPvc(){
  const name=$('pvc-name').value||'my-pvc';
  const ns=$('pvc-ns').value||'default';
  const size=$('pvc-size').value||'10Gi';
  const access=$('pvc-access').value;
  const sc=$('pvc-class').value.trim();

  let scYaml='';
  if(sc) scYaml=`\n  storageClassName: ${sc}`;

  return `apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${name}
  namespace: ${ns}
spec:
  accessModes:
    - ${access}${scYaml}
  resources:
    requests:
      storage: ${size}`;
}

function copyYaml(){
  navigator.clipboard.writeText($('output').textContent).then(()=>{
    const t=$('toast');t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function downloadYaml(){
  const blob=new Blob([$('output').textContent],{type:'text/yaml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=currentType+'.yaml';
  a.click();
  URL.revokeObjectURL(a.href);
}

// Init with sample env vars
makeKvRow('dep-env','NODE_ENV','production');
makeKvRow('cm-data','APP_MODE','production');
makeKvRow('cm-data','LOG_LEVEL','info');
makeKvRow('sec-data','DB_PASSWORD','supersecret');
generate();
</script>
</body>
</html>
