      </div>

          <label for="qr-size">Size</label>
          <span class="slider-val" id="size-val">256px</span>
        </div>
        <input type="range" id="qr-size" min="128" max="512" step="16" value="256">
      </div>

      <div class="controls-row">
        <div class="control-item">
          <label for="qr-ecl">Error Correction</label>
          <select id="qr-ecl">
            <option value="L">Low (L) — 7%</option>
            <option value="M" selected>Medium (M) — 15%</option>
            <option value="Q">Quartile (Q) — 25%</option>
            <option value="H">High (H) — 30%</option>
          </select>
        </div>
      </div>

      <div class="color-row">
        <div class="color-item">
          <label for="qr-fg">Foreground</label>
          <input type="color" id="qr-fg" value="#000000">
        </div>
        <div class="color-item">

    </div>

    <!-- Preview -->

      <div class="btn-row">

          PNG
        </button>

          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          SVG

        <svg viewBox="0 0 884 1279" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M791.109 297.518L790.231 297.002L788.201 296.383C789.018 297.072 790.04 297.472 791.109 297.518Z" fill="#0D0C22"/><path d="M803.896 388.891L802.916 389.166L803.896 388.891Z" fill="#0D0C22"/><path d="M791.484 297.377C791.359 297.361 791.237 297.332 791.109 297.518C791.248 297.46 791.381 297.404 791.484 297.377Z" fill="#0D0C22"/><path d="M124.94 67.4131L124.587 67.578L124.94 67.4131Z" fill="#0D0C22"/><path d="M882.418 729.367C882.418 751.351 874.37 772.199 860.079 788.861L835.685 816.875C816.839 838.832 791.741 854.597 763.866 862.301L495.946 942.809C479.396 947.784 461.956 948.399 445.118 944.605L152.674 876.837C84.6544 861.312 35.8524 801.027 35.8524 729.367V225.748C35.8524 161.101 69.8424 101.39 124.94 67.4131C138.161 59.3651 152.422 52.9411 167.387 48.2351L410.09 -33.2049C441.022 -43.5079 474.278 -43.3269 505.096 -32.6489L753.801 53.0081C768.053 57.9841 781.624 64.4781 794.192 72.3411C846.861 105.702 879.178 163.404 879.418 225.748L882.418 729.367Z" fill="#FFDD00"/><path d="M791.109 297.518C791.237 297.332 791.359 297.361 791.484 297.377C791.582 297.242 791.665 297.099 791.734 296.948C791.484 297.148 791.263 297.344 791.109 297.518Z" fill="#0D0C22"/></svg>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
(function() {
  'use strict';

  // Elements
  const textEl    = document.getElementById('qr-text');
  const sizeEl    = document.getElementById('qr-size');
  const sizeVal   = document.getElementById('size-val');
  const eclEl     = document.getElementById('qr-ecl');
  const fgEl      = document.getElementById('qr-fg');
  const bgEl      = document.getElementById('qr-bg');
  const wrapEl    = document.getElementById('qr-wrap');
  const outputEl  = document.getElementById('qr-output');
  const btnPng    = document.getElementById('btn-png');
  const btnSvg    = document.getElementById('btn-svg');
  const toggleBtn = document.getElementById('theme-toggle');

  const ECL_MAP = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };

  let qr = null;
  let debounceTimer = null;

  // ---- Theme ----
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    toggleBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('qr-theme', theme);
  }

  const saved = localStorage.getItem('qr-theme');
  applyTheme(saved || 'dark');

  toggleBtn.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });

  // ---- QR Generation ----
  function generate() {
    const text = textEl.value.trim();
    const size = parseInt(sizeEl.value, 10);
    const ecl  = ECL_MAP[eclEl.value] ?? QRCode.CorrectLevel.M;
    const fg   = fgEl.value;
    const bg   = bgEl.value;

    if (!text) {
      outputEl.innerHTML = '';
      wrapEl.classList.add('empty');
      btnPng.disabled = true;
      btnSvg.disabled = true;
      return;
    }

    wrapEl.classList.remove('empty');
    outputEl.innerHTML = '';

    try {
      qr = new QRCode(outputEl, {
        text: text,
        width: size,
        height: size,
        colorDark: fg,
        colorLight: bg,
        correctLevel: ecl
      });
      btnPng.disabled = false;
      btnSvg.disabled = false;
    } catch (e) {
      outputEl.innerHTML = '<p style="color:#ef4444;font-size:0.85rem;">Input too long for this error correction level. Try reducing text or lowering correction.</p>';
      btnPng.disabled = true;
      btnSvg.disabled = true;
    }
  }

  function debouncedGenerate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(generate, 150);
  }

  // Event listeners
  textEl.addEventListener('input', debouncedGenerate);
  sizeEl.addEventListener('input', () => {
    sizeVal.textContent = sizeEl.value + 'px';
    debouncedGenerate();
  });
  eclEl.addEventListener('change', generate);
  fgEl.addEventListener('input', debouncedGenerate);
  bgEl.addEventListener('input', debouncedGenerate);

  // ---- Download PNG ----
  btnPng.addEventListener('click', () => {
    const canvas = outputEl.querySelector('canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // ---- Download SVG ----
  btnSvg.addEventListener('click', () => {
    const canvas = outputEl.querySelector('canvas');
    if (!canvas) return;

    const size = parseInt(sizeEl.value, 10);
    const fg = fgEl.value;
    const bg = bgEl.value;

    // Read pixel data from the canvas to reconstruct SVG
    const ctx = canvas.getContext('2d');
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const pixels = imgData.data;
    const w = canvas.width;
    const h = canvas.height;

    // Detect module size by scanning top-left
    let moduleSize = 1;
    // Parse bg color to RGB
    const bgR = parseInt(bg.slice(1,3),16), bgG = parseInt(bg.slice(3,5),16), bgB = parseInt(bg.slice(5,7),16);

    // Find module size: look for first dark pixel, then measure run length
    outer:
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const idx = (y * w + x) * 4;
        const r = pixels[idx], g = pixels[idx+1], b = pixels[idx+2];
        if (Math.abs(r - bgR) > 30 || Math.abs(g - bgG) > 30 || Math.abs(b - bgB) > 30) {
          // Found a dark pixel, measure how wide this module is
          let run = 1;
          for (let nx = x + 1; nx < w; nx++) {
            const ni = (y * w + nx) * 4;
            if (Math.abs(pixels[ni] - r) < 10 && Math.abs(pixels[ni+1] - g) < 10 && Math.abs(pixels[ni+2] - b) < 10) {
              run++;
            } else break;
          }
          moduleSize = run;
          break outer;
        }
      }
    }

    if (moduleSize < 1) moduleSize = 1;
    const modules = Math.round(w / moduleSize);
    const cellSize = size / modules;

    let rects = '';
    for (let row = 0; row < modules; row++) {
      for (let col = 0; col < modules; col++) {
        const px = Math.floor(col * moduleSize + moduleSize / 2);
        const py = Math.floor(row * moduleSize + moduleSize / 2);
        const idx = (py * w + px) * 4;
        const r = pixels[idx], g = pixels[idx+1], b = pixels[idx+2];
        if (Math.abs(r - bgR) > 30 || Math.abs(g - bgG) > 30 || Math.abs(b - bgB) > 30) {
          rects += `<rect x="${col * cellSize}" y="${row * cellSize}" width="${cellSize}" height="${cellSize}" fill="${fg}"/>`;
        }
      }
    }

    const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
<rect width="${size}" height="${size}" fill="${bg}"/>
${rects}
</svg>`;

    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const link = document.createElement('a');
    link.download = 'qrcode.svg';
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);
  });

})();
</script>
