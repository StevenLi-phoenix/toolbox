<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text Shadow Generator | Free Online Tool</title>
    <meta name="description" content="Create beautiful CSS text-shadow effects visually. Add multiple layers, adjust offset, blur, color, and opacity with live preview. Copy CSS instantly.">
    <meta name="keywords" content="css text shadow, text shadow generator, css generator, text effects, web design tool, css tool">
    <meta property="og:title" content="CSS Text Shadow Generator">
    <meta property="og:description" content="Create beautiful CSS text-shadow effects visually with live preview. Add multiple shadow layers and copy CSS instantly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/textshadow.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="CSS Text Shadow Generator">
    <meta name="twitter:description" content="Visual CSS text-shadow generator with multi-layer support and live preview.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/textshadow.html">
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CSS Text Shadow Generator</h1>
            <p>Create stunning text shadows visually — add layers, adjust, preview, copy.</p>
        </header>

        <div class="main-grid">
            <!-- Left: Preview -->
            <div>
                <div class="panel">
                    <div class="panel-title">Live Preview</div>
                    <div class="preview-area" id="preview-bg">
                        <div id="preview-text">Shadow</div>
                    </div>
                    <div class="preview-controls">
                        <label>Text <input type="text" id="previewContent" value="Shadow" oninput="updatePreviewText()"></label>
                        <label>Size <input type="number" id="fontSize" value="64" min="12" max="200" style="width:60px" oninput="updatePreviewText()">px</label>
                        <label>Color <input type="color" id="textColor" value="#e4e6f0" oninput="updatePreviewText()"></label>
                        <label>BG <input type="color" id="bgColor" value="#242836" oninput="updatePreviewText()"></label>
                        <label>
                            Font
                            <select id="fontFamily" onchange="updatePreviewText()">
                                <option value="system-ui, sans-serif">System</option>
                                <option value="Georgia, serif">Georgia</option>
                                <option value="'Courier New', monospace">Courier</option>
                                <option value="Impact, sans-serif">Impact</option>
                                <option value="'Comic Sans MS', cursive">Comic Sans</option>
                            </select>
                        </label>
                    </div>
                </div>

                <!-- Presets -->
                <div class="panel" style="margin-top: 20px;">
                    <div class="panel-title">Presets</div>
                    <div class="presets-grid" id="presetsGrid"></div>
                </div>

                <!-- Output -->
                <div class="panel output-section">
                    <div class="panel-title">CSS Output</div>
                    <div class="code-block" id="cssOutput">text-shadow: none;</div>
                    <button class="copy-btn" onclick="copyCSS()">Copy</button>
                </div>
            </div>

            <!-- Right: Layers -->
            <div class="panel">
                <div class="panel-title">
                    Shadow Layers
                    <button class="btn btn-accent" onclick="addLayer()">+ Add Layer</button>
                </div>
                <div class="layers-list" id="layersList"></div>
            </div>
        </div>

        <footer class="footer">
            <p>Built with care ·
                <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a> ·
                <a href="index.html">More Tools</a>
            </p>
        </footer>
    </div>

    <script>
        let layers = [];
        let nextId = 1;

        const presets = [
            { name: 'Neon Glow', layers: [
                { x: 0, y: 0, blur: 7, color: '#ff00ff', opacity: 100 },
                { x: 0, y: 0, blur: 20, color: '#ff00ff', opacity: 80 },
                { x: 0, y: 0, blur: 40, color: '#ff00ff', opacity: 50 }
            ]},
            { name: 'Fire', layers: [
                { x: 0, y: -2, blur: 4, color: '#ff6600', opacity: 100 },
                { x: 0, y: -4, blur: 10, color: '#ff3300', opacity: 80 },
                { x: 0, y: -8, blur: 20, color: '#ffcc00', opacity: 50 }
            ]},
            { name: 'Retro 3D', layers: [
                { x: 1, y: 1, blur: 0, color: '#ff2d95', opacity: 100 },
                { x: 2, y: 2, blur: 0, color: '#ff2d95', opacity: 100 },
                { x: 3, y: 3, blur: 0, color: '#ff2d95', opacity: 100 },
                { x: 4, y: 4, blur: 0, color: '#ff2d95', opacity: 80 }
            ]},
            { name: 'Soft Drop', layers: [
                { x: 2, y: 2, blur: 4, color: '#000000', opacity: 60 }
            ]},
            { name: 'Ice Blue', layers: [
                { x: 0, y: 0, blur: 10, color: '#00d4ff', opacity: 100 },
                { x: 0, y: 0, blur: 30, color: '#0088ff', opacity: 60 },
                { x: 0, y: 0, blur: 60, color: '#0044ff', opacity: 30 }
            ]},
            { name: 'Emboss', layers: [
                { x: -1, y: -1, blur: 0, color: '#ffffff', opacity: 40 },
                { x: 1, y: 1, blur: 0, color: '#000000', opacity: 60 }
            ]},
            { name: 'Long Shadow', layers: [
                { x: 1, y: 1, blur: 0, color: '#7c6aef', opacity: 90 },
                { x: 2, y: 2, blur: 0, color: '#7c6aef', opacity: 80 },
                { x: 3, y: 3, blur: 0, color: '#7c6aef', opacity: 70 },
                { x: 4, y: 4, blur: 0, color: '#7c6aef', opacity: 60 },
                { x: 5, y: 5, blur: 0, color: '#7c6aef', opacity: 50 },
                { x: 6, y: 6, blur: 0, color: '#7c6aef', opacity: 40 }
            ]},
            { name: 'Glitch', layers: [
                { x: -2, y: 0, blur: 0, color: '#ff0000', opacity: 80 },
                { x: 2, y: 0, blur: 0, color: '#00ffff', opacity: 80 }
            ]},
            { name: 'Vintage', layers: [
                { x: 3, y: 3, blur: 0, color: '#c4956a', opacity: 100 },
                { x: 6, y: 6, blur: 0, color: '#a07850', opacity: 60 }
            ]},
            { name: 'Outline', layers: [
                { x: -1, y: 0, blur: 0, color: '#ffffff', opacity: 100 },
                { x: 1, y: 0, blur: 0, color: '#ffffff', opacity: 100 },
                { x: 0, y: -1, blur: 0, color: '#ffffff', opacity: 100 },
                { x: 0, y: 1, blur: 0, color: '#ffffff', opacity: 100 }
            ]}
        ];

        function hexToRgba(hex, opacity) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${(opacity / 100).toFixed(2)})`;
        }

        function addLayer(config) {
            const layer = {
                id: nextId++,
                x: config?.x ?? 2,
                y: config?.y ?? 2,
                blur: config?.blur ?? 4,
                color: config?.color ?? '#7c6aef',
                opacity: config?.opacity ?? 80
            };
            layers.push(layer);
            renderLayers();
            updateShadow();
        }

        function removeLayer(id) {
            layers = layers.filter(l => l.id !== id);
            renderLayers();
            updateShadow();
        }

        function duplicateLayer(id) {
            const src = layers.find(l => l.id === id);
            if (src) addLayer({ ...src });
        }

        function updateLayerProp(id, prop, value) {
            const layer = layers.find(l => l.id === id);
            if (!layer) return;
            layer[prop] = prop === 'color' ? value : Number(value);
            updateShadow();
            // Update displayed value
            const valEl = document.getElementById(`val-${prop}-${id}`);
            if (valEl) {
                valEl.textContent = prop === 'blur' ? `${value}px` : prop === 'opacity' ? `${value}%` : `${value}px`;
            }
        }

        function buildShadowCSS() {
            if (layers.length === 0) return 'none';
            return layers.map(l => {
                const color = hexToRgba(l.color, l.opacity);
                return `${l.x}px ${l.y}px ${l.blur}px ${color}`;
            }).join(',\n    ');
        }

        function updateShadow() {
            const shadow = layers.length === 0 ? 'none' : layers.map(l => {
                return `${l.x}px ${l.y}px ${l.blur}px ${hexToRgba(l.color, l.opacity)}`;
            }).join(', ');

            document.getElementById('preview-text').style.textShadow = shadow;

            const cssText = layers.length === 0
                ? 'text-shadow: none;'
                : `text-shadow: ${buildShadowCSS()};`;
            document.getElementById('cssOutput').textContent = cssText;
        }

        function updatePreviewText() {
            const el = document.getElementById('preview-text');
            el.textContent = document.getElementById('previewContent').value || 'Shadow';
            el.style.fontSize = document.getElementById('fontSize').value + 'px';
            el.style.color = document.getElementById('textColor').value;
            el.style.fontFamily = document.getElementById('fontFamily').value;
            document.getElementById('preview-bg').style.background = document.getElementById('bgColor').value;
        }

        function renderLayers() {
            const container = document.getElementById('layersList');
            if (layers.length === 0) {
                container.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px 0;font-size:0.9rem;">No shadow layers yet. Click "+ Add Layer" to start.</p>';
                return;
            }
            container.innerHTML = layers.map((l, i) => `
                <div class="layer-card" id="layer-${l.id}">
                    <div class="layer-header">
                        <span>Layer ${i + 1}</span>
                        <div class="layer-actions">
                            <button onclick="duplicateLayer(${l.id})" title="Duplicate">⧉</button>
                            <button class="delete-btn" onclick="removeLayer(${l.id})" title="Delete">✕</button>
                        </div>
                    </div>
                    <div class="control-row">
                        <div class="control-group">
                            <label>Offset X</label>
                            <div class="range-row">
                                <input type="range" min="-50" max="50" value="${l.x}" oninput="updateLayerProp(${l.id},'x',this.value)">
                                <span class="range-val" id="val-x-${l.id}">${l.x}px</span>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Offset Y</label>
                            <div class="range-row">
                                <input type="range" min="-50" max="50" value="${l.y}" oninput="updateLayerProp(${l.id},'y',this.value)">
                                <span class="range-val" id="val-y-${l.id}">${l.y}px</span>
                            </div>
                        </div>
                    </div>
                    <div class="control-row">
                        <div class="control-group">
                            <label>Blur</label>
                            <div class="range-row">
                                <input type="range" min="0" max="100" value="${l.blur}" oninput="updateLayerProp(${l.id},'blur',this.value)">
                                <span class="range-val" id="val-blur-${l.id}">${l.blur}px</span>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>Opacity</label>
                            <div class="range-row">
                                <input type="range" min="0" max="100" value="${l.opacity}" oninput="updateLayerProp(${l.id},'opacity',this.value)">
                                <span class="range-val" id="val-opacity-${l.id}">${l.opacity}%</span>
                            </div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>Color</label>
                        <div class="color-row">
                            <input type="color" value="${l.color}" oninput="updateLayerProp(${l.id},'color',this.value);this.nextElementSibling.value=this.value">
                            <input type="text" value="${l.color}" oninput="updateLayerProp(${l.id},'color',this.value);this.previousElementSibling.value=this.value">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function loadPreset(index) {
            const preset = presets[index];
            layers = [];
            nextId = 1;
            preset.layers.forEach(l => addLayer(l));
        }

        function renderPresets() {
            const grid = document.getElementById('presetsGrid');
            grid.innerHTML = presets.map((p, i) => {
                const shadow = p.layers.map(l => `${l.x}px ${l.y}px ${l.blur}px ${hexToRgba(l.color, l.opacity)}`).join(', ');
                return `<button class="preset-btn" onclick="loadPreset(${i})">
                    <div class="preset-preview" style="text-shadow:${shadow}">Aa</div>
                    <div class="preset-name">${p.name}</div>
                </button>`;
            }).join('');
        }

        function copyCSS() {
            const text = document.getElementById('cssOutput').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 1500);
            });
        }

        // Init
        renderPresets();
        addLayer({ x: 2, y: 2, blur: 8, color: '#7c6aef', opacity: 80 });
    </script>
</body>
</html>
