<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Transform Playground - Visual CSS Transform Generator</title>
<meta name="description" content="Visually build CSS transforms with translate, rotate, scale, skew, and perspective. Live preview with copy-ready code output.">
<meta name="keywords" content="CSS transform, transform generator, translate, rotate, scale, skew, perspective, CSS tool, web development">
<meta name="author" content="Steven Li">
<meta property="og:title" content="CSS Transform Playground - Visual CSS Transform Generator">
<meta property="og:description" content="Visually build CSS transforms with translate, rotate, scale, skew, and perspective. Live preview with copy-ready code.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/transform.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="CSS Transform Playground">
<meta name="twitter:description" content="Visual CSS transform generator with live preview.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/transform.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .preview-area{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);height:320px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .preview-box{width:120px;height:120px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;border-radius:var(--radius);font-size:1rem;z-index:1}
  .axis-lines{position:absolute;inset:0;pointer-events:none}
  .axis-lines .h,.axis-lines .v{position:absolute;background:var(--border)}
  .axis-lines .h{width:100%;height:1px;top:50%}
  .axis-lines .v{height:100%;width:1px;left:50%}
  .output-section{margin-top:12px}
  .code-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:var(--mono);font-size:.8rem;white-space:pre-wrap;position:relative;min-height:40px}
  .copy-btn{position:absolute;top:6px;right:6px;font-size:.75rem;padding:3px 8px;cursor:pointer;background:var(--accent);color:#fff;border:none;border-radius:4px}
  .controls{max-height:70vh;overflow-y:auto}
  .control-group{margin-bottom:10px}
  .control-group label{font-size:.85rem;display:flex;justify-content:space-between;margin-bottom:4px}
  .slider-row{display:flex;gap:8px;align-items:center}
  .slider-row input[type="range"]{flex:1}
  .slider-row input[type="number"]{width:64px}
  .section-divider{border-top:1px solid var(--border);margin:12px 0}
  .btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .preset-btn{font-size:.75rem;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;cursor:pointer}
  .preset-btn:hover{border-color:var(--accent)}
  .origin-row{display:flex;align-items:center;gap:10px}
  .origin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .origin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);cursor:pointer;background:transparent}
  .origin-dot.active{background:var(--accent);border-color:var(--accent)}
  .origin-label{font-size:.8rem;color:var(--muted)}
  .toggle-row{display:flex;align-items:center;gap:8px}
  .toggle{width:36px;height:20px;border-radius:10px;background:var(--border);position:relative;cursor:pointer}
  .toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .15s}
  .toggle.on{background:var(--accent)}
  .toggle.on::after{left:18px}
  @media(max-width:768px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>CSS Transform Playground</h1>
    <p>Visually build CSS transforms with live preview</p>
  </header>

  <div class="layout">
    <div class="panel">
      <h2>Preview</h2>
      <div class="preview-area" id="previewArea">
        <div class="axis-lines"><div class="h"></div><div class="v"></div></div>
        <div class="preview-box" id="previewBox">Transform</div>
      </div>
      <div class="output-section">
        <div class="code-block" id="codeOutput"><button class="copy-btn" onclick="copyCode()">Copy</button></div>
      </div>
    </div>

    <div class="panel">
      <h2>Controls</h2>
      <div class="controls" id="controls">
        <!-- Presets -->
        <div class="control-group">
          <label>Presets</label>
          <div class="btn-row">
            <button class="preset-btn" onclick="applyPreset('reset')">Reset</button>
            <button class="preset-btn" onclick="applyPreset('flip')">Flip X</button>
            <button class="preset-btn" onclick="applyPreset('tilt')">3D Tilt</button>
            <button class="preset-btn" onclick="applyPreset('skewCard')">Skew Card</button>
            <button class="preset-btn" onclick="applyPreset('zoomRotate')">Zoom + Rotate</button>
            <button class="preset-btn" onclick="applyPreset('perspective')">Perspective</button>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Translate X -->
        <div class="control-group">
          <label>Translate X <span id="txVal">0px</span></label>
          <div class="slider-row">
            <input type="range" id="tx" min="-200" max="200" value="0" step="1" oninput="update()">
            <input type="number" id="txNum" value="0" oninput="syncFromNum('tx')" style="width:64px">
          </div>
        </div>

        <!-- Translate Y -->
        <div class="control-group">
          <label>Translate Y <span id="tyVal">0px</span></label>
          <div class="slider-row">
            <input type="range" id="ty" min="-200" max="200" value="0" step="1" oninput="update()">
            <input type="number" id="tyNum" value="0" oninput="syncFromNum('ty')">
          </div>
        </div>

        <!-- Translate Z -->
        <div class="control-group">
          <label>Translate Z <span id="tzVal">0px</span></label>
          <div class="slider-row">
            <input type="range" id="tz" min="-300" max="300" value="0" step="1" oninput="update()">
            <input type="number" id="tzNum" value="0" oninput="syncFromNum('tz')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Rotate X -->
        <div class="control-group">
          <label>Rotate X <span id="rxVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="rx" min="-180" max="180" value="0" step="1" oninput="update()">
            <input type="number" id="rxNum" value="0" oninput="syncFromNum('rx')">
          </div>
        </div>

        <!-- Rotate Y -->
        <div class="control-group">
          <label>Rotate Y <span id="ryVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="ry" min="-180" max="180" value="0" step="1" oninput="update()">
            <input type="number" id="ryNum" value="0" oninput="syncFromNum('ry')">
          </div>
        </div>

        <!-- Rotate Z -->
        <div class="control-group">
          <label>Rotate Z <span id="rzVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="rz" min="-180" max="180" value="0" step="1" oninput="update()">
            <input type="number" id="rzNum" value="0" oninput="syncFromNum('rz')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Scale X -->
        <div class="control-group">
          <label>Scale X <span id="sxVal">1</span></label>
          <div class="slider-row">
            <input type="range" id="sx" min="0" max="3" value="1" step="0.05" oninput="update()">
            <input type="number" id="sxNum" value="1" step="0.05" oninput="syncFromNum('sx')">
          </div>
        </div>

        <!-- Scale Y -->
        <div class="control-group">
          <label>Scale Y <span id="syVal">1</span></label>
          <div class="slider-row">
            <input type="range" id="sy" min="0" max="3" value="1" step="0.05" oninput="update()">
            <input type="number" id="syNum" value="1" step="0.05" oninput="syncFromNum('sy')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Skew X -->
        <div class="control-group">
          <label>Skew X <span id="skxVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="skx" min="-60" max="60" value="0" step="1" oninput="update()">
            <input type="number" id="skxNum" value="0" oninput="syncFromNum('skx')">
          </div>
        </div>

        <!-- Skew Y -->
        <div class="control-group">
          <label>Skew Y <span id="skyVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="sky" min="-60" max="60" value="0" step="1" oninput="update()">
            <input type="number" id="skyNum" value="0" oninput="syncFromNum('sky')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Perspective -->
        <div class="control-group">
          <label>Perspective <span id="perspVal">800px</span></label>
          <div class="slider-row">
            <input type="range" id="persp" min="100" max="2000" value="800" step="10" oninput="update()">
            <input type="number" id="perspNum" value="800" oninput="syncFromNum('persp')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Transform Origin -->
        <div class="control-group">
          <label>Transform Origin</label>
          <div class="origin-row">
            <div class="origin-grid" id="originGrid"></div>
            <span class="origin-label" id="originLabel">center center</span>
          </div>
        </div>

        <!-- Transition Toggle -->
        <div class="control-group">
          <div class="toggle-row">
            <label style="margin:0">Smooth Transition</label>
            <div class="toggle on" id="transToggle" onclick="toggleTransition()"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>CSS Transform Playground &mdash; Part of the <a href="https://stevenli-phoenix.github.io/toolbox/">Dev Toolbox</a></p>
    <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener" class="coffee">☕ Buy me a coffee</a>
  </footer>
</div>

<script>
const ids = ['tx','ty','tz','rx','ry','rz','sx','sy','skx','sky','persp'];
const units = {tx:'px',ty:'px',tz:'px',rx:'°',ry:'°',rz:'°',sx:'',sy:'',skx:'°',sky:'°',persp:'px'};
const origins = [
  ['left top','center top','right top'],
  ['left center','center center','right center'],
  ['left bottom','center bottom','right bottom']
];
let currentOrigin = 'center center';
let transitionOn = true;

function initOriginGrid(){
  const grid = document.getElementById('originGrid');
  origins.flat().forEach((o,i)=>{
    const d = document.createElement('div');
    d.className = 'origin-dot' + (o==='center center'?' active':'');
    d.onclick = ()=>{
      currentOrigin = o;
      grid.querySelectorAll('.origin-dot').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
      document.getElementById('originLabel').textContent = o;
      update();
    };
    grid.appendChild(d);
  });
}

function syncFromNum(id){
  const v = document.getElementById(id+'Num').value;
  document.getElementById(id).value = v;
  update();
}

function update(){
  const v = {};
  ids.forEach(id=>{
    const val = parseFloat(document.getElementById(id).value);
    v[id] = val;
    const numEl = document.getElementById(id+'Num');
    if(document.activeElement !== numEl) numEl.value = val;
    const label = document.getElementById(id+'Val');
    if(label) label.textContent = val + units[id];
  });

  const parts = [];
  if(v.tx!==0||v.ty!==0||v.tz!==0) parts.push(`translate3d(${v.tx}px, ${v.ty}px, ${v.tz}px)`);
  if(v.rx!==0) parts.push(`rotateX(${v.rx}deg)`);
  if(v.ry!==0) parts.push(`rotateY(${v.ry}deg)`);
  if(v.rz!==0) parts.push(`rotateZ(${v.rz}deg)`);
  if(v.sx!==1||v.sy!==1) parts.push(`scale(${v.sx}, ${v.sy})`);
  if(v.skx!==0||v.sky!==0) parts.push(`skew(${v.skx}deg, ${v.sky}deg)`);

  const transformStr = parts.length ? parts.join(' ') : 'none';

  const box = document.getElementById('previewBox');
  const area = document.getElementById('previewArea');
  area.style.perspective = v.persp + 'px';
  box.style.transform = transformStr;
  box.style.transformOrigin = currentOrigin;
  box.style.transition = transitionOn ? 'transform .15s ease' : 'none';

  // Build code output
  let code = `transform: ${transformStr};`;
  if(currentOrigin !== 'center center') code += `\ntransform-origin: ${currentOrigin};`;
  if(v.persp !== 800) code += `\n/* parent */ perspective: ${v.persp}px;`;

  const codeEl = document.getElementById('codeOutput');
  codeEl.firstChild && codeEl.firstChild.nodeType === 3 ? codeEl.firstChild.textContent = code : codeEl.insertBefore(document.createTextNode(code), codeEl.firstChild);
  // Keep button
  if(!codeEl.querySelector('.copy-btn')){
    const btn = document.createElement('button');
    btn.className='copy-btn';btn.textContent='Copy';btn.onclick=copyCode;
    codeEl.appendChild(btn);
  }
  codeEl.childNodes.forEach(n=>{if(n.nodeType===3) n.textContent=code;});
}

function copyCode(){
  const text = document.getElementById('codeOutput').textContent.replace('Copy','').trim();
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy',1500);
  });
}

function toggleTransition(){
  transitionOn = !transitionOn;
  document.getElementById('transToggle').classList.toggle('on', transitionOn);
  update();
}

function setValues(obj){
  Object.entries(obj).forEach(([k,v])=>{
    if(document.getElementById(k)){
      document.getElementById(k).value = v;
      document.getElementById(k+'Num').value = v;
    }
  });
  update();
}

function applyPreset(name){
  const defaults = {tx:0,ty:0,tz:0,rx:0,ry:0,rz:0,sx:1,sy:1,skx:0,sky:0,persp:800};
  const presets = {
    reset: defaults,
    flip: {...defaults, sy:-1},
    tilt: {...defaults, rx:25, ry:-15, persp:600},
    skewCard: {...defaults, skx:10, sky:5, rz:3},
    zoomRotate: {...defaults, sx:1.4, sy:1.4, rz:15},
    perspective: {...defaults, ry:35, tz:50, persp:500}
  };
  setValues(presets[name]||defaults);
}

initOriginGrid();
update();
</script>
</body>
</html>
