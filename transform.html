<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Transform Playground - Visual CSS Transform Generator</title>
<meta name="description" content="Visually build CSS transforms with translate, rotate, scale, skew, and perspective. Live preview with copy-ready code output.">
<meta name="keywords" content="CSS transform, transform generator, translate, rotate, scale, skew, perspective, CSS tool, web development">
<meta name="author" content="Steven Li">
<meta property="og:title" content="CSS Transform Playground - Visual CSS Transform Generator">
<meta property="og:description" content="Visually build CSS transforms with translate, rotate, scale, skew, and perspective. Live preview with copy-ready code.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/transform.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="CSS Transform Playground">
<meta name="twitter:description" content="Visual CSS transform generator with live preview.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/transform.html">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3348;--text:#e4e6f0;--text2:#9ba1b8;--accent:#6c8cff;--accent2:#4a6aff;--green:#4cda8b;--red:#ff6b6b;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
a{color:var(--accent)}
.container{max-width:1200px;margin:0 auto;padding:16px}
header{text-align:center;padding:24px 0 16px}
header h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--text2);font-size:.9rem;margin-top:4px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;overflow:hidden}
.panel h2{font-size:1rem;font-weight:600;margin-bottom:16px;color:var(--text2)}
.preview-area{display:flex;align-items:center;justify-content:center;min-height:340px;background:var(--surface2);border-radius:8px;perspective:800px;overflow:hidden;position:relative}
.preview-box{width:140px;height:140px;background:linear-gradient(135deg,var(--accent),#a78bfa);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;transition:transform .15s ease;box-shadow:0 4px 24px rgba(108,140,255,.25);position:relative}
.preview-box::after{content:'';position:absolute;inset:0;border-radius:12px;border:2px dashed rgba(255,255,255,.2)}
.axis-lines{position:absolute;inset:0;pointer-events:none}
.axis-lines .h,.axis-lines .v{position:absolute;background:rgba(255,255,255,.06)}
.axis-lines .h{width:100%;height:1px;top:50%;left:0}
.axis-lines .v{height:100%;width:1px;left:50%;top:0}
.controls{display:flex;flex-direction:column;gap:14px}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:.8rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between}
.control-group label span{font-family:'SF Mono',Monaco,Consolas,monospace;color:var(--accent);font-weight:500;font-size:.8rem}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:var(--surface2);border-radius:3px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 6px rgba(108,140,255,.4)}
.slider-row input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
.slider-row input[type=number]{width:64px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 6px;font-size:.8rem;text-align:center;font-family:'SF Mono',Monaco,Consolas,monospace}
.slider-row input[type=number]:focus{outline:none;border-color:var(--accent)}
.output-section{margin-top:16px}
.code-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.82rem;line-height:1.6;color:var(--green);position:relative;white-space:pre-wrap;word-break:break-all;min-height:60px}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem;transition:all .2s}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.8rem;cursor:pointer;transition:all .2s;font-weight:500}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.preset-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:.75rem;cursor:pointer;transition:all .2s}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.section-divider{height:1px;background:var(--border);margin:4px 0}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle{width:40px;height:22px;background:var(--surface2);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;border:1px solid var(--border);flex-shrink:0}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}
.origin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:90px}
.origin-dot{width:28px;height:28px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.origin-dot:hover{border-color:var(--accent)}
.origin-dot.active{background:var(--accent);border-color:var(--accent)}
.origin-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--text2)}
.origin-dot.active::after{background:#fff}
.origin-row{display:flex;align-items:center;gap:12px}
.origin-label{font-size:.75rem;color:var(--text2)}
footer{text-align:center;padding:24px 0;color:var(--text2);font-size:.8rem}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.coffee{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);padding:6px 14px;border-radius:20px;color:var(--text);text-decoration:none;font-size:.8rem;margin-top:8px;transition:all .2s}
.coffee:hover{border-color:#ffdd00;color:#ffdd00;text-decoration:none}
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .preview-area{min-height:260px}
  header h1{font-size:1.3rem}
  .slider-row input[type=number]{width:56px}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>CSS Transform Playground</h1>
    <p>Visually build CSS transforms with live preview</p>
  </header>

  <div class="layout">
    <div class="panel">
      <h2>Preview</h2>
      <div class="preview-area" id="previewArea">
        <div class="axis-lines"><div class="h"></div><div class="v"></div></div>
        <div class="preview-box" id="previewBox">Transform</div>
      </div>
      <div class="output-section">
        <div class="code-block" id="codeOutput"><button class="copy-btn" onclick="copyCode()">Copy</button></div>
      </div>
    </div>

    <div class="panel">
      <h2>Controls</h2>
      <div class="controls" id="controls">
        <!-- Presets -->
        <div class="control-group">
          <label>Presets</label>
          <div class="btn-row">
            <button class="preset-btn" onclick="applyPreset('reset')">Reset</button>
            <button class="preset-btn" onclick="applyPreset('flip')">Flip X</button>
            <button class="preset-btn" onclick="applyPreset('tilt')">3D Tilt</button>
            <button class="preset-btn" onclick="applyPreset('skewCard')">Skew Card</button>
            <button class="preset-btn" onclick="applyPreset('zoomRotate')">Zoom + Rotate</button>
            <button class="preset-btn" onclick="applyPreset('perspective')">Perspective</button>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Translate X -->
        <div class="control-group">
          <label>Translate X <span id="txVal">0px</span></label>
          <div class="slider-row">
            <input type="range" id="tx" min="-200" max="200" value="0" step="1" oninput="update()">
            <input type="number" id="txNum" value="0" oninput="syncFromNum('tx')" style="width:64px">
          </div>
        </div>

        <!-- Translate Y -->
        <div class="control-group">
          <label>Translate Y <span id="tyVal">0px</span></label>
          <div class="slider-row">
            <input type="range" id="ty" min="-200" max="200" value="0" step="1" oninput="update()">
            <input type="number" id="tyNum" value="0" oninput="syncFromNum('ty')">
          </div>
        </div>

        <!-- Translate Z -->
        <div class="control-group">
          <label>Translate Z <span id="tzVal">0px</span></label>
          <div class="slider-row">
            <input type="range" id="tz" min="-300" max="300" value="0" step="1" oninput="update()">
            <input type="number" id="tzNum" value="0" oninput="syncFromNum('tz')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Rotate X -->
        <div class="control-group">
          <label>Rotate X <span id="rxVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="rx" min="-180" max="180" value="0" step="1" oninput="update()">
            <input type="number" id="rxNum" value="0" oninput="syncFromNum('rx')">
          </div>
        </div>

        <!-- Rotate Y -->
        <div class="control-group">
          <label>Rotate Y <span id="ryVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="ry" min="-180" max="180" value="0" step="1" oninput="update()">
            <input type="number" id="ryNum" value="0" oninput="syncFromNum('ry')">
          </div>
        </div>

        <!-- Rotate Z -->
        <div class="control-group">
          <label>Rotate Z <span id="rzVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="rz" min="-180" max="180" value="0" step="1" oninput="update()">
            <input type="number" id="rzNum" value="0" oninput="syncFromNum('rz')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Scale X -->
        <div class="control-group">
          <label>Scale X <span id="sxVal">1</span></label>
          <div class="slider-row">
            <input type="range" id="sx" min="0" max="3" value="1" step="0.05" oninput="update()">
            <input type="number" id="sxNum" value="1" step="0.05" oninput="syncFromNum('sx')">
          </div>
        </div>

        <!-- Scale Y -->
        <div class="control-group">
          <label>Scale Y <span id="syVal">1</span></label>
          <div class="slider-row">
            <input type="range" id="sy" min="0" max="3" value="1" step="0.05" oninput="update()">
            <input type="number" id="syNum" value="1" step="0.05" oninput="syncFromNum('sy')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Skew X -->
        <div class="control-group">
          <label>Skew X <span id="skxVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="skx" min="-60" max="60" value="0" step="1" oninput="update()">
            <input type="number" id="skxNum" value="0" oninput="syncFromNum('skx')">
          </div>
        </div>

        <!-- Skew Y -->
        <div class="control-group">
          <label>Skew Y <span id="skyVal">0°</span></label>
          <div class="slider-row">
            <input type="range" id="sky" min="-60" max="60" value="0" step="1" oninput="update()">
            <input type="number" id="skyNum" value="0" oninput="syncFromNum('sky')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Perspective -->
        <div class="control-group">
          <label>Perspective <span id="perspVal">800px</span></label>
          <div class="slider-row">
            <input type="range" id="persp" min="100" max="2000" value="800" step="10" oninput="update()">
            <input type="number" id="perspNum" value="800" oninput="syncFromNum('persp')">
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- Transform Origin -->
        <div class="control-group">
          <label>Transform Origin</label>
          <div class="origin-row">
            <div class="origin-grid" id="originGrid"></div>
            <span class="origin-label" id="originLabel">center center</span>
          </div>
        </div>

        <!-- Transition Toggle -->
        <div class="control-group">
          <div class="toggle-row">
            <label style="margin:0">Smooth Transition</label>
            <div class="toggle on" id="transToggle" onclick="toggleTransition()"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>CSS Transform Playground &mdash; Part of the <a href="https://stevenli-phoenix.github.io/toolbox/">Dev Toolbox</a></p>
    <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener" class="coffee">☕ Buy me a coffee</a>
  </footer>
</div>

<script>
const ids = ['tx','ty','tz','rx','ry','rz','sx','sy','skx','sky','persp'];
const units = {tx:'px',ty:'px',tz:'px',rx:'°',ry:'°',rz:'°',sx:'',sy:'',skx:'°',sky:'°',persp:'px'};
const origins = [
  ['left top','center top','right top'],
  ['left center','center center','right center'],
  ['left bottom','center bottom','right bottom']
];
let currentOrigin = 'center center';
let transitionOn = true;

function initOriginGrid(){
  const grid = document.getElementById('originGrid');
  origins.flat().forEach((o,i)=>{
    const d = document.createElement('div');
    d.className = 'origin-dot' + (o==='center center'?' active':'');
    d.onclick = ()=>{
      currentOrigin = o;
      grid.querySelectorAll('.origin-dot').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
      document.getElementById('originLabel').textContent = o;
      update();
    };
    grid.appendChild(d);
  });
}

function syncFromNum(id){
  const v = document.getElementById(id+'Num').value;
  document.getElementById(id).value = v;
  update();
}

function update(){
  const v = {};
  ids.forEach(id=>{
    const val = parseFloat(document.getElementById(id).value);
    v[id] = val;
    const numEl = document.getElementById(id+'Num');
    if(document.activeElement !== numEl) numEl.value = val;
    const label = document.getElementById(id+'Val');
    if(label) label.textContent = val + units[id];
  });

  const parts = [];
  if(v.tx!==0||v.ty!==0||v.tz!==0) parts.push(`translate3d(${v.tx}px, ${v.ty}px, ${v.tz}px)`);
  if(v.rx!==0) parts.push(`rotateX(${v.rx}deg)`);
  if(v.ry!==0) parts.push(`rotateY(${v.ry}deg)`);
  if(v.rz!==0) parts.push(`rotateZ(${v.rz}deg)`);
  if(v.sx!==1||v.sy!==1) parts.push(`scale(${v.sx}, ${v.sy})`);
  if(v.skx!==0||v.sky!==0) parts.push(`skew(${v.skx}deg, ${v.sky}deg)`);

  const transformStr = parts.length ? parts.join(' ') : 'none';

  const box = document.getElementById('previewBox');
  const area = document.getElementById('previewArea');
  area.style.perspective = v.persp + 'px';
  box.style.transform = transformStr;
  box.style.transformOrigin = currentOrigin;
  box.style.transition = transitionOn ? 'transform .15s ease' : 'none';

  // Build code output
  let code = `transform: ${transformStr};`;
  if(currentOrigin !== 'center center') code += `\ntransform-origin: ${currentOrigin};`;
  if(v.persp !== 800) code += `\n/* parent */ perspective: ${v.persp}px;`;

  const codeEl = document.getElementById('codeOutput');
  codeEl.firstChild && codeEl.firstChild.nodeType === 3 ? codeEl.firstChild.textContent = code : codeEl.insertBefore(document.createTextNode(code), codeEl.firstChild);
  // Keep button
  if(!codeEl.querySelector('.copy-btn')){
    const btn = document.createElement('button');
    btn.className='copy-btn';btn.textContent='Copy';btn.onclick=copyCode;
    codeEl.appendChild(btn);
  }
  codeEl.childNodes.forEach(n=>{if(n.nodeType===3) n.textContent=code;});
}

function copyCode(){
  const text = document.getElementById('codeOutput').textContent.replace('Copy','').trim();
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy',1500);
  });
}

function toggleTransition(){
  transitionOn = !transitionOn;
  document.getElementById('transToggle').classList.toggle('on', transitionOn);
  update();
}

function setValues(obj){
  Object.entries(obj).forEach(([k,v])=>{
    if(document.getElementById(k)){
      document.getElementById(k).value = v;
      document.getElementById(k+'Num').value = v;
    }
  });
  update();
}

function applyPreset(name){
  const defaults = {tx:0,ty:0,tz:0,rx:0,ry:0,rz:0,sx:1,sy:1,skx:0,sky:0,persp:800};
  const presets = {
    reset: defaults,
    flip: {...defaults, sy:-1},
    tilt: {...defaults, rx:25, ry:-15, persp:600},
    skewCard: {...defaults, skx:10, sky:5, rz:3},
    zoomRotate: {...defaults, sx:1.4, sy:1.4, rz:15},
    perspective: {...defaults, ry:35, tz:50, persp:500}
  };
  setValues(presets[name]||defaults);
}

initOriginGrid();
update();
</script>
</body>
</html>
