<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placeholder Image Generator - Free Online Tool</title>
<meta name="description" content="Free placeholder image generator. Create custom placeholder images with any size, color, and text. Download as PNG or use as URL. No signup required.">
<meta name="keywords" content="placeholder image, placeholder generator, dummy image, image placeholder, free placeholder tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/placeholder.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:700px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
label{display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:.35rem;margin-top:.75rem}
label:first-child{margin-top:0}
input[type="number"],input[type="text"],input[type="color"]{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;font-family:var(--font);font-size:.9rem}
input[type="number"],input[type="text"]{width:100%}
input[type="color"]{width:50px;height:38px;padding:2px;cursor:pointer}
input:focus{outline:none;border-color:var(--accent)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.preview-wrap{display:flex;justify-content:center;padding:1rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-top:1rem;overflow:auto}
.preview-wrap canvas{max-width:100%;border-radius:4px}
.presets{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem}
.preset{padding:.3rem .6rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:.78rem;cursor:pointer}
.preset:hover{border-color:var(--accent);color:var(--text)}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Placeholder Image</h1>
<p class="subtitle">Generate custom placeholder images for mockups and wireframes</p>

<div class="card">
<h2>⚙️ Settings</h2>
<div class="row">
<div><label>Width (px)</label><input type="number" id="w" value="600" min="10" max="4000" oninput="render()"></div>
<div><label>Height (px)</label><input type="number" id="h" value="400" min="10" max="4000" oninput="render()"></div>
</div>
<div class="presets">
<button class="preset" onclick="setSize(150,150)">150×150</button>
<button class="preset" onclick="setSize(300,200)">300×200</button>
<button class="preset" onclick="setSize(600,400)">600×400</button>
<button class="preset" onclick="setSize(800,600)">800×600</button>
<button class="preset" onclick="setSize(1200,630)">OG 1200×630</button>
<button class="preset" onclick="setSize(1920,1080)">1080p</button>
<button class="preset" onclick="setSize(1080,1080)">Square 1080</button>
<button class="preset" onclick="setSize(1080,1920)">Story 1080×1920</button>
</div>
<div class="row-3">
<div><label>Background</label><input type="color" id="bgc" value="#334155" oninput="render()"></div>
<div><label>Text Color</label><input type="color" id="txc" value="#94a3b8" oninput="render()"></div>
<div><label>Font Size</label><input type="number" id="fs" value="0" min="0" max="200" oninput="render()" placeholder="Auto"></div>
</div>
<label>Custom Text <span style="font-weight:400;color:var(--muted)">(blank = dimensions)</span></label>
<input type="text" id="txt" placeholder="600 × 400" oninput="render()">
</div>

<div class="card">
<h2>👁️ Preview</h2>
<div class="preview-wrap"><canvas id="canvas"></canvas></div>
<div class="btn-row">
<button class="btn-primary" onclick="download()">⬇️ Download PNG</button>
<button class="btn-secondary" onclick="copyDataUrl()">📋 Copy Data URL</button>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
function $id(id){return document.getElementById(id)}

function render(){
  const w=parseInt($id('w').value)||100;
  const h=parseInt($id('h').value)||100;
  const bgc=$id('bgc').value;
  const txc=$id('txc').value;
  const customFs=parseInt($id('fs').value)||0;
  const txt=$id('txt').value||`${w} × ${h}`;

  const c=$id('canvas');
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');

  ctx.fillStyle=bgc;
  ctx.fillRect(0,0,w,h);

  // Cross lines
  ctx.strokeStyle=txc;
  ctx.globalAlpha=0.15;
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(w,h);ctx.stroke();
  ctx.beginPath();ctx.moveTo(w,0);ctx.lineTo(0,h);ctx.stroke();
  ctx.globalAlpha=1;

  const fs=customFs||Math.max(12,Math.min(w,h)/8);
  ctx.fillStyle=txc;
  ctx.font=`600 ${fs}px -apple-system,system-ui,sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(txt,w/2,h/2,w*.9);
}

function setSize(w,h){
  $id('w').value=w;$id('h').value=h;render();
}

function download(){
  const a=document.createElement('a');
  a.download=`placeholder-${$id('w').value}x${$id('h').value}.png`;
  a.href=$id('canvas').toDataURL('image/png');
  a.click();
}

function copyDataUrl(){
  navigator.clipboard.writeText($id('canvas').toDataURL('image/png')).then(()=>{
    const t=$id('toast');t.textContent='Data URL Copied!';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

render();
</script>
</body>
</html>
