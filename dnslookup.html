<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Lookup Tool — Query DNS Records Online | DevToolbox</title>
    <meta name="description" content="Free online DNS lookup tool. Query A, AAAA, MX, CNAME, TXT, NS, SOA, SRV, CAA, and PTR records for any domain using Cloudflare or Google DNS-over-HTTPS.">
    <meta name="keywords" content="DNS lookup, DNS records, A record, MX record, CNAME, TXT record, NS record, SOA, SRV, CAA, DNS query, domain lookup, DNS checker, DNS-over-HTTPS">

    <meta property="og:title" content="DNS Lookup Tool — Query DNS Records Online">
    <meta property="og:description" content="Query A, AAAA, MX, CNAME, TXT, NS, SOA, SRV, CAA records for any domain using DNS-over-HTTPS. Free, fast, no install.">

    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/dnslookup.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="DNS Lookup Tool — Query DNS Records Online">
    <meta name="twitter:description" content="Free online DNS lookup. Query all DNS record types via Cloudflare or Google DNS-over-HTTPS.">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3345;
            --text: #e4e6ef;
            --text-dim: #8b8fa3;
            --accent: #6c8cff;
            --accent-hover: #8aa4ff;
            --green: #4cdb8a;
            --orange: #f0a050;
            --red: #f05050;
            --radius: 10px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        h1 span { color: var(--accent); }
        .subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .input-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .input-row input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: var(--accent); }
        .input-row input::placeholder { color: var(--text-dim); }
        button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button:hover { background: var(--accent-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .options-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        .options-row label {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 600;
            margin-right: 0.25rem;
        }
        .record-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.35rem 0.7rem;
            font-size: 0.8rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .record-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .record-btn:hover:not(.active) {
            border-color: var(--accent);
            color: var(--text);
        }
        .provider-select {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .provider-select select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 0.35rem 0.5rem;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }
        .results {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }
        .result-type {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent);
        }
        .result-count {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
        }
        .result-table th {
            text-align: left;
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }
        .result-table td {
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
            word-break: break-all;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .result-table tr:last-child td { border-bottom: none; }
        .result-table tr:hover td { background: rgba(108, 140, 255, 0.04); }
        .ttl { color: var(--orange); }
        .status-msg {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.95rem;
        }
        .status-msg.error { color: var(--red); }
        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .query-time {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }
        .badge-noerror { color: var(--green); font-weight: 600; }
        .badge-error { color: var(--red); font-weight: 600; }
        .bmc {
            display: block;
            text-align: center;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        .bmc a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .bmc a:hover { text-decoration: underline; }
        .all-btn { font-size: 0.7rem; padding: 0.25rem 0.5rem; }
        @media (max-width: 600px) {
            .container { padding: 1.25rem 0.75rem 3rem; }
            h1 { font-size: 1.4rem; }
            .input-row { flex-direction: column; }
            .provider-select { margin-left: 0; margin-top: 0.25rem; }
            .result-table td, .result-table th { padding: 0.5rem 0.6rem; font-size: 0.78rem; }
            .options-row { gap: 0.35rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 DNS <span>Lookup</span></h1>
        <p class="subtitle">Query DNS records for any domain via DNS-over-HTTPS</p>

        <div class="search-box">
            <div class="input-row">
                <input type="text" id="domain" placeholder="example.com" autofocus spellcheck="false" autocomplete="off">
                <button id="lookupBtn" onclick="doLookup()">Lookup</button>
            </div>
            <div class="options-row">
                <label>Records:</label>
                <button class="record-btn active" data-type="A">A</button>
                <button class="record-btn active" data-type="AAAA">AAAA</button>
                <button class="record-btn active" data-type="MX">MX</button>
                <button class="record-btn active" data-type="CNAME">CNAME</button>
                <button class="record-btn active" data-type="TXT">TXT</button>
                <button class="record-btn active" data-type="NS">NS</button>
                <button class="record-btn active" data-type="SOA">SOA</button>
                <button class="record-btn" data-type="SRV">SRV</button>
                <button class="record-btn" data-type="CAA">CAA</button>
                <button class="record-btn" data-type="PTR">PTR</button>
                <button class="record-btn all-btn" onclick="toggleAll()">ALL</button>
                <div class="provider-select">
                    <label>Via:</label>
                    <select id="provider">
                        <option value="cloudflare">Cloudflare</option>
                        <option value="google">Google</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
    const RECORD_TYPES = { A:1, AAAA:28, MX:15, CNAME:5, TXT:16, NS:2, SOA:6, SRV:33, CAA:257, PTR:12 };
    const RCODE_NAMES = { 0:'NOERROR', 1:'FORMERR', 2:'SERVFAIL', 3:'NXDOMAIN', 4:'NOTIMP', 5:'REFUSED' };
    const PROVIDERS = {
        cloudflare: 'https://cloudflare-dns.com/dns-query',
        google: 'https://dns.google/resolve'
    };

    document.querySelectorAll('.record-btn[data-type]').forEach(b => {
        b.addEventListener('click', () => b.classList.toggle('active'));
    });

    document.getElementById('domain').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLookup();
    });

    function toggleAll() {
        const btns = document.querySelectorAll('.record-btn[data-type]');
        const allActive = [...btns].every(b => b.classList.contains('active'));
        btns.forEach(b => b.classList.toggle('active', !allActive));
    }

    function getSelectedTypes() {
        return [...document.querySelectorAll('.record-btn.active[data-type]')].map(b => b.dataset.type);
    }

    function formatTTL(seconds) {
        if (seconds < 60) return seconds + 's';
        if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        return h + 'h ' + (m ? m + 'm' : '');
    }

    async function queryDNS(domain, type) {
        const provider = document.getElementById('provider').value;
        const url = PROVIDERS[provider];
        const params = new URLSearchParams({ name: domain, type: type });
        const resp = await fetch(`${url}?${params}`, {
            headers: { 'Accept': 'application/dns-json' }
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return resp.json();
    }

    function renderRecords(type, data) {
        const answers = data.Answer || [];
        const status = data.Status || 0;
        const statusName = RCODE_NAMES[status] || `RCODE ${status}`;
        const isError = status !== 0;

        let html = `<div class="result-card">
            <div class="result-header">
                <span class="result-type">${type} Records</span>
                <span class="result-count">
                    <span class="${isError ? 'badge-error' : 'badge-noerror'}">${statusName}</span>
                    · ${answers.length} record${answers.length !== 1 ? 's' : ''}
                </span>
            </div>`;

        if (answers.length === 0) {
            html += `<div style="padding:1rem;color:var(--text-dim);font-size:0.85rem;">No ${type} records found.</div>`;
        } else {
            html += `<table class="result-table"><thead><tr>
                <th>Name</th><th>TTL</th><th>Value</th>
            </tr></thead><tbody>`;
            for (const r of answers) {
                let val = r.data || '';
                // Clean up trailing dots
                if (typeof val === 'string' && val.endsWith('.') && type !== 'TXT') {
                    val = val.slice(0, -1);
                }
                // Format MX priority
                if (type === 'MX' && val.includes(' ')) {
                    const [pri, host] = val.split(/\s+/);
                    val = `<span style="color:var(--orange)">${pri}</span> ${host.replace(/\.$/, '')}`;
                }
                // Format SOA
                if (type === 'SOA') {
                    const parts = val.split(/\s+/);
                    if (parts.length >= 7) {
                        val = `Primary: ${parts[0].replace(/\.$/, '')}<br>
                               Admin: ${parts[1].replace(/\.$/, '')}<br>
                               Serial: ${parts[2]}<br>
                               Refresh: ${formatTTL(+parts[3])}<br>
                               Retry: ${formatTTL(+parts[4])}<br>
                               Expire: ${formatTTL(+parts[5])}<br>
                               Min TTL: ${formatTTL(+parts[6])}`;
                    }
                }
                // Format CAA
                if (type === 'CAA') {
                    const m = val.match(/^(\d+)\s+(\w+)\s+"?(.+?)"?$/);
                    if (m) val = `${m[2]} → ${m[3]} (flags: ${m[1]})`;
                }
                const name = (r.name || '').replace(/\.$/, '');
                html += `<tr>
                    <td>${name}</td>
                    <td class="ttl">${formatTTL(r.TTL || 0)}</td>
                    <td>${val}</td>
                </tr>`;
            }
            html += `</tbody></table>`;
        }
        html += `</div>`;
        return html;
    }

    async function doLookup() {
        const domain = document.getElementById('domain').value.trim().replace(/^https?:\/\//, '').replace(/\/.*$/, '');
        if (!domain) return;
        const types = getSelectedTypes();
        if (types.length === 0) { alert('Select at least one record type.'); return; }

        const btn = document.getElementById('lookupBtn');
        const resultsEl = document.getElementById('results');
        btn.disabled = true;
        btn.textContent = 'Querying…';
        resultsEl.innerHTML = `<div class="status-msg"><span class="spinner"></span> Querying ${types.length} record type${types.length > 1 ? 's' : ''} for <strong>${domain}</strong>…</div>`;

        const start = performance.now();
        let html = '';
        try {
            const results = await Promise.allSettled(types.map(t => queryDNS(domain, t)));
            for (let i = 0; i < types.length; i++) {
                const r = results[i];
                if (r.status === 'fulfilled') {
                    html += renderRecords(types[i], r.value);
                } else {
                    html += `<div class="result-card">
                        <div class="result-header">
                            <span class="result-type">${types[i]} Records</span>
                            <span class="badge-error">ERROR</span>
                        </div>
                        <div style="padding:1rem;color:var(--red);font-size:0.85rem;">${r.reason.message || 'Query failed'}</div>
                    </div>`;
                }
            }
            const elapsed = ((performance.now() - start) / 1000).toFixed(2);
            html += `<div class="query-time">Completed in ${elapsed}s via ${document.getElementById('provider').value === 'cloudflare' ? 'Cloudflare' : 'Google'} DNS</div>`;
            html += `<div class="bmc"><a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee — support free dev tools</a></div>`;
        } catch (err) {
            html = `<div class="status-msg error">Error: ${err.message}</div>`;
        }
        resultsEl.innerHTML = html;
        btn.disabled = false;
        btn.textContent = 'Lookup';
    }
    </script>
</body>
</html>
