<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board — Free Online Task Board | DevToolbox</title>
<meta name="description" content="Free online Kanban board with drag-and-drop, customizable columns, color labels, and local storage. No signup required — your data stays in your browser.">
<meta name="keywords" content="kanban board, task board, project management, todo, drag and drop, free kanban, productivity tool, task manager">
<meta name="author" content="Steven Li">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/kanban.html">
<meta property="og:title" content="Kanban Board — Free Online Task Board">
<meta property="og:description" content="Drag-and-drop Kanban board with customizable columns and color labels. No signup — data stays in your browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/kanban.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Kanban Board — Free Online Task Board">
<meta name="twitter:description" content="Drag-and-drop Kanban board with customizable columns and color labels. No signup required.">
<link rel="stylesheet" href="toolbox.css">
<style>
  .header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border)}
  .header h1{font-size:1.2rem;margin:0}
  .header-actions{display:flex;gap:6px}
  .board{display:flex;gap:14px;padding:16px 20px;overflow-x:auto;flex:1;align-items:flex-start}
  .column{min-width:260px;max-width:320px;flex-shrink:0;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column}
  .col-header{display:flex;align-items:center;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border)}
  .col-title{font-weight:600;font-size:.9rem;flex:1;outline:none}
  .col-count{font-size:.75rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:1px 7px}
  .col-menu{position:relative}
  .col-menu-btn{background:none;border:none;cursor:pointer;font-size:1rem;color:var(--muted);padding:2px 6px}
  .col-dropdown{display:none;position:absolute;top:100%;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);z-index:10;min-width:130px;box-shadow:var(--shadow-lg)}
  .col-dropdown.show{display:block}
  .col-dropdown button{display:block;width:100%;text-align:left;padding:6px 12px;border:none;background:none;font-size:.82rem;cursor:pointer;color:var(--text)}
  .col-dropdown button:hover{background:var(--surface2)}
  .col-dropdown button.danger{color:var(--error)}
  .cards{padding:8px;min-height:40px;flex:1}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px;cursor:grab;transition:box-shadow .15s,opacity .15s}
  .card:hover{box-shadow:var(--shadow)}
  .card.dragging{opacity:.4}
  .card-label{height:4px;border-radius:2px;margin-bottom:6px}
  .card-label.none{display:none}
  .card-label.red{background:#ef4444}.card-label.orange{background:#f97316}.card-label.yellow{background:#eab308}
  .card-label.green{background:#22c55e}.card-label.blue{background:#3b82f6}.card-label.purple{background:#a855f7}
  .card-text{font-size:.88rem;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
  .card-date{font-size:.75rem;color:var(--muted)}
  .card-actions{display:flex;gap:2px}
  .card-actions button{background:none;border:none;cursor:pointer;font-size:.8rem;padding:2px 4px;opacity:.5}
  .card-actions button:hover{opacity:1}
  .card-actions button.danger:hover{color:var(--error)}
  .drop-indicator{height:3px;background:var(--accent);border-radius:2px;margin:4px 0}
  .drag-over{border-color:var(--accent)}
  .add-card-btn{width:100%;padding:8px;border:none;background:none;color:var(--muted);font-size:.85rem;cursor:pointer;text-align:left;border-top:1px solid var(--border)}
  .add-card-btn:hover{color:var(--text);background:var(--surface)}
  .add-card-form{padding:8px}
  .add-card-form textarea{width:100%;min-height:60px;resize:vertical;padding:8px;font:inherit;font-size:.85rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;margin-bottom:6px}
  .form-row{display:flex;gap:6px;align-items:center}
  .label-picker{display:flex;gap:4px}
  .label-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s}
  .label-dot.active{border-color:var(--text)}
  .label-dot.none{background:var(--surface2);border:2px solid var(--border)}.label-dot.red{background:#ef4444}.label-dot.orange{background:#f97316}
  .label-dot.yellow{background:#eab308}.label-dot.green{background:#22c55e}.label-dot.blue{background:#3b82f6}.label-dot.purple{background:#a855f7}
  .add-col-btn{min-width:200px;flex-shrink:0;padding:12px;border:2px dashed var(--border);border-radius:var(--radius);background:none;color:var(--muted);font-size:.85rem;cursor:pointer;text-align:center;transition:border-color .15s}
  .add-col-btn:hover{border-color:var(--accent);color:var(--text)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center}
  .modal-overlay.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:90%;max-width:420px;box-shadow:var(--shadow-lg)}
  .modal h2{font-size:1rem;margin-bottom:12px}
  .modal textarea{width:100%;min-height:80px;resize:vertical;margin-bottom:10px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end}
  .btn-sm{padding:4px 10px;font-size:.82rem}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:var(--border2)}
  .footer{padding:12px 20px;text-align:center;font-size:.82rem;color:var(--muted);border-top:1px solid var(--border)}
</style>
</head>
<body>

<div class="header">
  <h1><span>📋</span> Kanban Board</h1>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="exportBoard()" title="Export as JSON">Export</button>
    <button class="btn btn-ghost btn-sm" onclick="importBoard()" title="Import JSON">Import</button>
    <button class="btn btn-ghost btn-sm btn-danger" onclick="clearBoard()" title="Reset board">Clear</button>
  </div>
</div>

<div class="board" id="board"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Edit Card</h2>
    <label>Content</label>
    <textarea id="editText"></textarea>
    <label>Color Label</label>
    <div class="label-picker" id="editLabelPicker" style="margin-bottom:12px"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<input type="file" id="importInput" accept=".json" style="display:none">

<footer class="footer">
  Kanban Board — Data saved locally in your browser &nbsp;|&nbsp;
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a> &nbsp;|&nbsp;
  <a href="index.html">All Tools</a>
</footer>

<script>
const COLORS = ['none','red','orange','yellow','green','blue','purple'];
const STORAGE_KEY = 'kanban_board_v1';

let board = loadBoard();
let dragCard = null;
let dragCol = null;
let editingCard = null;

function defaultBoard() {
  return {
    columns: [
      { id: genId(), title: 'To Do', cards: [] },
      { id: genId(), title: 'In Progress', cards: [] },
      { id: genId(), title: 'Done', cards: [] }
    ]
  };
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function loadBoard() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d && d.columns) return d;
  } catch(e) {}
  return defaultBoard();
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(board)); }

function render() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  board.columns.forEach((col, ci) => {
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.colId = col.id;
    colEl.innerHTML = `
      <div class="col-header">
        <span class="col-title" contenteditable="true" data-col="${ci}">${esc(col.title)}</span>
        <span class="col-count">${col.cards.length}</span>
        <div class="col-menu">
          <button class="col-menu-btn" onclick="toggleColMenu(this)">⋯</button>
          <div class="col-dropdown">
            <button onclick="clearColumn('${col.id}')">Clear cards</button>
            <button class="danger" onclick="deleteColumn('${col.id}')">Delete column</button>
          </div>
        </div>
      </div>
      <div class="cards" data-col-id="${col.id}"></div>
      <button class="add-card-btn" onclick="showAddForm(this,'${col.id}')">+ Add card</button>
    `;
    // Column title edit
    const titleEl = colEl.querySelector('.col-title');
    titleEl.addEventListener('blur', () => { col.title = titleEl.textContent.trim() || 'Untitled'; save(); });
    titleEl.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();titleEl.blur();} });

    // Cards
    const cardsEl = colEl.querySelector('.cards');
    col.cards.forEach((card, cardIdx) => {
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      cardEl.draggable = true;
      cardEl.dataset.cardId = card.id;
      cardEl.dataset.colId = col.id;
      cardEl.innerHTML = `
        <div class="card-label ${card.label || 'none'}"></div>
        <div class="card-text">${esc(card.text)}</div>
        <div class="card-meta">
          <span class="card-date">${fmtDate(card.created)}</span>
          <div class="card-actions">
            <button onclick="editCard('${col.id}','${card.id}')" title="Edit">✏️</button>
            <button class="danger" onclick="deleteCard('${col.id}','${card.id}')" title="Delete">🗑</button>
          </div>
        </div>
      `;
      // Drag
      cardEl.addEventListener('dragstart', e => {
        dragCard = card.id;
        dragCol = col.id;
        cardEl.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      cardEl.addEventListener('dragend', () => {
        cardEl.classList.remove('dragging');
        dragCard = null; dragCol = null;
        document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
        document.querySelectorAll('.drag-over').forEach(d=>d.classList.remove('drag-over'));
      });
      cardsEl.appendChild(cardEl);
    });

    // Drop zone
    cardsEl.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      colEl.classList.add('drag-over');
      // Show indicator
      const afterEl = getDragAfterElement(cardsEl, e.clientY);
      const existing = cardsEl.querySelector('.drop-indicator');
      if (!existing) {
        const ind = document.createElement('div');
        ind.className = 'drop-indicator';
        if (afterEl) cardsEl.insertBefore(ind, afterEl);
        else cardsEl.appendChild(ind);
      } else {
        if (afterEl) cardsEl.insertBefore(existing, afterEl);
        else cardsEl.appendChild(existing);
      }
    });
    cardsEl.addEventListener('dragleave', e => {
      if (!cardsEl.contains(e.relatedTarget)) {
        colEl.classList.remove('drag-over');
        cardsEl.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
      }
    });
    cardsEl.addEventListener('drop', e => {
      e.preventDefault();
      colEl.classList.remove('drag-over');
      cardsEl.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
      if (!dragCard) return;
      // Find and move card
      const srcCol = board.columns.find(c=>c.id===dragCol);
      const srcIdx = srcCol.cards.findIndex(c=>c.id===dragCard);
      if (srcIdx<0) return;
      const [card] = srcCol.cards.splice(srcIdx,1);
      const afterEl = getDragAfterElement(cardsEl, e.clientY);
      if (afterEl) {
        const afterId = afterEl.dataset.cardId;
        const destIdx = col.cards.findIndex(c=>c.id===afterId);
        col.cards.splice(destIdx,0,card);
      } else {
        col.cards.push(card);
      }
      save(); render();
    });

    el.appendChild(colEl);
  });

  // Add column button
  const addColBtn = document.createElement('button');
  addColBtn.className = 'add-col-btn';
  addColBtn.textContent = '+ Add Column';
  addColBtn.onclick = () => {
    board.columns.push({ id: genId(), title: 'New Column', cards: [] });
    save(); render();
  };
  el.appendChild(addColBtn);
}

function getDragAfterElement(container, y) {
  const els = [...container.querySelectorAll('.card:not(.dragging)')];
  return els.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function showAddForm(btn, colId) {
  if (btn.nextElementSibling && btn.nextElementSibling.classList.contains('add-card-form')) return;
  const form = document.createElement('div');
  form.className = 'add-card-form';
  let selectedLabel = 'none';
  form.innerHTML = `
    <textarea placeholder="Enter card text..." autofocus></textarea>
    <div class="form-row">
      <div class="label-picker">${COLORS.map(c=>`<div class="label-dot ${c} ${c==='none'?'active':''}" data-color="${c}"></div>`).join('')}</div>
      <button class="btn btn-primary btn-sm">Add</button>
      <button class="btn btn-ghost btn-sm" onclick="this.closest('.add-card-form').remove()">✕</button>
    </div>
  `;
  btn.after(form);
  btn.style.display = 'none';
  const ta = form.querySelector('textarea');
  ta.focus();
  form.querySelectorAll('.label-dot').forEach(d => {
    d.onclick = () => {
      form.querySelectorAll('.label-dot').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
      selectedLabel = d.dataset.color;
    };
  });
  const addFn = () => {
    const text = ta.value.trim();
    if (!text) return;
    const col = board.columns.find(c=>c.id===colId);
    col.cards.push({ id: genId(), text, label: selectedLabel, created: Date.now() });
    save(); render();
  };
  form.querySelector('.btn-primary').onclick = addFn;
  ta.addEventListener('keydown', e => { if(e.key==='Enter' && (e.metaKey||e.ctrlKey)){e.preventDefault();addFn();} });
}

function editCard(colId, cardId) {
  const col = board.columns.find(c=>c.id===colId);
  const card = col.cards.find(c=>c.id===cardId);
  if (!card) return;
  editingCard = { colId, cardId };
  document.getElementById('editText').value = card.text;
  const picker = document.getElementById('editLabelPicker');
  picker.innerHTML = COLORS.map(c=>`<div class="label-dot ${c} ${c===(card.label||'none')?'active':''}" data-color="${c}"></div>`).join('');
  picker.querySelectorAll('.label-dot').forEach(d => {
    d.onclick = () => {
      picker.querySelectorAll('.label-dot').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
    };
  });
  document.getElementById('editModal').classList.add('show');
  document.getElementById('editText').focus();
}

function saveEdit() {
  if (!editingCard) return;
  const col = board.columns.find(c=>c.id===editingCard.colId);
  const card = col.cards.find(c=>c.id===editingCard.cardId);
  card.text = document.getElementById('editText').value.trim() || card.text;
  const active = document.querySelector('#editLabelPicker .label-dot.active');
  card.label = active ? active.dataset.color : 'none';
  save(); render(); closeEditModal();
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
  editingCard = null;
}

function deleteCard(colId, cardId) {
  const col = board.columns.find(c=>c.id===colId);
  col.cards = col.cards.filter(c=>c.id!==cardId);
  save(); render();
}

function deleteColumn(colId) {
  if (!confirm('Delete this column and all its cards?')) return;
  board.columns = board.columns.filter(c=>c.id!==colId);
  save(); render();
}

function clearColumn(colId) {
  const col = board.columns.find(c=>c.id===colId);
  col.cards = [];
  save(); render();
  closeAllMenus();
}

function toggleColMenu(btn) {
  const dd = btn.nextElementSibling;
  const isOpen = dd.classList.contains('show');
  closeAllMenus();
  if (!isOpen) dd.classList.add('show');
}

function closeAllMenus() {
  document.querySelectorAll('.col-dropdown').forEach(d=>d.classList.remove('show'));
}

function clearBoard() {
  if (!confirm('Reset entire board? This cannot be undone.')) return;
  board = defaultBoard();
  save(); render();
}

function exportBoard() {
  const blob = new Blob([JSON.stringify(board, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kanban-board.json';
  a.click();
}

function importBoard() {
  const input = document.getElementById('importInput');
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d && d.columns) { board = d; save(); render(); }
        else alert('Invalid board file.');
      } catch(e) { alert('Failed to parse JSON.'); }
    };
    reader.readAsText(file);
    input.value = '';
  };
  input.click();
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const mon = d.toLocaleString('en', { month: 'short' });
  return `${mon} ${d.getDate()}`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Close menus on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.col-menu')) closeAllMenus();
  if (e.target.id === 'editModal' || e.target.closest('.modal-overlay') === document.getElementById('editModal') && !e.target.closest('.modal')) closeEditModal();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEditModal();
});

render();
</script>
</body>
</html>
