.field input, .field select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .9rem; box-sizing: border-box; }
.editor { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.panel-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: .82rem; background: var(--surface2); }
.panel-label { font-weight: 600; color: var(--muted); }
.panel textarea { width: 100%; min-height: 220px; border: none; outline: none; resize: vertical; padding: 12px; font-family: var(--mono); font-size: .9rem; background: var(--bg); color: var(--text); box-sizing: border-box; }

.tabula-body th, .tabula-body td { border: 1px solid var(--border); padding: 3px 5px; text-align: center; min-width: 18px; }
.tabula-body th { background: var(--surface2); color: var(--muted); font-weight: 700; }
.tabula-body td.hl { background: rgba(99, 102, 241, .15); font-weight: 700; color: var(--accent); }

<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<header>
<h1>🔑 Vigenère Cipher</h1>
<p class="subtitle">Polyalphabetic substitution cipher with a keyword. Standard, Beaufort, and Autokey variants supported.</p>
</header>

<div class="controls">
<div class="field">
<label for="key">Keyword</label>
<input type="text" id="key" value="LEMON" autocomplete="off">
</div>
<div class="field">
<label for="variant">Variant</label>
<select id="variant">
<option value="vigenere">Vigenère (standard)</option>
<option value="beaufort">Beaufort</option>
<option value="autokey">Autokey</option>
</select>
</div>
<div class="field">
<label>&nbsp;</label>
<button class="btn btn-secondary btn-sm" id="randomKey">Random Key</button>
</div>
</div>

<div class="options">
<label><input type="checkbox" id="preserveCase" checked> Preserve case</label>
<label><input type="checkbox" id="preserveNonAlpha" checked> Preserve punctuation &amp; spaces</label>
</div>

<div class="editor">
<div class="panel">
<div class="panel-header">
<span class="panel-label">Plaintext</span>
<div class="panel-actions">
<button class="btn-sm btn btn-secondary" id="sampleBtn">Sample</button>
<button class="btn-sm btn btn-secondary" id="clearBtn">Clear</button>
</div>
</div>
<textarea id="plain" placeholder="ATTACK AT DAWN..."></textarea>
</div>
<div class="panel">
<div class="panel-header">
<span class="panel-label">Ciphertext</span>
<div class="panel-actions">
<button class="btn-sm btn btn-secondary" id="copyBtn">Copy</button>
<button class="btn-sm btn btn-secondary" id="swapBtn">⇄ Swap</button>
</div>
</div>
<textarea id="cipher" placeholder="LXFOPV EF RNHR..."></textarea>
</div>
</div>

<div class="action-row">
<button class="btn" id="encodeBtn">Encode →</button>
<button class="btn btn-secondary" id="decodeBtn">← Decode</button>
</div>

<div class="stats">
<div class="stat"><div class="stat-label">Plain length</div><div class="stat-value" id="plainLen">0</div></div>
<div class="stat"><div class="stat-label">Cipher length</div><div class="stat-value" id="cipherLen">0</div></div>
<div class="stat"><div class="stat-label">Key length</div><div class="stat-value" id="keyLen">5</div></div>
<div class="stat"><div class="stat-label">Effective key</div><div class="stat-value" id="effKey">LEMON</div></div>
</div>

<div class="tabula">
<button class="tabula-toggle" id="tabulaToggle">
Tabula Recta (Vigenère Square)
<span id="tabulaArrow">▼</span>
</button>
<div class="tabula-body" id="tabulaBody"></div>
</div>

<footer style="margin-top:32px; text-align:center; font-size:.82rem; color:var(--muted);">
Built with ☕ by Steven Li · No data leaves your browser
</footer>
</div>

<script>
const $ = id => document.getElementById(id);
const plain = $('plain'), cipher = $('cipher'), keyEl = $('key'), variant = $('variant');

function cleanKey(k) {
  return (k || '').toUpperCase().replace(/[^A-Z]/g, '');
}

function process(text, rawKey, mode, variantType) {
  const key = cleanKey(rawKey);
  if (!key) return '';
  const preserveCase = $('preserveCase').checked;
  const preserveNonAlpha = $('preserveNonAlpha').checked;
  let out = '';
  let ki = 0;
  const autoStream = variantType === 'autokey'
    ? (mode === 'encode' ? key + text.toUpperCase().replace(/[^A-Z]/g, '') : key)
    : null;
  let autoBuf = autoStream;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const upper = ch.toUpperCase();
    const isAlpha = upper >= 'A' && upper <= 'Z';
    if (!isAlpha) {
      if (preserveNonAlpha) out += ch;
      continue;
    }
    let kch;
    if (variantType === 'autokey') {
      kch = autoBuf.charCodeAt(ki) - 65;
    } else {
      kch = key.charCodeAt(ki % key.length) - 65;
    }
    const p = upper.charCodeAt(0) - 65;
    let c;
    if (variantType === 'beaufort') {
      // Beaufort: C = (K - P) mod 26 (involutive — same op for encode/decode)
      c = (kch - p + 26) % 26;
    } else if (mode === 'encode') {
      c = (p + kch) % 26;
    } else {
      c = (p - kch + 26) % 26;
    }
    let outCh = String.fromCharCode(c + 65);
    if (preserveCase && ch !== upper) outCh = outCh.toLowerCase();
    out += outCh;

    if (variantType === 'autokey' && mode === 'decode') {
      // Decoded plaintext char extends the key stream
      autoBuf += outCh.toUpperCase();
    }
    ki++;
  }
  return out;
}

function encode() {
  cipher.value = process(plain.value, keyEl.value, 'encode', variant.value);
  updateStats();
}
function decode() {
  plain.value = process(cipher.value, keyEl.value, 'decode', variant.value);
  updateStats();
}

function updateStats() {
  $('plainLen').textContent = plain.value.length;
  $('cipherLen').textContent = cipher.value.length;
  const k = cleanKey(keyEl.value);
  $('keyLen').textContent = k.length;
  $('effKey').textContent = k || '—';
}

plain.addEventListener('input', () => { encode(); });
cipher.addEventListener('input', updateStats);
keyEl.addEventListener('input', () => { encode(); });
variant.addEventListener('change', () => { encode(); });
$('preserveCase').addEventListener('change', encode);
$('preserveNonAlpha').addEventListener('change', encode);

$('encodeBtn').addEventListener('click', encode);
$('decodeBtn').addEventListener('click', decode);

$('sampleBtn').addEventListener('click', () => {
  plain.value = 'ATTACK AT DAWN';
  keyEl.value = 'LEMON';
  encode();
});
$('clearBtn').addEventListener('click', () => {
  plain.value = ''; cipher.value = ''; updateStats();
});
$('copyBtn').addEventListener('click', async () => {
  await navigator.clipboard.writeText(cipher.value);
  const b = $('copyBtn'); b.textContent = 'Copied!';
  setTimeout(() => b.textContent = 'Copy', 1200);
});
$('swapBtn').addEventListener('click', () => {
  const t = plain.value; plain.value = cipher.value; cipher.value = t; updateStats();
});
$('randomKey').addEventListener('click', () => {
  const len = 4 + Math.floor(Math.random() * 5);
  let k = '';
  for (let i = 0; i < len; i++) k += String.fromCharCode(65 + Math.floor(Math.random() * 26));
  keyEl.value = k;
  encode();
});

// Tabula Recta
$('tabulaToggle').addEventListener('click', () => {
  const body = $('tabulaBody');
  body.classList.toggle('open');
  $('tabulaArrow').textContent = body.classList.contains('open') ? '▲' : '▼';
  if (body.classList.contains('open') && !body.dataset.built) buildTabula();
});

function buildTabula() {
  const body = $('tabulaBody');
  const k = cleanKey(keyEl.value);
  let html = '<table><tr><th></th>';
  for (let i = 0; i < 26; i++) html += `<th>${String.fromCharCode(65 + i)}</th>`;
  html += '</tr>';
  for (let r = 0; r < 26; r++) {
    const isKeyRow = k && k.includes(String.fromCharCode(65 + r));
    html += `<tr><th>${String.fromCharCode(65 + r)}</th>`;
    for (let c = 0; c < 26; c++) {
      const ch = String.fromCharCode(65 + ((r + c) % 26));
      html += `<td class="${isKeyRow ? 'hl' : ''}">${ch}</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';
  body.innerHTML = html;
  body.dataset.built = '1';
}

// init
encode();
</script>
</body>
</html>
