<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Escape/Unescape Tool — Escape strings for JS, Python, SQL, JSON, HTML, Shell & more</title>
    <meta name="description" content="Free online string escape and unescape tool. Escape strings for JavaScript, Python, SQL, JSON, HTML, Shell, CSV, XML, and Regex. Instant conversion in your browser.">
    <meta name="keywords" content="string escape, unescape, javascript escape, python escape, sql escape, json escape, html escape, shell escape, regex escape, csv escape, xml escape, developer tool, online tool">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/strescape.html">
    <meta property="og:title" content="String Escape/Unescape Tool">
    <meta property="og:description" content="Escape and unescape strings for 10+ languages and formats. Free, instant, runs entirely in your browser.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/strescape.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="String Escape/Unescape Tool">
    <meta name="twitter:description" content="Escape and unescape strings for JS, Python, SQL, JSON, HTML, Shell, CSV, XML, Regex and more.">
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>String Escape / Unescape</h1>
            <p>Escape or unescape strings for 10+ languages and formats — entirely in-browser</p>
        </header>

        <div class="lang-grid" id="langGrid"></div>

        <div class="direction-row">
            <button class="dir-btn active" id="btnEscape" onclick="setDirection('escape')">Escape →</button>
            <button class="swap-btn" onclick="swapText()" title="Swap input/output">⇄</button>
            <button class="dir-btn" id="btnUnescape" onclick="setDirection('unescape')">← Unescape</button>
        </div>

        <div class="panels">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-label" id="inputLabel">Input</span>
                    <button class="clear-btn" onclick="clearInput()">Clear</button>
                </div>
                <textarea id="input" placeholder="Paste or type your string here..." spellcheck="false"></textarea>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-label" id="outputLabel">Output</span>
                    <button class="copy-btn" onclick="copyOutput()">Copy</button>
                </div>
                <textarea id="output" readonly placeholder="Result will appear here..." spellcheck="false"></textarea>
            </div>
        </div>

        <div class="info-bar">
            <span>Input: <span class="chars" id="inChars">0</span> chars</span>
            <span>Output: <span class="chars" id="outChars">0</span> chars</span>
            <span>Changed: <span class="escaped-count" id="escCount">0</span> chars</span>
        </div>

        <div class="cheatsheet" id="cheatsheet"></div>

        <footer>
            <p>Built by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a> &middot; No data leaves your browser</p>
            <a class="coffee-btn" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const languages = [
        { id: 'javascript', label: 'JavaScript' },
        { id: 'json', label: 'JSON' },
        { id: 'html', label: 'HTML' },
        { id: 'xml', label: 'XML' },
        { id: 'python', label: 'Python' },
        { id: 'sql', label: 'SQL' },
        { id: 'shell', label: 'Shell/Bash' },
        { id: 'csv', label: 'CSV' },
        { id: 'regex', label: 'Regex' },
        { id: 'url', label: 'URL' },
        { id: 'unicode', label: 'Unicode (\\u)' },
        { id: 'cstring', label: 'C/C++' },
    ];

    const cheatsheets = {
        javascript: [
            ['"', '\\"'], ["'", "\\'"], ['\\', '\\\\'], ['\n', '\\n'],
            ['\r', '\\r'], ['\t', '\\t'], ['\0', '\\0'], ['`', '\\`'],
        ],
        json: [
            ['"', '\\"'], ['\\', '\\\\'], ['/', '\\/'], ['\n', '\\n'],
            ['\r', '\\r'], ['\t', '\\t'], ['\b', '\\b'], ['\f', '\\f'],
        ],
        html: [
            ['&', '&amp;'], ['<', '&lt;'], ['>', '&gt;'],
            ['"', '&quot;'], ["'", '&#39;'],
        ],
        xml: [
            ['&', '&amp;'], ['<', '&lt;'], ['>', '&gt;'],
            ['"', '&quot;'], ["'", '&apos;'],
        ],
        python: [
            ['"', '\\"'], ["'", "\\'"], ['\\', '\\\\'], ['\n', '\\n'],
            ['\r', '\\r'], ['\t', '\\t'], ['\0', '\\0'],
        ],
        sql: [
            ["'", "''"], ['\\', '\\\\'], ['%', '\\%'], ['_', '\\_'],
        ],
        shell: [
            ["'", "'\\''"], ['"', '\\"'], ['\\', '\\\\'], ['$', '\\$'],
            ['`', '\\`'], ['!', '\\!'], ['*', '\\*'], ['?', '\\?'],
        ],
        csv: [
            ['"', '""'], [',', '(wrap in quotes)'], ['\n', '(wrap in quotes)'],
        ],
        regex: [
            ['.', '\\.'], ['*', '\\*'], ['+', '\\+'], ['?', '\\?'],
            ['(', '\\('], [')', '\\)'], ['[', '\\['], [']', '\\]'],
            ['{', '\\{'], ['}', '\\}'], ['^', '\\^'], ['$', '\\$'],
            ['|', '\\|'], ['\\', '\\\\'],
        ],
        url: [
            [' ', '%20'], ['&', '%26'], ['=', '%3D'], ['?', '%3F'],
            ['#', '%23'], ['/', '%2F'], ['+', '%2B'], ['@', '%40'],
        ],
        unicode: [
            ['A', '\\u0041'], ['€', '\\u20AC'], ['中', '\\u4E2D'], ['😀', '\\uD83D\\uDE00'],
        ],
        cstring: [
            ['"', '\\"'], ['\\', '\\\\'], ['\n', '\\n'], ['\r', '\\r'],
            ['\t', '\\t'], ['\0', '\\0'], ['\a', '\\a'], ['\b', '\\b'],
        ],
    };

    // Escape/unescape implementations
    const escapers = {
        javascript(s) {
            return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"')
                    .replace(/`/g,'\\`').replace(/\n/g,'\\n').replace(/\r/g,'\\r')
                    .replace(/\t/g,'\\t').replace(/\0/g,'\\0');
        },
        json(s) {
            return JSON.stringify(s).slice(1, -1);
        },
        html(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        },
        xml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&apos;');
        },
        python(s) {
            return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"')
                    .replace(/\n/g,'\\n').replace(/\r/g,'\\r').replace(/\t/g,'\\t')
                    .replace(/\0/g,'\\0');
        },
        sql(s) {
            return s.replace(/'/g,"''").replace(/\\/g,'\\\\');
        },
        shell(s) {
            return s.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\$/g,'\\$')
                    .replace(/`/g,'\\`').replace(/!/g,'\\!');
        },
        csv(s) {
            if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
            return s;
        },
        regex(s) {
            return s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        },
        url(s) {
            return encodeURIComponent(s);
        },
        unicode(s) {
            let out = '';
            for (let i = 0; i < s.length; i++) {
                const code = s.charCodeAt(i);
                if (code > 127) {
                    out += '\\u' + code.toString(16).padStart(4,'0').toUpperCase();
                } else {
                    out += s[i];
                }
            }
            return out;
        },
        cstring(s) {
            return s.replace(/\\/g,'\\\\').replace(/"/g,'\\"')
                    .replace(/\n/g,'\\n').replace(/\r/g,'\\r')
                    .replace(/\t/g,'\\t').replace(/\0/g,'\\0')
                    .replace(/[\x07]/g,'\\a').replace(/[\x08]/g,'\\b');
        },
    };

    const unescapers = {
        javascript(s) {
            try {
                return s.replace(/\\(['"\\`nrt0])/g, (_, c) => {
                    const m = {"'":"'",'"':'"','\\':'\\','`':'`','n':'\n','r':'\r','t':'\t','0':'\0'};
                    return m[c] || c;
                });
            } catch { return s; }
        },
        json(s) {
            try { return JSON.parse('"' + s + '"'); } catch { return s; }
        },
        html(s) {
            const el = document.createElement('textarea');
            el.innerHTML = s;
            return el.value;
        },
        xml(s) {
            return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
                    .replace(/&quot;/g,'"').replace(/&apos;/g,"'");
        },
        python(s) {
            return s.replace(/\\(['"\\nrt0])/g, (_, c) => {
                const m = {"'":"'",'"':'"','\\':'\\','n':'\n','r':'\r','t':'\t','0':'\0'};
                return m[c] || c;
            });
        },
        sql(s) {
            return s.replace(/''/g,"'").replace(/\\\\/g,'\\');
        },
        shell(s) {
            return s.replace(/\\(['"\\$`!])/g, '$1');
        },
        csv(s) {
            if (s.startsWith('"') && s.endsWith('"')) {
                return s.slice(1,-1).replace(/""/g,'"');
            }
            return s;
        },
        regex(s) {
            return s.replace(/\\([.\-\/\\^$*+?.()|[\]{}])/g, '$1');
        },
        url(s) {
            try { return decodeURIComponent(s); } catch { return s; }
        },
        unicode(s) {
            return s.replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) =>
                String.fromCharCode(parseInt(hex, 16))
            );
        },
        cstring(s) {
            return s.replace(/\\(['"\\nrtab0])/g, (_, c) => {
                const m = {"'":"'",'"':'"','\\':'\\','n':'\n','r':'\r','t':'\t','a':'\x07','b':'\x08','0':'\0'};
                return m[c] || c;
            });
        },
    };

    let currentLang = 'javascript';
    let direction = 'escape';

    // Build language buttons
    const grid = document.getElementById('langGrid');
    languages.forEach(lang => {
        const btn = document.createElement('button');
        btn.className = 'lang-btn' + (lang.id === currentLang ? ' active' : '');
        btn.textContent = lang.label;
        btn.dataset.id = lang.id;
        btn.onclick = () => selectLang(lang.id);
        grid.appendChild(btn);
    });

    function selectLang(id) {
        currentLang = id;
        grid.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));
        renderCheatsheet();
        convert();
    }

    function setDirection(dir) {
        direction = dir;
        document.getElementById('btnEscape').classList.toggle('active', dir === 'escape');
        document.getElementById('btnUnescape').classList.toggle('active', dir === 'unescape');
        convert();
    }

    function swapText() {
        const inp = document.getElementById('input');
        const out = document.getElementById('output');
        const tmp = inp.value;
        inp.value = out.value;
        direction = direction === 'escape' ? 'unescape' : 'escape';
        setDirection(direction);
    }

    function convert() {
        const input = document.getElementById('input').value;
        const output = document.getElementById('output');
        let result = '';
        try {
            if (direction === 'escape') {
                result = escapers[currentLang](input);
            } else {
                result = unescapers[currentLang](input);
            }
        } catch (e) {
            result = '⚠ Error: ' + e.message;
        }
        output.value = result;
        document.getElementById('inChars').textContent = input.length;
        document.getElementById('outChars').textContent = result.length;
        const diff = Math.abs(result.length - input.length);
        document.getElementById('escCount').textContent = diff;
    }

    function clearInput() {
        document.getElementById('input').value = '';
        convert();
    }

    function copyOutput() {
        const text = document.getElementById('output').value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1500);
    }

    function renderCheatsheet() {
        const sheet = cheatsheets[currentLang] || [];
        const el = document.getElementById('cheatsheet');
        if (!sheet.length) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        const langLabel = languages.find(l => l.id === currentLang)?.label || currentLang;
        el.innerHTML = `<h3>${langLabel} Escape Reference</h3><div class="cheatsheet-grid">${
            sheet.map(([c, e]) =>
                `<div class="cheatsheet-item"><span class="char">${escHTML(c)}</span><span class="esc">${escHTML(e)}</span></div>`
            ).join('')
        }</div>`;
    }

    function escHTML(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Live conversion
    document.getElementById('input').addEventListener('input', convert);

    // Init
    renderCheatsheet();
    convert();
    </script>
</body>
</html>
