    <meta name="description" content="Convert text to ASCII art banners instantly. Multiple font styles, live preview, one-click copy. Perfect for READMEs, code comments, and terminal banners.">
    <meta name="keywords" content="ascii art generator, text to ascii, figlet, banner generator, ascii text, code comments, readme banner">

    <meta property="og:description" content="Convert text to stunning ASCII art banners. Multiple fonts, live preview, instant copy.">

    <meta name="twitter:card" content="summary">

    <meta name="twitter:description" content="Convert text to ASCII art banners instantly. Multiple fonts, live preview, one-click copy.">

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
        .container{max-width:960px;margin:0 auto;padding:20px;width:100%;flex:1}
        h1{text-align:center;font-size:1.8rem;margin-bottom:6px;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .subtitle{text-align:center;color:#8b949e;font-size:.9rem;margin-bottom:24px}
        .controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
        .controls label{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px;font-size:.85rem;color:#8b949e}
        .controls input,.controls select{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:10px 12px;border-radius:8px;font-size:.95rem;outline:none;transition:border-color .2s}
        .controls input:focus,.controls select:focus{border-color:#58a6ff}
        .controls input[type=text]{flex:2;min-width:200px}
        .output-wrap{position:relative;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;min-height:160px;margin-bottom:16px}
        .output-wrap pre{font-family:'Courier New',Consolas,monospace;font-size:14px;line-height:1.2;color:#7ee787;overflow-x:auto;white-space:pre;tab-size:4;min-height:80px}
        .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
        .btn{padding:10px 20px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .2s}
        .btn:hover{background:#30363d;border-color:#58a6ff}
        .btn.primary{background:#238636;border-color:#2ea043;color:#fff}
        .btn.primary:hover{background:#2ea043}
        .copied{position:absolute;top:8px;right:8px;background:#238636;color:#fff;padding:4px 12px;border-radius:6px;font-size:.8rem;opacity:0;transition:opacity .3s}
        .copied.show{opacity:1}
        .char-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px;margin-bottom:16px}
        .char-opt{background:#161b22;border:1px solid #30363d;padding:6px;text-align:center;border-radius:6px;cursor:pointer;font-family:monospace;font-size:1.1rem;transition:all .2s}
        .char-opt.active{border-color:#58a6ff;background:#1f2937}
        .char-opt:hover{border-color:#58a6ff}
        .options-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
        .options-row label{font-size:.85rem;color:#8b949e;display:flex;align-items:center;gap:6px}
        .options-row input[type=number]{width:60px;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:6px 8px;border-radius:6px;font-size:.9rem}
        footer{text-align:center;padding:20px;color:#8b949e;font-size:.8rem;border-top:1px solid #21262d}
        footer a{color:#58a6ff;text-decoration:none}
        footer a:hover{text-decoration:underline}
        .coffee{display:inline-flex;align-items:center;gap:6px;background:#ffdd00;color:#000;padding:8px 16px;border-radius:8px;text-decoration:none;font-weight:600;font-size:.85rem;margin-top:8px;transition:transform .2s}
        .coffee:hover{transform:scale(1.05);text-decoration:none}
        @media(max-width:600px){
            h1{font-size:1.4rem}
            .controls{flex-direction:column}
            .output-wrap pre{font-size:10px}
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ ASCII Art Generator</h1>
        <p class="subtitle">Convert text to ASCII art banners — for READMEs, comments & terminals</p>

        <div class="controls">
            <label>Text
                <input type="text" id="inputText" value="Hello" placeholder="Type something..." maxlength="30">
            </label>
            <label>Font
                <select id="fontSelect">
                    <option value="standard">Standard</option>
                    <option value="big">Big</option>
                    <option value="block">Block</option>
                    <option value="mini">Mini</option>
                    <option value="slant">Slant</option>
                    <option value="shadow">Shadow</option>
                    <option value="banner">Banner</option>
                    <option value="bubble">Bubble</option>
                </select>
            </label>
        </div>

        <div class="options-row">
            <label>Fill char:
                <span id="charDisplay" style="font-family:monospace;font-size:1.1rem;color:#7ee787">█</span>
            </label>
        </div>
        <div class="char-select" id="charPicker">
            <div class="char-opt active" data-char="█">█</div>
            <div class="char-opt" data-char="#">#</div>
            <div class="char-opt" data-char="@">@</div>
            <div class="char-opt" data-char="*">*</div>
            <div class="char-opt" data-char="▓">▓</div>
            <div class="char-opt" data-char="░">░</div>
            <div class="char-opt" data-char="●">●</div>
            <div class="char-opt" data-char="◆">◆</div>
            <div class="char-opt" data-char="■">■</div>
            <div class="char-opt" data-char="▪">▪</div>
            <div class="char-opt" data-char="○">○</div>
            <div class="char-opt" data-char="$">$</div>
        </div>

        <div class="output-wrap">
            <span class="copied" id="copiedBadge">Copied!</span>
            <pre id="output"></pre>
        </div>

        <div class="btn-row">
            <button class="btn primary" onclick="copyOutput()">📋 Copy to Clipboard</button>
            <button class="btn" onclick="copyAsComment()">// Copy as Comment</button>
            <button class="btn" onclick="downloadTxt()">💾 Download .txt</button>
        </div>
    </div>

    <footer>
        <p>ASCII Art Generator — A free tool by Steven Li</p>
        <a class="coffee" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy me a coffee</a>
    </footer>

// Add digits/punctuation fallback to fonts that lack them
for (const [fname, fdata] of Object.entries(FONTS)) {
    if (fname === 'standard') continue;
    const std = FONTS.standard;
    for (const ch in std.chars) {
        if (!fdata.chars[ch]) {
            // Scale standard chars to match font height
            const src = std.chars[ch];
            const target = [];
            const ratio = fdata.height / std.height;
            for (let i = 0; i < fdata.height; i++) {
                const si = Math.min(Math.floor(i / ratio), src.length - 1);
                target.push(src[si]);
            }
            fdata.chars[ch] = target;
        }
    }
}

let fillChar = '█';

function render() {
    const text = document.getElementById('inputText').value.toUpperCase();
    const fontName = document.getElementById('fontSelect').value;
    const font = FONTS[fontName];
    if (!font || !text) { document.getElementById('output').textContent = ''; return; }

    const lines = [];
    for (let row = 0; row < font.height; row++) {
        let line = '';
        for (const ch of text) {
            const glyph = font.chars[ch] || font.chars['?'] || font.chars[' '];
            if (glyph && glyph[row] !== undefined) {
                line += glyph[row] + ' ';
            }
        }
        lines.push(line.replace(/\s+$/, ''));
    }
    // Replace # with fill char
    const result = lines.map(l => l.replace(/#/g, fillChar)).join('\n');
    document.getElementById('output').textContent = result;
}

function copyOutput() {
    const text = document.getElementById('output').textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
        const badge = document.getElementById('copiedBadge');
        badge.classList.add('show');
        setTimeout(() => badge.classList.remove('show'), 1500);
    });
}

function copyAsComment() {
    const text = document.getElementById('output').textContent;
    if (!text) return;
    const commented = text.split('\n').map(l => '// ' + l).join('\n');
    navigator.clipboard.writeText(commented).then(() => {
        const badge = document.getElementById('copiedBadge');
        badge.textContent = 'Copied as comment!';
        badge.classList.add('show');
        setTimeout(() => { badge.classList.remove('show'); badge.textContent = 'Copied!'; }, 1500);
    });
}

function downloadTxt() {
    const text = document.getElementById('output').textContent;
    if (!text) return;
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ascii-art.txt';
    a.click();
    URL.revokeObjectURL(a.href);
}

// Char picker
document.getElementById('charPicker').addEventListener('click', e => {
    const opt = e.target.closest('.char-opt');
    if (!opt) return;
    document.querySelectorAll('.char-opt').forEach(el => el.classList.remove('active'));
    opt.classList.add('active');
    fillChar = opt.dataset.char;
    document.getElementById('charDisplay').textContent = fillChar;
    render();
});

document.getElementById('inputText').addEventListener('input', render);
document.getElementById('fontSelect').addEventListener('change', render);

render();
</script>
