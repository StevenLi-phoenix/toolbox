<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
header{background:#12121a;border-bottom:1px solid #1e1e2e;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
h1{font-size:1.3rem;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.coffee{color:#ffdd57;text-decoration:none;font-size:.85rem;padding:.4rem .8rem;border:1px solid #ffdd5744;border-radius:6px;transition:.2s}
.coffee:hover{background:#ffdd5722;border-color:#ffdd57}
main{flex:1;padding:1.5rem;max-width:1100px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:1.2rem}
.drop-zone{border:2px dashed #333;border-radius:12px;padding:2.5rem 1rem;text-align:center;cursor:pointer;transition:.3s;background:#111118}
.drop-zone:hover,.drop-zone.drag{border-color:#a78bfa;background:#14141f}
.drop-zone p{color:#888;margin-bottom:.5rem}
.drop-zone .hint{font-size:.8rem;color:#555}
.drop-zone input{display:none}
.controls{display:flex;gap:.8rem;flex-wrap:wrap;align-items:center}
.controls button{background:#1e1e2e;border:1px solid #2a2a3a;color:#e0e0e0;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;transition:.2s}
.controls button:hover{background:#2a2a3a;border-color:#a78bfa}
.controls button:disabled{opacity:.4;cursor:not-allowed}
.controls button.active{background:#a78bfa33;border-color:#a78bfa;color:#a78bfa}
.controls select,.controls input[type=range]{background:#1e1e2e;border:1px solid #2a2a3a;color:#e0e0e0;padding:.4rem .6rem;border-radius:6px;font-size:.85rem}
.controls input[type=range]{width:100px;accent-color:#a78bfa}
.controls label{font-size:.8rem;color:#888;display:flex;align-items:center;gap:.3rem}
.canvas-wrap{position:relative;background:#0d0d14;border:1px solid #1e1e2e;border-radius:12px;overflow:hidden}
canvas{width:100%;display:block}
.audio-info{display:flex;gap:1rem;flex-wrap:wrap;font-size:.8rem;color:#888;padding:.5rem 0}
.audio-info span{background:#1a1a25;padding:.3rem .6rem;border-radius:4px}
.viz-tabs{display:flex;gap:.5rem}
.viz-tabs button{background:none;border:1px solid #2a2a3a;color:#888;padding:.4rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem;transition:.2s}
.viz-tabs button.active{color:#a78bfa;border-color:#a78bfa;background:#a78bfa11}
.color-presets{display:flex;gap:.4rem;align-items:center}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.2s}
.color-dot.active{border-color:#fff}
footer{text-align:center;padding:1rem;font-size:.75rem;color:#555;border-top:1px solid #1e1e2e}
footer a{color:#888;text-decoration:none}
@media(max-width:600px){
header{padding:.8rem 1rem}
h1{font-size:1.1rem}
main{padding:1rem}
.controls{gap:.5rem}
.controls button{padding:.4rem .7rem;font-size:.8rem}
}

</head>
<body>
<header>
<h1>🎵 Audio Waveform Visualizer</h1>
<a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener" class="coffee">☕ Buy Me a Coffee</a>
</header>
<main>
<div class="drop-zone" id="dropZone">
<p>Drop an audio file here or click to browse</p>
<p class="hint">Supports MP3, WAV, OGG, FLAC, AAC, M4A</p>
<input type="file" id="fileInput" accept="audio/*">
</div>

<div class="audio-info" id="audioInfo" style="display:none"></div>

<div class="controls">
<button id="playBtn" disabled>▶ Play</button>
<button id="stopBtn" disabled>⏹ Stop</button>
<label>Vol <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.8"></label>
<div class="viz-tabs">
<button class="active" data-viz="waveform">Waveform</button>
<button data-viz="frequency">Frequency</button>
<button data-viz="both">Both</button>
</div>
<div class="color-presets">
<label style="margin-right:.2rem">Theme:</label>
<div class="color-dot active" data-theme="purple" style="background:linear-gradient(135deg,#a78bfa,#60a5fa)"></div>
<div class="color-dot" data-theme="fire" style="background:linear-gradient(135deg,#f97316,#ef4444)"></div>
<div class="color-dot" data-theme="matrix" style="background:linear-gradient(135deg,#22c55e,#10b981)"></div>
<div class="color-dot" data-theme="ocean" style="background:linear-gradient(135deg,#06b6d4,#3b82f6)"></div>
<div class="color-dot" data-theme="sunset" style="background:linear-gradient(135deg,#ec4899,#f59e0b)"></div>
</div>
<button id="exportBtn" disabled>📷 Export PNG</button>
</div>

<div class="canvas-wrap">
<canvas id="vizCanvas" height="300"></canvas>
</div>

<div class="canvas-wrap" id="staticWrap" style="display:none">
<canvas id="staticCanvas" height="200"></canvas>
<div style="padding:.5rem .8rem;font-size:.8rem;color:#666">Full waveform overview (click to seek)</div>
</div>
</main>

<footer>
<a href="https://stevenli-phoenix.github.io/toolbox/">DevToolbox</a> · Audio Waveform Visualizer ·
<a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">Support this project ☕</a>
</footer>

<script>
const $ = s => document.querySelector(s);
const dropZone = $('#dropZone'), fileInput = $('#fileInput');
const vizCanvas = $('#vizCanvas'), ctx = vizCanvas.getContext('2d');
const staticCanvas = $('#staticCanvas'), sCtx = staticCanvas.getContext('2d');
const playBtn = $('#playBtn'), stopBtn = $('#stopBtn'), exportBtn = $('#exportBtn');
const volSlider = $('#volSlider'), audioInfo = $('#audioInfo');

let audioCtx, analyser, gainNode, source, audioBuffer, isPlaying = false;
let vizMode = 'waveform', animId;
let startTime = 0, pauseOffset = 0;

const themes = {
  purple: { primary: '#a78bfa', secondary: '#60a5fa', glow: 'rgba(167,139,250,0.15)' },
  fire: { primary: '#f97316', secondary: '#ef4444', glow: 'rgba(249,115,22,0.15)' },
  matrix: { primary: '#22c55e', secondary: '#10b981', glow: 'rgba(34,197,94,0.15)' },
  ocean: { primary: '#06b6d4', secondary: '#3b82f6', glow: 'rgba(6,182,212,0.15)' },
  sunset: { primary: '#ec4899', secondary: '#f59e0b', glow: 'rgba(236,72,153,0.15)' }
};
let currentTheme = 'purple';

function resizeCanvas(c) {
  const dpr = window.devicePixelRatio || 1;
  const rect = c.getBoundingClientRect();
  c.width = rect.width * dpr;
  c.height = rect.height * dpr;
  c.getContext('2d').scale(dpr, dpr);
  return { w: rect.width, h: rect.height };
}

// Drop zone
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(file) {
  if (!file) return;
  stopAudio();
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
    analyser.connect(gainNode);
  }
  try {
    const buf = await file.arrayBuffer();
    audioBuffer = await audioCtx.decodeAudioData(buf);
    showInfo(file, audioBuffer);
    drawStaticWaveform();
    playBtn.disabled = false; stopBtn.disabled = false; exportBtn.disabled = false;
    dropZone.querySelector('p').textContent = `✅ ${file.name}`;
  } catch (e) {
    dropZone.querySelector('p').textContent = '❌ Could not decode audio file';
    console.error(e);
  }
}

function showInfo(file, buf) {
  const dur = buf.duration;
  const mins = Math.floor(dur / 60);
  const secs = Math.floor(dur % 60);
  audioInfo.style.display = 'flex';
  audioInfo.innerHTML = `
    <span>📄 ${file.name}</span>
    <span>⏱ ${mins}:${secs.toString().padStart(2,'0')}</span>
    <span>🎚 ${buf.numberOfChannels}ch</span>
    <span>📊 ${buf.sampleRate}Hz</span>
    <span>💾 ${(file.size/1024).toFixed(1)}KB</span>
  `;
}

function drawStaticWaveform() {
  $('#staticWrap').style.display = 'block';
  const { w, h } = resizeCanvas(staticCanvas);
  const data = audioBuffer.getChannelData(0);
  const step = Math.ceil(data.length / w);
  const t = themes[currentTheme];

  sCtx.fillStyle = '#0d0d14';
  sCtx.fillRect(0, 0, w, h);

  const grad = sCtx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, t.primary);
  grad.addColorStop(1, t.secondary);
  sCtx.strokeStyle = grad;
  sCtx.lineWidth = 1;

  sCtx.beginPath();
  for (let i = 0; i < w; i++) {
    let min = 1, max = -1;
    for (let j = 0; j < step; j++) {
      const s = data[i * step + j] || 0;
      if (s < min) min = s;
      if (s > max) max = s;
    }
    const yMin = ((1 + min) / 2) * h;
    const yMax = ((1 + max) / 2) * h;
    sCtx.moveTo(i, yMin);
    sCtx.lineTo(i, yMax);
  }
  sCtx.stroke();

  // Seek on click
  staticCanvas.onclick = (e) => {
    if (!audioBuffer) return;
    const rect = staticCanvas.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    const seekTo = ratio * audioBuffer.duration;
    if (isPlaying) {
      stopAudio();
      pauseOffset = seekTo;
      startAudio();
    } else {
      pauseOffset = seekTo;
    }
  };
}

function startAudio() {
  if (isPlaying) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.onended = () => { if (isPlaying) { isPlaying = false; playBtn.textContent = '▶ Play'; cancelAnimationFrame(animId); pauseOffset = 0; }};
  startTime = audioCtx.currentTime;
  source.start(0, pauseOffset);
  isPlaying = true;
  playBtn.textContent = '⏸ Pause';
  draw();
}

function stopAudio() {
  if (source) { try { source.stop(); } catch(e){} source.disconnect(); source = null; }
  isPlaying = false;
  playBtn.textContent = '▶ Play';
  cancelAnimationFrame(animId);
}

playBtn.addEventListener('click', () => {
  if (!audioBuffer) return;
  if (isPlaying) {
    pauseOffset += audioCtx.currentTime - startTime;
    stopAudio();
  } else {
    startAudio();
  }
});

stopBtn.addEventListener('click', () => { stopAudio(); pauseOffset = 0; });
volSlider.addEventListener('input', () => { if (gainNode) gainNode.gain.value = parseFloat(volSlider.value); });

// Viz mode tabs
document.querySelectorAll('.viz-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.viz-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    vizMode = btn.dataset.viz;
  });
});

// Color themes
document.querySelectorAll('.color-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    currentTheme = dot.dataset.theme;
    if (audioBuffer) drawStaticWaveform();
  });
});

function draw() {
  animId = requestAnimationFrame(draw);
  const { w, h } = resizeCanvas(vizCanvas);
  const t = themes[currentTheme];
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0, 0, w, h);

  if (vizMode === 'waveform' || vizMode === 'both') drawWaveform(w, h, t, vizMode === 'both' ? h / 2 : h, 0);
  if (vizMode === 'frequency' || vizMode === 'both') drawFrequency(w, h, t, vizMode === 'both' ? h / 2 : h, vizMode === 'both' ? h / 2 : 0);

  // Progress overlay on static canvas
  if (audioBuffer && isPlaying) {
    const elapsed = pauseOffset + (audioCtx.currentTime - startTime);
    const ratio = elapsed / audioBuffer.duration;
    const sw = staticCanvas.getBoundingClientRect().width;
    const sh = staticCanvas.getBoundingClientRect().height;
    drawStaticWaveform();
    sCtx.fillStyle = 'rgba(167,139,250,0.15)';
    sCtx.fillRect(0, 0, ratio * sw, sh);
    sCtx.strokeStyle = t.primary;
    sCtx.lineWidth = 2;
    sCtx.beginPath();
    sCtx.moveTo(ratio * sw, 0);
    sCtx.lineTo(ratio * sw, sh);
    sCtx.stroke();
  }
}

function drawWaveform(w, h, t, height, yOffset) {
  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(data);

  // Glow
  ctx.shadowBlur = 12;
  ctx.shadowColor = t.primary;

  const grad = ctx.createLinearGradient(0, yOffset, w, yOffset);
  grad.addColorStop(0, t.primary);
  grad.addColorStop(1, t.secondary);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2;
  ctx.beginPath();

  const sliceW = w / bufLen;
  for (let i = 0; i < bufLen; i++) {
    const v = data[i] / 128.0;
    const y = yOffset + (v * height / 2);
    i === 0 ? ctx.moveTo(0, y) : ctx.lineTo(i * sliceW, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Center line
  ctx.strokeStyle = '#1e1e2e';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, yOffset + height / 2);
  ctx.lineTo(w, yOffset + height / 2);
  ctx.stroke();
}

function drawFrequency(w, h, t, height, yOffset) {
  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  analyser.getByteFrequencyData(data);

  const barCount = Math.min(bufLen, 128);
  const barW = w / barCount;
  const grad = ctx.createLinearGradient(0, yOffset + height, 0, yOffset);
  grad.addColorStop(0, t.primary + '44');
  grad.addColorStop(0.5, t.primary);
  grad.addColorStop(1, t.secondary);

  for (let i = 0; i < barCount; i++) {
    const idx = Math.floor(i * bufLen / barCount);
    const barH = (data[idx] / 255) * height;
    ctx.fillStyle = grad;
    ctx.fillRect(i * barW, yOffset + height - barH, barW - 1, barH);

    // Glow cap
    ctx.fillStyle = t.primary;
    ctx.fillRect(i * barW, yOffset + height - barH, barW - 1, 2);
  }
}

// Export
exportBtn.addEventListener('click', () => {
  if (!vizCanvas.width) return;
  // Combine both canvases
  const expCanvas = document.createElement('canvas');
  const ew = vizCanvas.width, eh = vizCanvas.height + (audioBuffer ? staticCanvas.height + 40 : 0);
  expCanvas.width = ew; expCanvas.height = eh;
  const eCtx = expCanvas.getContext('2d');
  eCtx.fillStyle = '#0a0a0f';
  eCtx.fillRect(0, 0, ew, eh);
  eCtx.drawImage(vizCanvas, 0, 0);
  if (audioBuffer) {
    eCtx.drawImage(staticCanvas, 0, vizCanvas.height + 20);
  }
  // Watermark
  eCtx.fillStyle = '#555';
  eCtx.font = '12px sans-serif';
  eCtx.fillText('DevToolbox — stevenli-phoenix.github.io/toolbox/', 10, eh - 10);

  const link = document.createElement('a');
  link.download = 'waveform-export.png';
  link.href = expCanvas.toDataURL('image/png');
  link.click();
});

// Responsive canvas resize
window.addEventListener('resize', () => { if (audioBuffer) drawStaticWaveform(); });

// Draw idle state
(function drawIdle() {
  const { w, h } = resizeCanvas(vizCanvas);
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#1e1e2e';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h / 2);
  ctx.lineTo(w, h / 2);
  ctx.stroke();
  ctx.fillStyle = '#333';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Load an audio file to start visualizing', w / 2, h / 2 - 10);
})();
</script>
</body>
</html>
