<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Watermark Tool — Add Text Watermarks Online | DevToolbox</title>
    <meta name="description" content="Free online image watermark tool. Add custom text watermarks to your images with adjustable font, size, color, opacity, position, and rotation. 100% client-side, no upload required.">
    <meta name="keywords" content="image watermark, add watermark, text watermark, photo watermark, watermark generator, online watermark tool, free watermark">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/watermark.html">
    <meta property="og:title" content="Image Watermark Tool — Add Text Watermarks Online">
    <meta property="og:description" content="Add custom text watermarks to images. Adjustable font, size, color, opacity, position, rotation. Free, private, runs in your browser.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/watermark.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Image Watermark Tool — Add Text Watermarks Online">
    <meta name="twitter:description" content="Add custom text watermarks to images entirely in your browser. Free and private.">
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
    <header>
        <h1>🖼️ Image <span>Watermark</span> Tool</h1>
        <a class="coffee" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
    </header>
    <main>
        <div class="drop-zone" id="dropZone">
            <div class="icon">📁</div>
            <p>Drop an image here or click to upload</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="controls">
            <div class="control-group">
                <label>Watermark Text</label>
                <input type="text" id="wmText" value="© My Watermark" placeholder="Enter watermark text">
            </div>
            <div class="control-group">
                <label>Font Family</label>
                <select id="wmFont">
                    <option value="Arial">Arial</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Impact">Impact</option>
                </select>
            </div>
            <div class="control-group">
                <label>Font Size</label>
                <div class="range-row">
                    <input type="range" id="wmSize" min="8" max="200" value="48">
                    <span class="val" id="wmSizeVal">48px</span>
                </div>
            </div>
            <div class="control-group">
                <label>Opacity</label>
                <div class="range-row">
                    <input type="range" id="wmOpacity" min="1" max="100" value="30">
                    <span class="val" id="wmOpacityVal">30%</span>
                </div>
            </div>
            <div class="control-group">
                <label>Rotation</label>
                <div class="range-row">
                    <input type="range" id="wmRotation" min="-180" max="180" value="-30">
                    <span class="val" id="wmRotationVal">-30°</span>
                </div>
            </div>
            <div class="control-group">
                <label>Color</label>
                <div class="color-row">
                    <input type="color" id="wmColor" value="#ffffff">
                    <span id="wmColorVal">#ffffff</span>
                </div>
            </div>
            <div class="control-group">
                <label>Position</label>
                <select id="wmPosition">
                    <option value="tile" selected>Tile (repeat)</option>
                    <option value="center">Center</option>
                    <option value="top-left">Top Left</option>
                    <option value="top-right">Top Right</option>
                    <option value="bottom-left">Bottom Left</option>
                    <option value="bottom-right">Bottom Right</option>
                </select>
                <div class="tile-check">
                    <input type="checkbox" id="wmBold" checked>
                    <label for="wmBold">Bold</label>
                </div>
            </div>
            <div class="control-group">
                <label>Output Format</label>
                <select id="wmFormat">
                    <option value="png">PNG (lossless)</option>
                    <option value="jpeg">JPEG (smaller)</option>
                    <option value="webp">WebP (modern)</option>
                </select>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" id="downloadBtn" disabled>⬇ Download Watermarked Image</button>
            <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="canvas"></canvas>
        </div>
    </main>
    <footer>
        Image Watermark Tool — 100% client-side, your images never leave your browser. 
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">Support this project ☕</a>
    </footer>
    <script>
    (()=>{
        const dropZone=document.getElementById('dropZone'),
              fileInput=document.getElementById('fileInput'),
              canvas=document.getElementById('canvas'),
              ctx=canvas.getContext('2d'),
              canvasWrap=document.getElementById('canvasWrap'),
              downloadBtn=document.getElementById('downloadBtn'),
              resetBtn=document.getElementById('resetBtn');

        let img=null;

        const controls={
            text:document.getElementById('wmText'),
            font:document.getElementById('wmFont'),
            size:document.getElementById('wmSize'),
            opacity:document.getElementById('wmOpacity'),
            rotation:document.getElementById('wmRotation'),
            color:document.getElementById('wmColor'),
            position:document.getElementById('wmPosition'),
            bold:document.getElementById('wmBold'),
            format:document.getElementById('wmFormat')
        };

        // Drop zone
        dropZone.addEventListener('click',()=>fileInput.click());
        dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
        dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop',e=>{
            e.preventDefault();dropZone.classList.remove('dragover');
            if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change',e=>{if(e.target.files[0])loadImage(e.target.files[0])});

        function loadImage(file){
            if(!file.type.startsWith('image/'))return;
            const reader=new FileReader();
            reader.onload=e=>{
                const i=new Image();
                i.onload=()=>{img=i;render();canvasWrap.style.display='block';downloadBtn.disabled=false;dropZone.querySelector('p').textContent=file.name};
                i.src=e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function render(){
            if(!img)return;
            canvas.width=img.width;canvas.height=img.height;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(img,0,0);

            const text=controls.text.value||'Watermark';
            const size=+controls.size.value;
            const opacity=+controls.opacity.value/100;
            const rotation=+controls.rotation.value*Math.PI/180;
            const color=controls.color.value;
            const pos=controls.position.value;
            const bold=controls.bold.checked?'bold ':'';
            const font=controls.font.value;

            ctx.save();
            ctx.globalAlpha=opacity;
            ctx.fillStyle=color;
            ctx.font=`${bold}${size}px "${font}"`;
            ctx.textAlign='center';
            ctx.textBaseline='middle';

            if(pos==='tile'){
                const metrics=ctx.measureText(text);
                const tw=metrics.width+size*2;
                const th=size*3;
                for(let y=-canvas.height;y<canvas.height*2;y+=th){
                    for(let x=-canvas.width;x<canvas.width*2;x+=tw){
                        ctx.save();
                        ctx.translate(x,y);
                        ctx.rotate(rotation);
                        ctx.fillText(text,0,0);
                        ctx.restore();
                    }
                }
            }else{
                let x,y;
                const pad=size;
                switch(pos){
                    case'center':x=canvas.width/2;y=canvas.height/2;break;
                    case'top-left':x=pad;y=pad;ctx.textAlign='left';ctx.textBaseline='top';break;
                    case'top-right':x=canvas.width-pad;y=pad;ctx.textAlign='right';ctx.textBaseline='top';break;
                    case'bottom-left':x=pad;y=canvas.height-pad;ctx.textAlign='left';ctx.textBaseline='bottom';break;
                    case'bottom-right':x=canvas.width-pad;y=canvas.height-pad;ctx.textAlign='right';ctx.textBaseline='bottom';break;
                    default:x=canvas.width/2;y=canvas.height/2;
                }
                ctx.translate(x,y);
                ctx.rotate(rotation);
                ctx.fillText(text,0,0);
            }
            ctx.restore();
        }

        // Range display updates
        const rangeMap={
            wmSize:['wmSizeVal','px'],
            wmOpacity:['wmOpacityVal','%'],
            wmRotation:['wmRotationVal','°']
        };
        Object.entries(rangeMap).forEach(([id,[valId,unit]])=>{
            document.getElementById(id).addEventListener('input',e=>{
                document.getElementById(valId).textContent=e.target.value+unit;render();
            });
        });
        controls.color.addEventListener('input',e=>{document.getElementById('wmColorVal').textContent=e.target.value;render()});
        [controls.text,controls.font,controls.position,controls.bold,controls.format].forEach(el=>el.addEventListener('input',render));
        controls.position.addEventListener('change',render);
        controls.bold.addEventListener('change',render);

        // Download
        downloadBtn.addEventListener('click',()=>{
            if(!img)return;
            const fmt=controls.format.value;
            const mime=fmt==='png'?'image/png':fmt==='jpeg'?'image/jpeg':'image/webp';
            const ext=fmt;
            const a=document.createElement('a');
            a.download=`watermarked.${ext}`;
            a.href=canvas.toDataURL(mime,0.92);
            a.click();
        });

        // Reset
        resetBtn.addEventListener('click',()=>{
            img=null;canvasWrap.style.display='none';downloadBtn.disabled=true;
            fileInput.value='';dropZone.querySelector('p').textContent='Drop an image here or click to upload';
            ctx.clearRect(0,0,canvas.width,canvas.height);
        });
    })();
    </script>
</body>
</html>
