<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Parser & Builder - Free Online Tool</title>
<meta name="description" content="Parse and build URLs interactively. Break down any URL into protocol, host, port, path, query parameters, and hash. Edit and rebuild instantly.">
<meta name="keywords" content="url parser, url builder, query string parser, url decoder, url components, url editor">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/urlparser.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .url-input-wrap { position: relative; }
  .url-input-wrap textarea {
    width: 100%; min-height: 60px; font-family: var(--mono); font-size: .9rem;
    padding: 10px 12px; resize: vertical;
  }
  .component-grid { display: grid; gap: 12px; margin-top: 16px; }
  .comp-row { display: grid; grid-template-columns: 120px 1fr; align-items: center; gap: 8px; }
  .comp-label { font-size: .82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
  .comp-value { font-family: var(--mono); font-size: .85rem; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); }
  .comp-value:focus { border-color: var(--accent); outline: none; }
  .param-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .param-table th { text-align: left; font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .param-table td { padding: 4px 8px; }
  .param-table input { width: 100%; font-family: var(--mono); font-size: .85rem; padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); }
  .param-table input:focus { border-color: var(--accent); outline: none; }
  .param-table .btn-icon { padding: 2px 8px; font-size: .8rem; }
  .rebuilt { font-family: var(--mono); font-size: .85rem; word-break: break-all; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); min-height: 40px; }
  .rebuilt .protocol { color: #e06c75; }
  .rebuilt .host { color: #61afef; }
  .rebuilt .port { color: #d19a66; }
  .rebuilt .path { color: #98c379; }
  .rebuilt .query { color: #c678dd; }
  .rebuilt .hash { color: #56b6c2; }
  .example-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .example-btns button { font-size: .78rem; }
  @media (max-width: 768px) {
    .comp-row { grid-template-columns: 1fr; gap: 2px; }
    .comp-label { font-size: .75rem; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>URL Parser & Builder</h1>
<p class="subtitle">Break down any URL into its components, edit them, and rebuild</p>

<div class="card">
  <h2>Enter URL</h2>
  <div class="url-input-wrap">
    <textarea id="urlInput" placeholder="https://user:pass@example.com:8080/path/to/page?key=value&foo=bar#section" oninput="parseUrl()"></textarea>
  </div>
  <div class="example-btns">
    <button class="btn btn-secondary" onclick="loadExample(0)">Simple</button>
    <button class="btn btn-secondary" onclick="loadExample(1)">With Auth</button>
    <button class="btn btn-secondary" onclick="loadExample(2)">Complex Query</button>
    <button class="btn btn-secondary" onclick="loadExample(3)">API Endpoint</button>
  </div>
</div>

<div class="card">
  <h2>URL Components</h2>
  <div class="component-grid">
    <div class="comp-row"><span class="comp-label">Protocol</span><input class="comp-value" id="cProtocol" oninput="rebuildUrl()" placeholder="https:"></div>
    <div class="comp-row"><span class="comp-label">Username</span><input class="comp-value" id="cUsername" oninput="rebuildUrl()" placeholder="(none)"></div>
    <div class="comp-row"><span class="comp-label">Password</span><input class="comp-value" id="cPassword" oninput="rebuildUrl()" placeholder="(none)"></div>
    <div class="comp-row"><span class="comp-label">Hostname</span><input class="comp-value" id="cHostname" oninput="rebuildUrl()" placeholder="example.com"></div>
    <div class="comp-row"><span class="comp-label">Port</span><input class="comp-value" id="cPort" oninput="rebuildUrl()" placeholder="(default)"></div>
    <div class="comp-row"><span class="comp-label">Pathname</span><input class="comp-value" id="cPathname" oninput="rebuildUrl()" placeholder="/path"></div>
    <div class="comp-row"><span class="comp-label">Hash</span><input class="comp-value" id="cHash" oninput="rebuildUrl()" placeholder="#section"></div>
  </div>
</div>

<div class="card">
  <h2>Query Parameters</h2>
  <table class="param-table" id="paramTable">
    <thead><tr><th>Key</th><th>Value</th><th></th></tr></thead>
    <tbody id="paramBody"></tbody>
  </table>
  <button class="btn btn-secondary" onclick="addParam()" style="margin-top:8px">+ Add Parameter</button>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h2 style="margin:0">Rebuilt URL</h2>
    <button class="btn" onclick="copyRebuilt()">Copy</button>
  </div>
  <div class="rebuilt" id="rebuilt"></div>
</div>
</div>

<div class="toast" id="toast">Copied!</div>

<footer>
Built with &#9749; by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> &middot; No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
const examples = [
  'https://example.com/docs/getting-started?lang=en#install',
  'https://admin:s3cret@db.example.com:5432/mydb?ssl=true&timeout=30',
  'https://shop.example.com/search?q=laptop&brand=apple&brand=dell&sort=price&order=asc&page=2&limit=20',
  'https://api.example.com/v2/users/42/posts?fields=id,title,body&include=comments&token=abc123'
];
let params = [];
let rebuilding = false;

function loadExample(i) {
  $('urlInput').value = examples[i];
  parseUrl();
}

function parseUrl() {
  if (rebuilding) return;
  const raw = $('urlInput').value.trim();
  if (!raw) { clearAll(); return; }
  try {
    const u = new URL(raw);
    $('cProtocol').value = u.protocol;
    $('cUsername').value = u.username;
    $('cPassword').value = u.password;
    $('cHostname').value = u.hostname;
    $('cPort').value = u.port;
    $('cPathname').value = u.pathname;
    $('cHash').value = u.hash;
    params = [];
    u.searchParams.forEach((v, k) => params.push({ key: k, value: v }));
    renderParams();
    renderRebuilt(u.href);
  } catch {
    $('rebuilt').textContent = '(invalid URL)';
  }
}

function clearAll() {
  ['cProtocol','cUsername','cPassword','cHostname','cPort','cPathname','cHash'].forEach(id => $(id).value = '');
  params = [];
  renderParams();
  $('rebuilt').innerHTML = '';
}

function rebuildUrl() {
  rebuilding = true;
  try {
    const proto = $('cProtocol').value || 'https:';
    const host = $('cHostname').value || 'example.com';
    const base = proto + '//' + host;
    const u = new URL(base);
    u.protocol = proto;
    u.username = $('cUsername').value;
    u.password = $('cPassword').value;
    u.hostname = host;
    u.port = $('cPort').value;
    u.pathname = $('cPathname').value;
    u.hash = $('cHash').value;
    u.search = '';
    params.forEach(p => { if (p.key) u.searchParams.append(p.key, p.value); });
    const href = u.href;
    $('urlInput').value = href;
    renderRebuilt(href);
  } catch {
    $('rebuilt').textContent = '(invalid URL)';
  }
  rebuilding = false;
}

function renderRebuilt(href) {
  try {
    const u = new URL(href);
    let html = `<span class="protocol">${esc(u.protocol)}</span>//`;
    if (u.username) {
      html += `<span class="host">${esc(u.username)}</span>`;
      if (u.password) html += `:<span class="host">${esc(u.password)}</span>`;
      html += '@';
    }
    html += `<span class="host">${esc(u.hostname)}</span>`;
    if (u.port) html += `:<span class="port">${esc(u.port)}</span>`;
    html += `<span class="path">${esc(u.pathname)}</span>`;
    if (u.search) html += `<span class="query">${esc(u.search)}</span>`;
    if (u.hash) html += `<span class="hash">${esc(u.hash)}</span>`;
    $('rebuilt').innerHTML = html;
  } catch {
    $('rebuilt').textContent = href;
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderParams() {
  const tbody = $('paramBody');
  tbody.innerHTML = '';
  if (params.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="color:var(--muted);font-size:.85rem;padding:8px">No query parameters</td></tr>';
    return;
  }
  params.forEach((p, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><input value="${esc(p.key)}" oninput="updateParam(${i},'key',this.value)" placeholder="key"></td>` +
      `<td><input value="${esc(p.value)}" oninput="updateParam(${i},'value',this.value)" placeholder="value"></td>` +
      `<td><button class="btn btn-icon btn-secondary" onclick="removeParam(${i})" title="Remove">&times;</button></td>`;
    tbody.appendChild(tr);
  });
}

function updateParam(i, field, val) { params[i][field] = val; rebuildUrl(); }
function removeParam(i) { params.splice(i, 1); renderParams(); rebuildUrl(); }
function addParam() { params.push({ key: '', value: '' }); renderParams(); }

function copyRebuilt() {
  const text = $('urlInput').value.trim();
  if (text) navigator.clipboard.writeText(text).then(() => showToast());
}

function showToast() {
  const t = $('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

loadExample(0);
</script>
</body>
</html>
