<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Generator - Free Online Tool</title>
<meta name="description" content="Free CSS gradient generator. Create beautiful linear, radial, and conic gradients with live preview. Copy CSS code instantly. No data sent to any server.">
<meta name="keywords" content="css gradient generator, linear gradient, radial gradient, conic gradient, css background, gradient tool, free css tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/gradient.html">
<link rel="stylesheet" href="toolbox.css">
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>CSS Gradient Generator</h1>
<p class="subtitle">Create beautiful gradients — copy the CSS with one click</p>

<div class="card">
<h2>🎨 Preview</h2>
<div class="preview" id="preview"></div>
</div>

<div class="card">
<h2>⚙️ Controls</h2>
<div class="controls">
<div class="row">
<label>Type:</label>
<div class="type-tabs">
<button class="type-tab active" data-type="linear" onclick="setType('linear')">Linear</button>
<button class="type-tab" data-type="radial" onclick="setType('radial')">Radial</button>
<button class="type-tab" data-type="conic" onclick="setType('conic')">Conic</button>
</div>
</div>
<div class="row angle-ctrl" id="angleRow">
<label>Angle:</label>
<input type="range" id="angle" min="0" max="360" value="135" oninput="update()">
<span class="angle-val" id="angleVal">135°</span>
</div>
<div>
<label>Color Stops:</label>
<div class="stops" id="stops"></div>
<div class="btn-row">
<button class="btn-secondary btn-sm" onclick="addStop()">+ Add Stop</button>
<button class="btn-secondary btn-sm" onclick="randomize()">🎲 Random</button>
</div>
</div>
</div>
</div>

<div class="card">
<h2>📋 CSS Code</h2>
<div class="code-box" id="codeBox"></div>
<div class="btn-row">
<button class="btn-primary" onclick="copyCSS()">📋 Copy CSS</button>
<button class="btn-secondary" onclick="copyCSS(true)">Copy background-image only</button>
</div>
</div>

<div class="card">
<h2>✨ Presets</h2>
<div class="presets-grid" id="presets"></div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
let state={type:'linear',angle:135,stops:[{color:'#667eea',pos:0},{color:'#764ba2',pos:100}]};

const PRESETS=[
  [{color:'#667eea',pos:0},{color:'#764ba2',pos:100}],
  [{color:'#f093fb',pos:0},{color:'#f5576c',pos:100}],
  [{color:'#4facfe',pos:0},{color:'#00f2fe',pos:100}],
  [{color:'#43e97b',pos:0},{color:'#38f9d7',pos:100}],
  [{color:'#fa709a',pos:0},{color:'#fee140',pos:100}],
  [{color:'#a18cd1',pos:0},{color:'#fbc2eb',pos:100}],
  [{color:'#fccb90',pos:0},{color:'#d57eeb',pos:100}],
  [{color:'#e0c3fc',pos:0},{color:'#8ec5fc',pos:100}],
  [{color:'#f5f7fa',pos:0},{color:'#c3cfe2',pos:100}],
  [{color:'#0c0c0c',pos:0},{color:'#3b82f6',pos:50},{color:'#8b5cf6',pos:100}],
  [{color:'#ff0844',pos:0},{color:'#ffb199',pos:100}],
  [{color:'#08aeea',pos:0},{color:'#2af598',pos:100}],
];

const $=id=>document.getElementById(id);

function setType(t){
  state.type=t;
  document.querySelectorAll('.type-tab').forEach(el=>el.classList.toggle('active',el.dataset.type===t));
  $('angleRow').style.display=(t==='linear'||t==='conic')?'flex':'none';
  update();
}

function renderStops(){
  const el=$('stops');
  el.innerHTML=state.stops.map((s,i)=>`
    <div class="stop-row">
      <input type="color" value="${s.color}" onchange="state.stops[${i}].color=this.value;update()">
      <input type="range" min="0" max="100" value="${s.pos}" oninput="state.stops[${i}].pos=+this.value;this.nextElementSibling.textContent=this.value+'%';update()">
      <span class="stop-pct">${s.pos}%</span>
      ${state.stops.length>2?`<button class="btn-danger btn-sm" onclick="removeStop(${i})">✕</button>`:''}
    </div>
  `).join('');
}

function addStop(){
  const last=state.stops[state.stops.length-1];
  const prev=state.stops[state.stops.length-2]||{pos:0};
  const pos=Math.min(100,Math.round((last.pos+prev.pos)/2+20));
  const r=()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0');
  state.stops.push({color:'#'+r()+r()+r(),pos});
  state.stops.sort((a,b)=>a.pos-b.pos);
  renderStops();update();
}

function removeStop(i){
  if(state.stops.length<=2)return;
  state.stops.splice(i,1);
  renderStops();update();
}

function getGradientCSS(){
  const stops=state.stops.map(s=>`${s.color} ${s.pos}%`).join(', ');
  if(state.type==='linear') return `linear-gradient(${state.angle}deg, ${stops})`;
  if(state.type==='radial') return `radial-gradient(circle, ${stops})`;
  return `conic-gradient(from ${state.angle}deg, ${stops})`;
}

function update(){
  const g=getGradientCSS();
  $('preview').style.background=g;
  $('angleVal').textContent=state.angle+'°';
  state.angle=+$('angle').value;
  $('codeBox').textContent=`background: ${g};`;
}

function copyCSS(imgOnly){
  const g=getGradientCSS();
  const text=imgOnly?`background-image: ${g};`:`background: ${g};`;
  navigator.clipboard.writeText(text).then(()=>{
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function randomize(){
  const n=2+Math.floor(Math.random()*2);
  const r=()=>'#'+[0,0,0].map(()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0')).join('');
  state.stops=Array.from({length:n},(_,i)=>({color:r(),pos:Math.round(i/(n-1)*100)}));
  state.angle=Math.floor(Math.random()*360);
  $('angle').value=state.angle;
  renderStops();update();
}

function loadPreset(stops){
  state.stops=stops.map(s=>({...s}));
  state.type='linear';state.angle=135;$('angle').value=135;
  setType('linear');renderStops();update();
}

// init presets
$('presets').innerHTML=PRESETS.map((p,i)=>{
  const stops=p.map(s=>`${s.color} ${s.pos}%`).join(', ');
  return `<div class="preset" style="background:linear-gradient(135deg,${stops})" onclick="loadPreset(PRESETS[${i}])"></div>`;
}).join('');

renderStops();update();
</script>
</body>
</html>
