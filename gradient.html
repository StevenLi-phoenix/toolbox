<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Generator - Free Online Tool</title>
<meta name="description" content="Free CSS gradient generator. Create beautiful linear, radial, and conic gradients with live preview. Copy CSS code instantly. No data sent to any server.">
<meta name="keywords" content="css gradient generator, linear gradient, radial gradient, conic gradient, css background, gradient tool, free css tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/gradient.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:900px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.preview{width:100%;height:250px;border-radius:var(--radius);border:1px solid var(--border);transition:background .3s}
.controls{display:flex;flex-direction:column;gap:1rem}
.row{display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
label{font-size:.85rem;color:var(--muted)}
select,input[type="number"]{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.9rem;font-family:var(--font)}
select:focus,input:focus{outline:none;border-color:var(--accent)}
.type-tabs{display:flex;gap:.5rem}
.type-tab{padding:.5rem 1rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:.9rem;font-weight:600;transition:all .15s}
.type-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.type-tab:hover:not(.active){border-color:var(--muted);color:var(--text)}
.stops{display:flex;flex-direction:column;gap:.75rem}
.stop-row{display:flex;align-items:center;gap:.75rem}
.stop-row input[type="color"]{width:44px;height:36px;border:1px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;padding:2px}
.stop-row input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
.stop-row input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px}
.stop-row input[type="range"]{flex:1;accent-color:var(--accent)}
.stop-pct{width:40px;text-align:center;font-size:.85rem;color:var(--muted)}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-sm{padding:.4rem .75rem;font-size:.8rem}
.btn-danger{background:transparent;color:#ef4444;border:1px solid rgba(239,68,68,.3);padding:.35rem .6rem;font-size:.8rem}
.btn-danger:hover{background:rgba(239,68,68,.1)}
.code-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;font-family:'Courier New',monospace;font-size:.9rem;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--text);position:relative}
.presets-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:.75rem}
.preset{height:60px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform .15s,box-shadow .15s}
.preset:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.angle-ctrl{display:flex;align-items:center;gap:.75rem}
.angle-ctrl input[type="range"]{width:150px;accent-color:var(--accent)}
.angle-val{font-size:.9rem;color:var(--muted);min-width:42px}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>CSS Gradient Generator</h1>
<p class="subtitle">Create beautiful gradients — copy the CSS with one click</p>

<div class="card">
<h2>🎨 Preview</h2>
<div class="preview" id="preview"></div>
</div>

<div class="card">
<h2>⚙️ Controls</h2>
<div class="controls">
<div class="row">
<label>Type:</label>
<div class="type-tabs">
<button class="type-tab active" data-type="linear" onclick="setType('linear')">Linear</button>
<button class="type-tab" data-type="radial" onclick="setType('radial')">Radial</button>
<button class="type-tab" data-type="conic" onclick="setType('conic')">Conic</button>
</div>
</div>
<div class="row angle-ctrl" id="angleRow">
<label>Angle:</label>
<input type="range" id="angle" min="0" max="360" value="135" oninput="update()">
<span class="angle-val" id="angleVal">135°</span>
</div>
<div>
<label>Color Stops:</label>
<div class="stops" id="stops"></div>
<div class="btn-row">
<button class="btn-secondary btn-sm" onclick="addStop()">+ Add Stop</button>
<button class="btn-secondary btn-sm" onclick="randomize()">🎲 Random</button>
</div>
</div>
</div>
</div>

<div class="card">
<h2>📋 CSS Code</h2>
<div class="code-box" id="codeBox"></div>
<div class="btn-row">
<button class="btn-primary" onclick="copyCSS()">📋 Copy CSS</button>
<button class="btn-secondary" onclick="copyCSS(true)">Copy background-image only</button>
</div>
</div>

<div class="card">
<h2>✨ Presets</h2>
<div class="presets-grid" id="presets"></div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
let state={type:'linear',angle:135,stops:[{color:'#667eea',pos:0},{color:'#764ba2',pos:100}]};

const PRESETS=[
  [{color:'#667eea',pos:0},{color:'#764ba2',pos:100}],
  [{color:'#f093fb',pos:0},{color:'#f5576c',pos:100}],
  [{color:'#4facfe',pos:0},{color:'#00f2fe',pos:100}],
  [{color:'#43e97b',pos:0},{color:'#38f9d7',pos:100}],
  [{color:'#fa709a',pos:0},{color:'#fee140',pos:100}],
  [{color:'#a18cd1',pos:0},{color:'#fbc2eb',pos:100}],
  [{color:'#fccb90',pos:0},{color:'#d57eeb',pos:100}],
  [{color:'#e0c3fc',pos:0},{color:'#8ec5fc',pos:100}],
  [{color:'#f5f7fa',pos:0},{color:'#c3cfe2',pos:100}],
  [{color:'#0c0c0c',pos:0},{color:'#3b82f6',pos:50},{color:'#8b5cf6',pos:100}],
  [{color:'#ff0844',pos:0},{color:'#ffb199',pos:100}],
  [{color:'#08aeea',pos:0},{color:'#2af598',pos:100}],
];

const $=id=>document.getElementById(id);

function setType(t){
  state.type=t;
  document.querySelectorAll('.type-tab').forEach(el=>el.classList.toggle('active',el.dataset.type===t));
  $('angleRow').style.display=(t==='linear'||t==='conic')?'flex':'none';
  update();
}

function renderStops(){
  const el=$('stops');
  el.innerHTML=state.stops.map((s,i)=>`
    <div class="stop-row">
      <input type="color" value="${s.color}" onchange="state.stops[${i}].color=this.value;update()">
      <input type="range" min="0" max="100" value="${s.pos}" oninput="state.stops[${i}].pos=+this.value;this.nextElementSibling.textContent=this.value+'%';update()">
      <span class="stop-pct">${s.pos}%</span>
      ${state.stops.length>2?`<button class="btn-danger btn-sm" onclick="removeStop(${i})">✕</button>`:''}
    </div>
  `).join('');
}

function addStop(){
  const last=state.stops[state.stops.length-1];
  const prev=state.stops[state.stops.length-2]||{pos:0};
  const pos=Math.min(100,Math.round((last.pos+prev.pos)/2+20));
  const r=()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0');
  state.stops.push({color:'#'+r()+r()+r(),pos});
  state.stops.sort((a,b)=>a.pos-b.pos);
  renderStops();update();
}

function removeStop(i){
  if(state.stops.length<=2)return;
  state.stops.splice(i,1);
  renderStops();update();
}

function getGradientCSS(){
  const stops=state.stops.map(s=>`${s.color} ${s.pos}%`).join(', ');
  if(state.type==='linear') return `linear-gradient(${state.angle}deg, ${stops})`;
  if(state.type==='radial') return `radial-gradient(circle, ${stops})`;
  return `conic-gradient(from ${state.angle}deg, ${stops})`;
}

function update(){
  const g=getGradientCSS();
  $('preview').style.background=g;
  $('angleVal').textContent=state.angle+'°';
  state.angle=+$('angle').value;
  $('codeBox').textContent=`background: ${g};`;
}

function copyCSS(imgOnly){
  const g=getGradientCSS();
  const text=imgOnly?`background-image: ${g};`:`background: ${g};`;
  navigator.clipboard.writeText(text).then(()=>{
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function randomize(){
  const n=2+Math.floor(Math.random()*2);
  const r=()=>'#'+[0,0,0].map(()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0')).join('');
  state.stops=Array.from({length:n},(_,i)=>({color:r(),pos:Math.round(i/(n-1)*100)}));
  state.angle=Math.floor(Math.random()*360);
  $('angle').value=state.angle;
  renderStops();update();
}

function loadPreset(stops){
  state.stops=stops.map(s=>({...s}));
  state.type='linear';state.angle=135;$('angle').value=135;
  setType('linear');renderStops();update();
}

// init presets
$('presets').innerHTML=PRESETS.map((p,i)=>{
  const stops=p.map(s=>`${s.color} ${s.pos}%`).join(', ');
  return `<div class="preset" style="background:linear-gradient(135deg,${stops})" onclick="loadPreset(PRESETS[${i}])"></div>`;
}).join('');

renderStops();update();
</script>
</body>
</html>
