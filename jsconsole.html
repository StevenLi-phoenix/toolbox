<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Console - Free Online JS Playground</title>
<meta name="description" content="Run JavaScript code in your browser with a live console. See console.log output, errors, and return values instantly. No server required.">
<meta name="keywords" content="javascript console, js playground, javascript repl, run javascript online, js sandbox">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/jsconsole.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .editor-wrap { display: flex; flex-direction: column; gap: 0; }
  #code {
    font-family: var(--mono);
    font-size: .85rem;
    line-height: 1.5;
    min-height: 200px;
    resize: vertical;
    tab-size: 2;
    padding: 14px;
  }
  .output-area {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: var(--mono);
    font-size: .82rem;
    line-height: 1.6;
    padding: 14px;
    min-height: 150px;
    max-height: 400px;
    overflow-y: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .log-line { padding: 2px 0; border-bottom: 1px solid #2a2a2a; word-break: break-word; }
  .log-line:last-child { border-bottom: none; }
  .log-log { color: #e0e0e0; }
  .log-error { color: #f87171; }
  .log-warn { color: #fbbf24; }
  .log-info { color: #60a5fa; }
  .log-return { color: #34d399; font-style: italic; }
  .log-return::before { content: "← "; }
  .log-time { color: #6b7280; margin-right: 8px; font-size: .75rem; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .toolbar .hint { margin-left: auto; font-size: .78rem; color: var(--muted); }
  .repl-input { display: flex; gap: 8px; margin-top: 10px; }
  .repl-input input {
    flex: 1;
    font-family: var(--mono);
    font-size: .85rem;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
  }
  .snippets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  @media (max-width: 768px) {
    .toolbar .hint { display: none; }
  }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; All Tools</a>
<h1>🖥️ JavaScript Console</h1>
<p class="subtitle">Run JavaScript code in your browser with live console output. 100% client-side.</p>

<div class="container">
  <div class="card">
    <h2>📝 Code Editor</h2>
    <div class="toolbar">
      <button class="btn-primary" onclick="runCode()">▶ Run</button>
      <button class="btn-secondary" onclick="clearOutput()">🗑️ Clear Output</button>
      <button class="btn-secondary" onclick="clearAll()">↺ Reset</button>
      <span class="hint">Ctrl+Enter to run</span>
    </div>
    <textarea id="code" placeholder="// Write your JavaScript here...
console.log('Hello, world!');

const arr = [1, 2, 3, 4, 5];
console.log('Sum:', arr.reduce((a, b) => a + b, 0));
console.log('Reversed:', [...arr].reverse());">// Try some JavaScript!
console.log('Hello, world!');

const nums = [1, 2, 3, 4, 5];
console.log('Array:', nums);
console.log('Sum:', nums.reduce((a, b) => a + b, 0));
console.log('Map:', nums.map(n => n * n));

const obj = { name: 'Toolbox', version: '1.0', features: ['fast', 'free', 'private'] };
console.log('Object:', obj);

42 + 58;</textarea>
    <div class="snippets">
      <button class="btn-secondary" onclick="loadSnippet('fetch')">Fetch API</button>
      <button class="btn-secondary" onclick="loadSnippet('promise')">Promise</button>
      <button class="btn-secondary" onclick="loadSnippet('dom')">DOM Info</button>
      <button class="btn-secondary" onclick="loadSnippet('date')">Date/Time</button>
      <button class="btn-secondary" onclick="loadSnippet('regex')">Regex</button>
    </div>
  </div>

  <div class="card">
    <h2>📟 Output</h2>
    <div class="output-area" id="output">
      <div class="log-line log-info">Ready. Press ▶ Run or Ctrl+Enter.</div>
    </div>
    <div class="repl-input">
      <input type="text" id="repl" placeholder="Quick eval (Enter to run)..." autocomplete="off">
      <button class="btn-primary" onclick="runRepl()">⏎</button>
    </div>
  </div>
</div>

<footer>
  <div>Built with ☕ by Steven Li · No data leaves your browser</div>
  <div><a href="index.html">← Back to Toolbox</a></div>
</footer>

<script>
const codeEl = document.getElementById('code');
const outputEl = document.getElementById('output');
const replEl = document.getElementById('repl');

const snippets = {
  fetch: `// Fetch API example
fetch('https://jsonplaceholder.typicode.com/todos/1')
  .then(res => res.json())
  .then(data => console.log('Fetched:', data))
  .catch(err => console.error('Error:', err));`,
  promise: `// Promise example
const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

async function main() {
  console.log('Starting...');
  await delay(500);
  console.log('500ms passed');
  await delay(500);
  console.log('1 second total');
  return 'Done!';
}

main().then(result => console.log(result));`,
  dom: `// DOM information
console.log('URL:', location.href);
console.log('Title:', document.title);
console.log('Viewport:', window.innerWidth + ' × ' + window.innerHeight);
console.log('User Agent:', navigator.userAgent);
console.log('Language:', navigator.language);
console.log('Cookies enabled:', navigator.cookieEnabled);
console.log('Online:', navigator.onLine);`,
  date: `// Date and Time
const now = new Date();
console.log('ISO:', now.toISOString());
console.log('Local:', now.toLocaleString());
console.log('Unix timestamp:', Math.floor(now.getTime() / 1000));
console.log('Day of week:', now.toLocaleDateString('en', { weekday: 'long' }));
console.log('Timezone:', Intl.DateTimeFormat().resolvedOptions().timeZone);`,
  regex: `// Regex examples
const email = /^[\\w.-]+@[\\w.-]+\\.\\w{2,}$/;
console.log('Valid email:', email.test('user@example.com'));
console.log('Invalid email:', email.test('not-an-email'));

const text = 'Call 555-1234 or 555-5678';
const phones = text.match(/\\d{3}-\\d{4}/g);
console.log('Found phones:', phones);`
};

function loadSnippet(name) {
  codeEl.value = snippets[name] || '';
}

function formatValue(val) {
  if (val === undefined) return 'undefined';
  if (val === null) return 'null';
  if (typeof val === 'string') return val;
  try {
    if (val instanceof Error) return val.toString();
    if (typeof val === 'object') return JSON.stringify(val, null, 2);
    return String(val);
  } catch {
    return String(val);
  }
}

function addLine(type, ...args) {
  const line = document.createElement('div');
  line.className = 'log-line log-' + type;
  const time = document.createElement('span');
  time.className = 'log-time';
  const now = new Date();
  time.textContent = now.toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  line.appendChild(time);
  const text = args.map(formatValue).join(' ');
  line.appendChild(document.createTextNode(text));
  outputEl.appendChild(line);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function runCode() {
  const code = codeEl.value.trim();
  if (!code) return;
  addLine('info', '▶ Running...');

  const origLog = console.log;
  const origError = console.error;
  const origWarn = console.warn;
  const origInfo = console.info;

  console.log = (...args) => { addLine('log', ...args); origLog.apply(console, args); };
  console.error = (...args) => { addLine('error', ...args); origError.apply(console, args); };
  console.warn = (...args) => { addLine('warn', ...args); origWarn.apply(console, args); };
  console.info = (...args) => { addLine('info', ...args); origInfo.apply(console, args); };

  try {
    const result = (0, eval)(code);
    if (result !== undefined) addLine('return', formatValue(result));
  } catch (err) {
    addLine('error', err.toString());
  }

  console.log = origLog;
  console.error = origError;
  console.warn = origWarn;
  console.info = origInfo;
}

function runRepl() {
  const code = replEl.value.trim();
  if (!code) return;
  addLine('log', '> ' + code);
  try {
    const result = (0, eval)(code);
    addLine('return', formatValue(result));
  } catch (err) {
    addLine('error', err.toString());
  }
  replEl.value = '';
  replEl.focus();
}

function clearOutput() {
  outputEl.innerHTML = '';
  addLine('info', 'Output cleared.');
}

function clearAll() {
  codeEl.value = '';
  clearOutput();
}

codeEl.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runCode(); }
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = codeEl.selectionStart;
    const end = codeEl.selectionEnd;
    codeEl.value = codeEl.value.substring(0, start) + '  ' + codeEl.value.substring(end);
    codeEl.selectionStart = codeEl.selectionEnd = start + 2;
  }
});

replEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); runRepl(); }
});
</script>
</body>
</html>
