<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATO Phonetic Alphabet Converter — Free Online Tool</title>
<meta name="description" content="Convert text to and from the NATO phonetic alphabet (Alpha, Bravo, Charlie…). Useful for spelling over the phone, radio, or voice calls. 100% client-side.">
<meta name="keywords" content="NATO phonetic alphabet, ICAO spelling, Alpha Bravo Charlie, phonetic converter, radio alphabet">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/nato.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .io-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 768px) { .io-grid { grid-template-columns: 1fr; } }
  label { font-weight: 600; font-size: .88rem; display: block; margin-bottom: 6px; }
  textarea { width: 100%; min-height: 160px; box-sizing: border-box; padding: 10px; font-family: var(--mono); font-size: .92rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); color: var(--text); resize: vertical; }
  .opts { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; margin: 10px 0; font-size: .85rem; }
  .opts label { display: flex; align-items: center; gap: 6px; font-weight: 400; margin: 0; cursor: pointer; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chart { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; font-size: .85rem; font-family: var(--mono); }
  .chart-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; }
  .chart-item b { color: var(--accent); margin-right: 6px; }
  .footer-note { text-align: center; margin-top: 2rem; color: var(--muted); font-size: .82rem; }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>🛩️ NATO Phonetic Alphabet</h1>
<p class="subtitle">Convert text to and from the NATO / ICAO phonetic alphabet — great for spelling names, codes, or passwords over the phone or radio. 100% client-side.</p>

<div class="card">
  <div class="io-grid">
    <div>
      <label for="text">Text</label>
      <textarea id="text" spellcheck="false" placeholder="Hello World 123">Hello World 123</textarea>
    </div>
    <div>
      <label for="phonetic">Phonetic</label>
      <textarea id="phonetic" spellcheck="false" placeholder="Hotel Echo Lima Lima Oscar Space Whiskey Oscar Romeo Lima Delta One Two Three"></textarea>
    </div>
  </div>
  <div class="opts">
    <label><input type="checkbox" id="opt-case"> Uppercase output</label>
    <label><input type="checkbox" id="opt-digits" checked> Spell digits (One, Two…)</label>
    <label><input type="checkbox" id="opt-punct"> Spell punctuation (Stop, Dash…)</label>
    <label>Separator:
      <select id="opt-sep">
        <option value=" " selected>Space</option>
        <option value=" - "> - </option>
        <option value=", ">, </option>
        <option value="\n">New line</option>
      </select>
    </label>
  </div>
  <div class="btn-row">
    <button class="btn" onclick="encodeText()">Text → Phonetic</button>
    <button class="btn" onclick="decodePhonetic()">Phonetic → Text</button>
    <button class="btn btn-secondary" onclick="copyOut('phonetic')">📋 Copy Phonetic</button>
    <button class="btn btn-secondary" onclick="copyOut('text')">📋 Copy Text</button>
    <button class="btn btn-secondary" onclick="swap()">⇄ Swap</button>
    <button class="btn btn-secondary" onclick="clearAll()">🗑 Clear</button>
  </div>
  <div id="toast" class="toast" style="display:none"></div>
</div>

<div class="card">
  <h2 style="margin-top:0;font-size:1rem">Reference Chart</h2>
  <div class="chart" id="chart"></div>
</div>

<p class="footer-note">Built with ☕ by Steven Li · No data leaves your browser</p>
</div>

<script>
const NATO = {
  A:'Alpha',B:'Bravo',C:'Charlie',D:'Delta',E:'Echo',F:'Foxtrot',G:'Golf',H:'Hotel',
  I:'India',J:'Juliett',K:'Kilo',L:'Lima',M:'Mike',N:'November',O:'Oscar',P:'Papa',
  Q:'Quebec',R:'Romeo',S:'Sierra',T:'Tango',U:'Uniform',V:'Victor',W:'Whiskey',
  X:'X-ray',Y:'Yankee',Z:'Zulu'
};
const DIGITS = {
  '0':'Zero','1':'One','2':'Two','3':'Three','4':'Four',
  '5':'Five','6':'Six','7':'Seven','8':'Eight','9':'Nine'
};
const PUNCT = {
  '.':'Stop','-':'Dash','_':'Underscore','/':'Slash','\\':'Backslash',
  ',':'Comma',':':'Colon',';':'Semicolon','?':'Question','!':'Exclamation',
  '@':'At','#':'Hash','$':'Dollar','%':'Percent','&':'Ampersand','*':'Asterisk',
  '(':'OpenParen',')':'CloseParen','[':'OpenBracket',']':'CloseBracket',
  '{':'OpenBrace','}':'CloseBrace','"':'Quote',"'":'Apostrophe','=':'Equals',
  '+':'Plus','<':'LessThan','>':'GreaterThan','|':'Pipe','^':'Caret','~':'Tilde','`':'Backtick'
};
const SPACE_TOKEN = 'Space';

function buildReverse() {
  const rev = {};
  for (const [k,v] of Object.entries(NATO)) rev[v.toLowerCase()] = k;
  for (const [k,v] of Object.entries(DIGITS)) rev[v.toLowerCase()] = k;
  for (const [k,v] of Object.entries(PUNCT)) rev[v.toLowerCase()] = k;
  rev[SPACE_TOKEN.toLowerCase()] = ' ';
  // Common alternatives
  rev['juliet'] = 'J';
  rev['xray'] = 'X';
  rev['alfa'] = 'A';
  return rev;
}
const REV = buildReverse();

function getSep() {
  const v = document.getElementById('opt-sep').value;
  return v === '\\n' ? '\n' : v;
}

function encodeText() {
  const src = document.getElementById('text').value;
  const spellDigits = document.getElementById('opt-digits').checked;
  const spellPunct = document.getElementById('opt-punct').checked;
  const upper = document.getElementById('opt-case').checked;
  const sep = getSep();
  const out = [];
  for (const ch of src) {
    const up = ch.toUpperCase();
    if (NATO[up]) out.push(NATO[up]);
    else if (spellDigits && DIGITS[ch]) out.push(DIGITS[ch]);
    else if (spellPunct && PUNCT[ch]) out.push(PUNCT[ch]);
    else if (ch === ' ') out.push(SPACE_TOKEN);
    else if (ch === '\n') out.push('\n');
    else out.push(ch);
  }
  let result = '';
  for (let i = 0; i < out.length; i++) {
    const tok = out[i];
    if (tok === '\n') { result += '\n'; continue; }
    if (i > 0 && out[i-1] !== '\n') result += sep;
    result += tok;
  }
  document.getElementById('phonetic').value = upper ? result.toUpperCase() : result;
}

function decodePhonetic() {
  const src = document.getElementById('phonetic').value;
  const lines = src.split(/\n/);
  const out = lines.map(line => {
    const tokens = line.split(/[\s,\-_/]+/).filter(Boolean);
    return tokens.map(t => {
      const low = t.toLowerCase().replace(/[^a-z]/g,'');
      return REV[low] !== undefined ? REV[low] : t;
    }).join('');
  }).join('\n');
  document.getElementById('text').value = out;
}

function copyOut(which) {
  const el = document.getElementById(which);
  navigator.clipboard.writeText(el.value).then(() => toast('Copied!'));
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toast._tid);
  toast._tid = setTimeout(() => t.style.display='none', 1600);
}
function swap() {
  const t = document.getElementById('text');
  const p = document.getElementById('phonetic');
  const tmp = t.value; t.value = p.value; p.value = tmp;
}
function clearAll() {
  document.getElementById('text').value = '';
  document.getElementById('phonetic').value = '';
}

function buildChart() {
  const chart = document.getElementById('chart');
  const items = [];
  for (const [k,v] of Object.entries(NATO)) items.push(`<div class="chart-item"><b>${k}</b>${v}</div>`);
  for (const [k,v] of Object.entries(DIGITS)) items.push(`<div class="chart-item"><b>${k}</b>${v}</div>`);
  chart.innerHTML = items.join('');
}

buildChart();
document.getElementById('text').addEventListener('input', encodeText);
['opt-case','opt-digits','opt-punct','opt-sep'].forEach(id =>
  document.getElementById(id).addEventListener('change', encodeText));
encodeText();
</script>
</body>
</html>
