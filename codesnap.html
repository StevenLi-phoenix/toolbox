<div class="header">

<script>
// ============ State ============
const state = {
  lang: 'javascript',
  bgIndex: 0,
  padding: 32,
  radius: 12,
  fontSize: 14,
  showDots: true,
  showLines: true,
  showShadow: true,
  lightTheme: false,
};

const backgrounds = [
  { name: 'Hyper', value: 'linear-gradient(135deg, #a855f7, #ec4899)' },
  { name: 'Oceanic', value: 'linear-gradient(135deg, #0ea5e9, #6366f1)' },
  { name: 'Sunset', value: 'linear-gradient(135deg, #f97316, #ef4444)' },
  { name: 'Forest', value: 'linear-gradient(135deg, #22c55e, #0d9488)' },
  { name: 'Midnight', value: 'linear-gradient(135deg, #1e293b, #0f172a)' },
  { name: 'Candy', value: 'linear-gradient(135deg, #f472b6, #a78bfa)' },
  { name: 'Dawn', value: 'linear-gradient(135deg, #fbbf24, #f97316, #ef4444)' },
  { name: 'Arctic', value: 'linear-gradient(135deg, #67e8f9, #818cf8)' },
  { name: 'Sand', value: 'linear-gradient(135deg, #d4a574, #b8860b)' },
  { name: 'Noir', value: '#000000' },
];

// ============ Elements ============
const $ = id => document.getElementById(id);
const codeInput = $('code-input');
const codeContent = $('code-content');
const lineNums = $('line-nums');
const codeWindow = $('code-window');
const windowDots = $('window-dots');
const windowTitle = $('window-title');
const windowHeader = $('window-header');
const snapshotTarget = $('snapshot-target');
const charCount = $('char-count');

// ============ Background Presets ============
const bgContainer = $('bg-presets');
backgrounds.forEach((bg, i) => {
  const el = document.createElement('div');
  el.className = 'bg-preset' + (i === 0 ? ' active' : '');
  el.style.background = bg.value;
  el.title = bg.name;
  el.addEventListener('click', () => {
    state.bgIndex = i;
    document.querySelectorAll('.bg-preset').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    render();
  });
  bgContainer.appendChild(el);
});

// ============ Controls ============
$('lang-select').addEventListener('change', e => { state.lang = e.target.value; render(); });

$('padding-range').addEventListener('input', e => {
  state.padding = +e.target.value;
  $('padding-val').textContent = state.padding + 'px';
  render();
});
$('radius-range').addEventListener('input', e => {
  state.radius = +e.target.value;
  $('radius-val').textContent = state.radius + 'px';
  render();
});
$('fontsize-range').addEventListener('input', e => {
  state.fontSize = +e.target.value;
  $('fontsize-val').textContent = state.fontSize + 'px';
  render();
});

$('toggle-dots').addEventListener('change', e => { state.showDots = e.target.checked; render(); });
$('toggle-lines').addEventListener('change', e => { state.showLines = e.target.checked; render(); });
$('toggle-shadow').addEventListener('change', e => { state.showShadow = e.target.checked; render(); });
$('toggle-theme').addEventListener('change', e => { state.lightTheme = e.target.checked; render(); });

codeInput.addEventListener('input', () => {
  charCount.textContent = codeInput.value.length + ' chars';
  render();
});

// Handle tab key in textarea
codeInput.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = codeInput.selectionStart;
    const end = codeInput.selectionEnd;
    codeInput.value = codeInput.value.substring(0, start) + '  ' + codeInput.value.substring(end);
    codeInput.selectionStart = codeInput.selectionEnd = start + 2;
    render();
  }
});

// ============ Syntax Highlighting ============
function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function highlight(code, lang) {
  const escaped = escapeHtml(code);
  
  const rules = getLanguageRules(lang);
  
  // Tokenize: find all matches, sort by position, apply non-overlapping
  const tokens = [];
  for (const rule of rules) {
    let match;
    const re = new RegExp(rule.pattern.source, rule.pattern.flags.includes('g') ? rule.pattern.flags : rule.pattern.flags + 'g');
    while ((match = re.exec(escaped)) !== null) {
      const group = rule.group !== undefined ? rule.group : 0;
      const text = match[group] || match[0];
      const start = match.index + (group > 0 ? match[0].indexOf(text) : 0);
      tokens.push({ start, end: start + text.length, cls: rule.cls, text });
    }
  }
  
  // Sort by position, then by length (longer first)
  tokens.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));
  
  // Remove overlaps
  const used = [];
  const filtered = [];
  for (const tok of tokens) {
    let overlap = false;
    for (const u of used) {
      if (tok.start < u.end && tok.end > u.start) { overlap = true; break; }
    }
    if (!overlap) {
      filtered.push(tok);
      used.push(tok);
    }
  }
  
  // Build result
  let result = '';
  let pos = 0;
  for (const tok of filtered) {
    if (tok.start > pos) result += escaped.substring(pos, tok.start);
    result += `<span class="${tok.cls}">${escaped.substring(tok.start, tok.end)}</span>`;
    pos = tok.end;
  }
  if (pos < escaped.length) result += escaped.substring(pos);
  
  return result;
}

function getLanguageRules(lang) {
  const commentLine = { pattern: /\/\/.*$/m, cls: 'tok-comment' };
  const commentBlock = { pattern: /\/\*[\s\S]*?\*\//m, cls: 'tok-comment' };
  const hashComment = { pattern: /#.*$/m, cls: 'tok-comment' };
  const stringDouble = { pattern: /"(?:[^"\\]|\\.)*"/m, cls: 'tok-string' };
  const stringSingle = { pattern: /'(?:[^'\\]|\\.)*'/m, cls: 'tok-string' };
  const templateStr = { pattern: /`(?:[^`\\]|\\.)*`/m, cls: 'tok-string' };
  const number = { pattern: /\b(?:0x[\da-fA-F]+|0o[0-7]+|0b[01]+|\d+\.?\d*(?:e[+-]?\d+)?)\b/m, cls: 'tok-number' };
  const boolNull = { pattern: /\b(?:true|false|null|undefined|NaN|Infinity)\b/m, cls: 'tok-number' };
  const operator = { pattern: /[+\-*/%=&|^~<>!?:]+/m, cls: 'tok-operator' };
  
  switch (lang) {
    case 'javascript':
    case 'typescript': {
      const extra = lang === 'typescript'
        ? /\b(?:interface|type|enum|namespace|declare|readonly|abstract|implements|keyof|infer|as|is)\b/
        : /(?!)/;
      return [
        commentBlock, commentLine,
        templateStr, stringDouble, stringSingle,
        { pattern: /\/(?:[^/\\]|\\.)+\/[gimsuy]*/m, cls: 'tok-regex' },
        { pattern: /\b(?:function|const|let|var|return|if|else|for|while|do|switch|case|break|continue|new|this|class|extends|super|import|export|from|default|async|await|yield|throw|try|catch|finally|typeof|instanceof|void|delete|in|of|static|get|set)\b/, cls: 'tok-keyword' },
        ...(lang === 'typescript' ? [{ pattern: extra, cls: 'tok-keyword' }] : []),
        { pattern: /\b(?:Array|Object|String|Number|Boolean|Map|Set|Promise|Date|RegExp|Error|console|Math|JSON|parseInt|parseFloat|setTimeout|setInterval)\b/, cls: 'tok-builtin' },
        { pattern: /\b[A-Z][a-zA-Z0-9]*\b/, cls: 'tok-type' },
        { pattern: /\b([a-zA-Z_$][\w$]*)\s*(?=\()/, cls: 'tok-function', group: 1 },
        { pattern: /@[\w]+/, cls: 'tok-decorator' },
        boolNull, number, operator,
      ];
    }
    case 'python':
      return [
        { pattern: /"""[\s\S]*?"""|'''[\s\S]*?'''/m, cls: 'tok-string' },
        hashComment, stringDouble, stringSingle,
        { pattern: /\b(?:def|class|return|if|elif|else|for|while|break|continue|import|from|as|with|try|except|finally|raise|yield|lambda|pass|global|nonlocal|assert|del|in|not|and|or|is|async|await|match|case)\b/, cls: 'tok-keyword' },
        { pattern: /\b(?:print|len|range|int|str|float|list|dict|tuple|set|bool|type|isinstance|hasattr|getattr|setattr|super|property|staticmethod|classmethod|enumerate|zip|map|filter|sorted|reversed|open|input)\b/, cls: 'tok-builtin' },
        { pattern: /\b(?:True|False|None)\b/, cls: 'tok-number' },
        { pattern: /\b([a-zA-Z_]\w*)\s*(?=\()/, cls: 'tok-function', group: 1 },
        { pattern: /@[\w.]+/, cls: 'tok-decorator' },
        { pattern: /\b(?:self|cls)\b/, cls: 'tok-variable' },
        number, operator,
      ];
    case 'html':
      return [
        { pattern: /&lt;!--[\s\S]*?--&gt;/m, cls: 'tok-comment' },
        { pattern: /&lt;\/?[a-zA-Z][\w-]*/m, cls: 'tok-tag' },
        { pattern: /\/?&gt;/m, cls: 'tok-tag' },
        { pattern: /\b([a-zA-Z\-]+)=/m, cls: 'tok-attr', group: 1 },
        stringDouble, stringSingle,
      ];
    case 'css':
      return [
        commentBlock,
        { pattern: /[.#]?[a-zA-Z][\w-]*(?=\s*\{)/m, cls: 'tok-selector' },
        { pattern: /[\w-]+(?=\s*:)/m, cls: 'tok-property' },
        { pattern: /:\s*([^;{}]+)/m, cls: 'tok-value', group: 1 },
        { pattern: /\b\d+\.?\d*(px|em|rem|%|vh|vw|s|ms|deg|fr)\b/m, cls: 'tok-number' },
        stringDouble, stringSingle,
        { pattern: /@[\w-]+/, cls: 'tok-keyword' },
      ];
    case 'json':
      return [
        stringDouble,
        { pattern: /\b(?:true|false|null)\b/, cls: 'tok-number' },
        number,
        { pattern: /[{}[\],:]/m, cls: 'tok-punctuation' },
      ];
    case 'bash':
      return [
        hashComment,
        stringDouble, stringSingle,
        { pattern: /\$\{?[\w@#?!*]+\}?/, cls: 'tok-variable' },
        { pattern: /\b(?:if|then|else|elif|fi|for|while|do|done|case|esac|in|function|return|local|export|source|alias|unset|readonly|shift|break|continue|exit|trap|eval|exec)\b/, cls: 'tok-keyword' },
        { pattern: /\b(?:echo|printf|cd|ls|cp|mv|rm|mkdir|rmdir|cat|grep|sed|awk|find|xargs|sort|uniq|wc|head|tail|cut|tr|tee|chmod|chown|curl|wget|tar|gzip|ssh|scp|git|docker|npm|pip|make|sudo)\b/, cls: 'tok-builtin' },
        number, operator,
      ];
    case 'go':
      return [
        commentBlock, commentLine,
        { pattern: /`[^`]*`/m, cls: 'tok-string' },
        stringDouble, stringSingle,
        { pattern: /\b(?:func|return|if|else|for|range|switch|case|default|break|continue|go|select|chan|defer|fallthrough|goto|package|import|var|const|type|struct|interface|map|make|new|append|len|cap|delete|copy|close|panic|recover)\b/, cls: 'tok-keyword' },
        { pattern: /\b(?:string|int|int8|int16|int32|int64|uint|uint8|uint16|uint32|uint64|float32|float64|complex64|complex128|bool|byte|rune|error|any)\b/, cls: 'tok-type' },
        { pattern: /\b(?:fmt|os|io|log|strings|strconv|math|net|http|json|time|context|sync|errors)\b/, cls: 'tok-builtin' },
        { pattern: /\b(?:true|false|nil|iota)\b/, cls: 'tok-number' },
        { pattern: /\b([a-zA-Z_]\w*)\s*(?=\()/, cls: 'tok-function', group: 1 },
        number, operator,
      ];
    case 'rust':
      return [
        commentBlock, commentLine,
        stringDouble,
        { pattern: /\b(?:fn|let|mut|const|static|return|if|else|for|while|loop|match|break|continue|struct|enum|impl|trait|pub|mod|use|crate|super|self|Self|where|as|in|ref|move|async|await|unsafe|extern|type|dyn|macro_rules)\b/, cls: 'tok-keyword' },
        { pattern: /\b(?:i8|i16|i32|i64|i128|isize|u8|u16|u32|u64|u128|usize|f32|f64|bool|char|str|String|Vec|Option|Result|Box|Rc|Arc|HashMap|HashSet|BTreeMap)\b/, cls: 'tok-type' },
        { pattern: /\b(?:println|print|eprintln|format|vec|panic|assert|assert_eq|todo|unimplemented|dbg|cfg|derive|include|env|file|line|column)\b!?/, cls: 'tok-builtin' },
        { pattern: /\b(?:true|false|None|Some|Ok|Err)\b/, cls: 'tok-number' },
        { pattern: /#\[[\w(,= "]*\]/, cls: 'tok-decorator' },
        { pattern: /\b([a-zA-Z_]\w*)\s*(?=\()/, cls: 'tok-function', group: 1 },
        { pattern: /&amp;(?:mut\s+)?/, cls: 'tok-operator' },
        number, operator,
      ];
    case 'java':
      return [
        commentBlock, commentLine,
        stringDouble, stringSingle,
        { pattern: /\b(?:public|private|protected|static|final|abstract|class|interface|extends|implements|return|if|else|for|while|do|switch|case|break|continue|new|this|super|import|package|void|throw|throws|try|catch|finally|synchronized|volatile|transient|native|instanceof|default|enum|assert|record|sealed|permits|var|yield)\b/, cls: 'tok-keyword' },
        { pattern: /\b(?:int|long|short|byte|float|double|char|boolean|String|Integer|Long|Double|Float|Boolean|Object|List|Map|Set|ArrayList|HashMap|Optional|Stream)\b/, cls: 'tok-type' },
        { pattern: /\b(?:System|Math|Arrays|Collections|Objects)\b/, cls: 'tok-builtin' },
        { pattern: /\b(?:true|false|null)\b/, cls: 'tok-number' },
        { pattern: /@\w+/, cls: 'tok-decorator' },
        { pattern: /\b([a-zA-Z_]\w*)\s*(?=\()/, cls: 'tok-function', group: 1 },
        number, operator,
      ];
    case 'c':
      return [
        commentBlock, commentLine,
        { pattern: /#\s*(?:include|define|ifdef|ifndef|endif|if|else|elif|undef|pragma|error|warning)\b.*$/m, cls: 'tok-keyword' },
        stringDouble, stringSingle,
        { pattern: /\b(?:auto|break|case|const|continue|default|do|else|enum|extern|for|goto|if|inline|register|restrict|return|sizeof|static|struct|switch|typedef|union|volatile|while|namespace|class|template|typename|virtual|override|public|private|protected|new|delete|throw|try|catch|using|nullptr)\b/, cls: 'tok-keyword' },
        { pattern: /\b(?:int|long|short|char|float|double|void|unsigned|signed|bool|size_t|uint8_t|uint16_t|uint32_t|uint64_t|int8_t|int16_t|int32_t|int64_t|string|vector|map|set|shared_ptr|unique_ptr|auto)\b/, cls: 'tok-type' },
        { pattern: /\b(?:printf|scanf|malloc|free|calloc|realloc|memcpy|memset|strlen|strcmp|strcpy|strcat|fprintf|sprintf|fopen|fclose|fread|fwrite|exit|abort|assert|std|cout|cin|endl|cerr|NULL)\b/, cls: 'tok-builtin' },
        { pattern: /\b(?:true|false|NULL|nullptr)\b/, cls: 'tok-number' },
        { pattern: /\b([a-zA-Z_]\w*)\s*(?=\()/, cls: 'tok-function', group: 1 },
        number, operator,
      ];
    default:
      return [commentBlock, commentLine, hashComment, stringDouble, stringSingle, number, operator];
  }
}

// ============ Render ============
function render() {
  const code = codeInput.value || codeInput.placeholder;
  const lines = code.split('\n');
  
  // Background
  snapshotTarget.style.background = backgrounds[state.bgIndex].value;
  snapshotTarget.style.padding = state.padding + 'px';
  
  // Window styling
  codeWindow.style.borderRadius = state.radius + 'px';
  codeWindow.className = 'code-window' +
    (state.showShadow ? ' has-shadow' : '') +
    (state.lightTheme ? ' theme-light' : ' theme-dark');
  
  // Font size
  const pre = $('code-output');
  pre.style.fontSize = state.fontSize + 'px';
  
  // Window dots
  windowDots.style.display = state.showDots ? 'flex' : 'none';
  windowHeader.style.display = state.showDots ? 'flex' : 'none';
  
  // Title
  windowTitle.textContent = $('lang-select').options[$('lang-select').selectedIndex].text;
  
  // Line numbers
  if (state.showLines) {
    lineNums.style.display = '';
    lineNums.textContent = lines.map((_, i) => i + 1).join('\n');
  } else {
    lineNums.style.display = 'none';
  }
  
  // Highlighted code
  codeContent.innerHTML = highlight(code, state.lang);
}

// ============ Export ============
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function exportCanvas() {
  const target = snapshotTarget;
  
  try {
    // Use a foreignObject SVG approach for rendering
    const canvas = document.createElement('canvas');
    const scale = 2; // 2x for retina quality
    const rect = target.getBoundingClientRect();
    canvas.width = rect.width * scale;
    canvas.height = rect.height * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    
    // Serialize the DOM to SVG foreignObject
    const html = target.outerHTML;
    // Get computed styles we need
    const allStyles = document.querySelectorAll('style');
    let cssText = '';
    allStyles.forEach(s => cssText += s.textContent);
    
    const svgData = `
      <svg xmlns="http://www.w3.org/2000/svg" width="${rect.width}" height="${rect.height}">
        <foreignObject width="100%" height="100%">
          <div xmlns="http://www.w3.org/1999/xhtml">
            ${html}
          </div>
        </foreignObject>
      </svg>
    `;
    
    const img = new Image();
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    
    return new Promise((resolve, reject) => {
      img.onload = () => {
        ctx.drawImage(img, 0, 0, rect.width, rect.height);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('Canvas toBlob failed'));
        }, 'image/png');
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('SVG render failed'));
      };
      img.src = url;
    });
  } catch (e) {
    throw e;
  }
}

$('btn-export').addEventListener('click', async () => {
  $('btn-export').disabled = true;
  $('btn-export').textContent = 'Rendering...';
  try {
    const blob = await exportCanvas();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'codesnap.png';
    a.click();
    URL.revokeObjectURL(url);
    toast('PNG downloaded!');
  } catch (e) {
    console.error(e);
    // Fallback: try simpler approach
    try {
      await fallbackExport();
      toast('PNG downloaded (fallback)!');
    } catch (e2) {
      toast('Export failed — try a Chromium browser');
    }
  } finally {
    $('btn-export').disabled = false;
    $('btn-export').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PNG`;
  }
});

async function fallbackExport() {
  // Manual canvas rendering fallback
  const target = snapshotTarget;
  const rect = target.getBoundingClientRect();
  const canvas = document.createElement('canvas');
  const scale = 2;
  canvas.width = rect.width * scale;
  canvas.height = rect.height * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  
  // Draw background
  const bg = backgrounds[state.bgIndex].value;
  if (bg.startsWith('linear-gradient')) {
    // Parse gradient
    const grd = ctx.createLinearGradient(0, 0, rect.width, rect.height);
    const colors = bg.match(/#[\da-fA-F]{6}/g) || ['#a855f7', '#ec4899'];
    colors.forEach((c, i) => grd.addColorStop(i / (colors.length - 1), c));
    ctx.fillStyle = grd;
  } else {
    ctx.fillStyle = bg;
  }
  ctx.fillRect(0, 0, rect.width, rect.height);
  
  const pad = state.padding;
  const winW = rect.width - pad * 2;
  const winH = rect.height - pad * 2;
  const r = state.radius;
  
  // Draw window background
  const winBg = state.lightTheme ? '#ffffff' : '#1e1e2e';
  const winColor = state.lightTheme ? '#383a42' : '#cdd6f4';
  
  // Shadow
  if (state.showShadow) {
    ctx.shadowColor = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur = 40;
    ctx.shadowOffsetY = 12;
  }
  
  // Rounded rect
  ctx.fillStyle = winBg;
  ctx.beginPath();
  ctx.moveTo(pad + r, pad);
  ctx.lineTo(pad + winW - r, pad);
  ctx.quadraticCurveTo(pad + winW, pad, pad + winW, pad + r);
  ctx.lineTo(pad + winW, pad + winH - r);
  ctx.quadraticCurveTo(pad + winW, pad + winH, pad + winW - r, pad + winH);
  ctx.lineTo(pad + r, pad + winH);
  ctx.quadraticCurveTo(pad, pad + winH, pad, pad + winH - r);
  ctx.lineTo(pad, pad + r);
  ctx.quadraticCurveTo(pad, pad, pad + r, pad);
  ctx.closePath();
  ctx.fill();
  
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  
  // Draw dots
  let textStartY = pad + 16;
  if (state.showDots) {
    const dotY = pad + 20;
    const dotX = pad + 16;
    const dotColors = ['#ff5f57', '#febc2e', '#28c840'];
    dotColors.forEach((c, i) => {
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.arc(dotX + i * 20, dotY, 6, 0, Math.PI * 2);
      ctx.fill();
    });
    textStartY = pad + 42;
  }
  
  // Draw code text
  ctx.fillStyle = winColor;
  ctx.font = state.fontSize + 'px "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", Consolas, monospace';
  ctx.textBaseline = 'top';
  
  const code = codeInput.value || codeInput.placeholder;
  const lines = code.split('\n');
  const lineHeight = state.fontSize * 1.6;
  const codeX = pad + 16 + (state.showLines ? 40 : 0);
  
  lines.forEach((line, i) => {
    const y = textStartY + i * lineHeight;
    if (state.showLines) {
      ctx.fillStyle = winColor;
      ctx.globalAlpha = 0.35;
      ctx.textAlign = 'right';
      ctx.fillText(String(i + 1), pad + 40, y);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = winColor;
    ctx.fillText(line, codeX, y);
  });
  
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if (!blob) return reject(new Error('toBlob failed'));
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'codesnap.png';
      a.click();
      URL.revokeObjectURL(url);
      resolve();
    }, 'image/png');
  });
}

$('btn-copy').addEventListener('click', async () => {
  if (!navigator.clipboard || !window.ClipboardItem) {
    toast('Clipboard API not supported in this browser');
    return;
  }
  $('btn-copy').disabled = true;
  try {
    const blob = await exportCanvas();
    await navigator.clipboard.write([
      new ClipboardItem({ 'image/png': blob })
    ]);
    toast('Copied to clipboard!');
  } catch (e) {
    console.error(e);
    toast('Copy failed — try Export instead');
  } finally {
    $('btn-copy').disabled = false;
  }
});

  let a = 0, b = 1;
  for (let i = 2; i <= n; i++) {

  }
  return b;
}

charCount.textContent = codeInput.value.length + ' chars';
render();
