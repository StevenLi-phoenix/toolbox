<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Selector Tester - Free Online Selector Playground</title>
<meta name="description" content="Free online CSS selector tester. Write CSS selectors and test them against HTML to see matched elements highlighted in real-time. No data sent to any server.">
<meta name="keywords" content="css selector, selector tester, css playground, querySelector, css specificity, selector matching, free css tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/cssselector.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  #htmlInput { min-height: 280px; font-family: var(--mono); font-size: .85rem; resize: vertical; }
  #selectorInput { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--mono); font-size: .9rem; background: var(--bg); color: var(--text); }
  #selectorInput:focus { outline: none; border-color: var(--accent); }
  .result-area { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); padding: 14px; font-family: var(--mono); font-size: .82rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; min-height: 280px; overflow: auto; }
  .result-area .hl { background: #fef08a; border-radius: 2px; padding: 0 2px; }
  .match-count { font-size: .85rem; margin: 8px 0; font-weight: 600; }
  .match-count.ok { color: var(--success); }
  .match-count.none { color: var(--muted); }
  .match-count.err { color: var(--error); }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
  .matched-tags { margin-top: 10px; }
  .matched-tag { display: inline-block; padding: 3px 8px; margin: 3px; font-size: .78rem; font-family: var(--mono); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); }
  .cheat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; margin-top: 10px; }
  .cheat-item { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: .82rem; cursor: pointer; transition: background .15s; }
  .cheat-item:hover { background: var(--surface2); }
  .cheat-item code { font-family: var(--mono); font-weight: 600; color: var(--accent); }
  .cheat-item span { color: var(--muted); }
  @media (max-width: 768px) {
    .panels { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>CSS Selector Tester</h1>
<p class="subtitle">Write CSS selectors and see matched elements highlighted in your HTML. 100% client-side.</p>

<div class="card">
  <h2>🎯 Selector</h2>
  <input type="text" id="selectorInput" placeholder="e.g. div.container > p:first-child" value="ul > li.active" autofocus>
  <div id="matchStatus" class="match-count none">Enter a selector to test</div>
  <div class="presets">
    <button class="btn-secondary" onclick="setSelector('div > p')">div &gt; p</button>
    <button class="btn-secondary" onclick="setSelector('.active')">. class</button>
    <button class="btn-secondary" onclick="setSelector('#main')"># id</button>
    <button class="btn-secondary" onclick="setSelector('a[href]')">a[href]</button>
    <button class="btn-secondary" onclick="setSelector(':first-child')">:first-child</button>
    <button class="btn-secondary" onclick="setSelector(':nth-child(2n)')">:nth-child</button>
    <button class="btn-secondary" onclick="setSelector('p + p')">p + p</button>
    <button class="btn-secondary" onclick="setSelector('ul li:not(.active)')">:not()</button>
  </div>
</div>

<div class="panels">
  <div class="card">
    <h2>📝 HTML Input</h2>
    <textarea id="htmlInput"><div id="main" class="container">
  <h1>Welcome</h1>
  <p class="intro">First paragraph</p>
  <p>Second paragraph</p>

  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li class="active"><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <section class="content">
    <article>
      <h2>Article Title</h2>
      <p>Article text with <strong>bold</strong> and <em>italic</em>.</p>
      <a href="https://example.com" target="_blank">Link</a>
    </article>
    <aside class="sidebar">
      <h3>Related</h3>
      <ul>
        <li>Item A</li>
        <li class="active">Item B</li>
        <li>Item C</li>
      </ul>
    </aside>
  </section>

  <footer>
    <p>&copy; 2026</p>
  </footer>
</div></textarea>
  </div>
  <div class="card">
    <h2>✨ Result</h2>
    <div class="result-area" id="resultArea"></div>
    <div class="matched-tags" id="matchedTags"></div>
  </div>
</div>

<div class="card">
  <h2>📖 Selector Cheat Sheet</h2>
  <div class="cheat-grid" id="cheatGrid"></div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const CHEAT = [
  ['*', 'Universal — all elements'],
  ['div', 'Type — element name'],
  ['.cls', 'Class — elements with class'],
  ['#id', 'ID — element by id'],
  ['A B', 'Descendant — B inside A'],
  ['A > B', 'Child — direct child B of A'],
  ['A + B', 'Adjacent sibling — B right after A'],
  ['A ~ B', 'General sibling — B after A'],
  ['[attr]', 'Has attribute'],
  ['[attr="val"]', 'Attribute equals value'],
  ['[attr^="v"]', 'Attribute starts with'],
  ['[attr$="v"]', 'Attribute ends with'],
  ['[attr*="v"]', 'Attribute contains'],
  [':first-child', 'First child of parent'],
  [':last-child', 'Last child of parent'],
  [':nth-child(n)', 'Nth child (1-based)'],
  [':nth-of-type(n)', 'Nth of same type'],
  [':not(sel)', 'Negation — exclude matches'],
  [':empty', 'Elements with no children'],
  [':checked', 'Checked inputs'],
  ['::before', 'Before pseudo-element'],
  ['::after', 'After pseudo-element'],
  [':focus', 'Currently focused element'],
  [':hover', 'Mouse-over element'],
];

function initCheatSheet() {
  const grid = document.getElementById('cheatGrid');
  grid.innerHTML = CHEAT.map(([sel, desc]) =>
    `<div class="cheat-item" onclick="setSelector('${sel.replace(/'/g, "\\'")}')"><code>${escapeHTML(sel)}</code> <span>— ${desc}</span></div>`
  ).join('');
}

function escapeHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function setSelector(sel) {
  document.getElementById('selectorInput').value = sel;
  evaluate();
}

function evaluate() {
  const selector = document.getElementById('selectorInput').value.trim();
  const html = document.getElementById('htmlInput').value;
  const resultArea = document.getElementById('resultArea');
  const matchStatus = document.getElementById('matchStatus');
  const matchedTags = document.getElementById('matchedTags');

  if (!selector) {
    resultArea.innerHTML = escapeHTML(html);
    matchStatus.className = 'match-count none';
    matchStatus.textContent = 'Enter a selector to test';
    matchedTags.innerHTML = '';
    return;
  }

  // Parse HTML in a temporary document
  const parser = new DOMParser();
  const doc = parser.parseFromString('<body>' + html + '</body>', 'text/html');

  let matches;
  try {
    matches = doc.body.querySelectorAll(selector);
  } catch (e) {
    matchStatus.className = 'match-count err';
    matchStatus.textContent = 'Invalid selector: ' + e.message;
    resultArea.innerHTML = escapeHTML(html);
    matchedTags.innerHTML = '';
    return;
  }

  const count = matches.length;
  if (count === 0) {
    matchStatus.className = 'match-count none';
    matchStatus.textContent = 'No matches found';
    resultArea.innerHTML = escapeHTML(html);
    matchedTags.innerHTML = '';
    return;
  }

  matchStatus.className = 'match-count ok';
  matchStatus.textContent = count + ' element' + (count === 1 ? '' : 's') + ' matched';

  // Mark matched elements in the parsed DOM
  const marker = 'data-css-match';
  matches.forEach(el => el.setAttribute(marker, ''));

  // Serialize back to HTML and highlight matched tags
  const serialized = doc.body.innerHTML;

  // Highlight the matched elements in the source view
  const highlighted = serialized.replace(
    new RegExp(`(<[^/][^>]*?)\\s*${marker}=""`, 'g'),
    (_, before) => '<span class="hl">' + escapeHTML(before.replace(/ data-css-match=""/g, '')) + '</span>'
  );

  // We need to work with the original HTML and highlight matched elements
  // Better approach: use the parsed DOM to find which tags match, then highlight in original source
  highlightInSource(html, selector, resultArea, matchedTags);
}

function highlightInSource(html, selector, resultArea, matchedTags) {
  const parser = new DOMParser();
  const doc = parser.parseFromString('<body>' + html + '</body>', 'text/html');

  let matches;
  try {
    matches = doc.body.querySelectorAll(selector);
  } catch (e) { return; }

  // Collect info about matched elements
  const matchInfo = [];
  matches.forEach(el => {
    const tag = el.tagName.toLowerCase();
    let desc = '<' + tag;
    if (el.id) desc += ' id="' + el.id + '"';
    if (el.className) desc += ' class="' + el.className + '"';
    for (const attr of el.attributes) {
      if (attr.name !== 'id' && attr.name !== 'class') {
        desc += ' ' + attr.name + '="' + attr.value + '"';
      }
    }
    desc += '>';
    matchInfo.push({ tag, desc, text: el.textContent.trim().slice(0, 60) });
  });

  // Build tag badges
  matchedTags.innerHTML = '<strong style="font-size:.82rem;display:block;margin-bottom:6px">Matched elements:</strong>' +
    matchInfo.map(m => `<span class="matched-tag" title="${escapeHTML(m.text)}">${escapeHTML(m.desc)}</span>`).join('');

  // Highlight in source: mark matched tag names in the raw HTML
  // Give each element in the parsed DOM a unique index
  const marker = '__match__';
  matches.forEach((el, i) => el.setAttribute(marker, i));

  // Serialize and find the markers in the output
  const out = doc.body.innerHTML;
  // Escape for display, then highlight marked tags
  const escaped = escapeHTML(out);
  // The markers appear as __match__="N" in the escaped output
  const result = escaped.replace(
    new RegExp(`(&lt;\\w+)((?:\\s+[^&]*?)?)\\s+${marker}=&quot;\\d+&quot;`, 'g'),
    (_, openTag, rest) => '<span class="hl">' + openTag + rest + '</span>'
  );

  resultArea.innerHTML = result;
}

document.getElementById('selectorInput').addEventListener('input', evaluate);
document.getElementById('htmlInput').addEventListener('input', evaluate);

initCheatSheet();
evaluate();
</script>
</body>
</html>
