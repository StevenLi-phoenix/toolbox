<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Playground - HTML/CSS/JS Live Editor</title>
<meta name="description" content="Free online HTML, CSS, and JavaScript live code playground. Edit code and see results instantly. Like CodePen but fully offline. No data sent to any server.">
<meta name="keywords" content="code playground, html editor, css editor, javascript editor, live preview, codepen alternative, jsfiddle alternative">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/playground.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .playground { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; gap: 0; height: calc(100vh - 140px); min-height: 500px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .editors { display: grid; grid-template-rows: 1fr 1fr 1fr; overflow: hidden; border-right: 1px solid var(--border); }
  .editor-panel { display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid var(--border); }
  .editor-panel:last-child { border-bottom: none; }
  .editor-label { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: var(--surface2); font-size: .78rem; font-weight: 600; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .editor-label span { font-family: var(--mono); }
  .editor-panel textarea { flex: 1; width: 100%; border: none; outline: none; resize: none; padding: 10px 12px; font-family: var(--mono); font-size: .85rem; line-height: 1.5; background: var(--bg); color: var(--text); tab-size: 2; }
  .preview-wrap { display: flex; flex-direction: column; overflow: hidden; }
  .preview-label { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: var(--surface2); font-size: .78rem; font-weight: 600; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .preview-frame { flex: 1; border: none; width: 100%; background: #fff; }
  .toolbar { display: flex; gap: 8px; align-items: center; padding: 8px 12px; flex-wrap: wrap; margin-bottom: 8px; }
  .toolbar .btn { padding: 5px 14px; font-size: .82rem; }
  .console-panel { border-top: 1px solid var(--border); max-height: 150px; overflow-y: auto; background: var(--surface2); font-family: var(--mono); font-size: .8rem; padding: 6px 10px; }
  .console-line { padding: 2px 0; border-bottom: 1px solid var(--border); }
  .console-line.error { color: var(--error); }
  .console-line.warn { color: var(--warning); }
  .layout-toggle { cursor: pointer; padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-size: .75rem; }
  .layout-toggle:hover { background: var(--surface2); }
  @media (max-width: 768px) {
    .playground { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; height: calc(100vh - 120px); }
    .editors { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>Code Playground</h1>
<p class="subtitle">Live HTML, CSS & JavaScript editor with instant preview</p>

<div class="toolbar">
  <button class="btn" onclick="run()">▶ Run</button>
  <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
  <button class="btn btn-secondary" onclick="exportHTML()">Export HTML</button>
  <label style="font-size:.82rem;display:flex;align-items:center;gap:4px;cursor:pointer">
    <input type="checkbox" id="autoRun" checked> Auto-run
  </label>
  <button class="layout-toggle" onclick="toggleLayout()">⇄ Layout</button>
</div>

<div class="playground" id="playground">
  <div class="editors" id="editors">
    <div class="editor-panel">
      <div class="editor-label"><span>HTML</span></div>
      <textarea id="htmlEditor" spellcheck="false" oninput="autoRunCheck()">&lt;div class="demo"&gt;
  &lt;h1&gt;Hello, World!&lt;/h1&gt;
  &lt;p&gt;Edit the code and see changes live.&lt;/p&gt;
  &lt;button onclick="count++"&gt;Clicked: &lt;span id="num"&gt;0&lt;/span&gt;&lt;/button&gt;
&lt;/div&gt;</textarea>
    </div>
    <div class="editor-panel">
      <div class="editor-label"><span>CSS</span></div>
      <textarea id="cssEditor" spellcheck="false" oninput="autoRunCheck()">.demo {
  font-family: system-ui, sans-serif;
  max-width: 400px;
  margin: 2rem auto;
  text-align: center;
}
button {
  padding: 8px 24px;
  font-size: 1rem;
  border: 2px solid #333;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  transition: all .15s;
}
button:hover {
  background: #333;
  color: #fff;
}</textarea>
    </div>
    <div class="editor-panel">
      <div class="editor-label"><span>JS</span></div>
      <textarea id="jsEditor" spellcheck="false" oninput="autoRunCheck()">let count = 0;

setInterval(() => {
  const el = document.getElementById('num');
  if (el) el.textContent = count;
}, 100);</textarea>
    </div>
  </div>
  <div class="preview-wrap">
    <div class="preview-label"><span>Preview</span><button class="layout-toggle" onclick="clearConsole()">Clear Console</button></div>
    <iframe id="preview" class="preview-frame" sandbox="allow-scripts allow-modals"></iframe>
    <div class="console-panel" id="consolePanel"></div>
  </div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let runTimer=null;
let isHorizontal=true;

function buildDoc(){
  const html=$('htmlEditor').value;
  const css=$('cssEditor').value;
  const js=$('jsEditor').value;
  return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>${css}</style></head>
<body>${html}
<script>
(function(){
  const _log=console.log, _warn=console.warn, _error=console.error;
  function send(type,args){
    try{window.parent.postMessage({type:'console',level:type,args:Array.from(args).map(a=>{try{return typeof a==='object'?JSON.stringify(a):String(a)}catch(e){return String(a)}})},'*');}catch(e){}
  }
  console.log=function(){send('log',arguments);_log.apply(console,arguments);};
  console.warn=function(){send('warn',arguments);_warn.apply(console,arguments);};
  console.error=function(){send('error',arguments);_error.apply(console,arguments);};
  window.onerror=function(m,s,l,c,e){send('error',['Error: '+m+' (line '+l+')']);};
})();
try{${js}}catch(e){console.error(e.message);}
<\/script></body></html>`;
}

function run(){
  const iframe=$('preview');
  const doc=buildDoc();
  iframe.srcdoc=doc;
}

function autoRunCheck(){
  if(!$('autoRun').checked) return;
  clearTimeout(runTimer);
  runTimer=setTimeout(run,400);
}

function clearAll(){
  $('htmlEditor').value='';
  $('cssEditor').value='';
  $('jsEditor').value='';
  run();
}

function exportHTML(){
  const html=$('htmlEditor').value;
  const css=$('cssEditor').value;
  const js=$('jsEditor').value;
  const doc=`<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>Playground Export</title>\n<style>\n${css}\n</style>\n</head>\n<body>\n${html}\n<script>\n${js}\n<\/script>\n</body>\n</html>`;
  const blob=new Blob([doc],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='playground.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function toggleLayout(){
  isHorizontal=!isHorizontal;
  const pg=$('playground');
  if(isHorizontal){
    pg.style.gridTemplateColumns='1fr 1fr';
    pg.style.gridTemplateRows='1fr';
  } else {
    pg.style.gridTemplateColumns='1fr';
    pg.style.gridTemplateRows='1fr 1fr';
  }
}

function clearConsole(){
  $('consolePanel').innerHTML='';
}

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='console'){
    const panel=$('consolePanel');
    const line=document.createElement('div');
    line.className='console-line'+(e.data.level==='error'?' error':e.data.level==='warn'?' warn':'');
    line.textContent=(e.data.args||[]).join(' ');
    panel.appendChild(line);
    panel.scrollTop=panel.scrollHeight;
  }
});

['htmlEditor','cssEditor','jsEditor'].forEach(id=>{
  $(id).addEventListener('keydown',e=>{
    if(e.key==='Tab'){
      e.preventDefault();
      const t=e.target;
      const s=t.selectionStart, end=t.selectionEnd;
      t.value=t.value.substring(0,s)+'  '+t.value.substring(end);
      t.selectionStart=t.selectionEnd=s+2;
      autoRunCheck();
    }
  });
});

run();
</script>
</body>
</html>
