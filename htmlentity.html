<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Entity Encoder/Decoder - Free Online Tool</title>
<meta name="description" content="Free online HTML entity encoder and decoder. Convert special characters to HTML entities and vice versa. Supports named and numeric entities.">
<meta name="keywords" content="html entity encoder, html entity decoder, html special characters, html escape, free html entity tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/htmlentity.html">
<link rel="stylesheet" href="toolbox.css">
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>HTML Entity Encoder/Decoder</h1>
<p class="subtitle">Convert between special characters and HTML entities</p>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="setMode('encode',this)">Encode</button>
<button class="tab" onclick="setMode('decode',this)">Decode</button>
</div>
<h2 id="in-label">📝 Text Input</h2>
<textarea id="input" placeholder='<div class="hello">It\'s a "test" & more</div>' oninput="convert()"></textarea>
</div>

<div class="card">
<h2 id="out-label">📤 Encoded Output</h2>
<textarea id="output" readonly></textarea>
<div class="btn-row">
<button class="btn-primary" onclick="copyOut()">📋 Copy</button>
<button class="btn-secondary" onclick="swapIO()">🔄 Swap</button>
</div>
</div>

<div class="card">
<h2>📖 Common Entities</h2>
<div class="ref-grid" id="ref"></div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
let mode='encode';
function $id(id){return document.getElementById(id)}

const ENTITIES=[
  ['&','&amp;'],['<','&lt;'],['>','&gt;'],['"','&quot;'],["'",'&apos;'],
  ['©','&copy;'],['®','&reg;'],['™','&trade;'],['€','&euro;'],['£','&pound;'],
  ['¥','&yen;'],['¢','&cent;'],['§','&sect;'],['°','&deg;'],['±','&plusmn;'],
  ['×','&times;'],['÷','&divide;'],['·','&middot;'],['†','&dagger;'],['‡','&Dagger;'],
  ['…','&hellip;'],['—','&mdash;'],['–','&ndash;'],[' ','&nbsp;'],
  ['←','&larr;'],['→','&rarr;'],['↑','&uarr;'],['↓','&darr;'],
  ['♠','&spades;'],['♥','&hearts;'],['♦','&diams;'],['♣','&clubs;']
];

function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  $id('in-label').textContent=m==='encode'?'📝 Text Input':'📝 Entity Input';
  $id('out-label').textContent=m==='encode'?'📤 Encoded Output':'📤 Decoded Output';
  convert();
}

function encode(s){
  return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function decode(s){
  const el=document.createElement('textarea');
  el.innerHTML=s;
  return el.value;
}

function convert(){
  const input=$id('input').value;
  $id('output').value=mode==='encode'?encode(input):decode(input);
}

function copyOut(){
  navigator.clipboard.writeText($id('output').value).then(()=>{
    const t=$id('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function swapIO(){
  const out=$id('output').value;
  if(!out)return;
  $id('input').value=out;
  const newMode=mode==='encode'?'decode':'encode';
  const btn=document.querySelectorAll('.tab')[newMode==='encode'?0:1];
  setMode(newMode,btn);
}

// Reference grid
$id('ref').innerHTML=ENTITIES.map(([ch,ent])=>
  `<div class="ref-item" onclick="navigator.clipboard.writeText('${ent}');toast()" title="Click to copy">
    <span class="ref-char">${ch==' '?'␣':ch}</span>
    <span class="ref-code">${ent}</span>
  </div>`
).join('');

function toast(){const t=$id('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

$id('input').value='<div class="hello">It\'s a "test" & more → © 2026</div>';
convert();
</script>
</body>
</html>
