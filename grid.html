<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid Generator - Free Online Tool</title>
<meta name="description" content="Free interactive CSS Grid generator. Define rows, columns, gaps, and areas visually. Copy production-ready CSS instantly. No signup required.">
<meta name="keywords" content="css grid generator, grid layout, css grid playground, grid template, grid areas, css layout tool, free grid generator">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/grid.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .preset { padding: 6px 14px; font-size: .82rem; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; }
  .preset:hover { border-color: var(--accent); color: var(--text); }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  .grid-preview { min-height: 300px; border: 2px dashed var(--border); border-radius: var(--radius); padding: 12px; }
  .grid-cell { display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 1.1rem; border-radius: 6px; min-height: 60px; cursor: pointer; transition: outline .15s; }
  .grid-cell.selected { outline: 3px solid var(--accent); outline-offset: 2px; }
  @media (max-width: 768px) { .row-3, .row-4 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>CSS Grid Generator</h1>
<p class="subtitle">Build grid layouts visually and export production-ready CSS</p>

<div class="card">
<h2>⚡ Presets</h2>
<div class="preset-row">
<button class="preset" onclick="preset('1fr 1fr','1fr',2)">2 Columns</button>
<button class="preset" onclick="preset('1fr 1fr 1fr','1fr',3)">3 Columns</button>
<button class="preset" onclick="preset('1fr 1fr 1fr 1fr','1fr',4)">4 Columns</button>
<button class="preset" onclick="preset('1fr 1fr','1fr 1fr',4)">2×2</button>
<button class="preset" onclick="preset('1fr 1fr 1fr','1fr 1fr 1fr',9)">3×3</button>
<button class="preset" onclick="preset('200px 1fr','1fr',2)">Sidebar + Content</button>
<button class="preset" onclick="preset('1fr','auto 1fr auto',3)">Header/Content/Footer</button>
<button class="preset" onclick="preset('200px 1fr 200px','auto 1fr auto',9)">Holy Grail</button>
<button class="preset" onclick="preset('repeat(auto-fill, minmax(200px, 1fr))','1fr',6)">Auto-fill Cards</button>
</div>
</div>

<div class="card">
<h2>📐 Grid Properties</h2>
<div class="row">
<div>
<label>grid-template-columns</label>
<input type="text" id="cols" value="1fr 1fr 1fr" placeholder="1fr 1fr 1fr" oninput="update()">
</div>
<div>
<label>grid-template-rows</label>
<input type="text" id="rows" value="1fr 1fr" placeholder="auto" oninput="update()">
</div>
</div>
<div class="row-3">
<div>
<label>column-gap (px)</label>
<input type="number" id="col-gap" value="12" min="0" oninput="update()">
</div>
<div>
<label>row-gap (px)</label>
<input type="number" id="row-gap" value="12" min="0" oninput="update()">
</div>
<div>
<label>Items</label>
<input type="number" id="item-count" value="6" min="1" max="24" oninput="update()">
</div>
</div>
<div class="row">
<div>
<label>justify-items</label>
<select id="ji" onchange="update()"><option value="stretch" selected>stretch</option><option value="start">start</option><option value="end">end</option><option value="center">center</option></select>
</div>
<div>
<label>align-items</label>
<select id="ai" onchange="update()"><option value="stretch" selected>stretch</option><option value="start">start</option><option value="end">end</option><option value="center">center</option></select>
</div>
</div>
</div>

<div class="card">
<h2>👁️ Preview</h2>
<div class="grid-preview" id="grid"></div>
<p style="font-size:.8rem;color:var(--muted);margin-top:.75rem">Click an item to select it, then customize its placement below.</p>
<div id="item-panel" style="display:none;margin-top:1rem;padding:1rem;background:var(--bg);border:1px solid var(--border);border-radius:8px">
<div style="font-size:.9rem;font-weight:600;color:var(--accent);margin-bottom:.75rem">Item <span id="sel-idx"></span></div>
<div class="row-4">
<div><label>grid-column-start</label><input type="text" id="i-cs" value="auto" oninput="updateItem()"></div>
<div><label>grid-column-end</label><input type="text" id="i-ce" value="auto" oninput="updateItem()"></div>
<div><label>grid-row-start</label><input type="text" id="i-rs" value="auto" oninput="updateItem()"></div>
<div><label>grid-row-end</label><input type="text" id="i-re" value="auto" oninput="updateItem()"></div>
</div>
</div>
</div>

<div class="card">
<h2>💻 Generated CSS</h2>
<textarea id="output" readonly></textarea>
<div class="btn-row">
<button class="btn-primary" onclick="copyCSS()">📋 Copy CSS</button>
<button class="btn-secondary" onclick="copyHTML()">📋 Copy HTML</button>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
const COLORS=['#6366f1','#ec4899','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16','#f43f5e','#14b8a6','#a855f7'];
let items=[];
let selectedIdx=-1;

function $id(id){return document.getElementById(id)}

function preset(cols,rows,count){
  $id('cols').value=cols;
  $id('rows').value=rows;
  $id('item-count').value=count;
  selectedIdx=-1;
  $id('item-panel').style.display='none';
  items=[];
  for(let i=0;i<count;i++) items.push({cs:'auto',ce:'auto',rs:'auto',re:'auto'});
  update();
}

function ensureItems(){
  const n=parseInt($id('item-count').value)||1;
  while(items.length<n) items.push({cs:'auto',ce:'auto',rs:'auto',re:'auto'});
  while(items.length>n) items.pop();
  if(selectedIdx>=n){selectedIdx=-1;$id('item-panel').style.display='none';}
}

function selectItem(i){
  selectedIdx=i;
  const it=items[i];
  $id('sel-idx').textContent=i+1;
  $id('i-cs').value=it.cs;
  $id('i-ce').value=it.ce;
  $id('i-rs').value=it.rs;
  $id('i-re').value=it.re;
  $id('item-panel').style.display='block';
  renderGrid();
}

function updateItem(){
  if(selectedIdx<0)return;
  const it=items[selectedIdx];
  it.cs=$id('i-cs').value||'auto';
  it.ce=$id('i-ce').value||'auto';
  it.rs=$id('i-rs').value||'auto';
  it.re=$id('i-re').value||'auto';
  update();
}

function update(){
  ensureItems();
  renderGrid();
  generateCSS();
}

function renderGrid(){
  const g=$id('grid');
  g.style.display='grid';
  g.style.gridTemplateColumns=$id('cols').value;
  g.style.gridTemplateRows=$id('rows').value;
  g.style.columnGap=$id('col-gap').value+'px';
  g.style.rowGap=$id('row-gap').value+'px';
  g.style.justifyItems=$id('ji').value;
  g.style.alignItems=$id('ai').value;

  g.innerHTML='';
  const n=parseInt($id('item-count').value)||1;
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='grid-cell'+(i===selectedIdx?' selected':'');
    el.style.background=COLORS[i%COLORS.length];
    const it=items[i];
    if(it.cs!=='auto') el.style.gridColumnStart=it.cs;
    if(it.ce!=='auto') el.style.gridColumnEnd=it.ce;
    if(it.rs!=='auto') el.style.gridRowStart=it.rs;
    if(it.re!=='auto') el.style.gridRowEnd=it.re;
    el.textContent=i+1;
    el.onclick=(()=>{const idx=i;return()=>selectItem(idx)})();
    g.appendChild(el);
  }
}

function generateCSS(){
  let css=`.grid-container {\n  display: grid;\n`;
  css+=`  grid-template-columns: ${$id('cols').value};\n`;
  css+=`  grid-template-rows: ${$id('rows').value};\n`;
  const cg=$id('col-gap').value, rg=$id('row-gap').value;
  if(cg===rg) css+=`  gap: ${cg}px;\n`;
  else css+=`  column-gap: ${cg}px;\n  row-gap: ${rg}px;\n`;
  if($id('ji').value!=='stretch') css+=`  justify-items: ${$id('ji').value};\n`;
  if($id('ai').value!=='stretch') css+=`  align-items: ${$id('ai').value};\n`;
  css+=`}\n`;

  items.forEach((it,i)=>{
    const hasCustom=it.cs!=='auto'||it.ce!=='auto'||it.rs!=='auto'||it.re!=='auto';
    if(hasCustom){
      css+=`\n.item-${i+1} {\n`;
      if(it.cs!=='auto'||it.ce!=='auto'){
        if(it.ce!=='auto') css+=`  grid-column: ${it.cs} / ${it.ce};\n`;
        else css+=`  grid-column-start: ${it.cs};\n`;
      }
      if(it.rs!=='auto'||it.re!=='auto'){
        if(it.re!=='auto') css+=`  grid-row: ${it.rs} / ${it.re};\n`;
        else css+=`  grid-row-start: ${it.rs};\n`;
      }
      css+=`}\n`;
    }
  });

  $id('output').value=css;
}

function copyCSS(){
  navigator.clipboard.writeText($id('output').value).then(()=>toast('CSS Copied!'));
}

function copyHTML(){
  const n=parseInt($id('item-count').value)||1;
  let html='<div class="grid-container">\n';
  for(let i=0;i<n;i++) html+=`  <div class="item-${i+1}">Item ${i+1}</div>\n`;
  html+='</div>';
  navigator.clipboard.writeText(html).then(()=>toast('HTML Copied!'));
}

function toast(msg){
  const t=$id('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
}

// Init
for(let i=0;i<6;i++) items.push({cs:'auto',ce:'auto',rs:'auto',re:'auto'});
update();
</script>
</body>
</html>
