<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to Go Struct Converter — Free Online Tool</title>
    <meta name="description" content="Convert JSON objects to Go structs instantly. Generates proper Go struct definitions with json tags, nested structs, and type inference. Free, private, runs in your browser.">
    <meta name="keywords" content="JSON to Go, Go struct generator, JSON converter, Go code generator, golang struct, json tags, developer tool">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/json2go.html">
    <meta property="og:title" content="JSON to Go Struct Converter — Free Online Tool">
    <meta property="og:description" content="Convert JSON to Go structs with proper types, json tags, and nested struct support. Runs entirely in your browser.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/json2go.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="JSON to Go Struct Converter">
    <meta name="twitter:description" content="Convert JSON to Go structs with proper types, json tags, and nested struct support.">
    <link rel="stylesheet" href="toolbox.css">
</head>
<body>
    <header>
        <h1>{ } JSON → <span>Go Struct</span></h1>
        <p>Convert JSON to Go struct definitions with proper types and json tags</p>
    </header>
    <main>
        <div class="controls">
            <label for="structName">
                Root name:
                <input type="text" id="structName" value="AutoGenerated" placeholder="StructName">
            </label>
            <label><input type="checkbox" id="optInline"> Inline nested</label>
            <label><input type="checkbox" id="optOmitempty" checked> omitempty</label>
            <label><input type="checkbox" id="optPointers"> Pointer for nullable</label>
            <label><input type="checkbox" id="optExport" checked> Export fields</label>
            <button class="btn" onclick="convert()">Convert</button>
            <button class="btn btn-outline sample-link" onclick="loadSample()">Load Sample</button>
        </div>
        <div class="editor-grid">
            <div class="editor-pane">
                <div class="pane-header">
                    <span>JSON Input</span>
                    <button class="btn btn-outline" onclick="document.getElementById('jsonInput').value='';convert()">Clear</button>
                </div>
                <textarea id="jsonInput" placeholder='Paste your JSON here...&#10;&#10;{&#10;  "name": "Alice",&#10;  "age": 30,&#10;  "active": true&#10;}'></textarea>
            </div>
            <div class="editor-pane">
                <div class="pane-header">
                    <span>Go Output</span>
                    <button class="btn btn-outline" onclick="copyOutput()">Copy</button>
                </div>
                <div class="output-area" id="goOutput"></div>
            </div>
        </div>
    </main>
    <div class="toast" id="toast">Copied to clipboard!</div>
    <footer>
        <p>
            Built by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a> ·
            <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> ·
            <a href="https://stevenli-phoenix.github.io/toolbox/" target="_blank">More Tools</a>
        </p>
        <p style="margin-top:0.3rem;">Runs 100% in your browser. No data leaves your machine.</p>
    </footer>
    <script>
    const sampleJSON = `{
  "id": 1,
  "name": "Alice Wonderland",
  "email": "alice@example.com",
  "age": 30,
  "is_active": true,
  "score": 98.5,
  "tags": ["admin", "editor"],
  "address": {
    "street": "123 Main St",
    "city": "Springfield",
    "zip_code": "62704",
    "coordinates": {
      "lat": 39.7817,
      "lng": -89.6501
    }
  },
  "orders": [
    {
      "order_id": "ORD-001",
      "amount": 49.99,
      "items": ["widget", "gadget"]
    }
  ],
  "metadata": null
}`;

    function loadSample() {
        document.getElementById('jsonInput').value = sampleJSON;
        convert();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1500);
    }

    function copyOutput() {
        const text = document.getElementById('goOutput').textContent;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
    }

    function toPascalCase(s) {
        return s.replace(/(^|[_\-\s]+)(.)/g, (_, __, c) => c.toUpperCase())
                .replace(/^(.)/, c => c.toUpperCase());
    }

    function toLowerFirst(s) {
        return s.charAt(0).toLowerCase() + s.slice(1);
    }

    function goType(val, key, structs, opts) {
        if (val === null || val === undefined) {
            return opts.pointers ? '*interface{}' : 'interface{}';
        }
        switch (typeof val) {
            case 'string': return 'string';
            case 'number': return Number.isInteger(val) ? 'int64' : 'float64';
            case 'boolean': return 'bool';
            case 'object':
                if (Array.isArray(val)) {
                    if (val.length === 0) return '[]interface{}';
                    const elemType = goType(val[0], key, structs, opts);
                    // For arrays of objects, merge all object keys
                    if (typeof val[0] === 'object' && val[0] !== null && !Array.isArray(val[0])) {
                        const merged = {};
                        val.forEach(item => {
                            if (typeof item === 'object' && item !== null) {
                                Object.keys(item).forEach(k => {
                                    if (!(k in merged) || merged[k] === null) merged[k] = item[k];
                                });
                            }
                        });
                        const sName = singularize(toPascalCase(key));
                        buildStruct(sName, merged, structs, opts);
                        return '[]' + sName;
                    }
                    return '[]' + elemType;
                }
                // Nested object
                const sName = toPascalCase(key);
                buildStruct(sName, val, structs, opts);
                return sName;
            default: return 'interface{}';
        }
    }

    function singularize(s) {
        if (s.endsWith('ies')) return s.slice(0, -3) + 'y';
        if (s.endsWith('ses') || s.endsWith('xes') || s.endsWith('zes')) return s.slice(0, -2);
        if (s.endsWith('s') && !s.endsWith('ss')) return s.slice(0, -1);
        return s;
    }

    function buildStruct(name, obj, structs, opts) {
        if (structs.has(name)) return;
        const fields = [];
        structs.set(name, fields); // reserve to prevent recursion

        for (const [key, val] of Object.entries(obj)) {
            const fieldName = opts.exportFields ? toPascalCase(key) : toLowerFirst(toPascalCase(key));
            let fieldType = goType(val, key, structs, opts);

            if (val === null && opts.pointers) {
                fieldType = '*interface{}';
            }

            let tag = `json:"${key}`;
            if (opts.omitempty) tag += ',omitempty';
            tag += '"';

            fields.push({ fieldName, fieldType, tag, key });
        }
    }

    function renderStructs(name, structs, inline) {
        const lines = [];
        const rendered = new Set();

        function render(sName) {
            if (rendered.has(sName)) return;
            rendered.add(sName);
            const fields = structs.get(sName);
            if (!fields) return;

            // Render dependencies first (unless inline)
            if (!inline) {
                for (const f of fields) {
                    const cleanType = f.fieldType.replace(/^\*/, '').replace(/^\[\]/, '');
                    if (structs.has(cleanType) && !rendered.has(cleanType)) {
                        render(cleanType);
                        lines.push('');
                    }
                }
            }

            lines.push(`type ${sName} struct {`);
            // Align fields
            let maxName = 0, maxType = 0;
            for (const f of fields) {
                let ft = f.fieldType;
                if (inline && structs.has(ft.replace(/^\[\]/, ''))) {
                    ft = renderInlineType(ft, structs);
                }
                maxName = Math.max(maxName, f.fieldName.length);
                maxType = Math.max(maxType, ft.length);
            }
            for (const f of fields) {
                let ft = f.fieldType;
                if (inline && structs.has(ft.replace(/^\*/, '').replace(/^\[\]/, ''))) {
                    ft = renderInlineType(ft, structs, 1);
                }
                const pad1 = ' '.repeat(maxName - f.fieldName.length + 1);
                lines.push(`\t${f.fieldName}${pad1}${ft} \`${f.tag}\``);
            }
            lines.push('}');
        }

        render(name);

        // Render any remaining
        for (const [sName] of structs) {
            if (!rendered.has(sName)) {
                lines.push('');
                render(sName);
            }
        }

        return lines.join('\n');
    }

    function renderInlineType(typeStr, structs, depth = 0) {
        const prefix = typeStr.startsWith('[]') ? '[]' : '';
        const cleanType = typeStr.replace(/^\[\]/, '').replace(/^\*/, '');
        const fields = structs.get(cleanType);
        if (!fields) return typeStr;

        const indent = '\t'.repeat(depth + 1);
        const closeIndent = '\t'.repeat(depth);
        let result = prefix + 'struct {\n';
        for (const f of fields) {
            let ft = f.fieldType;
            const inner = ft.replace(/^\*/, '').replace(/^\[\]/, '');
            if (structs.has(inner)) {
                ft = renderInlineType(ft, structs, depth + 1);
            }
            result += `${indent}\t${f.fieldName} ${ft} \`${f.tag}\`\n`;
        }
        result += `${indent}}`;
        return result;
    }

    function convert() {
        const input = document.getElementById('jsonInput').value.trim();
        const output = document.getElementById('goOutput');

        if (!input) { output.textContent = ''; return; }

        let parsed;
        try {
            parsed = JSON.parse(input);
        } catch (e) {
            output.innerHTML = `<span class="error">// JSON Parse Error: ${e.message}</span>`;
            return;
        }

        if (typeof parsed !== 'object' || parsed === null) {
            output.innerHTML = '<span class="error">// Input must be a JSON object or array of objects</span>';
            return;
        }

        const opts = {
            omitempty: document.getElementById('optOmitempty').checked,
            pointers: document.getElementById('optPointers').checked,
            exportFields: document.getElementById('optExport').checked,
        };
        const inline = document.getElementById('optInline').checked;
        const rootName = document.getElementById('structName').value.trim() || 'AutoGenerated';

        const structs = new Map();

        if (Array.isArray(parsed)) {
            if (parsed.length === 0) {
                output.textContent = '// Empty array — cannot infer struct';
                return;
            }
            const merged = {};
            parsed.forEach(item => {
                if (typeof item === 'object' && item !== null) {
                    Object.keys(item).forEach(k => {
                        if (!(k in merged) || merged[k] === null) merged[k] = item[k];
                    });
                }
            });
            buildStruct(rootName, merged, structs, opts);
        } else {
            buildStruct(rootName, parsed, structs, opts);
        }

        const code = renderStructs(rootName, structs, inline);
        output.textContent = code;
    }

    // Auto-convert on input
    let timer;
    document.getElementById('jsonInput').addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(convert, 300);
    });
    document.querySelectorAll('#structName, #optInline, #optOmitempty, #optPointers, #optExport').forEach(el => {
        el.addEventListener('change', convert);
        el.addEventListener('input', convert);
    });
    </script>
</body>
</html>
