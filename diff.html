<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff Tool - Free Online Text Compare</title>
<meta name="description" content="Free online text diff tool. Compare two texts side by side with highlighted differences. No data sent to any server.">
<meta name="keywords" content="text diff, compare text, diff tool, text compare, online diff, free diff tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/diff.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .input-col{display:grid;gap:6px}
  .input-col textarea{min-height:180px}
  .toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:400;font-size:.85rem}
  .toggle input{accent-color:var(--accent)}
  .diff-view{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:0;font-family:var(--mono);font-size:.82rem;line-height:1.7;overflow:auto;max-height:60vh}
  .diff-line{padding:2px 12px;white-space:pre-wrap;word-break:break-word;border-left:3px solid transparent}
  .diff-line.ctx{color:var(--text);border-left-color:transparent}
  .diff-line.del{background:#fef2f2;color:#991b1b;border-left-color:var(--error)}
  .diff-line.add{background:#ecfdf5;color:#166534;border-left-color:var(--success)}
  .ln{display:inline-block;width:36px;color:var(--muted);text-align:right;margin-right:8px;user-select:none;font-size:.75rem}
  @media(max-width:768px){.inputs{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Text Diff Tool</h1>
<p class="subtitle">Compare two texts and see the differences highlighted</p>

<div class="card">
<h2>📝 Input</h2>
<div class="inputs">
<div class="input-col">
<label>Original Text</label>
<textarea id="textA" placeholder="Paste original text here..."></textarea>
</div>
<div class="input-col">
<label>Modified Text</label>
<textarea id="textB" placeholder="Paste modified text here..."></textarea>
</div>
</div>
<div class="btn-row">
<button class="btn-primary" onclick="compare()">Compare</button>
<button class="btn-secondary" onclick="swap()">⇄ Swap</button>
<button class="btn-secondary" onclick="clearAll()">Clear</button>
</div>
</div>

<div class="card" id="resultCard" style="display:none">
<h2>🔍 Differences</h2>
<div class="toggle-row">
<label class="toggle"><input type="checkbox" id="ignoreWs" onchange="compare()"><span>Ignore whitespace</span></label>
<label class="toggle"><input type="checkbox" id="ignoreCase" onchange="compare()"><span>Ignore case</span></label>
</div>
<div class="stats" id="stats"></div>
<div class="diff-view" id="diffView"></div>
<div class="btn-row">
<button class="btn-secondary" onclick="copyDiff()">📋 Copy Diff</button>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Myers diff (line-level)
function diffLines(a,b){
  const N=a.length,M=b.length,MAX=N+M;
  if(MAX===0)return[];
  const V=new Int32Array(2*MAX+2);
  V.fill(-1);
  const off=MAX;
  V[off+1]=0;
  const trace=[];
  outer:
  for(let d=0;d<=MAX;d++){
    const snap=V.slice();
    trace.push(snap);
    for(let k=-d;k<=d;k+=2){
      let x;
      if(k===-d||k!==d&&V[off+k-1]<V[off+k+1]){x=V[off+k+1];}
      else{x=V[off+k-1]+1;}
      let y=x-k;
      while(x<N&&y<M&&a[x]===b[y]){x++;y++;}
      V[off+k]=x;
      if(x>=N&&y>=M) break outer;
    }
  }
  // backtrack
  const edits=[];
  let x=N,y=M;
  for(let d=trace.length-1;d>0;d--){
    const prev=trace[d-1];
    const k=x-y;
    let pk;
    if(k===-d||k!==d&&prev[off+k-1]<prev[off+k+1]){pk=k+1;}
    else{pk=k-1;}
    const px=prev[off+pk],py=px-pk;
    while(x>px&&y>py){x--;y--;edits.unshift({type:'ctx',a:x,b:y});}
    if(x>px){x--;edits.unshift({type:'del',a:x});}
    else if(y>py){y--;edits.unshift({type:'add',b:y});}
  }
  while(x>0&&y>0){x--;y--;edits.unshift({type:'ctx',a:x,b:y});}
  if(x>0) edits.unshift({type:'del',a:0});
  if(y>0) edits.unshift({type:'add',b:0});
  return edits;
}

function compare(){
  const ignWs=$('ignoreWs').checked;
  const ignCase=$('ignoreCase').checked;
  let rawA=$('textA').value,rawB=$('textB').value;
  const linesA=rawA.split('\n'),linesB=rawB.split('\n');
  const norm=s=>{
    let r=s;
    if(ignWs) r=r.replace(/\s+/g,' ').trim();
    if(ignCase) r=r.toLowerCase();
    return r;
  };
  const nA=linesA.map(norm),nB=linesB.map(norm);
  const edits=diffLines(nA,nB);

  let added=0,removed=0,unchanged=0;
  const html=[];
  for(const e of edits){
    if(e.type==='ctx'){
      unchanged++;
      html.push(`<div class="diff-line ctx"><span class="ln">${e.a+1}</span> ${esc(linesA[e.a])}</div>`);
    } else if(e.type==='del'){
      removed++;
      html.push(`<div class="diff-line del"><span class="ln">${e.a+1}</span>-${esc(linesA[e.a])}</div>`);
    } else {
      added++;
      html.push(`<div class="diff-line add"><span class="ln">${e.b+1}</span>+${esc(linesB[e.b])}</div>`);
    }
  }

  $('resultCard').style.display='block';
  $('stats').textContent=`${added} addition${added!==1?'s':''}, ${removed} deletion${removed!==1?'s':''}, ${unchanged} unchanged line${unchanged!==1?'s':''}`;

  if(!added&&!removed){
    $('diffView').innerHTML='<div class="empty">Texts are identical</div>';
  } else {
    $('diffView').innerHTML=html.join('');
  }
}

function swap(){
  const a=$('textA').value,b=$('textB').value;
  $('textA').value=b;$('textB').value=a;
  if($('resultCard').style.display!=='none') compare();
}

function clearAll(){
  $('textA').value='';$('textB').value='';
  $('resultCard').style.display='none';
}

function copyDiff(){
  const lines=[...$('diffView').querySelectorAll('.diff-line')].map(el=>{
    const prefix=el.classList.contains('add')?'+':el.classList.contains('del')?'-':' ';
    return prefix+el.textContent.replace(/^\d+/,'').trim();
  }).join('\n');
  navigator.clipboard.writeText(lines).then(()=>{
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}
</script>
</body>
</html>
