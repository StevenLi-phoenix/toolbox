<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}
header{background:#161b22;border-bottom:1px solid #30363d;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
header h1{font-size:1.25rem;color:#f0f6fc}
header nav{display:flex;gap:1rem;align-items:center;font-size:.875rem}
.coffee-btn{background:#ffdd00;color:#000;padding:.4rem .8rem;border-radius:6px;font-weight:600;font-size:.8rem;white-space:nowrap}
.coffee-btn:hover{text-decoration:none;opacity:.9}
main{flex:1;max-width:1100px;width:100%;margin:0 auto;padding:1.5rem}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.panel{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1.25rem}
.panel h2{font-size:1rem;color:#f0f6fc;margin-bottom:1rem}
/* Canvas area */
.canvas-wrap{position:relative;width:100%;aspect-ratio:1;margin-bottom:1rem}
canvas{width:100%;height:100%;display:block;border-radius:8px;cursor:crosshair}
/* Output */
.output-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
.output-row code{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:.5rem .75rem;font-size:.875rem;color:#7ee787;font-family:'SF Mono',Consolas,monospace;overflow-x:auto;white-space:nowrap}
.btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:.45rem .85rem;border-radius:6px;cursor:pointer;font-size:.8rem;white-space:nowrap}
.btn:hover{background:#30363d}
.btn-primary{background:#238636;border-color:#2ea043;color:#fff}
.btn-primary:hover{background:#2ea043}
/* Sliders */
.slider-group{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.slider-item label{display:block;font-size:.75rem;color:#8b949e;margin-bottom:.25rem}
.slider-item input[type=number]{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:.35rem .5rem;color:#c9d1d9;font-size:.85rem;font-family:inherit}
/* Presets */
.presets{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
.preset-btn{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:.3rem .6rem;border-radius:5px;cursor:pointer;font-size:.75rem;transition:all .15s}
.preset-btn:hover,.preset-btn.active{background:#388bfd;border-color:#388bfd;color:#fff}
/* Preview */
.preview-track{position:relative;height:48px;background:#0d1117;border:1px solid #30363d;border-radius:8px;margin-bottom:.75rem;overflow:hidden}
.preview-ball{position:absolute;top:50%;left:8px;width:32px;height:32px;background:#388bfd;border-radius:50%;transform:translateY(-50%);transition-property:left;transition-duration:1.5s}
.preview-track-bar{position:relative;height:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;margin-bottom:.75rem;overflow:hidden}
.preview-bar-fill{height:100%;width:0;background:linear-gradient(90deg,#388bfd,#a371f7);border-radius:6px;transition-property:width;transition-duration:1.5s}
.preview-box{width:60px;height:60px;background:#388bfd;border-radius:8px;margin:0 auto .75rem;transition-property:transform;transition-duration:1.5s}
.duration-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;font-size:.8rem}
.duration-row input{width:80px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:.3rem .5rem;color:#c9d1d9;font-size:.85rem}
.compare-section{margin-top:1rem}
.compare-section h3{font-size:.85rem;color:#8b949e;margin-bottom:.5rem}
.compare-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem;font-size:.75rem}
.compare-label{width:70px;color:#8b949e;flex-shrink:0}
.compare-track{flex:1;height:8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;position:relative;overflow:hidden}
.compare-dot{position:absolute;top:50%;left:0;width:12px;height:12px;background:#f78166;border-radius:50%;transform:translate(-50%,-50%);transition-property:left;transition-duration:1.5s}
footer{text-align:center;padding:1rem;font-size:.8rem;color:#484f58;border-top:1px solid #30363d;margin-top:1rem}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#2ea043;color:#fff;padding:.5rem 1.2rem;border-radius:8px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  header{flex-direction:column;align-items:flex-start}
  .slider-group{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<header>
  <h1>🎢 CSS Easing / Cubic Bezier Generator</h1>
  <nav>
    <a href="index.html">← All Tools</a>
    <a href="https://buymeacoffee.com/stevenli.phoenix" class="coffee-btn" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
  </nav>
</header>

<main>
<div class="layout">
  <!-- Left: Editor -->
  <div class="panel">
    <h2>Curve Editor</h2>
    <div class="canvas-wrap">
      <canvas id="curve" width="400" height="400"></canvas>
    </div>
    <div class="slider-group">
      <div class="slider-item"><label>x1</label><input type="number" id="x1" step="0.01" min="-0.5" max="1.5" value="0.25"></div>
      <div class="slider-item"><label>y1</label><input type="number" id="y1" step="0.01" min="-1.5" max="2.5" value="0.1"></div>
      <div class="slider-item"><label>x2</label><input type="number" id="x2" step="0.01" min="-0.5" max="1.5" value="0.25"></div>
      <div class="slider-item"><label>y2</label><input type="number" id="y2" step="0.01" min="-1.5" max="2.5" value="1.0"></div>
    </div>
    <div class="output-row">
      <code id="cssOutput">cubic-bezier(0.25, 0.10, 0.25, 1.00)</code>
      <button class="btn btn-primary" onclick="copyCSS()">Copy</button>
    </div>
    <h2>Presets</h2>
    <div class="presets" id="presets"></div>
  </div>

  <!-- Right: Preview -->
  <div class="panel">
    <h2>Live Preview</h2>
    <div class="duration-row">
      <label>Duration:</label>
      <input type="number" id="duration" value="1.5" step="0.1" min="0.1" max="10"> <span>s</span>
      <button class="btn" onclick="playPreview()">▶ Play</button>
      <button class="btn" onclick="resetPreview()">↺ Reset</button>
    </div>

    <p style="font-size:.75rem;color:#8b949e;margin-bottom:.35rem">Ball</p>
    <div class="preview-track">
      <div class="preview-ball" id="ball"></div>
    </div>

    <p style="font-size:.75rem;color:#8b949e;margin-bottom:.35rem">Progress Bar</p>
    <div class="preview-track-bar">
      <div class="preview-bar-fill" id="barFill"></div>
    </div>

    <p style="font-size:.75rem;color:#8b949e;margin-bottom:.35rem">Scale</p>
    <div style="display:flex;justify-content:center;margin-bottom:1rem">
      <div class="preview-box" id="scaleBox"></div>
    </div>

    <div class="compare-section">
      <h3>Compare with Standard Easings</h3>
      <div id="compareRows"></div>
    </div>
  </div>
</div>
</main>

<footer>
  CSS Easing Generator — Part of <a href="index.html">DevToolbox</a> |
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Support this project</a>
</footer>

<div class="toast" id="toast">Copied!</div>

<script>
const presets = [
  {name:'ease',v:[.25,.1,.25,1]},
  {name:'ease-in',v:[.42,0,1,1]},
  {name:'ease-out',v:[0,0,.58,1]},
  {name:'ease-in-out',v:[.42,0,.58,1]},
  {name:'linear',v:[0,0,1,1]},
  {name:'easeInSine',v:[.12,0,.39,0]},
  {name:'easeOutSine',v:[.61,1,.88,1]},
  {name:'easeInOutSine',v:[.37,0,.63,1]},
  {name:'easeInQuad',v:[.11,0,.5,0]},
  {name:'easeOutQuad',v:[.5,1,.89,1]},
  {name:'easeInOutQuad',v:[.45,0,.55,1]},
  {name:'easeInCubic',v:[.32,0,.67,0]},
  {name:'easeOutCubic',v:[.33,1,.68,1]},
  {name:'easeInOutCubic',v:[.65,0,.35,1]},
  {name:'easeInQuart',v:[.5,0,.75,0]},
  {name:'easeOutQuart',v:[.25,1,.5,1]},
  {name:'easeInBack',v:[.36,0,.66,-.56]},
  {name:'easeOutBack',v:[.34,1.56,.64,1]},
  {name:'easeInOutBack',v:[.68,-.6,.32,1.6]},
  {name:'easeOutElastic',v:[.22,1,.36,1]},
  {name:'snappy',v:[.5,0,.1,1]},
  {name:'smooth',v:[.4,0,.2,1]},
];

const compareEasings = [
  {name:'linear',v:'cubic-bezier(0,0,1,1)'},
  {name:'ease',v:'cubic-bezier(.25,.1,.25,1)'},
  {name:'ease-in',v:'cubic-bezier(.42,0,1,1)'},
  {name:'ease-out',v:'cubic-bezier(0,0,.58,1)'},
  {name:'yours',v:null},
];

const canvas = document.getElementById('curve');
const ctx = canvas.getContext('2d');
const inputs = {x1:document.getElementById('x1'),y1:document.getElementById('y1'),x2:document.getElementById('x2'),y2:document.getElementById('y2')};
const cssOut = document.getElementById('cssOutput');
let dpr = window.devicePixelRatio || 1;
let W, H, pad = 40;
let dragging = null; // 1 or 2

function initCanvas(){
  const rect = canvas.getBoundingClientRect();
  W = rect.width * dpr;
  H = rect.height * dpr;
  canvas.width = W;
  canvas.height = H;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function vals(){
  return [parseFloat(inputs.x1.value)||0,parseFloat(inputs.y1.value)||0,parseFloat(inputs.x2.value)||0,parseFloat(inputs.y2.value)||0];
}

function toCanvas(x, y){
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;
  const plotW = w - pad*2;
  const plotH = h - pad*2;
  // y is inverted; map 0->bottom, 1->top but allow overshoot
  return [pad + x * plotW, pad + (1-y) * plotH];
}

function fromCanvas(cx, cy){
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;
  const plotW = w - pad*2;
  const plotH = h - pad*2;
  return [(cx - pad)/plotW, 1-(cy - pad)/plotH];
}

function draw(){
  const w = canvas.getBoundingClientRect().width;
  const h = canvas.getBoundingClientRect().height;
  ctx.clearRect(0,0,w,h);
  const [x1,y1,x2,y2] = vals();

  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0,0,w,h);

  // Grid
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  for(let i=0;i<=10;i++){
    const [gx,gy] = toCanvas(i/10,0);
    const [,gy2] = toCanvas(0,i/10);
    ctx.beginPath(); ctx.moveTo(gx,pad); ctx.lineTo(gx,h-pad); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad,gy2); ctx.lineTo(w-pad,gy2); ctx.stroke();
  }

  // Axes labels
  ctx.fillStyle = '#484f58';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Time →', w/2, h - 8);
  ctx.save();
  ctx.translate(12, h/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('Progress →', 0, 0);
  ctx.restore();

  // Linear reference
  const [lx0,ly0] = toCanvas(0,0);
  const [lx1,ly1] = toCanvas(1,1);
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(lx0,ly0); ctx.lineTo(lx1,ly1); ctx.stroke();
  ctx.setLineDash([]);

  // Control handles
  const [p0x,p0y] = toCanvas(0,0);
  const [c1x,c1y] = toCanvas(x1,y1);
  const [c2x,c2y] = toCanvas(x2,y2);
  const [p1x,p1y] = toCanvas(1,1);

  ctx.strokeStyle = '#f78166';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(p0x,p0y); ctx.lineTo(c1x,c1y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p1x,p1y); ctx.lineTo(c2x,c2y); ctx.stroke();
  ctx.setLineDash([]);

  // Curve
  ctx.strokeStyle = '#388bfd';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(p0x,p0y);
  ctx.bezierCurveTo(c1x,c1y,c2x,c2y,p1x,p1y);
  ctx.stroke();

  // Control points
  [[[c1x,c1y],'#f78166'],[[c2x,c2y],'#a371f7']].forEach(([[cx,cy],col])=>{
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx,cy,7,0,Math.PI*2); ctx.stroke();
  });

  // Endpoints
  [[p0x,p0y],[p1x,p1y]].forEach(([ex,ey])=>{
    ctx.fillStyle = '#c9d1d9';
    ctx.beginPath(); ctx.arc(ex,ey,5,0,Math.PI*2); ctx.fill();
  });

  updateOutput();
}

function updateOutput(){
  const [x1,y1,x2,y2] = vals();
  cssOut.textContent = `cubic-bezier(${x1.toFixed(2)}, ${y1.toFixed(2)}, ${x2.toFixed(2)}, ${y2.toFixed(2)})`;
}

function copyCSS(){
  navigator.clipboard.writeText(cssOut.textContent).then(()=>showToast('Copied!'));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

// Mouse / touch drag
function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  return [x,y];
}

function hitTest(mx,my){
  const [x1,y1,x2,y2] = vals();
  const [c1x,c1y] = toCanvas(x1,y1);
  const [c2x,c2y] = toCanvas(x2,y2);
  const d1 = Math.hypot(mx-c1x, my-c1y);
  const d2 = Math.hypot(mx-c2x, my-c2y);
  if(d1 < 20) return 1;
  if(d2 < 20) return 2;
  return null;
}

canvas.addEventListener('mousedown', e=>{
  const [mx,my] = getPos(e);
  dragging = hitTest(mx,my);
});
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const [mx,my] = getPos(e);
  dragging = hitTest(mx,my);
},{passive:false});

function onMove(e){
  if(!dragging) return;
  e.preventDefault();
  const [mx,my] = getPos(e);
  let [fx,fy] = fromCanvas(mx,my);
  fx = Math.max(-0.5, Math.min(1.5, fx));
  fy = Math.max(-1.5, Math.min(2.5, fy));
  if(dragging===1){inputs.x1.value=fx.toFixed(2);inputs.y1.value=fy.toFixed(2);}
  else{inputs.x2.value=fx.toFixed(2);inputs.y2.value=fy.toFixed(2);}
  draw();
}
document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, {passive:false});
document.addEventListener('mouseup', ()=>dragging=null);
document.addEventListener('touchend', ()=>dragging=null);

// Input changes
Object.values(inputs).forEach(inp=>inp.addEventListener('input',draw));

// Presets
const presetsEl = document.getElementById('presets');
presets.forEach(p=>{
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.textContent = p.name;
  btn.onclick = ()=>{
    inputs.x1.value=p.v[0]; inputs.y1.value=p.v[1];
    inputs.x2.value=p.v[2]; inputs.y2.value=p.v[3];
    document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    draw();
  };
  presetsEl.appendChild(btn);
});

// Preview
const ball = document.getElementById('ball');
const barFill = document.getElementById('barFill');
const scaleBox = document.getElementById('scaleBox');

function getEasing(){return cssOut.textContent;}
function getDuration(){return (parseFloat(document.getElementById('duration').value)||1.5)+'s';}

let playing = false;
function playPreview(){
  if(playing) resetPreview();
  const e = getEasing();
  const d = getDuration();
  playing = true;

  [ball,barFill,scaleBox].forEach(el=>{
    el.style.transitionTimingFunction = e;
    el.style.transitionDuration = d;
  });

  // Compare rows
  document.querySelectorAll('.compare-dot').forEach((dot,i)=>{
    if(compareEasings[i].name==='yours') dot.style.transitionTimingFunction = e;
    dot.style.transitionDuration = d;
  });

  requestAnimationFrame(()=>{
    ball.style.left = 'calc(100% - 40px)';
    barFill.style.width = '100%';
    scaleBox.style.transform = 'scale(1.5) rotate(180deg)';
    document.querySelectorAll('.compare-dot').forEach(dot=>{
      dot.style.left = '100%';
    });
  });
}

function resetPreview(){
  playing = false;
  [ball,barFill,scaleBox].forEach(el=>{
    el.style.transitionDuration = '0s';
  });
  document.querySelectorAll('.compare-dot').forEach(dot=>{
    dot.style.transitionDuration = '0s';
  });
  requestAnimationFrame(()=>{
    ball.style.left = '8px';
    barFill.style.width = '0';
    scaleBox.style.transform = 'scale(1) rotate(0deg)';
    document.querySelectorAll('.compare-dot').forEach(dot=>{
      dot.style.left = '0';
    });
  });
}

// Compare rows
const compareEl = document.getElementById('compareRows');
compareEasings.forEach(ce=>{
  const row = document.createElement('div');
  row.className = 'compare-row';
  const lbl = document.createElement('span');
  lbl.className = 'compare-label';
  lbl.textContent = ce.name;
  if(ce.name==='yours') lbl.style.color='#388bfd';
  const track = document.createElement('div');
  track.className = 'compare-track';
  const dot = document.createElement('div');
  dot.className = 'compare-dot';
  if(ce.v) dot.style.transitionTimingFunction = ce.v;
  if(ce.name==='yours') dot.style.background = '#388bfd';
  track.appendChild(dot);
  row.appendChild(lbl);
  row.appendChild(track);
  compareEl.appendChild(row);
});

// Init
window.addEventListener('resize',()=>{initCanvas();draw();});
initCanvas();
draw();
</script>
</body>
</html>
