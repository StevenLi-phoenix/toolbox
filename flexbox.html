<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Flexbox Playground - Free Online Tool</title>
<meta name="description" content="Free interactive CSS Flexbox playground. Visualize flex container and item properties in real-time. Learn flexbox by experimenting. Copy CSS instantly.">
<meta name="keywords" content="flexbox playground, css flexbox, flex container, flex items, flexbox generator, css layout tool, learn flexbox, free flexbox tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/flexbox.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--error:#ef4444;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:1000px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.3rem}
select,input[type="number"]{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.45rem .6rem;font-family:var(--font);font-size:.85rem}
select:focus,input:focus{outline:none;border-color:var(--accent)}
.props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem}
.prop-group{display:flex;flex-direction:column}
button{padding:.5rem 1rem;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-sm{padding:.35rem .7rem;font-size:.8rem}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
.playground{background:var(--bg);border:2px dashed var(--border);border-radius:var(--radius);min-height:300px;padding:1rem;transition:all .3s;position:relative}
.flex-item{border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:#fff;cursor:pointer;transition:all .2s;min-width:40px;min-height:40px;user-select:none}
.flex-item:hover{opacity:.85;outline:2px solid var(--accent)}
.flex-item.selected{outline:2px solid var(--success)}
.item-colors{--c1:#6366f1;--c2:#ec4899;--c3:#f59e0b;--c4:#10b981;--c5:#ef4444;--c6:#8b5cf6;--c7:#06b6d4;--c8:#f97316}
textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:'Courier New',monospace;font-size:.85rem;min-height:140px;resize:vertical;line-height:1.5}
textarea:focus{outline:none;border-color:var(--accent)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.item-controls{margin-top:1rem;padding:1rem;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.item-controls h3{font-size:.9rem;margin-bottom:.75rem;color:var(--accent)}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
@media(max-width:600px){.props-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>CSS Flexbox Playground</h1>
<p class="subtitle">Experiment with flexbox properties and see the result instantly</p>

<div class="card">
<h2>📦 Container Properties</h2>
<div class="props-grid">
<div class="prop-group">
<label>display</label>
<select id="c-display" onchange="update()"><option value="flex" selected>flex</option><option value="inline-flex">inline-flex</option></select>
</div>
<div class="prop-group">
<label>flex-direction</label>
<select id="c-direction" onchange="update()"><option value="row" selected>row</option><option value="row-reverse">row-reverse</option><option value="column">column</option><option value="column-reverse">column-reverse</option></select>
</div>
<div class="prop-group">
<label>flex-wrap</label>
<select id="c-wrap" onchange="update()"><option value="nowrap" selected>nowrap</option><option value="wrap">wrap</option><option value="wrap-reverse">wrap-reverse</option></select>
</div>
<div class="prop-group">
<label>justify-content</label>
<select id="c-justify" onchange="update()"><option value="flex-start" selected>flex-start</option><option value="flex-end">flex-end</option><option value="center">center</option><option value="space-between">space-between</option><option value="space-around">space-around</option><option value="space-evenly">space-evenly</option></select>
</div>
<div class="prop-group">
<label>align-items</label>
<select id="c-align" onchange="update()"><option value="stretch" selected>stretch</option><option value="flex-start">flex-start</option><option value="flex-end">flex-end</option><option value="center">center</option><option value="baseline">baseline</option></select>
</div>
<div class="prop-group">
<label>align-content</label>
<select id="c-acontent" onchange="update()"><option value="stretch" selected>stretch</option><option value="flex-start">flex-start</option><option value="flex-end">flex-end</option><option value="center">center</option><option value="space-between">space-between</option><option value="space-around">space-around</option></select>
</div>
<div class="prop-group">
<label>gap (px)</label>
<input type="number" id="c-gap" value="10" min="0" max="100" onchange="update()" oninput="update()">
</div>
</div>
<div class="btn-row">
<button class="btn-secondary btn-sm" onclick="addItem()">+ Add Item</button>
<button class="btn-secondary btn-sm" onclick="removeItem()">− Remove Item</button>
<button class="btn-secondary btn-sm" onclick="resetItems()">↺ Reset</button>
</div>
</div>

<div class="card">
<h2>👁️ Preview</h2>
<div class="playground item-colors" id="playground"></div>
<div class="item-controls" id="item-panel" style="display:none">
<h3>🎯 Item <span id="sel-idx"></span> Properties</h3>
<div class="props-grid">
<div class="prop-group">
<label>order</label>
<input type="number" id="i-order" value="0" onchange="updateItem()" oninput="updateItem()">
</div>
<div class="prop-group">
<label>flex-grow</label>
<input type="number" id="i-grow" value="0" min="0" onchange="updateItem()" oninput="updateItem()">
</div>
<div class="prop-group">
<label>flex-shrink</label>
<input type="number" id="i-shrink" value="1" min="0" onchange="updateItem()" oninput="updateItem()">
</div>
<div class="prop-group">
<label>flex-basis (px or auto)</label>
<input type="text" id="i-basis" value="auto" onchange="updateItem()" oninput="updateItem()" style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.45rem .6rem;font-size:.85rem">
</div>
<div class="prop-group">
<label>align-self</label>
<select id="i-self" onchange="updateItem()"><option value="auto" selected>auto</option><option value="flex-start">flex-start</option><option value="flex-end">flex-end</option><option value="center">center</option><option value="stretch">stretch</option><option value="baseline">baseline</option></select>
</div>
<div class="prop-group">
<label>width (px)</label>
<input type="number" id="i-width" value="80" min="20" max="400" onchange="updateItem()" oninput="updateItem()">
</div>
<div class="prop-group">
<label>height (px)</label>
<input type="number" id="i-height" value="80" min="20" max="400" onchange="updateItem()" oninput="updateItem()">
</div>
</div>
</div>
</div>

<div class="card">
<h2>💻 Generated CSS</h2>
<textarea id="output" readonly></textarea>
<div class="btn-row">
<button class="btn-primary" onclick="copyCSS()">📋 Copy CSS</button>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
const COLORS=['#6366f1','#ec4899','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316'];
let items=[
  {w:80,h:80,grow:0,shrink:1,basis:'auto',order:0,self:'auto'},
  {w:100,h:60,grow:0,shrink:1,basis:'auto',order:0,self:'auto'},
  {w:60,h:100,grow:0,shrink:1,basis:'auto',order:0,self:'auto'},
  {w:80,h:80,grow:0,shrink:1,basis:'auto',order:0,self:'auto'}
];
let selectedIdx=-1;

function $id(id){return document.getElementById(id)}

function addItem(){
  items.push({w:80,h:80,grow:0,shrink:1,basis:'auto',order:0,self:'auto'});
  update();
}
function removeItem(){
  if(items.length>1){
    if(selectedIdx===items.length-1) selectedIdx=-1;
    items.pop();update();
  }
}
function resetItems(){
  items=[
    {w:80,h:80,grow:0,shrink:1,basis:'auto',order:0,self:'auto'},
    {w:100,h:60,grow:0,shrink:1,basis:'auto',order:0,self:'auto'},
    {w:60,h:100,grow:0,shrink:1,basis:'auto',order:0,self:'auto'},
    {w:80,h:80,grow:0,shrink:1,basis:'auto',order:0,self:'auto'}
  ];
  selectedIdx=-1;
  $id('item-panel').style.display='none';
  update();
}

function selectItem(i){
  selectedIdx=i;
  const it=items[i];
  $id('sel-idx').textContent=i+1;
  $id('i-order').value=it.order;
  $id('i-grow').value=it.grow;
  $id('i-shrink').value=it.shrink;
  $id('i-basis').value=it.basis;
  $id('i-self').value=it.self;
  $id('i-width').value=it.w;
  $id('i-height').value=it.h;
  $id('item-panel').style.display='block';
  renderItems();
}

function updateItem(){
  if(selectedIdx<0)return;
  const it=items[selectedIdx];
  it.order=parseInt($id('i-order').value)||0;
  it.grow=parseFloat($id('i-grow').value)||0;
  it.shrink=parseFloat($id('i-shrink').value)||0;
  it.basis=$id('i-basis').value||'auto';
  it.self=$id('i-self').value;
  it.w=parseInt($id('i-width').value)||80;
  it.h=parseInt($id('i-height').value)||80;
  update();
}

function update(){
  renderItems();
  generateCSS();
}

function renderItems(){
  const pg=$id('playground');
  const d=$id('c-display').value;
  const dir=$id('c-direction').value;
  const wrap=$id('c-wrap').value;
  const jc=$id('c-justify').value;
  const ai=$id('c-align').value;
  const ac=$id('c-acontent').value;
  const gap=$id('c-gap').value;

  pg.style.display=d;
  pg.style.flexDirection=dir;
  pg.style.flexWrap=wrap;
  pg.style.justifyContent=jc;
  pg.style.alignItems=ai;
  pg.style.alignContent=ac;
  pg.style.gap=gap+'px';

  pg.innerHTML='';
  items.forEach((it,i)=>{
    const el=document.createElement('div');
    el.className='flex-item'+(i===selectedIdx?' selected':'');
    el.style.background=COLORS[i%COLORS.length];
    el.style.width=it.w+'px';
    el.style.height=it.h+'px';
    el.style.order=it.order;
    el.style.flexGrow=it.grow;
    el.style.flexShrink=it.shrink;
    el.style.flexBasis=it.basis==='auto'?'auto':it.basis+'px';
    el.style.alignSelf=it.self;
    el.textContent=i+1;
    el.onclick=()=>selectItem(i);
    pg.appendChild(el);
  });
}

function generateCSS(){
  const v=id=>$id(id).value;
  let css=`.container {\n`;
  css+=`  display: ${v('c-display')};\n`;
  css+=`  flex-direction: ${v('c-direction')};\n`;
  css+=`  flex-wrap: ${v('c-wrap')};\n`;
  css+=`  justify-content: ${v('c-justify')};\n`;
  css+=`  align-items: ${v('c-align')};\n`;
  css+=`  align-content: ${v('c-acontent')};\n`;
  css+=`  gap: ${v('c-gap')}px;\n`;
  css+=`}\n`;

  items.forEach((it,i)=>{
    const hasCustom=it.grow||it.shrink!==1||it.basis!=='auto'||it.order||it.self!=='auto';
    if(hasCustom){
      css+=`\n.item-${i+1} {\n`;
      if(it.order) css+=`  order: ${it.order};\n`;
      if(it.grow||it.shrink!==1||it.basis!=='auto') css+=`  flex: ${it.grow} ${it.shrink} ${it.basis==='auto'?'auto':it.basis+'px'};\n`;
      if(it.self!=='auto') css+=`  align-self: ${it.self};\n`;
      css+=`}\n`;
    }
  });

  $id('output').value=css;
}

function copyCSS(){
  navigator.clipboard.writeText($id('output').value).then(()=>{
    const t=$id('toast');t.textContent='Copied!';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

update();
</script>
</body>
</html>
