<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Diff Viewer - Compare JSON Objects | Free Online Tool</title>
<meta name="description" content="Compare two JSON objects side by side with structured diff highlighting. See added, removed, and changed keys instantly. Free online JSON comparison tool.">
<meta name="keywords" content="json diff, json compare, json difference, json viewer, compare json objects, json diff tool, api debugging">
<meta property="og:title" content="JSON Diff Viewer - Compare JSON Objects">
<meta property="og:description" content="Compare two JSON objects with structured, color-coded diff. See additions, removals, and changes at a glance.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/jsondiff.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="JSON Diff Viewer">
<meta name="twitter:description" content="Compare two JSON objects with structured, color-coded diff highlighting.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/jsondiff.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  main{max-width:1100px;margin:0 auto;padding:0 20px 20px}
  .inputs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
  .input-group label{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--muted)}
  .input-group textarea{width:100%;min-height:200px;resize:vertical;font-family:var(--mono);font-size:.85rem;line-height:1.5;padding:10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none}
  .input-group textarea:focus{border-color:var(--accent)}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toggle-group{display:flex;gap:0;margin-left:auto}
  .toggle-group button{border-radius:0;border:1px solid var(--border);font-size:.82rem;padding:6px 12px}
  .toggle-group button:first-child{border-radius:var(--radius) 0 0 var(--radius)}
  .toggle-group button:last-child{border-radius:0 var(--radius) var(--radius) 0;border-left:none}
  .toggle-group button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .stats{display:flex;gap:10px;font-size:.82rem;font-weight:600}
  .stat-added{color:var(--success)}.stat-removed{color:var(--error)}.stat-changed{color:var(--warning)}.stat-same{color:var(--muted)}
  .diff-view{border:1px solid var(--border);border-radius:var(--radius);overflow:auto;max-height:500px;font-family:var(--mono);font-size:.82rem;line-height:1.6}
  .diff-line{display:flex}
  .diff-gutter{min-width:40px;text-align:right;padding:0 8px;color:var(--muted);font-size:.75rem;user-select:none}
  .diff-marker{min-width:20px;text-align:center;font-weight:700}
  .diff-content{flex:1;padding:0 8px;white-space:pre}
  .diff-line.added{background:#ecfdf5}.diff-line.added .diff-marker{color:var(--success)}
  .diff-line.removed{background:#fef2f2}.diff-line.removed .diff-marker{color:var(--error)}
  .diff-line.changed{background:#fefce8}.diff-line.changed .diff-marker{color:var(--warning)}
  .diff-line.section .diff-content{font-weight:600;color:var(--muted)}
  .inline-removed{text-decoration:line-through;color:var(--error)}
  .inline-added{color:var(--success);font-weight:600}
  .empty-state{padding:24px;text-align:center;color:var(--muted);font-family:var(--sans)}
  .result{margin-bottom:14px}
  @media(max-width:768px){.inputs{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1><span>{ }</span> JSON Diff Viewer</h1>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener" class="coffee">☕ Buy Me a Coffee</a>
</header>
<main>
  <div class="inputs">
    <div class="input-group">
      <label>Original (Left) <button onclick="formatInput('left')">Format</button></label>
      <textarea id="left" placeholder='{"name": "Alice", "age": 30}' spellcheck="false"></textarea>
    </div>
    <div class="input-group">
      <label>Modified (Right) <button onclick="formatInput('right')">Format</button></label>
      <textarea id="right" placeholder='{"name": "Bob", "age": 31}' spellcheck="false"></textarea>
    </div>
  </div>
  <div class="controls">
    <button onclick="compare()">Compare</button>
    <button class="btn-secondary" onclick="swapInputs()">⇄ Swap</button>
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
    <div class="toggle-group">
      <button class="active" id="btn-struct" onclick="setMode('struct')">Structured</button>
      <button id="btn-flat" onclick="setMode('flat')">Flat Paths</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="result">
    <div class="diff-view" id="output">
      <div class="empty-state">
        <p>Paste two JSON objects and click <strong>Compare</strong></p>
      </div>
    </div>
  </div>
</main>
<footer>
  <a href="index.html">← All Tools</a> · JSON Diff Viewer · <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">Support this project ☕</a>
</footer>
<script>
let mode='struct';
function setMode(m){mode=m;document.getElementById('btn-struct').classList.toggle('active',m==='struct');document.getElementById('btn-flat').classList.toggle('active',m==='flat');compare()}
function formatInput(id){const t=document.getElementById(id);try{t.value=JSON.stringify(JSON.parse(t.value),null,2)}catch{}}
function swapInputs(){const l=document.getElementById('left'),r=document.getElementById('right');[l.value,r.value]=[r.value,l.value]}
function clearAll(){document.getElementById('left').value='';document.getElementById('right').value='';document.getElementById('output').innerHTML='<div class="empty-state"><p>Paste two JSON objects and click <strong>Compare</strong></p></div>';document.getElementById('stats').innerHTML=''}

function compare(){
  const lv=document.getElementById('left').value.trim(),rv=document.getElementById('right').value.trim();
  if(!lv&&!rv)return;
  let left,right;
  try{left=JSON.parse(lv)}catch(e){return showErr('Left: '+e.message)}
  try{right=JSON.parse(rv)}catch(e){return showErr('Right: '+e.message)}
  if(mode==='flat')renderFlat(left,right);
  else renderStruct(left,right);
}

function showErr(msg){document.getElementById('output').innerHTML=`<div class="empty-state" style="color:#f85149"><p>⚠ Parse Error: ${esc(msg)}</p></div>`;document.getElementById('stats').innerHTML=''}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function flatten(obj,prefix=''){
  const r={};
  if(obj===null||typeof obj!=='object'){r[prefix||'$']=obj;return r}
  if(Array.isArray(obj)){if(obj.length===0){r[prefix||'$']=obj;return r}obj.forEach((v,i)=>Object.assign(r,flatten(v,prefix?`${prefix}[${i}]`:`[${i}]`)))}
  else{const keys=Object.keys(obj);if(keys.length===0){r[prefix||'$']=obj;return r}keys.forEach(k=>{const p=prefix?`${prefix}.${k}`:k;Object.assign(r,flatten(obj[k],p))})}
  return r;
}

function renderFlat(left,right){
  const lf=flatten(left),rf=flatten(right);
  const allKeys=[...new Set([...Object.keys(lf),...Object.keys(rf)])].sort();
  let lines=[],counts={added:0,removed:0,changed:0,same:0},ln=0;
  allKeys.forEach(k=>{
    const inL=k in lf,inR=k in rf;
    ln++;
    if(inL&&inR){
      if(JSON.stringify(lf[k])===JSON.stringify(rf[k])){counts.same++;lines.push(mkLine(ln,' ','same',`${k}: ${JSON.stringify(lf[k])}`));}
      else{counts.changed++;lines.push(mkLine(ln,'~','changed',`${k}: ${esc(JSON.stringify(lf[k]))} → ${esc(JSON.stringify(rf[k]))}`,true));}
    }else if(inL){counts.removed++;lines.push(mkLine(ln,'-','removed',`${k}: ${JSON.stringify(lf[k])}`));}
    else{counts.added++;lines.push(mkLine(ln,'+','added',`${k}: ${JSON.stringify(rf[k])}`));}
  });
  render(lines,counts);
}

function renderStruct(left,right){
  let lines=[],counts={added:0,removed:0,changed:0,same:0},ln=0;
  function diff(l,r,indent){
    if(l===null&&r===null){ln++;lines.push(mkLine(ln,' ','same',`${' '.repeat(indent)}null`));counts.same++;return}
    if(typeof l!==typeof r||Array.isArray(l)!==Array.isArray(r)||l===null||r===null){
      if(l!==undefined){ln++;lines.push(mkLine(ln,'-','removed',`${' '.repeat(indent)}${fmtVal(l)}`));counts.removed++;}
      if(r!==undefined){ln++;lines.push(mkLine(ln,'+','added',`${' '.repeat(indent)}${fmtVal(r)}`));counts.added++;}
      return;
    }
    if(Array.isArray(l)){
      const max=Math.max(l.length,r.length);
      for(let i=0;i<max;i++){
        if(i>=l.length){ln++;lines.push(mkLine(ln,'+','added',`${' '.repeat(indent)}[${i}]: ${fmtVal(r[i])}`));counts.added++;}
        else if(i>=r.length){ln++;lines.push(mkLine(ln,'-','removed',`${' '.repeat(indent)}[${i}]: ${fmtVal(l[i])}`));counts.removed++;}
        else if(typeof l[i]==='object'&&l[i]!==null&&typeof r[i]==='object'&&r[i]!==null){
          ln++;lines.push(mkLine(ln,'','section',`${' '.repeat(indent)}[${i}]:`));
          diff(l[i],r[i],indent+2);
        }else if(JSON.stringify(l[i])===JSON.stringify(r[i])){
          ln++;lines.push(mkLine(ln,' ','same',`${' '.repeat(indent)}[${i}]: ${fmtVal(l[i])}`));counts.same++;
        }else{
          counts.changed++;ln++;
          lines.push(mkLine(ln,'~','changed',`${' '.repeat(indent)}[${i}]: <span class="inline-removed">${esc(fmtVal(l[i]))}</span> → <span class="inline-added">${esc(fmtVal(r[i]))}</span>`,true));
        }
      }
      return;
    }
    if(typeof l==='object'){
      const allKeys=[...new Set([...Object.keys(l),...Object.keys(r)])].sort();
      allKeys.forEach(k=>{
        const inL=k in l,inR=k in r;
        if(inL&&inR){
          if(typeof l[k]==='object'&&l[k]!==null&&typeof r[k]==='object'&&r[k]!==null){
            ln++;lines.push(mkLine(ln,'','section',`${' '.repeat(indent)}${esc(k)}:`));
            diff(l[k],r[k],indent+2);
          }else if(JSON.stringify(l[k])===JSON.stringify(r[k])){
            ln++;lines.push(mkLine(ln,' ','same',`${' '.repeat(indent)}${esc(k)}: ${fmtVal(l[k])}`));counts.same++;
          }else{
            counts.changed++;ln++;
            lines.push(mkLine(ln,'~','changed',`${' '.repeat(indent)}${esc(k)}: <span class="inline-removed">${esc(fmtVal(l[k]))}</span> → <span class="inline-added">${esc(fmtVal(r[k]))}</span>`,true));
          }
        }else if(inL){
          counts.removed++;ln++;
          lines.push(mkLine(ln,'-','removed',`${' '.repeat(indent)}${esc(k)}: ${fmtVal(l[k])}`));
        }else{
          counts.added++;ln++;
          lines.push(mkLine(ln,'+','added',`${' '.repeat(indent)}${esc(k)}: ${fmtVal(r[k])}`));
        }
      });
      return;
    }
    if(l===r){ln++;lines.push(mkLine(ln,' ','same',`${' '.repeat(indent)}${fmtVal(l)}`));counts.same++;}
    else{counts.changed++;ln++;lines.push(mkLine(ln,'~','changed',`${' '.repeat(indent)}<span class="inline-removed">${esc(fmtVal(l))}</span> → <span class="inline-added">${esc(fmtVal(r))}</span>`,true));}
  }
  diff(left,right,0);
  render(lines,counts);
}

function fmtVal(v){if(v===null)return'null';if(typeof v==='string')return`"${v}"`;if(typeof v==='object')return JSON.stringify(v);return String(v)}

function mkLine(ln,marker,cls,content,isHtml){
  return`<div class="diff-line ${cls}"><div class="diff-gutter">${ln}</div><div class="diff-marker">${marker}</div><div class="diff-content">${isHtml?content:esc(content)}</div></div>`;
}

function render(lines,c){
  document.getElementById('output').innerHTML=lines.length?lines.join(''):'<div class="empty-state"><p>No differences found — the JSON objects are identical.</p></div>';
  document.getElementById('stats').innerHTML=`<span class="stat-added">+${c.added} added</span><span class="stat-removed">-${c.removed} removed</span><span class="stat-changed">~${c.changed} changed</span><span class="stat-same">${c.same} same</span>`;
}

document.querySelectorAll('textarea').forEach(t=>t.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();compare()}}));
</script>
</body>
</html>
