<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTP → Code Snippet Converter - Free Online Tool</title>
<meta name="description" content="Convert HTTP requests to code snippets in multiple languages — fetch, curl, Python requests, Go, PHP, Ruby. 100% client-side.">
<meta name="keywords" content="http to code, http snippet, fetch generator, curl generator, python requests, code generator, api request">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/httpsnippet.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .panels { gap: 1.5rem; }
  .control-group { margin-bottom: 1rem; }
  .control-group label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: .3rem; }
  .control-group input[type="text"],
  .control-group select,
  .control-group textarea {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: .85rem;
  }
  .control-group textarea { min-height: 80px; resize: vertical; font-family: var(--mono); }
  .method-url { display: flex; gap: .5rem; }
  .method-url select { flex: 0 0 100px; }
  .method-url input { flex: 1; }
  .header-row { display: flex; gap: .5rem; align-items: center; margin-bottom: .4rem; }
  .header-row input { flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .82rem; }
  .header-row .remove-header { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); cursor: pointer; padding: 2px 8px; font-size: .8rem; }
  .header-row .remove-header:hover { color: var(--error); border-color: var(--error); }
  .header-presets { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .5rem; }
  .header-presets button {
    padding: 2px 8px; font-size: .72rem;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--surface); color: var(--muted); cursor: pointer;
  }
  .header-presets button:hover { background: var(--surface2); color: var(--text); }
  .lang-tabs { display: flex; flex-wrap: wrap; gap: .25rem; margin-bottom: 1rem; }
  .lang-tab {
    padding: 5px 12px; font-size: .8rem;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--muted);
    cursor: pointer; transition: all .15s;
  }
  .lang-tab:hover { background: var(--surface2); color: var(--text); }
  .lang-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .code-output { position: relative; }
  .code-output pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    font-family: var(--mono);
    font-size: .82rem;
    line-height: 1.6;
    overflow-x: auto;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-all;
    min-height: 120px;
  }
  .auth-section { margin-top: .75rem; }
  .auth-row { display: flex; gap: .5rem; flex-wrap: wrap; }
  .auth-row select, .auth-row input {
    padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .82rem;
  }
  .auth-row select { flex: 0 0 120px; }
  .auth-row input { flex: 1; min-width: 150px; }
  @media (max-width: 768px) {
    .panels { flex-direction: column; }
    .method-url { flex-direction: column; }
    .method-url select { flex: 1; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>HTTP &rarr; Code Snippet</h1>
<p class="subtitle">Convert an HTTP request to code in fetch, curl, Python, Go, PHP, Ruby, and more</p>

<div class="panels">
<div style="flex:1; min-width: 280px;">

<div class="card">
<h2>Request</h2>
<div class="control-group">
  <label>Method &amp; URL</label>
  <div class="method-url">
    <select id="method" onchange="generate()">
      <option>GET</option>
      <option>POST</option>
      <option>PUT</option>
      <option>PATCH</option>
      <option>DELETE</option>
      <option>HEAD</option>
      <option>OPTIONS</option>
    </select>
    <input type="text" id="url" value="https://api.example.com/users" oninput="generate()" placeholder="https://api.example.com/endpoint">
  </div>
</div>
</div>

<div class="card">
<h2>Headers</h2>
<div class="header-presets">
  <button onclick="addPresetHeader('Content-Type','application/json')">JSON</button>
  <button onclick="addPresetHeader('Content-Type','application/x-www-form-urlencoded')">Form</button>
  <button onclick="addPresetHeader('Accept','application/json')">Accept JSON</button>
  <button onclick="addPresetHeader('Authorization','Bearer token_here')">Bearer</button>
  <button onclick="addPresetHeader('X-API-Key','your-api-key')">API Key</button>
</div>
<div id="headerRows"></div>
<button class="btn-secondary" onclick="addHeader()">+ Add Header</button>
</div>

<div class="card">
<h2>Body <span style="font-weight:400;font-size:.8rem;color:var(--muted);">(for POST/PUT/PATCH)</span></h2>
<div class="control-group">
  <select id="bodyType" onchange="generate()" style="margin-bottom:.5rem;">
    <option value="json">JSON</option>
    <option value="form">Form URL-encoded</option>
    <option value="raw">Raw text</option>
    <option value="none">None</option>
  </select>
  <textarea id="body" placeholder='{"name": "John", "email": "john@example.com"}' oninput="generate()">{"name": "John", "email": "john@example.com"}</textarea>
</div>
</div>

<div class="card">
<h2>Authentication <span style="font-weight:400;font-size:.8rem;color:var(--muted);">(optional)</span></h2>
<div class="auth-row">
  <select id="authType" onchange="generate()">
    <option value="none">None</option>
    <option value="bearer">Bearer Token</option>
    <option value="basic">Basic Auth</option>
    <option value="apikey">API Key Header</option>
  </select>
  <input type="text" id="authValue" placeholder="Token or username:password" oninput="generate()">
</div>
</div>
</div>

<div style="flex:1; min-width: 280px;">
<div class="card code-output">
<h2>Code Snippet <button class="btn" style="float:right;font-size:.78rem;padding:4px 12px;" onclick="copyCode()">Copy</button></h2>
<div class="lang-tabs" id="langTabs"></div>
<pre id="codeOutput"></pre>
</div>
</div>
</div>
</div>

<div class="toast" id="toast">Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let headers = [];
let currentLang = 'fetch';

const languages = [
  { id: 'curl', label: 'cURL' },
  { id: 'fetch', label: 'JavaScript fetch' },
  { id: 'axios', label: 'Axios' },
  { id: 'python', label: 'Python requests' },
  { id: 'go', label: 'Go' },
  { id: 'php', label: 'PHP cURL' },
  { id: 'ruby', label: 'Ruby' },
  { id: 'csharp', label: 'C# HttpClient' },
  { id: 'java', label: 'Java HttpClient' },
];

function renderLangTabs() {
  $('langTabs').innerHTML = languages.map(l =>
    `<button class="lang-tab ${l.id === currentLang ? 'active' : ''}" onclick="setLang('${l.id}')">${l.label}</button>`
  ).join('');
}

function setLang(id) {
  currentLang = id;
  renderLangTabs();
  generate();
}

function addHeader(key = '', val = '') {
  headers.push({ key, val });
  renderHeaders();
  generate();
}

function addPresetHeader(key, val) {
  // Don't duplicate
  if (headers.some(h => h.key.toLowerCase() === key.toLowerCase())) return;
  addHeader(key, val);
}

function removeHeader(i) {
  headers.splice(i, 1);
  renderHeaders();
  generate();
}

function renderHeaders() {
  $('headerRows').innerHTML = headers.map((h, i) => `
    <div class="header-row">
      <input type="text" value="${esc(h.key)}" placeholder="Header name" onchange="headers[${i}].key=this.value;generate()">
      <input type="text" value="${esc(h.val)}" placeholder="Value" onchange="headers[${i}].val=this.value;generate()">
      <button class="remove-header" onclick="removeHeader(${i})">&times;</button>
    </div>
  `).join('');
}

function esc(s) { return s.replace(/"/g, '&quot;'); }

function getRequest() {
  const method = $('method').value;
  const url = $('url').value;
  const bodyType = $('bodyType').value;
  const bodyRaw = $('body').value;
  const authType = $('authType').value;
  const authVal = $('authValue').value;

  // Collect all headers
  const allHeaders = [...headers.filter(h => h.key)];

  // Auth header
  if (authType === 'bearer' && authVal) {
    allHeaders.push({ key: 'Authorization', val: `Bearer ${authVal}` });
  } else if (authType === 'basic' && authVal) {
    allHeaders.push({ key: 'Authorization', val: `Basic ${btoa(authVal)}` });
  } else if (authType === 'apikey' && authVal) {
    allHeaders.push({ key: 'X-API-Key', val: authVal });
  }

  const hasBody = ['POST', 'PUT', 'PATCH'].includes(method) && bodyType !== 'none' && bodyRaw;

  return { method, url, headers: allHeaders, body: hasBody ? bodyRaw : null, bodyType, authType, authVal };
}

function generate() {
  const req = getRequest();
  const generators = { curl: genCurl, fetch: genFetch, axios: genAxios, python: genPython, go: genGo, php: genPhp, ruby: genRuby, csharp: genCSharp, java: genJava };
  $('codeOutput').textContent = (generators[currentLang] || genFetch)(req);
}

function genCurl(r) {
  let cmd = `curl -X ${r.method}`;
  cmd += ` '${r.url}'`;
  r.headers.forEach(h => { cmd += ` \\\n  -H '${h.key}: ${h.val}'`; });
  if (r.body) cmd += ` \\\n  -d '${r.body}'`;
  return cmd;
}

function genFetch(r) {
  const opts = [];
  if (r.method !== 'GET') opts.push(`  method: '${r.method}'`);
  if (r.headers.length) {
    const hdrs = r.headers.map(h => `    '${h.key}': '${h.val}'`).join(',\n');
    opts.push(`  headers: {\n${hdrs}\n  }`);
  }
  if (r.body) {
    const val = r.bodyType === 'json' ? `JSON.stringify(${r.body})` : `'${r.body}'`;
    opts.push(`  body: ${val}`);
  }
  let code = `const response = await fetch('${r.url}'`;
  if (opts.length) code += `, {\n${opts.join(',\n')}\n}`;
  code += ');\nconst data = await response.json();';
  return code;
}

function genAxios(r) {
  const cfg = [];
  if (r.headers.length) {
    const hdrs = r.headers.map(h => `    '${h.key}': '${h.val}'`).join(',\n');
    cfg.push(`  headers: {\n${hdrs}\n  }`);
  }
  const m = r.method.toLowerCase();
  const hasData = r.body && ['post', 'put', 'patch'].includes(m);

  let code = `const { data } = await axios.${m}('${r.url}'`;
  if (hasData) code += `, ${r.body}`;
  if (cfg.length) code += `, {\n${cfg.join(',\n')}\n}`;
  code += ');';
  return code;
}

function genPython(r) {
  let code = 'import requests\n\n';
  if (r.headers.length) {
    code += 'headers = {\n';
    r.headers.forEach(h => { code += `    '${h.key}': '${h.val}',\n`; });
    code += '}\n\n';
  }
  if (r.body && r.bodyType === 'json') {
    code += `payload = ${r.body}\n\n`;
  }
  code += `response = requests.${r.method.toLowerCase()}(\n    '${r.url}'`;
  if (r.headers.length) code += ',\n    headers=headers';
  if (r.body && r.bodyType === 'json') code += ',\n    json=payload';
  else if (r.body) code += `,\n    data='${r.body}'`;
  code += '\n)\n\nprint(response.json())';
  return code;
}

function genGo(r) {
  let code = 'package main\n\nimport (\n\t"fmt"\n\t"io"\n\t"net/http"\n';
  if (r.body) code += '\t"strings"\n';
  code += ')\n\nfunc main() {\n';
  if (r.body) {
    code += `\tbody := strings.NewReader(\`${r.body}\`)\n`;
    code += `\treq, err := http.NewRequest("${r.method}", "${r.url}", body)\n`;
  } else {
    code += `\treq, err := http.NewRequest("${r.method}", "${r.url}", nil)\n`;
  }
  code += '\tif err != nil {\n\t\tpanic(err)\n\t}\n';
  r.headers.forEach(h => { code += `\treq.Header.Set("${h.key}", "${h.val}")\n`; });
  code += '\n\tresp, err := http.DefaultClient.Do(req)\n';
  code += '\tif err != nil {\n\t\tpanic(err)\n\t}\n';
  code += '\tdefer resp.Body.Close()\n\n';
  code += '\tdata, _ := io.ReadAll(resp.Body)\n';
  code += '\tfmt.Println(string(data))\n}';
  return code;
}

function genPhp(r) {
  let code = '<?php\n$ch = curl_init();\n\n';
  code += `curl_setopt($ch, CURLOPT_URL, '${r.url}');\n`;
  code += 'curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);\n';
  if (r.method !== 'GET') code += `curl_setopt($ch, CURLOPT_CUSTOMREQUEST, '${r.method}');\n`;
  if (r.headers.length) {
    code += 'curl_setopt($ch, CURLOPT_HTTPHEADER, [\n';
    r.headers.forEach(h => { code += `    '${h.key}: ${h.val}',\n`; });
    code += ']);\n';
  }
  if (r.body) code += `curl_setopt($ch, CURLOPT_POSTFIELDS, '${r.body}');\n`;
  code += '\n$response = curl_exec($ch);\ncurl_close($ch);\n\necho $response;\n';
  return code;
}

function genRuby(r) {
  let code = "require 'net/http'\nrequire 'json'\nrequire 'uri'\n\n";
  code += `uri = URI('${r.url}')\n`;
  const mClass = { GET: 'Get', POST: 'Post', PUT: 'Put', PATCH: 'Patch', DELETE: 'Delete', HEAD: 'Head', OPTIONS: 'Options' }[r.method] || 'Get';
  code += `request = Net::HTTP::${mClass}.new(uri)\n`;
  r.headers.forEach(h => { code += `request['${h.key}'] = '${h.val}'\n`; });
  if (r.body) code += `request.body = '${r.body}'\n`;
  code += `\nresponse = Net::HTTP.start(uri.hostname, uri.port, use_ssl: uri.scheme == 'https') do |http|\n  http.request(request)\nend\n\nputs response.body`;
  return code;
}

function genCSharp(r) {
  let code = 'using var client = new HttpClient();\n\n';
  if (r.body) {
    const contentType = r.headers.find(h => h.key.toLowerCase() === 'content-type')?.val || 'application/json';
    code += `var content = new StringContent(\n    @"${r.body.replace(/"/g, '""')}",\n    System.Text.Encoding.UTF8,\n    "${contentType}");\n\n`;
  }
  const otherHeaders = r.headers.filter(h => h.key.toLowerCase() !== 'content-type');
  otherHeaders.forEach(h => { code += `client.DefaultRequestHeaders.Add("${h.key}", "${h.val}");\n`; });
  if (otherHeaders.length) code += '\n';
  const methodMap = { GET: 'GetAsync', POST: 'PostAsync', PUT: 'PutAsync', PATCH: 'PatchAsync', DELETE: 'DeleteAsync' };
  const m = methodMap[r.method] || 'SendAsync';
  if (r.body && ['POST', 'PUT', 'PATCH'].includes(r.method)) {
    code += `var response = await client.${m}("${r.url}", content);\n`;
  } else {
    code += `var response = await client.${m}("${r.url}");\n`;
  }
  code += 'var body = await response.Content.ReadAsStringAsync();\nConsole.WriteLine(body);';
  return code;
}

function genJava(r) {
  let code = 'import java.net.http.*;\nimport java.net.URI;\n\n';
  code += 'var client = HttpClient.newHttpClient();\n\n';
  code += `var request = HttpRequest.newBuilder()\n    .uri(URI.create("${r.url}"))\n`;
  code += `    .method("${r.method}", `;
  if (r.body) {
    code += `HttpRequest.BodyPublishers.ofString("${r.body.replace(/"/g, '\\"')}"))\n`;
  } else {
    code += 'HttpRequest.BodyPublishers.noBody())\n';
  }
  r.headers.forEach(h => { code += `    .header("${h.key}", "${h.val}")\n`; });
  code += '    .build();\n\n';
  code += 'var response = client.send(request, HttpResponse.BodyHandlers.ofString());\nSystem.out.println(response.body());';
  return code;
}

function copyCode() {
  navigator.clipboard.writeText($('codeOutput').textContent).then(() => {
    const el = $('toast');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
  });
}

// Init
addPresetHeader('Content-Type', 'application/json');
renderLangTabs();
generate();
</script>
</body>
</html>
