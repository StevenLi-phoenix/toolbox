<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to CSV Converter - Free Online Tool</title>
<meta name="description" content="Free online JSON to CSV converter. Convert JSON arrays to CSV and CSV to JSON instantly. Download results. No data sent to any server.">
<meta name="keywords" content="json to csv, csv to json, json converter, csv converter, data converter, free json csv tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/jsontocsv.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .error-msg{color:var(--error);font-size:.85rem;margin-top:6px;min-height:1.2em}
  .btn-success{background:var(--success);color:#fff;border-color:var(--success)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>JSON ⇄ CSV Converter</h1>
<p class="subtitle">Convert between JSON arrays and CSV format instantly</p>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="setMode('j2c',this)">JSON → CSV</button>
<button class="tab" onclick="setMode('c2j',this)">CSV → JSON</button>
</div>

<h2 id="input-label">📥 JSON Input</h2>
<textarea id="input" placeholder='[{"name":"Alice","age":30},{"name":"Bob","age":25}]' oninput="convert()"></textarea>
<div class="error-msg" id="error"></div>
<div class="stats" id="stats"></div>
</div>

<div class="card">
<h2 id="output-label">📤 CSV Output</h2>
<textarea id="output" readonly></textarea>
<div class="btn-row">
<button class="btn-primary" onclick="copyOut()">📋 Copy</button>
<button class="btn-success" onclick="download()">⬇️ Download</button>
<button class="btn-secondary" onclick="swapIO()">🔄 Swap</button>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
let mode='j2c';
function $id(id){return document.getElementById(id)}

function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  $id('input-label').textContent=m==='j2c'?'📥 JSON Input':'📥 CSV Input';
  $id('output-label').textContent=m==='j2c'?'📤 CSV Output':'📤 JSON Output';
  $id('input').placeholder=m==='j2c'?'[{"name":"Alice","age":30},{"name":"Bob","age":25}]':'name,age\nAlice,30\nBob,25';
  convert();
}

function convert(){
  const input=$id('input').value.trim();
  $id('error').textContent='';
  if(!input){$id('output').value='';$id('stats').textContent='';return}

  try{
    if(mode==='j2c'){
      let data=JSON.parse(input);
      if(!Array.isArray(data)){
        if(typeof data==='object') data=[data];
        else throw new Error('Input must be a JSON array');
      }
      const keys=[...new Set(data.flatMap(Object.keys))];
      const csvEsc=v=>{
        const s=v===null||v===undefined?'':typeof v==='object'?JSON.stringify(v):String(v);
        return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
      };
      const lines=[keys.join(','),...data.map(row=>keys.map(k=>csvEsc(row[k])).join(','))];
      $id('output').value=lines.join('\n');
      $id('stats').textContent=`${data.length} rows · ${keys.length} columns`;
    }else{
      const lines=input.split('\n').filter(l=>l.trim());
      if(lines.length<2){$id('output').value='[]';$id('stats').textContent='0 rows';return}
      const headers=parseCSVLine(lines[0]);
      const result=[];
      for(let i=1;i<lines.length;i++){
        const vals=parseCSVLine(lines[i]);
        const obj={};
        headers.forEach((h,j)=>{
          let v=vals[j]||'';
          if(v&&!isNaN(v)&&v.trim()!=='') v=Number(v);
          else if(v==='true') v=true;
          else if(v==='false') v=false;
          obj[h]=v;
        });
        result.push(obj);
      }
      $id('output').value=JSON.stringify(result,null,2);
      $id('stats').textContent=`${result.length} rows · ${headers.length} columns`;
    }
  }catch(e){
    $id('error').textContent=e.message;
    $id('output').value='';
  }
}

function parseCSVLine(line){
  const result=[];let current='',inQuotes=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQuotes){
      if(c==='"'){if(line[i+1]==='"'){current+='"';i++}else inQuotes=false}
      else current+=c;
    }else{
      if(c==='"') inQuotes=true;
      else if(c===','){result.push(current);current=''}
      else current+=c;
    }
  }
  result.push(current);
  return result;
}

function copyOut(){
  navigator.clipboard.writeText($id('output').value).then(()=>{
    const t=$id('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function download(){
  const ext=mode==='j2c'?'csv':'json';
  const mime=mode==='j2c'?'text/csv':'application/json';
  const blob=new Blob([$id('output').value],{type:mime});
  const a=document.createElement('a');
  a.download='converted.'+ext;a.href=URL.createObjectURL(blob);a.click();
}

function swapIO(){
  const out=$id('output').value;
  if(!out)return;
  $id('input').value=out;
  const newMode=mode==='j2c'?'c2j':'j2c';
  const btn=document.querySelectorAll('.tab')[newMode==='j2c'?0:1];
  setMode(newMode,btn);
}

// Sample data
$id('input').value='[\n  {"name": "Alice", "age": 30, "city": "NYC"},\n  {"name": "Bob", "age": 25, "city": "LA"},\n  {"name": "Charlie", "age": 35, "city": "Chicago"}\n]';
convert();
</script>
</body>
</html>
