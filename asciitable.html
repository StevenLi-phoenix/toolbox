<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Table - Free Interactive ASCII Character Reference</title>
<meta name="description" content="Free interactive ASCII table. Look up decimal, hex, octal, binary, and character values. Search and filter. No data sent to any server.">
<meta name="keywords" content="ascii table, ascii chart, ascii codes, character codes, ascii reference, hex to ascii, ascii lookup">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/asciitable.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .search-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .search-bar input { flex: 1; min-width: 180px; font-family: var(--mono); }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 4px 10px; font-size: .78rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--muted); cursor: pointer; }
  .filter-btn:hover { background: var(--surface2); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .ascii-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 6px;
  }
  .ascii-cell {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow .15s, border-color .15s;
  }
  .ascii-cell:hover { box-shadow: var(--shadow-lg); border-color: var(--border2); }
  .ascii-cell.selected { border-color: var(--text); box-shadow: var(--shadow-lg); }
  .ascii-cell.hidden { display: none; }
  .cell-char { font-size: 1.3rem; font-weight: 700; font-family: var(--mono); margin-bottom: 2px; min-height: 1.6em; display: flex; align-items: center; justify-content: center; }
  .cell-char .ctrl-label { font-size: .65rem; color: var(--muted); font-weight: 600; }
  .cell-dec { font-size: .72rem; color: var(--muted); font-family: var(--mono); }
  .cell-cat { font-size: .6rem; padding: 1px 4px; border-radius: 3px; margin-top: 2px; display: inline-block; }
  .cat-control { background: #fef3c7; color: #92400e; }
  .cat-digit { background: #dbeafe; color: #1e40af; }
  .cat-upper { background: #dcfce7; color: #166534; }
  .cat-lower { background: #f3e8ff; color: #6b21a8; }
  .cat-symbol { background: #fee2e2; color: #991b1b; }
  .cat-space { background: #e0e7ff; color: #3730a3; }
  .cat-extended { background: #f1f5f9; color: #475569; }

  .detail-panel {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    background: var(--surface2);
    margin-top: 12px;
  }
  .detail-char { font-size: 3rem; font-family: var(--mono); font-weight: 700; text-align: center; margin-bottom: 8px; min-height: 4rem; display: flex; align-items: center; justify-content: center; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
  .detail-item { padding: 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); }
  .detail-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
  .detail-value { font-size: .95rem; font-family: var(--mono); font-weight: 600; }
  .copy-hint { font-size: .72rem; color: var(--muted); text-align: center; margin-top: 6px; }

  .converter { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .converter .field { flex: 1; min-width: 120px; }
  .converter label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 2px; }
  .converter input { width: 100%; font-family: var(--mono); font-size: .9rem; }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>ASCII Table</h1>
<p class="subtitle">Interactive ASCII character reference with decimal, hex, octal, and binary values.</p>

<div class="card">
<h2>Convert</h2>
<div class="converter">
  <div class="field"><label>Decimal</label><input type="text" id="convDec" placeholder="65" oninput="convertFrom('dec')"></div>
  <div class="field"><label>Hex</label><input type="text" id="convHex" placeholder="41" oninput="convertFrom('hex')"></div>
  <div class="field"><label>Octal</label><input type="text" id="convOct" placeholder="101" oninput="convertFrom('oct')"></div>
  <div class="field"><label>Binary</label><input type="text" id="convBin" placeholder="01000001" oninput="convertFrom('bin')"></div>
  <div class="field"><label>Character</label><input type="text" id="convChar" placeholder="A" oninput="convertFrom('char')" maxlength="1"></div>
</div>
</div>

<div class="card">
<h2>Character Table</h2>
<div class="search-bar">
  <input type="text" id="search" placeholder="Search by character, name, decimal, or hex..." oninput="filterTable()">
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="control" onclick="setFilter('control')">Control</button>
    <button class="filter-btn" data-filter="digit" onclick="setFilter('digit')">Digits</button>
    <button class="filter-btn" data-filter="upper" onclick="setFilter('upper')">A-Z</button>
    <button class="filter-btn" data-filter="lower" onclick="setFilter('lower')">a-z</button>
    <button class="filter-btn" data-filter="symbol" onclick="setFilter('symbol')">Symbols</button>
  </div>
</div>
<div class="ascii-grid" id="grid"></div>
</div>

<div class="card" id="detailCard" style="display:none">
<h2>Character Detail</h2>
<div class="detail-panel">
  <div class="detail-char" id="detailChar"></div>
  <div class="detail-grid" id="detailGrid"></div>
  <div class="copy-hint">Click any value to copy</div>
</div>
</div>
</div>

<div class="toast" id="toast">&check; Copied!</div>

<footer>
Built with &hearts; by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> &middot; No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);

const CTRL_NAMES = [
  'NUL','SOH','STX','ETX','EOT','ENQ','ACK','BEL','BS','HT','LF','VT','FF','CR','SO','SI',
  'DLE','DC1','DC2','DC3','DC4','NAK','SYN','ETB','CAN','EM','SUB','ESC','FS','GS','RS','US'
];

const NAMES = {};
CTRL_NAMES.forEach((n,i) => NAMES[i] = n);
NAMES[32] = 'Space';
NAMES[127] = 'DEL';

function charCategory(code) {
  if (code < 32 || code === 127) return 'control';
  if (code === 32) return 'space';
  if (code >= 48 && code <= 57) return 'digit';
  if (code >= 65 && code <= 90) return 'upper';
  if (code >= 97 && code <= 122) return 'lower';
  return 'symbol';
}

function displayChar(code) {
  if (code < 32) return '<span class="ctrl-label">' + CTRL_NAMES[code] + '</span>';
  if (code === 32) return '<span class="ctrl-label">SP</span>';
  if (code === 127) return '<span class="ctrl-label">DEL</span>';
  return escHtml(String.fromCharCode(code));
}

function catLabel(cat) {
  const labels = {control:'Control',space:'Space',digit:'Digit',upper:'Upper',lower:'Lower',symbol:'Symbol'};
  return labels[cat] || cat;
}

let currentFilter = 'all';
let selectedCode = null;

function buildGrid() {
  const grid = $('grid');
  let html = '';
  for (let i = 0; i <= 127; i++) {
    const cat = charCategory(i);
    const name = NAMES[i] || String.fromCharCode(i);
    html += '<div class="ascii-cell" data-code="' + i + '" data-cat="' + cat + '" ' +
      'data-search="' + i + ' ' + i.toString(16) + ' ' + name.toLowerCase() + ' ' + (i >= 32 && i < 127 ? String.fromCharCode(i).toLowerCase() : '') + '" ' +
      'onclick="selectChar(' + i + ')">' +
      '<div class="cell-char">' + displayChar(i) + '</div>' +
      '<div class="cell-dec">' + i + ' / 0x' + i.toString(16).toUpperCase().padStart(2,'0') + '</div>' +
      '<div class="cell-cat cat-' + cat + '">' + catLabel(cat) + '</div>' +
      '</div>';
  }
  grid.innerHTML = html;
}

function filterTable() {
  const q = $('search').value.toLowerCase().trim();
  document.querySelectorAll('.ascii-cell').forEach(cell => {
    const cat = cell.dataset.cat;
    const search = cell.dataset.search;
    const matchFilter = currentFilter === 'all' || cat === currentFilter;
    const matchSearch = !q || search.includes(q);
    cell.classList.toggle('hidden', !(matchFilter && matchSearch));
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  filterTable();
}

function selectChar(code) {
  selectedCode = code;
  document.querySelectorAll('.ascii-cell').forEach(c => c.classList.toggle('selected', +c.dataset.code === code));

  const cat = charCategory(code);
  const name = NAMES[code] || String.fromCharCode(code);
  const char = code >= 32 && code < 127 ? String.fromCharCode(code) : (NAMES[code] || '');

  $('detailChar').innerHTML = displayChar(code);
  $('detailCard').style.display = '';

  const fields = [
    ['Decimal', String(code)],
    ['Hex', '0x' + code.toString(16).toUpperCase().padStart(2, '0')],
    ['Octal', '0o' + code.toString(8).padStart(3, '0')],
    ['Binary', code.toString(2).padStart(8, '0')],
    ['Name', name],
    ['Category', catLabel(cat)],
    ['HTML Entity', '&#' + code + ';'],
    ['CSS/JS Escape', '\\' + code.toString(16).padStart(2, '0')],
    ['UTF-8', code < 128 ? '0x' + code.toString(16).toUpperCase().padStart(2, '0') : 'multi-byte'],
  ];

  $('detailGrid').innerHTML = fields.map(([label, value]) =>
    '<div class="detail-item" onclick="copyValue(\'' + escAttr(value) + '\')" style="cursor:pointer" title="Click to copy">' +
    '<div class="detail-label">' + label + '</div>' +
    '<div class="detail-value">' + escHtml(value) + '</div></div>'
  ).join('');
}

function convertFrom(type) {
  let code;
  try {
    switch(type) {
      case 'dec': code = parseInt($('convDec').value, 10); break;
      case 'hex': code = parseInt($('convHex').value, 16); break;
      case 'oct': code = parseInt($('convOct').value, 8); break;
      case 'bin': code = parseInt($('convBin').value, 2); break;
      case 'char': code = $('convChar').value.charCodeAt(0); break;
    }
  } catch(e) { return; }

  if (isNaN(code) || code < 0 || code > 127) return;

  if (type !== 'dec') $('convDec').value = code;
  if (type !== 'hex') $('convHex').value = code.toString(16).toUpperCase();
  if (type !== 'oct') $('convOct').value = code.toString(8);
  if (type !== 'bin') $('convBin').value = code.toString(2).padStart(8, '0');
  if (type !== 'char') $('convChar').value = code >= 32 && code < 127 ? String.fromCharCode(code) : '';

  selectChar(code);
}

function copyValue(text) {
  navigator.clipboard.writeText(text).then(() => {
    const t = $('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

buildGrid();
</script>
</body>
</html>
