<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Table Reference - Free Online ASCII & Unicode Character Tool</title>
<meta name="description" content="Free online ASCII table reference. Browse ASCII and extended characters with decimal, hex, octal, binary, and HTML entity values. Search and filter instantly.">
<meta name="keywords" content="ascii table, ascii chart, character codes, unicode, hex codes, html entities, ascii reference">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/asciitable.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .controls input[type="search"] { flex: 1; min-width: 200px; }
  .range-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .ascii-grid { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .ascii-grid th { position: sticky; top: 0; background: var(--surface2); padding: 8px 6px; text-align: left; font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 2px solid var(--border); z-index: 1; }
  .ascii-grid td { padding: 6px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: .8rem; white-space: nowrap; }
  .ascii-grid tr:hover { background: var(--surface2); }
  .ascii-grid tr.selected { background: #fef9c3; }
  .char-display { font-size: 1.3rem; min-width: 32px; text-align: center; display: inline-block; }
  .control-char { color: var(--muted); font-size: .7rem; font-style: italic; font-family: var(--sans); }
  .detail-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; display: none; }
  .detail-panel.active { display: block; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .detail-item { font-size: .82rem; }
  .detail-item .label { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .5px; }
  .detail-item .val { font-family: var(--mono); font-weight: 600; font-size: .95rem; margin-top: 2px; }
  .table-wrap { max-height: 65vh; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); }
  .count-badge { font-size: .78rem; color: var(--muted); }
  @media (max-width: 768px) {
    .ascii-grid td:nth-child(5), .ascii-grid th:nth-child(5),
    .ascii-grid td:nth-child(6), .ascii-grid th:nth-child(6) { display: none; }
  }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; All Tools</a>
<h1>📟 ASCII Table Reference</h1>
<p class="subtitle">Browse ASCII and extended characters with decimal, hex, octal, binary, and HTML entity values.</p>

<div class="container">
  <div class="card">
    <div class="controls">
      <input type="search" id="search" placeholder="Search by character, name, or code..." autocomplete="off">
      <div class="range-btns">
        <button class="btn-secondary" onclick="setRange(0,31)" title="Control characters">Control</button>
        <button class="btn-secondary" onclick="setRange(32,47)" title="Symbols & punctuation">Symbols</button>
        <button class="btn-secondary" onclick="setRange(48,57)" title="0-9">Digits</button>
        <button class="btn-secondary" onclick="setRange(65,90)" title="A-Z">Upper</button>
        <button class="btn-secondary" onclick="setRange(97,122)" title="a-z">Lower</button>
        <button class="btn-secondary" onclick="setRange(0,127)" title="Full ASCII">All ASCII</button>
        <button class="btn-secondary" onclick="setRange(128,255)" title="Extended">Extended</button>
      </div>
    </div>
    <span class="count-badge" id="count-badge"></span>

    <div class="detail-panel" id="detail-panel">
      <div class="detail-grid" id="detail-grid"></div>
    </div>

    <div class="table-wrap">
      <table class="ascii-grid" id="table">
        <thead><tr>
          <th>Char</th><th>Dec</th><th>Hex</th><th>Oct</th><th>Binary</th><th>HTML</th><th>Name</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>💡 Quick Lookup</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:end">
      <div>
        <label style="font-size:.78rem;color:var(--muted)">Character or Code</label>
        <input type="text" id="lookup-input" placeholder="A or 65 or 0x41" style="width:160px;font-family:var(--mono)">
      </div>
      <button class="btn" onclick="doLookup()">Lookup</button>
    </div>
    <div id="lookup-result" style="margin-top:8px;font-family:var(--mono);font-size:.85rem"></div>
  </div>
</div>

<footer>
  <div>Built with ☕ by Steven Li · No data leaves your browser</div>
  <div><a href="index.html">← Back to Toolbox</a> · <a href="https://buymeacoffee.com/stevenli.phoenix">☕ Buy Me a Coffee</a></div>
</footer>

<script>
const controlNames = [
  'NUL','SOH','STX','ETX','EOT','ENQ','ACK','BEL','BS','TAB','LF','VT','FF','CR','SO','SI',
  'DLE','DC1','DC2','DC3','DC4','NAK','SYN','ETB','CAN','EM','SUB','ESC','FS','GS','RS','US'
];

function charName(code) {
  if (code < 32) return controlNames[code];
  if (code === 32) return 'Space';
  if (code === 127) return 'DEL';
  if (code >= 128 && code <= 159) return 'Control';
  try { return String.fromCharCode(code); } catch { return '?'; }
}

function charDisplay(code) {
  if (code < 32) return `<span class="control-char">${controlNames[code]}</span>`;
  if (code === 32) return `<span class="control-char">SP</span>`;
  if (code === 127) return `<span class="control-char">DEL</span>`;
  if (code >= 128 && code <= 159) return `<span class="control-char">CTRL</span>`;
  return `<span class="char-display">${escHtml(String.fromCharCode(code))}</span>`;
}

function htmlEntity(code) {
  const named = { 34: '&quot;', 38: '&amp;', 39: '&apos;', 60: '&lt;', 62: '&gt;', 160: '&nbsp;', 169: '&copy;', 174: '&reg;', 176: '&deg;', 177: '&plusmn;', 215: '&times;', 247: '&divide;' };
  return named[code] || `&#${code};`;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let rangeStart = 0, rangeEnd = 127;
const tbody = document.getElementById('tbody');
const searchEl = document.getElementById('search');
const countBadge = document.getElementById('count-badge');
const detailPanel = document.getElementById('detail-panel');
const detailGrid = document.getElementById('detail-grid');

function buildTable() {
  let html = '';
  let count = 0;
  const q = searchEl.value.toLowerCase().trim();

  for (let i = rangeStart; i <= rangeEnd; i++) {
    const name = charName(i);
    const hex = i.toString(16).toUpperCase().padStart(2, '0');
    const oct = i.toString(8).padStart(3, '0');
    const bin = i.toString(2).padStart(8, '0');
    const entity = htmlEntity(i);
    const searchable = `${String.fromCharCode(i)} ${i} ${hex} ${name} ${entity}`.toLowerCase();

    if (q && !searchable.includes(q)) continue;

    count++;
    html += `<tr onclick="selectChar(${i})" style="cursor:pointer">`;
    html += `<td>${charDisplay(i)}</td>`;
    html += `<td>${i}</td>`;
    html += `<td>0x${hex}</td>`;
    html += `<td>${oct}</td>`;
    html += `<td>${bin}</td>`;
    html += `<td>${escHtml(entity)}</td>`;
    html += `<td>${escHtml(name)}</td>`;
    html += `</tr>`;
  }
  tbody.innerHTML = html;
  countBadge.textContent = `Showing ${count} character${count !== 1 ? 's' : ''}`;
}

function setRange(start, end) {
  rangeStart = start;
  rangeEnd = end;
  searchEl.value = '';
  buildTable();
}

function selectChar(code) {
  const name = charName(code);
  const hex = code.toString(16).toUpperCase().padStart(2, '0');
  const ch = code >= 32 && code !== 127 ? String.fromCharCode(code) : '';

  detailPanel.classList.add('active');
  detailGrid.innerHTML = `
    <div class="detail-item"><div class="label">Character</div><div class="val" style="font-size:2rem">${ch || name}</div></div>
    <div class="detail-item"><div class="label">Decimal</div><div class="val">${code}</div></div>
    <div class="detail-item"><div class="label">Hexadecimal</div><div class="val">0x${hex}</div></div>
    <div class="detail-item"><div class="label">Octal</div><div class="val">${code.toString(8).padStart(3, '0')}</div></div>
    <div class="detail-item"><div class="label">Binary</div><div class="val">${code.toString(2).padStart(8, '0')}</div></div>
    <div class="detail-item"><div class="label">HTML Entity</div><div class="val">${escHtml(htmlEntity(code))}</div></div>
    <div class="detail-item"><div class="label">CSS</div><div class="val">\\${hex}</div></div>
    <div class="detail-item"><div class="label">JS Escape</div><div class="val">\\x${hex}</div></div>
    <div class="detail-item"><div class="label">Unicode</div><div class="val">U+${hex.padStart(4, '0')}</div></div>
    <div class="detail-item"><div class="label">Name</div><div class="val">${name}</div></div>
  `;

  document.querySelectorAll('#tbody tr').forEach(tr => tr.classList.remove('selected'));
  const rows = document.querySelectorAll('#tbody tr');
  rows.forEach(tr => {
    if (tr.children[1] && tr.children[1].textContent === String(code)) tr.classList.add('selected');
  });
}

function doLookup() {
  const val = document.getElementById('lookup-input').value.trim();
  const result = document.getElementById('lookup-result');
  if (!val) { result.textContent = ''; return; }

  let code;
  if (val.startsWith('0x') || val.startsWith('0X')) {
    code = parseInt(val, 16);
  } else if (val.startsWith('0b') || val.startsWith('0B')) {
    code = parseInt(val.slice(2), 2);
  } else if (val.startsWith('0o') || val.startsWith('0O')) {
    code = parseInt(val.slice(2), 8);
  } else if (/^\d+$/.test(val)) {
    code = parseInt(val, 10);
  } else {
    code = val.charCodeAt(0);
  }

  if (isNaN(code) || code < 0 || code > 65535) {
    result.innerHTML = '<span style="color:var(--error)">Invalid input</span>';
    return;
  }

  const ch = String.fromCharCode(code);
  const hex = code.toString(16).toUpperCase().padStart(2, '0');
  result.innerHTML = `"${escHtml(ch)}" → Dec: ${code} | Hex: 0x${hex} | Oct: ${code.toString(8)} | Bin: ${code.toString(2).padStart(8, '0')} | HTML: ${escHtml(htmlEntity(code))}`;

  if (code >= rangeStart && code <= rangeEnd) selectChar(code);
}

document.getElementById('lookup-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });
searchEl.addEventListener('input', buildTable);
buildTable();
</script>
</body>
</html>
