  .sql-textarea { width: 100%; min-height: 320px; font-family: var(--mono); font-size: .85rem; line-height: 1.6; resize: vertical; padding: 12px; tab-size: 2; }
  .output-area { width: 100%; min-height: 320px; font-family: var(--mono); font-size: .85rem; line-height: 1.6; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; white-space: pre-wrap; word-break: break-word; overflow-y: auto; }
  .options-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .options-row label { display: flex; align-items: center; gap: 4px; font-size: .85rem; cursor: pointer; }

<body>
<a href="index.html" class="back">&larr; All Tools</a>
<h1>🗃️ SQL Formatter & Beautifier</h1>
<p class="subtitle">Format and beautify SQL queries with proper indentation and keyword casing. 100% client-side.</p>

<div class="container">
  <div class="card">
    <h2>Options</h2>
    <div class="options-row">
      <label>Keyword case:
        <select id="opt-case">
          <option value="upper">UPPER</option>
          <option value="lower">lower</option>
          <option value="preserve">Preserve</option>
        </select>
      </label>
      <label>Indent:
        <select id="opt-indent">
          <option value="2">2 spaces</option>
          <option value="4">4 spaces</option>
          <option value="tab">Tab</option>
        </select>
      </label>
      <label><input type="checkbox" id="opt-semicolons" checked> Trailing semicolons</label>
      <label><input type="checkbox" id="opt-newline-comma"> Comma on new line</label>
    </div>
  </div>

  <div class="panels">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h2>Input SQL</h2>
        <div style="display:flex;gap:6px;">
          <button class="btn" onclick="formatSQL()">Format</button>
          <button class="btn-secondary" onclick="minifySQL()">Minify</button>
          <button class="btn-secondary" onclick="clearAll()">Clear</button>
        </div>
      </div>
      <textarea class="sql-textarea" id="sql-input" placeholder="Paste your SQL query here..." spellcheck="false">SELECT u.id, u.name, u.email, o.total, o.created_at FROM users u INNER JOIN orders o ON u.id = o.user_id WHERE u.active = 1 AND o.total > 100 AND o.created_at >= '2024-01-01' GROUP BY u.id, u.name, u.email ORDER BY o.total DESC LIMIT 50;</textarea>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h2>Formatted Output</h2>
        <button class="btn-secondary" onclick="copyOutput()">📋 Copy</button>
      </div>
      <div class="output-area" id="sql-output"></div>
    </div>
  </div>

  <div class="card">
    <h2>Sample Queries</h2>
    <div class="presets">
      <button class="btn-secondary" onclick="loadSample('select')">SELECT + JOIN</button>
      <button class="btn-secondary" onclick="loadSample('insert')">INSERT</button>
      <button class="btn-secondary" onclick="loadSample('update')">UPDATE</button>
      <button class="btn-secondary" onclick="loadSample('create')">CREATE TABLE</button>
      <button class="btn-secondary" onclick="loadSample('subquery')">Subquery</button>
      <button class="btn-secondary" onclick="loadSample('cte')">CTE (WITH)</button>
    </div>
  </div>
</div>

<footer>Built with ☕ by Steven Li · No data leaves your browser</footer>

<div class="toast" id="toast">Copied!</div>

<script>
const MAJOR_KEYWORDS = [
  'SELECT', 'FROM', 'WHERE', 'GROUP BY', 'HAVING', 'ORDER BY', 'LIMIT', 'OFFSET',
  'INSERT INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE FROM',
  'INNER JOIN', 'LEFT JOIN', 'RIGHT JOIN', 'FULL JOIN', 'CROSS JOIN', 'JOIN',
  'LEFT OUTER JOIN', 'RIGHT OUTER JOIN', 'FULL OUTER JOIN',
  'ON', 'UNION ALL', 'UNION', 'EXCEPT', 'INTERSECT',
  'CREATE TABLE', 'ALTER TABLE', 'DROP TABLE',
  'WITH', 'AS', 'RETURNING', 'INTO', 'FETCH', 'FOR'
];

const INLINE_KEYWORDS = [
  'AND', 'OR', 'NOT', 'IN', 'EXISTS', 'BETWEEN', 'LIKE', 'ILIKE', 'IS',
  'NULL', 'TRUE', 'FALSE', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END',
  'ASC', 'DESC', 'NULLS FIRST', 'NULLS LAST', 'DISTINCT', 'ALL',
  'AS', 'ON', 'IF', 'CASCADE', 'RESTRICT', 'DEFAULT', 'NOT NULL',
  'PRIMARY KEY', 'FOREIGN KEY', 'REFERENCES', 'UNIQUE', 'CHECK', 'INDEX',
  'CONSTRAINT', 'AUTO_INCREMENT', 'SERIAL', 'BIGSERIAL'
];

const FUNCTIONS = [
  'COUNT', 'SUM', 'AVG', 'MIN', 'MAX', 'COALESCE', 'NULLIF', 'CAST',
  'CONCAT', 'LENGTH', 'TRIM', 'UPPER', 'LOWER', 'SUBSTRING', 'REPLACE',
  'NOW', 'CURRENT_TIMESTAMP', 'DATE', 'EXTRACT', 'DATE_TRUNC',
  'ROW_NUMBER', 'RANK', 'DENSE_RANK', 'LEAD', 'LAG', 'OVER', 'PARTITION BY'
];

function getIndent() {
  const v = document.getElementById('opt-indent').value;
  return v === 'tab' ? '\t' : ' '.repeat(parseInt(v));
}

function applyCase(word) {
  const mode = document.getElementById('opt-case').value;
  if (mode === 'upper') return word.toUpperCase();
  if (mode === 'lower') return word.toLowerCase();
  return word;
}

function formatSQL() {
  const input = document.getElementById('sql-input').value.trim();
  if (!input) { document.getElementById('sql-output').textContent = ''; return; }

  const indent = getIndent();
  const addSemicolons = document.getElementById('opt-semicolons').checked;
  const commaNewLine = document.getElementById('opt-newline-comma').checked;

  // Tokenize: extract strings and comments to protect them
  const tokens = tokenize(input);
  let formatted = formatTokens(tokens, indent, commaNewLine);

  // Add semicolons
  if (addSemicolons) {
    formatted = formatted.split('\n').map(line => line).join('\n');
    if (!formatted.trimEnd().endsWith(';')) {
      formatted = formatted.trimEnd() + ';';
    }
  }

  document.getElementById('sql-output').innerHTML = highlightSQL(formatted);
}

function tokenize(sql) {
  const tokens = [];
  let i = 0;
  while (i < sql.length) {
    // Skip whitespace
    if (/\s/.test(sql[i])) {
      let ws = '';
      while (i < sql.length && /\s/.test(sql[i])) { ws += sql[i]; i++; }
      tokens.push({ type: 'ws', value: ' ' });
      continue;
    }
    // Single-line comment
    if (sql[i] === '-' && sql[i+1] === '-') {
      let cmt = '';
      while (i < sql.length && sql[i] !== '\n') { cmt += sql[i]; i++; }
      tokens.push({ type: 'comment', value: cmt });
      continue;
    }
    // Multi-line comment
    if (sql[i] === '/' && sql[i+1] === '*') {
      let cmt = '';
      while (i < sql.length && !(sql[i] === '*' && sql[i+1] === '/')) { cmt += sql[i]; i++; }
      cmt += '*/'; i += 2;
      tokens.push({ type: 'comment', value: cmt });
      continue;
    }
    // String
    if (sql[i] === "'" || sql[i] === '"') {
      const q = sql[i];
      let str = q; i++;
      while (i < sql.length) {
        if (sql[i] === q && sql[i+1] === q) { str += q + q; i += 2; }
        else if (sql[i] === q) { str += q; i++; break; }
        else { str += sql[i]; i++; }
      }
      tokens.push({ type: 'string', value: str });
      continue;
    }
    // Parentheses, comma, semicolon
    if ('(),;'.includes(sql[i])) {
      tokens.push({ type: 'punct', value: sql[i] }); i++;
      continue;
    }
    // Operators
    if ('<>=!'.includes(sql[i])) {
      let op = sql[i]; i++;
      if (i < sql.length && '=><'.includes(sql[i])) { op += sql[i]; i++; }
      tokens.push({ type: 'op', value: op });
      continue;
    }
    // Numbers
    if (/\d/.test(sql[i])) {
      let num = '';
      while (i < sql.length && /[\d.]/.test(sql[i])) { num += sql[i]; i++; }
      tokens.push({ type: 'number', value: num });
      continue;
    }
    // Dot, asterisk
    if (sql[i] === '.' || sql[i] === '*') {
      tokens.push({ type: 'punct', value: sql[i] }); i++;
      continue;
    }
    // Words (identifiers & keywords)
    if (/[A-Za-z_]/.test(sql[i])) {
      let word = '';
      while (i < sql.length && /[A-Za-z0-9_]/.test(sql[i])) { word += sql[i]; i++; }
      tokens.push({ type: 'word', value: word });
      continue;
    }
    // Other
    tokens.push({ type: 'other', value: sql[i] }); i++;
  }
  return tokens;
}

function formatTokens(tokens, indent, commaNewLine) {
  // Reconstruct SQL string, then apply formatting rules
  let sql = tokens.map(t => t.value).join('');

  // Normalize whitespace
  sql = sql.replace(/\s+/g, ' ').trim();

  // Remove existing semicolons for reprocessing
  sql = sql.replace(/;\s*/g, ';\n');

  let lines = [];
  let depth = 0;

  // Split on major keywords
  const kwPattern = new RegExp(
    '\\b(' + MAJOR_KEYWORDS.map(k => k.replace(/ /g, '\\s+')).join('|') + ')\\b',
    'gi'
  );

  // Process statements separated by semicolons
  const statements = sql.split(/;\s*/).filter(s => s.trim());

  for (const stmt of statements) {
    const formatted = formatStatement(stmt.trim(), indent, commaNewLine);
    lines.push(formatted);
  }

  return lines.join(';\n\n');
}

function formatStatement(sql, indent, commaNewLine) {
  const lines = [];
  let remaining = sql;
  let depth = 0;

  // Sorted by length descending so longer matches first
  const sortedKW = MAJOR_KEYWORDS.slice().sort((a, b) => b.length - a.length);

  while (remaining.trim()) {
    remaining = remaining.trim();

    // Try to match a major keyword at current position
    let matched = false;
    for (const kw of sortedKW) {
      const pattern = new RegExp('^(' + kw.replace(/ /g, '\\s+') + ')\\b', 'i');
      const m = remaining.match(pattern);
      if (m) {
        const kwText = applyCase(kw);

        // Find next major keyword
        let restAfterKW = remaining.slice(m[0].length).trim();
        let nextKWIdx = Infinity;

        for (const nkw of sortedKW) {
          const np = new RegExp('\\b(' + nkw.replace(/ /g, '\\s+') + ')\\b', 'gi');
          const nm = np.exec(restAfterKW);
          if (nm && nm.index < nextKWIdx) {
            // Make sure this isn't inside parens
            const before = restAfterKW.slice(0, nm.index);
            const openP = (before.match(/\(/g) || []).length;
            const closeP = (before.match(/\)/g) || []).length;
            if (openP === closeP) {
              nextKWIdx = nm.index;
            }
          }
        }

        let clause;
        if (nextKWIdx === Infinity) {
          clause = restAfterKW;
          remaining = '';
        } else {
          clause = restAfterKW.slice(0, nextKWIdx).trim();
          remaining = restAfterKW.slice(nextKWIdx);
        }

        // Format the clause
        if (commaNewLine && clause.includes(',') &&
            ['SELECT', 'GROUP BY', 'ORDER BY', 'SET'].some(k => kw.toUpperCase().includes(k))) {
          const parts = splitOnTopLevelCommas(clause);
          lines.push(kwText);
          parts.forEach((p, i) => {
            lines.push(indent + p.trim() + (i < parts.length - 1 ? ',' : ''));
          });
        } else if (clause) {
          const indentKW = ['ON', 'AND', 'SET'].includes(kw.toUpperCase());
          const prefix = indentKW ? indent : '';
          lines.push(prefix + kwText + ' ' + clause);
        } else {
          lines.push(kwText);
        }

        matched = true;
        break;
      }
    }

    if (!matched) {
      // No keyword match — take until next keyword
      let nextKWIdx = Infinity;
      for (const kw of sortedKW) {
        const pattern = new RegExp('\\b(' + kw.replace(/ /g, '\\s+') + ')\\b', 'gi');
        const m = pattern.exec(remaining);
        if (m && m.index > 0 && m.index < nextKWIdx) {
          nextKWIdx = m.index;
        }
      }
      if (nextKWIdx === Infinity) {
        lines.push(remaining);
        remaining = '';
      } else {
        lines.push(remaining.slice(0, nextKWIdx).trim());
        remaining = remaining.slice(nextKWIdx);
      }
    }
  }

  // Post-process: handle AND/OR on new lines within WHERE
  const result = [];
  let inWhere = false;
  for (const line of lines) {
    const upper = line.trim().toUpperCase();
    if (upper.startsWith('WHERE') || upper.startsWith('HAVING')) {
      inWhere = true;
      // Split AND/OR within WHERE clause
      const whereContent = line.replace(/^(WHERE|HAVING)\s+/i, '');
      const kwLabel = line.match(/^(WHERE|HAVING)\s+/i)?.[1] || 'WHERE';
      const subClauses = splitOnAndOr(whereContent);
      if (subClauses.length > 1) {
        result.push(applyCase(kwLabel) + ' ' + subClauses[0].trim());
        for (let i = 1; i < subClauses.length; i++) {
          const sc = subClauses[i].trim();
          const prefix = /^(AND|OR)\b/i.test(sc) ? indent : indent + applyCase('AND') + ' ';
          if (/^(AND|OR)\b/i.test(sc)) {
            const match = sc.match(/^(AND|OR)\s+(.*)/i);
            result.push(indent + applyCase(match[1]) + ' ' + match[2]);
          } else {
            result.push(indent + sc);
          }
        }
      } else {
        result.push(line);
      }
    } else {
      result.push(line);
    }
  }

  return result.join('\n');
}

function splitOnTopLevelCommas(str) {
  const parts = [];
  let depth = 0;
  let current = '';
  for (let i = 0; i < str.length; i++) {
    if (str[i] === '(') depth++;
    else if (str[i] === ')') depth--;
    else if (str[i] === ',' && depth === 0) {
      parts.push(current);
      current = '';
      continue;
    }
    current += str[i];
  }
  if (current.trim()) parts.push(current);
  return parts;
}

function splitOnAndOr(str) {
  const parts = [];
  let depth = 0;
  let current = '';
  let i = 0;
  while (i < str.length) {
    if (str[i] === '(') { depth++; current += str[i]; i++; continue; }
    if (str[i] === ')') { depth--; current += str[i]; i++; continue; }
    if (depth === 0) {
      const rest = str.slice(i);
      const m = rest.match(/^(AND|OR)\b/i);
      if (m && current.trim()) {
        parts.push(current.trim());
        current = '';
      }
    }
    current += str[i];
    i++;
  }
  if (current.trim()) parts.push(current.trim());
  return parts;
}

function highlightSQL(sql) {
  // Escape HTML
  let html = sql.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Highlight strings
  html = html.replace(/'[^']*'/g, '<span class="str">$&</span>');

  // Highlight comments
  html = html.replace(/--.*$/gm, '<span class="cmt">$&</span>');
  html = html.replace(/\/\*[\s\S]*?\*\//g, '<span class="cmt">$&</span>');

  // Highlight numbers
  html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');

  // Highlight keywords
  const allKW = [...MAJOR_KEYWORDS, ...INLINE_KEYWORDS];
  const kwSet = new Set(allKW.map(k => k.toUpperCase()));
  html = html.replace(/\b([A-Za-z_]+(?:\s+[A-Za-z_]+)?)\b/g, (match) => {
    if (kwSet.has(match.toUpperCase())) return `<span class="kw">${match}</span>`;
    return match;
  });

  // Highlight functions
  const fnSet = new Set(FUNCTIONS.map(f => f.toUpperCase()));
  html = html.replace(/\b([A-Za-z_]+)\s*(?=\()/g, (match, name) => {
    if (fnSet.has(name.toUpperCase())) return `<span class="fn">${name}</span>`;
    return match;
  });

  return html;
}

function minifySQL() {
  const input = document.getElementById('sql-input').value.trim();
  if (!input) return;
  // Remove comments
  let sql = input.replace(/--.*$/gm, '').replace(/\/\*[\s\S]*?\*\//g, '');
  // Collapse whitespace
  sql = sql.replace(/\s+/g, ' ').trim();
  document.getElementById('sql-output').innerHTML = highlightSQL(sql.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'));
  document.getElementById('sql-output').innerHTML = highlightSQL(sql);
}

function clearAll() {
  document.getElementById('sql-input').value = '';
  document.getElementById('sql-output').textContent = '';
}

function copyOutput() {
  const text = document.getElementById('sql-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

const SAMPLES = {
  select: `SELECT u.id, u.name, u.email, o.total, o.created_at FROM users u INNER JOIN orders o ON u.id = o.user_id WHERE u.active = 1 AND o.total > 100 AND o.created_at >= '2024-01-01' GROUP BY u.id, u.name, u.email ORDER BY o.total DESC LIMIT 50;`,
  insert: `INSERT INTO users (name, email, role, created_at) VALUES ('Alice', 'alice@example.com', 'admin', NOW()), ('Bob', 'bob@example.com', 'user', NOW()), ('Charlie', 'charlie@example.com', 'user', NOW());`,
  update: `UPDATE products SET price = price * 1.10, updated_at = NOW() WHERE category = 'electronics' AND stock > 0 AND active = true;`,
  create: `CREATE TABLE orders (id SERIAL PRIMARY KEY, user_id INTEGER NOT NULL REFERENCES users(id), total DECIMAL(10,2) NOT NULL DEFAULT 0, status VARCHAR(20) NOT NULL DEFAULT 'pending', created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP, CHECK (total >= 0));`,
  subquery: `SELECT name, email FROM users WHERE id IN (SELECT user_id FROM orders WHERE total > (SELECT AVG(total) FROM orders) AND created_at >= '2024-01-01') ORDER BY name;`,
  cte: `WITH monthly_sales AS (SELECT DATE_TRUNC('month', created_at) AS month, SUM(total) AS revenue, COUNT(*) AS order_count FROM orders WHERE created_at >= '2024-01-01' GROUP BY DATE_TRUNC('month', created_at)), ranked AS (SELECT month, revenue, order_count, RANK() OVER (ORDER BY revenue DESC) AS rank FROM monthly_sales) SELECT month, revenue, order_count, rank FROM ranked WHERE rank <= 6 ORDER BY month;`
};

function loadSample(key) {
  document.getElementById('sql-input').value = SAMPLES[key];
  formatSQL();
}

// Auto-format on load
formatSQL();

// Format on option change
['opt-case', 'opt-indent', 'opt-semicolons', 'opt-newline-comma'].forEach(id => {
  document.getElementById(id).addEventListener('change', formatSQL);
});
</script>
