<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Text Generator — Free Online Tool</title>
<meta name="description" content="Create stunning gradient text with CSS. Adjust colors, direction, font size, and weight — copy the code instantly. 100% client-side.">
<meta name="keywords" content="css gradient text, text gradient, css text effect, gradient heading, web design tool">
<meta name="author" content="Steven Li">
<meta property="og:title" content="CSS Gradient Text Generator">
<meta property="og:description" content="Create beautiful gradient text effects with live preview and copy-ready CSS.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/cssgradienttext.html">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/cssgradienttext.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .preview-area {
    display: flex; align-items: center; justify-content: center;
    min-height: 250px; padding: 2rem;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); overflow: hidden;
  }
  #preview {
    font-family: var(--sans); text-align: center; word-break: break-word;
    background: linear-gradient(90deg, #6366f1, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1.2;
  }
  .control-group { margin-bottom: 1rem; }
  .control-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .35rem; color: var(--text); }
  .control-group input[type="text"],
  .control-group input[type="number"],
  .control-group select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .85rem;
  }
  .control-group input[type="range"] { width: 100%; margin-top: 4px; }
  .range-label { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); }
  .color-stops { display: flex; flex-direction: column; gap: 8px; }
  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type="color"] { width: 40px; height: 34px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; padding: 2px; background: var(--bg); }
  .color-row input[type="text"] { flex: 1; }
  .color-row input[type="number"] { width: 70px; }
  .btn-sm {
    padding: 6px 12px; font-size: .78rem; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--surface); cursor: pointer; color: var(--text);
  }
  .btn-sm:hover { border-color: var(--accent); }
  .btn-rm { color: var(--error); border-color: var(--error); }
  .btn-rm:hover { background: var(--error); color: #fff; }
  .output-box {
    position: relative; margin-top: 14px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 48px 14px 14px; font-family: var(--mono); font-size: .82rem;
    white-space: pre-wrap; word-break: break-all; min-height: 48px; line-height: 1.6;
  }
  .copy-btn {
    position: absolute; top: 8px; right: 8px; padding: 4px 10px; font-size: .78rem;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--accent); color: #fff; cursor: pointer;
  }
  .copy-btn.copied { background: var(--success); border-color: var(--success); }
  .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .preset {
    padding: 6px 12px; border-radius: 99px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: .82rem; cursor: pointer;
  }
  .preset:hover { border-color: var(--accent); }
  .bg-toggle { display: flex; gap: 6px; }
  .bg-opt {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    font-size: .78rem; cursor: pointer; background: var(--surface); color: var(--text);
  }
  .bg-opt.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  @media (max-width: 768px) {
    .panels { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>CSS Gradient Text Generator</h1>
<p class="subtitle">Create stunning gradient text effects with live preview &mdash; adjust colors, direction, and font properties, then copy the CSS.</p>

<div class="presets">
  <button class="preset" onclick="loadPreset('sunset')">Sunset</button>
  <button class="preset" onclick="loadPreset('ocean')">Ocean</button>
  <button class="preset" onclick="loadPreset('neon')">Neon</button>
  <button class="preset" onclick="loadPreset('fire')">Fire</button>
  <button class="preset" onclick="loadPreset('forest')">Forest</button>
  <button class="preset" onclick="loadPreset('aurora')">Aurora</button>
  <button class="preset" onclick="loadPreset('candy')">Candy</button>
  <button class="preset" onclick="loadPreset('mono')">Monochrome</button>
</div>

<div class="panels">
  <div>
    <div class="card" style="padding:16px;">
      <div class="control-group">
        <label>Preview Text</label>
        <input type="text" id="textInput" value="Gradient Text" oninput="update()">
      </div>
      <div class="control-group">
        <label>Font Size: <span id="sizeVal">64</span>px</label>
        <input type="range" id="fontSize" min="16" max="200" value="64" oninput="update()">
      </div>
      <div class="control-group">
        <label>Font Weight: <span id="weightVal">800</span></label>
        <input type="range" id="fontWeight" min="100" max="900" step="100" value="800" oninput="update()">
      </div>
      <div class="control-group">
        <label>Gradient Direction</label>
        <select id="direction" onchange="update()">
          <option value="90deg">Left → Right (90deg)</option>
          <option value="180deg">Top → Bottom (180deg)</option>
          <option value="0deg">Bottom → Top (0deg)</option>
          <option value="270deg">Right → Left (270deg)</option>
          <option value="45deg">Diagonal ↗ (45deg)</option>
          <option value="135deg">Diagonal ↘ (135deg)</option>
          <option value="225deg">Diagonal ↙ (225deg)</option>
          <option value="315deg">Diagonal ↖ (315deg)</option>
        </select>
      </div>
      <div class="control-group">
        <label>Color Stops</label>
        <div class="color-stops" id="colorStops"></div>
        <div style="margin-top:8px; display:flex; gap:6px;">
          <button class="btn-sm" onclick="addStop()">+ Add Color Stop</button>
        </div>
      </div>
      <div class="control-group">
        <label>Preview Background</label>
        <div class="bg-toggle">
          <button class="bg-opt active" data-bg="#f5f5f5" onclick="setBg(this)">Light</button>
          <button class="bg-opt" data-bg="#1a1a2e" onclick="setBg(this)">Dark</button>
          <button class="bg-opt" data-bg="#ffffff" onclick="setBg(this)">White</button>
          <button class="bg-opt" data-bg="#000000" onclick="setBg(this)">Black</button>
        </div>
      </div>
    </div>
  </div>
  <div>
    <div class="preview-area" id="previewArea">
      <div id="preview">Gradient Text</div>
    </div>
    <div style="position:relative;">
      <div class="output-box" id="output"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyCSS()">Copy</button>
    </div>
  </div>
</div>

<footer style="text-align:center; padding:2rem 0; color:var(--muted); font-size:.85rem;">
  Built with ☕ by Steven Li · No data leaves your browser
</footer>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const $ = id => document.getElementById(id);

let stops = [
  { color: '#6366f1', position: 0 },
  { color: '#ec4899', position: 100 }
];

function renderStops() {
  const container = $('colorStops');
  container.innerHTML = '';
  stops.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'color-row';
    row.innerHTML = `
      <input type="color" value="${s.color}" onchange="stops[${i}].color=this.value;update()">
      <input type="text" value="${s.color}" oninput="stops[${i}].color=this.value;this.previousElementSibling.value=this.value;update()" style="font-family:var(--mono);font-size:.82rem;">
      <input type="number" value="${s.position}" min="0" max="100" onchange="stops[${i}].position=+this.value;update()" style="font-family:var(--mono);font-size:.82rem;">
      <span style="font-size:.75rem;color:var(--muted);">%</span>
      ${stops.length > 2 ? `<button class="btn-sm btn-rm" onclick="removeStop(${i})">✕</button>` : ''}
    `;
    container.appendChild(row);
  });
}

function addStop() {
  const last = stops[stops.length - 1];
  const prev = stops[stops.length - 2];
  const pos = Math.min(100, Math.round((last.position + (prev ? prev.position : 0)) / 2 + 25));
  stops.push({ color: '#a855f7', position: Math.min(pos, 100) });
  stops.sort((a, b) => a.position - b.position);
  renderStops();
  update();
}

function removeStop(i) {
  if (stops.length <= 2) return;
  stops.splice(i, 1);
  renderStops();
  update();
}

function update() {
  const text = $('textInput').value || 'Gradient Text';
  const size = $('fontSize').value;
  const weight = $('fontWeight').value;
  const dir = $('direction').value;

  $('sizeVal').textContent = size;
  $('weightVal').textContent = weight;

  const gradientStops = stops.map(s => `${s.color} ${s.position}%`).join(', ');
  const gradient = `linear-gradient(${dir}, ${gradientStops})`;

  const preview = $('preview');
  preview.textContent = text;
  preview.style.fontSize = size + 'px';
  preview.style.fontWeight = weight;
  preview.style.background = gradient;
  preview.style.webkitBackgroundClip = 'text';
  preview.style.webkitTextFillColor = 'transparent';
  preview.style.backgroundClip = 'text';

  const css = `.gradient-text {
  background: ${gradient};
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: ${size}px;
  font-weight: ${weight};
}`;
  $('output').textContent = css;
}

function setBg(el) {
  document.querySelectorAll('.bg-opt').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  $('previewArea').style.background = el.dataset.bg;
}

function copyCSS() {
  navigator.clipboard.writeText($('output').textContent).then(() => {
    const btn = $('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    const t = $('toast'); t.classList.add('show');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); t.classList.remove('show'); }, 1500);
  });
}

function loadPreset(name) {
  const presets = {
    sunset:  [{ color: '#f97316', position: 0 }, { color: '#ef4444', position: 50 }, { color: '#a855f7', position: 100 }],
    ocean:   [{ color: '#06b6d4', position: 0 }, { color: '#3b82f6', position: 50 }, { color: '#6366f1', position: 100 }],
    neon:    [{ color: '#22d3ee', position: 0 }, { color: '#a78bfa', position: 50 }, { color: '#f472b6', position: 100 }],
    fire:    [{ color: '#fbbf24', position: 0 }, { color: '#f97316', position: 40 }, { color: '#ef4444', position: 100 }],
    forest:  [{ color: '#22c55e', position: 0 }, { color: '#059669', position: 50 }, { color: '#0d9488', position: 100 }],
    aurora:  [{ color: '#34d399', position: 0 }, { color: '#818cf8', position: 50 }, { color: '#c084fc', position: 100 }],
    candy:   [{ color: '#f472b6', position: 0 }, { color: '#fb923c', position: 50 }, { color: '#facc15', position: 100 }],
    mono:    [{ color: '#374151', position: 0 }, { color: '#9ca3af', position: 100 }]
  };
  stops = presets[name] || stops;
  renderStops();
  update();
}

renderStops();
update();
</script>
</body>
</html>
