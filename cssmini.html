<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS/JS Minifier - Free Online Tool</title>
<meta name="description" content="Free online CSS and JavaScript minifier and beautifier. Compress code for production or format it for readability. Shows compression ratio.">
<meta name="keywords" content="css minifier, js minifier, css beautifier, javascript minifier, code minifier, free minify tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/cssmini.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:900px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:'Courier New',monospace;font-size:.85rem;line-height:1.5;min-height:200px;resize:vertical}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.tab{padding:.45rem .9rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;font-weight:600}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--muted);color:var(--text)}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#16a34a}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
.stats{display:flex;gap:1.5rem;margin-top:1rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:.75rem;color:var(--muted)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>CSS / JS Minifier</h1>
<p class="subtitle">Minify or beautify CSS and JavaScript code instantly</p>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="setLang('css',this)">CSS</button>
<button class="tab" onclick="setLang('js',this)">JavaScript</button>
</div>
<h2>📝 Input</h2>
<textarea id="input" placeholder="Paste your CSS or JavaScript here..." oninput="updateStats()"></textarea>
<div class="btn-row">
<button class="btn-success" onclick="minify()">🗜️ Minify</button>
<button class="btn-primary" onclick="beautify()">✨ Beautify</button>
</div>
</div>

<div class="card">
<h2>📤 Output</h2>
<textarea id="output" readonly></textarea>
<div class="stats" id="stats"></div>
<div class="btn-row">
<button class="btn-primary" onclick="copyOut()">📋 Copy</button>
<button class="btn-secondary" onclick="download()">⬇️ Download</button>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
let lang='css';
function $id(id){return document.getElementById(id)}

function setLang(l,btn){
  lang=l;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

function minifyCSS(s){
  return s
    .replace(/\/\*[\s\S]*?\*\//g,'')
    .replace(/\s+/g,' ')
    .replace(/\s*([{}:;,>~+])\s*/g,'$1')
    .replace(/;}/g,'}')
    .replace(/^\s+|\s+$/g,'')
    .trim();
}

function minifyJS(s){
  // Remove single-line comments (but not URLs)
  s=s.replace(/(["'`])(?:(?!\1|\\).|\\.)*\1|\/\/.*$/gm,(m,q)=>q?m:'');
  // Remove multi-line comments
  s=s.replace(/\/\*[\s\S]*?\*\//g,'');
  // Collapse whitespace
  s=s.replace(/\s+/g,' ');
  // Remove spaces around operators
  s=s.replace(/\s*([{}();,=+\-*/<>!&|?:])\s*/g,'$1');
  return s.trim();
}

function beautifyCSS(s){
  s=minifyCSS(s);
  let out='',indent=0;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='{'){out+=' {\n'+'  '.repeat(++indent)}
    else if(c==='}'){out+='\n'+'  '.repeat(--indent)+'}\n'+'  '.repeat(indent)}
    else if(c===';'){out+=';\n'+'  '.repeat(indent)}
    else out+=c;
  }
  return out.replace(/\n\s*\n/g,'\n').trim();
}

function beautifyJS(s){
  // Simple indent-based beautifier
  let out='',indent=0;
  s=s.replace(/\s+/g,' ').trim();
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='{'){out+=' {\n'+'  '.repeat(++indent)}
    else if(c==='}'){indent=Math.max(0,indent-1);out+='\n'+'  '.repeat(indent)+'}\n'+'  '.repeat(indent)}
    else if(c===';'){out+=';\n'+'  '.repeat(indent)}
    else out+=c;
  }
  return out.replace(/\n\s*\n/g,'\n').trim();
}

function minify(){
  const input=$id('input').value;
  const output=lang==='css'?minifyCSS(input):minifyJS(input);
  $id('output').value=output;
  showStats(input,output);
}

function beautify(){
  const input=$id('input').value;
  const output=lang==='css'?beautifyCSS(input):beautifyJS(input);
  $id('output').value=output;
  showStats(input,output);
}

function showStats(inp,out){
  const origSize=new Blob([inp]).size;
  const newSize=new Blob([out]).size;
  const saved=origSize-newSize;
  const pct=origSize?Math.round((saved/origSize)*100):0;
  $id('stats').innerHTML=`
    <div class="stat"><div class="stat-val">${fmt(origSize)}</div><div class="stat-label">Original</div></div>
    <div class="stat"><div class="stat-val">${fmt(newSize)}</div><div class="stat-label">Result</div></div>
    <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-label">${saved>=0?'Saved':'Added'}</div></div>
  `;
}

function fmt(bytes){
  if(bytes<1024) return bytes+' B';
  return (bytes/1024).toFixed(1)+' KB';
}

function updateStats(){$id('stats').innerHTML=''}

function copyOut(){
  navigator.clipboard.writeText($id('output').value).then(()=>{
    const t=$id('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function download(){
  const ext=lang==='css'?'css':'js';
  const blob=new Blob([$id('output').value],{type:'text/'+ext});
  const a=document.createElement('a');
  a.download='minified.'+ext;a.href=URL.createObjectURL(blob);a.click();
}

$id('input').value=`/* Main styles */\n.container {\n  max-width: 1200px;\n  margin: 0 auto;\n  padding: 20px;\n}\n\n.header {\n  background: #1e293b;\n  color: white;\n  padding: 16px 24px;\n  border-radius: 8px;\n}\n\n.header h1 {\n  font-size: 1.5rem;\n  font-weight: 700;\n}`;
</script>
</body>
</html>
