<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS/JS Minifier - Free Online Tool</title>
<meta name="description" content="Free online CSS and JavaScript minifier and beautifier. Compress code for production or format it for readability. Shows compression ratio.">
<meta name="keywords" content="css minifier, js minifier, css beautifier, javascript minifier, code minifier, free minify tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/cssmini.html">
<link rel="stylesheet" href="toolbox.css">
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>CSS / JS Minifier</h1>
<p class="subtitle">Minify or beautify CSS and JavaScript code instantly</p>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="setLang('css',this)">CSS</button>
<button class="tab" onclick="setLang('js',this)">JavaScript</button>
</div>
<h2>📝 Input</h2>
<textarea id="input" placeholder="Paste your CSS or JavaScript here..." oninput="updateStats()"></textarea>
<div class="btn-row">
<button class="btn-success" onclick="minify()">🗜️ Minify</button>
<button class="btn-primary" onclick="beautify()">✨ Beautify</button>
</div>
</div>

<div class="card">
<h2>📤 Output</h2>
<textarea id="output" readonly></textarea>
<div class="stats" id="stats"></div>
<div class="btn-row">
<button class="btn-primary" onclick="copyOut()">📋 Copy</button>
<button class="btn-secondary" onclick="download()">⬇️ Download</button>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
let lang='css';
function $id(id){return document.getElementById(id)}

function setLang(l,btn){
  lang=l;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

function minifyCSS(s){
  return s
    .replace(/\/\*[\s\S]*?\*\//g,'')
    .replace(/\s+/g,' ')
    .replace(/\s*([{}:;,>~+])\s*/g,'$1')
    .replace(/;}/g,'}')
    .replace(/^\s+|\s+$/g,'')
    .trim();
}

function minifyJS(s){
  // Remove single-line comments (but not URLs)
  s=s.replace(/(["'`])(?:(?!\1|\\).|\\.)*\1|\/\/.*$/gm,(m,q)=>q?m:'');
  // Remove multi-line comments
  s=s.replace(/\/\*[\s\S]*?\*\//g,'');
  // Collapse whitespace
  s=s.replace(/\s+/g,' ');
  // Remove spaces around operators
  s=s.replace(/\s*([{}();,=+\-*/<>!&|?:])\s*/g,'$1');
  return s.trim();
}

function beautifyCSS(s){
  s=minifyCSS(s);
  let out='',indent=0;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='{'){out+=' {\n'+'  '.repeat(++indent)}
    else if(c==='}'){out+='\n'+'  '.repeat(--indent)+'}\n'+'  '.repeat(indent)}
    else if(c===';'){out+=';\n'+'  '.repeat(indent)}
    else out+=c;
  }
  return out.replace(/\n\s*\n/g,'\n').trim();
}

function beautifyJS(s){
  // Simple indent-based beautifier
  let out='',indent=0;
  s=s.replace(/\s+/g,' ').trim();
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(c==='{'){out+=' {\n'+'  '.repeat(++indent)}
    else if(c==='}'){indent=Math.max(0,indent-1);out+='\n'+'  '.repeat(indent)+'}\n'+'  '.repeat(indent)}
    else if(c===';'){out+=';\n'+'  '.repeat(indent)}
    else out+=c;
  }
  return out.replace(/\n\s*\n/g,'\n').trim();
}

function minify(){
  const input=$id('input').value;
  const output=lang==='css'?minifyCSS(input):minifyJS(input);
  $id('output').value=output;
  showStats(input,output);
}

function beautify(){
  const input=$id('input').value;
  const output=lang==='css'?beautifyCSS(input):beautifyJS(input);
  $id('output').value=output;
  showStats(input,output);
}

function showStats(inp,out){
  const origSize=new Blob([inp]).size;
  const newSize=new Blob([out]).size;
  const saved=origSize-newSize;
  const pct=origSize?Math.round((saved/origSize)*100):0;
  $id('stats').innerHTML=`
    <div class="stat"><div class="stat-val">${fmt(origSize)}</div><div class="stat-label">Original</div></div>
    <div class="stat"><div class="stat-val">${fmt(newSize)}</div><div class="stat-label">Result</div></div>
    <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-label">${saved>=0?'Saved':'Added'}</div></div>
  `;
}

function fmt(bytes){
  if(bytes<1024) return bytes+' B';
  return (bytes/1024).toFixed(1)+' KB';
}

function updateStats(){$id('stats').innerHTML=''}

function copyOut(){
  navigator.clipboard.writeText($id('output').value).then(()=>{
    const t=$id('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function download(){
  const ext=lang==='css'?'css':'js';
  const blob=new Blob([$id('output').value],{type:'text/'+ext});
  const a=document.createElement('a');
  a.download='minified.'+ext;a.href=URL.createObjectURL(blob);a.click();
}

$id('input').value=`/* Main styles */\n.container {\n  max-width: 1200px;\n  margin: 0 auto;\n  padding: 20px;\n}\n\n.header {\n  background: #1e293b;\n  color: white;\n  padding: 16px 24px;\n  border-radius: 8px;\n}\n\n.header h1 {\n  font-size: 1.5rem;\n  font-weight: 700;\n}`;
</script>
</body>
</html>
