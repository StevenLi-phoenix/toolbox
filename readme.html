<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>README Generator — Create Professional GitHub READMEs | Free Online Tool</title>
<meta name="description" content="Generate beautiful, professional README.md files for your GitHub projects. Choose from templates, add badges, license sections, and more. Free, no signup required.">
<meta name="keywords" content="readme generator, github readme, markdown readme, project readme, readme template, readme builder, github documentation, open source readme">
<meta name="author" content="Steven Li">
<meta property="og:title" content="README Generator — Create Professional GitHub READMEs">
<meta property="og:description" content="Generate beautiful README.md files for your GitHub projects with templates, badges, and more. Free online tool.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/readme.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="README Generator — Free Online Tool">
<meta name="twitter:description" content="Scaffold professional README.md files with badges, templates, and sections. No signup needed.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/readme.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .preview-html { padding: 16px; font-size: .9rem; line-height: 1.7; overflow: auto; }
  .preview-html h1 { font-size: 1.4rem; margin: 16px 0 8px; }
  .preview-html h2 { font-size: 1.15rem; margin: 14px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .preview-html h3 { font-size: 1rem; margin: 10px 0 4px; }
  .preview-html h4 { font-size: .95rem; margin: 8px 0 4px; }
  .preview-html blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--muted); margin: 8px 0; }
  .preview-html code { background: var(--surface2); padding: 2px 5px; border-radius: 3px; font-size: .85em; }
  .preview-html pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; overflow-x: auto; margin: 8px 0; }
  .preview-html pre code { background: none; padding: 0; }
  .preview-html ul, .preview-html ol { padding-left: 20px; margin: 6px 0; }
  .preview-html li { margin: 3px 0; }
  .preview-html table { margin: 8px 0; }
  .preview-html hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .preview-html img { max-width: 100%; }
  .preview-html a { color: var(--accent); }
  .preview-panel { display: flex; flex-direction: column; min-height: 400px; }
</style>
</head>
<body>
<header>
<h1>📄 README Generator</h1>
<p>Create professional README.md files for your GitHub projects</p>
</header>
<div class="container">
<div class="template-bar">
<button class="tmpl-btn active" onclick="applyTemplate('minimal')">Minimal</button>
<button class="tmpl-btn" onclick="applyTemplate('standard')">Standard</button>
<button class="tmpl-btn" onclick="applyTemplate('detailed')">Detailed</button>
<button class="tmpl-btn" onclick="applyTemplate('library')">Library/Package</button>
<button class="tmpl-btn" onclick="applyTemplate('cli')">CLI Tool</button>
</div>
<div class="layout">
<div class="panel">
<div class="panel-header">Configuration</div>
<div class="panel-body">
<label>Project Name</label>
<input type="text" id="projName" placeholder="my-awesome-project" oninput="generate()">
<label>Description</label>
<textarea id="projDesc" rows="2" placeholder="A brief description of what your project does" oninput="generate()"></textarea>
<div class="row">
<div>
<label>GitHub Username</label>
<input type="text" id="ghUser" placeholder="username" oninput="generate()">
</div>
<div>
<label>Repo Name</label>
<input type="text" id="ghRepo" placeholder="repo-name" oninput="generate()">
</div>
</div>
<div class="row">
<div>
<label>License</label>
<select id="license" onchange="generate()">
<option value="">None</option>
<option value="MIT" selected>MIT</option>
<option value="Apache-2.0">Apache 2.0</option>
<option value="GPL-3.0">GPL 3.0</option>
<option value="BSD-3-Clause">BSD 3-Clause</option>
<option value="ISC">ISC</option>
<option value="AGPL-3.0">AGPL 3.0</option>
<option value="Unlicense">Unlicense</option>
</select>
</div>
<div>
<label>Language / Framework</label>
<select id="lang" onchange="generate()">
<option value="">Generic</option>
<option value="node">Node.js</option>
<option value="python">Python</option>
<option value="rust">Rust</option>
<option value="go">Go</option>
<option value="java">Java</option>
<option value="ruby">Ruby</option>
<option value="dotnet">.NET / C#</option>
<option value="php">PHP</option>
<option value="swift">Swift</option>
</select>
</div>
</div>

<label>Badges</label>
<div class="badges-grid" id="badgesGrid"></div>

<label>Sections</label>
<div class="sections-list" id="sectionsList"></div>

<label>Installation Command (optional override)</label>
<textarea id="installCmd" rows="2" placeholder="Auto-generated based on language" oninput="generate()"></textarea>

<label>Usage Example (optional)</label>
<textarea id="usageCode" rows="3" placeholder="Add a quick usage snippet..." oninput="generate()"></textarea>

<label>Author Name</label>
<input type="text" id="authorName" placeholder="Your Name" oninput="generate()">

<div class="btn-group">
<button class="btn btn-primary" onclick="copyOutput()">📋 Copy Markdown</button>
<button class="btn btn-secondary" onclick="downloadFile()">⬇ Download .md</button>
</div>
</div>
</div>
<div class="panel preview-panel">
<div class="panel-header">
Output
<div class="tab-bar">
<div class="tab active" onclick="switchTab('raw',this)">Raw</div>
<div class="tab" onclick="switchTab('preview',this)">Preview</div>
</div>
</div>
<div id="rawView" class="output-area" style="border:none;border-radius:0"></div>
<div id="previewView" class="preview-html" style="display:none"></div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<footer>
<p>Made with ☕ by Steven Li · <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">Buy Me a Coffee</a> · <a href="https://github.com/StevenLi-phoenix" target="_blank">GitHub</a></p>
</footer>
<script>
const BADGES=[
{id:'build',label:'Build',gen:(u,r)=>`![Build](https://github.com/${u}/${r}/actions/workflows/ci.yml/badge.svg)`},
{id:'license',label:'License',gen:(u,r,l)=>l?`![License](https://img.shields.io/badge/license-${encodeURIComponent(l)}-blue.svg)`:null},
{id:'version',label:'Version',gen:(u,r)=>`![Version](https://img.shields.io/github/v/release/${u}/${r})`},
{id:'stars',label:'Stars',gen:(u,r)=>`![Stars](https://img.shields.io/github/stars/${u}/${r}?style=social)`},
{id:'forks',label:'Forks',gen:(u,r)=>`![Forks](https://img.shields.io/github/forks/${u}/${r}?style=social)`},
{id:'issues',label:'Issues',gen:(u,r)=>`![Issues](https://img.shields.io/github/issues/${u}/${r})`},
{id:'npm',label:'npm',gen:(u,r)=>`![npm](https://img.shields.io/npm/v/${r})`},
{id:'pypi',label:'PyPI',gen:(u,r)=>`![PyPI](https://img.shields.io/pypi/v/${r})`},
{id:'crates',label:'crates.io',gen:(u,r)=>`![crates.io](https://img.shields.io/crates/v/${r})`},
{id:'downloads',label:'Downloads',gen:(u,r)=>`![Downloads](https://img.shields.io/github/downloads/${u}/${r}/total)`},
{id:'contributors',label:'Contributors',gen:(u,r)=>`![Contributors](https://img.shields.io/github/contributors/${u}/${r})`},
{id:'lastcommit',label:'Last Commit',gen:(u,r)=>`![Last Commit](https://img.shields.io/github/last-commit/${u}/${r})`},
];
const SECTIONS=[
{id:'features',label:'Features',default:true},
{id:'prerequisites',label:'Prerequisites',default:false},
{id:'install',label:'Installation',default:true},
{id:'usage',label:'Usage',default:true},
{id:'config',label:'Configuration',default:false},
{id:'api',label:'API Reference',default:false},
{id:'examples',label:'Examples',default:false},
{id:'testing',label:'Testing',default:false},
{id:'roadmap',label:'Roadmap',default:false},
{id:'contributing',label:'Contributing',default:true},
{id:'changelog',label:'Changelog',default:false},
{id:'faq',label:'FAQ',default:false},
{id:'license',label:'License',default:true},
{id:'acknowledgments',label:'Acknowledgments',default:false},
{id:'contact',label:'Contact',default:false},
];

let activeBadges=new Set(['license']);
let activeSections=new Set(SECTIONS.filter(s=>s.default).map(s=>s.id));
let currentTab='raw';

function initUI(){
const bg=document.getElementById('badgesGrid');
bg.innerHTML=BADGES.map(b=>`<button class="badge-btn${activeBadges.has(b.id)?' active':''}" data-id="${b.id}" onclick="toggleBadge('${b.id}',this)">${b.label}</button>`).join('');
const sl=document.getElementById('sectionsList');
sl.innerHTML=SECTIONS.map(s=>`<button class="section-btn${activeSections.has(s.id)?' active':''}" data-id="${s.id}" onclick="toggleSection('${s.id}',this)">${s.label}</button>`).join('');
}

function toggleBadge(id,el){activeBadges.has(id)?activeBadges.delete(id):activeBadges.add(id);el.classList.toggle('active');generate()}
function toggleSection(id,el){activeSections.has(id)?activeSections.delete(id):activeSections.add(id);el.classList.toggle('active');generate()}

const INSTALL={
node:'```bash\nnpm install <package-name>\n# or\nyarn add <package-name>\n```',
python:'```bash\npip install <package-name>\n```',
rust:'```bash\ncargo install <package-name>\n```',
go:'```bash\ngo install github.com/<user>/<repo>@latest\n```',
java:'```xml\n<dependency>\n  <groupId>com.example</groupId>\n  <artifactId><repo></artifactId>\n  <version>1.0.0</version>\n</dependency>\n```',
ruby:'```bash\ngem install <package-name>\n```',
dotnet:'```bash\ndotnet add package <package-name>\n```',
php:'```bash\ncomposer require <vendor>/<package-name>\n```',
swift:'```swift\n// Package.swift\ndependencies: [\n  .package(url: "https://github.com/<user>/<repo>.git", from: "1.0.0")\n]\n```',
};
const INSTALL_GENERIC='```bash\ngit clone https://github.com/<user>/<repo>.git\ncd <repo>\n```';

const TEST_CMD={node:'npm test',python:'pytest',rust:'cargo test',go:'go test ./...',java:'mvn test',ruby:'bundle exec rspec',dotnet:'dotnet test',php:'composer test',swift:'swift test'};

function getInstall(lang,user,repo,name){
let cmd=document.getElementById('installCmd').value.trim();
if(cmd)return'```bash\n'+cmd+'\n```';
let t=INSTALL[lang]||INSTALL_GENERIC;
return t.replace(/<user>/g,user||'username').replace(/<repo>/g,repo||name||'repo').replace(/<package-name>/g,name||repo||'package').replace(/<vendor>/g,user||'vendor');
}

function generate(){
const name=document.getElementById('projName').value.trim()||'my-project';
const desc=document.getElementById('projDesc').value.trim()||'A brief description of your project.';
const user=document.getElementById('ghUser').value.trim();
const repo=document.getElementById('ghRepo').value.trim()||name;
const license=document.getElementById('license').value;
const lang=document.getElementById('lang').value;
const usage=document.getElementById('usageCode').value.trim();
const author=document.getElementById('authorName').value.trim();
const u=user||'username',r=repo;
let md=[];

// Title
md.push(`# ${name}\n`);

// Badges
let badges=[];
BADGES.forEach(b=>{if(activeBadges.has(b.id)){const v=b.gen(u,r,license);if(v)badges.push(v)}});
if(badges.length)md.push(badges.join(' ')+'\n');

// Description
md.push(`> ${desc}\n`);

// TOC
if(activeSections.size>2){
md.push('## Table of Contents\n');
let ordered=SECTIONS.filter(s=>activeSections.has(s.id));
ordered.forEach(s=>md.push(`- [${s.label}](#${s.label.toLowerCase().replace(/\s+/g,'-')})`));
md.push('');
}

// Sections
if(activeSections.has('features')){
md.push('## Features\n');
md.push('- ✨ Feature one');
md.push('- 🚀 Feature two');
md.push('- 🔒 Feature three\n');
}
if(activeSections.has('prerequisites')){
md.push('## Prerequisites\n');
md.push(`- [${lang==='node'?'Node.js (>=18)':lang==='python'?'Python (>=3.9)':lang==='rust'?'Rust (stable)':lang==='go'?'Go (>=1.21)':'Runtime/environment'}](${lang==='node'?'https://nodejs.org':lang==='python'?'https://python.org':lang==='rust'?'https://rustup.rs':lang==='go'?'https://go.dev':'#'})\n`);
}
if(activeSections.has('install')){
md.push('## Installation\n');
md.push(getInstall(lang,u,r,name)+'\n');
}
if(activeSections.has('usage')){
md.push('## Usage\n');
if(usage){
const ext=lang==='node'?'javascript':lang==='python'?'python':lang==='rust'?'rust':lang==='go'?'go':lang==='java'?'java':lang==='ruby'?'ruby':lang==='dotnet'?'csharp':lang==='php'?'php':lang==='swift'?'swift':'';
md.push('```'+ext+'\n'+usage+'\n```\n');
}else{
md.push('```bash\n# Example usage\n'+name+' --help\n```\n');
}
}
if(activeSections.has('config')){
md.push('## Configuration\n');
md.push('| Variable | Description | Default |');
md.push('|----------|-------------|---------|');
md.push('| `PORT` | Server port | `3000` |');
md.push('| `DEBUG` | Enable debug mode | `false` |\n');
}
if(activeSections.has('api')){
md.push('## API Reference\n');
md.push('#### `GET /api/resource`\n');
md.push('| Parameter | Type | Description |');
md.push('|-----------|------|-------------|');
md.push('| `id` | `string` | **Required**. Resource ID |\n');
}
if(activeSections.has('examples')){
md.push('## Examples\n');
md.push('Check out the [examples](./examples) directory for more usage patterns.\n');
}
if(activeSections.has('testing')){
md.push('## Testing\n');
let tc=TEST_CMD[lang]||'# Run tests';
md.push('```bash\n'+tc+'\n```\n');
}
if(activeSections.has('roadmap')){
md.push('## Roadmap\n');
md.push('- [x] Initial release');
md.push('- [ ] Feature A');
md.push('- [ ] Feature B');
md.push('- [ ] v2.0 release\n');
}
if(activeSections.has('contributing')){
md.push('## Contributing\n');
md.push('Contributions are welcome! Please read the [contributing guidelines](CONTRIBUTING.md) first.\n');
md.push('1. Fork the repository');
md.push('2. Create your feature branch (`git checkout -b feature/amazing-feature`)');
md.push('3. Commit your changes (`git commit -m \'Add amazing feature\'`)');
md.push('4. Push to the branch (`git push origin feature/amazing-feature`)');
md.push('5. Open a Pull Request\n');
}
if(activeSections.has('changelog')){
md.push('## Changelog\n');
md.push('See [CHANGELOG.md](CHANGELOG.md) for a list of changes.\n');
}
if(activeSections.has('faq')){
md.push('## FAQ\n');
md.push('**Q: How do I …?**\n');
md.push('A: You can …\n');
}
if(activeSections.has('license')){
md.push('## License\n');
if(license){md.push(`This project is licensed under the ${license} License — see the [LICENSE](LICENSE) file for details.\n`);}
else{md.push('This project is licensed under [your license here].\n');}
}
if(activeSections.has('acknowledgments')){
md.push('## Acknowledgments\n');
md.push('- [Awesome Resource](https://example.com)');
md.push('- Inspiration from …\n');
}
if(activeSections.has('contact')){
md.push('## Contact\n');
md.push(`${author||'Your Name'} — ${user?`[@${user}](https://github.com/${user})`:'@username'}\n`);
md.push(`Project Link: [https://github.com/${u}/${r}](https://github.com/${u}/${r})\n`);
}

// Footer
md.push('---\n');
if(user)md.push(`Made with ❤️ by [${author||user}](https://github.com/${user})`);
else if(author)md.push(`Made with ❤️ by ${author}`);

const output=md.join('\n');
document.getElementById('rawView').textContent=output;
document.getElementById('previewView').innerHTML=mdToHtml(output);
}

function mdToHtml(md){
let h=md
.replace(/^### (.+)$/gm,'<h3>$1</h3>')
.replace(/^## (.+)$/gm,'<h2>$1</h2>')
.replace(/^# (.+)$/gm,'<h1>$1</h1>')
.replace(/^> (.+)$/gm,'<blockquote><p>$1</p></blockquote>')
.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
.replace(/`([^`]+)`/g,'<code>$1</code>')
.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">')
.replace(/^---$/gm,'<hr>');
// code blocks
h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>'<pre><code>'+code.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code></pre>');
// tables
h=h.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm,(m,hdr,sep,body)=>{
const ths=hdr.split('|').filter(c=>c.trim()).map(c=>'<th>'+c.trim()+'</th>').join('');
const rows=body.trim().split('\n').map(r=>{
const tds=r.split('|').filter(c=>c.trim()).map(c=>'<td>'+c.trim()+'</td>').join('');
return '<tr>'+tds+'</tr>';
}).join('');
return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>';
});
// lists
h=h.replace(/^- \[x\] (.+)$/gm,'<li>☑ $1</li>');
h=h.replace(/^- \[ \] (.+)$/gm,'<li>☐ $1</li>');
h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
h=h.replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>');
h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
h=h.replace(/\n{2,}/g,'<br><br>');
return h;
}

function switchTab(tab,el){
currentTab=tab;
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');
document.getElementById('rawView').style.display=tab==='raw'?'block':'none';
document.getElementById('previewView').style.display=tab==='preview'?'block':'none';
}

function copyOutput(){
const text=document.getElementById('rawView').textContent;
navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard!'));
}

function downloadFile(){
const text=document.getElementById('rawView').textContent;
const blob=new Blob([text],{type:'text/markdown'});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='README.md';
a.click();
URL.revokeObjectURL(a.href);
showToast('Downloaded README.md');
}

function showToast(msg){
const t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2000);
}

function applyTemplate(tmpl){
document.querySelectorAll('.tmpl-btn').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
activeBadges.clear();
activeSections.clear();
switch(tmpl){
case'minimal':
activeBadges.add('license');
['install','usage','license'].forEach(s=>activeSections.add(s));
break;
case'standard':
['license','build','stars'].forEach(b=>activeBadges.add(b));
['features','install','usage','contributing','license'].forEach(s=>activeSections.add(s));
break;
case'detailed':
['license','build','stars','version','issues','lastcommit'].forEach(b=>activeBadges.add(b));
['features','prerequisites','install','usage','config','testing','roadmap','contributing','license','contact'].forEach(s=>activeSections.add(s));
break;
case'library':
['license','version','downloads','build'].forEach(b=>activeBadges.add(b));
['features','install','usage','api','examples','testing','contributing','changelog','license'].forEach(s=>activeSections.add(s));
break;
case'cli':
['license','version','build','downloads'].forEach(b=>activeBadges.add(b));
['features','prerequisites','install','usage','config','examples','contributing','license'].forEach(s=>activeSections.add(s));
break;
}
initUI();
generate();
}

initUI();
generate();
</script>
</body>
</html>
