<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS @keyframes Animation Builder - Free Online Tool</title>
<meta name="description" content="Create CSS @keyframes animations visually with live preview. Add keyframes, configure properties, and export ready-to-use CSS code.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/keyframes.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .preview-box { min-height: 200px; border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; background: var(--surface); position: relative; overflow: hidden; }
  .preview-target { width: 80px; height: 80px; background: var(--accent); border-radius: var(--radius); }
  .timeline { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .kf-chip { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; font-size: .82rem; font-family: var(--mono); transition: all .15s; }
  .kf-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .kf-chip:hover { border-color: var(--accent); }
  .remove-kf { margin-left: 6px; color: inherit; opacity: .6; cursor: pointer; }
  .remove-kf:hover { opacity: 1; }
  .prop-row { display: flex; gap: .5rem; margin-bottom: .5rem; align-items: center; }
  .prop-row select, .prop-row input { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: .85rem; }
  .prop-row select { width: 160px; font-family: var(--mono); }
  .prop-row input { flex: 1; font-family: var(--mono); }
  .prop-row button { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--error); cursor: pointer; }
  .add-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; font-size: .85rem; }
  .add-btn:hover { background: var(--surface2); }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .35rem; }
  .form-group input, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: .9rem; }
  .config-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  #output { min-height: 200px; font-family: var(--mono); font-size: .85rem; white-space: pre; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; overflow: auto; line-height: 1.5; }
  .actions { display: flex; gap: .5rem; margin-top: .75rem; }
  @media (max-width: 768px) {
    .panels { grid-template-columns: 1fr; }
    .config-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>CSS @keyframes Builder</h1>
<p class="subtitle">Create CSS keyframe animations visually with live preview and code export.</p>

<div class="panels">
<div>
  <div class="card">
    <h2>⚙️ Animation Config</h2>
    <div class="form-group">
      <label>Animation Name</label>
      <input id="animName" value="myAnimation" oninput="generate()">
    </div>
    <div class="config-row">
      <div class="form-group">
        <label>Duration</label>
        <input id="duration" value="1s" oninput="generate()">
      </div>
      <div class="form-group">
        <label>Timing</label>
        <select id="timing" onchange="generate()">
          <option>ease</option><option>linear</option><option>ease-in</option><option>ease-out</option><option>ease-in-out</option><option value="cubic-bezier(0.4, 0, 0.2, 1)">material</option>
        </select>
      </div>
      <div class="form-group">
        <label>Iterations</label>
        <select id="iterations" onchange="generate()">
          <option value="infinite">infinite</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option>
        </select>
      </div>
    </div>
    <div class="config-row">
      <div class="form-group">
        <label>Direction</label>
        <select id="direction" onchange="generate()">
          <option>normal</option><option>reverse</option><option>alternate</option><option>alternate-reverse</option>
        </select>
      </div>
      <div class="form-group">
        <label>Fill Mode</label>
        <select id="fillMode" onchange="generate()">
          <option>none</option><option>forwards</option><option>backwards</option><option>both</option>
        </select>
      </div>
      <div class="form-group">
        <label>Delay</label>
        <input id="delay" value="0s" oninput="generate()">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>🎞️ Keyframes</h2>
    <div class="timeline" id="timeline"></div>
    <button class="add-btn" onclick="addKeyframe()">+ Add Keyframe</button>
    <hr style="border:none;border-top:1px solid var(--border);margin:1rem 0">
    <div id="kfEditor"></div>
  </div>
</div>

<div>
  <div class="card">
    <h2>👁️ Preview</h2>
    <div class="preview-box">
      <div class="preview-target" id="previewTarget"></div>
    </div>
    <div class="actions" style="margin-top:.75rem">
      <button class="btn btn-secondary" onclick="restartAnim()">↻ Replay</button>
    </div>
  </div>

  <div class="card">
    <h2>💻 Generated CSS</h2>
    <div id="output"></div>
    <div class="actions">
      <button class="btn" onclick="copyCode()">Copy CSS</button>
      <button class="btn btn-secondary" onclick="resetAll()">Reset</button>
    </div>
  </div>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);

const PROPS=['transform','opacity','background-color','color','border-radius','box-shadow','width','height','scale','rotate','translate','filter','clip-path'];

let keyframes=[
  {offset:0,props:[{prop:'transform',value:'translateX(0)'}]},
  {offset:100,props:[{prop:'transform',value:'translateX(120px)'}]}
];
let activeKf=0;

function renderTimeline(){
  $('timeline').innerHTML=keyframes.map((kf,i)=>{
    const label=kf.offset===0?'0%':kf.offset===100?'100%':kf.offset+'%';
    return `<span class="kf-chip${i===activeKf?' active':''}" onclick="selectKf(${i})">${label}${keyframes.length>2?`<span class="remove-kf" onclick="event.stopPropagation();removeKf(${i})">×</span>`:''}</span>`;
  }).join('');
}

function renderEditor(){
  const kf=keyframes[activeKf];
  if(!kf){$('kfEditor').innerHTML='';return;}
  let html=`<div style="font-size:.85rem;font-weight:600;margin-bottom:.75rem">Properties at ${kf.offset}%</div>`;
  kf.props.forEach((p,i)=>{
    const opts=PROPS.map(pr=>`<option${pr===p.prop?' selected':''}>${pr}</option>`).join('');
    html+=`<div class="prop-row"><select onchange="keyframes[${activeKf}].props[${i}].prop=this.value;generate()">${opts}</select><input value="${p.value.replace(/"/g,'&quot;')}" oninput="keyframes[${activeKf}].props[${i}].value=this.value;generate()"><button onclick="keyframes[${activeKf}].props.splice(${i},1);renderEditor();generate()">×</button></div>`;
  });
  html+=`<button class="add-btn" onclick="keyframes[${activeKf}].props.push({prop:'opacity',value:'1'});renderEditor();generate()">+ Add Property</button>`;
  $('kfEditor').innerHTML=html;
}

function selectKf(i){activeKf=i;renderTimeline();renderEditor();}

function addKeyframe(){
  const offsets=keyframes.map(k=>k.offset);
  let next=50;
  while(offsets.includes(next))next+=5;
  if(next>99)next=Math.floor(Math.random()*99)+1;
  keyframes.push({offset:next,props:[{prop:'opacity',value:'1'}]});
  keyframes.sort((a,b)=>a.offset-b.offset);
  activeKf=keyframes.findIndex(k=>k.offset===next);
  renderTimeline();renderEditor();generate();
}

function removeKf(i){
  if(keyframes.length<=2)return;
  keyframes.splice(i,1);
  if(activeKf>=keyframes.length)activeKf=keyframes.length-1;
  renderTimeline();renderEditor();generate();
}

function generate(){
  const name=$('animName').value||'myAnimation';
  const dur=$('duration').value||'1s';
  const timing=$('timing').value;
  const iter=$('iterations').value;
  const dir=$('direction').value;
  const fill=$('fillMode').value;
  const del=$('delay').value||'0s';

  let css=`@keyframes ${name} {\n`;
  keyframes.forEach(kf=>{
    const label=kf.offset===0?'from':kf.offset===100?'to':kf.offset+'%';
    css+=`  ${label} {\n`;
    kf.props.forEach(p=>{
      if(p.prop&&p.value)css+=`    ${p.prop}: ${p.value};\n`;
    });
    css+=`  }\n`;
  });
  css+=`}\n\n.animated-element {\n`;
  let shorthand=`${name} ${dur} ${timing}`;
  if(del!=='0s')shorthand+=` ${del}`;
  shorthand+=` ${iter}`;
  if(dir!=='normal')shorthand+=` ${dir}`;
  if(fill!=='none')shorthand+=` ${fill}`;
  css+=`  animation: ${shorthand};\n}`;

  $('output').textContent=css;
  applyPreview(name,dur,timing,iter,dir,fill,del);
}

let styleEl=null;
function applyPreview(name,dur,timing,iter,dir,fill,del){
  if(styleEl)styleEl.remove();
  styleEl=document.createElement('style');
  let css=`@keyframes ${name} {\n`;
  keyframes.forEach(kf=>{
    const label=kf.offset===0?'from':kf.offset===100?'to':kf.offset+'%';
    css+=`${label} {`;
    kf.props.forEach(p=>{if(p.prop&&p.value)css+=`${p.prop}:${p.value};`;});
    css+=`}\n`;
  });
  css+=`}`;
  styleEl.textContent=css;
  document.head.appendChild(styleEl);
  const el=$('previewTarget');
  el.style.animation='none';
  void el.offsetHeight;
  let anim=`${name} ${dur} ${timing}`;
  if(del!=='0s')anim+=` ${del}`;
  anim+=` ${iter}`;
  if(dir!=='normal')anim+=` ${dir}`;
  if(fill!=='none')anim+=` ${fill}`;
  el.style.animation=anim;
}

function restartAnim(){
  const el=$('previewTarget');
  const a=el.style.animation;
  el.style.animation='none';
  void el.offsetHeight;
  el.style.animation=a;
}

function copyCode(){
  navigator.clipboard.writeText($('output').textContent).then(()=>{
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function resetAll(){
  $('animName').value='myAnimation';
  $('duration').value='1s';
  $('timing').value='ease';
  $('iterations').value='infinite';
  $('direction').value='normal';
  $('fillMode').value='none';
  $('delay').value='0s';
  keyframes=[
    {offset:0,props:[{prop:'transform',value:'translateX(0)'}]},
    {offset:100,props:[{prop:'transform',value:'translateX(120px)'}]}
  ];
  activeKf=0;
  renderTimeline();renderEditor();generate();
}

renderTimeline();
renderEditor();
generate();
</script>
</body>
</html>
