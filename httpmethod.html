<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTP Method Reference & Comparator — Free Online Tool</title>
<meta name="description" content="Free interactive HTTP method reference. Compare GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS, and TRACE with properties, use cases, and sample requests.">
<meta name="keywords" content="HTTP methods, REST methods, GET POST PUT DELETE, HTTP verbs, API methods, HTTP reference">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/httpmethod.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .method-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-top: 16px; }
  .method-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .method-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); }
  .method-card.selected { border-color: var(--accent); background: var(--surface2); }
  .method-badge { display: inline-block; font-family: var(--mono); font-size: .95rem; font-weight: 700; padding: 2px 10px; border-radius: 4px; margin-bottom: 8px; }
  .badge-get { background: #dbeafe; color: #1d4ed8; }
  .badge-post { background: #dcfce7; color: #15803d; }
  .badge-put { background: #fef3c7; color: #b45309; }
  .badge-patch { background: #e0e7ff; color: #4338ca; }
  .badge-delete { background: #fee2e2; color: #dc2626; }
  .badge-head { background: #f3e8ff; color: #7e22ce; }
  .badge-options { background: #ccfbf1; color: #0d9488; }
  .badge-trace { background: #f1f5f9; color: #475569; }
  .method-desc { font-size: .85rem; color: var(--muted); margin: 6px 0; line-height: 1.5; }
  .props { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .prop { font-size: .75rem; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }
  .prop-yes { background: #dcfce7; color: #15803d; border-color: #86efac; }
  .prop-no { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: .85rem; margin-top: 16px; }
  .compare-table th, .compare-table td { padding: 10px 12px; border: 1px solid var(--border); text-align: center; }
  .compare-table th { background: var(--surface2); font-weight: 600; position: sticky; top: 0; }
  .compare-table td:first-child { text-align: left; font-weight: 600; font-family: var(--mono); }
  .check { color: #15803d; } .cross { color: #dc2626; }
  .detail-panel { border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 16px; display: none; }
  .detail-panel.visible { display: block; }
  .detail-panel h3 { margin: 0 0 12px; font-size: 1rem; }
  .detail-section { margin-bottom: 16px; }
  .detail-section h4 { font-size: .85rem; color: var(--muted); margin: 0 0 6px; text-transform: uppercase; letter-spacing: .03em; }
  .sample-req { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-family: var(--mono); font-size: .82rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; position: relative; }
  .copy-btn { position: absolute; top: 6px; right: 6px; font-size: .75rem; padding: 2px 8px; cursor: pointer; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; }
  .copy-btn:hover { background: var(--surface2); }
  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 16px; cursor: pointer; font-size: .9rem; border-bottom: 2px solid transparent; color: var(--muted); transition: color .15s, border-color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }
  .tab-content { display: none; } .tab-content.active { display: block; }
  .use-case { padding: 8px 12px; border-left: 3px solid var(--accent); margin: 6px 0; font-size: .85rem; background: var(--surface2); border-radius: 0 var(--radius) var(--radius) 0; }
  @media (max-width: 768px) { .method-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>📡 HTTP Method Reference</h1>
<p class="subtitle">Interactive reference for HTTP methods — compare properties, view use cases, and copy sample requests.</p>

<div class="tabs">
  <div class="tab active" data-tab="cards">Overview</div>
  <div class="tab" data-tab="compare">Comparison Table</div>
</div>

<div class="tab-content active" id="tab-cards">
  <div class="method-grid" id="method-grid"></div>
  <div class="detail-panel" id="detail-panel"></div>
</div>

<div class="tab-content" id="tab-compare">
  <div class="card" style="overflow-x:auto">
    <h2>Method Comparison</h2>
    <table class="compare-table" id="compare-table"></table>
  </div>
</div>

</div>

<footer>
  Built with ☕ by Steven Li · No data leaves your browser
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
const METHODS = [
  {
    name: 'GET', badge: 'badge-get',
    desc: 'Retrieve a representation of a resource. The most common HTTP method.',
    safe: true, idempotent: true, cacheable: true, body: false,
    rfc: 'RFC 9110 §9.3.1',
    useCases: ['Fetch a list of users', 'Get a single resource by ID', 'Search with query parameters', 'Download a file'],
    sample: 'GET /api/users?page=1&limit=20 HTTP/1.1\nHost: api.example.com\nAccept: application/json\nAuthorization: Bearer <token>'
  },
  {
    name: 'POST', badge: 'badge-post',
    desc: 'Submit data to create a new resource or trigger a process.',
    safe: false, idempotent: false, cacheable: false, body: true,
    rfc: 'RFC 9110 §9.3.3',
    useCases: ['Create a new user', 'Submit a form', 'Upload a file', 'Trigger a batch job'],
    sample: 'POST /api/users HTTP/1.1\nHost: api.example.com\nContent-Type: application/json\nAuthorization: Bearer <token>\n\n{\n  "name": "Jane Doe",\n  "email": "jane@example.com"\n}'
  },
  {
    name: 'PUT', badge: 'badge-put',
    desc: 'Replace an existing resource entirely with the provided payload.',
    safe: false, idempotent: true, cacheable: false, body: true,
    rfc: 'RFC 9110 §9.3.4',
    useCases: ['Replace a user profile', 'Upload/overwrite a file', 'Set configuration values'],
    sample: 'PUT /api/users/42 HTTP/1.1\nHost: api.example.com\nContent-Type: application/json\nAuthorization: Bearer <token>\n\n{\n  "name": "Jane Doe",\n  "email": "jane@example.com",\n  "role": "admin"\n}'
  },
  {
    name: 'PATCH', badge: 'badge-patch',
    desc: 'Apply a partial modification to a resource.',
    safe: false, idempotent: false, cacheable: false, body: true,
    rfc: 'RFC 5789',
    useCases: ['Update a user\'s email only', 'Toggle a feature flag', 'Increment a counter'],
    sample: 'PATCH /api/users/42 HTTP/1.1\nHost: api.example.com\nContent-Type: application/json\nAuthorization: Bearer <token>\n\n{\n  "email": "newemail@example.com"\n}'
  },
  {
    name: 'DELETE', badge: 'badge-delete',
    desc: 'Remove the specified resource.',
    safe: false, idempotent: true, cacheable: false, body: false,
    rfc: 'RFC 9110 §9.3.5',
    useCases: ['Delete a user', 'Remove an item from a cart', 'Cancel a subscription'],
    sample: 'DELETE /api/users/42 HTTP/1.1\nHost: api.example.com\nAuthorization: Bearer <token>'
  },
  {
    name: 'HEAD', badge: 'badge-head',
    desc: 'Same as GET but returns only headers, no body. Used to check resource metadata.',
    safe: true, idempotent: true, cacheable: true, body: false,
    rfc: 'RFC 9110 §9.3.2',
    useCases: ['Check if a resource exists', 'Get Content-Length before download', 'Check Last-Modified date'],
    sample: 'HEAD /api/users/42 HTTP/1.1\nHost: api.example.com\nAccept: application/json'
  },
  {
    name: 'OPTIONS', badge: 'badge-options',
    desc: 'Describe communication options for the target resource. Used in CORS preflight.',
    safe: true, idempotent: true, cacheable: false, body: false,
    rfc: 'RFC 9110 §9.3.7',
    useCases: ['CORS preflight request', 'Discover allowed methods', 'API capability negotiation'],
    sample: 'OPTIONS /api/users HTTP/1.1\nHost: api.example.com\nOrigin: https://app.example.com\nAccess-Control-Request-Method: POST\nAccess-Control-Request-Headers: Content-Type'
  },
  {
    name: 'TRACE', badge: 'badge-trace',
    desc: 'Perform a message loop-back test along the path to the target resource.',
    safe: true, idempotent: true, cacheable: false, body: false,
    rfc: 'RFC 9110 §9.3.8',
    useCases: ['Debug proxy chains', 'Test request transformation', 'Diagnose routing issues'],
    sample: 'TRACE /api/debug HTTP/1.1\nHost: api.example.com\nMax-Forwards: 3'
  }
];

function renderCards() {
  const grid = document.getElementById('method-grid');
  grid.innerHTML = METHODS.map((m, i) => `
    <div class="method-card" data-index="${i}" onclick="showDetail(${i})">
      <span class="method-badge ${m.badge}">${m.name}</span>
      <div class="method-desc">${m.desc}</div>
      <div class="props">
        <span class="prop ${m.safe ? 'prop-yes' : 'prop-no'}">${m.safe ? '✓' : '✗'} Safe</span>
        <span class="prop ${m.idempotent ? 'prop-yes' : 'prop-no'}">${m.idempotent ? '✓' : '✗'} Idempotent</span>
        <span class="prop ${m.cacheable ? 'prop-yes' : 'prop-no'}">${m.cacheable ? '✓' : '✗'} Cacheable</span>
        <span class="prop ${m.body ? 'prop-yes' : 'prop-no'}">${m.body ? '✓' : '✗'} Body</span>
      </div>
    </div>
  `).join('');
}

function showDetail(index) {
  const m = METHODS[index];
  const panel = document.getElementById('detail-panel');
  document.querySelectorAll('.method-card').forEach(c => c.classList.toggle('selected', +c.dataset.index === index));
  panel.innerHTML = `
    <h3><span class="method-badge ${m.badge}">${m.name}</span> ${m.desc}</h3>
    <div class="detail-section">
      <h4>Properties</h4>
      <div class="props">
        <span class="prop ${m.safe ? 'prop-yes' : 'prop-no'}"><strong>Safe:</strong> ${m.safe ? 'Yes — does not alter server state' : 'No — may alter server state'}</span>
        <span class="prop ${m.idempotent ? 'prop-yes' : 'prop-no'}"><strong>Idempotent:</strong> ${m.idempotent ? 'Yes — repeating has same effect' : 'No — repeating may cause duplicates'}</span>
        <span class="prop ${m.cacheable ? 'prop-yes' : 'prop-no'}"><strong>Cacheable:</strong> ${m.cacheable ? 'Yes — response can be cached' : 'No — response should not be cached'}</span>
        <span class="prop ${m.body ? 'prop-yes' : 'prop-no'}"><strong>Request Body:</strong> ${m.body ? 'Yes — typically includes a body' : 'No — typically no body'}</span>
      </div>
      <p style="font-size:.8rem;color:var(--muted);margin-top:8px">Defined in ${m.rfc}</p>
    </div>
    <div class="detail-section">
      <h4>Common Use Cases</h4>
      ${m.useCases.map(u => `<div class="use-case">${u}</div>`).join('')}
    </div>
    <div class="detail-section">
      <h4>Sample Request</h4>
      <div class="sample-req"><button class="copy-btn" onclick="copySample(this)">Copy</button>${escapeHtml(m.sample)}</div>
    </div>
  `;
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderCompareTable() {
  const table = document.getElementById('compare-table');
  const props = [
    { key: 'safe', label: 'Safe' },
    { key: 'idempotent', label: 'Idempotent' },
    { key: 'cacheable', label: 'Cacheable' },
    { key: 'body', label: 'Request Body' }
  ];
  let html = '<thead><tr><th>Property</th>';
  METHODS.forEach(m => html += `<th><span class="method-badge ${m.badge}">${m.name}</span></th>`);
  html += '</tr></thead><tbody>';
  props.forEach(p => {
    html += `<tr><td>${p.label}</td>`;
    METHODS.forEach(m => {
      const val = m[p.key];
      html += `<td class="${val ? 'check' : 'cross'}">${val ? '✓' : '✗'}</td>`;
    });
    html += '</tr>';
  });
  html += '<tr><td>RFC</td>';
  METHODS.forEach(m => html += `<td style="font-size:.75rem">${m.rfc}</td>`);
  html += '</tr></tbody>';
  table.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function copySample(btn) {
  const text = btn.parentElement.textContent.replace('Copy', '').trim();
  navigator.clipboard.writeText(text);
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

renderCards();
renderCompareTable();
</script>
</body>
</html>
