<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCal Event Generator — Create .ics Calendar Files</title>
<meta name="description" content="Create and download .ics calendar event files. Add to Google Calendar, Apple Calendar, Outlook. No data leaves your browser.">
<meta name="keywords" content="ical, ics, calendar, event, generator, google calendar, apple calendar, outlook, vcalendar, developer tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/ical.html">
<link rel="stylesheet" href="toolbox.css">
<style>
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid .full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: .85rem; font-weight: 600; color: var(--muted); }
.form-group input, .form-group select, .form-group textarea {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: .9rem;
  background: var(--bg);
  color: var(--text);
}
.form-group textarea { min-height: 80px; resize: vertical; font-family: var(--sans); }
.attendee-list { display: flex; flex-direction: column; gap: 6px; }
.attendee-row { display: flex; gap: 6px; align-items: center; }
.attendee-row input { flex: 1; }
.attendee-row button { padding: 6px 10px; }
.preview-area {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  font-family: var(--mono);
  font-size: .8rem;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 400px;
  overflow-y: auto;
}
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem; }
.recurrence-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.recurrence-row select, .recurrence-row input { width: auto; }
@media (max-width: 768px) {
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back">&larr; All Tools</a>
  <h1>📅 iCal Event Generator</h1>
  <p class="subtitle">Create .ics calendar event files compatible with Google Calendar, Apple Calendar, and Outlook.</p>

  <div class="card">
    <h2>Event Details</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label for="title">Event Title *</label>
        <input type="text" id="title" placeholder="Team Standup" value="Team Standup">
      </div>
      <div class="form-group">
        <label for="startDate">Start Date *</label>
        <input type="date" id="startDate">
      </div>
      <div class="form-group">
        <label for="startTime">Start Time</label>
        <input type="time" id="startTime" value="09:00">
      </div>
      <div class="form-group">
        <label for="endDate">End Date *</label>
        <input type="date" id="endDate">
      </div>
      <div class="form-group">
        <label for="endTime">End Time</label>
        <input type="time" id="endTime" value="09:30">
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="allDay"> All-day event</label>
      </div>
      <div class="form-group">
        <label for="timezone">Timezone</label>
        <select id="timezone"></select>
      </div>
      <div class="form-group full">
        <label for="location">Location</label>
        <input type="text" id="location" placeholder="Conference Room A / Zoom link">
      </div>
      <div class="form-group full">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Meeting agenda, notes, links..."></textarea>
      </div>
      <div class="form-group full">
        <label for="url">URL</label>
        <input type="url" id="url" placeholder="https://meet.google.com/abc-defg-hij">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>⏰ Reminder</h2>
    <div class="form-grid">
      <div class="form-group">
        <label for="reminder">Remind before</label>
        <select id="reminder">
          <option value="">No reminder</option>
          <option value="0">At event time</option>
          <option value="5">5 minutes</option>
          <option value="10">10 minutes</option>
          <option value="15" selected>15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="60">1 hour</option>
          <option value="120">2 hours</option>
          <option value="1440">1 day</option>
          <option value="2880">2 days</option>
          <option value="10080">1 week</option>
        </select>
      </div>
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status">
          <option value="CONFIRMED">Confirmed</option>
          <option value="TENTATIVE">Tentative</option>
          <option value="CANCELLED">Cancelled</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>🔁 Recurrence</h2>
    <div class="recurrence-row">
      <label><input type="checkbox" id="recur"> Repeat</label>
      <select id="recurFreq" disabled>
        <option value="DAILY">Daily</option>
        <option value="WEEKLY" selected>Weekly</option>
        <option value="MONTHLY">Monthly</option>
        <option value="YEARLY">Yearly</option>
      </select>
      <label>every</label>
      <input type="number" id="recurInterval" value="1" min="1" max="99" style="width:60px" disabled>
      <label>time(s), for</label>
      <input type="number" id="recurCount" value="10" min="1" max="999" style="width:70px" disabled>
      <label>occurrences</label>
    </div>
  </div>

  <div class="card">
    <h2>👥 Attendees</h2>
    <div class="attendee-list" id="attendeeList">
      <div class="attendee-row">
        <input type="email" placeholder="email@example.com">
        <button class="btn-secondary" onclick="removeAttendee(this)">✕</button>
      </div>
    </div>
    <button class="btn-secondary" onclick="addAttendee()" style="margin-top:8px">+ Add Attendee</button>
  </div>

  <div class="card">
    <h2>📋 Preview</h2>
    <div class="preview-area" id="preview"></div>
    <div class="btn-row">
      <button class="btn" onclick="downloadICS()">💾 Download .ics</button>
      <button class="btn-secondary" onclick="copyICS()">📋 Copy</button>
    </div>
  </div>
</div>

<footer>
  <a href="index.html">&larr; All Tools</a> &middot; Built with ☕ by Steven Li &middot; No data leaves your browser
  <br><a class="bmc" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy me a coffee</a>
</footer>
<div class="toast" id="toast"></div>

<script>
function init() {
  const now = new Date();
  const today = now.toISOString().split('T')[0];
  document.getElementById('startDate').value = today;
  document.getElementById('endDate').value = today;

  const tzSelect = document.getElementById('timezone');
  const userTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const zones = [
    'UTC','America/New_York','America/Chicago','America/Denver','America/Los_Angeles',
    'America/Sao_Paulo','Europe/London','Europe/Berlin','Europe/Paris','Europe/Moscow',
    'Asia/Dubai','Asia/Kolkata','Asia/Shanghai','Asia/Tokyo','Asia/Seoul',
    'Australia/Sydney','Pacific/Auckland'
  ];
  if (!zones.includes(userTz)) zones.unshift(userTz);
  zones.forEach(tz => {
    const opt = document.createElement('option');
    opt.value = tz;
    opt.textContent = tz.replace(/_/g, ' ');
    if (tz === userTz) opt.selected = true;
    tzSelect.appendChild(opt);
  });

  document.getElementById('recur').addEventListener('change', function() {
    document.getElementById('recurFreq').disabled = !this.checked;
    document.getElementById('recurInterval').disabled = !this.checked;
    document.getElementById('recurCount').disabled = !this.checked;
    updatePreview();
  });

  document.getElementById('allDay').addEventListener('change', function() {
    document.getElementById('startTime').disabled = this.checked;
    document.getElementById('endTime').disabled = this.checked;
    updatePreview();
  });

  document.querySelectorAll('input, select, textarea').forEach(el => {
    el.addEventListener('input', updatePreview);
    el.addEventListener('change', updatePreview);
  });

  updatePreview();
}

function pad(n) { return String(n).padStart(2, '0'); }

function formatDate(dateStr, timeStr, tz, allDay) {
  if (allDay) {
    return dateStr.replace(/-/g, '');
  }
  const [y, m, d] = dateStr.split('-').map(Number);
  const [h, min] = (timeStr || '00:00').split(':').map(Number);
  return `${y}${pad(m)}${pad(d)}T${pad(h)}${pad(min)}00`;
}

function generateUID() {
  return 'toolbox-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10) + '@stevenli-phoenix.github.io';
}

function foldLine(line) {
  const result = [];
  while (line.length > 75) {
    result.push(line.slice(0, 75));
    line = ' ' + line.slice(75);
  }
  result.push(line);
  return result.join('\r\n');
}

function escapeText(text) {
  return text.replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
}

function generateICS() {
  const title = document.getElementById('title').value || 'Untitled Event';
  const startDate = document.getElementById('startDate').value;
  const startTime = document.getElementById('startTime').value;
  const endDate = document.getElementById('endDate').value;
  const endTime = document.getElementById('endTime').value;
  const allDay = document.getElementById('allDay').checked;
  const tz = document.getElementById('timezone').value;
  const location = document.getElementById('location').value;
  const description = document.getElementById('description').value;
  const url = document.getElementById('url').value;
  const reminder = document.getElementById('reminder').value;
  const status = document.getElementById('status').value;
  const recur = document.getElementById('recur').checked;

  if (!startDate || !endDate) return '(Set start and end dates)';

  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Toolbox//iCal Generator//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
  ];

  if (!allDay && tz !== 'UTC') {
    lines.push('BEGIN:VTIMEZONE');
    lines.push('TZID:' + tz);
    lines.push('END:VTIMEZONE');
  }

  lines.push('BEGIN:VEVENT');

  if (allDay) {
    lines.push('DTSTART;VALUE=DATE:' + formatDate(startDate, null, tz, true));
    const end = new Date(endDate);
    end.setDate(end.getDate() + 1);
    const endAll = `${end.getFullYear()}${pad(end.getMonth()+1)}${pad(end.getDate())}`;
    lines.push('DTEND;VALUE=DATE:' + endAll);
  } else if (tz === 'UTC') {
    lines.push('DTSTART:' + formatDate(startDate, startTime, tz, false) + 'Z');
    lines.push('DTEND:' + formatDate(endDate, endTime, tz, false) + 'Z');
  } else {
    lines.push('DTSTART;TZID=' + tz + ':' + formatDate(startDate, startTime, tz, false));
    lines.push('DTEND;TZID=' + tz + ':' + formatDate(endDate, endTime, tz, false));
  }

  lines.push(foldLine('SUMMARY:' + escapeText(title)));
  if (location) lines.push(foldLine('LOCATION:' + escapeText(location)));
  if (description) lines.push(foldLine('DESCRIPTION:' + escapeText(description)));
  if (url) lines.push(foldLine('URL:' + url));
  lines.push('STATUS:' + status);
  lines.push('UID:' + generateUID());

  const now = new Date();
  lines.push('DTSTAMP:' + now.getUTCFullYear() + pad(now.getUTCMonth()+1) + pad(now.getUTCDate()) +
    'T' + pad(now.getUTCHours()) + pad(now.getUTCMinutes()) + pad(now.getUTCSeconds()) + 'Z');

  if (recur) {
    const freq = document.getElementById('recurFreq').value;
    const interval = document.getElementById('recurInterval').value;
    const count = document.getElementById('recurCount').value;
    lines.push('RRULE:FREQ=' + freq + ';INTERVAL=' + interval + ';COUNT=' + count);
  }

  const attendees = document.querySelectorAll('#attendeeList input[type="email"]');
  attendees.forEach(input => {
    const email = input.value.trim();
    if (email) {
      lines.push('ATTENDEE;RSVP=TRUE;ROLE=REQ-PARTICIPANT:mailto:' + email);
    }
  });

  if (reminder !== '') {
    lines.push('BEGIN:VALARM');
    lines.push('TRIGGER:-PT' + reminder + 'M');
    lines.push('ACTION:DISPLAY');
    lines.push('DESCRIPTION:Reminder');
    lines.push('END:VALARM');
  }

  lines.push('END:VEVENT');
  lines.push('END:VCALENDAR');

  return lines.join('\r\n');
}

function updatePreview() {
  document.getElementById('preview').textContent = generateICS();
}

function downloadICS() {
  const ics = generateICS();
  const title = document.getElementById('title').value || 'event';
  const filename = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '') + '.ics';
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Downloaded ' + filename);
}

function copyICS() {
  navigator.clipboard.writeText(generateICS()).then(() => showToast('Copied to clipboard'));
}

function addAttendee() {
  const list = document.getElementById('attendeeList');
  const row = document.createElement('div');
  row.className = 'attendee-row';
  row.innerHTML = '<input type="email" placeholder="email@example.com"><button class="btn-secondary" onclick="removeAttendee(this)">✕</button>';
  list.appendChild(row);
  row.querySelector('input').addEventListener('input', updatePreview);
}

function removeAttendee(btn) {
  const list = document.getElementById('attendeeList');
  if (list.children.length > 1) {
    btn.parentElement.remove();
    updatePreview();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
