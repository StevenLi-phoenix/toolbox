<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS IAM Policy Builder - Free Online Tool</title>
<meta name="description" content="Free online AWS IAM policy builder. Create, validate, and export IAM policies with a visual editor. No data sent to any server.">
<meta name="keywords" content="aws iam policy, iam policy builder, aws policy generator, iam json policy, aws permissions, cloud security">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/awspolicy.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .statement-card { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .stmt-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface2, #f3f4f6); border-bottom: 1px solid var(--border); cursor: pointer; }
  .stmt-header h3 { font-size: .9rem; margin: 0; display: flex; align-items: center; gap: 8px; }
  .stmt-body { padding: 14px; display: grid; gap: 12px; }
  .stmt-actions { display: flex; gap: 6px; }
  .stmt-actions button { padding: 4px 10px; font-size: .75rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--muted); cursor: pointer; }
  .stmt-actions button:hover { background: var(--surface2, #f3f4f6); }
  .stmt-actions .delete-btn:hover { color: var(--error); border-color: var(--error); }
  .effect-toggle { display: flex; gap: 0; }
  .effect-btn { flex: 1; padding: 8px; text-align: center; border: 1px solid var(--border); font-size: .85rem; font-weight: 600; cursor: pointer; background: var(--bg); color: var(--text); transition: all .15s; }
  .effect-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .effect-btn:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
  .effect-btn.allow.active { background: #ecfdf5; color: var(--success); border-color: var(--success); }
  .effect-btn.deny.active { background: #fef2f2; color: var(--error); border-color: var(--error); }
  label.field-label { font-size: .82rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 4px; }
  .tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); min-height: 38px; align-items: center; cursor: text; }
  .tag-input-wrap:focus-within { border-color: var(--accent, #6366f1); }
  .tag-input-wrap input { border: none; outline: none; background: transparent; font-size: .85rem; font-family: var(--mono); color: var(--text); flex: 1; min-width: 120px; padding: 2px 0; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: var(--surface2, #f3f4f6); border: 1px solid var(--border); border-radius: 4px; font-size: .78rem; font-family: var(--mono); }
  .tag .remove { cursor: pointer; color: var(--muted); font-size: .9rem; line-height: 1; }
  .tag .remove:hover { color: var(--error); }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .output-area { background: var(--surface, var(--bg)); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; font-family: var(--mono); font-size: .82rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; max-height: 500px; overflow: auto; }
  .presets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .preset-btn { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; font-size: .82rem; text-align: left; transition: all .15s; }
  .preset-btn:hover { border-color: var(--accent, #6366f1); background: var(--surface2, #f3f4f6); }
  .validation { margin-top: 8px; padding: 8px 12px; border-radius: var(--radius); font-size: .82rem; }
  .validation.valid { background: #ecfdf5; color: var(--success); border: 1px solid #bbf7d0; }
  .validation.invalid { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
  .hint { font-size: .75rem; color: var(--muted); margin-top: 2px; }
  @media (max-width: 768px) { .panels { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>AWS IAM Policy Builder</h1>
<p class="subtitle">Build AWS IAM policy JSON visually with actions, resources & conditions</p>

<div class="card">
<h2>⚡ Quick Start Presets</h2>
<div class="presets-grid">
  <button class="preset-btn" onclick="loadPreset('s3read')">📦 S3 Read Only</button>
  <button class="preset-btn" onclick="loadPreset('s3full')">📦 S3 Full Access</button>
  <button class="preset-btn" onclick="loadPreset('dynamo')">🗄️ DynamoDB CRUD</button>
  <button class="preset-btn" onclick="loadPreset('lambda')">⚡ Lambda Invoke</button>
  <button class="preset-btn" onclick="loadPreset('sqs')">📨 SQS Send/Receive</button>
  <button class="preset-btn" onclick="loadPreset('cloudwatch')">📊 CloudWatch Logs</button>
  <button class="preset-btn" onclick="loadPreset('ec2describe')">🖥️ EC2 Describe Only</button>
  <button class="preset-btn" onclick="loadPreset('sts')">🔑 STS Assume Role</button>
</div>
</div>

<div class="panels">
<div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2 style="margin:0">📋 Statements</h2>
      <button class="btn" onclick="addStatement()">+ Add Statement</button>
    </div>
    <div id="statements"></div>
  </div>
</div>

<div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h2 style="margin:0">📄 Policy JSON</h2>
      <button class="btn btn-secondary" onclick="copyPolicy()">Copy</button>
    </div>
    <div class="output-area" id="output"></div>
    <div id="validationMsg"></div>
  </div>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);

let statements = [];
let nextId = 1;

const PRESETS = {
  s3read: [{ effect:'Allow', actions:['s3:GetObject','s3:ListBucket'], resources:['arn:aws:s3:::my-bucket','arn:aws:s3:::my-bucket/*'] }],
  s3full: [{ effect:'Allow', actions:['s3:*'], resources:['arn:aws:s3:::my-bucket','arn:aws:s3:::my-bucket/*'] }],
  dynamo: [{ effect:'Allow', actions:['dynamodb:GetItem','dynamodb:PutItem','dynamodb:UpdateItem','dynamodb:DeleteItem','dynamodb:Query','dynamodb:Scan'], resources:['arn:aws:dynamodb:*:*:table/my-table'] }],
  lambda: [{ effect:'Allow', actions:['lambda:InvokeFunction'], resources:['arn:aws:lambda:*:*:function:my-function'] }],
  sqs: [{ effect:'Allow', actions:['sqs:SendMessage','sqs:ReceiveMessage','sqs:DeleteMessage','sqs:GetQueueAttributes'], resources:['arn:aws:sqs:*:*:my-queue'] }],
  cloudwatch: [{ effect:'Allow', actions:['logs:CreateLogGroup','logs:CreateLogStream','logs:PutLogEvents'], resources:['arn:aws:logs:*:*:*'] }],
  ec2describe: [{ effect:'Allow', actions:['ec2:Describe*'], resources:['*'] }],
  sts: [{ effect:'Allow', actions:['sts:AssumeRole'], resources:['arn:aws:iam::*:role/my-role'] }],
};

function loadPreset(key) {
  statements = [];
  nextId = 1;
  PRESETS[key].forEach(p => {
    statements.push({ id: nextId++, effect: p.effect, sid: '', actions: [...p.actions], resources: [...p.resources], conditions: [] });
  });
  render();
}

function addStatement() {
  statements.push({ id: nextId++, effect: 'Allow', sid: '', actions: [], resources: ['*'], conditions: [] });
  render();
}

function removeStatement(id) {
  statements = statements.filter(s => s.id !== id);
  render();
}

function duplicateStatement(id) {
  const s = statements.find(s => s.id === id);
  if (!s) return;
  statements.push({ ...JSON.parse(JSON.stringify(s)), id: nextId++ });
  render();
}

function createTagInput(container, items, onChange) {
  container.innerHTML = '';
  items.forEach((item, i) => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${escHtml(item)}<span class="remove" data-idx="${i}">&times;</span>`;
    container.appendChild(tag);
  });
  const input = document.createElement('input');
  input.placeholder = items.length === 0 ? 'Type and press Enter...' : '';
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && input.value.trim()) {
      e.preventDefault();
      items.push(input.value.trim());
      input.value = '';
      onChange();
    } else if (e.key === 'Backspace' && !input.value && items.length) {
      items.pop();
      onChange();
    }
  });
  container.appendChild(input);
  container.onclick = e => {
    if (e.target.classList.contains('remove')) {
      items.splice(parseInt(e.target.dataset.idx), 1);
      onChange();
    } else {
      input.focus();
    }
  };
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
  const wrap = $('statements');
  wrap.innerHTML = '';

  if (statements.length === 0) {
    wrap.innerHTML = '<div class="empty">No statements yet. Add one or pick a preset above.</div>';
    updateOutput();
    return;
  }

  statements.forEach((stmt, idx) => {
    const card = document.createElement('div');
    card.className = 'statement-card';

    const header = document.createElement('div');
    header.className = 'stmt-header';
    header.innerHTML = `
      <h3><span style="color:${stmt.effect === 'Allow' ? 'var(--success)' : 'var(--error)'}">${stmt.effect === 'Allow' ? '✅' : '🚫'}</span> Statement ${idx + 1}${stmt.sid ? ' — ' + escHtml(stmt.sid) : ''}</h3>
      <div class="stmt-actions">
        <button onclick="duplicateStatement(${stmt.id})" title="Duplicate">📋</button>
        <button class="delete-btn" onclick="removeStatement(${stmt.id})" title="Delete">🗑️</button>
      </div>
    `;

    const body = document.createElement('div');
    body.className = 'stmt-body';

    // SID
    const sidGroup = document.createElement('div');
    sidGroup.innerHTML = `<label class="field-label">Statement ID (optional)</label>`;
    const sidInput = document.createElement('input');
    sidInput.type = 'text';
    sidInput.value = stmt.sid;
    sidInput.placeholder = 'e.g. AllowS3Read';
    sidInput.style.cssText = 'width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font:inherit;font-size:.85rem;background:var(--bg);color:var(--text)';
    sidInput.oninput = () => { stmt.sid = sidInput.value; updateOutput(); };
    sidGroup.appendChild(sidInput);

    // Effect
    const effectGroup = document.createElement('div');
    effectGroup.innerHTML = `<label class="field-label">Effect</label>`;
    const effectToggle = document.createElement('div');
    effectToggle.className = 'effect-toggle';
    ['Allow', 'Deny'].forEach(e => {
      const btn = document.createElement('button');
      btn.className = `effect-btn ${e.toLowerCase()}${stmt.effect === e ? ' active' : ''}`;
      btn.textContent = e;
      btn.onclick = () => { stmt.effect = e; render(); };
      effectToggle.appendChild(btn);
    });
    effectGroup.appendChild(effectToggle);

    // Actions
    const actionGroup = document.createElement('div');
    actionGroup.innerHTML = `<label class="field-label">Actions</label><div class="hint">e.g. s3:GetObject, ec2:Describe*, lambda:InvokeFunction</div>`;
    const actionWrap = document.createElement('div');
    actionWrap.className = 'tag-input-wrap';
    createTagInput(actionWrap, stmt.actions, () => render());
    actionGroup.appendChild(actionWrap);

    // Resources
    const resGroup = document.createElement('div');
    resGroup.innerHTML = `<label class="field-label">Resources</label><div class="hint">e.g. arn:aws:s3:::my-bucket/*, or * for all</div>`;
    const resWrap = document.createElement('div');
    resWrap.className = 'tag-input-wrap';
    createTagInput(resWrap, stmt.resources, () => render());
    resGroup.appendChild(resWrap);

    body.appendChild(sidGroup);
    body.appendChild(effectGroup);
    body.appendChild(actionGroup);
    body.appendChild(resGroup);

    card.appendChild(header);
    card.appendChild(body);
    wrap.appendChild(card);
  });

  updateOutput();
}

function buildPolicy() {
  const stmts = statements.map(s => {
    const obj = { Effect: s.effect };
    if (s.sid) obj.Sid = s.sid;
    obj.Action = s.actions.length === 1 ? s.actions[0] : s.actions;
    obj.Resource = s.resources.length === 1 ? s.resources[0] : s.resources;
    return obj;
  });
  return { Version: '2012-10-17', Statement: stmts };
}

function validatePolicy() {
  const issues = [];
  if (statements.length === 0) issues.push('Policy has no statements');
  statements.forEach((s, i) => {
    if (s.actions.length === 0) issues.push(`Statement ${i+1}: No actions specified`);
    if (s.resources.length === 0) issues.push(`Statement ${i+1}: No resources specified`);
    s.actions.forEach(a => {
      if (!/^[a-zA-Z0-9]+:[a-zA-Z0-9*]+$/.test(a) && a !== '*') {
        issues.push(`Statement ${i+1}: Action "${a}" may be invalid (expected service:action format)`);
      }
    });
  });
  return issues;
}

function syntaxHighlight(json) {
  return json.replace(/("(?:[^"\\]|\\.)*")\s*:/g, '<span style="color:#6366f1">$1</span>:')
             .replace(/:\s*("(?:[^"\\]|\\.)*")/g, ': <span style="color:#059669">$1</span>')
             .replace(/:\s*(\*)/g, ': <span style="color:#059669">$1</span>');
}

function updateOutput() {
  const policy = buildPolicy();
  const json = JSON.stringify(policy, null, 2);
  $('output').innerHTML = syntaxHighlight(escHtml(json));

  const issues = validatePolicy();
  const msg = $('validationMsg');
  if (statements.length === 0) {
    msg.innerHTML = '';
  } else if (issues.length === 0) {
    msg.innerHTML = '<div class="validation valid">✓ Policy structure looks valid</div>';
  } else {
    msg.innerHTML = `<div class="validation invalid">⚠ ${issues.map(escHtml).join('<br>')}</div>`;
  }
}

function copyPolicy() {
  const policy = buildPolicy();
  navigator.clipboard.writeText(JSON.stringify(policy, null, 2)).then(() => {
    const t = $('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

// Initialize with empty state
render();
</script>
</body>
</html>
