<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/datefmt.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .format-tabs { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .format-tab {
    padding: .5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); cursor: pointer; font-size: .85rem; font-weight: 600;
    transition: all .15s;
  }
  .format-tab:hover { border-color: var(--accent); }
  .format-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .input-row { display: grid; grid-template-columns: 1fr auto; gap: .75rem; margin-bottom: 1rem; }
  .input-row input, .input-row select {
    width: 100%; padding: .6rem .75rem; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .95rem;
  }
  .output-box {
    padding: 1rem; background: var(--surface2); border: 1px solid var(--border);

  .presets { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
  .date-input-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1.5rem; }
  .date-input-row input {
    width: 100%; padding: .6rem .75rem; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-family: var(--mono); font-size: .9rem;
  }
  label.field-label { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); margin-bottom: .3rem; text-transform: uppercase; }
  @media (max-width: 768px) {
    .date-input-row { grid-template-columns: 1fr; }
    .input-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>Date Format Playground</h1>
<p class="subtitle">Test date format patterns for strftime (Python/C), Go, Java SimpleDateFormat, and JavaScript Intl. See live-formatted output as you type.</p>

<div class="card" style="margin-bottom:1.5rem">
  <label class="field-label">Date &amp; Time</label>
  <div class="date-input-row">
    <input type="datetime-local" id="dateInput" step="1">
    <input type="text" id="dateDisplay" readonly style="color:var(--muted)">
  </div>

  <label class="field-label">Format Language</label>
  <div class="format-tabs" id="formatTabs">
    <button class="format-tab active" data-lang="strftime">strftime</button>
    <button class="format-tab" data-lang="go">Go</button>
    <button class="format-tab" data-lang="java">Java</button>
    <button class="format-tab" data-lang="intl">JS Intl</button>
  </div>

  <label class="field-label">Format Pattern</label>
  <div class="input-row">
    <input type="text" id="patternInput" placeholder="%Y-%m-%d %H:%M:%S" spellcheck="false">
    <button class="btn" onclick="copyOutput()">Copy Output</button>
  </div>

  <label class="field-label">Presets</label>
  <div class="presets" id="presets"></div>

  <label class="field-label">Result</label>
  <div class="output-box" id="output"></div>
</div>

<div class="card">
  <h2>Quick Reference</h2>
  <div id="refTable"></div>
</div>

<footer>Built with ☕ by Steven Li · No data leaves your browser</footer>
</div>

<script>
const LANGS = {
  strftime: {
    presets: {
      'ISO 8601': '%Y-%m-%dT%H:%M:%S',
      'US Date': '%m/%d/%Y',
      'EU Date': '%d/%m/%Y',
      'Full': '%A, %B %d, %Y %I:%M %p',
      'Compact': '%Y%m%d_%H%M%S',
      'Log': '%Y-%m-%d %H:%M:%S',
      'RFC 2822': '%a, %d %b %Y %H:%M:%S',
    },
    ref: [
      ['%Y', 'Full year', '2026'], ['%m', 'Month (01-12)', '04'], ['%d', 'Day (01-31)', '16'],
      ['%H', 'Hour 24h (00-23)', '14'], ['%I', 'Hour 12h (01-12)', '02'], ['%M', 'Minute (00-59)', '30'],
      ['%S', 'Second (00-59)', '05'], ['%p', 'AM/PM', 'PM'], ['%A', 'Weekday name', 'Thursday'],
      ['%a', 'Weekday short', 'Thu'], ['%B', 'Month name', 'April'], ['%b', 'Month short', 'Apr'],
      ['%j', 'Day of year (001-366)', '106'], ['%w', 'Weekday (0=Sun)', '4'],
      ['%Z', 'Timezone name', 'UTC'], ['%%', 'Literal %', '%'],
    ]
  },
  go: {
    presets: {
      'ISO 8601': '2006-01-02T15:04:05',
      'US Date': '01/02/2006',
      'EU Date': '02/01/2006',
      'Full': 'Monday, January 02, 2006 3:04 PM',
      'Kitchen': '3:04PM',
      'RFC 3339': '2006-01-02T15:04:05Z07:00',
      'Stamp': 'Jan _2 15:04:05',
    },
    ref: [
      ['2006', 'Full year', '2026'], ['06', 'Short year', '26'], ['01', 'Month (01-12)', '04'],
      ['1', 'Month (1-12)', '4'], ['January', 'Month name', 'April'], ['Jan', 'Month short', 'Apr'],
      ['02', 'Day (01-31)', '16'], ['2', 'Day (1-31)', '16'], ['_2', 'Day space-padded', '16'],
      ['Monday', 'Weekday', 'Thursday'], ['Mon', 'Weekday short', 'Thu'],
      ['15', 'Hour 24h', '14'], ['3', 'Hour 12h', '2'], ['04', 'Minute', '30'],
      ['05', 'Second', '05'], ['PM', 'AM/PM', 'PM'], ['pm', 'am/pm', 'pm'],
      ['Z07:00', 'Timezone', '+00:00'], ['.000', 'Milliseconds', '.000'],
    ]
  },
  java: {
    presets: {
      'ISO 8601': "yyyy-MM-dd'T'HH:mm:ss",
      'US Date': 'MM/dd/yyyy',
      'EU Date': 'dd/MM/yyyy',
      'Full': 'EEEE, MMMM dd, yyyy hh:mm a',
      'Compact': 'yyyyMMdd_HHmmss',
      'Log': 'yyyy-MM-dd HH:mm:ss.SSS',
    },
    ref: [
      ['yyyy', 'Full year', '2026'], ['yy', 'Short year', '26'], ['MM', 'Month (01-12)', '04'],
      ['M', 'Month (1-12)', '4'], ['MMMM', 'Month name', 'April'], ['MMM', 'Month short', 'Apr'],
      ['dd', 'Day (01-31)', '16'], ['d', 'Day (1-31)', '16'],
      ['HH', 'Hour 24h (00-23)', '14'], ['hh', 'Hour 12h (01-12)', '02'],
      ['mm', 'Minute', '30'], ['ss', 'Second', '05'], ['SSS', 'Millisecond', '000'],
      ['a', 'AM/PM', 'PM'], ['EEEE', 'Weekday', 'Thursday'], ['EEE', 'Weekday short', 'Thu'],
      ["'text'", 'Literal text', 'text'],
    ]
  },
  intl: {
    presets: {
      'Short': '{"dateStyle":"short"}',
      'Medium': '{"dateStyle":"medium"}',
      'Long': '{"dateStyle":"long","timeStyle":"short"}',
      'Full': '{"dateStyle":"full","timeStyle":"long"}',
      'Numeric': '{"year":"numeric","month":"2-digit","day":"2-digit"}',
      'Custom': '{"weekday":"long","year":"numeric","month":"long","day":"numeric","hour":"2-digit","minute":"2-digit"}',
    },
    ref: [
      ['dateStyle', '"full"|"long"|"medium"|"short"', 'Date formatting'],
      ['timeStyle', '"full"|"long"|"medium"|"short"', 'Time formatting'],
      ['year', '"numeric"|"2-digit"', 'Year display'],
      ['month', '"numeric"|"2-digit"|"long"|"short"|"narrow"', 'Month display'],
      ['day', '"numeric"|"2-digit"', 'Day display'],
      ['weekday', '"long"|"short"|"narrow"', 'Weekday display'],
      ['hour', '"numeric"|"2-digit"', 'Hour display'],
      ['minute', '"numeric"|"2-digit"', 'Minute display'],
      ['second', '"numeric"|"2-digit"', 'Second display'],
      ['hour12', 'true|false', '12/24 hour toggle'],
      ['timeZone', '"UTC"|"America/New_York"|...', 'IANA timezone'],
    ]
  }
};

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_S = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let currentLang = 'strftime';
let currentDate = new Date();

function pad(n, w = 2) { return String(n).padStart(w, '0'); }

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}

function formatStrftime(fmt, d) {
  const map = {
    '%Y': d.getFullYear(), '%y': pad(d.getFullYear() % 100),
    '%m': pad(d.getMonth() + 1), '%d': pad(d.getDate()),
    '%H': pad(d.getHours()), '%I': pad(d.getHours() % 12 || 12),
    '%M': pad(d.getMinutes()), '%S': pad(d.getSeconds()),
    '%p': d.getHours() >= 12 ? 'PM' : 'AM',
    '%A': DAYS[d.getDay()], '%a': DAYS_S[d.getDay()],
    '%B': MONTHS[d.getMonth()], '%b': MONTHS_S[d.getMonth()],
    '%j': pad(dayOfYear(d), 3), '%w': d.getDay(),
    '%U': pad(Math.floor((dayOfYear(d) + 7 - d.getDay()) / 7)),
    '%Z': Intl.DateTimeFormat('en', {timeZoneName:'short'}).formatToParts(d).find(p=>p.type==='timeZoneName')?.value || '',
    '%%': '%',
  };
  return fmt.replace(/%[YymdHIMSpAaBbjwUZ%]/g, m => map[m] ?? m);
}

function formatGo(fmt, d) {
  const h12 = d.getHours() % 12 || 12;
  const replacements = [
    ['2006', d.getFullYear()],
    ['06', pad(d.getFullYear() % 100)],
    ['January', MONTHS[d.getMonth()]],
    ['Jan', MONTHS_S[d.getMonth()]],
    ['Monday', DAYS[d.getDay()]],
    ['Mon', DAYS_S[d.getDay()]],
    ['02', pad(d.getDate())],
    ['_2', d.getDate().toString().padStart(2, ' ')],
    ['15', pad(d.getHours())],
    ['04', pad(d.getMinutes())],
    ['05', pad(d.getSeconds())],
    ['.000', '.' + pad(d.getMilliseconds(), 3)],
    ['PM', d.getHours() >= 12 ? 'PM' : 'AM'],
    ['pm', d.getHours() >= 12 ? 'pm' : 'am'],
    ['Z07:00', (d.getTimezoneOffset() <= 0 ? '+' : '-') + pad(Math.floor(Math.abs(d.getTimezoneOffset())/60)) + ':' + pad(Math.abs(d.getTimezoneOffset())%60)],
  ];
  let result = fmt;
  const tokens = [];
  const regex = /2006|06|January|Jan|Monday|Mon|02|_2|15|04|05|\.000|PM|pm|Z07:00|[^2016JMPpmZ._]+|./g;
  let m;
  while ((m = regex.exec(fmt)) !== null) tokens.push(m[0]);
  return tokens.map(t => {
    const rep = replacements.find(r => r[0] === t);
    if (rep) return String(rep[1]);
    if (t === '1' && fmt.includes('01')) return t;
    if (t === '2' && fmt.includes('02')) return t;
    if (t === '3') return String(h12);
    if (t === '1') return String(d.getMonth() + 1);
    if (t === '2') return String(d.getDate());
    return t;
  }).join('');
}

function formatJava(fmt, d) {
  const h12 = d.getHours() % 12 || 12;
  const tokens = [];
  let i = 0;
  while (i < fmt.length) {
    if (fmt[i] === "'") {
      let j = i + 1;
      while (j < fmt.length && fmt[j] !== "'") j++;
      tokens.push({ type: 'literal', value: fmt.slice(i + 1, j) });
      i = j + 1;
    } else if (/[a-zA-Z]/.test(fmt[i])) {
      let j = i;
      while (j < fmt.length && fmt[j] === fmt[i]) j++;
      tokens.push({ type: 'pattern', value: fmt.slice(i, j) });
      i = j;
    } else {
      tokens.push({ type: 'literal', value: fmt[i] });
      i++;
    }
  }
  return tokens.map(t => {
    if (t.type === 'literal') return t.value;
    const p = t.value;
    const c = p[0], len = p.length;
    switch (c) {
      case 'y': return len <= 2 ? pad(d.getFullYear() % 100) : String(d.getFullYear());
      case 'M': return len >= 4 ? MONTHS[d.getMonth()] : len === 3 ? MONTHS_S[d.getMonth()] : len === 2 ? pad(d.getMonth()+1) : String(d.getMonth()+1);
      case 'd': return len >= 2 ? pad(d.getDate()) : String(d.getDate());
      case 'H': return len >= 2 ? pad(d.getHours()) : String(d.getHours());
      case 'h': return len >= 2 ? pad(h12) : String(h12);
      case 'm': return len >= 2 ? pad(d.getMinutes()) : String(d.getMinutes());
      case 's': return len >= 2 ? pad(d.getSeconds()) : String(d.getSeconds());
      case 'S': return pad(d.getMilliseconds(), 3).slice(0, len);
      case 'a': return d.getHours() >= 12 ? 'PM' : 'AM';
      case 'E': return len >= 4 ? DAYS[d.getDay()] : DAYS_S[d.getDay()];
      case 'D': return pad(dayOfYear(d), 3);
      default: return p;
    }
  }).join('');
}

function formatIntl(optStr, d) {
  try {
    const opts = JSON.parse(optStr);
    return new Intl.DateTimeFormat('en-US', opts).format(d);
  } catch (e) {
    return 'Invalid JSON options: ' + e.message;
  }
}

function formatDate(lang, pattern, d) {
  if (!pattern) return '';
  switch (lang) {
    case 'strftime': return formatStrftime(pattern, d);
    case 'go': return formatGo(pattern, d);
    case 'java': return formatJava(pattern, d);
    case 'intl': return formatIntl(pattern, d);
  }
}

function updateOutput() {
  const pattern = document.getElementById('patternInput').value;
  const output = document.getElementById('output');
  try {
    output.textContent = formatDate(currentLang, pattern, currentDate);
    output.style.color = '';
  } catch (e) {
    output.textContent = 'Error: ' + e.message;
    output.style.color = 'var(--error)';
  }
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.format-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
  const presets = LANGS[lang].presets;
  const presetsEl = document.getElementById('presets');
  presetsEl.innerHTML = '';
  Object.entries(presets).forEach(([name, val]) => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-secondary';
    btn.textContent = name;
    btn.onclick = () => { document.getElementById('patternInput').value = val; updateOutput(); };
    presetsEl.appendChild(btn);
  });
  const ref = LANGS[lang].ref;
  const isIntl = lang === 'intl';
  const headers = isIntl ? ['Option','Values','Description'] : ['Token','Description','Example'];
  document.getElementById('refTable').innerHTML = `<table class="ref-table"><thead><tr>${headers.map(h=>'<th>'+h+'</th>').join('')}</tr></thead><tbody>${ref.map(r=>'<tr>'+r.map(c=>'<td><code>'+c+'</code></td>').join('')+'</tr>').join('')}</tbody></table>`;
  const first = Object.values(presets)[0];
  document.getElementById('patternInput').value = first;
  document.getElementById('patternInput').placeholder = first;
  updateOutput();
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.input-row .btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Output', 1000);
  });
}

document.getElementById('formatTabs').addEventListener('click', e => {
  if (e.target.dataset.lang) setLang(e.target.dataset.lang);
});

document.getElementById('patternInput').addEventListener('input', updateOutput);

document.getElementById('dateInput').addEventListener('input', e => {
  currentDate = new Date(e.target.value);
  if (isNaN(currentDate)) currentDate = new Date();
  document.getElementById('dateDisplay').value = currentDate.toISOString();
  updateOutput();
});

const now = new Date();
currentDate = now;
const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 19);
document.getElementById('dateInput').value = local;
document.getElementById('dateDisplay').value = now.toISOString();

setLang('strftime');
</script>
</body>
</html>
