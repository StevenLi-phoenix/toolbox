<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.gitignore Generator — Build .gitignore files instantly</title>
<meta name="description" content="Generate .gitignore files for any project. Pick from 50+ language and framework templates, combine them, and customize. Free online tool.">
<meta name="keywords" content="gitignore generator, .gitignore builder, gitignore templates, git ignore file, gitignore creator">
<meta name="author" content="Steven Li">
<meta property="og:title" content=".gitignore Generator — Build .gitignore files instantly">
<meta property="og:description" content="Generate .gitignore files for any project. Pick from 50+ language and framework templates, combine them, and customize.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/gitignore.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content=".gitignore Generator">
<meta name="twitter:description" content="Generate .gitignore files for any project with 50+ templates.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/gitignore.html">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--accent2:#3fb950;--hover:#1f2937;--tag-bg:#1f6feb22;--tag-border:#1f6feb55}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.container{max-width:960px;margin:0 auto;padding:20px}
h1{font-size:1.8rem;margin-bottom:4px}
.subtitle{color:var(--muted);margin-bottom:24px;font-size:.95rem}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95rem;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);width:16px;height:16px}
.selected-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;min-height:32px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--tag-bg);border:1px solid var(--tag-border);border-radius:16px;font-size:.82rem;color:var(--accent);cursor:pointer;transition:all .15s}
.tag:hover{background:#1f6feb44}
.tag .x{font-weight:700;font-size:.9rem}
.categories{margin-bottom:20px}
.cat-label{font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:12px 0 6px;font-weight:600}
.template-grid{display:flex;flex-wrap:wrap;gap:6px}
.tmpl-btn{padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;cursor:pointer;transition:all .15s}
.tmpl-btn:hover{border-color:var(--accent);background:var(--hover)}
.tmpl-btn.active{border-color:var(--accent);background:var(--tag-bg);color:var(--accent)}
.output-section{margin-top:20px}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.output-header h2{font-size:1.1rem}
.btn-row{display:flex;gap:8px}
.btn{padding:6px 14px;border-radius:6px;font-size:.85rem;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#4393e6}
textarea{width:100%;min-height:400px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'SF Mono',Consolas,'Liberation Mono',Menlo,monospace;font-size:.85rem;padding:14px;outline:none;resize:vertical;line-height:1.6}
textarea:focus{border-color:var(--accent)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent2);color:#fff;padding:10px 20px;border-radius:8px;font-size:.9rem;opacity:0;transition:all .3s;pointer-events:none;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.coffee{text-align:center;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.coffee a{color:var(--accent);text-decoration:none;font-size:.9rem}
.coffee a:hover{text-decoration:underline}
.count{color:var(--muted);font-size:.85rem}
@media(max-width:600px){
  .container{padding:14px}
  h1{font-size:1.4rem}
  textarea{min-height:300px}
  .output-header{flex-direction:column;align-items:flex-start;gap:8px}
}
</style>
</head>
<body>
<div class="container">
  <h1>🚫 .gitignore Generator</h1>
  <p class="subtitle">Select templates, combine them, customize. Copy or download your .gitignore.</p>

  <div class="search-box">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search templates… (e.g. node, python, rust)" autocomplete="off">
  </div>

  <div class="selected-tags" id="selectedTags"></div>

  <div class="categories" id="categories"></div>

  <div class="output-section">
    <div class="output-header">
      <h2>.gitignore <span class="count" id="lineCount"></span></h2>
      <div class="btn-row">
        <button class="btn" onclick="copyOutput()">📋 Copy</button>
        <button class="btn btn-primary" onclick="downloadOutput()">⬇ Download</button>
      </div>
    </div>
    <textarea id="output" spellcheck="false" placeholder="Select templates above or type your own rules here…"></textarea>
  </div>

  <div class="coffee">
    <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const TEMPLATES={
"Languages":{
"Node.js":`node_modules/\nnpm-debug.log*\nyarn-debug.log*\nyarn-error.log*\n.pnpm-debug.log*\nlerna-debug.log*\n.npm\n.yarn/cache\n.yarn/unplugged\n.yarn/install-state.gz\n.pnp.*\ndist/\nbuild/\n.env\n.env.local\n.env.*.local`,
"Python":`__pycache__/\n*.py[cod]\n*$py.class\n*.so\n.Python\nbuild/\ndevelop-eggs/\ndist/\ndownloads/\neggs/\n.eggs/\nlib/\nlib64/\nparts/\nsdist/\nvar/\nwheels/\n*.egg-info/\n.installed.cfg\n*.egg\n*.manifest\n*.spec\npip-log.txt\npip-delete-this-directory.txt\n.venv\nvenv/\nENV/\n.env\n*.pyc`,
"Java":`*.class\n*.log\n*.jar\n*.war\n*.nar\n*.ear\n*.zip\n*.tar.gz\n*.rar\nhs_err_pid*\ntarget/\n.gradle/\nbuild/\n.idea/\n*.iml\nout/`,
"Go":`*.exe\n*.exe~\n*.dll\n*.so\n*.dylib\n*.test\n*.out\ngo.work\nvendor/`,
"Rust":`/target\nCargo.lock\n**/*.rs.bk`,
"C/C++":`*.o\n*.obj\n*.so\n*.dylib\n*.dll\n*.a\n*.lib\n*.exe\n*.out\n*.app\n*.dSYM/\nbuild/\ncmake-build-*/\nCMakeFiles/\nCMakeCache.txt\nMakefile\n*.gch\n*.pch`,
"Ruby":`*.gem\n*.rbc\n/.config\n/coverage/\n/InstalledFiles\n/pkg/\n/spec/reports/\n/spec/examples.txt\n/test/tmp/\n/test/version_tmp/\n/tmp/\n.bundle/\nvendor/bundle\n.byebug_history\nGemfile.lock`,
"Swift":`.build/\nPackages/\nxcuserdata/\n*.xcscmblueprint\n*.playground/\nDerivedData/\n*.moved-aside\n*.pbxuser\n*.perspectivev3\n!default.pbxuser\n!default.perspectivev3`,
"PHP":`/vendor/\ncomposer.phar\ncomposer.lock\n*.cache\n.env\n.phpunit.result.cache\n/storage/*.key`,
"Dart/Flutter":`*.dart_tool/\n.packages\nbuild/\n.flutter-plugins\n.flutter-plugins-dependencies\n.pub-cache/\n.pub/\n/build/\npubspec.lock`,
"Kotlin":`*.class\n*.jar\n*.war\nbuild/\n.gradle/\n.idea/\n*.iml\nout/\n.kotlin/`,
"Scala":`*.class\n*.log\ntarget/\n.bsp/\n.metals/\n.bloop/\nproject/metals.sbt\nproject/project/`,
"Elixir":`/_build/\n/cover/\n/deps/\n/doc/\n/.fetch\nerl_crash.dump\n*.ez\n*.beam\n/config/*.secret.exs\n.elixir_ls/`,
"Zig":`zig-cache/\nzig-out/\n*.o\n*.a`,
},
"Frameworks":{
"React":`node_modules/\nbuild/\n.env\n.env.local\n.env.*.local\nnpm-debug.log*\nyarn-debug.log*\nyarn-error.log*\n.eslintcache\ncoverage/`,
"Next.js":`node_modules/\n.next/\nout/\n.env\n.env.local\n.env.*.local\nnpm-debug.log*\nyarn-debug.log*\nyarn-error.log*\n.vercel`,
"Vue":`node_modules/\ndist/\n.env.local\n.env.*.local\nnpm-debug.log*\nyarn-debug.log*\nyarn-error.log*\n*.local`,
"Angular":`node_modules/\ndist/\ntmp/\nout-tsc/\n.angular/\n.sass-cache/\nconnect.lock\ncoverage/\n.env`,
"Django":`*.log\nlocal_settings.py\ndb.sqlite3\ndb.sqlite3-journal\nmedia/\nstaticfiles/\n.env\n*.pyc\n__pycache__/`,
"Rails":`*.rbc\n*.sassc\n/.bundle\n/log/*\n/tmp/*\n/db/*.sqlite3\n/db/*.sqlite3-journal\n/public/system\n/coverage/\n/spec/tmp\n.env\nmaster.key`,
"Laravel":`/vendor/\nnode_modules/\nnpm-debug.log\nyarn-error.log\n.env\n.env.backup\nHomestead.yaml\nHomestead.json\n*.cache\n/public/hot\n/public/storage\n/storage/*.key`,
"Spring Boot":`target/\n!.mvn/wrapper/maven-wrapper.jar\n!**/src/main/**/target/\n!**/src/test/**/target/\n.gradle/\nbuild/\n*.jar\n*.war\n.idea/\n*.iml\napplication-local.properties`,
"Astro":`node_modules/\ndist/\n.astro/\n.env\n.env.*\n!.env.example`,
"SvelteKit":`node_modules/\n.svelte-kit/\nbuild/\n.env\n.env.*\npackage/`,
},
"Tools & Editors":{
"VS Code":`/.vscode/*\n!.vscode/settings.json\n!.vscode/tasks.json\n!.vscode/launch.json\n!.vscode/extensions.json\n*.code-workspace`,
"JetBrains":`/.idea/\n*.iws\n*.iml\n*.ipr\nout/\n.idea_modules/`,
"Vim":`[._]*.s[a-v][a-z]\n!*.svg\n[._]*.sw[a-p]\n[._]s[a-rt-v][a-z]\n[._]ss[a-gi-z]\n[._]sw[a-p]\nSession.vim\nNetrw*\n*~\ntags\n[._]*.un~`,
"Emacs":`*~\n\\#*\\#\n/.emacs.desktop\n/.emacs.desktop.lock\n*.elc\nauto-save-list\ntramp\n.\\#*`,
"Sublime Text":`*.tmlanguage.cache\n*.tmPreferences.cache\n*.stTheme.cache\n*.sublime-workspace\n*.sublime-project\nsftp-config.json`,
"Docker":`docker-compose.override.yml\n.dockerignore\n*.log`,
"Terraform":`**/.terraform/*\n*.tfstate\n*.tfstate.*\ncrash.log\ncrash.*.log\n*.tfvars\n*.tfvars.json\noverride.tf\noverride.tf.json\n*_override.tf\n*_override.tf.json\n.terraformrc\nterraform.rc`,
},
"OS":{
"macOS":`*.DS_Store\n.AppleDouble\n.LSOverride\nIcon\\r\n._*\n.DocumentRevisions-V100\n.fseventsd\n.Spotlight-V100\n.TemporaryItems\n.Trashes\n.VolumeIcon.icns\n.com.apple.timemachine.donotpresent\n.AppleDB\n.AppleDesktop`,
"Windows":`Thumbs.db\nThumbs.db:encryptable\nehthumbs.db\nehthumbs_vista.db\n*.stackdump\n[Dd]esktop.ini\n$RECYCLE.BIN/\n*.cab\n*.msi\n*.msix\n*.msm\n*.msp\n*.lnk`,
"Linux":`.fuse_hidden*\n.directory\n.Trash-*\n.nfs*`,
},
"Misc":{
"Environment Files":`.env\n.env.local\n.env.development.local\n.env.test.local\n.env.production.local\n.env.staging`,
"Logs":`logs/\n*.log\nnpm-debug.log*\nyarn-debug.log*\nyarn-error.log*\npids\n*.pid\n*.seed\n*.pid.lock`,
"Archives":`*.7z\n*.dmg\n*.gz\n*.iso\n*.jar\n*.rar\n*.tar\n*.zip`,
"Databases":`*.sql\n*.sqlite\n*.sqlite3\n*.db`,
"Secrets & Keys":`*.pem\n*.key\n*.cert\n*.crt\n*.p12\n*.pfx\n*.jks\n.env\n*.env\nid_rsa\nid_ed25519\n*.pub`,
"Coverage":`coverage/\n*.lcov\n.nyc_output\nhtmlcov/\n.coverage\n.coverage.*`,
"Package Managers":`node_modules/\nvendor/\n.venv/\nvenv/\n__pypackages__/\n.bundle/\nPackages/`,
}
};

const selected=new Set();
const searchEl=document.getElementById('search');
const tagsEl=document.getElementById('selectedTags');
const catsEl=document.getElementById('categories');
const outputEl=document.getElementById('output');
const countEl=document.getElementById('lineCount');

function render(){
  // tags
  tagsEl.innerHTML=[...selected].map(n=>`<span class="tag" onclick="toggle('${n}')">${n} <span class="x">×</span></span>`).join('');
  // buttons active state
  document.querySelectorAll('.tmpl-btn').forEach(b=>{
    b.classList.toggle('active',selected.has(b.dataset.name));
  });
  // output
  buildOutput();
}

function buildOutput(){
  const sections=[];
  for(const[cat,tmpls] of Object.entries(TEMPLATES)){
    for(const[name,content] of Object.entries(tmpls)){
      if(selected.has(name)){
        sections.push(`# === ${name} ===\n${content}`);
      }
    }
  }
  const custom=outputEl.dataset.custom||'';
  const generated=sections.join('\n\n');
  if(generated&&custom){
    outputEl.value=generated+'\n\n# === Custom ===\n'+custom;
  } else if(generated){
    outputEl.value=generated;
  } else {
    outputEl.value=custom;
  }
  const lines=outputEl.value?outputEl.value.split('\n').filter(l=>l.trim()&&!l.startsWith('#')).length:0;
  countEl.textContent=lines?`(${lines} rules)`:'';
}

function toggle(name){
  if(selected.has(name)) selected.delete(name); else selected.add(name);
  render();
}

function buildCategories(filter=''){
  const fl=filter.toLowerCase();
  let html='';
  for(const[cat,tmpls] of Object.entries(TEMPLATES)){
    const names=Object.keys(tmpls).filter(n=>!fl||n.toLowerCase().includes(fl));
    if(!names.length) continue;
    html+=`<div class="cat-label">${cat}</div><div class="template-grid">`;
    for(const n of names){
      html+=`<button class="tmpl-btn${selected.has(n)?' active':''}" data-name="${n}" onclick="toggle('${n}')">${n}</button>`;
    }
    html+=`</div>`;
  }
  catsEl.innerHTML=html||'<p style="color:var(--muted);padding:12px 0">No templates match your search.</p>';
}

searchEl.addEventListener('input',()=>buildCategories(searchEl.value));

// track custom edits
outputEl.addEventListener('input',()=>{
  // extract lines that aren't from templates
  const templateLines=new Set();
  for(const[cat,tmpls] of Object.entries(TEMPLATES)){
    for(const[name,content] of Object.entries(tmpls)){
      if(selected.has(name)){
        for(const l of content.split('\n')) templateLines.add(l);
        templateLines.add(`# === ${name} ===`);
      }
    }
  }
  templateLines.add('# === Custom ===');
  const custom=outputEl.value.split('\n').filter(l=>!templateLines.has(l)).join('\n').trim();
  outputEl.dataset.custom=custom;
  const lines=outputEl.value.split('\n').filter(l=>l.trim()&&!l.startsWith('#')).length;
  countEl.textContent=lines?`(${lines} rules)`:'';
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function copyOutput(){
  navigator.clipboard.writeText(outputEl.value).then(()=>showToast('Copied to clipboard!')).catch(()=>{outputEl.select();document.execCommand('copy');showToast('Copied!')});
}

function downloadOutput(){
  const blob=new Blob([outputEl.value],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='.gitignore';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Downloaded .gitignore');
}

buildCategories();
</script>
</body>
</html>
