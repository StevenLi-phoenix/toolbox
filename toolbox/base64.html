<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder & Decoder - Free Online Tool</title>
<meta name="description" content="Free online Base64 encoder and decoder. Convert text to Base64 and back instantly. Supports UTF-8 text and file encoding. No data sent to any server.">
<meta name="keywords" content="base64, encoder, decoder, convert, text, online tool, free, utf-8">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/base64.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--error:#ef4444;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:800px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.4rem}
textarea{width:100%;min-height:120px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:'Courier New',monospace;font-size:.9rem;resize:vertical;transition:border-color .2s}
textarea:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-icon{background:transparent;color:var(--muted);padding:.4rem .6rem;font-size:.85rem;border:1px solid var(--border);border-radius:6px}
.btn-icon:hover{color:var(--text);border-color:var(--muted)}
.status{margin-top:.75rem;font-size:.85rem;padding:.5rem .75rem;border-radius:6px;display:none}
.status.success{display:block;background:rgba(34,197,94,.12);color:var(--success);border:1px solid rgba(34,197,94,.25)}
.status.error{display:block;background:rgba(239,68,68,.12);color:var(--error);border:1px solid rgba(239,68,68,.25)}
.info{font-size:.8rem;color:var(--muted);margin-top:.5rem}
.toggle-row{display:flex;gap:1rem;margin-bottom:1rem;align-items:center}
.toggle-row label{margin:0;cursor:pointer;display:flex;align-items:center;gap:.4rem;font-size:.9rem;color:var(--text)}
.file-drop{border:2px dashed var(--border);border-radius:8px;padding:2rem;text-align:center;color:var(--muted);cursor:pointer;transition:all .2s;margin-top:.75rem}
.file-drop:hover,.file-drop.dragover{border-color:var(--accent);color:var(--text)}
.file-drop input{display:none}
.stats{display:flex;gap:1.5rem;margin-top:.75rem;font-size:.8rem;color:var(--muted)}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.bmc{display:inline-flex;align-items:center;gap:.4rem;background:#FFDD00;color:#000;padding:.5rem 1rem;border-radius:8px;font-weight:600;text-decoration:none;margin-top:.75rem;font-size:.85rem;transition:opacity .15s}
.bmc:hover{opacity:.85;text-decoration:none}
@media(max-width:600px){h1{font-size:1.4rem}.btn-row{flex-direction:column}.btn-row button{width:100%}}
</style>
</head>
<body>
<div class="container">
  <h1>Base64 Encoder & Decoder</h1>
  <p class="subtitle">Convert text or files to/from Base64 instantly. Everything runs in your browser.</p>

  <div class="card">
    <h2>📝 Input</h2>
    <div class="toggle-row">
      <label><input type="radio" name="mode" value="encode" checked onchange="updateMode()"> Encode</label>
      <label><input type="radio" name="mode" value="decode" onchange="updateMode()"> Decode</label>
    </div>
    <label for="input" id="input-label">Text to encode</label>
    <textarea id="input" placeholder="Paste your text here..." aria-labelledby="input-label"></textarea>
    <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" onchange="handleFile(event)">
      📁 Drop a file here or click to select (encodes to Base64)
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="convert()" id="convertBtn">Encode →</button>
      <button class="btn-secondary" onclick="swapFields()">⇅ Swap</button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
    </div>
  </div>

  <div class="card">
    <h2>📋 Output</h2>
    <textarea id="output" placeholder="Result will appear here..." readonly aria-label="Output"></textarea>
    <div class="btn-row">
      <button class="btn-icon" onclick="copyOutput()">📋 Copy</button>
      <button class="btn-icon" onclick="downloadOutput()">💾 Download</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="status" id="status"></div>
  </div>
</div>

<footer>
  <a href="/toolbox/">← All Tools</a> · 100% client-side, no data leaves your browser
  <br>
  <a class="bmc" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy me a coffee</a>
</footer>

<script>
function getMode(){return document.querySelector('input[name="mode"]:checked').value}

function updateMode(){
  const m=getMode();
  document.getElementById('input-label').textContent=m==='encode'?'Text to encode':'Base64 to decode';
  document.getElementById('convertBtn').textContent=m==='encode'?'Encode →':'Decode →';
  document.getElementById('input').placeholder=m==='encode'?'Paste your text here...':'Paste Base64 string here...';
}

function showStatus(msg,type){
  const el=document.getElementById('status');
  el.textContent=msg;
  el.className='status '+type;
  if(type==='success')setTimeout(()=>el.className='status',3000);
}

function convert(){
  const input=document.getElementById('input').value;
  const output=document.getElementById('output');
  const stats=document.getElementById('stats');
  if(!input.trim()){showStatus('Please enter some text.','error');return}
  try{
    let result;
    if(getMode()==='encode'){
      // Proper UTF-8 encoding
      const bytes=new TextEncoder().encode(input);
      const binary=Array.from(bytes,b=>String.fromCharCode(b)).join('');
      result=btoa(binary);
    }else{
      const binary=atob(input.replace(/\s/g,''));
      const bytes=Uint8Array.from(binary,c=>c.charCodeAt(0));
      result=new TextDecoder().decode(bytes);
    }
    output.value=result;
    stats.textContent=`Input: ${input.length} chars · Output: ${result.length} chars · Ratio: ${(result.length/input.length).toFixed(2)}x`;
    showStatus(getMode()==='encode'?'Encoded successfully!':'Decoded successfully!','success');
  }catch(e){
    showStatus('Error: '+e.message,'error');
    output.value='';
    stats.textContent='';
  }
}

function handleFile(e){
  const file=e.target.files[0];
  if(!file)return;
  // Force encode mode for files
  document.querySelector('input[name="mode"][value="encode"]').checked=true;
  updateMode();
  const reader=new FileReader();
  reader.onload=function(){
    const base64=reader.result.split(',')[1]||reader.result;
    document.getElementById('output').value=base64;
    const stats=document.getElementById('stats');
    stats.textContent=`File: ${file.name} (${(file.size/1024).toFixed(1)} KB) · Base64: ${base64.length} chars`;
    showStatus(`File "${file.name}" encoded to Base64!`,'success');
  };
  reader.readAsDataURL(file);
}

function swapFields(){
  const inp=document.getElementById('input');
  const out=document.getElementById('output');
  const tmp=inp.value;
  inp.value=out.value;
  out.value=tmp;
  // Toggle mode
  const current=getMode();
  document.querySelector(`input[name="mode"][value="${current==='encode'?'decode':'encode'}"]`).checked=true;
  updateMode();
}

function copyOutput(){
  const text=document.getElementById('output').value;
  if(!text){showStatus('Nothing to copy','error');return}
  navigator.clipboard.writeText(text).then(()=>showStatus('Copied!','success')).catch(()=>{
    // Fallback
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showStatus('Copied!','success');
  });
}

function downloadOutput(){
  const text=document.getElementById('output').value;
  if(!text){showStatus('Nothing to download','error');return}
  const ext=getMode()==='encode'?'b64':'txt';
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`output.${ext}`;a.click();
  URL.revokeObjectURL(a.href);
}

function clearAll(){
  document.getElementById('input').value='';
  document.getElementById('output').value='';
  document.getElementById('stats').textContent='';
  document.getElementById('status').className='status';
}

// Drag and drop
const drop=document.getElementById('fileDrop');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('dragover')});
drop.addEventListener('dragleave',()=>drop.classList.remove('dragover'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f){document.getElementById('fileInput').files=e.dataTransfer.files;handleFile({target:{files:e.dataTransfer.files}})}});
</script>
</body>
</html>
