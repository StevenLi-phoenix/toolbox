<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Clip-Path Generator | Free Online Visual Editor</title>
    <meta name="description" content="Free online CSS clip-path generator. Visually create polygon, circle, ellipse, and inset clip-path shapes with drag-and-drop points. Copy CSS instantly.">
    <meta name="keywords" content="css clip-path, clip-path generator, polygon clip-path, css shape generator, clip-path editor, web design tool">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/clippath.html">
    <meta property="og:title" content="CSS Clip-Path Generator | Free Visual Editor">
    <meta property="og:description" content="Visually create CSS clip-path shapes — polygon, circle, ellipse, inset — with drag-and-drop editing. Copy CSS with one click.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/clippath.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="CSS Clip-Path Generator | Free Visual Editor">
    <meta name="twitter:description" content="Visually create CSS clip-path shapes with drag-and-drop editing. Copy CSS instantly.">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh;display:flex;flex-direction:column}
        .header{padding:16px 20px;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .header h1{font-size:1.3rem;font-weight:600;color:#f0f6fc}
        .header h1 span{color:#7c5cfc}
        .coffee{color:#ffdd57;text-decoration:none;font-size:.85rem;padding:6px 12px;border:1px solid #ffdd5744;border-radius:6px;transition:all .2s}
        .coffee:hover{background:#ffdd5722;border-color:#ffdd57}
        .main{display:flex;flex:1;overflow:hidden}
        .sidebar{width:260px;min-width:260px;border-right:1px solid #21262d;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
        .canvas-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .toolbar{padding:10px 16px;border-bottom:1px solid #21262d;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
        .canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
        label{font-size:.8rem;color:#8b949e;display:block;margin-bottom:4px}
        .group{display:flex;flex-direction:column;gap:4px}
        .shape-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
        .shape-btn{padding:8px;border:1px solid #30363d;border-radius:6px;background:#161b22;color:#c9d1d9;cursor:pointer;font-size:.8rem;text-align:center;transition:all .15s}
        .shape-btn:hover{border-color:#58a6ff}
        .shape-btn.active{border-color:#7c5cfc;background:#7c5cfc22;color:#d2b8ff}
        .preset-btns{display:flex;flex-direction:column;gap:4px}
        .preset-btn{padding:6px 10px;border:1px solid #30363d;border-radius:6px;background:#161b22;color:#c9d1d9;cursor:pointer;font-size:.78rem;text-align:left;transition:all .15s}
        .preset-btn:hover{border-color:#58a6ff;background:#1c2333}
        .btn{padding:6px 14px;border:1px solid #30363d;border-radius:6px;background:#161b22;color:#c9d1d9;cursor:pointer;font-size:.8rem;transition:all .15s}
        .btn:hover{border-color:#58a6ff;background:#1c2333}
        .btn.primary{background:#7c5cfc;border-color:#7c5cfc;color:#fff}
        .btn.primary:hover{background:#6b4fe0}
        .canvas-box{position:relative;width:400px;height:400px;background:repeating-conic-gradient(#1a1f2b 0% 25%,#161b22 0% 50%) 0 0/20px 20px;border:2px solid #30363d;border-radius:8px;overflow:visible}
        .clipped-el{width:100%;height:100%;background:linear-gradient(135deg,#7c5cfc,#58a6ff,#3fb950);transition:clip-path .05s}
        svg.overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
        svg.overlay line{stroke:#ffdd57;stroke-width:1;stroke-dasharray:4,3;opacity:.5}
        .point{position:absolute;width:14px;height:14px;background:#ffdd57;border:2px solid #0f1117;border-radius:50%;cursor:grab;transform:translate(-50%,-50%);z-index:10;transition:box-shadow .15s}
        .point:hover,.point.dragging{box-shadow:0 0 0 4px #ffdd5744;background:#fff}
        .output{padding:16px;border-top:1px solid #21262d;background:#161b22}
        .output-row{display:flex;gap:8px;align-items:stretch}
        .output code{flex:1;display:block;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;font-family:'SF Mono',Consolas,monospace;font-size:.82rem;color:#79c0ff;white-space:nowrap;overflow-x:auto;line-height:1.6}
        .param-row{display:flex;gap:8px;align-items:center}
        .param-row input[type=range]{flex:1;accent-color:#7c5cfc}
        .param-row .val{font-size:.8rem;color:#58a6ff;min-width:40px;text-align:right;font-family:monospace}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#3fb950;color:#0d1117;padding:8px 20px;border-radius:6px;font-size:.85rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
        .toast.show{opacity:1}
        @media(max-width:768px){
            .main{flex-direction:column}
            .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid #21262d;padding:12px;flex-direction:row;flex-wrap:wrap;overflow-y:visible}
            .sidebar .group{min-width:140px;flex:1}
            .canvas-area{padding:12px}
            .canvas-box{width:min(90vw,360px);height:min(90vw,360px)}
            .output-row{flex-direction:column}
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>⬡</span> CSS Clip-Path Generator</h1>
        <a class="coffee" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy me a coffee</a>
    </div>
    <div class="main">
        <div class="sidebar">
            <div class="group">
                <label>Shape Type</label>
                <div class="shape-btns">
                    <button class="shape-btn active" data-shape="polygon">Polygon</button>
                    <button class="shape-btn" data-shape="circle">Circle</button>
                    <button class="shape-btn" data-shape="ellipse">Ellipse</button>
                    <button class="shape-btn" data-shape="inset">Inset</button>
                </div>
            </div>
            <div class="group" id="presets-group">
                <label>Presets</label>
                <div class="preset-btns" id="presets"></div>
            </div>
            <div class="group" id="params-group" style="display:none">
                <label>Parameters</label>
                <div id="params"></div>
            </div>
            <div class="group" id="polygon-actions">
                <label>Points</label>
                <div style="display:flex;gap:6px">
                    <button class="btn" id="addPointBtn">+ Add Point</button>
                    <button class="btn" id="removePointBtn">− Remove Last</button>
                </div>
            </div>
        </div>
        <div class="canvas-wrap">
            <div class="canvas-area">
                <div class="canvas-box" id="canvasBox">
                    <div class="clipped-el" id="clipped"></div>
                    <svg class="overlay" id="lines"></svg>
                    <div id="pointsContainer"></div>
                </div>
            </div>
            <div class="output">
                <div class="output-row">
                    <code id="cssOutput">clip-path: polygon(...);</code>
                    <button class="btn primary" id="copyBtn">Copy</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast">Copied!</div>

    <script>
    (function(){
        const canvasBox=document.getElementById('canvasBox');
        const clipped=document.getElementById('clipped');
        const linesSvg=document.getElementById('lines');
        const pointsContainer=document.getElementById('pointsContainer');
        const cssOutput=document.getElementById('cssOutput');
        const paramsGroup=document.getElementById('params-group');
        const paramsDiv=document.getElementById('params');
        const polygonActions=document.getElementById('polygon-actions');
        const presetsDiv=document.getElementById('presets');
        const toast=document.getElementById('toast');

        let currentShape='polygon';
        let polygonPoints=[];
        let circleParams={r:50,cx:50,cy:50};
        let ellipseParams={rx:50,ry:35,cx:50,cy:50};
        let insetParams={top:10,right:10,bottom:10,left:10,round:0};
        let dragging=null;

        const presets={
            polygon:[
                {name:'Triangle',pts:[[50,0],[0,100],[100,100]]},
                {name:'Pentagon',pts:[[50,0],[100,38],[81,100],[19,100],[0,38]]},
                {name:'Hexagon',pts:[[25,0],[75,0],[100,50],[75,100],[25,100],[0,50]]},
                {name:'Star',pts:[[50,0],[63,35],[100,35],[72,57],[82,100],[50,72],[18,100],[28,57],[0,35],[37,35]]},
                {name:'Arrow Right',pts:[[0,20],[70,20],[70,0],[100,50],[70,100],[70,80],[0,80]]},
                {name:'Diamond',pts:[[50,0],[100,50],[50,100],[0,50]]},
                {name:'Cross',pts:[[35,0],[65,0],[65,35],[100,35],[100,65],[65,65],[65,100],[35,100],[35,65],[0,65],[0,35],[35,35]]},
                {name:'Chevron',pts:[[0,0],[75,0],[100,50],[75,100],[0,100],[25,50]]},
            ],
            circle:[],ellipse:[],inset:[]
        };

        function init(){
            document.querySelectorAll('.shape-btn').forEach(b=>{
                b.addEventListener('click',()=>{
                    document.querySelectorAll('.shape-btn').forEach(x=>x.classList.remove('active'));
                    b.classList.add('active');
                    currentShape=b.dataset.shape;
                    setupShape();
                });
            });
            document.getElementById('copyBtn').addEventListener('click',copyCSS);
            document.getElementById('addPointBtn').addEventListener('click',addPoint);
            document.getElementById('removePointBtn').addEventListener('click',removePoint);
            canvasBox.addEventListener('mousedown',startDrag);
            canvasBox.addEventListener('touchstart',startDrag,{passive:false});
            window.addEventListener('mousemove',onDrag);
            window.addEventListener('touchmove',onDrag,{passive:false});
            window.addEventListener('mouseup',endDrag);
            window.addEventListener('touchend',endDrag);
            setupShape();
        }

        function setupShape(){
            polygonActions.style.display=currentShape==='polygon'?'':'none';
            if(currentShape==='polygon'){
                if(!polygonPoints.length) polygonPoints=[[20,20],[80,20],[80,80],[20,80]];
                paramsGroup.style.display='none';
                renderPresets();
            }else if(currentShape==='circle'){
                paramsGroup.style.display='';
                renderCircleParams();
                renderPresets();
            }else if(currentShape==='ellipse'){
                paramsGroup.style.display='';
                renderEllipseParams();
                renderPresets();
            }else if(currentShape==='inset'){
                paramsGroup.style.display='';
                renderInsetParams();
                renderPresets();
            }
            render();
        }

        function renderPresets(){
            presetsDiv.innerHTML='';
            const list=presets[currentShape]||[];
            if(!list.length){presetsDiv.parentElement.style.display='none';return;}
            presetsDiv.parentElement.style.display='';
            list.forEach(p=>{
                const b=document.createElement('button');
                b.className='preset-btn';
                b.textContent=p.name;
                b.addEventListener('click',()=>{
                    if(currentShape==='polygon'){
                        polygonPoints=p.pts.map(pt=>[...pt]);
                        render();
                    }
                });
                presetsDiv.appendChild(b);
            });
        }

        function makeSlider(label,min,max,val,cb){
            const row=document.createElement('div');
            row.className='param-row';
            const lbl=document.createElement('span');
            lbl.style.cssText='font-size:.78rem;color:#8b949e;min-width:40px';
            lbl.textContent=label;
            const inp=document.createElement('input');
            inp.type='range';inp.min=min;inp.max=max;inp.value=val;
            const v=document.createElement('span');
            v.className='val';v.textContent=val+'%';
            inp.addEventListener('input',()=>{v.textContent=inp.value+'%';cb(+inp.value);render();});
            row.append(lbl,inp,v);
            return row;
        }

        function renderCircleParams(){
            paramsDiv.innerHTML='';
            paramsDiv.append(
                makeSlider('R',0,100,circleParams.r,v=>{circleParams.r=v;}),
                makeSlider('X',0,100,circleParams.cx,v=>{circleParams.cx=v;}),
                makeSlider('Y',0,100,circleParams.cy,v=>{circleParams.cy=v;})
            );
        }

        function renderEllipseParams(){
            paramsDiv.innerHTML='';
            paramsDiv.append(
                makeSlider('RX',0,100,ellipseParams.rx,v=>{ellipseParams.rx=v;}),
                makeSlider('RY',0,100,ellipseParams.ry,v=>{ellipseParams.ry=v;}),
                makeSlider('X',0,100,ellipseParams.cx,v=>{ellipseParams.cx=v;}),
                makeSlider('Y',0,100,ellipseParams.cy,v=>{ellipseParams.cy=v;})
            );
        }

        function renderInsetParams(){
            paramsDiv.innerHTML='';
            paramsDiv.append(
                makeSlider('Top',0,50,insetParams.top,v=>{insetParams.top=v;}),
                makeSlider('Right',0,50,insetParams.right,v=>{insetParams.right=v;}),
                makeSlider('Bottom',0,50,insetParams.bottom,v=>{insetParams.bottom=v;}),
                makeSlider('Left',0,50,insetParams.left,v=>{insetParams.left=v;}),
                makeSlider('Round',0,50,insetParams.round,v=>{insetParams.round=v;})
            );
        }

        function render(){
            pointsContainer.innerHTML='';
            linesSvg.innerHTML='';
            let css='';
            if(currentShape==='polygon'){
                polygonPoints.forEach((pt,i)=>{
                    const el=document.createElement('div');
                    el.className='point';
                    el.style.left=pt[0]+'%';
                    el.style.top=pt[1]+'%';
                    el.dataset.index=i;
                    el.dataset.type='polygon';
                    pointsContainer.appendChild(el);
                });
                // draw lines
                const svgW=canvasBox.offsetWidth,svgH=canvasBox.offsetHeight;
                polygonPoints.forEach((pt,i)=>{
                    const next=polygonPoints[(i+1)%polygonPoints.length];
                    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
                    line.setAttribute('x1',(pt[0]/100*svgW));
                    line.setAttribute('y1',(pt[1]/100*svgH));
                    line.setAttribute('x2',(next[0]/100*svgW));
                    line.setAttribute('y2',(next[1]/100*svgH));
                    linesSvg.appendChild(line);
                });
                const pts=polygonPoints.map(p=>p[0].toFixed(1)+'% '+p[1].toFixed(1)+'%').join(', ');
                css=`clip-path: polygon(${pts});`;
            }else if(currentShape==='circle'){
                css=`clip-path: circle(${circleParams.r}% at ${circleParams.cx}% ${circleParams.cy}%);`;
            }else if(currentShape==='ellipse'){
                css=`clip-path: ellipse(${ellipseParams.rx}% ${ellipseParams.ry}% at ${ellipseParams.cx}% ${ellipseParams.cy}%);`;
            }else if(currentShape==='inset'){
                const rnd=insetParams.round?` round ${insetParams.round}%`:'';
                css=`clip-path: inset(${insetParams.top}% ${insetParams.right}% ${insetParams.bottom}% ${insetParams.left}%${rnd});`;
            }
            clipped.style.clipPath=css.replace('clip-path: ','').replace(';','');
            cssOutput.textContent=css;
        }

        function getPos(e){
            const t=e.touches?e.touches[0]:e;
            const r=canvasBox.getBoundingClientRect();
            return[
                Math.max(0,Math.min(100,((t.clientX-r.left)/r.width)*100)),
                Math.max(0,Math.min(100,((t.clientY-r.top)/r.height)*100))
            ];
        }

        function startDrag(e){
            const el=e.target.closest('.point');
            if(!el)return;
            e.preventDefault();
            dragging=el;
            el.classList.add('dragging');
        }

        function onDrag(e){
            if(!dragging)return;
            e.preventDefault();
            const[x,y]=getPos(e);
            if(dragging.dataset.type==='polygon'){
                const i=+dragging.dataset.index;
                polygonPoints[i]=[Math.round(x*10)/10,Math.round(y*10)/10];
            }
            render();
        }

        function endDrag(){
            if(dragging){dragging.classList.remove('dragging');dragging=null;}
        }

        function addPoint(){
            if(currentShape!=='polygon')return;
            const len=polygonPoints.length;
            if(len<2){polygonPoints.push([50,50]);render();return;}
            const a=polygonPoints[len-1],b=polygonPoints[0];
            polygonPoints.push([Math.round((a[0]+b[0])/2*10)/10,Math.round((a[1]+b[1])/2*10)/10]);
            render();
        }

        function removePoint(){
            if(currentShape!=='polygon'||polygonPoints.length<=3)return;
            polygonPoints.pop();
            render();
        }

        function copyCSS(){
            navigator.clipboard.writeText(cssOutput.textContent).then(()=>{
                toast.classList.add('show');
                setTimeout(()=>toast.classList.remove('show'),1500);
            });
        }

        init();
    })();
    </script>
</body>
</html>
