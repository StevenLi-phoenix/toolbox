    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
        header{background:#1a1a2e;border-bottom:1px solid #2a2a3e;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
        header h1{font-size:1.3rem;color:#fff}
        header h1 span{color:#7c4dff}
        .coffee{color:#ffdd57;text-decoration:none;font-size:.85rem;background:#2a2a3e;padding:.4rem .8rem;border-radius:6px;transition:background .2s}
        .coffee:hover{background:#3a3a4e}
        .app{display:flex;flex:1;overflow:hidden}
        .controls{width:320px;min-width:280px;background:#1a1a2e;padding:1.2rem;overflow-y:auto;border-right:1px solid #2a2a3e;display:flex;flex-direction:column;gap:1rem}
        .preview-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .preview-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:1rem;overflow:auto;position:relative}
        .preview-container{width:100%;max-width:1200px;position:relative}
        .preview-bg{width:100%;border-radius:8px;overflow:hidden;position:relative}
        .preview-bg .top-section,.preview-bg .bot-section{padding:2rem;text-align:center;font-size:.85rem;color:rgba(255,255,255,.5)}
        .actions{display:flex;gap:.5rem;padding:.8rem 1rem;background:#1a1a2e;border-top:1px solid #2a2a3e;flex-wrap:wrap}
        .group{background:#16162a;border:1px solid #2a2a3e;border-radius:8px;padding:.8rem}
        .group h3{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:.6rem}
        label{display:flex;flex-direction:column;gap:.3rem;font-size:.8rem;color:#bbb;margin-bottom:.5rem}
        label:last-child{margin-bottom:0}
        input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:#2a2a3e;border-radius:3px;outline:none}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#7c4dff;border-radius:50%;cursor:pointer}
        input[type=color]{width:100%;height:32px;border:1px solid #2a2a3e;border-radius:4px;background:#111;cursor:pointer;padding:2px}
        input[type=number]{width:100%;background:#111;border:1px solid #2a2a3e;border-radius:4px;color:#e0e0e0;padding:.3rem .5rem;font-size:.8rem}
        select{width:100%;background:#111;border:1px solid #2a2a3e;border-radius:4px;color:#e0e0e0;padding:.4rem .5rem;font-size:.8rem}
        .val{color:#7c4dff;font-weight:600;float:right}
        .layers-list{display:flex;flex-direction:column;gap:.5rem}
        .layer-item{background:#111;border:1px solid #2a2a3e;border-radius:6px;padding:.6rem;display:flex;align-items:center;gap:.5rem}
        .layer-item input[type=color]{width:36px;height:28px;flex-shrink:0}
        .layer-item .layer-opacity{flex:1}
        .layer-item button{background:none;border:none;color:#f44;cursor:pointer;font-size:1rem;padding:0 .2rem}
        .btn{padding:.45rem .9rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:500;transition:all .2s}
        .btn-primary{background:#7c4dff;color:#fff}
        .btn-primary:hover{background:#6a3de8}
        .btn-secondary{background:#2a2a3e;color:#e0e0e0}
        .btn-secondary:hover{background:#3a3a4e}
        .btn-sm{padding:.3rem .6rem;font-size:.75rem}
        .btn-add{width:100%;margin-top:.3rem}
        .row{display:flex;gap:.5rem;align-items:center}
        .row>*{flex:1}
        .toggle-row{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:#bbb}
        .toggle-row input[type=checkbox]{accent-color:#7c4dff;width:16px;height:16px}
        footer{text-align:center;padding:.8rem;font-size:.75rem;color:#666;background:#1a1a2e;border-top:1px solid #2a2a3e}
        footer a{color:#7c4dff;text-decoration:none}

        @media(max-width:768px){
            .app{flex-direction:column}
            .controls{width:100%;min-width:auto;max-height:50vh;border-right:none;border-bottom:1px solid #2a2a3e}
            .preview-wrapper{min-height:200px}
        }
    </style>
</head>
<body>
    <header>
        <h1>🌊 SVG <span>Wave Generator</span></h1>
        <a class="coffee" href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
    </header>
    <div class="app">
        <div class="controls">
            <div class="group">
                <h3>Wave Shape</h3>
                <label>
                    Complexity <span class="val" id="complexityVal">5</span>
                    <input type="range" id="complexity" min="1" max="12" value="5">
                </label>
                <label>
                    Height <span class="val" id="heightVal">150</span>px
                    <input type="range" id="waveHeight" min="40" max="400" value="150">
                </label>
                <label>
                    Amplitude <span class="val" id="ampVal">50</span>%
                    <input type="range" id="amplitude" min="5" max="100" value="50">
                </label>
                <label>
                    Smoothness <span class="val" id="smoothVal">80</span>%
                    <input type="range" id="smoothness" min="0" max="100" value="80">
                </label>
            </div>
            <div class="group">
                <h3>Options</h3>
                <div class="toggle-row">
                    <input type="checkbox" id="flipY"> <label for="flipY" style="margin:0;flex-direction:row">Flip vertically</label>
                </div>
                <div class="toggle-row" style="margin-top:.4rem">
                    <input type="checkbox" id="flipX"> <label for="flipX" style="margin:0;flex-direction:row">Flip horizontally</label>
                </div>
                <label style="margin-top:.5rem">
                    Width
                    <input type="number" id="svgWidth" value="1440" min="320" max="3840" step="10">
                </label>
            </div>
            <div class="group">
                <h3>Background</h3>
                <div class="row">
                    <label>Top color <input type="color" id="bgTop" value="#1a1a2e"></label>
                    <label>Bottom color <input type="color" id="bgBot" value="#0f0f0f"></label>
                </div>
            </div>
            <div class="group">
                <h3>Wave Layers</h3>
                <div class="layers-list" id="layersList"></div>
                <button class="btn btn-secondary btn-sm btn-add" id="addLayer">+ Add Layer</button>
            </div>
            <div class="group">
                <h3>Randomize</h3>
                <div class="row">
                    <button class="btn btn-primary" id="randomize">🎲 Random Wave</button>
                    <button class="btn btn-secondary" id="randomColors">🎨 Random Colors</button>
                </div>
            </div>
        </div>
        <div class="preview-area">
            <div class="preview-wrapper">
                <div class="preview-container">
                    <div class="preview-bg" id="previewBg">
                        <div class="top-section">Top Section</div>
                        <svg id="waveSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="100%"></svg>
                        <div class="bot-section">Bottom Section</div>
                    </div>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" id="copySvg">📋 Copy SVG</button>
                <button class="btn btn-secondary" id="copyCss">📋 Copy as CSS</button>
                <button class="btn btn-secondary" id="downloadSvg">⬇ Download SVG</button>
                <button class="btn btn-secondary" id="copyHtml">📋 Copy HTML Snippet</button>
            </div>
        </div>
    </div>
    <footer>
        SVG Wave Generator — <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">Support this project ☕</a>
    </footer>

    <script>
    (function(){
        const $ = id => document.getElementById(id);
        let layers = [
            {color:'#7c4dff',opacity:1},
            {color:'#5c3cbf',opacity:0.6},
        ];
        let seeds = layers.map(()=>Math.random()*1000);

        function noise(x,seed){
            const s=seed+x*1.37;
            return(Math.sin(s*12.9898+s*78.233)*43758.5453)%1;
        }

        function generateWavePoints(w,h,complexity,amplitude,seed){
            const pts=[];
            const segments=complexity+1;
            const step=w/segments;
            for(let i=0;i<=segments;i++){
                const x=i*step;
                const n=noise(i,seed);
                const y=h*0.5+n*h*amplitude*0.01-h*amplitude*0.005;
                pts.push({x,y});
            }
            return pts;
        }

        function smoothPath(pts,smoothness){
            if(pts.length<2)return'';
            const s=smoothness/100;
            let d=`M${pts[0].x},${pts[0].y}`;
            for(let i=1;i<pts.length;i++){
                const p0=pts[Math.max(0,i-2)];
                const p1=pts[i-1];
                const p2=pts[i];
                const p3=pts[Math.min(pts.length-1,i+1)];
                const cp1x=p1.x+(p2.x-p0.x)*0.15*s;
                const cp1y=p1.y+(p2.y-p0.y)*0.15*s;
                const cp2x=p2.x-(p3.x-p1.x)*0.15*s;
                const cp2y=p2.y-(p3.y-p1.y)*0.15*s;
                if(s>0.1){
                    d+=` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
                }else{
                    d+=` L${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
                }
            }
            return d;
        }

        function renderLayers(){
            const list=$('layersList');
            list.innerHTML='';
            layers.forEach((l,i)=>{
                const div=document.createElement('div');
                div.className='layer-item';
                div.innerHTML=`
                    <input type="color" value="${l.color}" data-i="${i}" class="lc">
                    <input type="range" min="10" max="100" value="${Math.round(l.opacity*100)}" class="layer-opacity lo" data-i="${i}" title="Opacity: ${Math.round(l.opacity*100)}%">
                    <button data-i="${i}" class="lr" title="Remove">✕</button>
                `;
                list.appendChild(div);
            });
            list.querySelectorAll('.lc').forEach(el=>el.addEventListener('input',e=>{
                layers[+e.target.dataset.i].color=e.target.value;generate();
            }));
            list.querySelectorAll('.lo').forEach(el=>el.addEventListener('input',e=>{
                layers[+e.target.dataset.i].opacity=e.target.value/100;generate();
            }));
            list.querySelectorAll('.lr').forEach(el=>el.addEventListener('click',e=>{
                const i=+e.target.dataset.i;
                if(layers.length<=1)return;
                layers.splice(i,1);seeds.splice(i,1);renderLayers();generate();
            }));
        }

        function generate(){
            const w=+$('svgWidth').value||1440;
            const h=+$('waveHeight').value;
            const complexity=+$('complexity').value;
            const amp=+$('amplitude').value;
            const smooth=+$('smoothness').value;
            const flipY=$('flipY').checked;
            const flipX=$('flipX').checked;

            $('complexityVal').textContent=complexity;
            $('heightVal').textContent=h;
            $('ampVal').textContent=amp;
            $('smoothVal').textContent=smooth;

            const svg=$('waveSvg');
            svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
            svg.style.height=h+'px';
            svg.style.display='block';

            let paths='';
            layers.forEach((l,i)=>{
                const pts=generateWavePoints(w,h,complexity,amp,seeds[i]);
                let d=smoothPath(pts,smooth);
                d+=` L${w},${h} L0,${h} Z`;
                const transform=[];
                if(flipY)transform.push(`translate(0,${h}) scale(1,-1)`);
                if(flipX)transform.push(`translate(${w},0) scale(-1,1)`);
                paths+=`<path d="${d}" fill="${l.color}" opacity="${l.opacity}"${transform.length?' transform="'+transform.join(' ')+'"':''}/>`;
            });
            svg.innerHTML=paths;

            $('previewBg').querySelector('.top-section').style.background=$('bgTop').value;
            $('previewBg').querySelector('.bot-section').style.background=$('bgBot').value;
        }

        function getSvgString(){
            const svg=$('waveSvg');
            const clone=svg.cloneNode(true);
            clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
            return clone.outerHTML;
        }

        $('copySvg').onclick=()=>{
            navigator.clipboard.writeText(getSvgString()).then(()=>flash($('copySvg'),'✅ Copied!'));
        };

        $('downloadSvg').onclick=()=>{
            const blob=new Blob([getSvgString()],{type:'image/svg+xml'});
            const a=document.createElement('a');
            a.href=URL.createObjectURL(blob);
            a.download='wave.svg';
            a.click();
            URL.revokeObjectURL(a.href);
        };

        $('copyCss').onclick=()=>{
            const encoded=encodeURIComponent(getSvgString());
            const css=`.wave-divider {\n  width: 100%;\n  height: ${$('waveHeight').value}px;\n  background-image: url("data:image/svg+xml,${encoded}");\n  background-size: cover;\n  background-repeat: no-repeat;\n}`;
            navigator.clipboard.writeText(css).then(()=>flash($('copyCss'),'✅ Copied!'));
        };

        $('copyHtml').onclick=()=>{
            const html=`<div style="position:relative">\n  <div style="background:${$('bgTop').value};padding:2rem">Top Section</div>\n  ${getSvgString().replace(/\n/g,'\n  ')}\n  <div style="background:${$('bgBot').value};padding:2rem">Bottom Section</div>\n</div>`;
            navigator.clipboard.writeText(html).then(()=>flash($('copyHtml'),'✅ Copied!'));
        };

        function flash(btn,text){
            const orig=btn.textContent;
            btn.textContent=text;
            setTimeout(()=>btn.textContent=orig,1500);
        }

        $('addLayer').onclick=()=>{
            if(layers.length>=6)return;
            const hue=Math.floor(Math.random()*360);
            layers.push({color:`hsl(${hue},60%,50%)`,opacity:0.3+Math.random()*0.4});
            seeds.push(Math.random()*1000);
            renderLayers();generate();
        };

        $('randomize').onclick=()=>{
            seeds=layers.map(()=>Math.random()*1000);
            $('complexity').value=3+Math.floor(Math.random()*8);
            $('amplitude').value=20+Math.floor(Math.random()*60);
            $('smoothness').value=50+Math.floor(Math.random()*50);
            generate();
        };

        $('randomColors').onclick=()=>{
            const baseHue=Math.floor(Math.random()*360);
            layers.forEach((l,i)=>{
                const hue=(baseHue+i*30)%360;
                l.color=`hsl(${hue},${50+Math.random()*30}%,${30+Math.random()*30}%)`;
                // Convert hsl to hex for input
                const canvas=document.createElement('canvas');
                canvas.width=canvas.height=1;
                const ctx=canvas.getContext('2d');
                ctx.fillStyle=l.color;
                ctx.fillRect(0,0,1,1);
                const [r,g,b]=ctx.getImageData(0,0,1,1).data;
                l.color='#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
            });
            renderLayers();generate();
        };

        ['complexity','waveHeight','amplitude','smoothness'].forEach(id=>{
            $(id).addEventListener('input',generate);
        });
        ['flipY','flipX'].forEach(id=>{
            $(id).addEventListener('change',generate);
        });
        $('svgWidth').addEventListener('change',generate);
        $('bgTop').addEventListener('input',generate);
        $('bgBot').addEventListener('input',generate);

        renderLayers();
        generate();
    })();
    </script>
</body>
</html>
