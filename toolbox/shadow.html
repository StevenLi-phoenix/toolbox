<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Box Shadow Generator - Free Online Tool</title>
<meta name="description" content="Free CSS box shadow generator. Create and preview box shadows with multiple layers, inset shadows, and live CSS output. No data sent to any server.">
<meta name="keywords" content="css box shadow, shadow generator, css shadow, box shadow tool, css generator, free css tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/shadow.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:900px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.preview-wrap{display:flex;align-items:center;justify-content:center;min-height:280px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:2rem}
.preview-box{width:200px;height:200px;background:#3b82f6;border-radius:16px;transition:box-shadow .2s}
.layers{display:flex;flex-direction:column;gap:1rem}
.layer{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem}
.layer-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.layer-title{font-size:.9rem;font-weight:600}
.layer-actions{display:flex;gap:.5rem}
.btn-icon{background:transparent;color:var(--muted);border:1px solid var(--border);padding:.3rem .5rem;font-size:.75rem;border-radius:4px;cursor:pointer}
.btn-icon:hover{color:var(--text);border-color:var(--muted)}
.sliders{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(max-width:600px){.sliders{grid-template-columns:1fr}}
.slider-group{display:flex;flex-direction:column;gap:.25rem}
.slider-group label{font-size:.8rem;color:var(--muted);display:flex;justify-content:space-between}
.slider-group label span{color:var(--text);font-weight:600}
.slider-group input[type="range"]{width:100%;accent-color:var(--accent)}
.color-row{display:flex;align-items:center;gap:.75rem;margin-top:.5rem}
.color-row input[type="color"]{width:40px;height:32px;border:1px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;padding:2px}
.color-row input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
.color-row input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px}
.color-row label{font-size:.8rem;color:var(--muted)}
.toggle{display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.85rem;color:var(--muted)}
.toggle input{accent-color:var(--accent)}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-sm{padding:.4rem .75rem;font-size:.8rem}
.code-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;font-family:'Courier New',monospace;font-size:.9rem;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.presets-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.75rem}
.preset-item{height:70px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;border:1px solid var(--border);transition:transform .15s}
.preset-item:hover{transform:scale(1.05)}
.preset-inner{width:40px;height:40px;background:var(--accent);border-radius:8px}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>CSS Box Shadow Generator</h1>
<p class="subtitle">Design beautiful box shadows with live preview</p>

<div class="card">
<h2>👁️ Preview</h2>
<div class="preview-wrap"><div class="preview-box" id="previewBox"></div></div>
</div>

<div class="card">
<h2>⚙️ Shadow Layers</h2>
<div class="layers" id="layers"></div>
<div class="btn-row">
<button class="btn-secondary btn-sm" onclick="addLayer()">+ Add Layer</button>
<button class="btn-secondary btn-sm" onclick="randomShadow()">🎲 Random</button>
</div>
</div>

<div class="card">
<h2>📋 CSS Code</h2>
<div class="code-box" id="codeBox"></div>
<div class="btn-row">
<button class="btn-primary" onclick="copyCSS()">📋 Copy CSS</button>
</div>
</div>

<div class="card">
<h2>✨ Presets</h2>
<div class="presets-grid" id="presets"></div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let layers=[{x:0,y:4,blur:15,spread:0,color:'#000000',opacity:25,inset:false}];

const PRESETS=[
  [{x:0,y:4,blur:6,spread:-1,color:'#000000',opacity:10,inset:false},{x:0,y:2,blur:4,spread:-2,color:'#000000',opacity:10,inset:false}],
  [{x:0,y:10,blur:15,spread:-3,color:'#000000',opacity:10,inset:false},{x:0,y:4,blur:6,spread:-4,color:'#000000',opacity:10,inset:false}],
  [{x:0,y:20,blur:25,spread:-5,color:'#000000',opacity:10,inset:false},{x:0,y:8,blur:10,spread:-6,color:'#000000',opacity:10,inset:false}],
  [{x:0,y:25,blur:50,spread:-12,color:'#000000',opacity:25,inset:false}],
  [{x:0,y:1,blur:3,spread:0,color:'#000000',opacity:12,inset:false},{x:0,y:1,blur:2,spread:-1,color:'#000000',opacity:12,inset:false}],
  [{x:0,y:0,blur:0,spread:4,color:'#3b82f6',opacity:100,inset:false}],
  [{x:8,y:8,blur:0,spread:0,color:'#000000',opacity:100,inset:false}],
  [{x:0,y:0,blur:30,spread:5,color:'#3b82f6',opacity:30,inset:false}],
  [{x:5,y:5,blur:0,spread:0,color:'#334155',opacity:100,inset:false},{x:10,y:10,blur:0,spread:0,color:'#1e293b',opacity:100,inset:false}],
  [{x:0,y:0,blur:20,spread:0,color:'#3b82f6',opacity:50,inset:true}],
  [{x:4,y:4,blur:10,spread:0,color:'#000000',opacity:15,inset:false},{x:-4,y:-4,blur:10,spread:0,color:'#ffffff',opacity:5,inset:false}],
  [{x:0,y:0,blur:0,spread:2,color:'#3b82f6',opacity:100,inset:false},{x:0,y:0,blur:0,spread:6,color:'#0f172a',opacity:100,inset:false},{x:0,y:0,blur:0,spread:8,color:'#8b5cf6',opacity:100,inset:false}],
];

function hexToRgba(hex,opacity){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${(opacity/100).toFixed(2)})`;
}

function getShadowCSS(){
  return layers.map(l=>{
    const c=hexToRgba(l.color,l.opacity);
    return `${l.inset?'inset ':''}${l.x}px ${l.y}px ${l.blur}px ${l.spread}px ${c}`;
  }).join(',\n    ');
}

function update(){
  const shadow=getShadowCSS();
  $('previewBox').style.boxShadow=shadow;
  $('codeBox').textContent=`box-shadow: ${shadow};`;
}

function renderLayers(){
  $('layers').innerHTML=layers.map((l,i)=>`
    <div class="layer">
      <div class="layer-header">
        <span class="layer-title">Layer ${i+1}</span>
        <div class="layer-actions">
          <label class="toggle"><input type="checkbox" ${l.inset?'checked':''} onchange="layers[${i}].inset=this.checked;update()"><span>Inset</span></label>
          ${layers.length>1?`<button class="btn-icon" onclick="removeLayer(${i})">✕</button>`:''}
        </div>
      </div>
      <div class="sliders">
        <div class="slider-group"><label>X Offset <span>${l.x}px</span></label><input type="range" min="-50" max="50" value="${l.x}" oninput="layers[${i}].x=+this.value;this.previousElementSibling.querySelector('span').textContent=this.value+'px';update()"></div>
        <div class="slider-group"><label>Y Offset <span>${l.y}px</span></label><input type="range" min="-50" max="50" value="${l.y}" oninput="layers[${i}].y=+this.value;this.previousElementSibling.querySelector('span').textContent=this.value+'px';update()"></div>
        <div class="slider-group"><label>Blur <span>${l.blur}px</span></label><input type="range" min="0" max="100" value="${l.blur}" oninput="layers[${i}].blur=+this.value;this.previousElementSibling.querySelector('span').textContent=this.value+'px';update()"></div>
        <div class="slider-group"><label>Spread <span>${l.spread}px</span></label><input type="range" min="-50" max="50" value="${l.spread}" oninput="layers[${i}].spread=+this.value;this.previousElementSibling.querySelector('span').textContent=this.value+'px';update()"></div>
        <div class="slider-group"><label>Opacity <span>${l.opacity}%</span></label><input type="range" min="0" max="100" value="${l.opacity}" oninput="layers[${i}].opacity=+this.value;this.previousElementSibling.querySelector('span').textContent=this.value+'%';update()"></div>
      </div>
      <div class="color-row">
        <label>Color:</label>
        <input type="color" value="${l.color}" onchange="layers[${i}].color=this.value;update()">
      </div>
    </div>
  `).join('');
}

function addLayer(){
  layers.push({x:0,y:4,blur:15,spread:0,color:'#000000',opacity:20,inset:false});
  renderLayers();update();
}

function removeLayer(i){
  if(layers.length<=1)return;
  layers.splice(i,1);
  renderLayers();update();
}

function randomShadow(){
  const n=1+Math.floor(Math.random()*2);
  const rr=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
  const rc=()=>'#'+[0,0,0].map(()=>rr(0,255).toString(16).padStart(2,'0')).join('');
  layers=Array.from({length:n},()=>({x:rr(-20,20),y:rr(-20,20),blur:rr(5,40),spread:rr(-10,10),color:rc(),opacity:rr(15,50),inset:Math.random()>.8}));
  renderLayers();update();
}

function loadPreset(i){
  layers=PRESETS[i].map(l=>({...l}));
  renderLayers();update();
}

function copyCSS(){
  navigator.clipboard.writeText(`box-shadow: ${getShadowCSS()};`).then(()=>{
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

// render presets
$('presets').innerHTML=PRESETS.map((p,i)=>{
  const shadow=p.map(l=>`${l.inset?'inset ':''}${l.x}px ${l.y}px ${l.blur}px ${l.spread}px ${hexToRgba(l.color,l.opacity)}`).join(', ');
  return `<div class="preset-item" onclick="loadPreset(${i})"><div class="preset-inner" style="box-shadow:${shadow}"></div></div>`;
}).join('');

renderLayers();update();
</script>
</body>
</html>
