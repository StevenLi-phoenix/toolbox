<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-elevated: #334155;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --border: #334155;
  --accent: #818cf8;
  --accent-hover: #6366f1;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

html { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }

.header {
  text-align: center;
  padding: 2rem 1rem 1rem;
}
.header h1 {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}
.header p {
  color: var(--text-muted);
  font-size: 0.95rem;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 1rem 2rem;
}

/* Controls bar */
.controls-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.6rem 1.2rem;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  color: white;
  background: var(--accent);
}
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn.playing { background: var(--danger); }
.btn.playing:hover { background: #ef4444; }
.btn-sm {
  padding: 0.4rem 0.8rem;
  font-size: 0.8rem;
}
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.btn-outline:hover { background: var(--bg-elevated); color: var(--text); border-color: var(--text-dim); }
.btn-success { background: var(--success); color: #0f172a; }
.btn-success:hover { background: #2dd4a0; }
.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(248,113,113,0.15); }

/* Master volume */
.master-vol {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.master-vol input[type=range] { width: 100px; }

/* Timer */
.timer-group {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.timer-group select, .timer-group input[type=number] {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 0.4rem 0.6rem;
  font-size: 0.85rem;
  outline: none;
}
.timer-group input[type=number] { width: 60px; }
.timer-group select:focus, .timer-group input[type=number]:focus { border-color: var(--accent); }
.timer-display {
  font-size: 0.85rem;
  color: var(--warning);
  font-variant-numeric: tabular-nums;
  min-width: 50px;
}

/* Visualizer */
.visualizer-wrap {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 0.75rem;
  margin-bottom: 1.5rem;
  border: 1px solid var(--border);
}
canvas#visualizer {
  width: 100%;
  height: 80px;
  display: block;
  border-radius: var(--radius-sm);
}

/* Sound cards grid */
.sounds-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.sound-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.sound-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-accent, var(--accent));
  opacity: 0;
  transition: var(--transition);
}
.sound-card.active::before { opacity: 1; }
.sound-card.active { border-color: var(--card-accent, var(--accent)); }

.sound-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.8rem;
}
.sound-card-title {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.sound-icon {
  font-size: 1.4rem;
  width: 2rem;
  text-align: center;
}
.sound-name {
  font-weight: 600;
  font-size: 0.95rem;
}
.sound-toggle {
  width: 40px;
  height: 22px;
  border-radius: 11px;
  background: var(--bg-elevated);
  border: none;
  cursor: pointer;
  position: relative;
  transition: var(--transition);
}
.sound-toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: var(--transition);
}
.sound-toggle.on { background: var(--card-accent, var(--accent)); }
.sound-toggle.on::after { left: 21px; background: white; }

.sound-slider-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.sound-slider-row input[type=range] {
  flex: 1;
}
.sound-vol-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  min-width: 28px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Range styling */
input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  background: var(--bg-elevated);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  cursor: pointer;
  transition: var(--transition);
}
input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  background: var(--accent-hover);
}
input[type=range]::-moz-range-thumb {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  cursor: pointer;
}

/* Presets section */
.presets-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem;
  margin-bottom: 1.5rem;
}
.presets-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.8rem;
}
.presets-header h2 {
  font-size: 1rem;
  font-weight: 700;
}
.preset-save-row {
  display: flex;
  gap: 0.5rem;
}
.preset-save-row input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 0.4rem 0.6rem;
  font-size: 0.85rem;
  outline: none;
}
.preset-save-row input:focus { border-color: var(--accent); }

.presets-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 0.6rem;
}
.preset-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.35rem 0.7rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-muted);
}
.preset-chip:hover { border-color: var(--accent); color: var(--text); }
.preset-chip .preset-del {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  border-radius: 50%;
  font-size: 0.65rem;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  transition: var(--transition);
}
.preset-chip .preset-del:hover { background: var(--danger); color: white; }

/* Built-in presets */
.builtin-presets {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.6rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--border);
}
.builtin-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.35rem 0.7rem;
  background: rgba(129,140,248,0.1);
  border: 1px solid rgba(129,140,248,0.3);
  border-radius: 20px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
  color: var(--accent);
}
.builtin-chip:hover { background: rgba(129,140,248,0.2); border-color: var(--accent); }

/* Footer */
.footer {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--text-dim);
  font-size: 0.8rem;
}
.footer a {
  color: var(--accent);
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
.coffee-link {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  margin-top: 0.5rem;
  padding: 0.4rem 0.8rem;
  background: #FFDD00;
  color: #000;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.85rem;
  text-decoration: none !important;
  transition: var(--transition);
}
.coffee-link:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,221,0,0.3); }

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 1.5rem; }
  .sounds-grid { grid-template-columns: 1fr; }
  .controls-bar { gap: 0.6rem; }
  .master-vol input[type=range] { width: 80px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Ambient Noise Generator</h1>
  <p>Mix ambient sounds to help you focus, relax, or sleep. All generated in your browser.</p>
</div>

<div class="container">

  <!-- Controls -->
  <div class="controls-bar">
    <button class="btn" id="playBtn" onclick="togglePlay()">
      <span id="playIcon">&#9654;</span>
      <span id="playLabel">Play</span>
    </button>

    <div class="master-vol">
      <span>🔊</span>
      <input type="range" id="masterVol" min="0" max="100" value="80" oninput="setMasterVolume(this.value)">
      <span id="masterVolLabel">80%</span>
    </div>

    <div class="timer-group">
      <span style="font-size:0.85rem;color:var(--text-muted)">Timer:</span>
      <select id="timerSelect" onchange="handleTimerSelect(this.value)">
        <option value="0">Off</option>
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="60">60 min</option>
        <option value="90">90 min</option>
        <option value="custom">Custom</option>
      </select>
      <input type="number" id="customTimer" min="1" max="999" placeholder="min" style="display:none" onchange="setCustomTimer(this.value)">
      <span class="timer-display" id="timerDisplay"></span>
    </div>
  </div>

  <!-- Visualizer -->
  <div class="visualizer-wrap">
    <canvas id="visualizer"></canvas>
  </div>

  <!-- Sound Cards -->
  <div class="sounds-grid" id="soundsGrid"></div>

  <!-- Presets -->
  <div class="presets-section">
    <div class="presets-header">
      <h2>Presets</h2>
      <div class="preset-save-row">
        <input type="text" id="presetName" placeholder="Preset name..." maxlength="30">
        <button class="btn btn-sm btn-success" onclick="savePreset()">Save</button>
      </div>
    </div>
    <div class="builtin-presets" id="builtinPresets"></div>
    <div class="presets-list" id="presetsList"></div>
  </div>

</div>

<div class="footer">
  <p>All sounds generated locally using the Web Audio API. No data is sent anywhere.</p>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener" class="coffee-link">
    ☕ Buy Me a Coffee
  </a>
</div>

<script>
// === Audio Engine ===
let audioCtx = null;
let masterGain = null;
let analyser = null;
let isPlaying = false;
let timerInterval = null;
let timerRemaining = 0;
let animFrame = null;

const SOUNDS = [
  { id: 'white',    name: 'White Noise',  icon: '⚪', color: '#94a3b8' },
  { id: 'pink',     name: 'Pink Noise',   icon: '🩷', color: '#f472b6' },
  { id: 'brown',    name: 'Brown Noise',  icon: '🟤', color: '#a78bfa' },
  { id: 'rain',     name: 'Rain',         icon: '🌧️', color: '#60a5fa' },
  { id: 'ocean',    name: 'Ocean Waves',  icon: '🌊', color: '#22d3ee' },
  { id: 'wind',     name: 'Wind',         icon: '💨', color: '#34d399' },
  { id: 'fire',     name: 'Campfire',     icon: '🔥', color: '#fb923c' },
];

const BUILTIN_PRESETS = [
  { name: 'Deep Focus',    mix: { brown: 60, rain: 30 } },
  { name: 'Rainy Day',     mix: { rain: 70, wind: 25 } },
  { name: 'Ocean Breeze',  mix: { ocean: 65, wind: 20 } },
  { name: 'Cozy Cabin',    mix: { fire: 60, rain: 35, wind: 15 } },
  { name: 'White Out',     mix: { white: 70 } },
  { name: 'Sleep',         mix: { brown: 50, ocean: 30, rain: 20 } },
];

// Per-sound state
const soundState = {};
SOUNDS.forEach(s => {
  soundState[s.id] = { volume: 50, active: false, nodes: null };
});

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.8;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// --- Noise buffer generators ---
function createNoiseBuffer(type) {
  const sr = audioCtx.sampleRate;
  const len = sr * 2;
  const buf = audioCtx.createBuffer(1, len, sr);
  const data = buf.getChannelData(0);

  if (type === 'white') {
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  } else if (type === 'brown') {
    let last = 0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      last = (last + 0.02 * w) / 1.02;
      data[i] = last * 3.5;
    }
  }
  return buf;
}

// --- Sound creators ---
function createNoiseSource(type) {
  const buf = createNoiseBuffer(type);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  src.connect(gain);
  gain.connect(masterGain);
  src.start();
  return { sources: [src], gain };
}

function createRain() {
  // Base: filtered noise
  const buf = createNoiseBuffer('white');
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 1000;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 8000;
  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  src.connect(hp);
  hp.connect(lp);
  lp.connect(gain);
  gain.connect(masterGain);
  src.start();

  // Droplets
  const sources = [src];
  let dropletInterval = setInterval(() => {
    if (!isPlaying) return;
    const numDrops = Math.floor(Math.random() * 3) + 1;
    for (let d = 0; d < numDrops; d++) {
      setTimeout(() => {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const dGain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 2000 + Math.random() * 4000;
        dGain.gain.setValueAtTime(0.02 * gain.gain.value, audioCtx.currentTime);
        dGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05 + Math.random() * 0.05);
        osc.connect(dGain);
        dGain.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }, Math.random() * 200);
    }
  }, 80);

  return { sources, gain, intervals: [dropletInterval] };
}

function createOcean() {
  const buf = createNoiseBuffer('brown');
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'lowpass';
  bp.frequency.value = 500;
  bp.Q.value = 1;

  // LFO for wave modulation
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 0.08 + Math.random() * 0.04;
  lfoGain.gain.value = 300;
  lfo.connect(lfoGain);
  lfoGain.connect(bp.frequency);
  lfo.start();

  // Second LFO for amplitude
  const lfo2 = audioCtx.createOscillator();
  const lfo2Gain = audioCtx.createGain();
  lfo2.type = 'sine';
  lfo2.frequency.value = 0.06;
  lfo2Gain.gain.value = 0.3;

  const gain = audioCtx.createGain();
  gain.gain.value = 0;

  src.connect(bp);
  bp.connect(gain);
  lfo2.connect(lfo2Gain);
  lfo2Gain.connect(gain.gain);
  lfo2.start();

  gain.connect(masterGain);
  src.start();

  return { sources: [src, lfo, lfo2], gain };
}

function createWind() {
  const buf = createNoiseBuffer('white');
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 600;
  bp.Q.value = 0.5;

  // Slow modulation
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 0.15 + Math.random() * 0.1;
  lfoGain.gain.value = 400;
  lfo.connect(lfoGain);
  lfoGain.connect(bp.frequency);
  lfo.start();

  // Amplitude modulation for gusts
  const lfo2 = audioCtx.createOscillator();
  const lfo2Gain = audioCtx.createGain();
  lfo2.type = 'sine';
  lfo2.frequency.value = 0.1;
  lfo2Gain.gain.value = 0.25;

  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  src.connect(bp);
  bp.connect(gain);
  lfo2.connect(lfo2Gain);
  lfo2Gain.connect(gain.gain);
  lfo2.start();

  gain.connect(masterGain);
  src.start();

  return { sources: [src, lfo, lfo2], gain };
}

function createFire() {
  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  gain.connect(masterGain);

  const sources = [];
  // Base crackle: filtered noise bursts
  const buf = createNoiseBuffer('white');
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1500;
  bp.Q.value = 2;
  const baseGain = audioCtx.createGain();
  baseGain.gain.value = 0.3;
  src.connect(bp);
  bp.connect(baseGain);
  baseGain.connect(gain);
  src.start();
  sources.push(src);

  // Random crackle pops
  const cracklePop = setInterval(() => {
    if (!isPlaying || !audioCtx) return;
    const pops = Math.floor(Math.random() * 4) + 1;
    for (let p = 0; p < pops; p++) {
      setTimeout(() => {
        if (!audioCtx) return;
        const popBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
        const popData = popBuf.getChannelData(0);
        for (let i = 0; i < popData.length; i++) {
          popData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (popData.length * 0.2));
        }
        const popSrc = audioCtx.createBufferSource();
        popSrc.buffer = popBuf;
        const popFilter = audioCtx.createBiquadFilter();
        popFilter.type = 'bandpass';
        popFilter.frequency.value = 800 + Math.random() * 3000;
        popFilter.Q.value = 1 + Math.random() * 3;
        const popGain = audioCtx.createGain();
        popGain.gain.setValueAtTime(0.4 + Math.random() * 0.4, audioCtx.currentTime);
        popGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02 + Math.random() * 0.03);
        popSrc.connect(popFilter);
        popFilter.connect(popGain);
        popGain.connect(gain);
        popSrc.start();
        popSrc.stop(audioCtx.currentTime + 0.06);
      }, Math.random() * 150);
    }
  }, 60);

  return { sources, gain, intervals: [cracklePop] };
}

function createSound(id) {
  switch(id) {
    case 'white': return createNoiseSource('white');
    case 'pink': return createNoiseSource('pink');
    case 'brown': return createNoiseSource('brown');
    case 'rain': return createRain();
    case 'ocean': return createOcean();
    case 'wind': return createWind();
    case 'fire': return createFire();
  }
}

function startSound(id) {
  const s = soundState[id];
  if (s.nodes) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  s.nodes = createSound(id);
  s.nodes.gain.gain.setTargetAtTime(s.volume / 100, audioCtx.currentTime, 0.05);
  s.active = true;
  updateCardUI(id);
}

function stopSound(id) {
  const s = soundState[id];
  if (!s.nodes) return;
  try {
    s.nodes.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
    setTimeout(() => {
      if (s.nodes) {
        s.nodes.sources.forEach(src => { try { src.stop(); } catch(e){} });
        if (s.nodes.intervals) s.nodes.intervals.forEach(iv => clearInterval(iv));
        s.nodes = null;
      }
    }, 200);
  } catch(e) { s.nodes = null; }
  s.active = false;
  updateCardUI(id);
}

function setSoundVolume(id, vol) {
  soundState[id].volume = vol;
  if (soundState[id].nodes) {
    soundState[id].nodes.gain.gain.setTargetAtTime(vol / 100, audioCtx.currentTime, 0.03);
  }
  const label = document.querySelector(`#vol-label-${id}`);
  if (label) label.textContent = vol + '%';
}

function setMasterVolume(val) {
  if (masterGain) masterGain.gain.setTargetAtTime(val / 100, audioCtx.currentTime, 0.03);
  document.getElementById('masterVolLabel').textContent = val + '%';
}

function toggleSound(id) {
  if (soundState[id].active) {
    stopSound(id);
  } else {
    startSound(id);
    if (!isPlaying) {
      isPlaying = true;
      updatePlayBtn();
      startVisualizer();
    }
  }
  checkIfAnySoundActive();
}

function togglePlay() {
  if (isPlaying) {
    // Stop all
    SOUNDS.forEach(s => stopSound(s.id));
    isPlaying = false;
    clearTimer();
    updatePlayBtn();
    stopVisualizer();
  } else {
    // Start all active sounds (or default to brown noise if none)
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const anyActive = SOUNDS.some(s => soundState[s.id].volume > 0 && soundState[s.id].active);
    if (!anyActive) {
      // Resume previous active sounds or start brown noise
      const hadActive = SOUNDS.filter(s => soundState[s.id].active);
      if (hadActive.length === 0) {
        soundState['brown'].volume = 50;
        soundState['brown'].active = true;
        document.querySelector(`#slider-brown`).value = 50;
        document.querySelector(`#vol-label-brown`).textContent = '50%';
      }
    }
    SOUNDS.forEach(s => {
      if (soundState[s.id].active) startSound(s.id);
    });
    isPlaying = true;
    updatePlayBtn();
    startVisualizer();
    startTimerIfSet();
  }
}

function checkIfAnySoundActive() {
  const any = SOUNDS.some(s => soundState[s.id].active);
  if (!any && isPlaying) {
    isPlaying = false;
    clearTimer();
    updatePlayBtn();
    stopVisualizer();
  }
}

function updatePlayBtn() {
  const btn = document.getElementById('playBtn');
  const icon = document.getElementById('playIcon');
  const label = document.getElementById('playLabel');
  if (isPlaying) {
    btn.classList.add('playing');
    icon.innerHTML = '&#10074;&#10074;';
    label.textContent = 'Stop';
  } else {
    btn.classList.remove('playing');
    icon.innerHTML = '&#9654;';
    label.textContent = 'Play';
  }
}

function updateCardUI(id) {
  const card = document.querySelector(`#card-${id}`);
  const toggle = document.querySelector(`#toggle-${id}`);
  if (soundState[id].active) {
    card.classList.add('active');
    toggle.classList.add('on');
  } else {
    card.classList.remove('active');
    toggle.classList.remove('on');
  }
}

// === Timer ===
function handleTimerSelect(val) {
  const custom = document.getElementById('customTimer');
  if (val === 'custom') {
    custom.style.display = '';
    custom.focus();
  } else {
    custom.style.display = 'none';
    if (val === '0') {
      clearTimer();
    } else if (isPlaying) {
      startCountdown(parseInt(val) * 60);
    }
  }
}

function setCustomTimer(val) {
  const mins = parseInt(val);
  if (mins > 0 && isPlaying) {
    startCountdown(mins * 60);
  }
}

function startTimerIfSet() {
  const sel = document.getElementById('timerSelect');
  const val = sel.value;
  if (val === '0') return;
  if (val === 'custom') {
    const cv = parseInt(document.getElementById('customTimer').value);
    if (cv > 0) startCountdown(cv * 60);
  } else {
    startCountdown(parseInt(val) * 60);
  }
}

function startCountdown(secs) {
  clearTimer();
  timerRemaining = secs;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerRemaining--;
    if (timerRemaining <= 0) {
      // Fade out and stop
      if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 1);
      setTimeout(() => {
        SOUNDS.forEach(s => stopSound(s.id));
        isPlaying = false;
        updatePlayBtn();
        stopVisualizer();
        if (masterGain) {
          const vol = parseInt(document.getElementById('masterVol').value);
          masterGain.gain.value = vol / 100;
        }
      }, 2000);
      clearTimer();
    } else {
      updateTimerDisplay();
    }
  }, 1000);
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerRemaining = 0;
  document.getElementById('timerDisplay').textContent = '';
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

// === Visualizer ===
function startVisualizer() {
  if (animFrame) return;
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');

  function draw() {
    if (!analyser) { animFrame = null; return; }
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    canvas.width = w * (window.devicePixelRatio || 1);
    canvas.height = h * (window.devicePixelRatio || 1);
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);

    const bufLen = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0, 0, w, h);

    const barW = (w / bufLen) * 2.5;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const barH = (dataArray[i] / 255) * h;
      const hue = (i / bufLen) * 60 + 230;
      ctx.fillStyle = `hsla(${hue}, 70%, 65%, 0.8)`;
      ctx.fillRect(x, h - barH, barW - 1, barH);
      x += barW;
      if (x > w) break;
    }

    animFrame = requestAnimationFrame(draw);
  }
  draw();
}

function stopVisualizer() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
  canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// === Presets ===
function getPresets() {
  try { return JSON.parse(localStorage.getItem('noisegen_presets') || '[]'); } catch { return []; }
}
function setPresets(list) {
  localStorage.setItem('noisegen_presets', JSON.stringify(list));
}

function savePreset() {
  const name = document.getElementById('presetName').value.trim();
  if (!name) return;
  const mix = {};
  SOUNDS.forEach(s => {
    if (soundState[s.id].active || soundState[s.id].volume > 0) {
      mix[s.id] = soundState[s.id].volume;
    }
  });
  // Also store which are active
  const active = {};
  SOUNDS.forEach(s => { active[s.id] = soundState[s.id].active; });

  const presets = getPresets();
  presets.push({ name, mix, active });
  setPresets(presets);
  document.getElementById('presetName').value = '';
  renderPresets();
}

function loadPreset(mix, active) {
  // Stop all first
  SOUNDS.forEach(s => stopSound(s.id));
  isPlaying = false;

  // Apply mix
  SOUNDS.forEach(s => {
    const vol = mix[s.id] || 0;
    const isActive = active ? active[s.id] : vol > 0;
    soundState[s.id].volume = vol;
    soundState[s.id].active = isActive;
    document.querySelector(`#slider-${s.id}`).value = vol;
    document.querySelector(`#vol-label-${s.id}`).textContent = vol + '%';
    updateCardUI(s.id);
  });

  // Start active sounds
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  SOUNDS.forEach(s => {
    if (soundState[s.id].active) startSound(s.id);
  });
  const any = SOUNDS.some(s => soundState[s.id].active);
  if (any) {
    isPlaying = true;
    updatePlayBtn();
    startVisualizer();
    startTimerIfSet();
  }
}

function deletePreset(idx) {
  const presets = getPresets();
  presets.splice(idx, 1);
  setPresets(presets);
  renderPresets();
}

function renderPresets() {
  // Built-in
  const builtinEl = document.getElementById('builtinPresets');
  builtinEl.innerHTML = BUILTIN_PRESETS.map((p, i) =>
    `<button class="builtin-chip" onclick="loadPreset(BUILTIN_PRESETS[${i}].mix)">${p.name}</button>`
  ).join('');

  // User presets
  const listEl = document.getElementById('presetsList');
  const presets = getPresets();
  if (presets.length === 0) {
    listEl.innerHTML = '<span style="font-size:0.8rem;color:var(--text-dim)">No saved presets yet. Mix sounds and save your favorite combo!</span>';
  } else {
    listEl.innerHTML = presets.map((p, i) =>
      `<span class="preset-chip" onclick="loadPreset(getPresets()[${i}].mix, getPresets()[${i}].active)">
        ${escHtml(p.name)}
        <button class="preset-del" onclick="event.stopPropagation();deletePreset(${i})" title="Delete">&times;</button>
      </span>`
    ).join('');
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// === Build UI ===
function buildCards() {
  const grid = document.getElementById('soundsGrid');
  grid.innerHTML = SOUNDS.map(s => `
    <div class="sound-card" id="card-${s.id}" style="--card-accent:${s.color}">
      <div class="sound-card-header">
        <div class="sound-card-title">
          <span class="sound-icon">${s.icon}</span>
          <span class="sound-name">${s.name}</span>
        </div>
        <button class="sound-toggle" id="toggle-${s.id}" onclick="toggleSound('${s.id}')"></button>
      </div>
      <div class="sound-slider-row">
        <input type="range" id="slider-${s.id}" min="0" max="100" value="${soundState[s.id].volume}"
               oninput="setSoundVolume('${s.id}', parseInt(this.value))">
        <span class="sound-vol-label" id="vol-label-${s.id}">${soundState[s.id].volume}%</span>
      </div>
    </div>
  `).join('');
}

// Init
buildCards();
renderPresets();
</script>
