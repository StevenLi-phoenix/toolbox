<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Pattern Generator — Free Seamless Background Patterns</title>
    <meta name="description" content="Generate seamless, tileable SVG background patterns for your website. Choose from dots, lines, grids, waves, zigzag, diamonds, and more. Export as SVG or CSS.">
    <meta name="keywords" content="SVG pattern generator, seamless pattern, CSS background, tileable pattern, web design, background generator">
    <meta property="og:title" content="SVG Pattern Generator — Free Seamless Background Patterns">
    <meta property="og:description" content="Generate beautiful seamless SVG background patterns for your website. Export as SVG or CSS code.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/svgpattern.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="SVG Pattern Generator">
    <meta name="twitter:description" content="Generate seamless SVG background patterns. Export as SVG or CSS.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/svgpattern.html">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
        header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 20px;text-align:center}
        header h1{font-size:1.4rem;color:#f0f6fc}
        header p{font-size:.85rem;color:#8b949e;margin-top:4px}
        .container{flex:1;display:flex;gap:0;overflow:hidden}
        .controls{width:320px;min-width:320px;background:#161b22;border-right:1px solid #30363d;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
        .preview-area{flex:1;display:flex;flex-direction:column;min-width:0}
        .preview-wrap{flex:1;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
        .preview-wrap svg{width:100%;height:100%;position:absolute;inset:0}
        .output-area{border-top:1px solid #30363d;background:#0d1117}
        .tabs{display:flex;border-bottom:1px solid #30363d}
        .tab{padding:8px 16px;font-size:.8rem;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
        .tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
        .code-out{padding:12px;max-height:160px;overflow:auto;font-family:'SF Mono',Consolas,monospace;font-size:.78rem;line-height:1.5;white-space:pre-wrap;word-break:break-all;color:#c9d1d9;background:#0d1117}
        label{font-size:.8rem;color:#8b949e;display:block;margin-bottom:4px}
        select,input[type=range],input[type=color],input[type=number]{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:6px 8px;font-size:.85rem}
        select{cursor:pointer;appearance:auto}
        input[type=range]{padding:0;height:6px;-webkit-appearance:none;appearance:none;border:none;border-radius:3px;cursor:pointer}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#58a6ff;cursor:pointer}
        input[type=color]{padding:2px;height:36px;cursor:pointer}
        input[type=number]{width:80px}
        .row{display:flex;gap:10px;align-items:flex-end}
        .row>div{flex:1}
        .field{display:flex;flex-direction:column}
        .val{font-size:.75rem;color:#58a6ff;float:right}
        .btn{padding:8px 14px;border:none;border-radius:6px;font-size:.8rem;cursor:pointer;font-family:inherit;font-weight:500;transition:background .15s}
        .btn-primary{background:#238636;color:#fff}.btn-primary:hover{background:#2ea043}
        .btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d}.btn-secondary:hover{background:#30363d}
        .btn-row{display:flex;gap:8px;flex-wrap:wrap}
        .pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
        .pattern-card{aspect-ratio:1;border:2px solid #30363d;border-radius:8px;cursor:pointer;overflow:hidden;transition:border-color .15s;position:relative}
        .pattern-card:hover,.pattern-card.active{border-color:#58a6ff}
        .pattern-card svg{width:100%;height:100%}
        .pattern-label{position:absolute;bottom:0;left:0;right:0;background:rgba(13,17,23,.85);font-size:.6rem;text-align:center;padding:2px;color:#8b949e}
        .coffee{text-align:center;padding:12px;border-top:1px solid #30363d;background:#161b22}
        .coffee a{color:#58a6ff;text-decoration:none;font-size:.8rem}
        .coffee a:hover{text-decoration:underline}
        .copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:8px;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s}
        .copied.show{opacity:1}
        @media(max-width:768px){
            .container{flex-direction:column}
            .controls{width:100%;min-width:0;max-height:50vh;border-right:none;border-bottom:1px solid #30363d}
            .pattern-grid{grid-template-columns:repeat(4,1fr)}
        }
    </style>
</head>
<body>
    <header>
        <h1>SVG Pattern Generator</h1>
        <p>Create seamless, tileable SVG background patterns — export as SVG or CSS</p>
    </header>
    <div class="container">
        <div class="controls">
            <div>
                <label>Pattern Type</label>
                <div class="pattern-grid" id="patternGrid"></div>
            </div>
            <div class="row">
                <div class="field">
                    <label>Foreground <span class="val" id="fgVal"></span></label>
                    <input type="color" id="fg" value="#58a6ff">
                </div>
                <div class="field">
                    <label>Background <span class="val" id="bgVal"></span></label>
                    <input type="color" id="bg" value="#0d1117">
                </div>
            </div>
            <div class="field">
                <label>Size <span class="val" id="sizeVal"></span></label>
                <input type="range" id="size" min="4" max="80" value="20">
            </div>
            <div class="field">
                <label>Stroke Width <span class="val" id="strokeVal"></span></label>
                <input type="range" id="stroke" min="0.5" max="10" step="0.5" value="1.5">
            </div>
            <div class="field">
                <label>Opacity <span class="val" id="opacityVal"></span></label>
                <input type="range" id="opacity" min="0.05" max="1" step="0.05" value="0.6">
            </div>
            <div class="field">
                <label>Rotation <span class="val" id="rotVal"></span></label>
                <input type="range" id="rotation" min="0" max="360" value="0">
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="copyCode()">Copy Code</button>
                <button class="btn btn-secondary" onclick="downloadSVG()">Download SVG</button>
                <button class="btn btn-secondary" onclick="randomize()">Randomize</button>
            </div>
        </div>
        <div class="preview-area">
            <div class="preview-wrap" id="previewWrap"></div>
            <div class="output-area">
                <div class="tabs">
                    <button class="tab active" data-tab="css" onclick="switchTab('css',this)">CSS</button>
                    <button class="tab" data-tab="svg" onclick="switchTab('svg',this)">SVG</button>
                    <button class="tab" data-tab="inline" onclick="switchTab('inline',this)">Inline CSS</button>
                </div>
                <div class="code-out" id="codeOut"></div>
            </div>
        </div>
    </div>
    <div class="coffee">
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
    </div>
    <div class="copied" id="toast">Copied!</div>

<script>
const PATTERNS = {
    dots: { name:'Dots', fn: (s,sw,o,fg)=>`<circle cx="${s/2}" cy="${s/2}" r="${sw}" fill="${fg}" fill-opacity="${o}"/>` },
    lines: { name:'Lines', fn: (s,sw,o,fg)=>`<line x1="0" y1="0" x2="0" y2="${s}" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>` },
    diagLines: { name:'Diag Lines', fn: (s,sw,o,fg)=>`<line x1="0" y1="${s}" x2="${s}" y2="0" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>` },
    grid: { name:'Grid', fn: (s,sw,o,fg)=>`<path d="M ${s} 0 L 0 0 0 ${s}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>` },
    diagGrid: { name:'Diag Grid', fn: (s,sw,o,fg)=>`<path d="M 0 ${s} l ${s} -${s} M -${s*.25} ${s*.25} l ${s*.5} -${s*.5} M ${s*.75} ${s*1.25} l ${s*.5} -${s*.5}" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}" fill="none"/>` },
    zigzag: { name:'Zigzag', fn: (s,sw,o,fg)=>{const h=s/2;return `<polyline points="0,${h} ${s/4},0 ${s/2},${h} ${s*3/4},0 ${s},${h}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>`}},
    waves: { name:'Waves', fn: (s,sw,o,fg)=>{const h=s/2;return `<path d="M0 ${h} Q${s/4} 0 ${s/2} ${h} Q${s*3/4} ${s} ${s} ${h}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>`}},
    diamonds: { name:'Diamonds', fn: (s,sw,o,fg)=>{const h=s/2;return `<polygon points="${h},0 ${s},${h} ${h},${s} 0,${h}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>`}},
    triangles: { name:'Triangles', fn: (s,sw,o,fg)=>`<polygon points="${s/2},0 ${s},${s} 0,${s}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>` },
    hexagons: { name:'Hexagons', fn: (s,sw,o,fg)=>{const w=s,h=s*0.866,r=s/2;return `<polygon points="${r},0 ${w},${h*0.25} ${w},${h*0.75} ${r},${h} 0,${h*0.75} 0,${h*0.25}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>`}},
    crosses: { name:'Crosses', fn: (s,sw,o,fg)=>{const c=s/2;return `<line x1="${c}" y1="0" x2="${c}" y2="${s}" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/><line x1="0" y1="${c}" x2="${s}" y2="${c}" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>`}},
    circles: { name:'Circles', fn: (s,sw,o,fg)=>`<circle cx="${s/2}" cy="${s/2}" r="${s*0.35}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>` },
    checkers: { name:'Checkers', fn: (s,sw,o,fg)=>{const h=s/2;return `<rect x="0" y="0" width="${h}" height="${h}" fill="${fg}" fill-opacity="${o}"/><rect x="${h}" y="${h}" width="${h}" height="${h}" fill="${fg}" fill-opacity="${o}"/>`}},
    bricks: { name:'Bricks', fn: (s,sw,o,fg)=>{const h=s/2;return `<rect x="0" y="0" width="${s}" height="${h}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/><line x1="${s/2}" y1="${h}" x2="${s/2}" y2="${s}" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/><line x1="0" y1="${s}" x2="${s}" y2="${s}" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>`}},
    stars: { name:'Stars', fn: (s,sw,o,fg)=>{const c=s/2,r=s*0.4,ri=s*0.16;let pts='';for(let i=0;i<5;i++){const aO=-Math.PI/2+i*2*Math.PI/5,aI=aO+Math.PI/5;pts+=`${c+r*Math.cos(aO)},${c+r*Math.sin(aO)} ${c+ri*Math.cos(aI)},${c+ri*Math.sin(aI)} `}return `<polygon points="${pts.trim()}" fill="${fg}" fill-opacity="${o}"/>`}},
    arcs: { name:'Arcs', fn: (s,sw,o,fg)=>`<path d="M0 0 A${s} ${s} 0 0 1 ${s} ${s}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>` },
    plus: { name:'Plus', fn: (s,sw,o,fg)=>{const t=s*0.15,c=s/2;return `<rect x="${c-t}" y="0" width="${t*2}" height="${s}" fill="${fg}" fill-opacity="${o}"/><rect x="0" y="${c-t}" width="${s}" height="${t*2}" fill="${fg}" fill-opacity="${o}"/>`}},
    scales: { name:'Scales', fn: (s,sw,o,fg)=>`<path d="M0 ${s} A${s/2} ${s/2} 0 0 1 ${s} ${s}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/><path d="M${s/2} ${s/2} A${s/2} ${s/2} 0 0 1 ${s*1.5} ${s/2}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/><path d="M${-s/2} ${s/2} A${s/2} ${s/2} 0 0 1 ${s/2} ${s/2}" fill="none" stroke="${fg}" stroke-width="${sw}" stroke-opacity="${o}"/>` },
};

let current = 'dots', activeTab = 'css';

const $=id=>document.getElementById(id);
const grid=$('patternGrid');

Object.keys(PATTERNS).forEach(k=>{
    const card=document.createElement('div');
    card.className='pattern-card'+(k==='dots'?' active':'');
    card.dataset.key=k;
    card.innerHTML=miniSVG(k)+`<div class="pattern-label">${PATTERNS[k].name}</div>`;
    card.onclick=()=>{document.querySelectorAll('.pattern-card').forEach(c=>c.classList.remove('active'));card.classList.add('active');current=k;render()};
    grid.appendChild(card);
});

function miniSVG(k){
    const s=10,fn=PATTERNS[k].fn;
    return `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><defs><pattern id="mini_${k}" x="0" y="0" width="${s}" height="${s}" patternUnits="userSpaceOnUse">${fn(s,1,0.6,'#58a6ff')}</pattern></defs><rect width="100%" height="100%" fill="#0d1117"/><rect width="100%" height="100%" fill="url(#mini_${k})"/></svg>`;
}

function getVals(){
    return {
        size: +$('size').value,
        stroke: +$('stroke').value,
        opacity: +$('opacity').value,
        rotation: +$('rotation').value,
        fg: $('fg').value,
        bg: $('bg').value
    };
}

function buildPatternSVG(v, forExport){
    const {size:s,stroke:sw,opacity:o,rotation:rot,fg,bg}=v;
    const inner=PATTERNS[current].fn(s,sw,o,fg);
    const rotAttr=rot?` patternTransform="rotate(${rot})"`:'';
    const pid=forExport?'p':'liveP';
    return `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><defs><pattern id="${pid}" x="0" y="0" width="${s}" height="${s}" patternUnits="userSpaceOnUse"${rotAttr}>${inner}</pattern></defs><rect width="100%" height="100%" fill="${bg}"/><rect width="100%" height="100%" fill="url(#${pid})"/></svg>`;
}

function buildTileSVG(v){
    const {size:s,stroke:sw,opacity:o,rotation:rot,fg,bg}=v;
    const inner=PATTERNS[current].fn(s,sw,o,fg);
    const rotAttr=rot?` patternTransform="rotate(${rot})"`:'';
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${s*4}" height="${s*4}"><defs><pattern id="p" x="0" y="0" width="${s}" height="${s}" patternUnits="userSpaceOnUse"${rotAttr}>${inner}</pattern></defs><rect width="100%" height="100%" fill="${bg}"/><rect width="100%" height="100%" fill="url(#p)"/></svg>`;
}

function toDataURI(svg){
    return 'url("data:image/svg+xml,'+encodeURIComponent(svg)+'")';
}

function render(){
    const v=getVals();
    $('sizeVal').textContent=v.size+'px';
    $('strokeVal').textContent=v.stroke;
    $('opacityVal').textContent=v.opacity;
    $('rotVal').textContent=v.rotation+'°';
    $('fgVal').textContent=v.fg;
    $('bgVal').textContent=v.bg;
    $('previewWrap').innerHTML=buildPatternSVG(v,false);
    updateCode(v);
}

function updateCode(v){
    const tile=buildTileSVG(v);
    if(activeTab==='svg'){
        $('codeOut').textContent=tile;
    } else if(activeTab==='css'){
        $('codeOut').textContent=`background-color: ${v.bg};\nbackground-image: ${toDataURI(tile)};\nbackground-size: ${v.size*4}px ${v.size*4}px;`;
    } else {
        const encoded=encodeURIComponent(tile);
        $('codeOut').textContent=`background: ${v.bg} url("data:image/svg+xml,${encoded}") repeat;\nbackground-size: ${v.size*4}px ${v.size*4}px;`;
    }
}

function switchTab(tab,el){
    activeTab=tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    render();
}

function copyCode(){
    navigator.clipboard.writeText($('codeOut').textContent);
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
}

function downloadSVG(){
    const v=getVals();
    const svg=buildTileSVG(v);
    const blob=new Blob([svg],{type:'image/svg+xml'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`pattern-${current}.svg`;
    a.click();
    URL.revokeObjectURL(a.href);
}

function randomize(){
    const keys=Object.keys(PATTERNS);
    current=keys[Math.floor(Math.random()*keys.length)];
    document.querySelectorAll('.pattern-card').forEach(c=>c.classList.toggle('active',c.dataset.key===current));
    $('fg').value='#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
    $('bg').value='#'+Math.floor(Math.random()*0x333333).toString(16).padStart(6,'0');
    $('size').value=Math.floor(Math.random()*60)+10;
    $('stroke').value=(Math.random()*4+0.5).toFixed(1);
    $('opacity').value=(Math.random()*0.8+0.2).toFixed(2);
    $('rotation').value=Math.floor(Math.random()*360);
    render();
}

['size','stroke','opacity','rotation','fg','bg'].forEach(id=>{
    $(id).addEventListener('input',render);
});

render();
</script>
</body>
</html>
