<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff Tool - Free Online Text Compare</title>
<meta name="description" content="Free online text diff tool. Compare two texts side by side with highlighted differences. No data sent to any server.">
<meta name="keywords" content="text diff, compare text, diff tool, text compare, online diff, free diff tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/diff.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--error:#ef4444;--add-bg:rgba(34,197,94,.15);--add-text:#4ade80;--del-bg:rgba(239,68,68,.15);--del-text:#f87171;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:1100px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.inputs{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:700px){.inputs{grid-template-columns:1fr}}
.input-col label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.4rem;font-weight:600}
textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:'Courier New',monospace;font-size:.9rem;line-height:1.5;min-height:180px;resize:vertical;transition:border-color .2s}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.stats{font-size:.85rem;color:var(--muted);margin-bottom:1rem}
.diff-view{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:auto;max-height:500px;font-family:'Courier New',monospace;font-size:.85rem;line-height:1.6}
.diff-line{padding:.15rem .75rem;white-space:pre-wrap;word-break:break-all;border-left:3px solid transparent}
.diff-line.add{background:var(--add-bg);border-left-color:var(--add-text);color:var(--add-text)}
.diff-line.del{background:var(--del-bg);border-left-color:var(--del-text);color:var(--del-text)}
.diff-line.ctx{color:var(--muted)}
.diff-line .ln{display:inline-block;width:40px;text-align:right;margin-right:12px;color:var(--muted);opacity:.6;user-select:none}
.diff-line.add .ln{color:var(--add-text);opacity:.5}
.diff-line.del .ln{color:var(--del-text);opacity:.5}
.inline-add{background:rgba(34,197,94,.3);border-radius:2px;padding:0 1px}
.inline-del{background:rgba(239,68,68,.3);border-radius:2px;padding:0 1px;text-decoration:line-through}
.empty{color:var(--muted);font-style:italic;padding:2rem;text-align:center}
.toggle-row{display:flex;gap:1.5rem;align-items:center;margin-bottom:1rem}
.toggle{display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.85rem;color:var(--muted)}
.toggle input{accent-color:var(--accent)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Text Diff Tool</h1>
<p class="subtitle">Compare two texts and see the differences highlighted</p>

<div class="card">
<h2>📝 Input</h2>
<div class="inputs">
<div class="input-col">
<label>Original Text</label>
<textarea id="textA" placeholder="Paste original text here..."></textarea>
</div>
<div class="input-col">
<label>Modified Text</label>
<textarea id="textB" placeholder="Paste modified text here..."></textarea>
</div>
</div>
<div class="btn-row">
<button class="btn-primary" onclick="compare()">Compare</button>
<button class="btn-secondary" onclick="swap()">⇄ Swap</button>
<button class="btn-secondary" onclick="clearAll()">Clear</button>
</div>
</div>

<div class="card" id="resultCard" style="display:none">
<h2>🔍 Differences</h2>
<div class="toggle-row">
<label class="toggle"><input type="checkbox" id="ignoreWs" onchange="compare()"><span>Ignore whitespace</span></label>
<label class="toggle"><input type="checkbox" id="ignoreCase" onchange="compare()"><span>Ignore case</span></label>
</div>
<div class="stats" id="stats"></div>
<div class="diff-view" id="diffView"></div>
<div class="btn-row">
<button class="btn-secondary" onclick="copyDiff()">📋 Copy Diff</button>
</div>
</div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Myers diff (line-level)
function diffLines(a,b){
  const N=a.length,M=b.length,MAX=N+M;
  if(MAX===0)return[];
  const V=new Int32Array(2*MAX+2);
  V.fill(-1);
  const off=MAX;
  V[off+1]=0;
  const trace=[];
  outer:
  for(let d=0;d<=MAX;d++){
    const snap=V.slice();
    trace.push(snap);
    for(let k=-d;k<=d;k+=2){
      let x;
      if(k===-d||k!==d&&V[off+k-1]<V[off+k+1]){x=V[off+k+1];}
      else{x=V[off+k-1]+1;}
      let y=x-k;
      while(x<N&&y<M&&a[x]===b[y]){x++;y++;}
      V[off+k]=x;
      if(x>=N&&y>=M) break outer;
    }
  }
  // backtrack
  const edits=[];
  let x=N,y=M;
  for(let d=trace.length-1;d>0;d--){
    const prev=trace[d-1];
    const k=x-y;
    let pk;
    if(k===-d||k!==d&&prev[off+k-1]<prev[off+k+1]){pk=k+1;}
    else{pk=k-1;}
    const px=prev[off+pk],py=px-pk;
    while(x>px&&y>py){x--;y--;edits.unshift({type:'ctx',a:x,b:y});}
    if(x>px){x--;edits.unshift({type:'del',a:x});}
    else if(y>py){y--;edits.unshift({type:'add',b:y});}
  }
  while(x>0&&y>0){x--;y--;edits.unshift({type:'ctx',a:x,b:y});}
  if(x>0) edits.unshift({type:'del',a:0});
  if(y>0) edits.unshift({type:'add',b:0});
  return edits;
}

function compare(){
  const ignWs=$('ignoreWs').checked;
  const ignCase=$('ignoreCase').checked;
  let rawA=$('textA').value,rawB=$('textB').value;
  const linesA=rawA.split('\n'),linesB=rawB.split('\n');
  const norm=s=>{
    let r=s;
    if(ignWs) r=r.replace(/\s+/g,' ').trim();
    if(ignCase) r=r.toLowerCase();
    return r;
  };
  const nA=linesA.map(norm),nB=linesB.map(norm);
  const edits=diffLines(nA,nB);

  let added=0,removed=0,unchanged=0;
  const html=[];
  for(const e of edits){
    if(e.type==='ctx'){
      unchanged++;
      html.push(`<div class="diff-line ctx"><span class="ln">${e.a+1}</span> ${esc(linesA[e.a])}</div>`);
    } else if(e.type==='del'){
      removed++;
      html.push(`<div class="diff-line del"><span class="ln">${e.a+1}</span>-${esc(linesA[e.a])}</div>`);
    } else {
      added++;
      html.push(`<div class="diff-line add"><span class="ln">${e.b+1}</span>+${esc(linesB[e.b])}</div>`);
    }
  }

  $('resultCard').style.display='block';
  $('stats').textContent=`${added} addition${added!==1?'s':''}, ${removed} deletion${removed!==1?'s':''}, ${unchanged} unchanged line${unchanged!==1?'s':''}`;

  if(!added&&!removed){
    $('diffView').innerHTML='<div class="empty">Texts are identical</div>';
  } else {
    $('diffView').innerHTML=html.join('');
  }
}

function swap(){
  const a=$('textA').value,b=$('textB').value;
  $('textA').value=b;$('textB').value=a;
  if($('resultCard').style.display!=='none') compare();
}

function clearAll(){
  $('textA').value='';$('textB').value='';
  $('resultCard').style.display='none';
}

function copyDiff(){
  const lines=[...$('diffView').querySelectorAll('.diff-line')].map(el=>{
    const prefix=el.classList.contains('add')?'+':el.classList.contains('del')?'-':' ';
    return prefix+el.textContent.replace(/^\d+/,'').trim();
  }).join('\n');
  navigator.clipboard.writeText(lines).then(()=>{
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}
</script>
</body>
</html>
