<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Neumorphism Generator — Free Soft UI CSS Tool</title>
    <meta name="description" content="Generate beautiful neumorphic (soft UI) CSS effects with live preview. Customize colors, shadows, radius, and intensity. Copy production-ready CSS instantly.">
    <meta name="keywords" content="neumorphism, soft UI, CSS generator, neumorphic design, shadow generator, UI design tool, CSS shadows, web design">
    <meta name="author" content="Steven Li">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/neumorphism.html">
    <meta property="og:title" content="CSS Neumorphism Generator — Free Soft UI Tool">
    <meta property="og:description" content="Create neumorphic CSS effects with live preview. Customize shadows, colors, radius, and more.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/neumorphism.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="CSS Neumorphism Generator">
    <meta name="twitter:description" content="Generate neumorphic soft UI CSS with live preview and instant code export.">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#2d2d3f;--surface:#353549;--text:#e0e0e8;--accent:#7c6cff;--muted:#8888a0;--border:#44445a}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .container{max-width:1100px;margin:0 auto;padding:20px}
        header{text-align:center;padding:30px 0 20px}
        header h1{font-size:1.8rem;margin-bottom:6px}
        header p{color:var(--muted);font-size:.95rem}
        .main{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:24px}
        .preview-area{display:flex;align-items:center;justify-content:center;min-height:380px;border-radius:16px;position:relative;transition:background .3s}
        .preview-box{width:200px;height:200px;border-radius:30px;display:flex;align-items:center;justify-content:center;transition:all .3s;cursor:pointer;position:relative}
        .preview-box.pressed{transform:scale(.97)}
        .preview-box span{font-size:.85rem;color:inherit;opacity:.6;pointer-events:none;text-align:center;line-height:1.4}
        .controls{display:flex;flex-direction:column;gap:16px}
        .control-group{background:var(--surface);border-radius:12px;padding:16px}
        .control-group h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:12px}
        .field{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px}
        .field:last-child{margin-bottom:0}
        .field label{font-size:.85rem;color:var(--muted);white-space:nowrap;min-width:80px}
        .field input[type=range]{flex:1;accent-color:var(--accent);height:6px}
        .field .val{font-size:.8rem;color:var(--text);min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
        .field input[type=color]{width:40px;height:30px;border:2px solid var(--border);border-radius:6px;background:none;cursor:pointer;padding:0}
        .field input[type=color]::-webkit-color-swatch-wrapper{padding:2px}
        .field input[type=color]::-webkit-color-swatch{border-radius:3px;border:none}
        .shape-btns{display:flex;gap:8px;flex-wrap:wrap}
        .shape-btns button{padding:6px 14px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .2s}
        .shape-btns button.active{border-color:var(--accent);background:rgba(124,108,255,.15);color:var(--accent)}
        .shape-btns button:hover{border-color:var(--accent)}
        .code-area{margin-top:24px;background:var(--surface);border-radius:12px;padding:16px;position:relative}
        .code-area h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:10px}
        .code-area pre{background:var(--bg);border-radius:8px;padding:14px;font-size:.82rem;line-height:1.6;overflow-x:auto;color:#c8c8d8;white-space:pre-wrap;word-break:break-all}
        .copy-btn{position:absolute;top:14px;right:14px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.78rem;transition:all .2s}
        .copy-btn:hover{opacity:.85}
        .copy-btn.copied{background:#4caf50}
        .presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
        .presets button{padding:6px 12px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:8px;cursor:pointer;font-size:.78rem;transition:all .2s}
        .presets button:hover{border-color:var(--accent);color:var(--accent)}
        .coffee{text-align:center;margin-top:32px;padding:16px 0}
        .coffee a{color:var(--accent);text-decoration:none;font-size:.9rem}
        .coffee a:hover{text-decoration:underline}
        footer{text-align:center;padding:16px 0;color:var(--muted);font-size:.78rem}
        @media(max-width:768px){
            .main{grid-template-columns:1fr}
            .preview-area{min-height:280px}
            header h1{font-size:1.4rem}
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>CSS Neumorphism Generator</h1>
        <p>Create soft UI effects with live preview &amp; instant CSS export</p>
    </header>

    <div class="main">
        <div>
            <div class="preview-area" id="previewArea">
                <div class="preview-box" id="previewBox" onmousedown="this.classList.add('pressed')" onmouseup="this.classList.remove('pressed')" onmouseleave="this.classList.remove('pressed')">
                    <span>Click to toggle<br>pressed state</span>
                </div>
            </div>
            <div class="control-group" style="margin-top:16px">
                <h3>Presets</h3>
                <div class="presets" id="presets"></div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <h3>Colors</h3>
                <div class="field">
                    <label>Background</label>
                    <input type="color" id="bgColor" value="#2d2d3f">
                    <span class="val" id="bgColorVal">#2d2d3f</span>
                </div>
            </div>

            <div class="control-group">
                <h3>Shadow</h3>
                <div class="field">
                    <label>Distance</label>
                    <input type="range" id="distance" min="1" max="50" value="12">
                    <span class="val" id="distanceVal">12px</span>
                </div>
                <div class="field">
                    <label>Intensity</label>
                    <input type="range" id="intensity" min="1" max="100" value="30">
                    <span class="val" id="intensityVal">30%</span>
                </div>
                <div class="field">
                    <label>Blur</label>
                    <input type="range" id="blur" min="0" max="80" value="24">
                    <span class="val" id="blurVal">24px</span>
                </div>
            </div>

            <div class="control-group">
                <h3>Shape</h3>
                <div class="field">
                    <label>Radius</label>
                    <input type="range" id="radius" min="0" max="100" value="30">
                    <span class="val" id="radiusVal">30px</span>
                </div>
                <div class="field">
                    <label>Size</label>
                    <input type="range" id="size" min="80" max="320" value="200">
                    <span class="val" id="sizeVal">200px</span>
                </div>
                <div class="field">
                    <label>Style</label>
                    <div class="shape-btns">
                        <button class="active" data-type="convex">Convex</button>
                        <button data-type="flat">Flat</button>
                        <button data-type="concave">Concave</button>
                        <button data-type="inset">Inset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="code-area">
        <h3>Generated CSS</h3>
        <button class="copy-btn" id="copyBtn" onclick="copyCSS()">Copy</button>
        <pre id="codeOutput"></pre>
    </div>

    <div class="coffee">
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
    </div>
    <footer>&copy; 2026 Steven Li &middot; <a href="https://stevenli-phoenix.github.io/toolbox/" style="color:var(--muted)">More Tools</a></footer>
</div>

<script>
const $ = id => document.getElementById(id);
let shapeType = 'convex';

const presets = [
    {name:'Midnight',bg:'#2d2d3f',dist:12,int:30,blur:24,rad:30,sz:200,shape:'convex'},
    {name:'Warm Grey',bg:'#3a3a3a',dist:10,int:25,blur:20,rad:20,sz:200,shape:'flat'},
    {name:'Ocean',bg:'#1a3350',dist:14,int:35,blur:28,rad:40,sz:180,shape:'convex'},
    {name:'Dark Green',bg:'#1e3328',dist:10,int:28,blur:22,rad:24,sz:200,shape:'concave'},
    {name:'Soft Purple',bg:'#2e2440',dist:16,int:32,blur:30,rad:50,sz:200,shape:'convex'},
    {name:'Carbon',bg:'#1c1c1c',dist:8,int:40,blur:16,rad:12,sz:220,shape:'flat'},
    {name:'Button',bg:'#2d2d3f',dist:6,int:20,blur:12,rad:14,sz:120,shape:'convex'},
    {name:'Card',bg:'#2d2d3f',dist:18,int:25,blur:36,rad:20,sz:280,shape:'flat'},
];

function hexToHSL(hex){
    let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
    let max=Math.max(r,g,b),min=Math.min(r,g,b),h,s,l=(max+min)/2;
    if(max===min){h=s=0}else{
        let d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
        switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}
    }
    return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function hslToHex(h,s,l){
    s/=100;l/=100;
    const a=s*Math.min(l,1-l);
    const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};
    return`#${f(0)}${f(8)}${f(4)}`;
}

function getShadows(bg,dist,intensity,blur,type){
    const hsl=hexToHSL(bg);
    const darkL=Math.max(0,hsl.l-intensity*0.5);
    const lightL=Math.min(100,hsl.l+intensity*0.35);
    const dark=hslToHex(hsl.h,hsl.s,darkL);
    const light=hslToHex(hsl.h,Math.max(0,hsl.s-10),lightL);
    if(type==='inset'){
        return{
            shadow:`inset ${dist}px ${dist}px ${blur}px ${dark}, inset -${dist}px -${dist}px ${blur}px ${light}`,
            gradient:'none',dark,light
        };
    }
    let gradient='none';
    if(type==='convex'){
        const gTop=hslToHex(hsl.h,hsl.s,Math.min(100,hsl.l+8));
        const gBot=hslToHex(hsl.h,hsl.s,Math.max(0,hsl.l-5));
        gradient=`linear-gradient(145deg, ${gTop}, ${gBot})`;
    }else if(type==='concave'){
        const gTop=hslToHex(hsl.h,hsl.s,Math.max(0,hsl.l-5));
        const gBot=hslToHex(hsl.h,hsl.s,Math.min(100,hsl.l+8));
        gradient=`linear-gradient(145deg, ${gTop}, ${gBot})`;
    }
    return{
        shadow:`${dist}px ${dist}px ${blur}px ${dark}, -${dist}px -${dist}px ${blur}px ${light}`,
        gradient,dark,light
    };
}

function update(){
    const bg=$('bgColor').value;
    const dist=+$('distance').value;
    const intensity=+$('intensity').value;
    const blur=+$('blur').value;
    const rad=+$('radius').value;
    const sz=+$('size').value;

    $('bgColorVal').textContent=bg;
    $('distanceVal').textContent=dist+'px';
    $('intensityVal').textContent=intensity+'%';
    $('blurVal').textContent=blur+'px';
    $('radiusVal').textContent=rad+'px';
    $('sizeVal').textContent=sz+'px';

    const{shadow,gradient}=getShadows(bg,dist,intensity,blur,shapeType);

    const area=$('previewArea');
    const box=$('previewBox');
    area.style.background=bg;
    box.style.width=sz+'px';
    box.style.height=sz+'px';
    box.style.borderRadius=rad+'px';
    box.style.background=gradient!=='none'?gradient:bg;
    box.style.boxShadow=shadow;
    box.style.color=hexToHSL(bg).l>50?'#333':'#ccc';

    let css=`background: ${bg};\nborder-radius: ${rad}px;\nbox-shadow: ${shadow};`;
    if(gradient!=='none') css=`background: ${gradient};\n`+css.split('\n').slice(1).join('\n');
    $('codeOutput').textContent=css;
}

document.querySelectorAll('.shape-btns button').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.shape-btns button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        shapeType=btn.dataset.type;
        update();
    });
});

['bgColor','distance','intensity','blur','radius','size'].forEach(id=>{
    $(id).addEventListener('input',update);
});

function loadPreset(p){
    $('bgColor').value=p.bg;
    $('distance').value=p.dist;
    $('intensity').value=p.int;
    $('blur').value=p.blur;
    $('radius').value=p.rad;
    $('size').value=p.sz;
    shapeType=p.shape;
    document.querySelectorAll('.shape-btns button').forEach(b=>{
        b.classList.toggle('active',b.dataset.type===p.shape);
    });
    update();
}

const presetsEl=$('presets');
presets.forEach(p=>{
    const btn=document.createElement('button');
    btn.textContent=p.name;
    btn.onclick=()=>loadPreset(p);
    presetsEl.appendChild(btn);
});

function copyCSS(){
    navigator.clipboard.writeText($('codeOutput').textContent).then(()=>{
        const b=$('copyBtn');b.textContent='Copied!';b.classList.add('copied');
        setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied')},1500);
    });
}

update();
</script>
</body>
</html>
