<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Frequency Analyzer — Word, Character & N-gram Stats</title>
<meta name="description" content="Analyze text for word frequency, character distribution, bigrams, and trigrams. Visualize patterns with interactive bar charts. Free online tool for writers, SEO, and developers.">
<meta name="keywords" content="text frequency analyzer, word frequency counter, character frequency, bigram analyzer, trigram, n-gram, SEO text analysis, writing tool">
<meta property="og:title" content="Text Frequency Analyzer — Word, Character & N-gram Stats">
<meta property="og:description" content="Analyze word frequency, character distribution, bigrams, and trigrams with interactive visualizations. Free online tool.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/textfreq.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Text Frequency Analyzer">
<meta name="twitter:description" content="Word frequency, character stats, bigrams & trigrams with live bar charts.">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/textfreq.html">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh;display:flex;flex-direction:column}
header{text-align:center;padding:1.5rem 1rem .5rem}
h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#8b949e;font-size:.85rem;margin-top:.3rem}
.container{max-width:960px;width:100%;margin:0 auto;padding:0 1rem 2rem;flex:1}
textarea{width:100%;height:160px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e1e4e8;padding:.75rem;font-size:.9rem;resize:vertical;font-family:inherit;margin-bottom:.75rem}
textarea:focus{outline:none;border-color:#58a6ff}
.controls{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.controls button{padding:.45rem .9rem;border:1px solid #30363d;border-radius:6px;background:#21262d;color:#e1e4e8;cursor:pointer;font-size:.8rem;transition:background .15s}
.controls button:hover{background:#30363d}
.controls button.active{background:#58a6ff;color:#fff;border-color:#58a6ff}
.controls label{font-size:.8rem;color:#8b949e;display:flex;align-items:center;gap:.3rem}
.controls input[type=checkbox]{accent-color:#58a6ff}
.controls input[type=number]{width:50px;background:#161b22;border:1px solid #30363d;border-radius:4px;color:#e1e4e8;padding:.2rem .4rem;font-size:.8rem}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.5rem;margin-bottom:1rem}
.stat{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:.6rem .8rem;text-align:center}
.stat .val{font-size:1.3rem;font-weight:700;color:#58a6ff}
.stat .lbl{font-size:.7rem;color:#8b949e;margin-top:.15rem}
.tabs{display:flex;gap:0;margin-bottom:.75rem;border-bottom:1px solid #30363d}
.tabs button{padding:.5rem 1rem;border:none;background:none;color:#8b949e;cursor:pointer;font-size:.82rem;border-bottom:2px solid transparent;transition:all .15s}
.tabs button:hover{color:#e1e4e8}
.tabs button.active{color:#58a6ff;border-bottom-color:#58a6ff}
.panel{display:none}
.panel.active{display:block}
.freq-table{width:100%;border-collapse:collapse}
.freq-table th{text-align:left;padding:.4rem .6rem;font-size:.75rem;color:#8b949e;border-bottom:1px solid #30363d;position:sticky;top:0;background:#0f1117}
.freq-table td{padding:.35rem .6rem;font-size:.82rem;border-bottom:1px solid #1c2028}
.freq-table tr:hover{background:#161b22}
.bar-cell{position:relative}
.bar-bg{position:absolute;left:0;top:2px;bottom:2px;border-radius:3px;opacity:.25}
.bar-words .bar-bg{background:#58a6ff}
.bar-chars .bar-bg{background:#bc8cff}
.bar-ngrams .bar-bg{background:#3fb950}
.bar-val{position:relative;z-index:1}
.table-wrap{max-height:400px;overflow-y:auto;border:1px solid #30363d;border-radius:8px}
.table-wrap::-webkit-scrollbar{width:6px}
.table-wrap::-webkit-scrollbar-track{background:#161b22}
.table-wrap::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.empty-msg{text-align:center;color:#484f58;padding:2rem;font-size:.9rem}
footer{text-align:center;padding:1.2rem;border-top:1px solid #1c2028}
footer a{color:#58a6ff;text-decoration:none;font-size:.85rem}
footer a:hover{text-decoration:underline}
@media(max-width:600px){
h1{font-size:1.2rem}
.stats-bar{grid-template-columns:repeat(2,1fr)}
textarea{height:120px}
.tabs button{padding:.4rem .6rem;font-size:.75rem}
}
</style>
</head>
<body>
<header>
<h1>Text Frequency Analyzer</h1>
<p>Word, character & n-gram frequency analysis with live visualizations</p>
</header>
<div class="container">
<textarea id="input" placeholder="Paste or type text here to analyze..." spellcheck="false"></textarea>
<div class="controls">
<label><input type="checkbox" id="caseSensitive"> Case-sensitive</label>
<label><input type="checkbox" id="ignoreStop"> Ignore stop words</label>
<label>Top <input type="number" id="topN" value="30" min="5" max="500"> results</label>
<button id="clearBtn">Clear</button>
</div>
<div class="stats-bar" id="statsBar">
<div class="stat"><div class="val" id="sWords">0</div><div class="lbl">Words</div></div>
<div class="stat"><div class="val" id="sChars">0</div><div class="lbl">Characters</div></div>
<div class="stat"><div class="val" id="sUnique">0</div><div class="lbl">Unique Words</div></div>
<div class="stat"><div class="val" id="sSentences">0</div><div class="lbl">Sentences</div></div>
<div class="stat"><div class="val" id="sAvgLen">0</div><div class="lbl">Avg Word Len</div></div>
<div class="stat"><div class="val" id="sLexDiv">0</div><div class="lbl">Lexical Diversity</div></div>
</div>
<div class="tabs">
<button class="active" data-tab="words">Words</button>
<button data-tab="chars">Characters</button>
<button data-tab="bigrams">Bigrams</button>
<button data-tab="trigrams">Trigrams</button>
</div>
<div id="words" class="panel active"></div>
<div id="chars" class="panel"></div>
<div id="bigrams" class="panel"></div>
<div id="trigrams" class="panel"></div>
</div>
<footer>
<a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
</footer>
<script>
const STOP_WORDS=new Set(["a","an","the","and","or","but","in","on","at","to","for","of","with","by","from","is","it","its","as","was","were","be","been","being","have","has","had","do","does","did","will","would","shall","should","can","could","may","might","must","that","this","these","those","i","me","my","we","our","you","your","he","him","his","she","her","they","them","their","not","no","so","if","then","than","too","very","just","about","above","after","again","all","also","am","any","are","aren't","because","before","between","both","can't","did","didn't","don't","down","during","each","few","get","got","here","how","into","more","most","nor","now","off","only","other","out","over","own","same","some","such","there","through","under","until","up","what","when","where","which","while","who","whom","why","won't"]);
const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);
const input=$('#input'),caseSen=$('#caseSensitive'),ignoreStop=$('#ignoreStop'),topN=$('#topN'),clearBtn=$('#clearBtn');
let debounceTimer;
function analyze(){
const raw=input.value;
const cs=caseSen.checked;
const text=cs?raw:raw.toLowerCase();
const n=parseInt(topN.value)||30;
// Stats
const chars=raw.length;
const words=text.match(/[\w\u00C0-\u024F\u4e00-\u9fff]+/g)||[];
const sentences=raw.split(/[.!?。！？]+/).filter(s=>s.trim()).length;
const unique=new Set(words);
const avgLen=words.length?(words.reduce((a,w)=>a+w.length,0)/words.length).toFixed(1):'0';
const lexDiv=words.length?(unique.size/words.length).toFixed(3):'0';
$('#sWords').textContent=words.length.toLocaleString();
$('#sChars').textContent=chars.toLocaleString();
$('#sUnique').textContent=unique.size.toLocaleString();
$('#sSentences').textContent=sentences;
$('#sAvgLen').textContent=avgLen;
$('#sLexDiv').textContent=lexDiv;
// Word freq
const skip=ignoreStop.checked;
const wf={};
words.forEach(w=>{if(skip&&STOP_WORDS.has(w))return;wf[w]=(wf[w]||0)+1});
renderTable('words',wf,n,'bar-words','Word');
// Char freq
const cf={};
for(const c of text){if(c.trim()||c===' ')cf[c]=((cf[c]||0)+1)}
renderTable('chars',cf,n,'bar-chars','Char');
// Bigrams
const bf={};
for(let i=0;i<words.length-1;i++){
const w1=words[i],w2=words[i+1];
if(skip&&(STOP_WORDS.has(w1)||STOP_WORDS.has(w2)))continue;
const key=w1+' '+w2;bf[key]=(bf[key]||0)+1;
}
renderTable('bigrams',bf,n,'bar-ngrams','Bigram');
// Trigrams
const tf={};
for(let i=0;i<words.length-2;i++){
const w1=words[i],w2=words[i+1],w3=words[i+2];
if(skip&&(STOP_WORDS.has(w1)||STOP_WORDS.has(w2)||STOP_WORDS.has(w3)))continue;
const key=w1+' '+w2+' '+w3;tf[key]=(tf[key]||0)+1;
}
renderTable('trigrams',tf,n,'bar-ngrams','Trigram');
}
function renderTable(id,freq,n,barClass,label){
const el=$('#'+id);
const entries=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,n);
if(!entries.length){el.innerHTML='<div class="empty-msg">No data — type or paste text above</div>';return}
const max=entries[0][1];
const total=Object.values(freq).reduce((a,b)=>a+b,0);
let html='<div class="table-wrap"><table class="freq-table"><thead><tr><th>#</th><th>'+label+'</th><th>Count</th><th>%</th><th>Distribution</th></tr></thead><tbody>';
entries.forEach(([k,v],i)=>{
const pct=((v/total)*100).toFixed(1);
const barW=((v/max)*100).toFixed(1);
const display=k===' '?'⎵':k;
html+=`<tr><td>${i+1}</td><td><code>${esc(display)}</code></td><td>${v.toLocaleString()}</td><td>${pct}%</td><td class="bar-cell ${barClass}"><span class="bar-bg" style="width:${barW}%"></span><span class="bar-val">${pct}%</span></td></tr>`;
});
html+='</tbody></table></div>';
el.innerHTML=html;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
input.addEventListener('input',()=>{clearTimeout(debounceTimer);debounceTimer=setTimeout(analyze,200)});
caseSen.addEventListener('change',analyze);
ignoreStop.addEventListener('change',analyze);
topN.addEventListener('change',analyze);
clearBtn.addEventListener('click',()=>{input.value='';analyze()});
$$('.tabs button').forEach(btn=>{
btn.addEventListener('click',()=>{
$$('.tabs button').forEach(b=>b.classList.remove('active'));
$$('.panel').forEach(p=>p.classList.remove('active'));
btn.classList.add('active');
$('#'+btn.dataset.tab).classList.add('active');
});
});
analyze();
</script>
</body>
</html>
