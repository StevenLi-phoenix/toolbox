<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Path Editor | Free Online Tool</title>
<meta name="description" content="Free online SVG path editor. Draw, edit, and export SVG paths visually. Supports M, L, C, Q, Z commands with real-time path code preview. No signup required.">
<meta name="keywords" content="SVG path editor, SVG tool, path d attribute, bezier curve editor, SVG generator, free online tool">
<meta property="og:title" content="SVG Path Editor | Free Online Tool">
<meta property="og:description" content="Draw and edit SVG paths visually with real-time code preview. Supports moveto, lineto, cubic and quadratic bezier curves.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✏️</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--accent2:#3fb950;
  --red:#f85149;--orange:#d29922;--purple:#bc8cff;
  --radius:6px;--font:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);padding:6px 12px;border-radius:var(--radius);font-size:13px;transition:background .15s,border-color .15s}
button:hover{background:#30363d;border-color:#8b949e}
button.primary{background:#238636;border-color:#2ea043;color:#fff}
button.primary:hover{background:#2ea043}
button.danger{background:#da3633;border-color:#f85149;color:#fff}
button.danger:hover{background:#b62324}
button.active{background:var(--accent);border-color:var(--accent);color:#0d1117}
select,input[type="text"],textarea{font-family:var(--font);font-size:13px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;outline:none}
select:focus,input[type="text"]:focus,textarea:focus{border-color:var(--accent)}

#app{display:flex;flex-direction:column;height:100vh;width:100vw}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;flex-wrap:wrap}
header h1{font-size:15px;font-weight:600;white-space:nowrap}
header h1 span{color:var(--accent)}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.toolbar{display:flex;align-items:center;gap:6px;padding:6px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.toolbar .sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.tool-group{display:flex;gap:3px}
.tool-btn{padding:5px 10px;font-size:12px;font-weight:600;min-width:32px;text-align:center}
.tool-btn.active{background:var(--accent);border-color:var(--accent);color:#0d1117}
label.tool-label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}
label.tool-label input[type="checkbox"]{accent-color:var(--accent)}

.main{display:flex;flex:1;overflow:hidden}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#canvas{width:100%;height:100%;display:block}
.canvas-info{position:absolute;bottom:8px;left:8px;font-size:11px;color:var(--text2);font-family:var(--font);pointer-events:none;user-select:none}

.sidebar{width:340px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--bg2);overflow:hidden}
.sidebar-header{padding:10px 12px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.path-code-wrap{flex:1;overflow:auto;padding:0}
#pathCode{width:100%;height:100%;resize:none;border:none;border-radius:0;background:var(--bg);color:var(--accent2);font-size:13px;line-height:1.6;padding:12px}
.sidebar-actions{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.sidebar-footer{padding:8px 12px;border-top:1px solid var(--border);text-align:center;font-size:12px}
.sidebar-footer a{color:var(--orange);text-decoration:none}
.sidebar-footer a:hover{text-decoration:underline}

.point-list{max-height:200px;overflow-y:auto;border-top:1px solid var(--border);padding:8px 12px;font-size:12px;font-family:var(--font)}
.point-item{display:flex;align-items:center;gap:6px;padding:3px 0;color:var(--text2)}
.point-item .cmd{color:var(--purple);font-weight:600;min-width:14px}
.point-item .coords{color:var(--text)}
.point-item:hover{color:var(--text)}
.point-item .del-btn{margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px;opacity:.5}
.point-item .del-btn:hover{opacity:1}

.toast{position:fixed;top:16px;right:16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;font-size:13px;z-index:999;opacity:0;transform:translateY(-10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;width:90%;max-width:500px}
.modal h2{font-size:15px;margin-bottom:12px}
.modal textarea{width:100%;height:120px;margin-bottom:12px}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end}

@media(max-width:768px){
  .main{flex-direction:column}
  .sidebar{width:100%;height:40%;border-left:none;border-top:1px solid var(--border)}
  header h1{font-size:13px}
  .toolbar{padding:4px 8px}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>✏️ <span>SVG Path</span> Editor</h1>
    <div class="header-actions">
      <button onclick="showImportModal()">Import</button>
      <button onclick="exportSVG()">Export SVG</button>
      <button class="danger" onclick="clearAll()">Clear</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="tool-group">
      <button class="tool-btn active" data-tool="M" title="Move To (M)">M</button>
      <button class="tool-btn" data-tool="L" title="Line To (L)">L</button>
      <button class="tool-btn" data-tool="Q" title="Quadratic Bézier (Q)">Q</button>
      <button class="tool-btn" data-tool="C" title="Cubic Bézier (C)">C</button>
      <button class="tool-btn" data-tool="Z" title="Close Path (Z)">Z</button>
    </div>
    <div class="sep"></div>
    <button class="tool-btn" onclick="undo()" title="Undo">↩</button>
    <button class="tool-btn" onclick="redo()" title="Redo">↪</button>
    <div class="sep"></div>
    <label class="tool-label"><input type="checkbox" id="snapGrid" checked> Grid</label>
    <label class="tool-label"><input type="checkbox" id="showPoints" checked> Points</label>
    <div class="sep"></div>
    <label class="tool-label">
      Stroke
      <input type="text" id="strokeColor" value="#58a6ff" style="width:70px;padding:3px 6px">
    </label>
    <label class="tool-label">
      Width
      <input type="text" id="strokeWidth" value="2" style="width:40px;padding:3px 6px">
    </label>
    <label class="tool-label"><input type="checkbox" id="fillPath"> Fill</label>
  </div>

  <div class="main">
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div class="canvas-info" id="canvasInfo">0, 0 | Zoom: 100%</div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        <span>Path Data</span>
        <button onclick="copyPath()" style="font-size:12px;padding:3px 8px">Copy</button>
      </div>
      <div class="path-code-wrap">
        <textarea id="pathCode" spellcheck="false" placeholder="Path data will appear here as you draw...&#10;&#10;Click on the canvas to add points.&#10;Use M, L, Q, C, Z tools from the toolbar."></textarea>
      </div>
      <div class="point-list" id="pointList"></div>
      <div class="sidebar-actions">
        <button onclick="applyPathCode()" class="primary" style="flex:1">Apply Code</button>
        <button onclick="prettifyPath()" style="flex:1">Prettify</button>
      </div>
      <div class="sidebar-footer">
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h2>Import SVG Path</h2>
    <textarea id="importInput" placeholder='Paste path d="" attribute or full SVG markup...'></textarea>
    <div class="modal-actions">
      <button onclick="closeImportModal()">Cancel</button>
      <button class="primary" onclick="doImport()">Import</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const pathCodeEl = document.getElementById('pathCode');
const pointListEl = document.getElementById('pointList');
const infoEl = document.getElementById('canvasInfo');

let commands = []; // [{type:'M',x,y}, {type:'L',x,y}, {type:'Q',cx,cy,x,y}, {type:'C',c1x,c1y,c2x,c2y,x,y}, {type:'Z'}]
let undoStack = [];
let redoStack = [];
let currentTool = 'M';
let tempPoints = []; // for multi-click tools (Q needs 1 control + 1 end, C needs 2 control + 1 end)

let panX = 0, panY = 0, zoom = 1;
let isPanning = false, panStartX, panStartY;
let dragTarget = null; // {cmdIndex, pointKey:'x,y'|'cx,cy'|'c1x,c1y'|'c2x,c2y'}
let hoveredPoint = null;
let mouseX = 0, mouseY = 0;

const GRID = 20;
const POINT_R = 5;
const CTRL_R = 4;

// ─── Canvas Setup ────────────────────────────────────────
function resizeCanvas() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  canvas.style.width = r.width + 'px';
  canvas.style.height = r.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 0);

// ─── Coordinate Helpers ──────────────────────────────────
function screenToWorld(sx, sy) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (sx - r.left - panX) / zoom,
    y: (sy - r.top - panY) / zoom
  };
}
function worldToScreen(wx, wy) {
  return { x: wx * zoom + panX, y: wy * zoom + panY };
}
function snap(v) {
  return document.getElementById('snapGrid').checked ? Math.round(v / GRID) * GRID : Math.round(v * 10) / 10;
}

// ─── Drawing ─────────────────────────────────────────────
function draw() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // Grid
  if (document.getElementById('snapGrid').checked) {
    ctx.save();
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 1;
    const gs = GRID * zoom;
    const offX = panX % gs;
    const offY = panY % gs;
    ctx.beginPath();
    for (let x = offX; x < w; x += gs) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
    for (let y = offY; y < h; y += gs) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
    ctx.stroke();

    // Origin axes
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(panX, 0); ctx.lineTo(panX, h);
    ctx.moveTo(0, panY); ctx.lineTo(w, panY);
    ctx.stroke();
    ctx.restore();
  }

  if (commands.length === 0 && tempPoints.length === 0) return;

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  // Draw the path
  const strokeColor = document.getElementById('strokeColor').value || '#58a6ff';
  const strokeWidth = parseFloat(document.getElementById('strokeWidth').value) || 2;
  const doFill = document.getElementById('fillPath').checked;

  ctx.beginPath();
  for (const cmd of commands) {
    switch (cmd.type) {
      case 'M': ctx.moveTo(cmd.x, cmd.y); break;
      case 'L': ctx.lineTo(cmd.x, cmd.y); break;
      case 'Q': ctx.quadraticCurveTo(cmd.cx, cmd.cy, cmd.x, cmd.y); break;
      case 'C': ctx.bezierCurveTo(cmd.c1x, cmd.c1y, cmd.c2x, cmd.c2y, cmd.x, cmd.y); break;
      case 'Z': ctx.closePath(); break;
    }
  }

  if (doFill) {
    ctx.fillStyle = strokeColor + '33';
    ctx.fill();
  }
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = strokeWidth / zoom;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Preview line for temp points
  if (tempPoints.length > 0 || (currentTool === 'L' && commands.length > 0)) {
    const wp = screenToWorld(mouseX, mouseY);
    const lastEnd = getLastEndpoint();
    if (lastEnd && currentTool === 'L') {
      ctx.beginPath();
      ctx.moveTo(lastEnd.x, lastEnd.y);
      ctx.lineTo(snap(wp.x), snap(wp.y));
      ctx.strokeStyle = strokeColor + '66';
      ctx.lineWidth = strokeWidth / zoom;
      ctx.setLineDash([4 / zoom, 4 / zoom]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Points & control handles
  if (document.getElementById('showPoints').checked) {
    for (let i = 0; i < commands.length; i++) {
      const cmd = commands[i];
      if (cmd.type === 'Z') continue;

      // Control point lines
      if (cmd.type === 'Q') {
        const prev = getEndpointBefore(i);
        if (prev) drawCtrlLine(prev.x, prev.y, cmd.cx, cmd.cy);
        drawCtrlLine(cmd.cx, cmd.cy, cmd.x, cmd.y);
        drawCtrlPoint(cmd.cx, cmd.cy, i, 'cx');
      } else if (cmd.type === 'C') {
        const prev = getEndpointBefore(i);
        if (prev) drawCtrlLine(prev.x, prev.y, cmd.c1x, cmd.c1y);
        drawCtrlLine(cmd.c2x, cmd.c2y, cmd.x, cmd.y);
        drawCtrlPoint(cmd.c1x, cmd.c1y, i, 'c1');
        drawCtrlPoint(cmd.c2x, cmd.c2y, i, 'c2');
      }

      // Endpoint
      drawEndpoint(cmd.x, cmd.y, i, cmd.type);
    }

    // Temp points
    for (const tp of tempPoints) {
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, CTRL_R / zoom, 0, Math.PI * 2);
      ctx.fillStyle = '#d29922';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1 / zoom;
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawEndpoint(x, y, idx, type) {
  const r = POINT_R / zoom;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  const isHov = hoveredPoint && hoveredPoint.cmdIndex === idx && hoveredPoint.pointKey === 'end';
  ctx.fillStyle = isHov ? '#fff' : (type === 'M' ? '#3fb950' : '#58a6ff');
  ctx.fill();
  ctx.strokeStyle = '#0d1117';
  ctx.lineWidth = 1.5 / zoom;
  ctx.stroke();
}

function drawCtrlPoint(x, y, idx, key) {
  const r = CTRL_R / zoom;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  const isHov = hoveredPoint && hoveredPoint.cmdIndex === idx && hoveredPoint.pointKey === key;
  ctx.fillStyle = isHov ? '#fff' : '#d29922';
  ctx.fill();
  ctx.strokeStyle = '#0d1117';
  ctx.lineWidth = 1 / zoom;
  ctx.stroke();
}

function drawCtrlLine(x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = '#d2992266';
  ctx.lineWidth = 1 / zoom;
  ctx.setLineDash([3 / zoom, 3 / zoom]);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ─── Helpers ─────────────────────────────────────────────
function getLastEndpoint() {
  for (let i = commands.length - 1; i >= 0; i--) {
    if (commands[i].type !== 'Z') return { x: commands[i].x, y: commands[i].y };
  }
  return null;
}

function getEndpointBefore(idx) {
  for (let i = idx - 1; i >= 0; i--) {
    if (commands[i].type !== 'Z') return { x: commands[i].x, y: commands[i].y };
  }
  return null;
}

function hitTest(sx, sy) {
  const wp = screenToWorld(sx, sy);
  const threshold = 8 / zoom;
  for (let i = commands.length - 1; i >= 0; i--) {
    const cmd = commands[i];
    if (cmd.type === 'Z') continue;

    if (dist(wp, { x: cmd.x, y: cmd.y }) < threshold) {
      return { cmdIndex: i, pointKey: 'end' };
    }
    if (cmd.type === 'Q' && dist(wp, { x: cmd.cx, y: cmd.cy }) < threshold) {
      return { cmdIndex: i, pointKey: 'cx' };
    }
    if (cmd.type === 'C') {
      if (dist(wp, { x: cmd.c1x, y: cmd.c1y }) < threshold) return { cmdIndex: i, pointKey: 'c1' };
      if (dist(wp, { x: cmd.c2x, y: cmd.c2y }) < threshold) return { cmdIndex: i, pointKey: 'c2' };
    }
  }
  return null;
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// ─── Path String ─────────────────────────────────────────
function buildPathString() {
  return commands.map(cmd => {
    switch (cmd.type) {
      case 'M': return `M ${cmd.x} ${cmd.y}`;
      case 'L': return `L ${cmd.x} ${cmd.y}`;
      case 'Q': return `Q ${cmd.cx} ${cmd.cy} ${cmd.x} ${cmd.y}`;
      case 'C': return `C ${cmd.c1x} ${cmd.c1y} ${cmd.c2x} ${cmd.c2y} ${cmd.x} ${cmd.y}`;
      case 'Z': return 'Z';
    }
  }).join(' ');
}

function updateUI() {
  pathCodeEl.value = buildPathString();
  updatePointList();
  draw();
}

function updatePointList() {
  pointListEl.innerHTML = commands.map((cmd, i) => {
    let coords = '';
    switch (cmd.type) {
      case 'M': case 'L': coords = `${cmd.x}, ${cmd.y}`; break;
      case 'Q': coords = `${cmd.cx},${cmd.cy} → ${cmd.x},${cmd.y}`; break;
      case 'C': coords = `${cmd.c1x},${cmd.c1y} ${cmd.c2x},${cmd.c2y} → ${cmd.x},${cmd.y}`; break;
      case 'Z': coords = '(close)'; break;
    }
    return `<div class="point-item"><span class="cmd">${cmd.type}</span><span class="coords">${coords}</span><span class="del-btn" onclick="deleteCommand(${i})">✕</span></div>`;
  }).join('');
}

// ─── Undo/Redo ───────────────────────────────────────────
function pushUndo() {
  undoStack.push(JSON.stringify(commands));
  if (undoStack.length > 100) undoStack.shift();
  redoStack = [];
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(commands));
  commands = JSON.parse(undoStack.pop());
  tempPoints = [];
  updateUI();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(commands));
  commands = JSON.parse(redoStack.pop());
  tempPoints = [];
  updateUI();
}

// ─── Mouse Events ────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX, sy = e.clientY;

  // Middle click or space+click = pan
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    isPanning = true;
    panStartX = sx - panX;
    panStartY = sy - panY;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }

  if (e.button !== 0) return;

  // Check hit on existing point
  const hit = hitTest(sx, sy);
  if (hit) {
    dragTarget = hit;
    canvas.style.cursor = 'grabbing';
    return;
  }

  // Add point
  const wp = screenToWorld(sx, sy);
  const x = snap(wp.x), y = snap(wp.y);

  if (currentTool === 'M') {
    pushUndo();
    commands.push({ type: 'M', x, y });
    updateUI();
  } else if (currentTool === 'L') {
    if (commands.length === 0) {
      pushUndo();
      commands.push({ type: 'M', x, y });
    } else {
      pushUndo();
      commands.push({ type: 'L', x, y });
    }
    updateUI();
  } else if (currentTool === 'Q') {
    if (commands.length === 0) {
      pushUndo();
      commands.push({ type: 'M', x, y });
      updateUI();
    } else {
      tempPoints.push({ x, y });
      if (tempPoints.length === 1) {
        draw(); // show temp control point
      } else if (tempPoints.length === 2) {
        pushUndo();
        commands.push({ type: 'Q', cx: tempPoints[0].x, cy: tempPoints[0].y, x: tempPoints[1].x, y: tempPoints[1].y });
        tempPoints = [];
        updateUI();
      }
    }
  } else if (currentTool === 'C') {
    if (commands.length === 0) {
      pushUndo();
      commands.push({ type: 'M', x, y });
      updateUI();
    } else {
      tempPoints.push({ x, y });
      if (tempPoints.length < 3) {
        draw();
      } else {
        pushUndo();
        commands.push({ type: 'C', c1x: tempPoints[0].x, c1y: tempPoints[0].y, c2x: tempPoints[1].x, c2y: tempPoints[1].y, x: tempPoints[2].x, y: tempPoints[2].y });
        tempPoints = [];
        updateUI();
      }
    }
  } else if (currentTool === 'Z') {
    if (commands.length > 0) {
      pushUndo();
      commands.push({ type: 'Z' });
      updateUI();
    }
  }
});

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  const wp = screenToWorld(mouseX, mouseY);
  const sx = snap(wp.x), sy = snap(wp.y);
  infoEl.textContent = `${sx}, ${sy} | Zoom: ${Math.round(zoom * 100)}%`;

  if (isPanning) {
    panX = mouseX - panStartX;
    panY = mouseY - panStartY;
    draw();
    return;
  }

  if (dragTarget) {
    const cmd = commands[dragTarget.cmdIndex];
    if (dragTarget.pointKey === 'end') {
      cmd.x = sx; cmd.y = sy;
    } else if (dragTarget.pointKey === 'cx') {
      cmd.cx = sx; cmd.cy = sy;
    } else if (dragTarget.pointKey === 'c1') {
      cmd.c1x = sx; cmd.c1y = sy;
    } else if (dragTarget.pointKey === 'c2') {
      cmd.c2x = sx; cmd.c2y = sy;
    }
    updateUI();
    return;
  }

  // Hover test
  hoveredPoint = hitTest(mouseX, mouseY);
  canvas.style.cursor = hoveredPoint ? 'pointer' : 'crosshair';
  draw();
});

canvas.addEventListener('mouseup', e => {
  if (isPanning) {
    isPanning = false;
    canvas.style.cursor = 'crosshair';
    return;
  }
  if (dragTarget) {
    pushUndo();
    dragTarget = null;
    canvas.style.cursor = hoveredPoint ? 'pointer' : 'crosshair';
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.min(10, Math.max(0.1, zoom * delta));
  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
  infoEl.textContent = `${snap(screenToWorld(e.clientX, e.clientY).x)}, ${snap(screenToWorld(e.clientX, e.clientY).y)} | Zoom: ${Math.round(zoom * 100)}%`;
  draw();
}, { passive: false });

// Touch support
let lastTouchDist = 0;
let lastTouchCenter = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.hypot(dx, dy);
    lastTouchCenter = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
    e.preventDefault();
  } else if (e.touches.length === 1) {
    const t = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY, button: 0 }));
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const scale = d / lastTouchDist;
    const newZoom = Math.min(10, Math.max(0.1, zoom * scale));
    const rect = canvas.getBoundingClientRect();
    const mx = cx - rect.left, my = cy - rect.top;
    panX = mx - (mx - panX) * (newZoom / zoom);
    panY = my - (my - panY) * (newZoom / zoom);
    if (lastTouchCenter) {
      panX += cx - lastTouchCenter.x;
      panY += cy - lastTouchCenter.y;
    }
    zoom = newZoom;
    lastTouchDist = d;
    lastTouchCenter = { x: cx, y: cy };
    draw();
    e.preventDefault();
  } else if (e.touches.length === 1) {
    const t = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    canvas.dispatchEvent(new MouseEvent('mouseup', {}));
    lastTouchDist = 0;
    lastTouchCenter = null;
  }
});

// ─── Keyboard ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  const key = e.key.toUpperCase();
  if (['M','L','Q','C','Z'].includes(key)) {
    setTool(key);
  } else if (e.key === 'z' && (e.metaKey || e.ctrlKey) && !e.shiftKey) {
    e.preventDefault(); undo();
  } else if ((e.key === 'z' && (e.metaKey || e.ctrlKey) && e.shiftKey) || (e.key === 'y' && (e.metaKey || e.ctrlKey))) {
    e.preventDefault(); redo();
  } else if (e.key === 'Escape') {
    tempPoints = [];
    draw();
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    if (commands.length > 0) {
      pushUndo();
      commands.pop();
      updateUI();
    }
  }
});

// ─── Tool Selection ──────────────────────────────────────
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => setTool(btn.dataset.tool));
});

function setTool(tool) {
  currentTool = tool;
  tempPoints = [];
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  draw();
}

// ─── Sidebar Actions ─────────────────────────────────────
function deleteCommand(idx) {
  pushUndo();
  commands.splice(idx, 1);
  updateUI();
}

function applyPathCode() {
  const d = pathCodeEl.value.trim();
  if (!d) return;
  pushUndo();
  commands = parsePath(d);
  updateUI();
  toast('Path applied');
}

function prettifyPath() {
  pathCodeEl.value = commands.map(cmd => {
    switch (cmd.type) {
      case 'M': return `M ${cmd.x} ${cmd.y}`;
      case 'L': return `L ${cmd.x} ${cmd.y}`;
      case 'Q': return `Q ${cmd.cx} ${cmd.cy}, ${cmd.x} ${cmd.y}`;
      case 'C': return `C ${cmd.c1x} ${cmd.c1y}, ${cmd.c2x} ${cmd.c2y}, ${cmd.x} ${cmd.y}`;
      case 'Z': return 'Z';
    }
  }).join('\n');
}

function copyPath() {
  navigator.clipboard.writeText(pathCodeEl.value).then(() => toast('Copied to clipboard'));
}

// ─── Import/Export ───────────────────────────────────────
function showImportModal() {
  document.getElementById('importModal').classList.add('open');
  document.getElementById('importInput').focus();
}
function closeImportModal() {
  document.getElementById('importModal').classList.remove('open');
}
function doImport() {
  let val = document.getElementById('importInput').value.trim();
  // Extract d="..." from SVG markup
  const match = val.match(/\bd\s*=\s*"([^"]+)"/);
  if (match) val = match[1];
  if (!val) { toast('No path data found'); return; }
  pushUndo();
  commands = parsePath(val);
  updateUI();
  closeImportModal();
  toast('Path imported');
}

function exportSVG() {
  const d = buildPathString();
  if (!d) { toast('Nothing to export'); return; }
  const stroke = document.getElementById('strokeColor').value || '#58a6ff';
  const sw = document.getElementById('strokeWidth').value || '2';
  const fill = document.getElementById('fillPath').checked ? stroke + '33' : 'none';

  // Compute bounding box
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const cmd of commands) {
    if (cmd.type === 'Z') continue;
    for (const k of ['x','y','cx','cy','c1x','c1y','c2x','c2y']) {
      if (cmd[k] !== undefined) {
        if (k.endsWith('x') || k === 'x') { minX = Math.min(minX, cmd[k]); maxX = Math.max(maxX, cmd[k]); }
        else { minY = Math.min(minY, cmd[k]); maxY = Math.max(maxY, cmd[k]); }
      }
    }
  }
  const pad = 20;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const w = maxX - minX, h = maxY - minY;

  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="${minX} ${minY} ${w} ${h}" width="${w}" height="${h}">
  <path d="${d}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'path.svg'; a.click();
  URL.revokeObjectURL(url);
  toast('SVG exported');
}

function clearAll() {
  if (commands.length === 0) return;
  pushUndo();
  commands = [];
  tempPoints = [];
  updateUI();
  toast('Cleared');
}

// ─── Path Parser ─────────────────────────────────────────
function parsePath(d) {
  const result = [];
  // Tokenize: split on command letters, keeping them
  const tokens = d.match(/[MmLlQqCcZzHhVvSsTtAa][^MmLlQqCcZzHhVvSsTtAa]*/g);
  if (!tokens) return result;

  let cx = 0, cy = 0; // current position
  for (const token of tokens) {
    const cmd = token[0];
    const nums = (token.slice(1).match(/-?\d*\.?\d+/g) || []).map(Number);
    const isRel = cmd === cmd.toLowerCase();
    const C = cmd.toUpperCase();

    if (C === 'M') {
      for (let i = 0; i < nums.length; i += 2) {
        const x = isRel ? cx + nums[i] : nums[i];
        const y = isRel ? cy + nums[i + 1] : nums[i + 1];
        result.push({ type: i === 0 ? 'M' : 'L', x, y });
        cx = x; cy = y;
      }
    } else if (C === 'L') {
      for (let i = 0; i < nums.length; i += 2) {
        const x = isRel ? cx + nums[i] : nums[i];
        const y = isRel ? cy + nums[i + 1] : nums[i + 1];
        result.push({ type: 'L', x, y });
        cx = x; cy = y;
      }
    } else if (C === 'H') {
      for (const n of nums) {
        const x = isRel ? cx + n : n;
        result.push({ type: 'L', x, y: cy });
        cx = x;
      }
    } else if (C === 'V') {
      for (const n of nums) {
        const y = isRel ? cy + n : n;
        result.push({ type: 'L', x: cx, y });
        cy = y;
      }
    } else if (C === 'Q') {
      for (let i = 0; i < nums.length; i += 4) {
        const qcx = isRel ? cx + nums[i] : nums[i];
        const qcy = isRel ? cy + nums[i+1] : nums[i+1];
        const x = isRel ? cx + nums[i+2] : nums[i+2];
        const y = isRel ? cy + nums[i+3] : nums[i+3];
        result.push({ type: 'Q', cx: qcx, cy: qcy, x, y });
        cx = x; cy = y;
      }
    } else if (C === 'C') {
      for (let i = 0; i < nums.length; i += 6) {
        const c1x = isRel ? cx + nums[i] : nums[i];
        const c1y = isRel ? cy + nums[i+1] : nums[i+1];
        const c2x = isRel ? cx + nums[i+2] : nums[i+2];
        const c2y = isRel ? cy + nums[i+3] : nums[i+3];
        const x = isRel ? cx + nums[i+4] : nums[i+4];
        const y = isRel ? cy + nums[i+5] : nums[i+5];
        result.push({ type: 'C', c1x, c1y, c2x, c2y, x, y });
        cx = x; cy = y;
      }
    } else if (C === 'S') {
      for (let i = 0; i < nums.length; i += 4) {
        // Reflect previous C's c2
        let c1x = cx, c1y = cy;
        const prev = result[result.length - 1];
        if (prev && prev.type === 'C') { c1x = 2*cx - prev.c2x; c1y = 2*cy - prev.c2y; }
        const c2x = isRel ? cx + nums[i] : nums[i];
        const c2y = isRel ? cy + nums[i+1] : nums[i+1];
        const x = isRel ? cx + nums[i+2] : nums[i+2];
        const y = isRel ? cy + nums[i+3] : nums[i+3];
        result.push({ type: 'C', c1x, c1y, c2x, c2y, x, y });
        cx = x; cy = y;
      }
    } else if (C === 'T') {
      for (let i = 0; i < nums.length; i += 2) {
        let qcx = cx, qcy = cy;
        const prev = result[result.length - 1];
        if (prev && prev.type === 'Q') { qcx = 2*cx - prev.cx; qcy = 2*cy - prev.cy; }
        const x = isRel ? cx + nums[i] : nums[i];
        const y = isRel ? cy + nums[i+1] : nums[i+1];
        result.push({ type: 'Q', cx: qcx, cy: qcy, x, y });
        cx = x; cy = y;
      }
    } else if (C === 'A') {
      // Approximate arcs as lines (simplified)
      for (let i = 0; i < nums.length; i += 7) {
        const x = isRel ? cx + nums[i+5] : nums[i+5];
        const y = isRel ? cy + nums[i+6] : nums[i+6];
        result.push({ type: 'L', x, y });
        cx = x; cy = y;
      }
    } else if (C === 'Z') {
      result.push({ type: 'Z' });
    }
  }
  return result;
}

// ─── Toast ───────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── Settings listeners ─────────────────────────────────
['snapGrid','showPoints','fillPath'].forEach(id => {
  document.getElementById(id).addEventListener('change', draw);
});
['strokeColor','strokeWidth'].forEach(id => {
  document.getElementById(id).addEventListener('input', draw);
});

// ─── Init ────────────────────────────────────────────────
canvas.style.cursor = 'crosshair';
// Center origin with some offset
setTimeout(() => {
  const r = canvas.parentElement.getBoundingClientRect();
  panX = r.width * 0.3;
  panY = r.height * 0.3;
  draw();
}, 10);
</script>
