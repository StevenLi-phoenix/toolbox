<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer - Free Online Tool</title>
<meta name="description" content="Free online Pomodoro timer for productivity. Customizable work and break intervals with audio alerts. Track your focus sessions. No signup required.">
<meta name="keywords" content="pomodoro timer, focus timer, productivity timer, work timer, break timer, free pomodoro tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/pomodoro.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--error:#ef4444;--work:#ef4444;--break:#22c55e;--long:#6366f1;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:500px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;justify-content:center}
.tab{padding:.5rem 1.2rem;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:.9rem;font-weight:600;transition:all .15s}
.tab.active{color:#fff}
.tab[data-mode="work"].active{background:var(--work);border-color:var(--work)}
.tab[data-mode="break"].active{background:var(--break);border-color:var(--break)}
.tab[data-mode="long"].active{background:var(--long);border-color:var(--long)}
.timer-wrap{text-align:center;padding:2rem 0}
.timer-ring{position:relative;width:240px;height:240px;margin:0 auto}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:8}
.ring-bg{stroke:var(--border)}
.ring-fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.timer-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-digits{font-size:3.5rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:2px}
.timer-label{font-size:.9rem;color:var(--muted);margin-top:.25rem}
.controls{display:flex;gap:1rem;justify-content:center;margin-top:1.5rem}
button{padding:.6rem 1.5rem;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-start{background:var(--accent);color:#fff;min-width:120px}
.btn-start:hover{background:var(--accent-hover)}
.btn-reset{background:var(--border);color:var(--text)}
.btn-reset:hover{background:#475569}
.btn-skip{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-skip:hover{color:var(--text);border-color:var(--muted)}
label{display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:.35rem;margin-top:.75rem}
label:first-child{margin-top:0}
input[type="number"]{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;font-size:.9rem}
input:focus{outline:none;border-color:var(--accent)}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
.session-count{text-align:center;margin-top:1rem;font-size:.9rem;color:var(--muted)}
.session-dots{display:flex;justify-content:center;gap:.5rem;margin-top:.5rem}
.dot{width:12px;height:12px;border-radius:50%;background:var(--border)}
.dot.done{background:var(--work)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Pomodoro Timer</h1>
<p class="subtitle">Stay focused with timed work and break sessions</p>

<div class="card">
<div class="tabs">
<button class="tab active" data-mode="work" onclick="setMode('work')">Work</button>
<button class="tab" data-mode="break" onclick="setMode('break')">Break</button>
<button class="tab" data-mode="long" onclick="setMode('long')">Long Break</button>
</div>

<div class="timer-wrap">
<div class="timer-ring">
<svg width="240" height="240" viewBox="0 0 240 240">
<circle class="ring-bg" cx="120" cy="120" r="108"/>
<circle class="ring-fg" id="ring" cx="120" cy="120" r="108" stroke-dasharray="678.58" stroke-dashoffset="0"/>
</svg>
<div class="timer-text">
<div class="timer-digits" id="digits">25:00</div>
<div class="timer-label" id="label">Work Session</div>
</div>
</div>
</div>

<div class="controls">
<button class="btn-reset" onclick="resetTimer()">↺ Reset</button>
<button class="btn-start" id="startBtn" onclick="toggleTimer()">▶ Start</button>
<button class="btn-skip" onclick="skipSession()">⏭ Skip</button>
</div>

<div class="session-count">
<span id="count-text">Session 1 of 4</span>
<div class="session-dots" id="dots"></div>
</div>
</div>

<div class="card">
<h2>⚙️ Settings</h2>
<div class="row">
<div><label>Work (min)</label><input type="number" id="s-work" value="25" min="1" max="120" onchange="updateSettings()"></div>
<div><label>Break (min)</label><input type="number" id="s-break" value="5" min="1" max="60" onchange="updateSettings()"></div>
<div><label>Long Break</label><input type="number" id="s-long" value="15" min="1" max="60" onchange="updateSettings()"></div>
</div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>

<script>
const CIRC=2*Math.PI*108;
let mode='work',running=false,interval=null;
let durations={work:25*60,break:5*60,long:15*60};
let timeLeft=durations.work,totalTime=durations.work;
let session=1,totalSessions=4;

function $id(id){return document.getElementById(id)}

function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  const colors={work:'var(--work)',break:'var(--break)',long:'var(--long)'};
  const labels={work:'Work Session',break:'Short Break',long:'Long Break'};
  $id('ring').style.stroke=colors[m];
  $id('label').textContent=labels[m];
  totalTime=durations[m];
  if(!running){timeLeft=totalTime;updateDisplay()}
}

function updateDisplay(){
  const m=Math.floor(timeLeft/60);
  const s=timeLeft%60;
  $id('digits').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  const offset=CIRC*(1-timeLeft/totalTime);
  $id('ring').style.strokeDashoffset=offset;
  document.title=(running?'⏱ ':'')+$id('digits').textContent+' — Pomodoro';
}

function toggleTimer(){
  if(running){
    clearInterval(interval);running=false;
    $id('startBtn').textContent='▶ Start';
  }else{
    running=true;
    $id('startBtn').textContent='⏸ Pause';
    interval=setInterval(()=>{
      timeLeft--;
      if(timeLeft<=0){
        clearInterval(interval);running=false;
        $id('startBtn').textContent='▶ Start';
        playSound();
        if(mode==='work'){
          markDot(session-1);
          if(session>=totalSessions){setMode('long');session=0;}
          else setMode('break');
          session++;
        }else{
          setMode('work');
        }
        timeLeft=totalTime;
        updateDots();
      }
      updateDisplay();
    },1000);
  }
}

function resetTimer(){
  clearInterval(interval);running=false;
  $id('startBtn').textContent='▶ Start';
  timeLeft=totalTime;
  updateDisplay();
}

function skipSession(){
  clearInterval(interval);running=false;
  $id('startBtn').textContent='▶ Start';
  if(mode==='work'){
    markDot(session-1);
    if(session>=totalSessions){setMode('long');session=0;}
    else setMode('break');
    session++;
  }else setMode('work');
  timeLeft=totalTime;
  updateDisplay();
  updateDots();
}

function updateSettings(){
  durations.work=parseInt($id('s-work').value)*60||25*60;
  durations.break=parseInt($id('s-break').value)*60||5*60;
  durations.long=parseInt($id('s-long').value)*60||15*60;
  if(!running){totalTime=durations[mode];timeLeft=totalTime;updateDisplay()}
}

function updateDots(){
  $id('count-text').textContent=`Session ${Math.min(session,totalSessions)} of ${totalSessions}`;
  const dots=$id('dots');
  dots.innerHTML='';
  for(let i=0;i<totalSessions;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<session-1?' done':'');
    dots.appendChild(d);
  }
}

function markDot(i){/* handled by updateDots */}

function playSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [0,.15,.3].forEach(t=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=800;o.type='sine';
      g.gain.setValueAtTime(.3,ac.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.01,ac.currentTime+t+.12);
      o.start(ac.currentTime+t);o.stop(ac.currentTime+t+.12);
    });
  }catch(e){}
}

updateDisplay();updateDots();
</script>
</body>
</html>
