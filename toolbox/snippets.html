<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Snippet Manager - Save & Organize Your Code Snippets</title>
    <meta name="description" content="Free online code snippet manager. Save, organize, tag, and search your code snippets with syntax highlighting. All data stored locally in your browser.">
    <meta name="keywords" content="code snippet manager, code organizer, snippet library, code bookmark, syntax highlighting, developer tool">
    <meta name="author" content="Steven Li">
    <meta property="og:title" content="Code Snippet Manager - Save & Organize Your Code Snippets">
    <meta property="og:description" content="Free browser-based code snippet manager with syntax highlighting, tags, search, and local storage.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stevenli-phoenix.github.io/toolbox/snippets.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Code Snippet Manager">
    <meta name="twitter:description" content="Save, organize, and search code snippets with syntax highlighting. Free & private.">
    <link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/snippets.html">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
            --text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--accent2:#3fb950;
            --danger:#f85149;--warning:#d29922;--radius:8px;
        }
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
        a{color:var(--accent);text-decoration:none}
        a:hover{text-decoration:underline}
        header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        header h1{font-size:1.3rem;display:flex;align-items:center;gap:8px}
        header h1 span{font-size:1.5rem}
        .header-actions{display:flex;gap:8px;align-items:center}
        .btn{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);cursor:pointer;font-size:.875rem;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
        .btn:hover{border-color:var(--accent);color:var(--accent)}
        .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
        .btn-primary:hover{background:#4c9aed;border-color:#4c9aed;color:#fff}
        .btn-danger{border-color:var(--danger);color:var(--danger)}
        .btn-danger:hover{background:var(--danger);color:#fff}
        .btn-sm{padding:4px 10px;font-size:.8rem}
        main{flex:1;display:flex;flex-direction:column;max-width:1200px;width:100%;margin:0 auto;padding:16px 20px}
        .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
        .search-box{flex:1;min-width:200px;position:relative}
        .search-box input{width:100%;padding:10px 12px 10px 36px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9rem;outline:none}
        .search-box input:focus{border-color:var(--accent)}
        .search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);width:16px;height:16px}
        .filter-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
        .tag{padding:3px 10px;border-radius:20px;font-size:.75rem;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap}
        .tag:hover,.tag.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.1)}
        .tag .count{margin-left:4px;opacity:.6}
        .lang-filter{padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.85rem;outline:none;cursor:pointer}
        .lang-filter:focus{border-color:var(--accent)}
        .snippet-list{display:flex;flex-direction:column;gap:12px;flex:1}
        .snippet-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s}
        .snippet-card:hover{border-color:var(--text2)}
        .snippet-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;flex-wrap:wrap}
        .snippet-title{font-weight:600;font-size:.95rem;flex:1;min-width:150px}
        .snippet-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .snippet-lang{padding:2px 8px;border-radius:4px;font-size:.75rem;background:rgba(88,166,255,.15);color:var(--accent);font-weight:500}
        .snippet-date{font-size:.75rem;color:var(--text2)}
        .snippet-tags{display:flex;gap:4px;flex-wrap:wrap}
        .snippet-tags .tag{font-size:.7rem;padding:2px 8px;cursor:default}
        .snippet-actions{display:flex;gap:4px}
        .snippet-body{display:none;border-top:1px solid var(--border)}
        .snippet-body.open{display:block}
        .snippet-desc{padding:10px 16px;font-size:.85rem;color:var(--text2);border-bottom:1px solid var(--border)}
        .code-wrap{position:relative}
        .code-wrap pre{padding:16px;overflow-x:auto;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-size:.85rem;line-height:1.5;max-height:400px;overflow-y:auto;background:var(--bg);margin:0;tab-size:4}
        .copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;font-size:.75rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text2);cursor:pointer;opacity:0;transition:opacity .15s}
        .code-wrap:hover .copy-btn{opacity:1}
        .copy-btn:hover{color:var(--accent);border-color:var(--accent)}
        .empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
        .empty-state h2{font-size:1.3rem;margin-bottom:8px;color:var(--text)}
        .empty-state p{margin-bottom:20px}
        /* Modal */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:20px}
        .modal-overlay.open{display:flex}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:650px;max-height:90vh;overflow-y:auto;padding:24px}
        .modal h2{margin-bottom:16px;font-size:1.1rem}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:4px}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9rem;outline:none;font-family:inherit}
        .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
        .form-group textarea{font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;min-height:180px;resize:vertical;tab-size:4}
        .form-row{display:flex;gap:12px}
        .form-row .form-group{flex:1}
        .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
        .stats{font-size:.8rem;color:var(--text2);padding:4px 0}
        footer{text-align:center;padding:20px;border-top:1px solid var(--border);color:var(--text2);font-size:.85rem}
        footer a{color:var(--accent)}
        /* Responsive */
        @media(max-width:600px){
            header{padding:12px 14px}header h1{font-size:1.1rem}
            main{padding:12px 14px}
            .form-row{flex-direction:column;gap:0}
            .modal{padding:18px}
            .snippet-header{padding:10px 12px}
            .snippet-actions .btn-sm span.label{display:none}
        }
    </style>
</head>
<body>
    <header>
        <h1><span>📋</span> Snippet Manager</h1>
        <div class="header-actions">
            <button class="btn btn-sm" onclick="exportAll()" title="Export all snippets as JSON">⬇ Export</button>
            <button class="btn btn-sm" onclick="document.getElementById('importFile').click()" title="Import snippets from JSON">⬆ Import</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importSnippets(event)">
            <button class="btn btn-primary" onclick="openModal()">+ New Snippet</button>
        </div>
    </header>
    <main>
        <div class="toolbar">
            <div class="search-box">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/></svg>
                <input type="text" id="searchInput" placeholder="Search snippets by title, code, tags..." oninput="renderSnippets()">
            </div>
            <select class="lang-filter" id="langFilter" onchange="renderSnippets()">
                <option value="">All Languages</option>
            </select>
        </div>
        <div class="filter-tags" id="tagFilters"></div>
        <div class="stats" id="statsBar"></div>
        <div class="snippet-list" id="snippetList"></div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modalTitle">New Snippet</h2>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="fTitle" placeholder="e.g. React useDebounce hook" autofocus>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Language</label>
                    <select id="fLang">
                        <option value="javascript">JavaScript</option>
                        <option value="typescript">TypeScript</option>
                        <option value="python">Python</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="bash">Bash</option>
                        <option value="sql">SQL</option>
                        <option value="json">JSON</option>
                        <option value="yaml">YAML</option>
                        <option value="go">Go</option>
                        <option value="rust">Rust</option>
                        <option value="java">Java</option>
                        <option value="csharp">C#</option>
                        <option value="cpp">C++</option>
                        <option value="ruby">Ruby</option>
                        <option value="php">PHP</option>
                        <option value="swift">Swift</option>
                        <option value="kotlin">Kotlin</option>
                        <option value="markdown">Markdown</option>
                        <option value="dockerfile">Dockerfile</option>
                        <option value="toml">TOML</option>
                        <option value="xml">XML</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tags (comma-separated)</label>
                    <input type="text" id="fTags" placeholder="e.g. react, hooks, utility">
                </div>
            </div>
            <div class="form-group">
                <label>Description (optional)</label>
                <input type="text" id="fDesc" placeholder="Brief description of what this snippet does">
            </div>
            <div class="form-group">
                <label>Code *</label>
                <textarea id="fCode" placeholder="Paste your code here..." onkeydown="handleTab(event)"></textarea>
            </div>
            <div class="form-actions">
                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSnippet()">Save Snippet</button>
            </div>
        </div>
    </div>

    <footer>
        <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank" rel="noopener">☕ Buy Me a Coffee</a> &nbsp;·&nbsp;
        <a href="https://stevenli-phoenix.github.io/toolbox/">More Tools</a>
    </footer>

    <script>
    const STORAGE_KEY = 'snippet_manager_data';
    let snippets = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let activeTag = '';

    function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

    function save(){localStorage.setItem(STORAGE_KEY, JSON.stringify(snippets))}

    function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

    function timeAgo(ts){
        const d=Date.now()-ts,s=Math.floor(d/1000),m=Math.floor(s/60),h=Math.floor(m/60),dy=Math.floor(h/24);
        if(dy>30)return new Date(ts).toLocaleDateString();
        if(dy>0)return dy+'d ago';if(h>0)return h+'h ago';if(m>0)return m+'m ago';return 'just now';
    }

    function getAllTags(){
        const map={};
        snippets.forEach(s=>(s.tags||[]).forEach(t=>{map[t]=(map[t]||0)+1}));
        return Object.entries(map).sort((a,b)=>b[1]-a[1]);
    }

    function getAllLangs(){
        const set=new Set();
        snippets.forEach(s=>{if(s.lang)set.add(s.lang)});
        return [...set].sort();
    }

    function renderTagFilters(){
        const tags=getAllTags();
        const el=document.getElementById('tagFilters');
        if(!tags.length){el.innerHTML='';return}
        el.innerHTML=tags.map(([t,c])=>`<span class="tag${activeTag===t?' active':''}" onclick="toggleTag('${escapeHtml(t)}')">${escapeHtml(t)}<span class="count">${c}</span></span>`).join('');
    }

    function renderLangFilter(){
        const langs=getAllLangs();
        const sel=document.getElementById('langFilter');
        const cur=sel.value;
        sel.innerHTML='<option value="">All Languages</option>'+langs.map(l=>`<option value="${l}"${l===cur?' selected':''}>${l}</option>`).join('');
    }

    function toggleTag(t){activeTag=activeTag===t?'':t;renderSnippets()}

    function getFiltered(){
        const q=document.getElementById('searchInput').value.toLowerCase();
        const lang=document.getElementById('langFilter').value;
        return snippets.filter(s=>{
            if(lang&&s.lang!==lang)return false;
            if(activeTag&&!(s.tags||[]).includes(activeTag))return false;
            if(q){
                const haystack=(s.title+' '+s.code+' '+(s.tags||[]).join(' ')+' '+(s.desc||'')+' '+s.lang).toLowerCase();
                return haystack.includes(q);
            }
            return true;
        }).sort((a,b)=>(b.updated||b.created)-(a.updated||a.created));
    }

    function renderSnippets(){
        renderTagFilters();renderLangFilter();
        const list=getFiltered();
        const stats=document.getElementById('statsBar');
        stats.textContent=`${list.length} of ${snippets.length} snippets`;
        const el=document.getElementById('snippetList');
        if(!snippets.length){
            el.innerHTML=`<div class="empty-state"><h2>No snippets yet</h2><p>Click "+ New Snippet" to save your first code snippet.</p></div>`;
            return;
        }
        if(!list.length){
            el.innerHTML=`<div class="empty-state"><p>No snippets match your search.</p></div>`;
            return;
        }
        el.innerHTML=list.map(s=>`
        <div class="snippet-card" id="card-${s.id}">
            <div class="snippet-header" onclick="toggleBody('${s.id}')">
                <span class="snippet-title">${escapeHtml(s.title)}</span>
                <div class="snippet-meta">
                    <span class="snippet-lang">${escapeHtml(s.lang||'text')}</span>
                    <div class="snippet-tags">${(s.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                    <span class="snippet-date">${timeAgo(s.updated||s.created)}</span>
                    <div class="snippet-actions">
                        <button class="btn btn-sm" onclick="event.stopPropagation();editSnippet('${s.id}')" title="Edit">✏️ <span class="label">Edit</span></button>
                        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteSnippet('${s.id}')" title="Delete">🗑 <span class="label">Delete</span></button>
                    </div>
                </div>
            </div>
            <div class="snippet-body" id="body-${s.id}">
                ${s.desc?`<div class="snippet-desc">${escapeHtml(s.desc)}</div>`:''}
                <div class="code-wrap">
                    <button class="copy-btn" onclick="copyCode('${s.id}')">Copy</button>
                    <pre><code>${escapeHtml(s.code)}</code></pre>
                </div>
            </div>
        </div>`).join('');
    }

    function toggleBody(id){
        document.getElementById('body-'+id).classList.toggle('open');
    }

    function copyCode(id){
        const s=snippets.find(x=>x.id===id);
        if(!s)return;
        navigator.clipboard.writeText(s.code).then(()=>{
            const card=document.getElementById('card-'+id);
            const btn=card.querySelector('.copy-btn');
            btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);
        });
    }

    function openModal(snippet){
        document.getElementById('modal').classList.add('open');
        document.getElementById('modalTitle').textContent=snippet?'Edit Snippet':'New Snippet';
        document.getElementById('editId').value=snippet?snippet.id:'';
        document.getElementById('fTitle').value=snippet?snippet.title:'';
        document.getElementById('fLang').value=snippet?snippet.lang:'javascript';
        document.getElementById('fTags').value=snippet?(snippet.tags||[]).join(', '):'';
        document.getElementById('fDesc').value=snippet?snippet.desc||'':'';
        document.getElementById('fCode').value=snippet?snippet.code:'';
        setTimeout(()=>document.getElementById('fTitle').focus(),100);
    }

    function closeModal(){document.getElementById('modal').classList.remove('open')}

    function saveSnippet(){
        const title=document.getElementById('fTitle').value.trim();
        const code=document.getElementById('fCode').value;
        if(!title||!code){alert('Title and code are required.');return}
        const lang=document.getElementById('fLang').value;
        const tags=document.getElementById('fTags').value.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);
        const desc=document.getElementById('fDesc').value.trim();
        const editId=document.getElementById('editId').value;
        if(editId){
            const idx=snippets.findIndex(s=>s.id===editId);
            if(idx>=0){snippets[idx]={...snippets[idx],title,lang,tags,desc,code,updated:Date.now()}}
        }else{
            snippets.unshift({id:uid(),title,lang,tags,desc,code,created:Date.now(),updated:Date.now()});
        }
        save();closeModal();renderSnippets();
    }

    function editSnippet(id){
        const s=snippets.find(x=>x.id===id);
        if(s)openModal(s);
    }

    function deleteSnippet(id){
        if(!confirm('Delete this snippet?'))return;
        snippets=snippets.filter(s=>s.id!==id);
        save();renderSnippets();
    }

    function exportAll(){
        const blob=new Blob([JSON.stringify(snippets,null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='snippets-'+new Date().toISOString().slice(0,10)+'.json';
        a.click();URL.revokeObjectURL(a.href);
    }

    function importSnippets(e){
        const file=e.target.files[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=function(ev){
            try{
                const data=JSON.parse(ev.target.result);
                if(!Array.isArray(data)){alert('Invalid format.');return}
                const existing=new Set(snippets.map(s=>s.id));
                let added=0;
                data.forEach(s=>{
                    if(s.title&&s.code){
                        if(!s.id||existing.has(s.id))s.id=uid();
                        snippets.push(s);existing.add(s.id);added++;
                    }
                });
                save();renderSnippets();
                alert(`Imported ${added} snippet(s).`);
            }catch{alert('Failed to parse JSON.')}
        };
        reader.readAsText(file);
        e.target.value='';
    }

    function handleTab(e){
        if(e.key==='Tab'){
            e.preventDefault();
            const ta=e.target,s=ta.selectionStart,end=ta.selectionEnd;
            ta.value=ta.value.substring(0,s)+'    '+ta.value.substring(end);
            ta.selectionStart=ta.selectionEnd=s+4;
        }
    }

    // Close modal on overlay click or Escape
    document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
    document.addEventListener('keydown',function(e){
        if(e.key==='Escape')closeModal();
        if(e.key==='n'&&(e.metaKey||e.ctrlKey)){e.preventDefault();openModal()}
    });

    renderSnippets();
    </script>
</body>
</html>
