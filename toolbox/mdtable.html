<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Table Generator | Free Online Tool</title>
<meta name="description" content="Free online Markdown table generator and editor. Create, edit, and format Markdown tables visually. Import from CSV or existing Markdown. No data sent to any server.">
<meta name="keywords" content="markdown, table, generator, editor, csv, converter, online tool, free, formatter">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/mdtable.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--error:#ef4444;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:900px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.4rem}
textarea{width:100%;min-height:120px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:'Courier New',monospace;font-size:.9rem;resize:vertical;transition:border-color .2s}
textarea:focus{outline:none;border-color:var(--accent)}
input[type=number]{width:70px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem;font-size:.9rem;text-align:center}
input[type=number]:focus{outline:none;border-color:var(--accent)}
select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.3rem .5rem;font-size:.8rem;cursor:pointer}
select:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-icon{background:transparent;color:var(--muted);padding:.4rem .6rem;font-size:.85rem;border:1px solid var(--border);border-radius:6px}
.btn-icon:hover{color:var(--text);border-color:var(--muted)}
.btn-danger{background:transparent;color:var(--error);padding:.4rem .6rem;font-size:.85rem;border:1px solid rgba(239,68,68,.3);border-radius:6px}
.btn-danger:hover{background:rgba(239,68,68,.1);border-color:var(--error)}
.status{margin-top:.75rem;font-size:.85rem;padding:.5rem .75rem;border-radius:6px;display:none}
.status.success{display:block;background:rgba(34,197,94,.12);color:var(--success);border:1px solid rgba(34,197,94,.25)}
.status.error{display:block;background:rgba(239,68,68,.12);color:var(--error);border:1px solid rgba(239,68,68,.25)}
.controls{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.controls label{margin:0;display:flex;align-items:center;gap:.4rem;font-size:.9rem;color:var(--text);cursor:pointer}
.controls .group{display:flex;align-items:center;gap:.5rem}
.controls .group span{font-size:.85rem;color:var(--muted)}
.table-wrap{overflow-x:auto;margin:1rem 0;border:1px solid var(--border);border-radius:8px}
table{width:100%;border-collapse:collapse;min-width:400px}
th,td{border:1px solid var(--border);padding:0;position:relative}
th{background:rgba(59,130,246,.1)}
td{background:var(--bg)}
table input[type=text]{width:100%;background:transparent;color:var(--text);border:none;padding:.5rem .6rem;font-size:.88rem;font-family:var(--font)}
table input[type=text]:focus{outline:none;background:rgba(59,130,246,.05)}
.align-row{display:flex;gap:0;border-bottom:1px solid var(--border)}
.align-row th{border:none;border-right:1px solid var(--border);text-align:center;padding:.3rem}
.align-row th:last-child{border-right:none}
.col-actions{display:flex;justify-content:center;gap:.25rem;padding:.25rem}
.col-actions button{padding:.15rem .4rem;font-size:.75rem;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:4px;cursor:pointer;line-height:1}
.col-actions button:hover{color:var(--text);border-color:var(--muted)}
.col-actions button.del:hover{color:var(--error);border-color:var(--error)}
.row-actions{display:flex;flex-direction:column;gap:.15rem;padding:.25rem;justify-content:center;align-items:center}
.row-actions button{padding:.1rem .35rem;font-size:.7rem;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:4px;cursor:pointer;line-height:1}
.row-actions button:hover{color:var(--text);border-color:var(--muted)}
.row-actions button.del:hover{color:var(--error);border-color:var(--error)}
.toggle-switch{position:relative;width:40px;height:22px;display:inline-block}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:11px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--text);border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}
.import-area{margin-top:1rem}
.import-area textarea{min-height:80px}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem}
.tab-bar button{background:transparent;color:var(--muted);border:none;border-bottom:2px solid transparent;padding:.5rem 1rem;font-size:.9rem;cursor:pointer;font-weight:500;transition:all .15s}
.tab-bar button:hover{color:var(--text)}
.tab-bar button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.bmc{display:inline-flex;align-items:center;gap:.4rem;background:#FFDD00;color:#000;padding:.5rem 1rem;border-radius:8px;font-weight:600;text-decoration:none;margin-top:.75rem;font-size:.85rem;transition:opacity .15s}
.bmc:hover{opacity:.85;text-decoration:none}
@media(max-width:600px){
  h1{font-size:1.4rem}
  .controls{flex-direction:column;align-items:flex-start}
  .btn-row{flex-direction:column}
  .btn-row button{width:100%}
  .table-wrap{margin:1rem -.5rem;border-radius:0;border-left:none;border-right:none}
}
</style>
</head>
<body>
<div class="container">
  <h1>Markdown Table Generator</h1>
  <p class="subtitle">Create and edit Markdown tables visually. Everything runs in your browser.</p>

  <div class="card">
    <h2>⚙️ Table Settings</h2>
    <div class="controls">
      <div class="group">
        <span>Rows</span>
        <input type="number" id="rowCount" value="3" min="1" max="50" onchange="resizeTable()">
      </div>
      <div class="group">
        <span>Columns</span>
        <input type="number" id="colCount" value="3" min="1" max="20" onchange="resizeTable()">
      </div>
      <label>
        <span class="toggle-switch"><input type="checkbox" id="headerToggle" checked onchange="generate()"><span class="toggle-slider"></span></span>
        Header row
      </label>
      <label>
        <span class="toggle-switch"><input type="checkbox" id="prettifyToggle" checked onchange="generate()"><span class="toggle-slider"></span></span>
        Prettify
      </label>
    </div>
  </div>

  <div class="card">
    <h2>📝 Table Editor</h2>
    <div class="table-wrap">
      <table id="tableEditor"><tbody></tbody></table>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="addRow()">+ Row</button>
      <button class="btn-secondary" onclick="addCol()">+ Column</button>
      <button class="btn-danger" onclick="clearTable()">Clear All</button>
    </div>
  </div>

  <div class="card">
    <h2>📋 Markdown Output</h2>
    <textarea id="output" readonly aria-label="Markdown output"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="copyOutput()">📋 Copy Markdown</button>
      <button class="btn-icon" onclick="exportCSV()">💾 Export CSV</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="card">
    <h2>📥 Import</h2>
    <div class="tab-bar">
      <button class="active" onclick="switchTab(this,'importMd')">Markdown</button>
      <button onclick="switchTab(this,'importCsv')">CSV</button>
    </div>
    <div class="tab-content active" id="importMd">
      <label for="mdInput">Paste a Markdown table</label>
      <textarea id="mdInput" placeholder="| Header 1 | Header 2 | Header 3 |
|----------|----------|----------|
| Cell 1   | Cell 2   | Cell 3   |"></textarea>
      <div class="btn-row">
        <button class="btn-primary" onclick="importMarkdown()">Import Markdown</button>
      </div>
    </div>
    <div class="tab-content" id="importCsv">
      <label for="csvInput">Paste CSV data</label>
      <textarea id="csvInput" placeholder="Name,Age,City
Alice,30,New York
Bob,25,London"></textarea>
      <div class="btn-row">
        <button class="btn-primary" onclick="importCSV()">Import CSV</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <p>Everything runs locally in your browser. No data is sent anywhere.</p>
  <a href="https://buymeacoffee.com/stevenli.phoenix" class="bmc" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
  <p style="margin-top:.75rem"><a href="./">← More Tools</a></p>
</footer>

<script>
let tableData = [];
let alignments = [];
const headerToggle = document.getElementById('headerToggle');
const prettifyToggle = document.getElementById('prettifyToggle');
const rowCountInput = document.getElementById('rowCount');
const colCountInput = document.getElementById('colCount');

function init() {
  const rows = 3, cols = 3;
  tableData = [];
  alignments = Array(cols).fill('left');
  for (let r = 0; r < rows + 1; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push(r === 0 ? 'Header ' + (c + 1) : '');
    }
    tableData.push(row);
  }
  renderTable();
  generate();
}

function renderTable() {
  const cols = tableData[0] ? tableData[0].length : 0;
  const rows = tableData.length;
  rowCountInput.value = Math.max(1, rows - 1);
  colCountInput.value = cols;

  let html = '';
  // Column actions row
  html += '<tr style="background:transparent"><td style="border:none;width:40px"></td>';
  for (let c = 0; c < cols; c++) {
    html += '<th style="background:transparent;border-bottom:none"><div class="col-actions">';
    html += '<select onchange="setAlignment(' + c + ',this.value)" title="Column alignment">';
    html += '<option value="left"' + (alignments[c] === 'left' ? ' selected' : '') + '>⬅ Left</option>';
    html += '<option value="center"' + (alignments[c] === 'center' ? ' selected' : '') + '>↔ Center</option>';
    html += '<option value="right"' + (alignments[c] === 'right' ? ' selected' : '') + '>➡ Right</option>';
    html += '</select>';
    if (cols > 1) html += '<button class="del" onclick="removeCol(' + c + ')" title="Remove column">✕</button>';
    html += '</div></th>';
  }
  html += '</tr>';

  for (let r = 0; r < rows; r++) {
    const isHeader = r === 0;
    const tag = isHeader ? 'th' : 'td';
    html += '<tr>';
    html += '<td style="border:none;width:40px;vertical-align:middle">';
    if (rows > (isHeader ? 2 : 1)) {
      html += '<div class="row-actions">';
      if (!isHeader) html += '<button class="del" onclick="removeRow(' + r + ')" title="Remove row">✕</button>';
      html += '</div>';
    }
    html += '</td>';
    for (let c = 0; c < cols; c++) {
      const val = tableData[r][c] || '';
      html += '<' + tag + '><input type="text" value="' + escapeAttr(val) + '" ' +
        'oninput="updateCell(' + r + ',' + c + ',this.value)" ' +
        'placeholder="' + (isHeader ? 'Header' : '') + '">' +
        '</' + tag + '>';
    }
    html += '</tr>';
  }

  document.querySelector('#tableEditor tbody').innerHTML = html;
}

function escapeAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function updateCell(r, c, val) {
  tableData[r][c] = val;
  generate();
}

function setAlignment(c, val) {
  alignments[c] = val;
  generate();
}

function addRow() {
  const cols = tableData[0] ? tableData[0].length : 1;
  tableData.push(Array(cols).fill(''));
  renderTable();
  generate();
}

function addCol() {
  alignments.push('left');
  for (let r = 0; r < tableData.length; r++) {
    tableData[r].push(r === 0 ? 'Header ' + tableData[r].length : '');
  }
  renderTable();
  generate();
}

function removeRow(r) {
  if (tableData.length <= 2) return;
  tableData.splice(r, 1);
  renderTable();
  generate();
}

function removeCol(c) {
  if (tableData[0].length <= 1) return;
  alignments.splice(c, 1);
  for (let r = 0; r < tableData.length; r++) {
    tableData[r].splice(c, 1);
  }
  renderTable();
  generate();
}

function resizeTable() {
  let newRows = Math.max(1, Math.min(50, parseInt(rowCountInput.value) || 1));
  let newCols = Math.max(1, Math.min(20, parseInt(colCountInput.value) || 1));
  const totalRows = newRows + 1; // +1 for header
  const curCols = tableData[0] ? tableData[0].length : 0;

  // Adjust columns
  while (alignments.length < newCols) alignments.push('left');
  alignments.length = newCols;
  for (let r = 0; r < tableData.length; r++) {
    while (tableData[r].length < newCols) tableData[r].push(r === 0 ? 'Header ' + (tableData[r].length + 1) : '');
    tableData[r].length = newCols;
  }
  // Adjust rows
  while (tableData.length < totalRows) tableData.push(Array(newCols).fill(''));
  tableData.length = totalRows;

  renderTable();
  generate();
}

function clearTable() {
  for (let r = 0; r < tableData.length; r++) {
    for (let c = 0; c < tableData[r].length; c++) {
      tableData[r][c] = '';
    }
  }
  renderTable();
  generate();
}

function generate() {
  const hasHeader = headerToggle.checked;
  const prettify = prettifyToggle.checked;
  const cols = tableData[0] ? tableData[0].length : 0;
  const rows = tableData.length;
  if (cols === 0 || rows === 0) { document.getElementById('output').value = ''; return; }

  const escaped = tableData.map(row => row.map(cell => cell.replace(/\|/g, '\\|')));

  // Calculate column widths for prettify
  let widths = [];
  if (prettify) {
    for (let c = 0; c < cols; c++) {
      let max = 3; // minimum separator width
      for (let r = 0; r < rows; r++) {
        max = Math.max(max, (escaped[r][c] || '').length);
      }
      widths.push(max);
    }
  }

  function pad(s, w, align) {
    if (!prettify) return s;
    const diff = w - s.length;
    if (diff <= 0) return s;
    if (align === 'center') {
      const left = Math.floor(diff / 2);
      return ' '.repeat(left) + s + ' '.repeat(diff - left);
    }
    if (align === 'right') return ' '.repeat(diff) + s;
    return s + ' '.repeat(diff);
  }

  function makeSep(c) {
    const w = prettify ? widths[c] : 3;
    const a = alignments[c] || 'left';
    if (a === 'center') return ':' + '-'.repeat(Math.max(1, w - 2)) + ':';
    if (a === 'right') return '-'.repeat(Math.max(1, w - 1)) + ':';
    return ':' + '-'.repeat(Math.max(1, w - 1));
  }

  const lines = [];

  if (hasHeader) {
    // Header row
    const hCells = [];
    for (let c = 0; c < cols; c++) hCells.push(prettify ? ' ' + pad(escaped[0][c], widths[c], alignments[c]) + ' ' : ' ' + escaped[0][c] + ' ');
    lines.push('|' + hCells.join('|') + '|');

    // Separator
    const sepCells = [];
    for (let c = 0; c < cols; c++) sepCells.push(prettify ? ' ' + makeSep(c) + ' '.repeat(Math.max(0, widths[c] - makeSep(c).length + 1)) : makeSep(c));
    // Recalc separator with proper padding
    const sepCells2 = [];
    for (let c = 0; c < cols; c++) {
      const sep = makeSep(c);
      if (prettify) {
        sepCells2.push(' ' + sep + '-'.repeat(Math.max(0, widths[c] - sep.length)) + ' ');
      } else {
        sepCells2.push(sep);
      }
    }
    lines.push('|' + sepCells2.join('|') + '|');

    // Data rows
    for (let r = 1; r < rows; r++) {
      const cells = [];
      for (let c = 0; c < cols; c++) cells.push(prettify ? ' ' + pad(escaped[r][c], widths[c], alignments[c]) + ' ' : ' ' + escaped[r][c] + ' ');
      lines.push('|' + cells.join('|') + '|');
    }
  } else {
    // No header — all data, still need separator after first row
    for (let r = 0; r < rows; r++) {
      const cells = [];
      for (let c = 0; c < cols; c++) cells.push(prettify ? ' ' + pad(escaped[r][c], widths[c], alignments[c]) + ' ' : ' ' + escaped[r][c] + ' ');
      lines.push('|' + cells.join('|') + '|');
      if (r === 0) {
        const sepCells = [];
        for (let c = 0; c < cols; c++) {
          const sep = makeSep(c);
          if (prettify) {
            sepCells.push(' ' + sep + '-'.repeat(Math.max(0, widths[c] - sep.length)) + ' ');
          } else {
            sepCells.push(sep);
          }
        }
        lines.push('|' + sepCells.join('|') + '|');
      }
    }
  }

  document.getElementById('output').value = lines.join('\n');
}

function copyOutput() {
  const text = document.getElementById('output').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => showStatus('Copied to clipboard!', 'success'));
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  setTimeout(() => { el.className = 'status'; }, 2500);
}

function exportCSV() {
  if (!tableData.length) return;
  const lines = tableData.map(row => row.map(cell => {
    if (cell.includes(',') || cell.includes('"') || cell.includes('\n')) {
      return '"' + cell.replace(/"/g, '""') + '"';
    }
    return cell;
  }).join(','));
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'table.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  showStatus('CSV downloaded!', 'success');
}

function switchTab(btn, id) {
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.card').querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function importMarkdown() {
  const raw = document.getElementById('mdInput').value.trim();
  if (!raw) return showStatus('Paste a Markdown table first.', 'error');

  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.startsWith('|'));
  if (lines.length < 2) return showStatus('Could not parse Markdown table.', 'error');

  const parse = line => line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());

  // Detect separator row
  let sepIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    const cells = parse(lines[i]);
    if (cells.every(c => /^:?-+:?$/.test(c))) { sepIdx = i; break; }
  }

  // Parse alignments from separator
  const newAlignments = [];
  if (sepIdx >= 0) {
    const sepCells = parse(lines[sepIdx]);
    for (const c of sepCells) {
      if (c.startsWith(':') && c.endsWith(':')) newAlignments.push('center');
      else if (c.endsWith(':')) newAlignments.push('right');
      else newAlignments.push('left');
    }
  }

  const dataLines = lines.filter((_, i) => i !== sepIdx);
  const parsed = dataLines.map(parse);
  const cols = Math.max(...parsed.map(r => r.length));

  tableData = parsed.map(row => {
    while (row.length < cols) row.push('');
    return row;
  });
  alignments = [];
  for (let c = 0; c < cols; c++) alignments.push(newAlignments[c] || 'left');

  if (tableData.length < 2) tableData.push(Array(cols).fill(''));
  renderTable();
  generate();
  showStatus('Markdown table imported!', 'success');
}

function parseCSVLine(line) {
  const cells = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else current += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { cells.push(current); current = ''; }
      else current += ch;
    }
  }
  cells.push(current);
  return cells;
}

function importCSV() {
  const raw = document.getElementById('csvInput').value.trim();
  if (!raw) return showStatus('Paste CSV data first.', 'error');

  const lines = raw.split('\n').map(l => l.replace(/\r$/, '')).filter(l => l.length > 0);
  if (lines.length < 1) return showStatus('No data found.', 'error');

  const parsed = lines.map(parseCSVLine);
  const cols = Math.max(...parsed.map(r => r.length));

  tableData = parsed.map(row => {
    while (row.length < cols) row.push('');
    return row;
  });
  alignments = Array(cols).fill('left');

  if (tableData.length < 2) tableData.push(Array(cols).fill(''));
  renderTable();
  generate();
  showStatus('CSV imported!', 'success');
}

init();
</script>
</body>
</html>
