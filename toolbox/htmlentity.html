<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Entity Encoder/Decoder - Free Online Tool</title>
<meta name="description" content="Free online HTML entity encoder and decoder. Convert special characters to HTML entities and vice versa. Supports named and numeric entities.">
<meta name="keywords" content="html entity encoder, html entity decoder, html special characters, html escape, free html entity tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/htmlentity.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:800px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.75rem;font-family:'Courier New',monospace;font-size:.9rem;line-height:1.5;min-height:120px;resize:vertical}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.tab{padding:.45rem .9rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;font-weight:600}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--muted);color:var(--text)}
button{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:#475569}
.btn-row{display:flex;gap:.75rem;margin-top:1rem;flex-wrap:wrap}
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;margin-top:1rem}
.ref-item{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem;text-align:center;cursor:pointer;font-size:.8rem;transition:border-color .15s}
.ref-item:hover{border-color:var(--accent)}
.ref-char{font-size:1.3rem;display:block;margin-bottom:.2rem}
.ref-code{color:var(--muted);font-family:'Courier New',monospace;font-size:.7rem}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>HTML Entity Encoder/Decoder</h1>
<p class="subtitle">Convert between special characters and HTML entities</p>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="setMode('encode',this)">Encode</button>
<button class="tab" onclick="setMode('decode',this)">Decode</button>
</div>
<h2 id="in-label">📝 Text Input</h2>
<textarea id="input" placeholder='<div class="hello">It\'s a "test" & more</div>' oninput="convert()"></textarea>
</div>

<div class="card">
<h2 id="out-label">📤 Encoded Output</h2>
<textarea id="output" readonly></textarea>
<div class="btn-row">
<button class="btn-primary" onclick="copyOut()">📋 Copy</button>
<button class="btn-secondary" onclick="swapIO()">🔄 Swap</button>
</div>
</div>

<div class="card">
<h2>📖 Common Entities</h2>
<div class="ref-grid" id="ref"></div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
let mode='encode';
function $id(id){return document.getElementById(id)}

const ENTITIES=[
  ['&','&amp;'],['<','&lt;'],['>','&gt;'],['"','&quot;'],["'",'&apos;'],
  ['©','&copy;'],['®','&reg;'],['™','&trade;'],['€','&euro;'],['£','&pound;'],
  ['¥','&yen;'],['¢','&cent;'],['§','&sect;'],['°','&deg;'],['±','&plusmn;'],
  ['×','&times;'],['÷','&divide;'],['·','&middot;'],['†','&dagger;'],['‡','&Dagger;'],
  ['…','&hellip;'],['—','&mdash;'],['–','&ndash;'],[' ','&nbsp;'],
  ['←','&larr;'],['→','&rarr;'],['↑','&uarr;'],['↓','&darr;'],
  ['♠','&spades;'],['♥','&hearts;'],['♦','&diams;'],['♣','&clubs;']
];

function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  $id('in-label').textContent=m==='encode'?'📝 Text Input':'📝 Entity Input';
  $id('out-label').textContent=m==='encode'?'📤 Encoded Output':'📤 Decoded Output';
  convert();
}

function encode(s){
  return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function decode(s){
  const el=document.createElement('textarea');
  el.innerHTML=s;
  return el.value;
}

function convert(){
  const input=$id('input').value;
  $id('output').value=mode==='encode'?encode(input):decode(input);
}

function copyOut(){
  navigator.clipboard.writeText($id('output').value).then(()=>{
    const t=$id('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

function swapIO(){
  const out=$id('output').value;
  if(!out)return;
  $id('input').value=out;
  const newMode=mode==='encode'?'decode':'encode';
  const btn=document.querySelectorAll('.tab')[newMode==='encode'?0:1];
  setMode(newMode,btn);
}

// Reference grid
$id('ref').innerHTML=ENTITIES.map(([ch,ent])=>
  `<div class="ref-item" onclick="navigator.clipboard.writeText('${ent}');toast()" title="Click to copy">
    <span class="ref-char">${ch==' '?'␣':ch}</span>
    <span class="ref-code">${ent}</span>
  </div>`
).join('');

function toast(){const t=$id('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

$id('input').value='<div class="hello">It\'s a "test" & more → © 2026</div>';
convert();
</script>
</body>
</html>
