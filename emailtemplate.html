<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Email Template Builder - Free Online Tool</title>
<meta name="description" content="Build responsive HTML email templates with live preview. Table-based layouts compatible with all major email clients. Export clean HTML.">
<meta name="keywords" content="html email builder, email template generator, responsive email, email html, email design tool, newsletter builder">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/emailtemplate.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .panels { display: grid; grid-template-columns: 360px 1fr; gap: 1.5rem; }
  .controls { display: flex; flex-direction: column; gap: 1rem; }
  .control-group { padding: 1rem; border: 1px solid var(--border); border-radius: var(--radius); }
  .control-group h3 { font-size: .85rem; margin-bottom: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .field { margin-bottom: .75rem; }
  .field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .25rem; }
  .field input, .field select, .field textarea { width: 100%; padding: .5rem .6rem; font-size: .85rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; }
  .field textarea { height: 80px; resize: vertical; }
  .field input[type="color"] { width: 40px; height: 32px; padding: 2px; cursor: pointer; }
  .color-row { display: flex; gap: .75rem; align-items: end; }
  .color-row .field { flex: 1; margin-bottom: 0; }
  .preview-frame { border: 1px solid var(--border); border-radius: var(--radius); background: #fff; min-height: 500px; }
  .preview-frame iframe { width: 100%; height: 600px; border: none; border-radius: var(--radius); }
  .toolbar { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .device-tabs { display: flex; gap: 4px; margin-bottom: .75rem; }
  .device-tab { padding: .4rem .75rem; font-size: .8rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); cursor: pointer; color: var(--muted); }
  .device-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .section-item { display: flex; align-items: center; gap: .5rem; padding: .5rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: .4rem; font-size: .82rem; cursor: grab; }
  .section-item .remove { cursor: pointer; color: var(--error); margin-left: auto; font-weight: 700; }
  .add-section { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .5rem; }
  .add-section button { font-size: .75rem; padding: .3rem .6rem; }
  @media (max-width: 768px) {
    .panels { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back">&larr; All Tools</a>
  <h1>HTML Email Template Builder</h1>
  <p class="subtitle">Build responsive, table-based HTML email templates compatible with all major email clients. No data leaves your browser.</p>

  <div class="toolbar">
    <button class="btn" onclick="updatePreview()">Update Preview</button>
    <button class="btn-secondary" onclick="copyHTML()">Copy HTML</button>
    <button class="btn-secondary" onclick="downloadHTML()">Download</button>
    <button class="btn-secondary" onclick="loadPreset('newsletter')">Newsletter</button>
    <button class="btn-secondary" onclick="loadPreset('transactional')">Transactional</button>
    <button class="btn-secondary" onclick="loadPreset('announcement')">Announcement</button>
  </div>

  <div class="panels">
    <div class="controls">
      <div class="control-group">
        <h3>Layout</h3>
        <div class="field">
          <label>Email Width (px)</label>
          <input type="number" id="emailWidth" value="600" min="320" max="800" oninput="updatePreview()">
        </div>
        <div class="color-row">
          <div class="field"><label>Background</label><input type="color" id="bgColor" value="#f4f4f4" oninput="updatePreview()"></div>
          <div class="field"><label>Content BG</label><input type="color" id="contentBg" value="#ffffff" oninput="updatePreview()"></div>
          <div class="field"><label>Text</label><input type="color" id="textColor" value="#333333" oninput="updatePreview()"></div>
          <div class="field"><label>Accent</label><input type="color" id="accentColor" value="#007bff" oninput="updatePreview()"></div>
        </div>
        <div class="field" style="margin-top:.75rem">
          <label>Font Family</label>
          <select id="fontFamily" onchange="updatePreview()">
            <option value="Arial, Helvetica, sans-serif">Arial</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="Verdana, Geneva, sans-serif">Verdana</option>
            <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
            <option value="Tahoma, Geneva, sans-serif">Tahoma</option>
          </select>
        </div>
      </div>

      <div class="control-group">
        <h3>Header</h3>
        <div class="field"><label>Company / Title</label><input type="text" id="headerTitle" value="Your Company" oninput="updatePreview()"></div>
        <div class="field"><label>Logo URL (optional)</label><input type="text" id="logoUrl" placeholder="https://example.com/logo.png" oninput="updatePreview()"></div>
      </div>

      <div class="control-group">
        <h3>Sections</h3>
        <div id="sectionList"></div>
        <div class="add-section">
          <button class="btn-secondary" onclick="addSection('heading')">+ Heading</button>
          <button class="btn-secondary" onclick="addSection('text')">+ Text</button>
          <button class="btn-secondary" onclick="addSection('button')">+ Button</button>
          <button class="btn-secondary" onclick="addSection('divider')">+ Divider</button>
          <button class="btn-secondary" onclick="addSection('image')">+ Image</button>
        </div>
      </div>

      <div class="control-group">
        <h3>Footer</h3>
        <div class="field"><label>Footer Text</label><textarea id="footerText" oninput="updatePreview()">Your Company, 123 Street, City, State 00000
You received this email because you signed up for updates.
<a href="#">Unsubscribe</a></textarea></div>
      </div>
    </div>

    <div>
      <div class="device-tabs">
        <button class="device-tab active" onclick="setDevice(this, '100%')">Desktop</button>
        <button class="device-tab" onclick="setDevice(this, '375px')">Mobile</button>
        <button class="device-tab" onclick="setDevice(this, '768px')">Tablet</button>
      </div>
      <div class="preview-frame">
        <iframe id="preview" sandbox="allow-same-origin"></iframe>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<footer>
Built with ☕ by <a href="https://buymeacoffee.com/stevenli.phoenix">Steven Li</a> · No data leaves your browser
</footer>

<script>
const $=id=>document.getElementById(id);
let sections = [];
let sectionId = 0;

const PRESETS = {
  newsletter: [
    { type: 'heading', content: 'Weekly Newsletter' },
    { type: 'text', content: 'Hi there! Here are this week\'s highlights and updates from our team.' },
    { type: 'divider' },
    { type: 'heading', content: 'Featured Article' },
    { type: 'text', content: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.' },
    { type: 'button', content: 'Read More', url: '#' },
    { type: 'divider' },
    { type: 'text', content: 'Thanks for reading! See you next week.' }
  ],
  transactional: [
    { type: 'heading', content: 'Order Confirmation' },
    { type: 'text', content: 'Thank you for your order! We\'re processing it now and will send you a shipping confirmation shortly.' },
    { type: 'divider' },
    { type: 'text', content: 'Order #12345\nDate: January 1, 2025\nTotal: $99.00' },
    { type: 'button', content: 'Track Order', url: '#' },
    { type: 'text', content: 'If you have any questions, reply to this email or contact our support team.' }
  ],
  announcement: [
    { type: 'heading', content: 'Exciting News!' },
    { type: 'text', content: 'We\'re thrilled to announce a major update to our platform. Here\'s what\'s new:' },
    { type: 'text', content: '• Faster performance across the board\n• New dashboard with real-time analytics\n• Improved mobile experience\n• 50+ new integrations' },
    { type: 'button', content: 'Learn More', url: '#' },
    { type: 'divider' },
    { type: 'text', content: 'This update is available to all users starting today. No action needed on your part.' }
  ]
};

function addSection(type, content, url) {
  const id = ++sectionId;
  sections.push({ id, type, content: content || defaults(type), url: url || '#' });
  renderSections();
  updatePreview();
}

function defaults(type) {
  switch (type) {
    case 'heading': return 'Section Heading';
    case 'text': return 'Your email content goes here. Write something engaging for your readers.';
    case 'button': return 'Click Here';
    case 'image': return 'https://via.placeholder.com/600x200';
    case 'divider': return '';
    default: return '';
  }
}

function removeSection(id) {
  sections = sections.filter(s => s.id !== id);
  renderSections();
  updatePreview();
}

function renderSections() {
  const labels = { heading: '📌 Heading', text: '📝 Text', button: '🔘 Button', divider: '➖ Divider', image: '🖼️ Image' };
  $('sectionList').innerHTML = sections.map(s => `
    <div class="section-item" data-id="${s.id}">
      <span>${labels[s.type] || s.type}</span>
      <input style="flex:1;font-size:.78rem;padding:.3rem .5rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)"
        value="${esc(s.content)}" oninput="updateSectionContent(${s.id}, this.value)"
        ${s.type === 'divider' ? 'disabled' : ''}>
      ${s.type === 'button' ? `<input style="width:80px;font-size:.75rem;padding:.3rem .4rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)" placeholder="URL" value="${esc(s.url)}" oninput="updateSectionUrl(${s.id}, this.value)">` : ''}
      <span class="remove" onclick="removeSection(${s.id})">&times;</span>
    </div>
  `).join('');
}

function updateSectionContent(id, val) {
  const s = sections.find(s => s.id === id);
  if (s) { s.content = val; updatePreview(); }
}

function updateSectionUrl(id, val) {
  const s = sections.find(s => s.id === id);
  if (s) { s.url = val; updatePreview(); }
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function generateHTML() {
  const w = $('emailWidth').value;
  const bg = $('bgColor').value;
  const cbg = $('contentBg').value;
  const tc = $('textColor').value;
  const ac = $('accentColor').value;
  const ff = $('fontFamily').value;
  const title = $('headerTitle').value;
  const logo = $('logoUrl').value;
  const footer = $('footerText').value;

  let body = '';

  if (logo) {
    body += `<tr><td align="center" style="padding:30px 20px 10px"><img src="${esc(logo)}" alt="${esc(title)}" style="max-width:200px;height:auto;display:block" /></td></tr>\n`;
  }
  body += `<tr><td align="center" style="padding:20px 30px 10px;font-size:24px;font-weight:bold;color:${tc}">${esc(title)}</td></tr>\n`;

  for (const s of sections) {
    switch (s.type) {
      case 'heading':
        body += `<tr><td style="padding:20px 30px 5px;font-size:20px;font-weight:bold;color:${tc}">${esc(s.content)}</td></tr>\n`;
        break;
      case 'text':
        body += `<tr><td style="padding:10px 30px;font-size:16px;line-height:1.6;color:${tc}">${s.content.replace(/\n/g,'<br>')}</td></tr>\n`;
        break;
      case 'button':
        body += `<tr><td align="center" style="padding:20px 30px"><table border="0" cellpadding="0" cellspacing="0"><tr><td align="center" style="background:${ac};border-radius:6px"><a href="${esc(s.url)}" target="_blank" style="display:inline-block;padding:14px 32px;color:#ffffff;text-decoration:none;font-size:16px;font-weight:bold;font-family:${ff}">${esc(s.content)}</a></td></tr></table></td></tr>\n`;
        break;
      case 'divider':
        body += `<tr><td style="padding:15px 30px"><hr style="border:none;border-top:1px solid #e0e0e0;margin:0" /></td></tr>\n`;
        break;
      case 'image':
        body += `<tr><td style="padding:10px 30px"><img src="${esc(s.content)}" alt="Image" style="max-width:100%;height:auto;display:block;border-radius:4px" /></td></tr>\n`;
        break;
    }
  }

  const footerHtml = footer.replace(/\n/g, '<br>');

  return `<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>${esc(title)}</title>
<style>
  body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
  table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
  img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
  @media only screen and (max-width: 620px) {
    .email-container { width: 100% !important; }
    .fluid { max-width: 100% !important; height: auto !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:${bg};font-family:${ff}">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:${bg}">
<tr><td align="center" style="padding:20px 10px">
<table role="presentation" class="email-container" width="${w}" cellpadding="0" cellspacing="0" border="0" style="max-width:${w}px;background-color:${cbg};border-radius:8px;overflow:hidden">
${body}
</table>
<table role="presentation" width="${w}" cellpadding="0" cellspacing="0" border="0" style="max-width:${w}px">
<tr><td style="padding:20px 30px;font-size:12px;line-height:1.5;color:#999999;text-align:center">${footerHtml}</td></tr>
</table>
</td></tr>
</table>
</body>
</html>`;
}

function updatePreview() {
  const html = generateHTML();
  const iframe = $('preview');
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
}

function setDevice(btn, width) {
  document.querySelectorAll('.device-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  $('preview').style.width = width;
}

function copyHTML() {
  navigator.clipboard.writeText(generateHTML()).then(() => {
    const toast = $('toast');
    toast.textContent = 'HTML copied!';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

function downloadHTML() {
  const blob = new Blob([generateHTML()], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'email-template.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadPreset(name) {
  sections = [];
  sectionId = 0;
  const preset = PRESETS[name] || [];
  for (const s of preset) {
    addSection(s.type, s.content, s.url);
  }
}

loadPreset('newsletter');
</script>
</body>
</html>
