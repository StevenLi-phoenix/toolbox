<script>
// === Audio Engine ===
let audioCtx = null;
let masterGain = null;
let analyser = null;
let isPlaying = false;
let timerInterval = null;
let timerRemaining = 0;
let animFrame = null;

const SOUNDS = [
  { id: 'white',    name: 'White Noise',  icon: '⚪', color: '#94a3b8' },
  { id: 'pink',     name: 'Pink Noise',   icon: '🩷', color: '#f472b6' },
  { id: 'brown',    name: 'Brown Noise',  icon: '🟤', color: '#a78bfa' },
  { id: 'rain',     name: 'Rain',         icon: '🌧️', color: '#60a5fa' },
  { id: 'ocean',    name: 'Ocean Waves',  icon: '🌊', color: '#22d3ee' },
  { id: 'wind',     name: 'Wind',         icon: '💨', color: '#34d399' },
  { id: 'fire',     name: 'Campfire',     icon: '🔥', color: '#fb923c' },
];

const BUILTIN_PRESETS = [
  { name: 'Deep Focus',    mix: { brown: 60, rain: 30 } },
  { name: 'Rainy Day',     mix: { rain: 70, wind: 25 } },
  { name: 'Ocean Breeze',  mix: { ocean: 65, wind: 20 } },
  { name: 'Cozy Cabin',    mix: { fire: 60, rain: 35, wind: 15 } },
  { name: 'White Out',     mix: { white: 70 } },
  { name: 'Sleep',         mix: { brown: 50, ocean: 30, rain: 20 } },
];

// Per-sound state
const soundState = {};
SOUNDS.forEach(s => {
  soundState[s.id] = { volume: 50, active: false, nodes: null };
});

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.8;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// --- Noise buffer generators ---
function createNoiseBuffer(type) {
  const sr = audioCtx.sampleRate;
  const len = sr * 2;
  const buf = audioCtx.createBuffer(1, len, sr);
  const data = buf.getChannelData(0);

  if (type === 'white') {
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  } else if (type === 'brown') {
    let last = 0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      last = (last + 0.02 * w) / 1.02;
      data[i] = last * 3.5;
    }
  }
  return buf;
}

// --- Sound creators ---
function createNoiseSource(type) {
  const buf = createNoiseBuffer(type);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  src.connect(gain);
  gain.connect(masterGain);
  src.start();
  return { sources: [src], gain };
}

function createRain() {
  // Base: filtered noise
  const buf = createNoiseBuffer('white');
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 1000;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 8000;
  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  src.connect(hp);
  hp.connect(lp);
  lp.connect(gain);
  gain.connect(masterGain);
  src.start();

  // Droplets
  const sources = [src];
  let dropletInterval = setInterval(() => {
    if (!isPlaying) return;
    const numDrops = Math.floor(Math.random() * 3) + 1;
    for (let d = 0; d < numDrops; d++) {
      setTimeout(() => {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const dGain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 2000 + Math.random() * 4000;
        dGain.gain.setValueAtTime(0.02 * gain.gain.value, audioCtx.currentTime);
        dGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05 + Math.random() * 0.05);
        osc.connect(dGain);
        dGain.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }, Math.random() * 200);
    }
  }, 80);

  return { sources, gain, intervals: [dropletInterval] };
}

function createOcean() {
  const buf = createNoiseBuffer('brown');
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'lowpass';
  bp.frequency.value = 500;
  bp.Q.value = 1;

  // LFO for wave modulation
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 0.08 + Math.random() * 0.04;
  lfoGain.gain.value = 300;
  lfo.connect(lfoGain);
  lfoGain.connect(bp.frequency);
  lfo.start();

  // Second LFO for amplitude
  const lfo2 = audioCtx.createOscillator();
  const lfo2Gain = audioCtx.createGain();
  lfo2.type = 'sine';
  lfo2.frequency.value = 0.06;
  lfo2Gain.gain.value = 0.3;

  const gain = audioCtx.createGain();
  gain.gain.value = 0;

  src.connect(bp);
  bp.connect(gain);
  lfo2.connect(lfo2Gain);
  lfo2Gain.connect(gain.gain);
  lfo2.start();

  gain.connect(masterGain);
  src.start();

  return { sources: [src, lfo, lfo2], gain };
}

function createWind() {
  const buf = createNoiseBuffer('white');
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 600;
  bp.Q.value = 0.5;

  // Slow modulation
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 0.15 + Math.random() * 0.1;
  lfoGain.gain.value = 400;
  lfo.connect(lfoGain);
  lfoGain.connect(bp.frequency);
  lfo.start();

  // Amplitude modulation for gusts
  const lfo2 = audioCtx.createOscillator();
  const lfo2Gain = audioCtx.createGain();
  lfo2.type = 'sine';
  lfo2.frequency.value = 0.1;
  lfo2Gain.gain.value = 0.25;

  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  src.connect(bp);
  bp.connect(gain);
  lfo2.connect(lfo2Gain);
  lfo2Gain.connect(gain.gain);
  lfo2.start();

  gain.connect(masterGain);
  src.start();

  return { sources: [src, lfo, lfo2], gain };
}

function createFire() {
  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  gain.connect(masterGain);

  const sources = [];
  // Base crackle: filtered noise bursts
  const buf = createNoiseBuffer('white');
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1500;
  bp.Q.value = 2;
  const baseGain = audioCtx.createGain();
  baseGain.gain.value = 0.3;
  src.connect(bp);
  bp.connect(baseGain);
  baseGain.connect(gain);
  src.start();
  sources.push(src);

  // Random crackle pops
  const cracklePop = setInterval(() => {
    if (!isPlaying || !audioCtx) return;
    const pops = Math.floor(Math.random() * 4) + 1;
    for (let p = 0; p < pops; p++) {
      setTimeout(() => {
        if (!audioCtx) return;
        const popBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
        const popData = popBuf.getChannelData(0);
        for (let i = 0; i < popData.length; i++) {
          popData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (popData.length * 0.2));
        }
        const popSrc = audioCtx.createBufferSource();
        popSrc.buffer = popBuf;
        const popFilter = audioCtx.createBiquadFilter();
        popFilter.type = 'bandpass';
        popFilter.frequency.value = 800 + Math.random() * 3000;
        popFilter.Q.value = 1 + Math.random() * 3;
        const popGain = audioCtx.createGain();
        popGain.gain.setValueAtTime(0.4 + Math.random() * 0.4, audioCtx.currentTime);
        popGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02 + Math.random() * 0.03);
        popSrc.connect(popFilter);
        popFilter.connect(popGain);
        popGain.connect(gain);
        popSrc.start();
        popSrc.stop(audioCtx.currentTime + 0.06);
      }, Math.random() * 150);
    }
  }, 60);

  return { sources, gain, intervals: [cracklePop] };
}

function createSound(id) {
  switch(id) {
    case 'white': return createNoiseSource('white');
    case 'pink': return createNoiseSource('pink');
    case 'brown': return createNoiseSource('brown');
    case 'rain': return createRain();
    case 'ocean': return createOcean();
    case 'wind': return createWind();
    case 'fire': return createFire();
  }
}

function startSound(id) {
  const s = soundState[id];
  if (s.nodes) return;
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  s.nodes = createSound(id);
  s.nodes.gain.gain.setTargetAtTime(s.volume / 100, audioCtx.currentTime, 0.05);
  s.active = true;
  updateCardUI(id);
}

function stopSound(id) {
  const s = soundState[id];
  if (!s.nodes) return;
  try {
    s.nodes.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
    setTimeout(() => {
      if (s.nodes) {
        s.nodes.sources.forEach(src => { try { src.stop(); } catch(e){} });
        if (s.nodes.intervals) s.nodes.intervals.forEach(iv => clearInterval(iv));
        s.nodes = null;
      }
    }, 200);
  } catch(e) { s.nodes = null; }
  s.active = false;
  updateCardUI(id);
}

function setSoundVolume(id, vol) {
  soundState[id].volume = vol;
  if (soundState[id].nodes) {
    soundState[id].nodes.gain.gain.setTargetAtTime(vol / 100, audioCtx.currentTime, 0.03);
  }
  const label = document.querySelector(`#vol-label-${id}`);
  if (label) label.textContent = vol + '%';
}

function setMasterVolume(val) {
  if (masterGain) masterGain.gain.setTargetAtTime(val / 100, audioCtx.currentTime, 0.03);
  document.getElementById('masterVolLabel').textContent = val + '%';
}

function toggleSound(id) {
  if (soundState[id].active) {
    stopSound(id);
  } else {
    startSound(id);
    if (!isPlaying) {
      isPlaying = true;
      updatePlayBtn();
      startVisualizer();
    }
  }
  checkIfAnySoundActive();
}

function togglePlay() {
  if (isPlaying) {
    // Stop all
    SOUNDS.forEach(s => stopSound(s.id));
    isPlaying = false;
    clearTimer();
    updatePlayBtn();
    stopVisualizer();
  } else {
    // Start all active sounds (or default to brown noise if none)
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const anyActive = SOUNDS.some(s => soundState[s.id].volume > 0 && soundState[s.id].active);
    if (!anyActive) {
      // Resume previous active sounds or start brown noise
      const hadActive = SOUNDS.filter(s => soundState[s.id].active);
      if (hadActive.length === 0) {
        soundState['brown'].volume = 50;
        soundState['brown'].active = true;
        document.querySelector(`#slider-brown`).value = 50;
        document.querySelector(`#vol-label-brown`).textContent = '50%';
      }
    }
    SOUNDS.forEach(s => {
      if (soundState[s.id].active) startSound(s.id);
    });
    isPlaying = true;
    updatePlayBtn();
    startVisualizer();
    startTimerIfSet();
  }
}

function checkIfAnySoundActive() {
  const any = SOUNDS.some(s => soundState[s.id].active);
  if (!any && isPlaying) {
    isPlaying = false;
    clearTimer();
    updatePlayBtn();
    stopVisualizer();
  }
}

function updatePlayBtn() {
  const btn = document.getElementById('playBtn');
  const icon = document.getElementById('playIcon');
  const label = document.getElementById('playLabel');
  if (isPlaying) {
    btn.classList.add('playing');
    icon.innerHTML = '&#10074;&#10074;';
    label.textContent = 'Stop';
  } else {
    btn.classList.remove('playing');
    icon.innerHTML = '&#9654;';
    label.textContent = 'Play';
  }
}

function updateCardUI(id) {
  const card = document.querySelector(`#card-${id}`);
  const toggle = document.querySelector(`#toggle-${id}`);
  if (soundState[id].active) {
    card.classList.add('active');
    toggle.classList.add('on');
  } else {
    card.classList.remove('active');
    toggle.classList.remove('on');
  }
}

// === Timer ===
function handleTimerSelect(val) {
  const custom = document.getElementById('customTimer');
  if (val === 'custom') {
    custom.style.display = '';
    custom.focus();
  } else {
    custom.style.display = 'none';
    if (val === '0') {
      clearTimer();
    } else if (isPlaying) {
      startCountdown(parseInt(val) * 60);
    }
  }
}

function setCustomTimer(val) {
  const mins = parseInt(val);
  if (mins > 0 && isPlaying) {
    startCountdown(mins * 60);
  }
}

function startTimerIfSet() {
  const sel = document.getElementById('timerSelect');
  const val = sel.value;
  if (val === '0') return;
  if (val === 'custom') {
    const cv = parseInt(document.getElementById('customTimer').value);
    if (cv > 0) startCountdown(cv * 60);
  } else {
    startCountdown(parseInt(val) * 60);
  }
}

function startCountdown(secs) {
  clearTimer();
  timerRemaining = secs;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerRemaining--;
    if (timerRemaining <= 0) {
      // Fade out and stop
      if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 1);
      setTimeout(() => {
        SOUNDS.forEach(s => stopSound(s.id));
        isPlaying = false;
        updatePlayBtn();
        stopVisualizer();
        if (masterGain) {
          const vol = parseInt(document.getElementById('masterVol').value);
          masterGain.gain.value = vol / 100;
        }
      }, 2000);
      clearTimer();
    } else {
      updateTimerDisplay();
    }
  }, 1000);
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerRemaining = 0;
  document.getElementById('timerDisplay').textContent = '';
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

// === Visualizer ===
function startVisualizer() {
  if (animFrame) return;
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');

  function draw() {
    if (!analyser) { animFrame = null; return; }
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    canvas.width = w * (window.devicePixelRatio || 1);
    canvas.height = h * (window.devicePixelRatio || 1);
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);

    const bufLen = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0, 0, w, h);

    const barW = (w / bufLen) * 2.5;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const barH = (dataArray[i] / 255) * h;
      const hue = (i / bufLen) * 60 + 230;
      ctx.fillStyle = `hsla(${hue}, 70%, 65%, 0.8)`;
      ctx.fillRect(x, h - barH, barW - 1, barH);
      x += barW;
      if (x > w) break;
    }

    animFrame = requestAnimationFrame(draw);
  }
  draw();
}

function stopVisualizer() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
  canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// === Presets ===
function getPresets() {
  try { return JSON.parse(localStorage.getItem('noisegen_presets') || '[]'); } catch { return []; }
}
function setPresets(list) {
  localStorage.setItem('noisegen_presets', JSON.stringify(list));
}

function savePreset() {
  const name = document.getElementById('presetName').value.trim();
  if (!name) return;
  const mix = {};
  SOUNDS.forEach(s => {
    if (soundState[s.id].active || soundState[s.id].volume > 0) {
      mix[s.id] = soundState[s.id].volume;
    }
  });
  // Also store which are active
  const active = {};
  SOUNDS.forEach(s => { active[s.id] = soundState[s.id].active; });

  const presets = getPresets();
  presets.push({ name, mix, active });
  setPresets(presets);
  document.getElementById('presetName').value = '';
  renderPresets();
}

function loadPreset(mix, active) {
  // Stop all first
  SOUNDS.forEach(s => stopSound(s.id));
  isPlaying = false;

  // Apply mix
  SOUNDS.forEach(s => {
    const vol = mix[s.id] || 0;
    const isActive = active ? active[s.id] : vol > 0;
    soundState[s.id].volume = vol;
    soundState[s.id].active = isActive;
    document.querySelector(`#slider-${s.id}`).value = vol;
    document.querySelector(`#vol-label-${s.id}`).textContent = vol + '%';
    updateCardUI(s.id);
  });

  // Start active sounds
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  SOUNDS.forEach(s => {
    if (soundState[s.id].active) startSound(s.id);
  });
  const any = SOUNDS.some(s => soundState[s.id].active);
  if (any) {
    isPlaying = true;
    updatePlayBtn();
    startVisualizer();
    startTimerIfSet();
  }
}

function deletePreset(idx) {
  const presets = getPresets();
  presets.splice(idx, 1);
  setPresets(presets);
  renderPresets();
}

function renderPresets() {
  // Built-in
  const builtinEl = document.getElementById('builtinPresets');
  builtinEl.innerHTML = BUILTIN_PRESETS.map((p, i) =>
    `<button class="builtin-chip" onclick="loadPreset(BUILTIN_PRESETS[${i}].mix)">${p.name}</button>`
  ).join('');

  // User presets
  const listEl = document.getElementById('presetsList');
  const presets = getPresets();
  if (presets.length === 0) {
    listEl.innerHTML = '<span style="font-size:0.8rem;color:var(--text-dim)">No saved presets yet. Mix sounds and save your favorite combo!</span>';
  } else {
    listEl.innerHTML = presets.map((p, i) =>
      `<span class="preset-chip" onclick="loadPreset(getPresets()[${i}].mix, getPresets()[${i}].active)">
        ${escHtml(p.name)}
        <button class="preset-del" onclick="event.stopPropagation();deletePreset(${i})" title="Delete">&times;</button>
      </span>`
    ).join('');
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// === Build UI ===
function buildCards() {
  const grid = document.getElementById('soundsGrid');
  grid.innerHTML = SOUNDS.map(s => `
    <div class="sound-card" id="card-${s.id}" style="--card-accent:${s.color}">
      <div class="sound-card-header">
        <div class="sound-card-title">
          <span class="sound-icon">${s.icon}</span>
          <span class="sound-name">${s.name}</span>
        </div>
        <button class="sound-toggle" id="toggle-${s.id}" onclick="toggleSound('${s.id}')"></button>
      </div>
      <div class="sound-slider-row">
        <input type="range" id="slider-${s.id}" min="0" max="100" value="${soundState[s.id].volume}"
               oninput="setSoundVolume('${s.id}', parseInt(this.value))">
        <span class="sound-vol-label" id="vol-label-${s.id}">${soundState[s.id].volume}%</span>
      </div>
    </div>
  `).join('');
}

// Init
buildCards();
renderPresets();
</script>
</body>
</html>
