<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Performance Benchmark - Free Online JS Perf Tool</title>
<meta name="description" content="Free online JavaScript performance benchmark tool. Compare code snippet execution speed with ops/sec, relative performance, and statistical analysis. 100% client-side.">
<meta name="keywords" content="javascript benchmark, jsperf, js performance, code benchmark, speed test, javascript speed">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/jsperf.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .setup-section { margin-bottom: 16px; }
  .setup-section textarea { min-height: 60px; font-family: var(--mono); font-size: .85rem; }
  .cases { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
  .case-card { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .case-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .case-header input { flex: 1; border: none; background: transparent; font-weight: 600; font-size: .9rem; outline: none; padding: 2px 4px; color: var(--text); }
  .case-header .btn-icon { font-size: .8rem; }
  .case-body textarea { width: 100%; min-height: 80px; border: none; border-radius: 0; font-family: var(--mono); font-size: .85rem; padding: 10px 12px; resize: vertical; }
  .result-bar { padding: 8px 12px; border-top: 1px solid var(--border); display: none; }
  .result-bar.show { display: block; }
  .bar-wrap { background: var(--surface2); border-radius: 4px; height: 24px; overflow: hidden; margin: 4px 0; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .bar-fill.fastest { background: var(--success); }
  .bar-fill.slower { background: var(--warning); opacity: .7; }
  .bar-fill.slowest { background: var(--error); opacity: .6; }
  .result-stats { font-size: .82rem; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .result-stats strong { color: var(--text); }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .controls select { width: auto; }
  .status-msg { font-size: .85rem; color: var(--muted); padding: 8px 0; }
  .status-msg.running { color: var(--success); }
  .winner { margin-top: 12px; padding: 12px; border-radius: var(--radius); }
  .winner.show { background: #ecfdf5; border: 1px solid #a7f3d0; }
  .winner strong { color: var(--success); }
  @media (max-width: 768px) {
    .controls { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; All Tools</a>
<h1>&#9889; JS Performance Benchmark</h1>
<p class="subtitle">Compare JavaScript code snippet execution speed. 100% client-side.</p>

<div class="container">
  <div class="card setup-section">
    <h2>Setup Code <span style="font-weight:400;font-size:.82rem;color:var(--muted)">(runs once before each test)</span></h2>
    <textarea id="setup" spellcheck="false" placeholder="// Optional setup code, e.g.:\n// const arr = Array.from({length: 1000}, (_, i) => i);"></textarea>
  </div>

  <div class="cases" id="cases">
    <div class="case-card" data-id="0">
      <div class="case-header">
        <input type="text" value="Test Case A" class="case-name">
        <button class="btn-icon" onclick="removeCase(this)" title="Remove">&times;</button>
      </div>
      <div class="case-body">
        <textarea class="case-code" spellcheck="false" placeholder="// Code to benchmark">const arr = [];
for (let i = 0; i < 1000; i++) arr.push(i);</textarea>
      </div>
      <div class="result-bar" id="result-0">
        <div class="bar-wrap"><div class="bar-fill" id="bar-0"></div></div>
        <div class="result-stats" id="stats-0"></div>
      </div>
    </div>
    <div class="case-card" data-id="1">
      <div class="case-header">
        <input type="text" value="Test Case B" class="case-name">
        <button class="btn-icon" onclick="removeCase(this)" title="Remove">&times;</button>
      </div>
      <div class="case-body">
        <textarea class="case-code" spellcheck="false" placeholder="// Code to benchmark">const arr = Array.from({length: 1000}, (_, i) => i);</textarea>
      </div>
      <div class="result-bar" id="result-1">
        <div class="bar-wrap"><div class="bar-fill" id="bar-1"></div></div>
        <div class="result-stats" id="stats-1"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="runBtn" onclick="runBenchmark()">&#9654; Run Benchmark</button>
    <button class="btn-secondary" onclick="addCase()">+ Add Case</button>
    <label style="font-size:.85rem;color:var(--muted)">Iterations:
      <select id="iterations">
        <option value="100">100</option>
        <option value="1000" selected>1,000</option>
        <option value="10000">10,000</option>
        <option value="100000">100,000</option>
      </select>
    </label>
  </div>

  <div class="status-msg" id="status"></div>
  <div class="winner" id="winner"></div>
</div>

<footer>
  <div>Built with &#9749; by Steven Li &middot; No data leaves your browser</div>
  <div><a href="index.html">&larr; Back to Toolbox</a> &middot; <a href="https://buymeacoffee.com/stevenli.phoenix">&#9749; Buy Me a Coffee</a></div>
</footer>

<script>
let caseCounter = 2;
let isRunning = false;

function addCase() {
  const id = caseCounter++;
  const card = document.createElement('div');
  card.className = 'case-card';
  card.dataset.id = id;
  card.innerHTML = `
    <div class="case-header">
      <input type="text" value="Test Case ${String.fromCharCode(65 + id)}" class="case-name">
      <button class="btn-icon" onclick="removeCase(this)" title="Remove">&times;</button>
    </div>
    <div class="case-body">
      <textarea class="case-code" spellcheck="false" placeholder="// Code to benchmark"></textarea>
    </div>
    <div class="result-bar" id="result-${id}">
      <div class="bar-wrap"><div class="bar-fill" id="bar-${id}"></div></div>
      <div class="result-stats" id="stats-${id}"></div>
    </div>`;
  document.getElementById('cases').appendChild(card);
}

function removeCase(btn) {
  const cards = document.querySelectorAll('.case-card');
  if (cards.length <= 2) return;
  btn.closest('.case-card').remove();
}

function formatOps(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(2) + 'K';
  return n.toFixed(0);
}

async function runBenchmark() {
  if (isRunning) return;
  isRunning = true;
  const runBtn = document.getElementById('runBtn');
  runBtn.disabled = true;
  runBtn.textContent = 'Running...';
  const statusEl = document.getElementById('status');
  const winnerEl = document.getElementById('winner');
  winnerEl.className = 'winner';
  winnerEl.textContent = '';

  const setup = document.getElementById('setup').value;
  const iterations = parseInt(document.getElementById('iterations').value);
  const cards = document.querySelectorAll('.case-card');
  const results = [];

  for (const card of cards) {
    const id = card.dataset.id;
    const name = card.querySelector('.case-name').value;
    const code = card.querySelector('.case-code').value;
    const resultBar = document.getElementById('result-' + id);
    const barFill = document.getElementById('bar-' + id);
    const statsDiv = document.getElementById('stats-' + id);

    resultBar.classList.add('show');
    barFill.style.width = '0%';
    statusEl.textContent = 'Running: ' + name + '...';
    statusEl.className = 'status-msg running';

    await new Promise(r => setTimeout(r, 50));

    try {
      const fn = new Function(setup + ';\n' + code);
      // Warmup
      for (let i = 0; i < Math.min(10, iterations); i++) fn();

      // Actual benchmark
      const times = [];
      const batchSize = Math.max(1, Math.min(100, Math.floor(iterations / 10)));
      let totalOps = 0;

      const startWall = performance.now();
      while (totalOps < iterations) {
        const batch = Math.min(batchSize, iterations - totalOps);
        const t0 = performance.now();
        for (let i = 0; i < batch; i++) fn();
        const t1 = performance.now();
        times.push((t1 - t0) / batch);
        totalOps += batch;
      }
      const wallTime = performance.now() - startWall;

      // Statistics
      times.sort((a,b) => a - b);
      const median = times[Math.floor(times.length / 2)];
      const mean = times.reduce((a,b) => a+b, 0) / times.length;
      const min = times[0];
      const max = times[times.length - 1];
      const variance = times.reduce((s,t) => s + (t - mean) ** 2, 0) / times.length;
      const stddev = Math.sqrt(variance);
      const opsPerSec = mean > 0 ? 1000 / mean : Infinity;

      results.push({ id, name, opsPerSec, mean, median, min, max, stddev, wallTime, error: null });
      statsDiv.innerHTML = `<strong>${formatOps(opsPerSec)} ops/sec</strong> <span>mean: ${mean.toFixed(4)}ms</span> <span>median: ${median.toFixed(4)}ms</span> <span>&plusmn;${stddev.toFixed(4)}ms</span>`;
    } catch(e) {
      results.push({ id, name, opsPerSec: 0, error: e.message });
      statsDiv.innerHTML = `<strong style="color:var(--error)">Error:</strong> ${e.message}`;
    }
  }

  // Calculate relative performance and color bars
  const maxOps = Math.max(...results.filter(r => !r.error).map(r => r.opsPerSec));
  for (const r of results) {
    const barFill = document.getElementById('bar-' + r.id);
    if (r.error) {
      barFill.style.width = '0%';
      barFill.className = 'bar-fill slowest';
      continue;
    }
    const pct = maxOps > 0 ? (r.opsPerSec / maxOps) * 100 : 0;
    barFill.style.width = pct + '%';
    if (r.opsPerSec === maxOps) {
      barFill.className = 'bar-fill fastest';
    } else if (pct >= 50) {
      barFill.className = 'bar-fill slower';
    } else {
      barFill.className = 'bar-fill slowest';
    }

    // Add relative info
    const statsDiv = document.getElementById('stats-' + r.id);
    if (r.opsPerSec < maxOps && maxOps > 0) {
      const pctSlower = ((1 - r.opsPerSec / maxOps) * 100).toFixed(1);
      statsDiv.innerHTML += ` <span style="color:var(--error)">${pctSlower}% slower</span>`;
    } else if (r.opsPerSec === maxOps) {
      statsDiv.innerHTML += ` <span style="color:var(--success)">Fastest</span>`;
    }
  }

  // Winner summary
  const valid = results.filter(r => !r.error);
  if (valid.length >= 2) {
    const winner = valid.reduce((a,b) => a.opsPerSec > b.opsPerSec ? a : b);
    const second = valid.filter(r => r !== winner).reduce((a,b) => a.opsPerSec > b.opsPerSec ? a : b);
    const factor = (winner.opsPerSec / second.opsPerSec).toFixed(2);
    winnerEl.className = 'winner show';
    winnerEl.innerHTML = `<strong>"${winner.name}"</strong> is the fastest, <strong>${factor}x</strong> faster than "${second.name}"`;
  }

  statusEl.textContent = 'Benchmark complete.';
  statusEl.className = 'status-msg';
  runBtn.disabled = false;
  runBtn.textContent = '\u25B6 Run Benchmark';
  isRunning = false;
}
</script>
</body>
</html>
