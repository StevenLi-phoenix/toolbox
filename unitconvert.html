<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Converter - Free Online Tool</title>
<meta name="description" content="Free online unit converter. Convert length, weight, temperature, area, volume, speed, data, and time units instantly. No signup required.">
<meta name="keywords" content="unit converter, length converter, weight converter, temperature converter, metric imperial, free unit tool">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/unitconvert.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
h1{font-size:1.8rem;font-weight:700;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.container{width:100%;max-width:700px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
label{display:block;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:.35rem}
input[type="number"],select{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;font-family:var(--font);font-size:.9rem}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.cats{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.cat{padding:.4rem .8rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.cat:hover{border-color:var(--accent);color:var(--text)}
.cat.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.converter{display:grid;grid-template-columns:1fr auto 1fr;gap:1rem;align-items:end}
.swap-btn{padding:.5rem;border:none;border-radius:50%;background:var(--border);color:var(--text);font-size:1.2rem;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.swap-btn:hover{background:var(--accent);color:#fff}
.result-display{text-align:center;margin-top:1.5rem;padding:1rem;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.result-value{font-size:1.8rem;font-weight:700;color:var(--accent)}
.result-formula{font-size:.8rem;color:var(--muted);margin-top:.35rem}
.all-results{margin-top:1rem}
.all-row{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.85rem}
.all-row:last-child{border-bottom:none}
.all-key{color:var(--muted)}
.all-val{font-weight:600;font-family:'Courier New',monospace}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
footer{margin-top:auto;padding-top:2rem;text-align:center;font-size:.85rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">← All Tools</a>
<h1>Unit Converter</h1>
<p class="subtitle">Convert between units of length, weight, temperature, and more</p>

<div class="card">
<div class="cats" id="cats"></div>

<div class="converter">
<div>
<label>From</label>
<input type="number" id="val" value="1" oninput="convert()">
<select id="from" onchange="convert()" style="margin-top:.5rem"></select>
</div>
<button class="swap-btn" onclick="swap()">⇄</button>
<div>
<label>To</label>
<div class="result-display">
<div class="result-value" id="result">—</div>
</div>
<select id="to" onchange="convert()" style="margin-top:.5rem"></select>
</div>
</div>
<div class="result-formula" id="formula"></div>
</div>

<div class="card">
<h2>📊 All Conversions</h2>
<div class="all-results" id="allResults"></div>
</div>
</div>

<footer>
  <a href="https://buymeacoffee.com/stevenli.phoenix" target="_blank">☕ Buy Me a Coffee</a> · 
  <a href="index.html">More Tools</a> · 
  Built with 🌙 by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a>
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
const UNITS={
  Length:{m:1,km:1000,cm:0.01,mm:0.001,mi:1609.344,yd:0.9144,ft:0.3048,in:0.0254,nm:1852,μm:1e-6},
  Weight:{kg:1,g:0.001,mg:1e-6,lb:0.453592,oz:0.0283495,t:1000,st:6.35029},
  Temperature:{},
  Area:{'m²':1,'km²':1e6,'cm²':1e-4,'ft²':0.092903,'yd²':0.836127,acre:4046.86,ha:1e4,'mi²':2.59e6},
  Volume:{L:1,mL:0.001,gal:3.78541,qt:0.946353,pt:0.473176,cup:0.236588,'fl oz':0.0295735,'m³':1000,'cm³':0.001},
  Speed:{'m/s':1,'km/h':0.277778,'mi/h':0.44704,knot:0.514444,'ft/s':0.3048},
  Data:{B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776,bit:0.125,Kbit:128,Mbit:131072,Gbit:134217728},
  Time:{s:1,ms:0.001,min:60,h:3600,day:86400,week:604800,month:2592000,year:31536000}
};

let currentCat='Length';
function $id(id){return document.getElementById(id)}

function initCats(){
  $id('cats').innerHTML=Object.keys(UNITS).map(c=>`<button class="cat${c===currentCat?' active':''}" onclick="setCat('${c}',this)">${c}</button>`).join('');
}

function setCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  populateSelects();convert();
}

function populateSelects(){
  const units=Object.keys(UNITS[currentCat]);
  if(currentCat==='Temperature'){
    ['°C','°F','K'].forEach((u,i)=>{
      [$id('from'),$id('to')].forEach(sel=>{
        if(i===0) sel.innerHTML='';
        sel.innerHTML+=`<option value="${u}"${i===(sel===$id('to')?1:0)?' selected':''}>${u}</option>`;
      });
    });
  }else{
    [$id('from'),$id('to')].forEach((sel,si)=>{
      sel.innerHTML=units.map((u,i)=>`<option value="${u}"${i===(si===0?0:1)?' selected':''}>${u}</option>`).join('');
    });
  }
}

function convertTemp(val,from,to){
  let c;
  if(from==='°C') c=val;
  else if(from==='°F') c=(val-32)*5/9;
  else c=val-273.15;
  if(to==='°C') return c;
  if(to==='°F') return c*9/5+32;
  return c+273.15;
}

function convert(){
  const val=parseFloat($id('val').value)||0;
  const from=$id('from').value,to=$id('to').value;
  let result;

  if(currentCat==='Temperature'){
    result=convertTemp(val,from,to);
  }else{
    const base=val*UNITS[currentCat][from];
    result=base/UNITS[currentCat][to];
  }

  $id('result').textContent=formatNum(result);
  $id('formula').textContent=`${val} ${from} = ${formatNum(result)} ${to}`;

  // All conversions
  let html='';
  if(currentCat==='Temperature'){
    ['°C','°F','K'].forEach(u=>{
      if(u===from)return;
      const r=convertTemp(val,from,u);
      html+=`<div class="all-row"><span class="all-key">${u}</span><span class="all-val">${formatNum(r)}</span></div>`;
    });
  }else{
    Object.keys(UNITS[currentCat]).forEach(u=>{
      if(u===from)return;
      const r=(val*UNITS[currentCat][from])/UNITS[currentCat][u];
      html+=`<div class="all-row"><span class="all-key">${u}</span><span class="all-val">${formatNum(r)}</span></div>`;
    });
  }
  $id('allResults').innerHTML=html;
}

function formatNum(n){
  if(Math.abs(n)<0.001&&n!==0) return n.toExponential(6);
  if(Math.abs(n)>1e9) return n.toExponential(6);
  return parseFloat(n.toPrecision(10)).toString();
}

function swap(){
  const f=$id('from').value,t=$id('to').value;
  $id('from').value=t;$id('to').value=f;
  convert();
}

initCats();populateSelects();convert();
</script>
</body>
</html>
