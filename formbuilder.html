<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Form Builder - Free Online Tool</title>
<meta name="description" content="Build HTML forms visually — add inputs, selects, checkboxes, radios, textareas, and more. Export clean, accessible HTML.">
<meta name="keywords" content="html form builder, form generator, html form, form creator, accessible forms">
<link rel="canonical" href="https://stevenli-phoenix.github.io/toolbox/formbuilder.html">
<link rel="stylesheet" href="toolbox.css">
<style>
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .field-list{min-height:200px}
  .form-field{border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;background:var(--surface);position:relative}
  .form-field:hover{border-color:var(--accent)}
  .form-field .field-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .form-field .field-type{font-size:.78rem;color:var(--muted);font-family:var(--mono);background:var(--bg);padding:2px 8px;border-radius:3px}
  .form-field .field-actions{display:flex;gap:4px}
  .form-field .field-actions button{background:none;border:none;cursor:pointer;font-size:.85rem;padding:2px 6px;color:var(--muted)}
  .form-field .field-actions button:hover{color:var(--text)}
  .field-config{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.82rem}
  .field-config label{display:block;font-weight:500;margin-bottom:2px;color:var(--muted)}
  .field-config input,.field-config select{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:.82rem}
  .field-config .full{grid-column:1/-1}
  .add-field-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .add-field-row button{padding:6px 10px;font-size:.78rem}
  .output-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-family:var(--mono);font-size:.82rem;white-space:pre-wrap;word-break:break-all;line-height:1.5;max-height:500px;overflow:auto;tab-size:2}
  .preview-form{border:1px solid var(--border);border-radius:var(--radius);padding:20px;background:var(--bg)}
  .preview-form label{display:block;font-size:.85rem;font-weight:500;margin-bottom:4px}
  .preview-form input,.preview-form select,.preview-form textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:.85rem;margin-bottom:12px;box-sizing:border-box;background:var(--bg);color:var(--text)}
  .preview-form input[type=checkbox],.preview-form input[type=radio]{width:auto;margin-right:6px}
  .preview-form .checkbox-group,.preview-form .radio-group{margin-bottom:12px}
  .preview-form .checkbox-group label,.preview-form .radio-group label{display:inline-flex;align-items:center;font-weight:400;margin-right:12px;margin-bottom:4px}
  .preview-form button[type=submit]{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:.9rem}
  .form-settings{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;font-size:.82rem}
  .form-settings label{font-weight:500;margin-bottom:2px;display:block;color:var(--muted)}
  .form-settings input,.form-settings select{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:.82rem}
  .tabs{margin-bottom:16px}
  .check-row{display:flex;align-items:center;gap:6px;margin-top:4px}
  .check-row input[type=checkbox]{width:auto}
  @media(max-width:768px){.panels{grid-template-columns:1fr}.form-settings{grid-template-columns:1fr}.field-config{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back">&larr; All Tools</a>
<h1>HTML Form Builder</h1>
<p class="subtitle">Build accessible HTML forms visually — add fields, configure attributes, and export clean HTML</p>

<div class="card">
<h2>⚙️ Form Settings</h2>
<div class="form-settings">
<div><label>Action URL</label><input type="text" id="formAction" value="/submit" oninput="render()"></div>
<div><label>Method</label>
<select id="formMethod" onchange="render()">
<option value="POST">POST</option>
<option value="GET">GET</option>
</select></div>
<div><label>Encoding</label>
<select id="formEnctype" onchange="render()">
<option value="">Default</option>
<option value="multipart/form-data">multipart/form-data</option>
<option value="text/plain">text/plain</option>
</select></div>
</div>
</div>

<div class="card">
<h2>➕ Add Fields</h2>
<div class="add-field-row">
<button class="btn-secondary" onclick="addField('text')">📝 Text</button>
<button class="btn-secondary" onclick="addField('email')">📧 Email</button>
<button class="btn-secondary" onclick="addField('password')">🔒 Password</button>
<button class="btn-secondary" onclick="addField('number')">🔢 Number</button>
<button class="btn-secondary" onclick="addField('tel')">📞 Phone</button>
<button class="btn-secondary" onclick="addField('url')">🔗 URL</button>
<button class="btn-secondary" onclick="addField('date')">📅 Date</button>
<button class="btn-secondary" onclick="addField('textarea')">📄 Textarea</button>
<button class="btn-secondary" onclick="addField('select')">📋 Select</button>
<button class="btn-secondary" onclick="addField('checkbox')">☑️ Checkbox</button>
<button class="btn-secondary" onclick="addField('radio')">🔘 Radio</button>
<button class="btn-secondary" onclick="addField('file')">📎 File</button>
<button class="btn-secondary" onclick="addField('hidden')">👁️ Hidden</button>
<button class="btn-secondary" onclick="addField('range')">📏 Range</button>
<button class="btn-secondary" onclick="addField('color')">🎨 Color</button>
</div>
</div>

<div class="panels">
<div class="card">
<h2>📝 Fields</h2>
<div class="field-list" id="fieldList">
<p class="empty" id="emptyMsg">Click buttons above to add form fields</p>
</div>
</div>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="showTab('preview',this)">👁️ Preview</button>
<button class="tab" onclick="showTab('code',this)">📤 HTML Code</button>
</div>
<div id="previewTab">
<div class="preview-form" id="preview"></div>
</div>
<div id="codeTab" style="display:none">
<div class="output-box" id="output"></div>
<div class="btn-row" style="margin-top:12px">
<button class="btn-primary" onclick="copyOutput()">📋 Copy HTML</button>
</div>
</div>
</div>
</div>
</div>

<footer>
  Built with ☕ by <a href="https://github.com/StevenLi-phoenix" target="_blank">Steven Li</a> · No data leaves your browser
</footer>
<div class="toast" id="toast">Copied!</div>

<script>
const $=id=>document.getElementById(id);
let fields=[];
let fieldId=0;

function addField(type){
  const id=fieldId++;
  const defaults={
    text:{label:'Full Name',name:'name',placeholder:'Enter your name'},
    email:{label:'Email Address',name:'email',placeholder:'you@example.com'},
    password:{label:'Password',name:'password',placeholder:'Enter password'},
    number:{label:'Quantity',name:'quantity',placeholder:'0'},
    tel:{label:'Phone',name:'phone',placeholder:'+1 (555) 000-0000'},
    url:{label:'Website',name:'website',placeholder:'https://example.com'},
    date:{label:'Date',name:'date',placeholder:''},
    textarea:{label:'Message',name:'message',placeholder:'Enter your message...'},
    select:{label:'Country',name:'country',placeholder:'',options:'US|United States\nUK|United Kingdom\nCA|Canada\nDE|Germany'},
    checkbox:{label:'Agree to terms',name:'agree',placeholder:''},
    radio:{label:'Preference',name:'preference',placeholder:'',options:'option1|Option 1\noption2|Option 2\noption3|Option 3'},
    file:{label:'Upload File',name:'file',placeholder:''},
    hidden:{label:'Hidden Field',name:'hidden_field',placeholder:'',value:'secret_value'},
    range:{label:'Rating',name:'rating',placeholder:'',min:'0',max:'100',step:'1'},
    color:{label:'Favorite Color',name:'color',placeholder:''},
  };
  const d=defaults[type]||{label:'Field',name:'field',placeholder:''};
  fields.push({id,type,label:d.label,name:d.name,placeholder:d.placeholder,required:false,options:d.options||'',value:d.value||'',min:d.min||'',max:d.max||'',step:d.step||''});
  renderFields();
  render();
}

function removeField(id){
  fields=fields.filter(f=>f.id!==id);
  renderFields();
  render();
}

function moveField(id,dir){
  const idx=fields.findIndex(f=>f.id===id);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=fields.length)return;
  [fields[idx],fields[newIdx]]=[fields[newIdx],fields[idx]];
  renderFields();
  render();
}

function updateField(id,key,val){
  const f=fields.find(f=>f.id===id);
  if(f){f[key]=val;render();}
}

function renderFields(){
  if(fields.length===0){
    $('fieldList').innerHTML='<p class="empty">Click buttons above to add form fields</p>';
    return;
  }
  let html='';
  fields.forEach((f,i)=>{
    html+=`<div class="form-field">
      <div class="field-header">
        <span class="field-type">&lt;${f.type==='textarea'?'textarea':f.type==='select'?'select':'input type="${f.type}"'}&gt;</span>
        <div class="field-actions">
          <button onclick="moveField(${f.id},-1)" title="Move up">↑</button>
          <button onclick="moveField(${f.id},1)" title="Move down">↓</button>
          <button onclick="removeField(${f.id})" title="Remove">✕</button>
        </div>
      </div>
      <div class="field-config">
        <div><label>Label</label><input value="${esc(f.label)}" onchange="updateField(${f.id},'label',this.value)"></div>
        <div><label>Name</label><input value="${esc(f.name)}" onchange="updateField(${f.id},'name',this.value)"></div>
        <div><label>Placeholder</label><input value="${esc(f.placeholder)}" onchange="updateField(${f.id},'placeholder',this.value)"></div>
        <div class="check-row"><input type="checkbox" ${f.required?'checked':''} onchange="updateField(${f.id},'required',this.checked)"> <label style="margin:0">Required</label></div>
        ${(f.type==='select'||f.type==='radio')?`<div class="full"><label>Options (value|label per line)</label><textarea style="width:100%;height:60px;font-size:.78rem;font-family:var(--mono);padding:6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)" onchange="updateField(${f.id},'options',this.value)">${esc(f.options)}</textarea></div>`:''}
        ${f.type==='hidden'?`<div class="full"><label>Value</label><input value="${esc(f.value)}" onchange="updateField(${f.id},'value',this.value)"></div>`:''}
        ${f.type==='range'?`<div><label>Min</label><input value="${esc(f.min)}" onchange="updateField(${f.id},'min',this.value)"></div><div><label>Max</label><input value="${esc(f.max)}" onchange="updateField(${f.id},'max',this.value)"></div>`:''}
      </div>
    </div>`;
  });
  $('fieldList').innerHTML=html;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parseOptions(str){
  return str.split('\n').filter(l=>l.trim()).map(l=>{
    const parts=l.split('|');
    return{value:parts[0].trim(),label:(parts[1]||parts[0]).trim()};
  });
}

function render(){
  renderPreview();
  renderCode();
}

function renderPreview(){
  let html='';
  fields.forEach(f=>{
    const req=f.required?' *':'';
    if(f.type==='textarea'){
      html+=`<label>${esc(f.label)}${req}</label><textarea placeholder="${esc(f.placeholder)}" rows="3"${f.required?' required':''}></textarea>`;
    } else if(f.type==='select'){
      const opts=parseOptions(f.options);
      html+=`<label>${esc(f.label)}${req}</label><select${f.required?' required':''}><option value="">-- Select --</option>${opts.map(o=>`<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('')}</select>`;
    } else if(f.type==='checkbox'){
      html+=`<div class="checkbox-group"><label><input type="checkbox" name="${esc(f.name)}"${f.required?' required':''}> ${esc(f.label)}</label></div>`;
    } else if(f.type==='radio'){
      const opts=parseOptions(f.options);
      html+=`<div class="radio-group"><label style="display:block;margin-bottom:4px">${esc(f.label)}${req}</label>${opts.map(o=>`<label><input type="radio" name="${esc(f.name)}" value="${esc(o.value)}"${f.required?' required':''}> ${esc(o.label)}</label>`).join('')}</div>`;
    } else if(f.type==='hidden'){
      html+=`<div style="font-size:.78rem;color:var(--muted);margin-bottom:12px;font-family:var(--mono)">[hidden: ${esc(f.name)}="${esc(f.value)}"]</div>`;
    } else {
      html+=`<label>${esc(f.label)}${req}</label><input type="${f.type}" placeholder="${esc(f.placeholder)}"${f.type==='range'?` min="${esc(f.min)}" max="${esc(f.max)}"`:''} ${f.required?'required':''}>`;
    }
  });
  if(fields.length>0) html+=`<button type="submit">Submit</button>`;
  $('preview').innerHTML=html||'<p class="empty">Add fields to see preview</p>';
}

function renderCode(){
  const action=$('formAction').value;
  const method=$('formMethod').value;
  const enctype=$('formEnctype').value;
  let lines=[];
  let attrs=` action="${esc(action)}" method="${method}"`;
  if(enctype) attrs+=` enctype="${enctype}"`;
  lines.push(`<form${attrs}>`);
  fields.forEach(f=>{
    const req=f.required?' required':'';
    const nameAttr=` name="${esc(f.name)}"`;
    if(f.type==='textarea'){
      lines.push(`  <div>`);
      lines.push(`    <label for="${esc(f.name)}">${esc(f.label)}</label>`);
      lines.push(`    <textarea id="${esc(f.name)}"${nameAttr} placeholder="${esc(f.placeholder)}" rows="4"${req}></textarea>`);
      lines.push(`  </div>`);
    } else if(f.type==='select'){
      const opts=parseOptions(f.options);
      lines.push(`  <div>`);
      lines.push(`    <label for="${esc(f.name)}">${esc(f.label)}</label>`);
      lines.push(`    <select id="${esc(f.name)}"${nameAttr}${req}>`);
      lines.push(`      <option value="">-- Select --</option>`);
      opts.forEach(o=>lines.push(`      <option value="${esc(o.value)}">${esc(o.label)}</option>`));
      lines.push(`    </select>`);
      lines.push(`  </div>`);
    } else if(f.type==='checkbox'){
      lines.push(`  <div>`);
      lines.push(`    <label>`);
      lines.push(`      <input type="checkbox"${nameAttr}${req}>`);
      lines.push(`      ${esc(f.label)}`);
      lines.push(`    </label>`);
      lines.push(`  </div>`);
    } else if(f.type==='radio'){
      const opts=parseOptions(f.options);
      lines.push(`  <fieldset>`);
      lines.push(`    <legend>${esc(f.label)}</legend>`);
      opts.forEach(o=>{
        lines.push(`    <label>`);
        lines.push(`      <input type="radio"${nameAttr} value="${esc(o.value)}"${req}>`);
        lines.push(`      ${esc(o.label)}`);
        lines.push(`    </label>`);
      });
      lines.push(`  </fieldset>`);
    } else if(f.type==='hidden'){
      lines.push(`  <input type="hidden"${nameAttr} value="${esc(f.value)}">`);
    } else {
      lines.push(`  <div>`);
      lines.push(`    <label for="${esc(f.name)}">${esc(f.label)}</label>`);
      let inputAttrs=` type="${f.type}" id="${esc(f.name)}"${nameAttr}`;
      if(f.placeholder) inputAttrs+=` placeholder="${esc(f.placeholder)}"`;
      if(f.type==='range'){
        if(f.min) inputAttrs+=` min="${esc(f.min)}"`;
        if(f.max) inputAttrs+=` max="${esc(f.max)}"`;
        if(f.step) inputAttrs+=` step="${esc(f.step)}"`;
      }
      inputAttrs+=req;
      lines.push(`    <input${inputAttrs}>`);
      lines.push(`  </div>`);
    }
  });
  if(fields.length>0){
    lines.push(`  <div>`);
    lines.push(`    <button type="submit">Submit</button>`);
    lines.push(`  </div>`);
  }
  lines.push(`</form>`);
  $('output').textContent=lines.join('\n');
}

function showTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  $('previewTab').style.display=tab==='preview'?'block':'none';
  $('codeTab').style.display=tab==='code'?'block':'none';
}

function copyOutput(){
  navigator.clipboard.writeText($('output').textContent).then(()=>{
    const t=$('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
  });
}

// Add a couple of default fields
addField('text');
addField('email');
</script>
</body>
</html>
